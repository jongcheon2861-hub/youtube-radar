<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ALGO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet"/>

<script>
function buildFavicon(size){
  /* 파비콘은 4x 슈퍼샘플링으로 선명도 향상 */
  const scale = 4;
  const cs = size * scale;
  const c  = document.createElement('canvas');
  c.width  = cs; c.height = cs;
  const ctx = c.getContext('2d');

  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  /* 배경 */
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cs, cs);

  /* 배경 글로우 */
  const bgG = ctx.createRadialGradient(cs/2,cs/2,0, cs/2,cs/2, cs*0.7);
  bgG.addColorStop(0,   'rgba(100,0,220,0.35)');
  bgG.addColorStop(0.4, 'rgba(255,160,0,0.15)');
  bgG.addColorStop(1,   'transparent');
  ctx.fillStyle = bgG;
  ctx.fillRect(0, 0, cs, cs);

  const letters = [
    { ch:'A', hi:'#FFF8DC', mid:'#FFB800', lo:'#7A2000', glow:'#FFB800' },
    { ch:'L', hi:'#EED5FF', mid:'#8800FF', lo:'#280060', glow:'#8800FF' },
    { ch:'G', hi:'#FFF8DC', mid:'#FFB800', lo:'#7A2000', glow:'#FFB800' },
    { ch:'O', hi:'#EED5FF', mid:'#8800FF', lo:'#280060', glow:'#8800FF' },
  ];

  const padX = cs * 0.04;
  const maxW = cs - padX * 2;

  /* 이진탐색 – 폰트 크기 */
  let lo2 = 1, hi2 = cs, fs = hi2/2;
  for(let n=0; n<30; n++){
    ctx.font = `900 ${fs}px Cinzel, serif`;
    const tw = letters.reduce((a,l)=>a+ctx.measureText(l.ch).width, 0);
    if(tw > maxW) hi2 = fs; else lo2 = fs;
    fs = (lo2+hi2)/2;
  }
  ctx.font = `900 ${fs}px Cinzel, serif`;
  ctx.textBaseline = 'middle';

  const totalW = letters.reduce((a,l)=>a+ctx.measureText(l.ch).width,0);
  let curX = (cs - totalW)/2;
  const textY = cs * 0.50;

  letters.forEach(({ch, hi, mid, lo, glow})=>{
    const w  = ctx.measureText(ch).width;

    /* 1) 드롭 섀도 */
    ctx.shadowColor    = 'rgba(0,0,0,1)';
    ctx.shadowBlur     = cs * 0.03;
    ctx.shadowOffsetX  = cs * 0.022;
    ctx.shadowOffsetY  = cs * 0.028;
    ctx.fillStyle      = 'rgba(0,0,0,0.85)';
    ctx.fillText(ch, curX, textY);

    /* 2) 메인 글자 – 상하 입체 그라디언트 */
    ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    ctx.shadowColor   = glow;
    ctx.shadowBlur    = cs * 0.22;

    const tG = ctx.createLinearGradient(curX, textY-fs*0.54, curX, textY+fs*0.54);
    tG.addColorStop(0,    hi);
    tG.addColorStop(0.18, mid);
    tG.addColorStop(0.52, mid);
    tG.addColorStop(0.78, lo);
    tG.addColorStop(1,    '#050000');
    ctx.fillStyle = tG;
    ctx.fillText(ch, curX, textY);

    /* 3) 상단 하이라이트 */
    ctx.shadowBlur = 0;
    const hlG = ctx.createLinearGradient(curX, textY-fs*0.54, curX, textY-fs*0.05);
    hlG.addColorStop(0,   'rgba(255,255,255,0.65)');
    hlG.addColorStop(0.4, 'rgba(255,255,255,0.20)');
    hlG.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = hlG;
    ctx.fillText(ch, curX, textY);

    curX += w;
  });

  /* 다운샘플 → 실제 size 캔버스 */
  const out = document.createElement('canvas');
  out.width = size; out.height = size;
  const octx = out.getContext('2d');
  octx.imageSmoothingEnabled = true;
  octx.imageSmoothingQuality = 'high';
  octx.drawImage(c, 0, 0, size, size);
  return out;
}

window.addEventListener('DOMContentLoaded', ()=>{
  document.fonts.ready.then(()=>{
    [16,32,48,64,128].forEach(sz=>{
      const canvas = buildFavicon(sz);
      const link   = document.createElement('link');
      link.rel     = 'icon';
      link.type    = 'image/png';
      link.sizes   = `${sz}x${sz}`;
      link.href    = canvas.toDataURL('image/png');
      document.head.appendChild(link);
    });
    renderPreviews();
  });
});

function renderPreviews(){
  const sizes        = [16,32,64,128];
  const displaySizes = [88,120,152,184];
  const container    = document.getElementById('faviconSizes');
  if(!container) return;
  container.innerHTML = '';
  sizes.forEach((sz,i)=>{
    const canvas = buildFavicon(sz);
    const wrap   = document.createElement('div');
    wrap.className='fav-item';

    const cw = document.createElement('div');
    cw.className='fav-canvas-wrap';
    cw.style.cssText=`width:${displaySizes[i]}px;height:${displaySizes[i]}px;border-radius:${6+i*3}px;`;

    canvas.style.cssText=`width:${displaySizes[i]}px;height:${displaySizes[i]}px;display:block;image-rendering:auto;`;
    cw.appendChild(canvas);

    const lbl=document.createElement('div');
    lbl.className='fav-size-label';
    lbl.textContent=`${sz}×${sz}`;

    wrap.appendChild(cw);
    wrap.appendChild(lbl);
    container.appendChild(wrap);
  });
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:'Cinzel',serif;
  gap:60px;
}

/* ── 별 배경 ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate var(--delay,0s);
}
@keyframes twinkle{
  from{opacity:.08;transform:scale(1);}
  to{opacity:1;transform:scale(1.7);}
}

/* ══ 메인 로고 ══ */
.logo-wrap{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
}

.algo-text{
  display:flex;align-items:center;justify-content:center;gap:0;
  filter:
    drop-shadow(0 8px 24px rgba(0,0,0,1))
    drop-shadow(0 0 50px rgba(255,184,0,0.45))
    drop-shadow(0 0 90px rgba(136,0,255,0.30));
}

.algo-text span{
  display:inline-block;
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:152px;
  line-height:1;
  letter-spacing:-4px;
  position:relative;
  animation:letterFloat var(--lf,6s) ease-in-out infinite alternate var(--ld,0s);
  /* 다층 text-shadow로 두께감·입체감 */
  text-shadow:
    1px 2px 0 rgba(0,0,0,1),
    2px 4px 0 rgba(0,0,0,1),
    3px 6px 0 rgba(0,0,0,0.95),
    4px 8px 0 rgba(0,0,0,0.85),
    5px 10px 0 rgba(0,0,0,0.65),
    6px 12px 0 rgba(0,0,0,0.40),
    0 0 20px rgba(255,255,255,0.05);
}

/* A – 진한 골드 */
.l-a{
  background:linear-gradient(175deg,
    #FFFFFF 0%,
    #FFE566 8%,
    #FFB800 22%,
    #FF8800 45%,
    #AA3300 68%,
    #5A1200 85%,
    #0D0200 100%
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  --lf:5.8s;--ld:0s;
}

/* L – 진한 퍼플 */
.l-l{
  background:linear-gradient(175deg,
    #FFFFFF 0%,
    #DDA0FF 8%,
    #AA00FF 22%,
    #7700DD 45%,
    #440099 68%,
    #1A0044 85%,
    #030008 100%
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  --lf:6.2s;--ld:.4s;
}

/* G – 진한 골드 */
.l-g{
  background:linear-gradient(175deg,
    #FFFFFF 0%,
    #FFE566 8%,
    #FFB800 22%,
    #FF8800 45%,
    #AA3300 68%,
    #5A1200 85%,
    #0D0200 100%
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  --lf:5.5s;--ld:.8s;
}

/* O – 진한 퍼플 */
.l-o{
  background:linear-gradient(175deg,
    #FFFFFF 0%,
    #DDA0FF 8%,
    #AA00FF 22%,
    #7700DD 45%,
    #440099 68%,
    #1A0044 85%,
    #030008 100%
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  --lf:6.5s;--ld:1.2s;
}

@keyframes letterFloat{
  0%{transform:translateY(0) scale(1);}
  100%{transform:translateY(-8px) scale(1.03);}
}

/* ── 데코 라인 ── */
.deco-line{
  position:relative;
  width:560px;height:2px;
  margin-top:12px;
  background:linear-gradient(90deg,
    transparent 0%,
    #440099 10%,
    #FFB800 28%,
    #FF8800 50%,
    #FFB800 72%,
    #AA00FF 90%,
    transparent 100%
  );
  box-shadow:
    0 0 10px #FFB80088,
    0 0 22px #AA00FF55,
    0 2px 8px rgba(0,0,0,0.8);
  animation:linePulse 4s ease-in-out infinite alternate;
}
.deco-line::before,.deco-line::after{
  content:'';position:absolute;top:50%;transform:translateY(-50%);
  width:7px;height:7px;border-radius:50%;
  background:#FFB800;
  box-shadow:0 0 10px 4px #FFB800,0 0 22px #FF8800;
}
.deco-line::before{left:0;}
.deco-line::after{right:0;}

.deco-diamond{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  width:10px;height:10px;
  background:linear-gradient(135deg,#FFE566,#FF8800,#AA00FF);
  box-shadow:0 0 16px 6px #FFB80099,0 0 32px #AA00FF77;
  animation:diamondPulse 3s ease-in-out infinite alternate;
}

@keyframes linePulse{
  0%{opacity:.5;filter:brightness(.75);}
  100%{opacity:1;filter:brightness(1.5);}
}
@keyframes diamondPulse{
  0%{transform:translate(-50%,-50%) rotate(45deg) scale(1);}
  100%{transform:translate(-50%,-50%) rotate(45deg) scale(1.8);}
}

/* 배경 글로우 */
.bg-glow{
  position:absolute;width:800px;height:340px;border-radius:50%;
  background:radial-gradient(ellipse,
    rgba(136,0,255,0.10) 0%,
    rgba(255,184,0,0.07) 40%,
    transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  animation:bgGlow 6s ease-in-out infinite alternate;
  pointer-events:none;z-index:-1;
}
@keyframes bgGlow{
  0%{opacity:.4;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}
}

/* 파티클 */
.particles{
  position:absolute;width:700px;height:340px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:-1;
}
.pt{
  position:absolute;border-radius:50%;
  animation:ptFloat var(--pd,8s) ease-in-out infinite alternate var(--pdd,0s);
}
@keyframes ptFloat{
  0%{transform:translateY(0) translateX(0);opacity:.25;}
  50%{opacity:1;}
  100%{transform:translateY(var(--py)) translateX(var(--px));opacity:.2;}
}

/* ══ 파비콘 미리보기 ══ */
.favicon-preview{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
.favicon-label{
  font-family:'Cinzel',serif;font-size:11px;font-weight:600;
  letter-spacing:5px;text-transform:uppercase;
  color:#FFB800;opacity:.8;
}
.favicon-sizes{
  display:flex;align-items:flex-end;gap:28px;flex-wrap:wrap;justify-content:center;
}
.fav-item{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.fav-canvas-wrap{
  overflow:hidden;
  animation:favGlow 3s ease-in-out infinite alternate;
}
@keyframes favGlow{
  0%{box-shadow:0 0 0 1px #FFB80044,0 0 14px #8800FF33;}
  100%{box-shadow:0 0 0 1px #FFB800CC,0 0 30px #AA00FF88;}
}
.fav-size-label{
  font-family:'Cinzel',serif;font-size:10px;
  color:#AA00FF;letter-spacing:2px;opacity:.9;
}

/* 구분선 */
.divider{
  width:460px;height:1px;
  background:linear-gradient(90deg,
    transparent,#44009966,#FFB80066,#FF880066,#AA00FF66,transparent);
  position:relative;z-index:10;
}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<!-- 메인 로고 -->
<div class="logo-wrap">
  <div class="bg-glow"></div>
  <div class="particles" id="particles"></div>

  <div class="algo-text">
    <span class="l-a">A</span>
    <span class="l-l">L</span>
    <span class="l-g">G</span>
    <span class="l-o">O</span>
  </div>

  <div class="deco-line">
    <div class="deco-diamond"></div>
  </div>
</div>

<div class="divider"></div>

<!-- 파비콘 미리보기 -->
<div class="favicon-preview">
  <div class="favicon-label">Favicon Preview</div>
  <div class="favicon-sizes" id="faviconSizes"></div>
</div>

<script>
/* 별 배경 */
const bg = document.getElementById('bg');
const sc = ['#FFB800','#AA00FF','#FF8800','#CC66FF','#FFE566','#7700DD','#ffffff','#FF6600'];
for(let i=0;i<100;i++){
  const s  = document.createElement('div');
  s.className='star';
  const sz=(Math.random()*2.2+0.3).toFixed(2);
  const c1=sc[Math.floor(Math.random()*sc.length)];
  const c2=sc[Math.floor(Math.random()*sc.length)];
  s.style.cssText=`
    width:${sz}px;height:${sz}px;
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    background:${c1};
    box-shadow:0 0 ${sz*3}px ${sz}px ${c2};
    --d:${(Math.random()*4+1.5).toFixed(2)}s;
    --delay:-${(Math.random()*6).toFixed(2)}s;
  `;
  bg.appendChild(s);
}

/* 파티클 */
const pc       = document.getElementById('particles');
const pcColors = ['#FFB800','#AA00FF','#FF8800','#CC66FF','#FFE566'];
for(let i=0;i<24;i++){
  const p  = document.createElement('div');
  p.className='pt';
  const sz=(Math.random()*4+1).toFixed(2);
  const c1=pcColors[Math.floor(Math.random()*pcColors.length)];
  const c2=pcColors[Math.floor(Math.random()*pcColors.length)];
  p.style.cssText=`
    width:${sz}px;height:${sz}px;
    left:${Math.random()*700}px;top:${Math.random()*340}px;
    background:${c1};
    box-shadow:0 0 ${sz*4}px ${sz}px ${c2};
    --pd:${(Math.random()*7+5).toFixed(2)}s;
    --pdd:-${(Math.random()*5).toFixed(2)}s;
    --py:${(-(Math.random()*55+10)).toFixed(0)}px;
    --px:${((Math.random()*50-25)).toFixed(0)}px;
  `;
  pc.appendChild(p);
}
</script>
</body>
</html>
