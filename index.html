<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO · 알고리빙1004</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --void:      #03020a;
  --deep:      #0a0518;
  --purple-dk: #1a0535;
  --purple-md: #2d0d5c;
  --purple-vt: #6b21a8;
  --purple-lt: #a855f7;
  --gold-dk:   #8a6520;
  --gold-md:   #d4a942;
  --gold-lt:   #f0c96a;
  --gold-wh:   #fff8e7;
  --white:     #f5f0ec;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  background: var(--void);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 90px;
  padding: 80px 24px;
  overflow-x: hidden;
}

/* ── 배경 ── */
.bg-void{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 55% 45% at 50% 42%,
      rgba(45,13,92,.5) 0%, rgba(26,5,53,.32) 35%, transparent 75%),
    radial-gradient(ellipse 100% 80% at 50% 50%,
      var(--deep) 0%, var(--void) 70%);
}
.bh-core{
  position:fixed; width:300px; height:150px;
  top:38%; left:50%; transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(ellipse at center,
    rgba(107,33,168,.2) 0%, rgba(107,33,168,.06) 45%, transparent 72%);
  filter:blur(20px);
  pointer-events:none; z-index:0;
  animation:corePulse 5s ease-in-out infinite;
}
@keyframes corePulse{
  0%,100%{ opacity:.65; transform:translate(-50%,-50%) scale(1); }
  50%    { opacity:1;   transform:translate(-50%,-50%) scale(1.2); }
}
.bh-ring{
  position:fixed; border-radius:50%;
  top:38%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none; z-index:0; opacity:0;
  animation:ringEx linear infinite;
}
.bh-ring:nth-child(1){ border:1px solid rgba(168,85,247,.16);  animation-duration:9s; animation-delay:0s;    }
.bh-ring:nth-child(2){ border:1px solid rgba(212,169,66,.09);  animation-duration:9s; animation-delay:2.25s; }
.bh-ring:nth-child(3){ border:1px solid rgba(107,33,168,.13);  animation-duration:9s; animation-delay:4.5s;  }
.bh-ring:nth-child(4){ border:1px solid rgba(240,201,106,.06); animation-duration:9s; animation-delay:6.75s; }
@keyframes ringEx{
  0%  { width:60px;   height:30px;  opacity:0; }
  6%  { opacity:.85; }
  100%{ width:1100px; height:550px; opacity:0; }
}
.star{
  position:fixed; border-radius:50%; pointer-events:none; z-index:0;
  animation:twinkle ease-in-out infinite;
}
@keyframes twinkle{
  0%,100%{ opacity:.05; transform:scale(1); }
  50%    { opacity:.5;  transform:scale(1.5); }
}

/* ── 섹션 레이블 ── */
.sec-label{
  position:relative; z-index:10;
  font-family:'Noto Sans KR',sans-serif;
  font-size:9px; font-weight:300;
  letter-spacing:6px; text-transform:uppercase;
  color:rgba(168,85,247,.38); text-align:center;
  margin-bottom:28px;
}

/* ══════════════════════════════════════
   대형 로고
══════════════════════════════════════ */
.logo-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}
.logo-wrap{
  position:relative;
  display:flex; flex-direction:column; align-items:center;
  padding:48px 60px 44px;
  animation:breathe 7s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-10px); }
}

/* 후광 */
.logo-halo-p{
  position:absolute;
  width:520px; height:260px;
  top:50%; left:50%; transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at 50% 45%,
    rgba(107,33,168,.25) 0%, rgba(107,33,168,.08) 45%, transparent 70%);
  filter:blur(30px); pointer-events:none; z-index:0;
  animation:haloP 5s ease-in-out infinite;
}
@keyframes haloP{
  0%,100%{ opacity:.6;  transform:translate(-50%,-50%) scale(1); }
  50%    { opacity:1;   transform:translate(-50%,-50%) scale(1.1); }
}
.logo-halo-g{
  position:absolute;
  width:360px; height:130px;
  top:56%; left:50%; transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at 50% 50%,
    rgba(212,169,66,.16) 0%, rgba(212,169,66,.04) 55%, transparent 75%);
  filter:blur(18px); pointer-events:none; z-index:0;
  animation:haloG 4s ease-in-out infinite;
}
@keyframes haloG{
  0%,100%{ opacity:.45; }
  50%    { opacity:.85; }
}

/* ── 로고 컨텐츠 ── */
.logo-inner{
  position:relative;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  z-index:2;
}

/* 상단 장식 */
.logo-deco-top{
  display:flex; align-items:center; gap:14px;
}
.deco-line{
  height:1px; width:60px;
  background:linear-gradient(90deg, transparent, rgba(212,169,66,.5));
}
.deco-line.r{
  background:linear-gradient(90deg, rgba(212,169,66,.5), transparent);
}
.deco-emblem{
  position:relative;
  width:28px; height:28px;
  display:flex; align-items:center; justify-content:center;
}
.deco-emblem svg{ overflow:visible; }

/* ALGO 텍스트 */
.logo-algo{
  font-family:'Cinzel',serif;
  font-size:72px; font-weight:900;
  letter-spacing:24px; padding-right:24px;
  background:linear-gradient(175deg,
    var(--gold-wh)   0%,
    var(--gold-lt)   25%,
    var(--gold-md)   52%,
    var(--purple-lt) 76%,
    var(--gold-lt)   100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  background-size:200% 200%;
  filter:drop-shadow(0 0 26px rgba(168,85,247,.48));
  animation:algoShimmer 6s ease-in-out infinite;
  position:relative; z-index:5;
}
@keyframes algoShimmer{
  0%,100%{ background-position:0% 50%;   filter:drop-shadow(0 0 20px rgba(168,85,247,.42)); }
  50%    { background-position:100% 50%; filter:drop-shadow(0 0 40px rgba(168,85,247,.72)) drop-shadow(0 0 58px rgba(212,169,66,.28)); }
}

/* 구분선 */
.logo-rule{
  width:100%; height:1px; position:relative;
  background:linear-gradient(90deg,
    transparent 0%, rgba(168,85,247,.2) 15%,
    rgba(212,169,66,.58) 45%, rgba(168,85,247,.48) 55%,
    rgba(212,169,66,.18) 85%, transparent 100%);
}
.logo-rule::before,.logo-rule::after{
  content:''; position:absolute; top:50%; transform:translateY(-50%);
  width:3.5px; height:3.5px; border-radius:50%;
}
.logo-rule::before{ left:16%;  background:var(--gold-md); box-shadow:0 0 5px var(--gold-md); }
.logo-rule::after { right:16%; background:var(--purple-lt); box-shadow:0 0 5px var(--purple-lt); }

.logo-sub{
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-weight:300;
  font-size:14px; letter-spacing:8px; padding-right:8px;
  color:rgba(212,169,66,.52);
  animation:subFade 5s ease-in-out infinite;
}
@keyframes subFade{ 0%,100%{ opacity:.52; } 50%{ opacity:.82; } }

/* 하단 장식 */
.logo-deco-bot{
  display:flex; align-items:center; gap:10px; opacity:.45;
  margin-top:2px;
}
.deco-dot-sm{
  width:3px; height:3px; border-radius:50%;
  background:var(--gold-md);
  box-shadow:0 0 4px var(--gold-md);
}
.deco-line-sm{
  height:1px; width:36px;
  background:linear-gradient(90deg, transparent, rgba(212,169,66,.4));
}
.deco-line-sm.r{
  background:linear-gradient(90deg, rgba(212,169,66,.4), transparent);
}

/* ══════════════════════════════════════
   소형 배지
══════════════════════════════════════ */
.badge-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}
.badge-wrap{
  position:relative;
  display:inline-flex; align-items:center; gap:10px;
  padding:10px 22px;
  border-radius:40px;
  animation:badgeFloat 5.5s ease-in-out infinite;
  cursor:pointer;
  transition:transform .2s ease;
}
.badge-wrap:hover{ transform:scale(1.05) !important; }
@keyframes badgeFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
.badge-glass{
  position:absolute; inset:0; border-radius:40px; z-index:0;
  background:linear-gradient(135deg,
    rgba(45,13,92,.52) 0%, rgba(10,5,24,.68) 50%, rgba(26,5,53,.48) 100%);
  backdrop-filter:blur(8px);
}
.badge-border{
  position:absolute; inset:0; border-radius:40px; z-index:1; pointer-events:none;
  border:1px solid transparent;
  background:
    linear-gradient(var(--void),var(--void)) padding-box,
    linear-gradient(135deg,
      rgba(168,85,247,.65) 0%, rgba(212,169,66,.48) 35%,
      rgba(168,85,247,.38) 65%, rgba(240,201,106,.55) 100%) border-box;
}
.badge-glow{
  position:absolute; inset:0; border-radius:40px; z-index:0; pointer-events:none;
  background:radial-gradient(ellipse at center, rgba(107,33,168,.18) 0%, transparent 70%);
  animation:bGlow 4s ease-in-out infinite;
}
@keyframes bGlow{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }
.badge-shine{
  position:absolute; inset:0; border-radius:40px; z-index:2; overflow:hidden; pointer-events:none;
}
.badge-shine::after{
  content:''; position:absolute; top:0; left:-130%; width:75%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.11), transparent);
  transform:skewX(-18deg);
  animation:shineSlide 5s ease-in-out infinite;
}
@keyframes shineSlide{ 0%,58%,100%{ left:-130%; } 82%{ left:150%; } }

.badge-algo-text{
  font-family:'Cinzel',serif;
  font-size:13px; font-weight:700;
  letter-spacing:5px; padding-right:5px;
  background:linear-gradient(90deg,
    var(--gold-lt) 0%, var(--gold-wh) 40%,
    var(--purple-lt) 70%, var(--gold-lt) 100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  background-size:200% 100%;
  position:relative; z-index:3;
  animation:badgeTA 5s ease-in-out infinite;
}
@keyframes badgeTA{ 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }
</style>
</head>
<body>

<div class="bg-void"></div>
<div class="bh-core"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>

<script>
(function(){
  const cs=['rgba(255,248,231,.85)','rgba(168,85,247,.75)','rgba(212,169,66,.75)','rgba(245,240,236,.65)'];
  for(let i=0;i<65;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*1.5+.3, c=cs[Math.floor(Math.random()*cs.length)];
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${c};box-shadow:0 0 ${sz*2}px ${c};animation-duration:${Math.random()*5+3}s;animation-delay:${Math.random()*7}s;`;
    document.body.appendChild(s);
  }
})();
</script>

<!-- ══ 대형 로고 ══ -->
<div class="logo-section">
  <div class="sec-label">◈ &nbsp; Page Title Logo &nbsp; ◈</div>
  <div class="logo-wrap">
    <div class="logo-halo-p"></div>
    <div class="logo-halo-g"></div>

    <div class="logo-inner">

      <!-- 상단 엠블렘 장식 -->
      <div class="logo-deco-top">
        <div class="deco-line"></div>
        <div class="deco-emblem">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="embG" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"   stop-color="#f0c96a"/>
                <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#a855f7"/>
              </linearGradient>
              <filter id="embF">
                <feGaussianBlur stdDeviation="1.2" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <!-- 바깥 팔각별 -->
            <path d="M14,1 L15.8,10.2 L24,8 L17.8,14 L24,20 L15.8,17.8 L14,27 L12.2,17.8 L4,20 L10.2,14 L4,8 L12.2,10.2 Z"
              fill="none" stroke="url(#embG)" stroke-width="0.7" opacity="0.7" filter="url(#embF)"/>
            <!-- 안쪽 사각 다이아몬드 -->
            <path d="M14,6 L19,14 L14,22 L9,14 Z"
              fill="none" stroke="url(#embG)" stroke-width="0.6" opacity="0.55"/>
            <!-- 중심점 -->
            <circle cx="14" cy="14" r="1.8" fill="url(#embG)" opacity="0.9">
              <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
              <animate attributeName="r" values="1.8;2.4;1.8" dur="3s" repeatCount="indefinite"/>
            </circle>
            <!-- 중심 확산링 -->
            <circle cx="14" cy="14" r="5" fill="none" stroke="rgba(212,169,66,0.3)" stroke-width="0.6">
              <animate attributeName="r" values="5;11;5" dur="3s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
            </circle>
            <!-- 십자 광선 -->
            <line x1="14" y1="3"  x2="14" y2="6"  stroke="#f0c96a" stroke-width="0.6" opacity="0.55" stroke-linecap="round"/>
            <line x1="14" y1="22" x2="14" y2="25" stroke="#f0c96a" stroke-width="0.6" opacity="0.55" stroke-linecap="round"/>
            <line x1="3"  y1="14" x2="6"  y2="14" stroke="#a855f7" stroke-width="0.6" opacity="0.55" stroke-linecap="round"/>
            <line x1="22" y1="14" x2="25" y2="14" stroke="#a855f7" stroke-width="0.6" opacity="0.55" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="deco-line r"></div>
      </div>

      <!-- ALGO -->
      <div class="logo-algo">ALGO</div>
      <div class="logo-rule"></div>
      <div class="logo-sub">알고리빙1004</div>

      <!-- 하단 장식 -->
      <div class="logo-deco-bot">
        <div class="deco-line-sm"></div>
        <div class="deco-dot-sm"></div>
        <div class="deco-line-sm r"></div>
      </div>

    </div>
  </div>
</div>

<!-- ══ 소형 배지 ══ -->
<div class="badge-section">
  <div class="sec-label">◈ &nbsp; Card Header Badge &nbsp; ◈</div>
  <div class="badge-wrap">
    <div class="badge-glass"></div>
    <div class="badge-border"></div>
    <div class="badge-glow"></div>
    <div class="badge-shine"></div>

    <!-- 배지 좌측 미니 엠블렘 -->
    <svg width="14" height="14" viewBox="0 0 28 28" fill="none"
      style="position:relative;z-index:3;flex-shrink:0;">
      <defs>
        <linearGradient id="bEmbG" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#f0c96a"/>
          <stop offset="100%" stop-color="#a855f7"/>
        </linearGradient>
      </defs>
      <path d="M14,1 L15.8,10.2 L24,8 L17.8,14 L24,20 L15.8,17.8 L14,27 L12.2,17.8 L4,20 L10.2,14 L4,8 L12.2,10.2 Z"
        fill="none" stroke="url(#bEmbG)" stroke-width="1" opacity="0.75"/>
      <circle cx="14" cy="14" r="2.2" fill="url(#bEmbG)" opacity="0.9">
        <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
      </circle>
      <line x1="14" y1="2"  x2="14" y2="5"  stroke="#f0c96a" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
      <line x1="14" y1="23" x2="14" y2="26" stroke="#f0c96a" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
      <line x1="2"  y1="14" x2="5"  y2="14" stroke="#a855f7" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
      <line x1="23" y1="14" x2="26" y2="14" stroke="#a855f7" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
    </svg>

    <span class="badge-algo-text">ALGO</span>

    <!-- 배지 우측 미니 엠블렘 -->
    <svg width="14" height="14" viewBox="0 0 28 28" fill="none"
      style="position:relative;z-index:3;flex-shrink:0;">
      <defs>
        <linearGradient id="bEmbG2" x1="1" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#f0c96a"/>
        </linearGradient>
      </defs>
      <path d="M14,1 L15.8,10.2 L24,8 L17.8,14 L24,20 L15.8,17.8 L14,27 L12.2,17.8 L4,20 L10.2,14 L4,8 L12.2,10.2 Z"
        fill="none" stroke="url(#bEmbG2)" stroke-width="1" opacity="0.75"/>
      <circle cx="14" cy="14" r="2.2" fill="url(#bEmbG2)" opacity="0.9">
        <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite" begin="1.5s"/>
      </circle>
      <line x1="14" y1="2"  x2="14" y2="5"  stroke="#a855f7" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
      <line x1="14" y1="23" x2="14" y2="26" stroke="#a855f7" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
      <line x1="2"  y1="14" x2="5"  y2="14" stroke="#f0c96a" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
      <line x1="23" y1="14" x2="26" y2="14" stroke="#f0c96a" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
    </svg>

  </div>
</div>

</body>
</html>
