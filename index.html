    function formatNumber(num) {
        num = parseInt(num) || 0;
        if (num >= 100000000) return (num / 100000000).toFixed(1) + '억';
        if (num >= 10000) return (num / 10000).toFixed(1) + '만';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toLocaleString();
    }

    // =============================
    // 날짜 포맷 함수
    // =============================
    function timeAgo(dateStr) {
        const diff = (Date.now() - new Date(dateStr)) / 1000;
        if (diff < 3600) return Math.floor(diff / 60) + '분 전';
        if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
        if (diff < 604800) return Math.floor(diff / 86400) + '일 전';
        return Math.floor(diff / 604800) + '주 전';
    }

    // =============================
    // 급상승 점수 계산 (조회수 / 업로드 경과시간)
    // =============================
    function calcVelocity(video) {
        const views = parseInt(video.statistics?.viewCount) || 0;
        const hours = Math.max(1, (Date.now() - new Date(video.snippet.publishedAt)) / 3600000);
        return Math.round(views / hours);
    }

        const colors = {

            '23': '#ffd700', '24': '#ff8c00', '25': '#ff4757',
            '17': '#2ed573', '28': '#5352ed', '26': '#ff6348',
        };
        return colors[id] || '#ff0000';
    }

    // =============================

    async function fetchTrendingVideos(categoryId = '0') {
        const params = new URLSearchParams({
            part: 'snippet,statistics',
            chart: 'mostPopular',
            regionCode: REGION_CODE,
            maxResults: MAX_RESULTS,
            key: API_KEY,
            hl: 'ko'
        });
        if (categoryId !== '0') params.append('videoCategoryId', categoryId);

        const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?${params}`);
        if (!res.ok) throw new Error(`API 오류: ${res.status}`);
        const data = await res.json();
        return data.items || [];
    }

        const videoUrl = `https://www.youtube.com/watch?v=${video.id}`;

        return `
        <a class="video-card" href="${videoUrl}" target="_blank" rel="noopener">
            <div class="thumbnail-wrap">
                <img src="${thumb}" alt="${video.snippet.title}" loading="lazy">
                <span class="rank-badge ${isHot ? 'top3' : ''}">#${rank}</span>
                ${isHot ? '<span class="hot-badge">🔥 HOT</span>' : ''}
            </div>
            <div class="video-info">
                <div>
                    <div class="video-title">${video.snippet.title}</div>
                    <div class="channel-name">📺 ${video.snippet.channelTitle}</div>
                    <div class="video-stats">
                        <span class="stat-item views">👁️ ${formatNumber(views)}</span>
                        <span class="stat-item likes">❤️ ${formatNumber(likes)}</span>
                        <span class="stat-item comments">💬 ${formatNumber(comments)}</span>
                        <span class="stat-item published">🕐 ${timeAgo(video.snippet.publishedAt)}</span>
                    </div>
                </div>
                <div class="velocity-bar-wrap">
                    <div class="velocity-label">
                        <span>⚡ 급상승 속도</span>
                        <span style="color:${color}">${formatNumber(velocity)}/h</span>
                    </div>
                    <div class="velocity-bar">
                        <div class="velocity-fill" style="width:${velocityPct}%; background:${color};"></div>
                    </div>
                </div>
            </div>
        </a>`;
    }

    // =============================
    // 광고 인라인 렌더링
    // =============================
    function renderInlineAd() {
        return `
        <div class="ad-inline">
            <div class="ad-label">광고</div>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-4409875039737384"
                 data-ad-slot="auto"
                 data-ad-format="fluid"
                 data-ad-layout="in-article"></ins>
        </div>`;
    }

    // =============================
    // 트렌드 키워드 추출
    // =============================
    function extractKeywords(videos) {
        const stopWords = new Set(['이', '그', '저', '것', '수', '를', '은', '는', '이', '가', '와', '과', '에', '의', '로', '으로', '에서', '부터', '까지', 'the', 'a', 'an', 'of', 'in', 'to', 'for', 'feat']);
        const wordCount = {};

        videos.forEach(v => {
            const words = (v.snippet.title + ' ' + v.snippet.channelTitle)
                .replace(/[^\w가-힣\s]/g, ' ')
                .split(/\s+/)
                .filter(w => w.length >= 2 && !stopWords.has(w.toLowerCase()));
            words.forEach(w => { wordCount[w] = (wordCount[w] || 0) + 1; });
        });

        return Object.entries(wordCount)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 10);
    }

    // =============================
    // 키워드 렌더링
    // =============================
    function renderKeywords(videos) {
        const keywords = extractKeywords(videos);
        const html = keywords.map(([word, count], i) => `
            <div class="keyword-item">
                <span class="keyword-rank">${i + 1}</span>
                <span class="keyword-text">${word}</span>
                <span class="keyword-count">${count}건</span>
            </div>
        `).join('');
        document.getElementById('keywordList').innerHTML = html;
    }

    // =============================
    // 카테고리 통계 렌더링
    // =============================
    function renderCategoryStats(videos) {
        const stats = {};
        videos.forEach(v => {
            const cat = v.snippet.categoryId;
            stats[cat] = (stats[cat] || 0) + 1;
        });

        const sorted = Object.entries(stats).sort((a, b) => b[1] - a[1]).slice(0, 6);
        const max = sorted[0]?.[1] || 1;

        const html = sorted.map(([id, count]) => `
            <div class="category-stat-item">
                <div class="category-stat-header">
                    <span style="font-size:12px;">${getCategoryName(id)}</span>
                    <span style="font-size:12px; color:#aaa;">${count}개</span>
                </div>
                <div class="category-stat-bar">
                    <div class="category-stat-fill" style="width:${(count/max*100).toFixed(0)}%; background:${getCategoryColor(id)};"></div>
                </div>
            </div>
        `).join('');
        document.getElementById('categoryStats').innerHTML = html;
    }

    // =============================
    // 정렬 함수
    // =============================
    function getSortedVideos(videos, sortType) {
        return [...videos].sort((a, b) => {
            if (sortType === 'viewCount') return (parseInt(b.statistics?.viewCount) || 0) - (parseInt(a.statistics?.viewCount) || 0);
            if (sortType === 'date') return new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt);
            if (sortType === 'rating') return (parseInt(b.statistics?.likeCount) || 0) - (parseInt(a.statistics?.likeCount) || 0);
            return 0;
        });
    }

    // =============================
    // 메인 렌더링
    // =============================
    function renderVideos() {
        const sorted = getSortedVideos(allVideos, currentSort);
        let html = '';
        sorted.forEach((video, i) => {
            html += renderVideoCard(video, i + 1);
            if ((i + 1) % 5 === 0 && i < sorted.length - 1) {
                html += renderInlineAd();
            }
        });

        document.getElementById('videoGrid').innerHTML = html;
        document.getElementById('resultCount').textContent = `총 ${sorted.length}개 영상 분석됨`;

        // 인라인 광고 초기화
        document.querySelectorAll('.ad-inline ins').forEach(el => {
            try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
        });
    }

    // =============================
    // 카테고리 필터
    // =============================
    async function filterCategory(btn, categoryId) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = categoryId;
        await loadData();
    }

    // =============================
    // 정렬 변경
    // =============================
    function sortVideos(btn, sortType) {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = sortType;
        renderVideos();
    }

    // =============================
    // 데이터 로드
    // =============================
    async function loadData() {
        document.getElementById('videoGrid').innerHTML = `
            <div class="loading">
                <div class="spinner"></div>
                <p>🔍 급상승 영상 분석 중...</p>
            </div>`;
        document.getElementById('resultCount').textContent = '분석 중...';

        try {
            allVideos = await fetchTrendingVideos(currentCategory);
            renderVideos();
            renderKeywords(allVideos);
            renderCategoryStats(allVideos);

            const now = new Date();
            document.getElementById('updateTime').textContent =
                `마지막 업데이트: ${now.toLocaleString('ko-KR')}`;
        } catch (err) {
            console.error(err);
            document.getElementById('videoGrid').innerHTML = `
                <div class="error-box">
                    <p>⚠️ 데이터를 불러오는 중 오류가 발생했습니다.</p>
                    <p style="font-size:12px; margin-top:8px; color:#aaa;">${err.message}</p>
                    <button onclick="loadData()" style="margin-top:16px; background:#ff0000; color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer;">다시 시도</button>
                </div>`;
        }
    }

    // =============================
    // 새로고침
    // =============================
    async function refreshData() {
        const btn = document.getElementById('refreshBtn');
        btn.disabled = true;
        btn.textContent = '⏳ 로딩 중...';
        await loadData();
        btn.disabled = false;
        btn.innerHTML = '🔄 새로고침';
    }

    // =============================
    // 초기 실행
    // =============================
    loadData();
</script>

</body>
</html>
