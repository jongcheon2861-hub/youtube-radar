<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO · 알고리빙1004</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   ROOT
═══════════════════════════════ */
:root{
  --void:      #03020a;
  --deep:      #0a0518;
  --purple-dk: #1a0535;
  --purple-md: #2d0d5c;
  --purple-vt: #6b21a8;
  --purple-lt: #a855f7;
  --gold-dk:   #8a6520;
  --gold-md:   #d4a942;
  --gold-lt:   #f0c96a;
  --gold-wh:   #fff8e7;
  --white:     #f5f0ec;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  background: var(--void);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 90px;
  padding: 80px 24px;
  overflow-x: hidden;
  position: relative;
}

/* ═══════════════════════════════
   배경 — 블랙홀 코어
═══════════════════════════════ */
.bg-layer{
  position:fixed; inset:0; z-index:0; pointer-events:none;
}
/* 심연 그라디언트 */
.bg-void{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 55% 45% at 50% 42%,
      rgba(45,13,92,.55)  0%,
      rgba(26,5,53,.38)   30%,
      rgba(10,5,24,.28)   55%,
      transparent         80%),
    radial-gradient(ellipse 100% 80% at 50% 50%,
      var(--deep) 0%,
      var(--void) 70%);
}
/* 블랙홀 코어 광환 */
.bh-core{
  position:fixed;
  width: 320px; height: 160px;
  top:38%; left:50%;
  transform: translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(ellipse at center,
      rgba(107,33,168,.22) 0%,
      rgba(107,33,168,.08) 40%,
      transparent 70%);
  filter: blur(18px);
  pointer-events:none; z-index:0;
  animation: corePulse 5s ease-in-out infinite;
}
@keyframes corePulse{
  0%,100%{ opacity:.7; transform:translate(-50%,-50%) scale(1); }
  50%    { opacity:1;  transform:translate(-50%,-50%) scale(1.18); }
}

/* 팽창 링 */
.bh-ring{
  position:fixed; border-radius:50%;
  top:38%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none; z-index:0;
  opacity:0;
  animation: ringEx linear infinite;
}
.bh-ring:nth-child(1){ border:1px solid rgba(168,85,247,.18);  animation-duration:9s;  animation-delay:0s;   }
.bh-ring:nth-child(2){ border:1px solid rgba(212,169,66,.1);   animation-duration:9s;  animation-delay:2.25s; }
.bh-ring:nth-child(3){ border:1px solid rgba(107,33,168,.14);  animation-duration:9s;  animation-delay:4.5s;  }
.bh-ring:nth-child(4){ border:1px solid rgba(240,201,106,.07); animation-duration:9s;  animation-delay:6.75s; }
@keyframes ringEx{
  0%  { width:80px;  height:40px;  opacity:0; }
  6%  { opacity:.9; }
  100%{ width:1100px; height:550px; opacity:0; }
}

/* 별 */
.star{
  position:fixed; border-radius:50%;
  pointer-events:none; z-index:0;
  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle{
  0%,100%{ opacity:.06; transform:scale(1); }
  50%    { opacity:.55; transform:scale(1.5); }
}

/* 성운 먼지 */
.nebula{
  position:fixed; border-radius:50%;
  pointer-events:none; z-index:0;
  filter:blur(40px);
  animation: nebulaDrift ease-in-out infinite;
}
@keyframes nebulaDrift{
  0%,100%{ opacity:.12; transform:translate(0,0) scale(1); }
  50%    { opacity:.22; transform:translate(12px,-8px) scale(1.06); }
}

/* ═══════════════════════════════
   섹션 레이블
═══════════════════════════════ */
.sec-label{
  position:relative; z-index:10;
  font-family:'Noto Sans KR',sans-serif;
  font-size:9px; font-weight:300;
  letter-spacing:6px; text-transform:uppercase;
  color:rgba(168,85,247,.4);
  text-align:center;
  margin-bottom:24px;
}

/* ═══════════════════════════════
   대형 로고 섹션
═══════════════════════════════ */
.logo-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}

.logo-wrap{
  position:relative;
  display:flex; flex-direction:column; align-items:center;
  padding: 28px 36px 36px;
  animation: breathe 7s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{ transform:translateY(0) rotateX(0deg); }
  50%    { transform:translateY(-11px) rotateX(1.5deg); }
}

/* 로고 후광 — 보라 + 골드 이중 레이어 */
.logo-halo-purple{
  position:absolute;
  width:500px; height:240px;
  top:48%; left:50%; transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at 50% 45%,
    rgba(107,33,168,.28) 0%,
    rgba(107,33,168,.1)  40%,
    transparent 70%);
  filter:blur(28px);
  pointer-events:none; z-index:0;
  animation:haloPurple 5s ease-in-out infinite;
}
@keyframes haloPurple{
  0%,100%{ opacity:.65; transform:translate(-50%,-50%) scale(1); }
  50%    { opacity:1;   transform:translate(-50%,-50%) scale(1.12); }
}
.logo-halo-gold{
  position:absolute;
  width:340px; height:140px;
  top:52%; left:50%; transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at 50% 50%,
    rgba(212,169,66,.18) 0%,
    rgba(212,169,66,.06) 50%,
    transparent 75%);
  filter:blur(20px);
  pointer-events:none; z-index:0;
  animation:haloGold 4s ease-in-out infinite;
}
@keyframes haloGold{
  0%,100%{ opacity:.5; }
  50%    { opacity:.9; }
}

/* 날개 + 텍스트 행 */
.logo-main-row{
  display:flex; align-items:center; gap:10px;
  position:relative; z-index:2;
}

/* ── 날개 ── */
.wing-wrap{ position:relative; }
.wing-wrap.left {
  animation: wBeatL 5.5s ease-in-out infinite;
  transform-origin:100% 58%;
}
.wing-wrap.right{
  animation: wBeatR 5.5s ease-in-out infinite;
  transform-origin:0% 58%;
}
@keyframes wBeatL{
  0%,100%{
    transform:rotate(0deg) scaleX(1);
    filter:
      drop-shadow(0 0 5px rgba(168,85,247,.4))
      drop-shadow(0 0 12px rgba(212,169,66,.2));
  }
  38%{
    transform:rotate(-9deg) scaleX(1.07);
    filter:
      drop-shadow(0 0 12px rgba(168,85,247,.8))
      drop-shadow(0 0 24px rgba(240,201,106,.45))
      drop-shadow(0 0 40px rgba(107,33,168,.35));
  }
  65%{ transform:rotate(2.5deg) scaleX(.97); }
}
@keyframes wBeatR{
  0%,100%{
    transform:rotate(0deg) scaleX(1);
    filter:
      drop-shadow(0 0 5px rgba(168,85,247,.4))
      drop-shadow(0 0 12px rgba(212,169,66,.2));
  }
  38%{
    transform:rotate(9deg) scaleX(1.07);
    filter:
      drop-shadow(0 0 12px rgba(168,85,247,.8))
      drop-shadow(0 0 24px rgba(240,201,106,.45))
      drop-shadow(0 0 40px rgba(107,33,168,.35));
  }
  65%{ transform:rotate(-2.5deg) scaleX(.97); }
}

/* ── 텍스트 블록 ── */
.logo-text{
  display:flex; flex-direction:column; align-items:center; gap:9px;
  position:relative; z-index:3;
}

/* 상단 장식 라인 */
.deco-top{
  display:flex; align-items:center; gap:12px;
  opacity:.7;
}
.deco-line{
  height:1px; width:52px;
  background:linear-gradient(90deg, transparent, var(--gold-md));
}
.deco-line.r{
  background:linear-gradient(90deg, var(--gold-md), transparent);
}
.deco-rune{
  font-size:8px; color:var(--gold-md);
  letter-spacing:2px; opacity:.8;
}

/* ALGO 메인 텍스트 */
.logo-algo{
  font-family:'Cinzel',serif;
  font-size:66px; font-weight:900;
  letter-spacing:22px; padding-right:22px;
  background: linear-gradient(175deg,
    var(--gold-wh)  0%,
    var(--gold-lt)  28%,
    var(--gold-md)  55%,
    var(--purple-lt) 78%,
    var(--gold-lt)  100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  filter: drop-shadow(0 0 28px rgba(168,85,247,.5));
  animation: algoShimmer 6s ease-in-out infinite;
  background-size:200% 200%;
}
@keyframes algoShimmer{
  0%,100%{ background-position:0% 50%;   filter:drop-shadow(0 0 22px rgba(168,85,247,.45)); }
  50%    { background-position:100% 50%; filter:drop-shadow(0 0 42px rgba(168,85,247,.75)) drop-shadow(0 0 60px rgba(212,169,66,.3)); }
}

/* 구분선 */
.logo-rule{
  width:100%; height:1px; position:relative;
  background:linear-gradient(90deg,
    transparent        0%,
    rgba(168,85,247,.2) 15%,
    rgba(212,169,66,.6) 45%,
    rgba(168,85,247,.5) 55%,
    rgba(212,169,66,.2) 85%,
    transparent        100%);
}
.logo-rule::before,.logo-rule::after{
  content:''; position:absolute;
  top:50%; transform:translateY(-50%);
  width:4px; height:4px; border-radius:50%;
}
.logo-rule::before{ left:18%;  background:var(--gold-md); box-shadow:0 0 6px var(--gold-md); }
.logo-rule::after { right:18%; background:var(--purple-lt); box-shadow:0 0 6px var(--purple-lt); }

/* 서브 텍스트 */
.logo-sub{
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-weight:300;
  font-size:14px; letter-spacing:8px; padding-right:8px;
  color:rgba(212,169,66,.55);
  animation: subFade 5s ease-in-out infinite;
}
@keyframes subFade{
  0%,100%{ opacity:.55; }
  50%    { opacity:.85; }
}

/* ═══════════════════════════════
   소형 배지
═══════════════════════════════ */
.badge-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}

.badge-wrap{
  position:relative;
  display:inline-flex; align-items:center; gap:6px;
  padding:9px 18px 9px 14px;
  border-radius:40px;
  animation:badgeFloat 5.5s ease-in-out infinite;
  cursor:pointer;
}
@keyframes badgeFloat{
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-6px); }
}
.badge-wrap:hover{ transform:scale(1.04); transition:transform .2s; }

/* 배지 유리 배경 */
.badge-glass{
  position:absolute; inset:0; border-radius:40px; z-index:0;
  background:linear-gradient(135deg,
    rgba(45,13,92,.55)   0%,
    rgba(10,5,24,.7)     50%,
    rgba(26,5,53,.5)    100%);
  backdrop-filter:blur(8px);
}
/* 배지 테두리 — 보라+골드 그라디언트 */
.badge-border{
  position:absolute; inset:0; border-radius:40px; z-index:1; pointer-events:none;
  border:1px solid transparent;
  background:
    linear-gradient(var(--void),var(--void)) padding-box,
    linear-gradient(135deg,
      rgba(168,85,247,.7)  0%,
      rgba(212,169,66,.5)  35%,
      rgba(168,85,247,.4)  65%,
      rgba(240,201,106,.6) 100%) border-box;
}
/* 배지 내부 글로우 */
.badge-glow{
  position:absolute; inset:0; border-radius:40px; z-index:0; pointer-events:none;
  background:radial-gradient(ellipse at center,
    rgba(107,33,168,.2) 0%, transparent 70%);
  animation:badgeGlowPulse 4s ease-in-out infinite;
}
@keyframes badgeGlowPulse{
  0%,100%{ opacity:.6; }
  50%    { opacity:1; }
}
/* 샤인 */
.badge-shine{
  position:absolute; inset:0; border-radius:40px; z-index:2;
  overflow:hidden; pointer-events:none;
}
.badge-shine::after{
  content:''; position:absolute;
  top:0; left:-130%; width:75%; height:100%;
  background:linear-gradient(90deg,
    transparent,
    rgba(255,255,255,.12),
    transparent);
  transform:skewX(-18deg);
  animation:shineSlide 5s ease-in-out infinite;
}
@keyframes shineSlide{
  0%,58%,100%{ left:-130%; }
  82%        { left:150%; }
}

.badge-algo-text{
  font-family:'Cinzel',serif;
  font-size:13px; font-weight:700;
  letter-spacing:5px; padding-right:5px;
  background:linear-gradient(90deg,
    var(--gold-lt)   0%,
    var(--gold-wh)   40%,
    var(--purple-lt) 70%,
    var(--gold-lt)   100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  position:relative; z-index:3;
  animation:badgeTextAnim 5s ease-in-out infinite;
  background-size:200% 100%;
}
@keyframes badgeTextAnim{
  0%,100%{ background-position:0% 50%; }
  50%    { background-position:100% 50%; }
}
</style>
</head>
<body>

<!-- 배경 레이어 -->
<div class="bg-void"></div>
<div class="bh-core"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>

<script>
/* ─── 별 생성 ─── */
(function(){
  const colors = [
    'rgba(255,248,231,.9)',
    'rgba(168,85,247,.8)',
    'rgba(212,169,66,.8)',
    'rgba(245,240,236,.7)',
  ];
  for(let i=0;i<70;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*1.6+.3;
    const c=colors[Math.floor(Math.random()*colors.length)];
    s.style.cssText=`
      width:${sz}px;height:${sz}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      background:${c};
      box-shadow:0 0 ${sz*2}px ${c};
      animation-duration:${Math.random()*5+3}s;
      animation-delay:${Math.random()*7}s;
    `;
    document.body.appendChild(s);
  }
})();

/* ─── 성운 먼지 ─── */
(function(){
  const nebulae=[
    {w:280,h:180,l:10,t:15,c:'rgba(107,33,168,.18)',dur:12},
    {w:200,h:140,l:70,t:60,c:'rgba(212,169,66,.1)',dur:16},
    {w:240,h:160,l:55,t:20,c:'rgba(45,13,92,.22)',dur:10},
    {w:180,h:120,l:20,t:70,c:'rgba(168,85,247,.12)',dur:14},
  ];
  nebulae.forEach(n=>{
    const el=document.createElement('div');
    el.className='nebula';
    el.style.cssText=`
      width:${n.w}px;height:${n.h}px;
      left:${n.l}%;top:${n.t}%;
      background:radial-gradient(ellipse,${n.c} 0%,transparent 70%);
      animation-duration:${n.dur}s;
      animation-delay:${Math.random()*4}s;
    `;
    document.body.appendChild(el);
  });
})();
</script>

<!-- ══════════════════════
     대형 로고
══════════════════════ -->
<div class="logo-section">
  <div class="sec-label">◈ &nbsp; Page Title Logo &nbsp; ◈</div>

  <div class="logo-wrap">
    <div class="logo-halo-purple"></div>
    <div class="logo-halo-gold"></div>

    <div class="logo-main-row">

      <!-- ── 왼쪽 날개 ── -->
      <div class="wing-wrap left">
        <svg width="155" height="135" viewBox="0 0 155 135" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- 골드→퍼플 날개 그라디언트 -->
            <linearGradient id="wgL" x1="145" y1="10" x2="5" y2="125" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#f0c96a" stop-opacity="1"/>
              <stop offset="30%"  stop-color="#d4a942" stop-opacity="0.85"/>
              <stop offset="65%"  stop-color="#a855f7" stop-opacity="0.6"/>
              <stop offset="100%" stop-color="#6b21a8" stop-opacity="0.12"/>
            </linearGradient>
            <!-- 면 채움 그라디언트 -->
            <linearGradient id="wfL" x1="145" y1="5" x2="15" y2="130" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.22"/>
              <stop offset="45%"  stop-color="#d4a942" stop-opacity="0.1"/>
              <stop offset="100%" stop-color="#6b21a8" stop-opacity="0.04"/>
            </linearGradient>
            <filter id="fgL">
              <feGaussianBlur stdDeviation="1.8" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- 날개 반투명 면 -->
          <path d="
            M 142 66
            C 122 52, 96 28, 68 8
            C 50 -2, 24 -4, 8 18
            C 30 23, 56 38, 72 52
            C 50 40, 22 34, 7 46
            C 26 52, 54 60, 72 68
            C 49 63, 22 64, 7 76
            C 26 76, 54 75, 72 80
            C 50 82, 24 86, 10 96
            C 30 91, 56 88, 72 92
            C 60 98, 38 106, 26 114
            C 46 107, 68 101, 80 104
            L 142 66 Z
          " fill="url(#wfL)" filter="url(#fgL)"/>

          <!-- 1차 대형깃 — 위로 힘차게 -->
          <path d="M 142,66 C 116,50 88,26 64,7"
            stroke="url(#wgL)" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
          <path d="M 141,66 C 112,52 82,32 56,14"
            stroke="url(#wgL)" stroke-width="1.1" stroke-linecap="round" opacity="0.65"/>

          <!-- 2차깃 -->
          <path d="M 138,69 C 110,58 80,44 48,31"
            stroke="url(#wgL)" stroke-width="1.0" stroke-linecap="round" opacity="0.55"/>
          <path d="M 134,73 C 106,64 78,53 46,45"
            stroke="url(#wgL)" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>

          <!-- 3차깃 -->
          <path d="M 128,78 C 102,72 74,66 42,60"
            stroke="url(#wgL)" stroke-width="0.8" stroke-linecap="round" opacity="0.38"/>
          <path d="M 122,83 C 97,79 70,74 38,70"
            stroke="url(#wgL)" stroke-width="0.75" stroke-linecap="round" opacity="0.3"/>

          <!-- 소형 복깃 (아랫단) -->
          <path d="M 114,88  C 90,86  64,84 32,83"
            stroke="url(#wgL)" stroke-width="0.65" stroke-linecap="round" opacity="0.24"/>
          <path d="M 104,95  C 82,94  58,93 28,92"
            stroke="url(#wgL)" stroke-width="0.6"  stroke-linecap="round" opacity="0.18"/>
          <path d="M 92, 102 C 72,102 50,102 24,101"
            stroke="url(#wgL)" stroke-width="0.55" stroke-linecap="round" opacity="0.14"/>
          <path d="M 78, 110 C 62,111 44,111 22,110"
            stroke="url(#wgL)" stroke-width="0.5"  stroke-linecap="round" opacity="0.1"/>

          <!-- 날개 끝 광점 (골드) -->
          <circle cx="64" cy="7" r="2.4" fill="#f0c96a" opacity="0.95">
            <animate attributeName="r"       values="2.4;4;2.4"   dur="3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.95;1;0.95" dur="3s" repeatCount="indefinite"/>
          </circle>
          <!-- 퍼플 확산링 -->
          <circle cx="64" cy="7" r="7" fill="none" stroke="rgba(168,85,247,0.5)" stroke-width="1">
            <animate attributeName="r"       values="7;18;7"      dur="3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.5;0;0.5"   dur="3s" repeatCount="indefinite"/>
          </circle>
          <!-- 골드 확산링 -->
          <circle cx="64" cy="7" r="4" fill="none" stroke="rgba(240,201,106,0.4)" stroke-width="0.8">
            <animate attributeName="r"       values="4;12;4"      dur="3s" repeatCount="indefinite" begin="0.4s"/>
            <animate attributeName="opacity" values="0.4;0;0.4"   dur="3s" repeatCount="indefinite" begin="0.4s"/>
          </circle>

          <!-- 어깨 연결점 -->
          <circle cx="142" cy="66" r="3" fill="rgba(168,85,247,0.5)"/>
          <circle cx="142" cy="66" r="5" fill="none" stroke="rgba(168,85,247,0.25)" stroke-width="1"/>
        </svg>
      </div>

      <!-- ── 텍스트 ── -->
      <div class="logo-text">
        <div class="deco-top">
          <div class="deco-line"></div>
          <div class="deco-rune">✦</div>
          <div class="deco-line r"></div>
        </div>
        <div class="logo-algo">ALGO</div>
        <div class="logo-rule"></div>
        <div class="logo-sub">알고리빙1004</div>
      </div>

      <!-- ── 오른쪽 날개 ── -->
      <div class="wing-wrap right">
        <svg width="155" height="135" viewBox="0 0 155 135" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
