<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>🔥 떡상레이더 - 유튜브 급상승 분석</title>
<meta name="description" content="유튜브 급상승 영상 실시간 분석, 채널 레벨 측정, 수익 예측, 키워드 추천">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4409875039737384" crossorigin="anonymous"></script>
<style>
:root {
  --red:#ff0000; --red2:#ff4444; --bg:#0a0a0a; --card:#141414;
  --card2:#1a1a1a; --border:#2a2a2a; --text:#ffffff; --sub:#aaaaaa;
  --tab-h:56px; --header-h:56px; --bottom-h:68px;
  --gold:#ffd700; --blue:#00cfff; --green:#00e676; --purple:#cc44ff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;padding-bottom:calc(var(--bottom-h)+20px)}

/* ── 헤더 ── */
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{font-size:22px}
.logo-text{font-size:16px;font-weight:800}
.logo-text span{color:var(--red)}
.live-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.refresh-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:14px;padding:7px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px}
.refresh-btn:active{transform:scale(.95)}

/* ── 상단 탭 ── */
.tab-bar{position:sticky;top:var(--header-h);z-index:99;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;height:var(--tab-h);overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:80px;display:flex;align-items:center;justify-content:center;gap:5px;font-size:13px;font-weight:600;color:var(--sub);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;padding:0 6px}
.tab-btn.active{color:var(--text);border-bottom:2px solid var(--red)}
.tab-icon{font-size:16px}

/* ── 하단 네비 ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--bottom-h);background:rgba(14,14,14,.98);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom,0px)}
.bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 0;transition:all .2s}
.bottom-nav-btn .nav-icon{font-size:22px;line-height:1}
.bottom-nav-btn .nav-label{font-size:10px;color:var(--sub);font-weight:600}
.bottom-nav-btn.active .nav-icon{transform:scale(1.15)}
.bottom-nav-btn.active .nav-label{color:var(--red)}
.bottom-nav-btn:active{transform:scale(.9)}

/* ── 섹션 ── */
.section{display:none;padding:16px 0 8px}
.section.active{display:block}

/* ── 카테고리 ── */
.cat-wrap{overflow-x:auto;scrollbar-width:none;padding:0 16px 12px}
.cat-wrap::-webkit-scrollbar{display:none}
.cat-scroll{display:flex;gap:8px}
.cat-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.cat-btn.active{background:var(--red);border-color:var(--red);color:#fff}

/* ── 정렬 바 ── */
.sort-bar{display:flex;align-items:center;justify-content:space-between;padding:0 16px 10px}
.result-info{font-size:12px;color:var(--sub)}
.sort-tabs{display:flex;gap:6px}
.sort-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--sub);font-size:11px;font-weight:600;cursor:pointer}
.sort-btn.active{background:var(--red);border-color:var(--red);color:#fff}

/* ── 영상 카드 ── */
.card-list{padding:0 12px;display:flex;flex-direction:column;gap:10px}
.v-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s}
.v-card:active{transform:scale(.98);border-color:#444}
.thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden}
.thumb-wrap img{width:100%;height:100%;object-fit:cover}
.rank-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.8);color:#fff;font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px}
.hot-badge{position:absolute;top:8px;right:8px;background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;animation:pulse 1.5s infinite}
.level-badge-card{position:absolute;bottom:8px;right:8px;font-size:12px;font-weight:800;padding:2px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.3)}
.card-body{padding:12px}
.card-title{font-size:14px;font-weight:700;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:8px;flex-wrap:wrap}
.meta-item{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:3px}
.velocity-bar{margin-top:8px}
.vel-label{font-size:10px;color:var(--sub);margin-bottom:3px}
.vel-track{height:4px;background:#2a2a2a;border-radius:2px;overflow:hidden}
.vel-fill{height:100%;border-radius:2px;transition:width .5s}

/* ── 채널 분석 전체 ── */
.channel-search-box{padding:0 16px 16px}
.ch-input-wrap{display:flex;gap:8px}
.ch-input{flex:1;padding:12px 16px;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:12px;font-size:15px}
.ch-input:focus{outline:none;border-color:var(--red)}
.ch-search-btn{padding:12px 18px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.ch-search-btn:active{transform:scale(.95)}

/* ── 채널 프로필 카드 ── */
.ch-profile-card{margin:0 16px 16px;border-radius:16px;background:var(--card);border:1px solid var(--border);overflow:hidden}
.ch-banner{width:100%;height:80px;object-fit:cover;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.ch-profile-body{padding:16px;display:flex;gap:14px;align-items:flex-start;margin-top:-30px}
.ch-avatar{width:60px;height:60px;border-radius:50%;border:3px solid var(--bg);flex-shrink:0;object-fit:cover}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:17px;font-weight:800;margin-top:8px}
.ch-handle{font-size:12px;color:var(--sub);margin-top:2px}
.ch-desc{font-size:12px;color:#ccc;margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── 레벨 쇼케이스 ── */
.level-showcase{margin:0 16px 16px;border-radius:16px;padding:24px 16px;text-align:center;position:relative;overflow:hidden}
.level-number{font-size:56px;font-weight:900;line-height:1}
.level-name{font-size:22px;font-weight:800;margin-top:4px}
.level-desc{font-size:13px;color:rgba(255,255,255,.7);margin-top:8px;line-height:1.5}
.level-gauge{margin:16px 0}
.gauge-track{height:8px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden}
.gauge-fill{height:100%;border-radius:4px;transition:width 1s}
.gauge-label{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px;text-align:right}

/* ── 수익 예측 카드 ── */
.revenue-section{margin:0 16px 16px}
.revenue-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.revenue-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.rev-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.rev-card.highlight{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,165,0,.05));border-color:rgba(255,215,0,.3)}
.rev-icon{font-size:24px;margin-bottom:6px}
.rev-range{font-size:16px;font-weight:800;color:var(--gold)}
.rev-label{font-size:11px;color:var(--sub);margin-top:3px}
.rev-basis{font-size:10px;color:#666;margin-top:2px}
.rpm-table{margin-top:12px;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.rpm-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.rpm-row:last-child{border-bottom:none}
.rpm-cat{color:var(--sub)}
.rpm-val{font-weight:700;color:var(--gold)}

/* ── 성장 분석 ── */
.growth-section{margin:0 16px 16px}
.growth-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.growth-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.growth-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.growth-icon{font-size:20px;margin-bottom:6px}
.growth-val{font-size:18px;font-weight:800}
.growth-label{font-size:11px;color:var(--sub);margin-top:3px}
.growth-tip{font-size:11px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);color:#aaa;line-height:1.4}

/* ── 채널 조언 ── */
.advice-section{margin:0 16px 16px}
.advice-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.advice-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.advice-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.advice-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.advice-tag.good{background:rgba(0,230,118,.15);color:var(--green)}
.advice-tag.warn{background:rgba(255,215,0,.15);color:var(--gold)}
.advice-tag.bad{background:rgba(255,68,68,.15);color:var(--red2)}
.advice-text{font-size:13px;color:#ccc;line-height:1.6}

/* ── 최근 영상 ── */
.recent-section{margin:0 16px 16px}
.recent-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.recent-video{display:flex;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;align-items:center}
.recent-video:active{transform:scale(.98)}
.recent-thumb{width:90px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0}
.recent-info{flex:1;min-width:0}
.recent-title-txt{font-size:13px;font-weight:700;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.recent-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap}
.recent-meta span{font-size:11px;color:var(--sub)}
.perf-bar{margin-top:6px}
.perf-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.perf-fill{height:100%;border-radius:2px}

/* ── 점수 세부 ── */
.score-section{padding:0 16px 16px}
.score-title{font-size:15px;font-weight:700;margin-bottom:10px}
.score-item{margin-bottom:10px}
.score-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.score-bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width 1s}

/* ── 레벨 테이블 ── */
.level-table{margin:0 16px 16px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.lv-row{display:grid;grid-template-columns:44px 1fr auto;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--border)}
.lv-row:last-child{border-bottom:none}
.lv-em{font-size:20px}
.lv-info .lv-name{font-size:13px;font-weight:700}
.lv-info .lv-range{font-size:11px;color:var(--sub);margin-top:2px}
.lv-badge-small{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px}

/* ── 레벨 glow ── */
.lv-glow-1{background:linear-gradient(135deg,#1a1a2e,#16213e)}
.lv-glow-2{background:linear-gradient(135deg,#1a2a1a,#1e3a1e)}
.lv-glow-3{background:linear-gradient(135deg,#2a1a0a,#3a2a0a);box-shadow:0 0 20px rgba(150,100,0,.2)}
.lv-glow-4{background:linear-gradient(135deg,#1a2a3a,#0a1a3a);box-shadow:0 0 25px rgba(0,100,200,.25)}
.lv-glow-5{background:linear-gradient(135deg,#2a0a2a,#3a0a3a);box-shadow:0 0 30px rgba(180,0,180,.3);animation:glow5 2s infinite}
.lv-glow-6{background:linear-gradient(135deg,#3a1a00,#4a2a00);box-shadow:0 0 35px rgba(255,120,0,.35);animation:glow6 1.8s infinite}
.lv-glow-7{background:linear-gradient(135deg,#3a0000,#5a0000);box-shadow:0 0 40px rgba(255,50,50,.4);animation:glow7 1.5s infinite}
.lv-glow-8{background:linear-gradient(135deg,#1a1a00,#3a3a00);box-shadow:0 0 50px rgba(255,220,0,.45);animation:glow8 1.2s infinite}
.lv-glow-9{background:linear-gradient(135deg,#001a3a,#003a5a);box-shadow:0 0 60px rgba(0,180,255,.5);animation:glow9 1s infinite}
.lv-glow-10{background:linear-gradient(135deg,#0a0a0a,#1a0a2a,#0a1a0a);box-shadow:0 0 80px rgba(150,0,255,.6),0 0 40px rgba(255,0,100,.4);animation:glow10 .8s infinite}
@keyframes glow5{0%,100%{box-shadow:0 0 30px rgba(180,0,180,.3)}50%{box-shadow:0 0 50px rgba(180,0,180,.6)}}
@keyframes glow6{0%,100%{box-shadow:0 0 35px rgba(255,120,0,.35)}50%{box-shadow:0 0 60px rgba(255,120,0,.65)}}
@keyframes glow7{0%,100%{box-shadow:0 0 40px rgba(255,50,50,.4)}50%{box-shadow:0 0 70px rgba(255,50,50,.75)}}
@keyframes glow8{0%,100%{box-shadow:0 0 50px rgba(255,220,0,.45)}50%{box-shadow:0 0 90px rgba(255,220,0,.8)}}
@keyframes glow9{0%,100%{box-shadow:0 0 60px rgba(0,180,255,.5)}50%{box-shadow:0 0 100px rgba(0,180,255,.85)}}
@keyframes glow10{0%{box-shadow:0 0 80px rgba(150,0,255,.6),0 0 40px rgba(255,0,100,.4)}33%{box-shadow:0 0 80px rgba(255,0,100,.6),0 0 40px rgba(0,180,255,.4)}66%{box-shadow:0 0 80px rgba(0,180,255,.6),0 0 40px rgba(150,0,255,.4)}100%{box-shadow:0 0 80px rgba(150,0,255,.6),0 0 40px rgba(255,0,100,.4)}}

/* ── 키워드 ── */
.kw-cat-wrap{overflow-x:auto;scrollbar-width:none;padding:0 16px 12px}
.kw-cat-wrap::-webkit-scrollbar{display:none}
.kw-cat-scroll{display:flex;gap:8px}
.kw-cat-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.kw-cat-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.kw-insight{margin:0 16px 14px;padding:14px;background:var(--card2);border-radius:12px;border-left:3px solid var(--red);font-size:13px;line-height:1.6;color:#ddd}
.kw-cards{padding:0 12px;display:flex;flex-direction:column;gap:10px}
.kw-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer}
.kw-card:active{transform:scale(.98)}
.kw-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.kw-rank{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.kw-word{font-size:16px;font-weight:800;flex:1}
.kw-heat{font-size:18px}
.kw-bars{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.kw-bar-item .kw-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:3px}
.kw-bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.kw-bar-fill{height:100%;border-radius:3px;transition:width .8s}
.kw-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.kw-tag{padding:3px 8px;border-radius:6px;font-size:11px;background:rgba(255,255,255,.07);color:#ccc}
.kw-tip{font-size:12px;color:var(--sub);border-top:1px solid var(--border);padding-top:8px;line-height:1.5}
.formula-box{margin:0 16px 12px;padding:12px 14px;background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.25);border-radius:10px;font-size:13px;color:#ff9999}
.formula-box strong{color:var(--red)}

/* ── 전면광고 ── */
.ad-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);flex-direction:column;align-items:center;justify-content:center}
.ad-overlay.show{display:flex}
.ad-box{width:min(90vw,400px);background:#111;border-radius:16px;overflow:hidden;border:1px solid #333;position:relative}
.ad-timer-bar{height:4px;background:var(--red);transition:width .1s linear;width:100%}
.ad-close-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.7);color:#fff;border:none;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer}
.ad-close-btn:disabled{opacity:.4;cursor:not-allowed}
.ad-content{padding:20px;text-align:center}
.ad-timer-text{font-size:12px;color:var(--sub);margin-top:10px}

/* ── 인라인 광고 ── */
.ad-inline{margin:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-align:center}
.ad-top{padding:4px 12px}

/* ── 스켈레톤 ── */
.skel{background:linear-gradient(90deg,#1a1a1a 25%,#2a2a2a 50%,#1a1a1a 75%);background-size:200% 100%;animation:skel .8s infinite;border-radius:8px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── 분리선 섹션 헤더 ── */
.sec-header{display:flex;align-items:center;gap:8px;padding:0 16px 12px;font-size:15px;font-weight:800}
.sec-header::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── 반응형 ── */
@media(min-width:600px){
  .card-list{display:grid;grid-template-columns:repeat(2,1fr)}
  .kw-cards{display:grid;grid-template-columns:repeat(2,1fr)}
  .revenue-grid{grid-template-columns:repeat(4,1fr)}
  .growth-grid{grid-template-columns:repeat(4,1fr)}
}
@media(min-width:900px){
  .card-list{grid-template-columns:repeat(3,1fr)}
  .kw-cards{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<!-- 전면광고 -->
<div class="ad-overlay" id="adOverlay">
  <div class="ad-box">
    <div class="ad-timer-bar" id="adTimerBar"></div>
    <button class="ad-close-btn" id="adCloseBtn" disabled onclick="closeAd()">✕</button>
    <div class="ad-content">
      <ins class="adsbygoogle" style="display:block;min-height:250px"
        data-ad-client="ca-pub-4409875039737384" data-ad-slot="auto"
        data-ad-format="auto" data-full-width-responsive="true"></ins>
      <p class="ad-timer-text" id="adTimerText">5초 후 닫기 가능</p>
    </div>
  </div>
</div>

<!-- 헤더 -->
<header class="header">
  <div class="logo">
    <span class="logo-icon">🔥</span>
    <span class="logo-text">떡상<span>레이더</span></span>
    <span class="live-badge">LIVE</span>
  </div>
  <button class="refresh-btn" onclick="refreshCurrent()">↻ 새로고침</button>
</header>

<!-- 상단 탭 -->
<nav class="tab-bar" id="topTabBar">
  <button class="tab-btn active" data-tab="trend" onclick="switchTab('trend',this)">
    <span class="tab-icon">🔥</span>급상승
  </button>

/* ─ 유틸 ─ */
function fmt(n){n=parseInt(n)||0;if(n>=100000000)return(n/100000000).toFixed(1)+'억';if(n>=10000)return Math.floor(n/10000)+'만';if(n>=1000)return(n/1000).toFixed(1)+'k';return n.toString();}
function fmtKrw(n){if(n>=100000000)return(n/100000000).toFixed(1)+'억원';if(n>=10000)return Math.floor(n/10000)+'만원';return n.toLocaleString()+'원';}
function ago(d){const h=Math.floor((Date.now()-new Date(d))/3600000);if(h<1)return'방금 전';if(h<24)return h+'시간 전';const day=Math.floor(h/24);if(day<30)return day+'일 전';if(day<365)return Math.floor(day/30)+'개월 전';return Math.floor(day/365)+'년 전';}
function velocity(views,d){const h=Math.max(1,(Date.now()-new Date(d))/3600000);return Math.round(parseInt(views)/h);}
function getLevelByRatio(r){for(let i=LEVELS.length-1;i>=0;i--){if(r>=LEVELS[i].ratio[0])return LEVELS[i];}return LEVELS[0];}

/* ─ 비디오 패치 ─ */
async function fetchVideos(catId){
  const p=new URLSearchParams({part:'snippet,statistics',chart:'mostPopular',regionCode:REGION,maxResults:MAX_RES,hl:'ko',key:API_KEY});
  if(catId!=='0')p.append('videoCategoryId',catId);
  const r=await fetch(`https://www.googleapis.com/youtube/v3/videos?${p}`);
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.items||[];
}
function sorted(list,type){
  if(type==='velocity')return[...list].sort((a,b)=>velocity(b.statistics.viewCount,b.snippet.publishedAt)-velocity(a.statistics.viewCount,a.snippet.publishedAt));
  if(type==='date')return[...list].sort((a,b)=>new Date(b.snippet.publishedAt)-new Date(a.snippet.publishedAt));
  return[...list].sort((a,b)=>parseInt(b.statistics.viewCount)-parseInt(a.statistics.viewCount));
}

/* ═══════════════════════════════════════
   채널 분석 핵심 로직
═══════════════════════════════════════ */
async function fetchChannelFull(query){
  // 1) 채널 검색
  const q=query.replace(/^@/,'').replace(/https?:\/\/(www\.)?youtube\.com\/(channel\/|c\/|@)?/,'');
  const sr=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(q)}&maxResults=1&key=${API_KEY}`);
  const sd=await sr.json();
  if(sd.error)throw new Error(sd.error.message);
  if(!sd.items?.length)throw new Error('채널을 찾을 수 없습니다');
  const chId=sd.items[0].id.channelId;

  // 2) 채널 상세
  const cr=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings,contentDetails&id=${chId}&key=${API_KEY}`);
  const cd=await cr.json();
  if(!cd.items?.length)throw new Error('채널 정보를 불러올 수 없습니다');
  const ch=cd.items[0];

  // 3) 최근 영상 12개
  const vsr=await fetch(`https://www.googleapis.com/youtube/v3/search?part=id,snippet&channelId=${chId}&order=date&maxResults=12&type=video&key=${API_KEY}`);
  const vsd=await vsr.json();
  const vidIds=(vsd.items||[]).map(v=>v.id.videoId).filter(Boolean);

  let detailVids=[];
  if(vidIds.length){
    const dvr=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet,contentDetails&id=${vidIds.join(',')}&key=${API_KEY}`);
    const dvd=await dvr.json();
    detailVids=dvd.items||[];
  }
  return{ch,detailVids,chId};
}

function analyzeChannel(ch,detailVids){
  const stats=ch.statistics;
  const subs=parseInt(stats.subscriberCount||0);
  const totalViews=parseInt(stats.viewCount||0);
  const vidTotal=parseInt(stats.videoCount||0);

  // 평균 조회수
  const views=detailVids.map(v=>parseInt(v.statistics.viewCount||0));
  const avgViews=views.length?Math.round(views.reduce((a,b)=>a+b,0)/views.length):0;
  const maxViews=views.length?Math.max(...views):0;
  const minViews=views.length?Math.min(...views):0;

  // 평균 좋아요/댓글
  const avgLikes=detailVids.length?Math.round(detailVids.reduce((a,v)=>a+parseInt(v.statistics.likeCount||0),0)/detailVids.length):0;
  const avgComments=detailVids.length?Math.round(detailVids.reduce((a,v)=>a+parseInt(v.statistics.commentCount||0),0)/detailVids.length):0;

  // 업로드 주기 계산
  let uploadFreq='알 수 없음',uploadDays=0;
  if(detailVids.length>=2){
    const dates=detailVids.map(v=>new Date(v.snippet.publishedAt)).sort((a,b)=>b-a);
    const gaps=[];
    for(let i=0;i<dates.length-1;i++)gaps.push((dates[i]-dates[i+1])/86400000);
    uploadDays=Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length);
    if(uploadDays<=1)uploadFreq='매일';
    else if(uploadDays<=4)uploadFreq=`${uploadDays}일마다`;
    else if(uploadDays<=8)uploadFreq='주 1회';
    else if(uploadDays<=15)uploadFreq='격주';
    else uploadFreq='월 1회 이하';
  }

  // 채널 개설 기간
  const created=new Date(ch.snippet.publishedAt);
  const monthsOld=Math.round((Date.now()-created)/2592000000);

  // 구독자 대비 조회율
  const ratio=subs>0?avgViews/subs:0;
  const level=getLevelByRatio(ratio);

  // 좋아요율
  const likeRate=avgViews>0?(avgLikes/avgViews*100):0;
  const commentRate=avgViews>0?(avgComments/avgViews*100):0;

  // 수익 계산 (RPM 범위: 일반 콘텐츠 기준 700~1800원/1000뷰)
  const rpmLow=700, rpmHigh=1800;
  const monthlyViewsEst=avgViews*Math.max(1,Math.round(30/Math.max(1,uploadDays)));
  const monthlyRevLow=Math.round(monthlyViewsEst/1000*rpmLow);
  const monthlyRevHigh=Math.round(monthlyViewsEst/1000*rpmHigh);
  const annualRevLow=monthlyRevLow*12;
  const annualRevHigh=monthlyRevHigh*12;

  // 영상당 수익
  const perVideoLow=Math.round(avgViews/1000*rpmLow);
  const perVideoHigh=Math.round(avgViews/1000*rpmHigh);

  // 점수 산정
  const scoreEngagement=Math.min(100,Math.round(likeRate*20+commentRate*100));
  const scoreUpload=uploadDays<=7?100:uploadDays<=14?70:uploadDays<=30?40:20;
  const scoreGrowth=Math.min(100,Math.round(ratio*60));
  const scoreConsistency=Math.min(100,Math.round(vidTotal/Math.max(1,monthsOld)*10));
  const scoreOverall=Math.round((scoreEngagement+scoreUpload+scoreGrowth+scoreConsistency)/4);

  // 맞춤 조언 생성
  const advices=[];
  if(likeRate<0.5)advices.push({type:'warn',icon:'👍',title:'좋아요율이 낮아요',text:`평균 좋아요율 ${likeRate.toFixed(2)}%. 영상 끝에 "좋아요 눌러주세요" CTA를 넣고, 시청자가 공감할 수 있는 주제를 선택하세요. 1% 이상이 목표입니다.`});
  else advices.push({type:'good',icon:'👍',title:'좋아요율 우수',text:`좋아요율 ${likeRate.toFixed(2)}% - 매우 좋은 수치예요! 시청자들이 콘텐츠에 강하게 공감하고 있습니다.`});

  if(uploadDays>14)advices.push({type:'bad',icon:'📅',title:'업로드 빈도를 높이세요',text:`현재 평균 ${uploadDays}일마다 업로드 중. 알고리즘은 꾸준한 채널을 선호합니다. 주 1-2회를 목표로 하되, 쇼츠를 병행하면 효과적입니다.`});
  else if(uploadDays<=3)advices.push({type:'good',icon:'📅',title:'업로드 빈도 최상',text:`${uploadDays}일마다 업로드! 알고리즘이 채널을 적극적으로 추천할 가능성이 높습니다.`});
  else advices.push({type:'good',icon:'📅',title:'업로드 패턴 양호',text:`${uploadFreq} 업로드 중. 현재 패턴을 유지하면서 쇼츠로 노출을 늘려보세요.`});

  if(ratio<0.1)advices.push({type:'bad',icon:'🎯',title:'조회율 개선이 필요해요',text:`구독자 대비 조회율 ${(ratio*100).toFixed(1)}%. 썸네일 A/B 테스트, 제목 최적화, 업로드 시간대 조정이 필요합니다. 평균 10~30%가 건강한 수치입니다.`});
  else if(ratio>0.5)advices.push({type:'good',icon:'🎯',title:'알고리즘 반응 탁월',text:`구독자 대비 조회율 ${(ratio*100).toFixed(1)}% - 알고리즘이 채널을 강력하게 추천하고 있어요!`});
  else advices.push({type:'warn',icon:'🎯',title:'조회율 보통',text:`구독자 대비 조회율 ${(ratio*100).toFixed(1)}%. 썸네일 개선과 트렌드 키워드 활용으로 30% 이상을 목표해보세요.`});

  if(subs<1000)advices.push({type:'warn',icon:'💰',title:'수익화 조건 미충족',text:`유튜브 파트너 프로그램(YPP) 가입을 위해 구독자 1,000명, 연간 시청시간 4,000시간이 필요합니다. 현재 ${fmt(subs)}명 달성 중.`});
  else if(subs>=1000&&subs<10000)advices.push({type:'good',icon:'💰',title:'수익화 진행 중',text:`구독자 ${fmt(subs)}명으로 YPP 조건 충족! 지금부터 CPM이 높은 금융·테크·교육 카테고리 콘텐츠를 섞으면 수익을 극대화할 수 있습니다.`});
  else advices.push({type:'good',icon:'💰',title:'수익 최적화 시기',text:`구독자 ${fmt(subs)}명 달성! 스폰서십, 제휴 마케팅, 멤버십을 적극 활용할 단계입니다. 광고 수익 외 다각화를 추천해요.`});

  if(avgViews<subs*0.05)advices.push({type:'bad',icon:'🔍',title:'SEO 최적화 필요',text:'영상 제목에 검색 키워드를 포함하고, 설명란에 200자 이상 키워드를 작성하세요. 해시태그 3~5개, 챕터 마커 추가도 알고리즘 점수를 높입니다.'});

  return{subs,totalViews,vidTotal,avgViews,maxViews,minViews,avgLikes,avgComments,uploadFreq,uploadDays,monthsOld,ratio,level,likeRate,commentRate,monthlyRevLow,monthlyRevHigh,annualRevLow,annualRevHigh,perVideoLow,perVideoHigh,scoreEngagement,scoreUpload,scoreGrowth,scoreConsistency,scoreOverall,advices,monthlyViewsEst};
}

      /* 채널 프로필 */
      html+=`<div class="ch-profile-card">
        <div style="height:70px;background:linear-gradient(135deg,${lv.color}33,${lv.color}11)"></div>
        <div class="ch-profile-body">
          <img class="ch-avatar" src="${avatar||''}" alt="">
          <div class="ch-info">
            <div class="ch-name">${ch.snippet.title}</div>
            <div class="ch-handle">@${ch.snippet.customUrl||ch.id} · ${a.monthsOld}개월 운영</div>

      /* 레벨 쇼케이스 */
      html+=`<div class="level-showcase lv-glow-${lv.lv}" style="background:${lv.bg}">
        <div class="level-number" style="color:${lv.color};text-shadow:0 0 30px ${lv.color}88;font-size:64px">${lv.emoji}</div>
        <div class="level-name" style="color:${lv.color}">Lv.${lv.lv} ${lv.name}</div>
        <div class="level-desc">${lv.desc}</div>
        <div class="level-gauge">
          <div class="gauge-track"><div class="gauge-fill" style="width:${gaugeW}%;background:${lv.color}"></div></div>
          <div class="gauge-label">레벨 ${lv.lv} / 10 · 구독대비 조회율 ${(a.ratio*100).toFixed(1)}%</div>

      /* 핵심 지표 */
      html+=`<div class="sec-header">📊 핵심 지표</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px 16px">
        <div class="ch-stat-card" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:22px;margin-bottom:4px">👥</div><div style="font-size:18px;font-weight:800">${fmt(a.subs)}</div><div style="font-size:11px;color:var(--sub);margin-top:3px">구독자</div>
        </div>
        <div class="ch-stat-card" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:22px;margin-bottom:4px">👁</div><div style="font-size:18px;font-weight:800">${fmt(a.avgViews)}</div><div style="font-size:11px;color:var(--sub);margin-top:3px">평균 조회수</div>
        </div>
        <div class="ch-stat-card" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:22px;margin-bottom:4px">❤️</div><div style="font-size:18px;font-weight:800">${a.likeRate.toFixed(2)}%</div><div style="font-size:11px;color:var(--sub);margin-top:3px">좋아요율</div>

          <div style="font-size:22px;margin-bottom:4px">📅</div><div style="font-size:18px;font-weight:800">${a.uploadFreq}</div><div style="font-size:11px;color:var(--sub);margin-top:3px">업로드 주기</div>
        </div>
        <div class="ch-stat-card" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:22px;margin-bottom:4px">🔺</div><div style="font-size:18px;font-weight:800">${fmt(a.maxViews)}</div><div style="font-size:11px;color:var(--sub);margin-top:3px">최고 조회수</div>
        </div>
        <div class="ch-stat-card" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:22px;margin-bottom:4px">📹</div><div style="font-size:18px;font-weight:800">${fmt(a.vidTotal)}</div><div style="font-size:11px;color:var(--sub);margin-top:3px">총 영상 수</div>

      /* 예상 수익 */
      html+=`<div class="sec-header">💰 예상 수익 분석</div>
      <div class="revenue-section">
        <div class="revenue-grid">
          <div class="rev-card highlight">
            <div class="rev-icon">📆</div>
            <div class="rev-range">${fmtKrw(a.monthlyRevLow)}~${fmtKrw(a.monthlyRevHigh)}</div>
            <div class="rev-label">월 예상 광고 수익</div>
            <div class="rev-basis">월 ${fmt(a.monthlyViewsEst)}회 기준</div>
          </div>
          <div class="rev-card highlight">
            <div class="rev-icon">📅</div>
            <div class="rev-range">${fmtKrw(a.annualRevLow)}~${fmtKrw(a.annualRevHigh)}</div>
            <div class="rev-label">연간 예상 광고 수익</div>
            <div class="rev-basis">현재 업로드 패턴 유지 시</div>
          </div>
          <div class="rev-card">
            <div class="rev-icon">🎬</div>
            <div class="rev-range">${fmtKrw(a.perVideoLow)}~${fmtKrw(a.perVideoHigh)}</div>
            <div class="rev-label">영상 1개당 수익</div>
            <div class="rev-basis">평균 조회수 ${fmt(a.avgViews)} 기준</div>
          </div>
          <div class="rev-card">
            <div class="rev-icon">💡</div>
            <div class="rev-range">${fmtKrw(a.perVideoHigh*3)}~${fmtKrw(a.perVideoHigh*8)}</div>
            <div class="rev-label">최적화 시 영상당</div>
            <div class="rev-basis">RPM 개선 + 조회수 3배 목표</div>
          </div>
        </div>
        <div style="margin-top:12px;padding:12px 14px;background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.2);border-radius:10px;font-size:12px;color:#ddd;line-height:1.7">
          <strong style="color:var(--gold)">💡 수익 최적화 TIP</strong><br>
          현재 카테고리보다 금융·테크·교육 관련 영상을 20% 섞으면 RPM이 최대 2~3배 높아져 같은 조회수로도 수익이 크게 오릅니다.
          ${a.subs<1000?'<br>⚠️ 아직 구독자 1,000명 미만으로 YPP 수익화 대기 중입니다.':''}
        </div>
        <div class="rpm-table">
          <div class="rpm-row" style="background:var(--card2)"><span style="font-weight:700;font-size:12px">카테고리별 RPM 단가 참고</span><span style="font-size:11px;color:var(--sub)">1,000뷰 기준</span></div>
          ${Object.entries(RPM_TABLE).map(([cat,v])=>`<div class="rpm-row"><span class="rpm-cat">${cat}</span><span class="rpm-val">₩${v.krw[0].toLocaleString()}~₩${v.krw[1].toLocaleString()}</span></div>`).join('')}
        </div>
      </div>`;

      /* 종합 점수 */
      html+=`<div class="sec-header">📈 채널 종합 점수</div>
      <div class="score-section">
        <div class="score-item">
          <div class="score-header"><span>🎯 알고리즘 반응도 (좋아요·댓글율)</span><span style="color:var(--red);font-weight:800">${a.scoreEngagement}점</span></div>
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${a.scoreEngagement}%;background:linear-gradient(90deg,var(--red),#ff9999)"></div></div>
        </div>
        <div class="score-item">
          <div class="score-header"><span>📅 업로드 일관성</span><span style="color:var(--gold);font-weight:800">${a.scoreUpload}점</span></div>
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${a.scoreUpload}%;background:linear-gradient(90deg,var(--gold),#ffe88a)"></div></div>
        </div>
        <div class="score-item">
          <div class="score-header"><span>🚀 구독자 대비 성과</span><span style="color:var(--blue);font-weight:800">${a.scoreGrowth}점</span></div>
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${a.scoreGrowth}%;background:linear-gradient(90deg,var(--blue),#88eeff)"></div></div>
        </div>
        <div class="score-item">
          <div class="score-header"><span>📹 콘텐츠 축적도</span><span style="color:var(--green);font-weight:800">${a.scoreConsistency}점</span></div>
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${a.scoreConsistency}%;background:linear-gradient(90deg,var(--green),#88ffbb)"></div></div>
        </div>
        <div style="margin-top:14px;padding:14px;border-radius:12px;background:${lv.bg};border:1px solid ${lv.color}44;text-align:center">
          <div style="font-size:13px;color:rgba(255,255,255,.7)">종합 점수</div>
          <div style="font-size:40px;font-weight:900;color:${lv.color};text-shadow:0 0 20px ${lv.color}66">${a.scoreOverall}</div>
          <div style="font-size:12px;color:rgba(255,255,255,.6)">/ 100점</div>
        </div>
      </div>`;

      /* 맞춤 조언 */
      html+=`<div class="sec-header">💡 맞춤 성장 조언</div>
      <div class="advice-section">
        ${a.advices.map(ad=>`
          <div class="advice-card">
            <div class="advice-header">
              <span style="font-size:20px">${ad.icon}</span>
              <span class="advice-tag ${ad.type}">${ad.type==='good'?'✅ 강점':ad.type==='warn'?'⚠️ 개선 권장':'🔴 즉시 개선'}</span>
              <span style="font-size:13px;font-weight:700">${ad.title}</span>
            </div>
            <div class="advice-text">${ad.text}</div>
          </div>`).join('')}
      </div>`;

      /* 최근 영상 성과 */
      if(detailVids.length){
        html+=`<div class="sec-header">📹 최근 영상 성과</div>
        <div class="recent-section">`;
        detailVids.slice(0,6).forEach(v=>{
          const vv=parseInt(v.statistics.viewCount||0);
          const perfPct=a.avgViews>0?Math.min(100,Math.round(vv/a.avgViews*100)):0;
          const perfColor=perfPct>=120?'var(--green)':perfPct>=80?'var(--gold)':'var(--red2)';
          const thumb=v.snippet.thumbnails?.medium?.url||v.snippet.thumbnails?.default?.url;
          html+=`<div class="recent-video" onclick="window.open('https://youtu.be/${v.id}','_blank')">
            <img class="recent-thumb" src="${thumb}" alt="">
            <div class="recent-info">
              <div class="recent-title-txt">${v.snippet.title}</div>
              <div class="recent-meta">
                <span>👁 ${fmt(vv)}</span>
                <span>👍 ${fmt(v.statistics.likeCount)}</span>
                <span>🕐 ${ago(v.snippet.publishedAt)}</span>
              </div>
              <div class="perf-bar">
                <div style="font-size:10px;color:${perfColor};margin-bottom:2px">평균 대비 ${perfPct}%</div>
                <div class="perf-track"><div class="perf-fill" style="width:${Math.min(100,perfPct)}%;background:${perfColor}"></div></div>
              </div>
            </div>
          </div>`;
        });
        html+=`</div>`;
      }

      /* 레벨 기준표 */
      html+=`<div class="sec-header">🏆 레벨 기준표</div>
      <div class="level-table" style="margin:0 16px 32px">${renderLevelTableHTML()}</div>`;

      res.innerHTML=html;
    }catch(e){
      res.innerHTML=`<div style="text-align:center;padding:40px;color:var(--sub)">⚠️ ${e.message}<br><small style="color:#555">채널명을 정확히 입력해주세요</small></div>
      <div class="level-table" id="levelTablePreview">${renderLevelTableHTML()}</div>`;
    }
  });
}

/* ═══════════════════════════════════════
   키워드 렌더
═══════════════════════════════════════ */
let adShownCount=0;
function selectKwCat(el){
  document.querySelectorAll('.kw-cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  adShownCount++;
  if(adShownCount%3===0)showAd(()=>renderKeywords(el.dataset.kcat));
  else renderKeywords(el.dataset.kcat);
}
function renderKeywords(cat){
  const data=KW_DATA[cat];if(!data)return;
  document.getElementById('kwInsight').innerHTML=`<div class="kw-insight">💡 ${data.insight}</div>`;
  document.getElementById('kwFormula').innerHTML=`<div class="formula-box"><strong>📌 제목 공식:</strong> ${data.formula}<br>⏰ 최적 업로드: ${data.time}</div>`;
  const colors=['#ff6b6b','#ffd93d','#6bcb77','#74b9ff','#a29bfe'];
  document.getElementById('kwCards').innerHTML=data.keywords.map((k,i)=>`
    <div class="kw-card" onclick="copyKeyword('${k.w}')">
      <div class="kw-header">
        <div class="kw-rank" style="background:${colors[i]}22;color:${colors[i]}">${i+1}</div>
        <div class="kw-word">#${k.w}</div>
        <div class="kw-heat">${k.heat}</div>
      </div>
      <div class="kw-bars">
        <div class="kw-bar-item"><div class="kw-bar-label"><span>🔍 검색량</span><span>${k.search}</span></div><div class="kw-bar-track"><div class="kw-bar-fill" style="width:${k.search}%;background:${colors[i]}"></div></div></div>
        <div class="kw-bar-item"><div class="kw-bar-label"><span>⚔️ 경쟁도</span><span>${k.comp}</span></div><div class="kw-bar-track"><div class="kw-bar-fill" style="width:${k.comp}%;background:#888"></div></div></div>
        <div class="kw-bar-item"><div class="kw-bar-label"><span>📈 성장률</span><span>${k.grow}</span></div><div class="kw-bar-track"><div class="kw-bar-fill" style="width:${k.grow}%;background:var(--blue)"></div></div></div>
      </div>
      <div class="kw-tags">${k.tags.map(t=>`<span class="kw-tag">${t}</span>`).join('')}</div>
      <div class="kw-tip">💡 ${k.tip}</div>
    </div>`).join('');
}
function copyKeyword(w){
  navigator.clipboard?.writeText('#'+w).then(()=>{
    const t=document.createElement('div');
    t.textContent='✅ 복사됨: #'+w;
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;z-index:9999;white-space:nowrap';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
  });
}

/* ─ 초기 실행 ─ */
loadData();
renderKeywords('music');
try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
