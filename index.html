<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블랙홀 심볼 10종</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --void:#04040c;
  --purple:#a855f7;
  --purple-d:#6b21a8;
  --purple-dd:#3b0764;
  --gold:#d4a942;
  --gold-l:#f0c96a;
  --gold-ll:#fff3c4;
  --orange:#f97316;
  --orange-l:#fb923c;
  --rose:#e8a0b0;
  --rose-d:#c4687e;
  --blue:#3b82f6;
  --cyan:#06b6d4;
  --white:#f0eee8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--void);
  min-height:100vh;
  display:grid;
  grid-template-columns: repeat(5,1fr);
  align-items:center;
  justify-items:center;
  gap:0;
  padding:40px 20px;
  font-family:'Cinzel',serif;
  overflow-x:hidden;
}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;}
@keyframes twinkle{0%{opacity:.08;transform:scale(1);}100%{opacity:.9;transform:scale(1.8);}}

/* 카드 */
.card{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;gap:16px;
  padding:30px 20px;
  width:180px;
}
.card-label{
  font-size:9px;letter-spacing:3px;
  color:rgba(240,201,106,.45);
  text-transform:uppercase;
  text-align:center;
}
.sym{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* ═══════════════════════════════════════
   1. INFERNO — 오렌지 골드 강착원반 + 제트
═══════════════════════════════════════ */
.s1{width:100px;height:100px;}
.s1-disk{
  position:absolute;inset:0;
  transform:rotateX(68deg);
  border-radius:50%;
  animation:spin1 5s linear infinite;
}
@keyframes spin1{from{transform:rotateX(68deg) rotate(0deg);}to{transform:rotateX(68deg) rotate(360deg);}}
.s1-disk::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(
    from 0deg,
    rgba(249,115,22,0) 0deg,
    rgba(249,115,22,.95) 50deg,
    rgba(240,201,106,1) 100deg,
    rgba(255,243,196,.9) 130deg,
    rgba(240,201,106,.8) 170deg,
    rgba(249,115,22,.5) 220deg,
    rgba(168,85,247,.4) 270deg,
    rgba(107,33,168,.2) 320deg,
    rgba(249,115,22,0) 360deg
  );
  filter:blur(1.5px);
}
.s1-disk2{
  position:absolute;inset:14px;
  transform:rotateX(68deg);
  border-radius:50%;
  animation:spin1r 3.5s linear infinite reverse;
}
@keyframes spin1r{from{transform:rotateX(68deg) rotate(0deg);}to{transform:rotateX(68deg) rotate(360deg);}}
.s1-disk2::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(
    from 180deg,
    rgba(212,169,66,.7) 0deg,
    rgba(249,115,22,.9) 80deg,
    rgba(168,85,247,.5) 160deg,
    rgba(212,169,66,.4) 240deg,
    rgba(249,115,22,.0) 360deg
  );
  filter:blur(2px);
}
.s1-jet-t{position:absolute;left:50%;transform:translateX(-50%);top:-48px;width:4px;height:44px;background:linear-gradient(to top,rgba(168,85,247,1),rgba(200,130,255,.6),transparent);box-shadow:0 0 8px rgba(168,85,247,.8);border-radius:2px;animation:jetP 1.5s ease-in-out infinite;}
.s1-jet-b{position:absolute;left:50%;transform:translateX(-50%);bottom:-48px;width:3px;height:38px;background:linear-gradient(to bottom,rgba(168,85,247,.9),rgba(107,33,168,.5),transparent);box-shadow:0 0 6px rgba(107,33,168,.6);border-radius:2px;animation:jetP 1.5s ease-in-out infinite .5s;}
@keyframes jetP{0%,100%{opacity:.65;transform:translateX(-50%) scaleY(1);}50%{opacity:1;transform:translateX(-50%) scaleY(1.2);}}
.s1-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:50%;background:radial-gradient(circle,#000 40%,rgba(30,10,60,.95) 70%,transparent 100%);box-shadow:0 0 0 2px rgba(212,169,66,.5),0 0 14px rgba(168,85,247,.9),0 0 30px rgba(107,33,168,.7),0 0 55px rgba(212,169,66,.25);z-index:10;animation:coreP 2s ease-in-out infinite;}
@keyframes coreP{0%,100%{box-shadow:0 0 0 2px rgba(212,169,66,.5),0 0 14px rgba(168,85,247,.9),0 0 30px rgba(107,33,168,.7),0 0 55px rgba(212,169,66,.25);}50%{box-shadow:0 0 0 3px rgba(240,201,106,.8),0 0 22px rgba(168,85,247,1),0 0 50px rgba(107,33,168,1),0 0 85px rgba(212,169,66,.45);}}

/* ═══════════════════════════════════════
   2. INTERSTELLAR — 수평 다중 동심 링
═══════════════════════════════════════ */
.s2{width:120px;height:70px;}
.s2-wrap{position:absolute;width:120px;height:120px;top:50%;left:50%;transform:translate(-50%,-50%) rotateX(80deg);}
.s2-r{position:absolute;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:s2spin var(--s2d) linear infinite;}
@keyframes s2spin{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}
.s2-r:nth-child(1){width:120px;height:120px;border:3px solid rgba(249,115,22,.95);box-shadow:0 0 10px rgba(249,115,22,.8);--s2d:3.2s;}
.s2-r:nth-child(2){width:106px;height:106px;border:2.5px solid rgba(251,146,60,.85);box-shadow:0 0 8px rgba(251,146,60,.7);--s2d:2.7s;animation-direction:reverse;}
.s2-r:nth-child(3){width:92px;height:92px;border:2px solid rgba(240,201,106,.8);box-shadow:0 0 7px rgba(240,201,106,.6);--s2d:2.2s;}
.s2-r:nth-child(4){width:78px;height:78px;border:1.5px solid rgba(212,169,66,.65);box-shadow:0 0 6px rgba(212,169,66,.5);--s2d:1.8s;animation-direction:reverse;}
.s2-r:nth-child(5){width:64px;height:64px;border:1.2px solid rgba(249,115,22,.5);box-shadow:0 0 5px rgba(249,115,22,.4);--s2d:1.4s;}
.s2-r:nth-child(6){width:50px;height:50px;border:1px solid rgba(168,85,247,.45);box-shadow:0 0 4px rgba(168,85,247,.35);--s2d:1.0s;animation-direction:reverse;}
.s2-photon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotateX(80deg);width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,243,196,.65);box-shadow:0 0 8px rgba(255,243,196,.5);animation:phP 1.5s ease-in-out infinite;z-index:9;}
@keyframes phP{0%,100%{opacity:.55;}50%{opacity:1;}}
.s2-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:#000;box-shadow:0 0 0 2px rgba(249,115,22,.35),0 0 16px rgba(249,115,22,.55),0 0 35px rgba(168,85,247,.4);z-index:10;animation:s2c 2.5s ease-in-out infinite;}
@keyframes s2c{0%,100%{box-shadow:0 0 0 2px rgba(249,115,22,.35),0 0 16px rgba(249,115,22,.55),0 0 35px rgba(168,85,247,.4);}50%{box-shadow:0 0 0 3px rgba(249,115,22,.65),0 0 25px rgba(249,115,22,.85),0 0 55px rgba(168,85,247,.65);}}

/* ═══════════════════════════════════════
   3. NEBULA — 로즈 보라 성운
═══════════════════════════════════════ */
.s3{width:100px;height:100px;}
.s3-neb{position:absolute;inset:-18px;border-radius:50%;animation:s3nSpin 18s linear infinite;}
@keyframes s3nSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.s3-neb::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(ellipse 65% 45% at 28% 38%,rgba(232,160,176,.6) 0%,transparent 60%),radial-gradient(ellipse 55% 40% at 72% 62%,rgba(168,85,247,.55) 0%,transparent 55%),radial-gradient(ellipse 45% 55% at 50% 18%,rgba(107,33,168,.4) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 62% 82%,rgba(196,104,126,.4) 0%,transparent 55%);filter:blur(5px);}
.s3-halo{position:absolute;inset:3px;border-radius:50%;border:2.5px solid rgba(232,160,176,.4);box-shadow:0 0 14px rgba(232,160,176,.55),0 0 28px rgba(168,85,247,.35),inset 0 0 14px rgba(232,160,176,.18);animation:s3h 2.8s ease-in-out infinite;}
@keyframes s3h{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:1;transform:scale(1.05);}}
.s3-ig{position:absolute;inset:14px;border-radius:50%;background:radial-gradient(circle,transparent 42%,rgba(232,160,176,.25) 65%,rgba(168,85,247,.18) 82%,transparent 100%);animation:s3ig 3.2s ease-in-out infinite;}
@keyframes s3ig{0%,100%{opacity:.45;}50%{opacity:1;}}
.s3-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;background:radial-gradient(circle,#000 48%,rgba(20,5,40,.9) 78%,transparent 100%);box-shadow:0 0 0 3px rgba(232,160,176,.35),0 0 16px rgba(232,160,176,.55),0 0 34px rgba(168,85,247,.45),0 0 60px rgba(107,33,168,.3);z-index:10;animation:s3c 2.2s ease-in-out infinite;}
@keyframes s3c{0%,100%{box-shadow:0 0 0 3px rgba(232,160,176,.35),0 0 16px rgba(232,160,176,.55),0 0 34px rgba(168,85,247,.45),0 0 60px rgba(107,33,168,.3);}50%{box-shadow:0 0 0 4px rgba(232,160,176,.65),0 0 26px rgba(232,160,176,.85),0 0 55px rgba(168,85,247,.75),0 0 95px rgba(107,33,168,.55);}}

/* ═══════════════════════════════════════
   4. SPIRAL GALAXY — 3색 나선 은하
═══════════════════════════════════════ */
.s4{width:110px;height:110px;}
.s4-glow{position:absolute;inset:-18px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.22) 0%,rgba(168,85,247,.16) 40%,rgba(212,169,66,.08) 70%,transparent 100%);animation:s4g 3.2s ease-in-out infinite;}
@keyframes s4g{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:1;transform:scale(1.14);}}
.s4-spiral{position:absolute;inset:0;animation:s4sp 9s linear infinite;}
@keyframes s4sp{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.s4-spiral svg{width:100%;height:100%;}
.s4-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;border-radius:50%;background:radial-gradient(circle,#000 32%,rgba(59,130,246,.6) 65%,rgba(168,85,247,.4) 85%,transparent 100%);box-shadow:0 0 0 2px rgba(59,130,246,.5),0 0 12px rgba(59,130,246,.75),0 0 26px rgba(168,85,247,.55),0 0 44px rgba(212,169,66,.22);z-index:10;animation:s4c 1.9s ease-in-out infinite;}
@keyframes s4c{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.22);}}

/* ═══════════════════════════════════════
   5. GOLDEN RING — 심플 골드 링
═══════════════════════════════════════ */
.s5{width:110px;height:110px;}
.s5-or{position:absolute;top:50%;left:50%;width:110px;height:110px;border-radius:50%;border:3px solid transparent;background:linear-gradient(#04040c,#04040c) padding-box,conic-gradient(from 0deg,rgba(212,169,66,0) 0deg,rgba(240,201,106,1) 60deg,rgba(255,243,196,1) 100deg,rgba(240,201,106,.9) 140deg,rgba(212,169,66,.5) 200deg,rgba(168,85,247,.45) 260deg,rgba(212,169,66,.2) 320deg,rgba(212,169,66,0) 360deg) border-box;box-shadow:0 0 14px rgba(212,169,66,.55),0 0 30px rgba(212,169,66,.25);animation:s5o 4.5s linear infinite;}
@keyframes s5o{from{transform:translate(-50%,-50%) rotateX(22deg) rotate(0deg);}to{transform:translate(-50%,-50%) rotateX(22deg) rotate(360deg);}}
.s5-ir{position:absolute;top:50%;left:50%;width:78px;height:78px;border-radius:50%;border:2px solid transparent;background:linear-gradient(#04040c,#04040c) padding-box,conic-gradient(from 180deg,rgba(249,115,22,0) 0deg,rgba(249,115,22,.85) 80deg,rgba(240,201,106,.65) 160deg,rgba(249,115,22,.3) 240deg,rgba(249,115,22,0) 360deg) border-box;box-shadow:0 0 8px rgba(249,115,22,.45);animation:s5i 3.2s linear infinite reverse;}
@keyframes s5i{from{transform:translate(-50%,-50%) rotateX(22deg) rotate(0deg);}to{transform:translate(-50%,-50%) rotateX(22deg) rotate(360deg);}}
.s5-sd{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotateX(22deg);width:58px;height:58px;border-radius:50%;background:radial-gradient(circle,#000 60%,rgba(212,169,66,.15) 100%);box-shadow:0 0 22px rgba(0,0,0,.95);z-index:5;}
.s5-fh{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);height:2px;background:linear-gradient(to right,transparent 5%,rgba(240,201,106,.65) 30%,rgba(255,243,196,.85) 50%,rgba(240,201,106,.65) 70%,transparent 95%);box-shadow:0 0 7px rgba(240,201,106,.55);animation:s5f 2.2s ease-in-out infinite;z-index:6;}
@keyframes s5f{0%,100%{opacity:.55;}50%{opacity:1;}}
.s5-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,#000 52%,rgba(20,10,5,.95) 80%,transparent 100%);box-shadow:0 0 0 2px rgba(212,169,66,.38),0 0 18px rgba(212,169,66,.45),0 0 38px rgba(168,85,247,.32),0 0 65px rgba(212,169,66,.14);z-index:10;animation:s5c 3s ease-in-out infinite;}
@keyframes s5c{0%,100%{box-shadow:0 0 0 2px rgba(212,169,66,.38),0 0 18px rgba(212,169,66,.45),0 0 38px rgba(168,85,247,.32),0 0 65px rgba(212,169,66,.14);}50%{box-shadow:0 0 0 3px rgba(240,201,106,.65),0 0 28px rgba(212,169,66,.75),0 0 60px rgba(168,85,247,.55),0 0 100px rgba(212,169,66,.28);}}

/* ═══════════════════════════════════════
   6. VORTEX — 사이안 보라 소용돌이
═══════════════════════════════════════ */
.s6{width:100px;height:100px;}
.s6-vortex{position:absolute;inset:0;animation:s6v 6s linear infinite;}
@keyframes s6v{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.s6-vortex svg{width:100%;height:100%;}
.s6-pulse{position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(6,182,212,.3);animation:s6p 2s ease-in-out infinite;}
.s6-pulse2{position:absolute;inset:-18px;border-radius:50%;border:1px solid rgba(168,85,247,.2);animation:s6p 2s ease-in-out infinite .7s;}
.s6-pulse3{position:absolute;inset:-28px;border-radius:50%;border:1px solid rgba(6,182,212,.12);animation:s6p 2s ease-in-out infinite 1.4s;}
@keyframes s6p{0%{opacity:.9;transform:scale(1);}100%{opacity:0;transform:scale(1.3);}}
.s6-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;background:radial-gradient(circle,#000 38%,rgba(6,182,212,.7) 68%,rgba(168,85,247,.5) 88%,transparent 100%);box-shadow:0 0 0 2px rgba(6,182,212,.5),0 0 12px rgba(6,182,212,.8),0 0 26px rgba(168,85,247,.5),0 0 46px rgba(6,182,212,.2);z-index:10;animation:s6c 1.8s ease-in-out infinite;}
@keyframes s6c{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.18);}}

/* ═══════════════════════════════════════
   7. CROWN — 왕관형 코로나 방출
═══════════════════════════════════════ */
.s7{width:100px;height:100px;}
.s7-corona{position:absolute;inset:0;}
.s7-corona svg{width:100%;height:100%;}
.s7-ring1{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;border:1.5px solid rgba(240,201,106,.5);box-shadow:0 0 8px rgba(240,201,106,.4);animation:s7r 3s ease-in-out infinite;}
.s7-ring2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:78px;height:78px;border-radius:50%;border:1px solid rgba(168,85,247,.35);box-shadow:0 0 6px rgba(168,85,247,.3);animation:s7r 3s ease-in-out infinite .5s;}
@keyframes s7r{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.06);}}
.s7-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,#000 42%,rgba(107,33,168,.85) 72%,transparent 100%);box-shadow:0 0 0 2px rgba(240,201,106,.45),0 0 14px rgba(240,201,106,.6),0 0 30px rgba(168,85,247,.45),0 0 55px rgba(107,33,168,.3);z-index:10;animation:s7c 2.4s ease-in-out infinite;}
@keyframes s7c{0%,100%{box-shadow:0 0 0 2px rgba(240,201,106,.45),0 0 14px rgba(240,201,106,.6),0 0 30px rgba(168,85,247,.45),0 0 55px rgba(107,33,168,.3);}50%{box-shadow:0 0 0 3px rgba(240,201,106,.75),0 0 22px rgba(240,201,106,.9),0 0 50px rgba(168,85,247,.7),0 0 90px rgba(107,33,168,.55);}}

/* ═══════════════════════════════════════
   8. WORMHOLE — 웜홀 터널
═══════════════════════════════════════ */
.s8{width:100px;height:100px;}
.s8-tunnel{position:absolute;inset:0;}
.s8-tunnel svg{width:100%;height:100%;}
.s8-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,#fff 20%,rgba(168,85,247,.9) 55%,rgba(59,130,246,.7) 80%,transparent 100%);box-shadow:0 0 0 2px rgba(255,255,255,.6),0 0 12px rgba(168,85,247,.9),0 0 24px rgba(59,130,246,.6),0 0 45px rgba(255,255,255,.2);z-index:10;animation:s8c 1.5s ease-in-out infinite;}
@keyframes s8c{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.35);}}

/* ═══════════════════════════════════════
   9. PULSAR — 펄서 방사 십자
═══════════════════════════════════════ */
.s9{width:110px;height:110px;}
.s9-beam{position:absolute;top:50%;left:50%;transform-origin:0 0;border-radius:2px;}
.s9-beam:nth-child(1){width:55px;height:3px;transform:translate(0,-50%) rotate(0deg);background:linear-gradient(to right,rgba(240,201,106,1),transparent);box-shadow:0 0 8px rgba(240,201,106,.6);animation:s9b1 2s ease-in-out infinite;}
.s9-beam:nth-child(2){width:55px;height:3px;transform:translate(-100%,-50%) rotate(180deg);background:linear-gradient(to right,rgba(240,201,106,1),transparent);box-shadow:0 0 8px rgba(240,201,106,.6);animation:s9b1 2s ease-in-out infinite .5s;}
.s9-beam:nth-child(3){width:55px;height:2px;transform:translate(0,-50%) rotate(45deg);background:linear-gradient(to right,rgba(168,85,247,.8),transparent);box-shadow:0 0 6px rgba(168,85,247,.5);animation:s9b1 2s ease-in-out infinite .25s;}
.s9-beam:nth-child(4){width:55px;height:2px;transform:translate(-100%,-50%) rotate(225deg);background:linear-gradient(to right,rgba(168,85,247,.8),transparent);box-shadow:0 0 6px rgba(168,85,247,.5);animation:s9b1 2s ease-in-out infinite .75s;}
.s9-beam:nth-child(5){width:55px;height:2px;transform:translate(0,-50%) rotate(90deg);background:linear-gradient(to right,rgba(232,160,176,.7),transparent);box-shadow:0 0 5px rgba(232,160,176,.4);animation:s9b1 2s ease-in-out infinite .1s;}
.s9-beam:nth-child(6){width:55px;height:2px;transform:translate(-100%,-50%) rotate(270deg);background:linear-gradient(to right,rgba(232,160,176,.7),transparent);box-shadow:0 0 5px rgba(232,160,176,.4);animation:s9b1 2s ease-in-out infinite .6s;}
.s9-beam:nth-child(7){width:55px;height:1.5px;transform:translate(0,-50%) rotate(135deg);background:linear-gradient(to right,rgba(212,169,66,.6),transparent);animation:s9b1 2s ease-in-out infinite .35s;}
.s9-beam:nth-child(8){width:55px;height:1.5px;transform:translate(-100%,-50%) rotate(315deg);background:linear-gradient(to right,rgba(212,169,66,.6),transparent);animation:s9b1 2s ease-in-out infinite .85s;}
@keyframes s9b1{0%,100%{opacity:.4;}50%{opacity:1;}}
.s9-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;border:1px solid rgba(240,201,106,.3);animation:s9ring 3s ease-in-out infinite;}
.s9-ring2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;border:1px solid rgba(168,85,247,.2);animation:s9ring 3s ease-in-out infinite .5s;}
@keyframes s9ring{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1);}50%{opacity:.9;transform:translate(-50%,-50%) scale(1.06);}}

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
.s10{width:110px;height:110px;}
.s10-field{position:absolute;inset:0;animation:s10f 12s linear infinite;}
@keyframes s10f{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.s10-field svg{width:100%;height:100%;}
.s10-crush1{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90px;height:90px;border-radius:50%;border:1px solid rgba(212,169,66,.2);animation:s10cr 4s linear infinite;}
.s10-crush2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70px;height:70px;border-radius:50%;border:1px solid rgba(168,85,247,.25);animation:s10cr 3s linear infinite reverse;}
.s10-crush3{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;border-radius:50%;border:1.5px solid rgba(212,169,66,.35);animation:s10cr 2s linear infinite;}
@keyframes s10cr{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}
.s10-event{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;background:radial-gradient(circle,#000 45%,rgba(59,0,80,.95) 72%,transparent 100%);box-shadow:0 0 0 3px rgba(212,169,66,.4),0 0 18px rgba(168,85,247,.8),0 0 38px rgba(107,33,168,.7),0 0 70px rgba(212,169,66,.22);animation:s10ev 2s ease-in-out infinite;z-index:9;}
@keyframes s10ev{0%,100%{box-shadow:0 0 0 3px rgba(212,169,66,.4),0 0 18px rgba(168,85,247,.8),0 0 38px rgba(107,33,168,.7),0 0 70px rgba(212,169,66,.22);}50%{box-shadow:0 0 0 4px rgba(240,201,106,.75),0 0 28px rgba(168,85,247,1),0 0 60px rgba(107,33,168,1),0 0 110px rgba(212,169,66,.45);}}
.s10-singu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:#fff;box-shadow:0 0 6px rgba(255,255,255,.9),0 0 14px rgba(240,201,106,.8),0 0 28px rgba(168,85,247,.7);z-index:11;animation:s10sg 1.2s ease-in-out infinite;}
@keyframes s10sg{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8;}50%{transform:translate(-50%,-50%) scale(1.5);opacity:1;}}
</style>
