<title>Black Sphere Symbol</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:80px;
  overflow:hidden;
}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;border-radius:50%;
  animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;
}
@keyframes twinkle{
  0%{opacity:.03;transform:scale(1);}
  100%{opacity:.8;transform:scale(2);}
}

/* ════════════════════════
   씬
════════════════════════ */

  position:absolute;
  top:50%;left:50%;

/* ════════════════════════
   코어 — 다크블랙 구체
   크기: 120px
════════════════════════ */
.core{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:120px;height:120px;
  border-radius:50%;
  z-index:20;
  /*
    완전한 다크블랙
    중심부 극도로 어두운 블랙
    테두리쪽만 미세 다크레드 틴트
  */
  background:
    radial-gradient(circle at 36% 30%,
      rgba(22,3,0,.55)   0%,
      rgba(10,1,0,.85)  20%,
      rgba(4,0,0,.96)   42%,
      #000              62%,
      #000              100%
    );
  box-shadow:
    /* 외부 레드오렌지 오라 */
    0 0 0 1px  rgba(255,90,0,.45),
    0 0 0 3px  rgba(255,60,0,.12),
    0 0 18px   rgba(255,80,0,.55),
    0 0 42px   rgba(210,50,0,.35),
    0 0 85px   rgba(160,28,0,.2),
    /* 내부 극도 어두움 */
    inset 0 0 24px rgba(100,10,0,.4),
    inset 0 0 50px rgba(50,4,0,.7),
    inset 0 0 80px rgba(10,0,0,.9);
  animation:corePulse 2.8s ease-in-out infinite;
}
@keyframes corePulse{
  0%,100%{
    box-shadow:
      0 0 0 1px rgba(255,90,0,.45),0 0 0 3px rgba(255,60,0,.12),
      0 0 18px rgba(255,80,0,.55),0 0 42px rgba(210,50,0,.35),0 0 85px rgba(160,28,0,.2),
      inset 0 0 24px rgba(100,10,0,.4),inset 0 0 50px rgba(50,4,0,.7),inset 0 0 80px rgba(10,0,0,.9);
  }
  50%{
    box-shadow:
      0 0 0 2px rgba(255,110,0,.65),0 0 0 5px rgba(255,80,0,.18),
      0 0 28px rgba(255,100,0,.78),0 0 65px rgba(230,60,0,.52),0 0 130px rgba(180,35,0,.3),
      inset 0 0 32px rgba(120,14,0,.55),inset 0 0 65px rgba(65,6,0,.8),inset 0 0 100px rgba(15,0,0,.95);

/* ════════════════════════
   토성 링
   ★ 핵심 수정:
   링을 SVG로 구현해
   위쪽(구체 뒤) = z:10
   아래쪽(구체 앞) = z:25
   clip-path으로 정확히 분리
════════════════════════ */

/*
  rotateX(72deg)로 눕힌 타원 링
  위쪽 절반 → 구체 뒤 (z:10)
  아래쪽 절반 → 구체 앞 (z:25)

  CSS border로는 정확한 앞/뒤 분리가
  어렵기 때문에 SVG ellipse를 사용

  각 링의 rx/ry는 rotateX(72deg) 기준:
  실제 원형 반지름 r → 화면상 rx=r, ry=r*sin(18deg)≈r*0.309
  r값(px): 78 92 106 120 134 148
  rx:       78 92 106 120 134 148
  ry:       24 28  33  37  41  46
*/
.ring-svg-back{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:320px;height:320px;
  z-index:10; /* 구체 뒤 */
  pointer-events:none;
  animation:ringSvgSpin 0s linear infinite; /* 개별 링이 각자 회전 */
}
.ring-svg-front{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:320px;height:320px;
  z-index:25; /* 구체 앞 */
  pointer-events:none;
}

/* SVG 링 공통 */
.ring-svg-back svg,
.ring-svg-front svg{
  width:100%;height:100%;
  overflow:visible;
}

/* 각 링 컨테이너 — 개별 회전 */
.rw{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:320px;height:320px;
  pointer-events:none;
}
/* 뒤 레이어 */
.rw-back{ z-index:10; }
/* 앞 레이어 */
.rw-front{ z-index:25; }

.rw svg{ width:100%;height:100%;overflow:visible; }

/* 링 회전 애니메이션 */
@keyframes rSpin1{ from{transform:translate(-50%,-50%) rotate(0deg);}   to{transform:translate(-50%,-50%) rotate(360deg);} }
@keyframes rSpin2{ from{transform:translate(-50%,-50%) rotate(0deg);}   to{transform:translate(-50%,-50%) rotate(-360deg);} }
@keyframes rSpin3{ from{transform:translate(-50%,-50%) rotate(0deg);}   to{transform:translate(-50%,-50%) rotate(360deg);} }
@keyframes rSpin4{ from{transform:translate(-50%,-50%) rotate(0deg);}   to{transform:translate(-50%,-50%) rotate(-360deg);} }
@keyframes rSpin5{ from{transform:translate(-50%,-50%) rotate(0deg);}   to{transform:translate(-50%,-50%) rotate(360deg);} }
@keyframes rSpin6{ from{transform:translate(-50%,-50%) rotate(0deg);}   to{transform:translate(-50%,-50%) rotate(-360deg);} }

.rw1{ animation:rSpin1  8s linear infinite; }
.rw2{ animation:rSpin2  11s linear infinite; }
.rw3{ animation:rSpin3  14s linear infinite; }
.rw4{ animation:rSpin4  17s linear infinite; }
.rw5{ animation:rSpin5  21s linear infinite; }
.rw6{ animation:rSpin6  26s linear infinite; }

<body>
<div class="bg"></div>
<script>
/* 별 */
const bg=document.querySelector('.bg');
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*1.8+.3;
  const c=['#ff2020','#ff5500','#ff8c00','#ffbe00','#ffe000','#fff','#ff6a00'];
  s.style.cssText=`width:${sz}px;height:${sz}px;background:${c[Math.floor(Math.random()*c.length)]};left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*4}s;--delay:${Math.random()*6}s;`;
  bg.appendChild(s);
}
</script>

<!-- ══ 메인 씬 ══ -->
<div class="scene">

  <!-- ▼ 토성 링 뒤쪽 (위쪽 절반만 = 구체 뒤) -->
  <!--
    SVG clipPath으로 위쪽 절반(y<center)만 그려서
    구체(z:20) 뒤에 위치(z:10)시킴
    → 링의 위쪽이 구체 뒤에 숨어 보이지 않음
  -->

  <!-- 링1 뒤 -->
  <div class="rw rw-back rw1">
    <svg viewBox="-160 -160 320 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="topHalf1"><rect x="-160" y="-160" width="320" height="160"/></clipPath>
        <filter id="gR1"><feGaussianBlur stdDeviation="1.5"/></filter>
      </defs>
      <ellipse cx="0" cy="0" rx="78" ry="24"
        fill="none" stroke="rgba(255,32,32,.9)" stroke-width="2"

        <filter id="gRF1"><feGaussianBlur stdDeviation="1.5"/></filter>
      </defs>
      <ellipse cx="0" cy="0" rx="78" ry="24"

        <clipPath id="topHalf3"><rect x="-160" y="-160" width="320" height="160"/></clipPath>
      </defs>
      <ellipse cx="0" cy="0" rx="106" ry="33"
