<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO 로고 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070f;
  --purple: #7b2fff;
  --light-purple: #c084fc;
  --gold: #ffd700;
  --dark-purple: #3d00a0;
  --deep-black: #07000f;
  --white: #ffffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 100px;
  padding: 80px 24px;
  overflow-x: hidden;
  perspective: 1200px;
}

/* ── 배경 ── */
.bg-grid {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(123,47,255,.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(123,47,255,.07) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridDrift 20s linear infinite;
}
@keyframes gridDrift {
  0% { background-position: 0 0; }
  100% { background-position: 48px 48px; }
}
.bg-vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(7,7,15,.92) 100%);
}
.particle {
  position: fixed; border-radius: 50%; pointer-events: none;
  animation: floatUp linear infinite;
  z-index: 0;
}
@keyframes floatUp {
  0%   { transform: translateY(110vh) translateX(0) scale(1); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: .6; }
  100% { transform: translateY(-10vh) translateX(calc(var(--drift,0)*40px)) scale(.4); opacity: 0; }
}

/* ── 섹션 타이틀 ── */
.section-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  letter-spacing: 4px;
  color: rgba(192,132,252,.5);
  text-transform: uppercase;
  margin-bottom: 32px;
  text-align: center;
  position: relative; z-index: 1;
}

/* ══════════════════════════════
   대형 로고
══════════════════════════════ */
.logo-large-wrap {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
}
.logo-large {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  gap: 24px;
  padding: 56px 72px;
  transform-style: preserve-3d;
  animation: logoFloat 6s ease-in-out infinite;
}
@keyframes logoFloat {
  0%,100% { transform: translateY(0) rotateX(0deg) rotateY(0deg); }
  25%      { transform: translateY(-12px) rotateX(3deg) rotateY(-2deg); }
  50%      { transform: translateY(-18px) rotateX(-2deg) rotateY(3deg); }
  75%      { transform: translateY(-8px) rotateX(1deg) rotateY(-1deg); }
}

/* 후광 레이어 */
.logo-halo {
  position: absolute;
  width: 520px; height: 220px;
  background: radial-gradient(ellipse, rgba(123,47,255,.35) 0%, rgba(61,0,160,.15) 50%, transparent 75%);
  filter: blur(32px);
  animation: haloPulse 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes haloPulse {
  0%,100% { opacity: .7; transform: scale(1); }
  50%      { opacity: 1; transform: scale(1.12); }
}
.logo-halo-gold {
  position: absolute;
  width: 400px; height: 100px;
  background: radial-gradient(ellipse, rgba(255,215,0,.18) 0%, transparent 70%);
  filter: blur(20px);
  bottom: 20px;
  animation: haloGold 4s ease-in-out infinite;
  pointer-events: none;
}
@keyframes haloGold {
  0%,100% { opacity: .4; }
  50%      { opacity: .85; }
}

/* 회전 링 */
.ring-wrap {
  position: absolute; inset: -30px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid;
  animation: ringRotate linear infinite;
}
.ring-1 {
  width: 560px; height: 200px;
  border-color: rgba(123,47,255,.3);
  box-shadow: 0 0 12px rgba(123,47,255,.15);
  animation-duration: 12s;
  transform: rotateX(72deg);
}
.ring-2 {
  width: 620px; height: 240px;
  border-color: rgba(255,215,0,.15);
  box-shadow: 0 0 8px rgba(255,215,0,.1);
  animation-duration: 18s;
  animation-direction: reverse;
  transform: rotateX(72deg);
}
.ring-3 {
  width: 500px; height: 160px;
  border-color: rgba(192,132,252,.2);
  animation-duration: 8s;
  transform: rotateX(72deg);
}
@keyframes ringRotate {
  from { transform: rotateX(72deg) rotateZ(0deg); }
  to   { transform: rotateX(72deg) rotateZ(360deg); }
}

/* ── 날개 ── */
.wing { position: relative; display: flex; align-items: center; }
.wing svg { overflow: visible; filter: drop-shadow(0 0 8px rgba(123,47,255,.7)) drop-shadow(0 0 20px rgba(123,47,255,.4)); }
.wing-left  { animation: wingBeatL 3.5s ease-in-out infinite; transform-origin: right center; }
.wing-right { animation: wingBeatR 3.5s ease-in-out infinite; transform-origin: left center; }
@keyframes wingBeatL {
  0%,100% { transform: rotateY(0deg) rotateZ(0deg) scale(1); filter: drop-shadow(0 0 8px rgba(123,47,255,.7)); }
  30%      { transform: rotateY(-15deg) rotateZ(-5deg) scale(1.08); filter: drop-shadow(0 0 16px rgba(192,132,252,1)) drop-shadow(0 0 32px rgba(255,215,0,.4)); }
  60%      { transform: rotateY(5deg) rotateZ(3deg) scale(.97); }
}
@keyframes wingBeatR {
  0%,100% { transform: rotateY(0deg) rotateZ(0deg) scale(1); filter: drop-shadow(0 0 8px rgba(123,47,255,.7)); }
  30%      { transform: rotateY(15deg) rotateZ(5deg) scale(1.08); filter: drop-shadow(0 0 16px rgba(192,132,252,1)) drop-shadow(0 0 32px rgba(255,215,0,.4)); }
  60%      { transform: rotateY(-5deg) rotateZ(-3deg) scale(.97); }
}

/* ── 텍스트 블록 ── */
.logo-large-text {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  position: relative; z-index: 2;
  transform: translateZ(30px);
}
.logo-deco-top {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.deco-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,215,0,.6)); }
.deco-line.right { background: linear-gradient(90deg, rgba(255,215,0,.6), transparent); }
.deco-diamond {
  width: 7px; height: 7px;
  background: var(--gold);
  transform: rotate(45deg);
  box-shadow: 0 0 8px rgba(255,215,0,.9);
  animation: diamondPulse 2s ease-in-out infinite;
}
@keyframes diamondPulse {
  0%,100% { transform: rotate(45deg) scale(1); box-shadow: 0 0 8px rgba(255,215,0,.9); }
  50%      { transform: rotate(45deg) scale(1.4); box-shadow: 0 0 16px rgba(255,215,0,1), 0 0 28px rgba(255,215,0,.5); }
}

.logo-large-main {
  font-family: 'Cinzel', serif;
  font-size: 72px;
  font-weight: 900;
  letter-spacing: 14px;
  background: linear-gradient(135deg, #ffffff 0%, #c084fc 35%, #7b2fff 60%, #ffd700 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  position: relative;
  animation: textGlow3d 4s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(123,47,255,.8));
}
@keyframes textGlow3d {
  0%,100% { filter: drop-shadow(0 0 20px rgba(123,47,255,.8)) drop-shadow(0 0 4px rgba(255,215,0,.3)); }
  50%      { filter: drop-shadow(0 0 35px rgba(192,132,252,1)) drop-shadow(0 0 12px rgba(255,215,0,.6)) drop-shadow(0 0 50px rgba(123,47,255,.5)); }
}
/* 텍스트 반사 */
.logo-large-main-reflect {
  font-family: 'Cinzel', serif;
  font-size: 72px;
  font-weight: 900;
  letter-spacing: 14px;
  background: linear-gradient(135deg, #ffffff 0%, #c084fc 35%, #7b2fff 60%, #ffd700 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  transform: scaleY(-1);
  opacity: .12;
  margin-top: -8px;
  filter: blur(2px);
  pointer-events: none;
}

.logo-divider {
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,215,0,.5) 30%, rgba(192,132,252,.7) 50%, rgba(255,215,0,.5) 70%, transparent);
  position: relative;
}
.logo-divider::after {
  content: ''; position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
  width: 6px; height: 6px; background: var(--gold);
  border-radius: 50%; box-shadow: 0 0 10px rgba(255,215,0,1);
}

.logo-large-sub {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 8px;
  color: rgba(192,132,252,.85);
  text-transform: uppercase;
}

/* ══════════════════════════════
   배지 (소형)
══════════════════════════════ */
.badge-wrap {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
}
.logo-badge {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  gap: 10px;
  padding: 14px 28px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(61,0,160,.7), rgba(7,7,15,.9));
  transform-style: preserve-3d;
  animation: badgeFloat 5s ease-in-out infinite;
  cursor: pointer;
  transition: transform .2s;
}
@keyframes badgeFloat {
  0%,100% { transform: translateY(0) rotateX(0deg); }
  50%      { transform: translateY(-6px) rotateX(4deg); }
}
.logo-badge:hover {
  transform: scale(1.06) rotateY(5deg);
}

/* 그라디언트 테두리 */
.badge-border {
  position: absolute; inset: -1.5px; border-radius: 13px; z-index: -1;
  background: linear-gradient(135deg, #ffd700, #7b2fff, #c084fc, #ffd700);
  background-size: 300% 300%;
  animation: badgeBorderAnim 4s linear infinite;
  filter: blur(.5px);
}
@keyframes badgeBorderAnim {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
/* 내부 글로우 */
.badge-glow {
  position: absolute; inset: 0; border-radius: 12px; pointer-events: none;
  background: radial-gradient(ellipse at center, rgba(123,47,255,.3) 0%, transparent 70%);
  animation: badgeGlowPulse 3s ease-in-out infinite;
}
@keyframes badgeGlowPulse {
  0%,100% { opacity: .6; }
  50%      { opacity: 1; }
}
/* 샤인 슬라이드 */
.badge-shine {
  position: absolute; inset: 0; border-radius: 12px; overflow: hidden; pointer-events: none;
}
.badge-shine::after {
  content: '';
  position: absolute; top: 0; left: -120%; width: 80%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
  transform: skewX(-20deg);
  animation: badgeShine 4s ease-in-out infinite;
}
@keyframes badgeShine {
  0%,60%,100% { left: -120%; }
  80%          { left: 120%; }
}

/* 날개 소형 */
.wing-sm svg { overflow: visible; filter: drop-shadow(0 0 4px rgba(123,47,255,.8)); }
.wing-sm-left  { animation: wingSmL 3.5s ease-in-out infinite; transform-origin: right center; }
.wing-sm-right { animation: wingSmR 3.5s ease-in-out infinite; transform-origin: left center; }
@keyframes wingSmL {
  0%,100% { transform: rotateY(0deg) scale(1); }
  40%      { transform: rotateY(-12deg) scale(1.07); filter: drop-shadow(0 0 8px rgba(192,132,252,1)); }
}
@keyframes wingSmR {
  0%,100% { transform: rotateY(0deg) scale(1); }
  40%      { transform: rotateY(12deg) scale(1.07); filter: drop-shadow(0 0 8px rgba(192,132,252,1)); }
}

.badge-text {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 6px;
  background: linear-gradient(135deg, #ffffff, #c084fc, #ffd700);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 8px rgba(123,47,255,.9));
  position: relative; z-index: 1;
  animation: badgeTextPulse 3s ease-in-out infinite;
}
@keyframes badgeTextPulse {
  0%,100% { filter: drop-shadow(0 0 8px rgba(123,47,255,.9)); }
  50%      { filter: drop-shadow(0 0 16px rgba(192,132,252,1)) drop-shadow(0 0 24px rgba(255,215,0,.5)); }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-vignette"></div>

<script>
(function(){
  for(let i=0;i<28;i++){
    const p=document.createElement('div');
    p.className='particle';
    const sz=Math.random()*3+1;
    const isGold=Math.random()>.55;
    p.style.cssText=`
      width:${sz}px;height:${sz}px;
      left:${Math.random()*100}%;
      bottom:-10px;
      background:${isGold?'rgba(255,215,0,.55)':'rgba(123,47,255,.6)'};
      box-shadow:0 0 ${sz*3}px ${isGold?'rgba(255,215,0,.6)':'rgba(192,132,252,.6)'};
      --drift:${(Math.random()-.5)*2};
      animation-duration:${Math.random()*14+8}s;
      animation-delay:${Math.random()*10}s;
    `;
    document.body.appendChild(p);
  }
})();
</script>

<!-- ══ 대형 로고 ══ -->
<div class="logo-large-wrap">
  <div class="section-title">◈ &nbsp; 페이지 타이틀 로고 &nbsp; ◈</div>
  <div class="logo-large">
    <div class="logo-halo"></div>
    <div class="logo-halo-gold"></div>
    <div class="ring-wrap">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
    </div>
    <!-- 왼쪽 날개 -->
    <div class="wing wing-left">
      <svg width="160" height="120" viewBox="0 0 160 120">
        <defs>
          <linearGradient id="wgL" x1="1" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffd700" stop-opacity=".9"/>
            <stop offset="40%" stop-color="#c084fc" stop-opacity=".85"/>
            <stop offset="100%" stop-color="#7b2fff" stop-opacity=".4"/>
          </linearGradient>
          <filter id="wgLGlow">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- 주 날개 -->
        <path d="M150,60 C120,20 70,10 10,40 C40,45 70,52 90,60 C70,68 40,75 10,80 C70,110 120,100 150,60Z"
          fill="url(#wgL)" opacity=".55" filter="url(#wgLGlow)"/>
        <!-- 깃털 결 -->
        <path d="M145,58 C110,28 60,18 12,44" stroke="url(#wgL)" stroke-width="1.2" fill="none" opacity=".8"/>
        <path d="M130,50 C100,30 60,24 18,46" stroke="rgba(255,215,0,.6)" stroke-width=".8" fill="none"/>
        <path d="M138,65 C108,50 72,48 22,58" stroke="rgba(192,132,252,.7)" stroke-width=".8" fill="none"/>
        <path d="M130,72 C102,68 74,68 26,72" stroke="url(#wgL)" stroke-width=".8" fill="none" opacity=".7"/>
        <path d="M120,80 C96,80 70,80 30,78" stroke="rgba(255,215,0,.5)" stroke-width=".8" fill="none"/>
        <!-- 날개 끝 금빛 스파크 -->
        <circle cx="150" cy="60" r="3.5" fill="#ffd700" opacity=".95">
          <animate attributeName="r" values="3.5;5.5;3.5" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".95;1;.95" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="150" cy="60" r="7" fill="none" stroke="rgba(255,215,0,.5)" stroke-width="1">
          <animate attributeName="r" values="7;13;7" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".5;0;.5" dur="2s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
    <!-- 텍스트 -->
    <div class="logo-large-text">
      <div class="logo-deco-top">
        <div class="deco-line"></div>
        <div class="deco-diamond"></div>
        <div class="deco-line right"></div>
      </div>
      <div class="logo-large-main">ALGO</div>
      <div class="logo-large-main-reflect">ALGO</div>
      <div class="logo-divider"></div>
      <div class="logo-large-sub">알고리빙1004</div>
    </div>
    <!-- 오른쪽 날개 -->
    <div class="wing wing-right">
      <svg width="160" height="120" viewBox="0 0 160 120">
        <defs>
          <linearGradient id="wgR" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffd700" stop-opacity=".9"/>
            <stop offset="40%" stop-color="#c084fc" stop-opacity=".85"/>
            <stop offset="100%" stop-color="#7b2fff" stop-opacity=".4"/>
          </linearGradient>
          <filter id="wgRGlow">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path d="M10,60 C40,20 90,10 150,40 C120,45 90,52 70,60 C90,68 120,75 150,80 C90,110 40,100 10,60Z"
          fill="url(#wgR)" opacity=".55" filter="url(#wgRGlow)"/>
        <path d="M15,58 C50,28 100,18 148,44" stroke="url(#wgR)" stroke-width="1.2" fill="none" opacity=".8"/>
        <path d="M30,50 C60,30 100,24 142,46" stroke="rgba(255,215,0,.6)" stroke-width=".8" fill="none"/>
        <path d="M22,65 C52,50 88,48 138,58" stroke="rgba(192,132,252,.7)" stroke-width=".8" fill="none"/>
        <path d="M30,72 C58,68 86,68 134,72" stroke="url(#wgR)" stroke-width=".8" fill="none" opacity=".7"/>
        <path d="M40,80 C64,80 90,80 130,78" stroke="rgba(255,215,0,.5)" stroke-width=".8" fill="none"/>
        <circle cx="10" cy="60" r="3.5" fill="#ffd700" opacity=".95">
          <animate attributeName="r" values="3.5;5.5;3.5" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".95;1;.95" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="10" cy="60" r="7" fill="none" stroke="rgba(255,215,0,.5)" stroke-width="1">
          <animate attributeName="r" values="7;13;7" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".5;0;.5" dur="2s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
  </div>
</div>

<!-- ══ 소형 뱃지 ══ -->
<div class="badge-wrap">
  <div class="section-title">◈ &nbsp; 카드 헤더 뱃지 &nbsp; ◈</div>
  <div class="logo-badge">
    <div class="badge-border"></div>
    <div class="badge-glow"></div>
    <div class="badge-shine"></div>
    <!-- 왼쪽 소형 날개 -->
    <div class="wing-sm wing-sm-left">
      <svg width="52" height="36" viewBox="0 0 52 36">
        <defs>
          <linearGradient id="wSmL" x1="1" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffd700" stop-opacity=".9"/>
            <stop offset="100%" stop-color="#7b2fff" stop-opacity=".5"/>
          </linearGradient>
        </defs>
        <path d="M48,18 C36,4 16,2 2,12 C14,14 24,16 30,18 C24,20 14,22 2,24 C16,34 36,32 48,18Z"
          fill="url(#wSmL)" opacity=".6"/>
        <path d="M46,17 C32,7 16,5 4,13" stroke="rgba(255,215,0,.7)" stroke-width=".8" fill="none"/>
        <path d="M44,20 C30,16 18,16 6,20" stroke="rgba(192,132,252,.6)" stroke-width=".7" fill="none"/>
        <circle cx="48" cy="18" r="2" fill="#ffd700" opacity=".9">
          <animate attributeName="r" values="2;3.5;2" dur="2s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
    <div class="badge-text">ALGO</div>
    <!-- 오른쪽 소형 날개 -->
    <div class="wing-sm wing-sm-right">
      <svg width="52" height="36" viewBox="0 0 52 36">
        <defs>
          <linearGradient id="wSmR" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffd700" stop-opacity=".9"/>
            <stop offset="100%" stop-color="#7b2fff" stop-opacity=".5"/>
          </linearGradient>
        </defs>
        <path d="M4,18 C16,4 36,2 50,12 C38,14 28,16 22,18 C28,20 38,22 50,24 C36,34 16,32 4,18Z"
          fill="url(#wSmR)" opacity=".6"/>
        <path d="M6,17 C20,7 36,5 48,13" stroke="rgba(255,215,0,.7)" stroke-width=".8" fill="none"/>
        <path d="M8,20 C22,16 34,16 46,20" stroke="rgba(192,132,252,.6)" stroke-width=".7" fill="none"/>
        <circle cx="4" cy="18" r="2" fill="#ffd700" opacity=".9">
          <animate attributeName="r" values="2;3.5;2" dur="2s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
