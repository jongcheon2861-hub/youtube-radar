<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTAnalytics Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-AF8853448" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-primary:#0f0f1a; --bg-secondary:#1a1a2e; --bg-card:#1e1e2e; --bg-hover:#252535;
      --accent:#ff4757; --accent2:#ffa502; --accent3:#2ed573; --accent4:#1e90ff;
      --text-primary:#e8e8f0; --text-secondary:#9898b0; --text-muted:#606078;
      --border:#2a2a3e; --gradient:linear-gradient(135deg,#ff4757,#ff6b81);
      --shadow:0 8px 32px rgba(0,0,0,0.4); --radius:12px; --radius-sm:8px;
      --surface: var(--bg-secondary);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
    .header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,15,26,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;cursor:pointer}
    .logo-icon{width:36px;height:36px;background:var(--gradient);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .logo-text{font-size:18px;font-weight:700}
    .logo-text span{color:var(--accent)}
    .api-status{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(46,213,115,0.15);color:var(--accent3);border:1px solid rgba(46,213,115,0.3)}
    .api-status.error{background:rgba(255,71,87,0.15);color:var(--accent);border-color:rgba(255,71,87,0.3)}
    #global-error-banner{display:none;position:fixed;top:60px;left:0;right:0;z-index:99;background:rgba(255,71,87,0.92);color:#fff;padding:10px 24px;font-size:14px;font-weight:500;text-align:center}
    .app-layout{display:flex;padding-top:60px;min-height:100vh}
    .sidebar{width:220px;background:var(--bg-secondary);border-right:1px solid var(--border);padding:20px 12px;position:fixed;top:60px;left:0;bottom:0;overflow-y:auto}
    .nav-section-title{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;padding:0 8px 8px;margin-top:16px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:500;color:var(--text-secondary);transition:all 0.2s;border:none;background:none;width:100%;text-align:left}
    .nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
    .nav-item.active{background:rgba(255,71,87,0.15);color:var(--accent)}
    .nav-item .nav-icon{font-size:18px;width:24px;text-align:center}
    .main-content{margin-left:220px;flex:1;padding:24px;min-width:0}
    .section-page{display:none}
    .section-page.active{display:block}
    .section-header{margin-bottom:24px}
    .section-title{font-size:24px;font-weight:700;display:flex;align-items:center;gap:10px}
    .section-subtitle{font-size:14px;color:var(--text-secondary);margin-top:6px}
    .hot-search-box{display:flex;gap:10px;margin-bottom:16px}
    .hot-search-input{flex:1;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 16px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none}
    .hot-search-input:focus{border-color:var(--accent)}
    .hot-search-btn{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap}
    .cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .cat-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s}
    .cat-btn:hover{border-color:var(--accent);color:var(--accent)}
    .cat-btn.active{background:rgba(255,71,87,0.15);border-color:var(--accent);color:var(--accent)}
    .hot-tab-bar{display:flex;gap:8px;margin-bottom:16px}
    .hot-tab-btn{padding:8px 20px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;font-size:14px;font-weight:500;transition:all 0.2s}
    .hot-tab-btn.active{background:rgba(255,71,87,0.15);border-color:var(--accent);color:var(--accent)}
    .search-result-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:14px;color:var(--text-secondary)}
    .search-clear-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:12px}
    .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:16px}
    .video-card{background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all 0.2s}
    .video-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:var(--shadow)}
    .thumb-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;background:#111}
    .thumb-wrap img{width:100%;height:100%;object-fit:cover}
    .shorts-badge{position:absolute;top:6px;left:6px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
    .duration-badge{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.8);color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
    .video-info{padding:12px}
    .video-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .video-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .video-channel{font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%}
    .video-stats{display:flex;gap:10px;font-size:12px;color:var(--text-secondary)}
    .viral-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
    .viral-badge.hot{background:rgba(255,71,87,0.15);color:var(--accent)}
    .viral-badge.warm{background:rgba(255,165,2,0.15);color:var(--accent2)}
    .viral-badge.cool{background:rgba(46,213,115,0.15);color:var(--accent3)}
    .more-btn{display:none;width:100%;padding:12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-secondary);cursor:pointer;font-size:14px;margin-bottom:16px;transition:all 0.2s}
    .more-btn:hover{border-color:var(--accent);color:var(--accent)}
    .loader-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-data{text-align:center;padding:60px 20px;color:var(--text-secondary)}
    .no-data-icon{font-size:48px;margin-bottom:12px}
    .error-card{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:var(--radius);padding:20px;color:var(--accent)}
    .channel-search-box{display:flex;gap:10px;margin-bottom:24px}
    .search-input{flex:1;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none}
    .search-input:focus{border-color:var(--accent)}
    .search-btn{padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:600}
    .channel-result-card{background:var(--bg-secondary);border-radius:var(--radius);border:1px solid var(--border);padding:24px}
    .channel-header{display:flex;align-items:center;gap:20px;margin-bottom:20px}
    .channel-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover}
    .channel-name{font-size:20px;font-weight:700}
    .channel-handle{font-size:14px;color:var(--text-secondary);margin-top:4px}
    .grade-badge{display:inline-block;padding:4px 16px;border-radius:20px;font-size:14px;font-weight:700;border:2px solid}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:16px}
    .stat-card{background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:16px;text-align:center}
    .stat-value{font-size:22px;font-weight:700;color:var(--accent)}
    .stat-label{font-size:12px;color:var(--text-secondary);margin-top:4px}
    .calc-form{background:var(--bg-secondary);border-radius:var(--radius);border:1px solid var(--border);padding:24px;margin-bottom:24px}
    .form-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:16px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-label{font-size:13px;color:var(--text-secondary);font-weight:500}
    .form-input{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none}
    .form-input:focus{border-color:var(--accent)}
    .calc-btn{padding:12px 28px;background:var(--gradient);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:700}
    .result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
    .result-card{background:var(--bg-secondary);border-radius:var(--radius);border:1px solid var(--border);padding:20px;text-align:center}
    .result-value{font-size:26px;font-weight:700;color:var(--accent2)}
    .result-label{font-size:13px;color:var(--text-secondary);margin-top:6px}
    .ai-form{background:var(--bg-secondary);border-radius:var(--radius);border:1px solid var(--border);padding:24px;margin-bottom:24px}
    .ai-idea-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
    .ai-idea-card{background:var(--bg-secondary);border-radius:var(--radius);border:1px solid var(--border);padding:16px;cursor:pointer;transition:all 0.2s}
    .ai-idea-card:hover{border-color:var(--accent3);transform:translateY(-1px)}
    .ai-idea-title{font-size:14px;font-weight:600;margin-bottom:6px}
    .ai-idea-desc{font-size:12px;color:var(--text-secondary)}

    /* ══════════════════════════════════════════
       도구 섹션 스타일
    ══════════════════════════════════════════ */
    .tool-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .tool-tab {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.2s;
    }
    .tool-tab:hover { border-color: var(--accent4); color: var(--accent4); }
    .tool-tab.active {
      background: rgba(30,144,255,0.15);
      border-color: var(--accent4);
      color: var(--accent4);
    }
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }
    .tool-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .tool-card:hover {
      border-color: var(--accent4);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(30,144,255,0.15);
    }
    .tool-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      object-fit: contain;
      background: var(--bg-card);
      padding: 4px;
    }
    .tool-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .tool-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 0.3px;
    }
    .tb-free     { background: rgba(46,213,115,0.15); color: var(--accent3); border: 1px solid rgba(46,213,115,0.3); }
    .tb-paid     { background: rgba(255,71,87,0.15);  color: var(--accent);  border: 1px solid rgba(255,71,87,0.3); }
    .tb-freemium { background: rgba(255,165,2,0.15);  color: var(--accent2); border: 1px solid rgba(255,165,2,0.3); }

    /* 도구 모달 */
    .tool-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .tool-modal-overlay.open { display: flex; }
    .tool-modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
    }
    .tool-modal-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .tool-modal-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      object-fit: contain;
      background: var(--bg-secondary);
      padding: 6px;
      flex-shrink: 0;
    }
    .tool-modal-name {
      font-size: 20px;
      font-weight: 700;
    }
    .tool-modal-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .tool-modal-link {
      display: inline-block;
      padding: 10px 24px;
      background: var(--accent4);
      color: #fff;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: opacity 0.2s;
    }
    .tool-modal-link:hover { opacity: 0.85; }
    .tool-modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      line-height: 1;
    }
    .tool-modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ══════════════════════════════════════════
       장비 쇼핑 섹션
    ══════════════════════════════════════════ */
    .shop-notice {
      font-size: 0.75rem;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 20px;
      text-align: center;
    }
    .shop-cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .shop-cat-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 28px 16px 22px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    .shop-cat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--cat-color) 0%, transparent 60%);
      opacity: 0.07;
      transition: opacity 0.22s ease;
      border-radius: inherit;
    }
    .shop-cat-card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 12px 32px rgba(0,0,0,0.35), 0 0 0 2px var(--cat-color);
      border-color: var(--cat-color);
    }
    .shop-cat-card:hover::before { opacity: 0.16; }
    .shop-cat-icon {
      font-size: 3rem;
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
      transition: transform 0.22s ease;
    }
    .shop-cat-card:hover .shop-cat-icon { transform: scale(1.15) rotate(-4deg); }
    .shop-cat-label {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .shop-cat-desc {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .shop-cat-cta {
      margin-top: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--cat-color);
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--cat-color);
      border-radius: 20px;
      padding: 5px 16px;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .shop-cat-card:hover .shop-cat-cta {
      background: var(--cat-color);
      color: #fff;
    }
    @media (max-width: 600px) {
      .shop-cat-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .shop-cat-card { padding: 20px 10px 16px; }
      .shop-cat-icon { font-size: 2.2rem; }
      .tool-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }

    /* 기존 모달 */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
    .modal-overlay.open{display:flex}
    .modal{background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);padding:20px 24px 28px;width:96vw;max-width:1400px;margin:auto;display:flex;flex-direction:column;gap:14px}
    .modal-ads-top{width:100%;min-height:90px;background:rgba(255,255,255,0.03);border:1px dashed var(--border);border-radius:var(--radius-sm);overflow:hidden;display:flex;align-items:center;justify-content:center}
    .modal-ads-top ins{display:block;width:100%;min-height:90px}
    .modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .modal-title{font-size:17px;font-weight:700;line-height:1.4;flex:1}
    .modal-close{background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;flex-shrink:0}
    .modal-close:hover{color:var(--text-primary);background:var(--bg-hover)}
    .player-wrap{position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:var(--radius-sm);overflow:hidden}
    .player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:var(--radius-sm)}
    .modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .modal-stat{background:var(--bg-secondary);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px;text-align:center}
    .modal-stat-value{font-size:18px;font-weight:700;color:var(--accent)}
    .modal-stat-label{font-size:11px;color:var(--text-secondary);margin-top:3px}
    .modal-yt-btn{display:inline-block;padding:8px 22px;background:var(--accent);color:#fff;border-radius:20px;font-size:13px;text-decoration:none;font-weight:600;align-self:flex-start}
    @media(max-width:700px){
      .modal{width:100%;max-width:100%;padding:14px 14px 20px}
      .modal-stats{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo" onclick="showSec('hot')">
    <div class="logo-icon">▶</div>
    <div class="logo-text">YT<span>Analytics</span> Pro</div>
  </div>
  <div class="api-status" id="api-status">● API 연결 중</div>
</header>

<div id="global-error-banner"></div>

<div class="app-layout">
  <nav class="sidebar">
    <div class="nav-section-title">탐색</div>
    <button class="nav-item active" data-section="hot" onclick="showSec('hot')"><span class="nav-icon">🔥</span><span>인기영상</span></button>
    <button class="nav-item" data-section="channel" onclick="showSec('channel')"><span class="nav-icon">📊</span><span>채널 분석</span></button>
    <div class="nav-section-title">도구</div>
    <button class="nav-item" data-section="revenue" onclick="showSec('revenue')"><span class="nav-icon">💰</span><span>수익 계산기</span></button>

function fmt(n){
  n=parseInt(n,10)||0;
  if(n>=100_000_000)return(n/100_000_000).toFixed(1).replace(/\.0$/,'')+'억';
  if(n>=10_000)return(n/10_000).toFixed(1).replace(/\.0$/,'')+'만';
  if(n>=1_000)return(n/1_000).toFixed(1).replace(/\.0$/,'')+'천';
  return n.toLocaleString('ko-KR');
}
function parseDurSec(iso){
  if(!iso)return 0;
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return 0;
  return(parseInt(m[1]||0)*3600)+(parseInt(m[2]||0)*60)+parseInt(m[3]||0);
}
function fmtDur(iso){
  const s=parseDurSec(iso);if(!s)return'--:--';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;
}
function viralOf(item){

}
function gradeOf(sub){const n=parseInt(sub||0);return GRADES.find(g=>n>=g.min)||GRADES[GRADES.length-1];}

/* ── 분류 ── */
function hasShortKeyword(item){
  const sn=item.snippet||{};
  const title=(sn.title||'').toLowerCase();
  const desc=(sn.description||'').slice(0,300).toLowerCase();
  const tags=(sn.tags||[]).map(t=>t.toLowerCase());
  const hay=title+' '+desc+' '+tags.join(' ');
  return SHORTS_KEYWORDS.some(kw=>hay.includes(kw));
}
function isShorts(item){
  const sec=parseDurSec(item.contentDetails?.duration||'');
  if(sec<=0)return false;
  return sec<LONGS_MIN_SEC && hasShortKeyword(item);
}
function isLongs(item){
  const sec=parseDurSec(item.contentDetails?.duration||'');
  return sec>=LONGS_MIN_SEC;
}
function hardFilterLongs(arr){
  return arr.filter(item=>parseDurSec(item.contentDetails?.duration||'')>=LONGS_MIN_SEC);
}

/* ── API Fetch ── */
async function apiFetch(url){
  const validKeys=API_KEYS.filter(k=>k&&k.length>20&&!k.startsWith('YOUR_'));
  if(!validKeys.length)throw new Error('유효한 API 키가 없습니다.');
  for(let i=0;i<validKeys.length;i++){
    const k=validKeys[(keyIdx+i)%validKeys.length];
    const sep=url.includes('?')?'&':'?';
    try{
      const r=await fetch(url+sep+'key='+k);
      let data;try{data=await r.json();}catch{data={};}
      if(r.status===403||r.status===429){keyIdx=(keyIdx+i+1)%validKeys.length;continue;}
      if(data.error){
        const code=data.error.code||0,reason=data.error.errors?.[0]?.reason||'';
        if([403,429].includes(code)||['quotaExceeded','keyInvalid','forbidden','dailyLimitExceeded'].includes(reason)){
          keyIdx=(keyIdx+i+1)%validKeys.length;continue;
        }
        if(['invalidSearchFilter','invalidVideoFilter','invalidFilter'].includes(reason)){
          const cleaned=url.replace(/[&?]videoCategoryId=[^&]*/g,'').replace(/[&?]videoDuration=[^&]*/g,'');
          return apiFetch(cleaned);
        }
        throw new Error(`API 오류 [${code}] ${reason}`);
      }
      if(!r.ok)throw new Error('HTTP '+r.status);
      keyIdx=(keyIdx+i)%validKeys.length;
      hideGlobalError();
      return data;
    }catch(e){if(i===validKeys.length-1)throw e;}
  }
  throw new Error('모든 API 키 소진');
}

    btn.onclick=()=>{if(hotSearchMode){clearHotSearch();return;}switchCat(cat);};
    wrap.appendChild(btn);
  });
}
function switchCat(cat){
  activeCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.textContent===cat));
  shortsPage=0;longsPage=0;
  renderHotSplit();
  if(!catShortsCache[cat]&&!catLongCache[cat]){
    showHotLoader();
    loadUntilFull(cat)
      .then(()=>{hideHotLoader();renderHotSplit();})
      .catch(e=>{hideHotLoader();showHotError(e.message);});
  }
}
function showHotLoader(){
  document.getElementById('hot-loader').style.display='block';
  document.getElementById('shorts-grid').innerHTML='';
  document.getElementById('longs-grid').innerHTML='';
  document.getElementById('shorts-more-btn').style.display='none';
  document.getElementById('longs-more-btn').style.display='none';
}
function hideHotLoader(){document.getElementById('hot-loader').style.display='none';}
function showHotError(msg){
  const g=document.getElementById(activeType==='shorts'?'shorts-grid':'longs-grid');

/* ── 인기영상 로드 ── */
async function loadHot(){
  buildCatTabs();showHotLoader();
  try{
    await loadUntilFull(CAT_KEYS[0]);
    hideHotLoader();renderHotSplit();
    for(const k of CAT_KEYS.slice(1))
      if(!catShortsCache[k]&&!catLongCache[k])
        loadUntilFull(k).catch(e=>console.warn('[bg]',k,e.message));
  }catch(err){
    hideHotLoader();
    showGlobalError('인기영상 로드 실패: '+err.message);
    showHotError(err.message);
  }
}
async function loadUntilFull(cat){
  const cfg=CAT_CFG[cat];if(!cfg)return;
  let shorts=[],longs=[];
  if(cfg.categoryId){
    try{
      const d=await apiFetch(
        `https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics`+
        `&chart=mostPopular&regionCode=KR&hl=ko&maxResults=50`+
        `&videoCategoryId=${cfg.categoryId}`
      );
      (d.items||[]).forEach(it=>{
        if(!matchesCat(it,cat))return;
        if(isShorts(it))     shorts.push(it);
        else if(isLongs(it)) longs.push(it);
      });
    }catch(e){console.warn('[mostPopular]',cat,e.message);}
  }
  if(shorts.length<12){
    for(const kw of cfg.shortsKw||[]){
      if(shorts.length>=24)break;
      try{
        const r=await apiFetch(
          `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video`+
          `&regionCode=KR&relevanceLanguage=ko`+
          `&q=${encodeURIComponent(kw)}&maxResults=30&order=viewCount`
        );
        const ids=(r.items||[]).map(i=>i.id?.videoId).filter(Boolean);
        if(ids.length){
          const d=await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&id=${ids.join(',')}`);
          (d.items||[]).forEach(it=>{
            if(matchesCat(it,cat)&&isShorts(it)&&!shorts.find(s=>s.id===it.id))
              shorts.push(it);
          });
        }
      }catch(e){console.warn('[쇼츠보완]',kw,e.message);}
    }
  }
  if(longs.length<12){
    for(const kw of cfg.longsKw||[]){
      if(longs.length>=24)break;
      try{
        const r=await apiFetch(
          `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video`+
          `&regionCode=KR&relevanceLanguage=ko`+
          `&q=${encodeURIComponent(kw)}&maxResults=30&order=viewCount`
        );
        const ids=(r.items||[]).map(i=>i.id?.videoId).filter(Boolean);
        if(ids.length){
          const d=await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&id=${ids.join(',')}`);
          (d.items||[]).forEach(it=>{
            if(matchesCat(it,cat)&&isLongs(it)&&!longs.find(l=>l.id===it.id))
              longs.push(it);
          });
        }
      }catch(e){console.warn('[롱폼보완]',kw,e.message);}
    }
  }
  const byViral=arr=>arr.slice().sort((a,b)=>viralOf(b)-viralOf(a));
  catShortsCache[cat]=byViral(shorts);
  catLongCache[cat]=byViral(hardFilterLongs(longs));
}

/* ── 검색 ── */
async function doHotSearch(){
  const q=document.getElementById('hot-kw-input').value.trim();
  if(!q){clearHotSearch();return;}
  hotSearchMode=true;hotSearchQuery=q;
  searchShortsPage=0;searchLongsPage=0;searchShorts=[];searchLongs=[];
  document.getElementById('search-result-header').style.display='flex';
  document.getElementById('search-kw-label').textContent=`"${q}"`;
  document.querySelectorAll('.cat-btn').forEach(b=>{b.classList.remove('active');b.style.opacity='0.4';});
  showHotLoader();
  try{
    const fetchIds=async(durParam)=>{
      const r=await apiFetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video`+
        `&videoDuration=${durParam}&regionCode=KR&relevanceLanguage=ko`+
        `&q=${encodeURIComponent(q)}&maxResults=50&order=viewCount`
      );
      return(r.items||[]).map(i=>i.id?.videoId).filter(Boolean);
    };
    const[sIds,mIds,lIds]=await Promise.all([
      fetchIds('short'),fetchIds('medium'),fetchIds('long'),
    ]);
    const allIds=[...new Set([...sIds,...mIds,...lIds])];
    const collected=[];
    for(let i=0;i<allIds.length;i+=50){
      const chunk=allIds.slice(i,i+50);
      try{
        const d=await apiFetch(
          `https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&id=${chunk.join(',')}`
        );
        (d.items||[]).forEach(v=>collected.push(v));
      }catch(e){console.warn('[search detail]',e.message);}
    }
    collected.forEach(item=>{
      if(isShorts(item))     searchShorts.push(item);
      else if(isLongs(item)) searchLongs.push(item);
    });
    const byViral=arr=>arr.sort((a,b)=>viralOf(b)-viralOf(a));
    searchShorts=byViral(searchShorts);
    searchLongs=byViral(hardFilterLongs(searchLongs));
    hideHotLoader();
    renderSearchResult();
  }catch(e){
    hideHotLoader();
    showHotError(e.message);
    showGlobalError('검색 실패: '+e.message);
  }
}

function renderSearchResult(){

  if(activeType==='shorts'){

      sm.style.display='none';

      sg.innerHTML=sl.map(v=>makeVideoCard(v,'shorts')).join('');

      lg.innerHTML=sl.map(v=>makeVideoCard(v,'longs')).join('');
      lm.style.display=sl.length<safeLongs.length?'block':'none';
    }
  }
}
function clearHotSearch(){
  hotSearchMode=false;hotSearchQuery='';searchShorts=[];searchLongs=[];
  searchShortsPage=0;searchLongsPage=0;
  document.getElementById('hot-kw-input').value='';
  document.getElementById('search-result-header').style.display='none';

    b.style.opacity='';

  });

}
function renderHotSplit(){
  if(hotSearchMode){renderSearchResult();return;}
  const sg=document.getElementById('shorts-grid'),lg=document.getElementById('longs-grid');
  const sm=document.getElementById('shorts-more-btn'),lm=document.getElementById('longs-more-btn');
  const sl=catShortsCache[activeCat]||[];

      lg.innerHTML=`<div class="no-data" style="grid-column:1/-1"><div class="no-data-icon">📹</div><h3>롱폼 데이터 없음</h3></div>`;

      const s=ll.slice(0,(longsPage+1)*PAGE);
      lg.innerHTML=s.map(v=>makeVideoCard(v,'longs')).join('');

}
function loadMoreShorts(){if(hotSearchMode){searchShortsPage++;renderSearchResult();}else{shortsPage++;renderHotSplit();}}
function loadMoreLongs(){if(hotSearchMode){searchLongsPage++;renderSearchResult();}else{longsPage++;renderHotSplit();}}

/* ── 카드 ── */
function makeVideoCard(item,type){
  const sn=item.snippet||{},st=item.statistics||{},cd=item.contentDetails||{};
  const vid=item.id,title=sn.title||'제목 없음',ch=sn.channelTitle||'';
  const thumb=sn.thumbnails?.medium?.url||sn.thumbnails?.default?.url||'';
  const dur=fmtDur(cd.duration);
  const views=st.viewCount!=null?fmt(st.viewCount):'-';
  const likes=st.likeCount!=null?fmt(st.likeCount):'-';
  const viral=viralOf(item);
  const vc=viral>5_000_000?'hot':viral>500_000?'warm':'cool';
  const vl=viral>5_000_000?'🔥 핫':viral>500_000?'🌡️ 상승':'📈 주목';
  const safeTitle=title.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return`
    <div class="video-card" onclick="openVideoModal('${vid}')">
      <div class="thumb-wrap">
        <img src="${thumb}" alt="${safeTitle}" loading="lazy"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 320 180%22><rect fill=%22%23222%22 width=%22320%22 height=%22180%22/><text fill=%22%23666%22 x=%22160%22 y=%2295%22 text-anchor=%22middle%22 font-size=%2224%22>▶</text></svg>'" />
        ${type==='shorts'?'<span class="shorts-badge">Shorts</span>':''}
        <span class="duration-badge">${dur}</span>
      </div>
      <div class="video-info">
        <div class="video-title">${title}</div>
        <div class="video-meta">
          <span class="video-channel">${ch}</span>
          <span class="viral-badge ${vc}">${vl}</span>
        </div>
        <div class="video-stats"><span>👁 ${views}</span><span>👍 ${likes}</span></div>
      </div>
    </div>`;
}

/* ── 수익 계산기 ── */
function calcRevenue(){
  const views=parseInt(document.getElementById('rev-views').value)||0;
  const rpm=parseFloat(document.getElementById('rev-cat').value)||1.5;
  const ctr=parseFloat(document.getElementById('rev-ctr').value)||5;
  const imp=views*(ctr/100),mon=(imp/1000)*rpm,yr=mon*12;
  const per=views>0?(mon/views*1000).toFixed(4):0;
  document.getElementById('rev-result').innerHTML=`
    <div class="result-card"><div class="result-value">$${mon.toFixed(0)}</div><div class="result-label">월 예상 수익</div></div>
    <div class="result-card"><div class="result-value">$${yr.toFixed(0)}</div><div class="result-label">연 예상 수익</div></div>
    <div class="result-card"><div class="result-value">${fmt(Math.round(imp))}</div><div class="result-label">월 광고 노출</div></div>
    <div class="result-card"><div class="result-value">$${per}</div><div class="result-label">1K뷰 수익</div></div>`;
}

let currentToolCat = Object.keys(TOOLS_DATA)[0];

function renderTools(){
  /* 탭 렌더 */
  document.getElementById('toolTabs').innerHTML = Object.keys(TOOLS_DATA).map(k =>
    `<button class="tool-tab${k === currentToolCat ? ' active' : ''}"
             onclick="selectToolCat('${k}')">${k}</button>`
  ).join('');

  /* 카드 렌더 */
  const tools = TOOLS_DATA[currentToolCat] || [];
  document.getElementById('toolGrid').innerHTML = tools.map(t => {
    const domain = new URL(t.url).hostname;
    const icon   = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=64`;
    const esc    = s => s.replace(/'/g, "\\'");
    return `
      <div class="tool-card"
           onclick="openToolModal('${esc(t.name)}','${t.url}','${esc(t.desc)}','${t.tag}')">
        <img class="tool-icon" src="${icon}" alt="${t.name}"
             onerror="this.style.background='var(--bg-card)'" />
        <div class="tool-name">${t.name}</div>
        <span class="tool-badge tb-${t.tag}">
          ${t.tag === 'free' ? '무료' : t.tag === 'paid' ? '유료' : '무료+유료'}
        </span>
      </div>`;
  }).join('');
}

function selectToolCat(cat){
  currentToolCat = cat;
  renderTools();
}

function openToolModal(name, url, desc, tag){
  const domain = new URL(url).hostname;
  document.getElementById('tmIcon').src = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=64`;
  document.getElementById('tmName').textContent = name;
  document.getElementById('tmDesc').textContent = desc;
  document.getElementById('tmLink').href = url;
  document.getElementById('toolModal').classList.add('open');
}

      shortsPage = 0; longsPage = 0; searchShortsPage = 0; searchLongsPage = 0;

  });

  document.getElementById('modal-close-btn').addEventListener('click', closeVideoModal);

  });

  /* 도구 모달 배경 클릭 닫기 */

});
