<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX 카드 샘플 5종</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070f;--text:#e8e8f0;--sub:#7777aa;}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;padding:48px 24px 80px;
}
.page-title{
  text-align:center;font-size:1.8rem;font-weight:900;
  color:#e8e8f0;margin-bottom:8px;letter-spacing:.04em;
}
.page-sub{text-align:center;color:var(--sub);font-size:.88rem;margin-bottom:60px;}
.samples-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:80px 40px;padding:40px 20px 60px;
  max-width:1300px;margin:0 auto;
}
.sample-label{
  text-align:center;margin-top:16px;
  font-size:.78rem;font-weight:700;letter-spacing:.08em;
  color:var(--sub);
}

/* ══════════════════════════════════════
   공통 카드 구조
══════════════════════════════════════ */
.card-scene{
  width:220px;height:308px;
  perspective:900px;position:relative;cursor:pointer;
}
.card-tilt{
  position:absolute;inset:0;
  transform-style:preserve-3d;
  transform:rotateX(0deg) rotateY(0deg);
  transition:transform .1s ease;
  will-change:transform;
}
.card-frame{
  position:absolute;inset:-3px;border-radius:21px;
  z-index:1;pointer-events:none;
}
.card-frame::after{
  content:'';position:absolute;inset:2px;
  border-radius:19px;background:var(--bg);
}
.beam-container{
  position:absolute;inset:-3px;border-radius:21px;
  overflow:hidden;z-index:2;pointer-events:none;
}
.beam-ring{
  position:absolute;width:400%;height:400%;
  top:50%;left:50%;margin-top:-200%;margin-left:-200%;
  animation:beamRingSpin var(--beam-speed,3s) linear infinite;
  transform-origin:center center;
}
@keyframes beamRingSpin{from{rotate:0deg;}to{rotate:360deg;}}
.card-body{
  position:absolute;inset:0;border-radius:18px;z-index:3;
  transition:box-shadow .3s ease;
}
.card-face{
  position:absolute;inset:0;border-radius:18px;overflow:hidden;
}
.card-face::before{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:repeating-linear-gradient(
    -45deg,transparent 0px,transparent 3px,
    rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px);
  pointer-events:none;z-index:1;
}
.card-shine{
  position:absolute;inset:0;border-radius:18px;
  pointer-events:none;z-index:5;mix-blend-mode:screen;
}
.card-top-band{
  position:absolute;top:0;left:0;right:0;height:44%;
  border-radius:18px 18px 0 0;z-index:2;pointer-events:none;
}
.card-bot-band{
  position:absolute;bottom:0;left:0;right:0;height:40%;
  border-radius:0 0 18px 18px;z-index:2;pointer-events:none;
}
.card-header{
  position:absolute;top:0;left:0;right:0;padding:13px 14px 0;
  display:flex;justify-content:space-between;align-items:flex-start;z-index:10;
}
.card-stars{display:flex;gap:2px;}
.card-star{font-size:13px;animation:starTwinkle var(--st-dur,3s) ease-in-out infinite;animation-delay:var(--st-del,0s);}
@keyframes starTwinkle{0%,100%{opacity:.55;transform:scale(.88);}50%{opacity:1;transform:scale(1.15);}}
.card-badge{
  color:#fff;padding:4px 11px;border-radius:8px;
  font-size:10px;font-weight:900;letter-spacing:.09em;
  box-shadow:0 2px 10px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.2);
}
.card-bokeh{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden;border-radius:18px;}
.bokeh-dot{
  position:absolute;border-radius:50%;
  filter:blur(var(--bblur,5px));opacity:var(--bop,.35);
  animation:bokehDrift var(--bdur,7s) ease-in-out infinite;
  animation-delay:var(--bdel,0s);
}
@keyframes bokehDrift{
  0%,100%{transform:translate(0,0) scale(1);}
  25%{transform:translate(7px,-9px) scale(1.12);}
  50%{transform:translate(-6px,7px) scale(.91);}
  75%{transform:translate(9px,4px) scale(1.06);}
}
.card-sparkles{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:hidden;border-radius:18px;}
.sparkle-dot{
  position:absolute;font-size:var(--ssz,11px);
  animation:sparklePop var(--sdur,2.2s) ease-in-out infinite;
  animation-delay:var(--sdel,0s);
}
@keyframes sparklePop{
  0%,100%{opacity:.08;transform:scale(.45) rotate(-12deg);}
  40%{opacity:1;transform:scale(1.25) rotate(12deg);}
  65%{opacity:.75;transform:scale(1.05) rotate(5deg);}
}
.card-icon-wrap{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-54%);z-index:8;
  display:flex;flex-direction:column;align-items:center;gap:9px;
}
.card-main-icon{
  font-size:3.5rem;
  animation:iconHover 3.5s ease-in-out infinite;
}
@keyframes iconHover{
  0%,100%{transform:translateY(0) rotateY(0deg);}
  30%{transform:translateY(-7px) rotateY(9deg);}
  70%{transform:translateY(-3px) rotateY(-6deg);}
}
.card-main-name{
  font-size:1.06rem;font-weight:900;
  letter-spacing:.06em;
}
.card-vignette{
  position:absolute;inset:0;z-index:6;pointer-events:none;border-radius:18px;
  background:radial-gradient(ellipse at center,transparent 28%,rgba(4,4,12,.62) 100%);
}
.card-footer{
  position:absolute;bottom:0;left:0;right:0;padding:11px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:10;border-radius:0 0 18px 18px;
}
.footer-lv{
  font-size:10px;font-weight:900;
  background:rgba(0,0,0,.32);padding:3px 9px;border-radius:6px;
  letter-spacing:.07em;
}
.footer-name{font-size:13px;font-weight:800;}
.footer-subs{font-size:10px;opacity:.7;}

/* ══════════════════════════════════════
   A. 골드/샴페인 — 황금빛 왕관
══════════════════════════════════════ */
.card-A .card-frame{
  background:linear-gradient(135deg,
    #b8860b,#ffd700,#fffacd,#ffd700,#b8860b,#8b6914);
  background-size:300% 300%;
  animation:goldShift 3s ease-in-out infinite;
}
@keyframes goldShift{
  0%  {background-position:0% 50%;  filter:brightness(1.4) saturate(1.3);}
  50% {background-position:100% 50%;filter:brightness(1.8) saturate(1.5);}
  100%{background-position:0% 50%;  filter:brightness(1.4) saturate(1.3);}
}
.card-A .beam-ring{
  background:conic-gradient(
    from 0deg,
    transparent 0%,#8b6914 2%,#ffd700 4%,#fffacd 5.5%,#ffd700 7%,#8b6914 9%,
    transparent 11%,transparent 100%);
  animation:beamRingSpin 3s linear infinite, goldBeam 2s ease-in-out infinite;
}
@keyframes goldBeam{
  0%,100%{filter:brightness(1.5) saturate(1.4);}
  50%    {filter:brightness(2.2) saturate(1.8);}
}
.card-A .card-body{
  box-shadow:
    0 25px 65px rgba(0,0,0,.75),
    0 0 55px rgba(255,200,0,.45),
    0 0 100px rgba(255,160,0,.25),
    0 0 0 1px rgba(255,215,0,.4);
  animation:goldGlow 2.5s ease-in-out infinite;
}
@keyframes goldGlow{
  0%,100%{box-shadow:0 25px 65px rgba(0,0,0,.75),0 0 45px rgba(255,200,0,.4),0 0 80px rgba(255,160,0,.2),0 0 0 1px rgba(255,215,0,.35);}
  50%    {box-shadow:0 25px 65px rgba(0,0,0,.75),0 0 70px rgba(255,215,0,.6),0 0 130px rgba(255,180,0,.35),0 0 0 1px rgba(255,215,0,.55);}
}
.card-A .card-face{
  background:
    radial-gradient(ellipse 75% 60% at 50% 40%,rgba(255,200,50,.18) 0%,transparent 70%),
    linear-gradient(160deg,#1a1200 0%,#0d0900 50%,#1a1000 100%);
}
.card-A .card-top-band{background:linear-gradient(180deg,rgba(255,215,0,.35) 0%,transparent 100%);}
.card-A .card-bot-band{background:linear-gradient(0deg,rgba(255,180,0,.3) 0%,transparent 100%);}
.card-A .card-badge{background:linear-gradient(135deg,#8b6914,#ffd700,#8b6914);color:#1a0f00;}
.card-A .card-star{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,1),0 0 20px rgba(255,180,0,.7);}
.card-A .bokeh-dot{background:radial-gradient(circle,rgba(255,215,0,.8) 0%,transparent 70%);}
.card-A .sparkle-dot{color:#ffd700;text-shadow:0 0 8px #ffd700,0 0 20px rgba(255,180,0,.8);}
.card-A .card-main-icon{filter:drop-shadow(0 0 16px #ffd700) drop-shadow(0 0 36px rgba(255,180,0,.7)) drop-shadow(0 5px 18px rgba(0,0,0,.6));}
.card-A .card-main-name{
  background:linear-gradient(90deg,#8b6914,#ffd700,#fffacd,#ffd700,#8b6914);
  background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:goldNameSlide 2s linear infinite;
  filter:brightness(1.3);
}
@keyframes goldNameSlide{to{background-position:200% center;}}
.card-A .card-shine{
  background:linear-gradient(135deg,rgba(255,215,0,.15) 0%,rgba(255,215,0,.05) 35%,transparent 60%),
             linear-gradient(225deg,rgba(255,240,180,.1) 0%,transparent 50%);
}
.card-A .card-footer{
  background:linear-gradient(135deg,#1a1200 0%,#2d1f00 100%);
  border-top:1px solid rgba(255,215,0,.3);
}
.card-A .footer-lv{color:#ffd700;border:1px solid rgba(255,215,0,.4);}
.card-A .footer-name{color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,.7);}
.card-A .footer-subs{color:rgba(255,215,0,.55);}

/* ══════════════════════════════════════
   B. 다크 플래티넘 — 냉철한 은빛
══════════════════════════════════════ */
.card-B .card-frame{
  background:linear-gradient(135deg,
    #2a2a2a,#aaa,#fff,#ccc,#555,#aaa);
  background-size:300% 300%;
  animation:platShift 3s ease-in-out infinite;
}
@keyframes platShift{
  0%  {background-position:0% 50%;  filter:brightness(1.3);}
  50% {background-position:100% 50%;filter:brightness(1.8);}
  100%{background-position:0% 50%;  filter:brightness(1.3);}
}
.card-B .beam-ring{
  background:conic-gradient(
    from 0deg,
    transparent 0%,#444 2%,#aaa 4%,#fff 5.5%,#aaa 7%,#444 9%,
    transparent 11%,transparent 100%);
  animation:beamRingSpin 2.8s linear infinite;filter:brightness(1.6);
}
.card-B .card-body{
  box-shadow:
    0 25px 65px rgba(0,0,0,.8),
    0 0 50px rgba(180,180,220,.3),
    0 0 90px rgba(150,150,200,.15),
    0 0 0 1px rgba(200,200,255,.25);
  animation:platGlow 3s ease-in-out infinite;
}
@keyframes platGlow{
  0%,100%{box-shadow:0 25px 65px rgba(0,0,0,.8),0 0 40px rgba(180,180,220,.28),0 0 0 1px rgba(200,200,255,.22);}
  50%    {box-shadow:0 25px 65px rgba(0,0,0,.8),0 0 65px rgba(200,200,255,.42),0 0 0 1px rgba(220,220,255,.38);}
}
.card-B .card-face{
  background:
    radial-gradient(ellipse 75% 60% at 50% 40%,rgba(200,210,255,.12) 0%,transparent 70%),
    linear-gradient(160deg,#0e0e14 0%,#080810 50%,#0e0e14 100%);
}
.card-B .card-top-band{background:linear-gradient(180deg,rgba(200,210,255,.22) 0%,transparent 100%);}
.card-B .card-bot-band{background:linear-gradient(0deg,rgba(180,190,240,.18) 0%,transparent 100%);}
.card-B .card-badge{background:linear-gradient(135deg,#1a1a2e,#4a4a6a,#8888aa);color:#dde;}
.card-B .card-star{color:#c8d0ff;text-shadow:0 0 6px rgba(180,190,255,.9),0 0 16px rgba(160,170,240,.6);}
.card-B .bokeh-dot{background:radial-gradient(circle,rgba(200,210,255,.75) 0%,transparent 70%);}
.card-B .sparkle-dot{color:#c8d0ff;text-shadow:0 0 8px #c8d0ff,0 0 20px rgba(180,190,255,.7);}
.card-B .card-main-icon{filter:drop-shadow(0 0 14px #c8d0ff) drop-shadow(0 0 32px rgba(180,190,255,.6)) drop-shadow(0 5px 18px rgba(0,0,0,.6));}
.card-B .card-main-name{
  background:linear-gradient(90deg,#666,#bbb,#fff,#bbb,#666);
  background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:platNameSlide 2.5s linear infinite;
}
@keyframes platNameSlide{to{background-position:200% center;}}
.card-B .card-shine{
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,rgba(200,210,255,.06) 35%,transparent 60%),
             linear-gradient(225deg,rgba(255,255,255,.09) 0%,transparent 50%);
}
.card-B .card-footer{
  background:linear-gradient(135deg,#0a0a14 0%,#14142a 100%);
  border-top:1px solid rgba(180,190,255,.2);
}
.card-B .footer-lv{color:#c8d0ff;border:1px solid rgba(180,190,255,.3);}
.card-B .footer-name{color:#dde4ff;text-shadow:0 0 10px rgba(180,190,255,.6);}
.card-B .footer-subs{color:rgba(180,190,255,.5);}

/* ══════════════════════════════════════
   C. 딥 퍼플 + 골드 — 왕족의 위엄
══════════════════════════════════════ */
.card-C .card-frame{
  background:linear-gradient(135deg,
    #1a0030,#7b2fff,#c084fc,#ffd700,#c084fc,#7b2fff,#1a0030);
  background-size:300% 300%;
  animation:royalShift 2.5s ease-in-out infinite;
}
@keyframes royalShift{
  0%  {background-position:0% 50%;  filter:brightness(1.4) saturate(1.4);}
  50% {background-position:100% 50%;filter:brightness(1.9) saturate(1.7);}
  100%{background-position:0% 50%;  filter:brightness(1.4) saturate(1.4);}
}
.card-C .beam-ring{
  background:conic-gradient(
    from 0deg,
    transparent 0%,#3d007a 2%,#9b40ff 4%,#ffd700 5.5%,#9b40ff 7%,#3d007a 9%,
    transparent 11%,transparent 100%);
  animation:beamRingSpin 2.5s linear infinite;filter:brightness(1.7) saturate(1.5);
}
.card-C .card-body{
  box-shadow:
    0 25px 65px rgba(0,0,0,.8),
    0 0 60px rgba(123,47,255,.5),
    0 0 110px rgba(123,47,255,.25),
    0 0 0 1px rgba(192,132,252,.4);
  animation:royalGlow 2.5s ease-in-out infinite;
}
@keyframes royalGlow{
  0%,100%{box-shadow:0 25px 65px rgba(0,0,0,.8),0 0 50px rgba(123,47,255,.4),0 0 90px rgba(123,47,255,.2),0 0 0 1px rgba(192,132,252,.35);}
  50%    {box-shadow:0 25px 65px rgba(0,0,0,.8),0 0 80px rgba(150,80,255,.6),0 0 140px rgba(123,47,255,.35),0 0 0 1px rgba(220,160,255,.55);}
}
.card-C .card-face{
  background:
    radial-gradient(ellipse 70% 55% at 50% 38%,rgba(140,60,255,.22) 0%,transparent 70%),
    radial-gradient(ellipse 40% 30% at 50% 38%,rgba(255,215,0,.08) 0%,transparent 60%),
    linear-gradient(160deg,#0d0018 0%,#060010 50%,#0d0018 100%);
}
.card-C .card-top-band{background:linear-gradient(180deg,rgba(155,64,255,.4) 0%,transparent 100%);}
.card-C .card-bot-band{background:linear-gradient(0deg,rgba(123,47,255,.35) 0%,transparent 100%);}
.card-C .card-badge{
  background:linear-gradient(135deg,#3d007a,#9b40ff,#ffd700);
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);
}
.card-C .card-star{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,1),0 0 20px rgba(200,100,255,.7);}
.card-C .bokeh-dot{background:radial-gradient(circle,rgba(180,100,255,.8) 0%,transparent 70%);}
.card-C .sparkle-dot{color:#ffd700;text-shadow:0 0 8px #ffd700,0 0 20px rgba(180,100,255,.9);}
.card-C .card-main-icon{filter:drop-shadow(0 0 16px #9b40ff) drop-shadow(0 0 36px rgba(123,47,255,.7)) drop-shadow(0 0 8px #ffd700) drop-shadow(0 5px 18px rgba(0,0,0,.6));}
.card-C .card-main-name{
  background:linear-gradient(90deg,#c084fc,#ffd700,#fff,#ffd700,#c084fc);
  background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:royalNameSlide 2s linear infinite;filter:brightness(1.2);
}
@keyframes royalNameSlide{to{background-position:200% center;}}
.card-C .card-shine{
  background:linear-gradient(135deg,rgba(200,150,255,.14) 0%,rgba(255,215,0,.06) 35%,transparent 60%),
             linear-gradient(225deg,rgba(180,100,255,.09) 0%,transparent 50%);
}
.card-C .card-footer{
  background:linear-gradient(135deg,#0d0018 0%,#1a0035 100%);
  border-top:1px solid rgba(180,100,255,.3);
}
.card-C .footer-lv{color:#c084fc;border:1px solid rgba(180,100,255,.4);}
.card-C .footer-name{color:#e0b0ff;text-shadow:0 0 10px rgba(180,100,255,.7);}
.card-C .footer-subs{color:rgba(192,132,252,.55);}

/* ══════════════════════════════════════
   D. 블랙 + 시안 — 사이버 엘리트
══════════════════════════════════════ */
.card-D .card-frame{
  background:linear-gradient(135deg,
    #001a1a,#00ffff,#00cccc,#fff,#00cccc,#00ffff,#001a1a);
  background-size:300% 300%;
  animation:cyanShift 2.5s ease-in-out infinite;
}

  50% {background-position:100% 50%;filter:brightness(1.9) saturate(1.7);}

}
.card-D .beam-ring{
  background:conic-gradient(
    from 0deg,
    transparent 0%,#003333 2%,#00aaaa 4%,#00ffff 5.5%,#ffffff 6.5%,#00aaaa 8%,
    transparent 10%,transparent 100%);
  animation:beamRingSpin 2.2s linear infinite;filter:brightness(1.8) saturate(1.5);
}
.card-D .card-body{
  box-shadow:
    0 25px 65px rgba(0,0,0,.85),
    0 0 55px rgba(0,255,255,.4),
    0 0 100px rgba(0,200,200,.2),
    0 0 0 1px rgba(0,255,255,.35);
  animation:cyanGlow 2.2s ease-in-out infinite;
}
@keyframes cyanGlow{
  0%,100%{box-shadow:0 25px 65px rgba(0,0,0,.85),0 0 45px rgba(0,220,220,.35),0 0 80px rgba(0,180,180,.18),0 0 0 1px rgba(0,255,255,.3);}
  50%    {box-shadow:0 25px 65px rgba(0,0,0,.85),0 0 75px rgba(0,255,255,.55),0 0 130px rgba(0,200,200,.3),0 0 0 1px rgba(0,255,255,.5);}
}
.card-D .card-face{

}
.card-D .card-top-band{background:linear-gradient(180deg,rgba(0,255,255,.3) 0%,transparent 100%);}
.card-D .card-bot-band{background:linear-gradient(0deg,rgba(0,200,200,.25) 0%,transparent 100%);}
.card-D .card-badge{background:linear-gradient(135deg,#001a1a,#006666,#00cccc);color:#00ffff;}
.card-D .card-star{color:#00ffff;text-shadow:0 0 8px rgba(0,255,255,1),0 0 20px rgba(0,200,200,.7);}
.card-D .bokeh-dot{background:radial-gradient(circle,rgba(0,255,255,.75) 0%,transparent 70%);}
.card-D .sparkle-dot{color:#00ffff;text-shadow:0 0 8px #00ffff,0 0 20px rgba(0,200,200,.9);}
.card-D .card-main-icon{filter:drop-shadow(0 0 16px #00ffff) drop-shadow(0 0 36px rgba(0,200,200,.7)) drop-shadow(0 5px 18px rgba(0,0,0,.6));}
.card-D .card-main-name{
  background:linear-gradient(90deg,#006666,#00cccc,#fff,#00cccc,#006666);
  background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:cyanNameSlide 2s linear infinite;
}
@keyframes cyanNameSlide{to{background-position:200% center;}}
.card-D .card-shine{
  background:linear-gradient(135deg,rgba(0,255,255,.12) 0%,rgba(0,200,200,.05) 35%,transparent 60%),
             linear-gradient(225deg,rgba(0,255,255,.08) 0%,transparent 50%);
}
.card-D .card-footer{
  background:linear-gradient(135deg,#001212 0%,#002222 100%);
  border-top:1px solid rgba(0,255,255,.25);
}
.card-D .footer-lv{color:#00ffff;border:1px solid rgba(0,255,255,.35);}
.card-D .footer-name{color:#00ffff;text-shadow:0 0 10px rgba(0,200,200,.7);}
.card-D .footer-subs{color:rgba(0,200,200,.5);}

/* ══════════════════════════════════════
   E. 딥 네이비 + 골드 — 클래식 프리미엄
══════════════════════════════════════ */
.card-E .card-frame{
  background:linear-gradient(135deg,
    #0a0a2e,#1a237e,#ffd700,#fffacd,#ffd700,#1a237e,#0a0a2e);

function buildSampleCard(s){
  const stars = Array.from({length:5},(_,i)=>
    `<span class="card-star" style="--st-dur:${2+i*.4}s;--st-del:${i*.2}s;">★</span>`
  ).join('');

  const bokeh = s.bokeh.map((b,i)=>
    `<div class="bokeh-dot" style="width:${b.w}px;height:${b.h}px;left:${b.l}%;top:${b.t}%;--bblur:${b.blur}px;--bop:${b.op};--bdur:${b.dur}s;--bdel:${b.del}s;"></div>`
  ).join('');

  const sparkles = s.sparkles.map(sp=>
    `<span class="sparkle-dot" style="left:${sp.l}%;top:${sp.t}%;--ssz:${sp.sz}px;--sdur:${sp.dur};--sdel:${sp.del};">✦</span>`
  ).join('');

  return `
<div style="display:flex;flex-direction:column;align-items:center;">
  <div class="card-scene ${s.cls}"
    onmousemove="card3D(event,this)"
    onmouseleave="cardReset(this)">
    <div class="card-tilt">
      <div class="card-frame"></div>
      <div class="beam-container">
        <div class="beam-ring" style="animation-duration:2.5s;"></div>
      </div>
      <div class="beam-container">
        <div class="beam-ring" style="animation-duration:2.5s;animation-delay:-0.625s;"></div>
      </div>
      <div class="beam-container">
        <div class="beam-ring" style="animation-duration:2.5s;animation-delay:-1.25s;"></div>
      </div>
      <div class="beam-container">
        <div class="beam-ring" style="animation-duration:2.5s;animation-delay:-1.875s;"></div>
      </div>
      <div class="card-body">
        <div class="card-face">
          <div class="card-bokeh">${bokeh}</div>
          <div class="card-sparkles">${sparkles}</div>
          <div class="card-header">

            <div class="card-badge">${s.badge}</div>

        </div>

function card3D(e,el){
  const r=el.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;
  const ry=((x-r.width/2)/(r.width/2))*20;
  const rx=-((y-r.height/2)/(r.height/2))*20;
  const mx=(x/r.width*100).toFixed(1)+'%';
  const my=(y/r.height*100).toFixed(1)+'%';
  el.querySelector('.card-tilt').style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) scale(1.04)`;
  el.querySelector('.card-shine').style.background=`
    linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),
    linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%),
    radial-gradient(ellipse 55% 45% at ${mx} ${my},rgba(255,255,255,.22) 0%,rgba(255,255,255,.05) 50%,transparent 75%)`;
}
function cardReset(el){
  el.querySelector('.card-tilt').style.transform='rotateX(0deg) rotateY(0deg) scale(1)';
  el.querySelector('.card-shine').style.background=`
    linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),
    linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%)`;
}
