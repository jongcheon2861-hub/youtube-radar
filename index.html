<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO · 알고리빙1004 — 로고</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   ROOT & RESET
══════════════════════════════════════════ */
:root{
  --black:  #04040a;
  --gold:   #e8c97a;
  --gold2:  #c8a84a;
  --white:  #f5f0e8;
  --purple: #2d1b69;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  background: var(--black);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 80px;
  padding: 60px 24px;
  overflow-x: hidden;
}

/* ══════════════════════════════════════════
   배경 — 블랙홀 링
══════════════════════════════════════════ */
.bh-bg{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%,
      rgba(45,27,105,.14) 0%, rgba(15,10,35,.28) 40%, transparent 70%),
    #04040a;
}
.bh-ring{
  position:fixed; border-radius:50%; border:1px solid;
  pointer-events:none; z-index:0;
  top:40%; left:50%; transform:translate(-50%,-50%);
  animation:bhEx linear infinite; opacity:0;
}
.bh-ring:nth-child(2){ border-color:rgba(232,201,122,.05); animation-duration:10s; animation-delay:0s; }
.bh-ring:nth-child(3){ border-color:rgba(245,240,232,.03); animation-duration:10s; animation-delay:2.5s; }
.bh-ring:nth-child(4){ border-color:rgba(45,27,105,.07);   animation-duration:10s; animation-delay:5s; }
.bh-ring:nth-child(5){ border-color:rgba(232,201,122,.03); animation-duration:10s; animation-delay:7.5s; }
@keyframes bhEx{
  0%  { width:60px; height:60px; opacity:0; }
  8%  { opacity:.8; }
  100%{ width:1000px; height:1000px; opacity:0; }
}

/* 별 */
.star{
  position:fixed; border-radius:50%; pointer-events:none; z-index:0;
  background:var(--white);
  animation:twinkle ease-in-out infinite;
}
@keyframes twinkle{
  0%,100%{ opacity:.08; transform:scale(1); }
  50%    { opacity:.5;  transform:scale(1.4); }
}

/* ══════════════════════════════════════════
   섹션 레이블
══════════════════════════════════════════ */
.sec-label{
  position:relative; z-index:10;
  font-family:'Noto Sans KR',sans-serif;
  font-size:10px; font-weight:300;
  letter-spacing:5px; color:rgba(232,201,122,.35);
  text-transform:uppercase; text-align:center;
  margin-bottom:28px;
}

/* ══════════════════════════════════════════
   LOGO LARGE
══════════════════════════════════════════ */
.logo-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}

.logo-wrap{
  position:relative;
  display:flex; flex-direction:column;
  align-items:center;
  padding: 20px 40px 32px;
  animation: breathe 6s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-10px); }
}

/* 후광 */
.logo-halo{
  position:absolute;
  width:480px; height:280px;
  top:50%; left:50%; transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at 50% 40%,
    rgba(232,201,122,.1) 0%,
    rgba(232,201,122,.04) 40%,
    transparent 70%);
  filter:blur(24px);
  pointer-events:none;
  animation:haloPulse 4s ease-in-out infinite;
}
@keyframes haloPulse{
  0%,100%{ opacity:.6; transform:translate(-50%,-50%) scale(1); }
  50%    { opacity:1;  transform:translate(-50%,-50%) scale(1.1); }
}

/* 날개 + 텍스트 수평 배치 */
.logo-main-row{
  display:flex; align-items:center; gap:16px;
}

/* ── 날개 컨테이너 ── */
.wing-wrap{ position:relative; }
.wing-wrap.left { animation:wBeatL 5s ease-in-out infinite; transform-origin:100% 60%; }
.wing-wrap.right{ animation:wBeatR 5s ease-in-out infinite; transform-origin:0%   60%; }

@keyframes wBeatL{
  0%,100%{ transform:rotate(0deg) scaleX(1); filter:drop-shadow(0 0 6px rgba(232,201,122,.35)); }
  40%    { transform:rotate(-8deg) scaleX(1.06); filter:drop-shadow(0 0 14px rgba(232,201,122,.7)) drop-shadow(0 0 28px rgba(232,201,122,.25)); }
  70%    { transform:rotate(2deg) scaleX(.98); }
}
@keyframes wBeatR{
  0%,100%{ transform:rotate(0deg) scaleX(1); filter:drop-shadow(0 0 6px rgba(232,201,122,.35)); }
  40%    { transform:rotate(8deg) scaleX(1.06); filter:drop-shadow(0 0 14px rgba(232,201,122,.7)) drop-shadow(0 0 28px rgba(232,201,122,.25)); }
  70%    { transform:rotate(-2deg) scaleX(.98); }
}

/* ── 텍스트 ── */
.logo-text{
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
.logo-algo{
  font-family:'Cinzel',serif;
  font-size:62px; font-weight:900;
  letter-spacing:20px;
  padding-right:20px; /* letter-spacing 보정 */
  color:var(--white);
  text-shadow:
    0 0 40px rgba(232,201,122,.45),
    0 0 80px rgba(232,201,122,.15),
    0 2px 6px rgba(0,0,0,.9);
  animation:textPulse 4s ease-in-out infinite;
}
@keyframes textPulse{
  0%,100%{ text-shadow:0 0 30px rgba(232,201,122,.3), 0 2px 6px rgba(0,0,0,.9); }
  50%    { text-shadow:0 0 55px rgba(232,201,122,.65), 0 0 100px rgba(232,201,122,.2), 0 2px 6px rgba(0,0,0,.9); }
}

/* 구분선 */
.logo-rule{
  width:100%; height:1px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(232,201,122,.18) 15%,
    rgba(232,201,122,.55) 50%,
    rgba(232,201,122,.18) 85%,
    transparent 100%);
  position:relative;
}
.logo-rule::before,.logo-rule::after{
  content:'✦'; position:absolute;
  top:50%; transform:translateY(-50%);
  font-size:7px; color:var(--gold); opacity:.55;
  line-height:1;
}
.logo-rule::before{ left:12%; }
.logo-rule::after { right:12%; }

.logo-sub-text{
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-weight:300;
  font-size:14px; letter-spacing:7px;
  color:rgba(232,201,122,.55);
  padding-right:7px;
}

/* ══════════════════════════════════════════
   BADGE (소형)
══════════════════════════════════════════ */
.badge-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}

.badge-outer{
  position:relative;
  display:flex; align-items:center;
  gap:8px;
  padding:10px 20px 10px 16px;
  border-radius:40px;
  animation:badgeFloat 5s ease-in-out infinite;
}
@keyframes badgeFloat{
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-5px); }
}

/* 그라디언트 테두리 */
.badge-border-wrap{
  position:absolute; inset:-1px; border-radius:41px; z-index:-1;
  padding:1px;
  background:linear-gradient(135deg,
    rgba(232,201,122,.5) 0%,
    rgba(200,168,74,.15) 40%,
    rgba(232,201,122,.4) 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
}
.badge-bg{
  position:absolute; inset:0; border-radius:40px; z-index:-1;
  background:linear-gradient(135deg,
    rgba(232,201,122,.07) 0%,
    rgba(45,27,105,.15) 100%);
  backdrop-filter:blur(6px);
}
/* 샤인 */
.badge-shine{
  position:absolute; inset:0; border-radius:40px; overflow:hidden; z-index:0; pointer-events:none;
}
.badge-shine::after{
  content:''; position:absolute;
  top:0; left:-140%; width:80%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);
  transform:skewX(-18deg);
  animation:badgeShine 5s ease-in-out infinite;
}
@keyframes badgeShine{
  0%,55%,100%{ left:-140%; }
  80%        { left:160%; }
}

.badge-algo{
  font-family:'Cinzel',serif;
  font-size:14px; font-weight:700;
  letter-spacing:5px; padding-right:5px;
  color:rgba(232,201,122,.85);
  position:relative; z-index:1;
  animation:badgeTextGlow 4s ease-in-out infinite;
}
@keyframes badgeTextGlow{
  0%,100%{ text-shadow:0 0 8px rgba(232,201,122,.3); }
  50%    { text-shadow:0 0 16px rgba(232,201,122,.7), 0 0 28px rgba(232,201,122,.25); }
}
</style>
</head>
