<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole Symbol</title>
<style>
:root{
  --void:#000;
  --rose:#e8a0b0;
  --rose-d:#c4687e;
  --rose-l:#f5c6d0;
  --orange:#f97316;
  --orange-l:#fb923c;
  --orange-ll:#fed7aa;
  --purple:#a855f7;
  --purple-d:#6b21a8;
  --purple-dd:#3b0764;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:80px;
  overflow:hidden;
}

.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;}
@keyframes twinkle{0%{opacity:.06;transform:scale(1);}100%{opacity:.7;transform:scale(1.6);}}

/* ════════════════════════════════════════════
   메인 심볼 래퍼
════════════════════════════════════════════ */
.bh-wrap{
  position:relative;z-index:1;
  width:320px;
  height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ── 강착원반 전체 컨테이너 ── */
.disk-system{
  position:absolute;
  width:320px;
  height:320px;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}

/* ── 원반 링 공통 ── */
/* rotateX(80deg) = 거의 수평으로 눕힌 타원 */
.disk-ring{
  position:absolute;
  border-radius:50%;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotateX(82deg);
  animation:diskRotate var(--dr) linear infinite;
}
@keyframes diskRotate{
  from{transform:translate(-50%,-50%) rotateX(82deg) rotate(0deg);}
  to{  transform:translate(-50%,-50%) rotateX(82deg) rotate(360deg);}
}

/* 가장 바깥 — 희미한 오렌지 헤일로 */
.dr1{
  width:310px;height:310px;
  border:2px solid rgba(249,115,22,.25);
  box-shadow:0 0 18px rgba(249,115,22,.15),0 0 40px rgba(168,85,247,.08);
  --dr:18s;
}
.dr2{
  width:288px;height:288px;
  border:2.5px solid rgba(249,115,22,.35);
  box-shadow:0 0 14px rgba(249,115,22,.25);
  --dr:15s;animation-direction:reverse;
}
.dr3{
  width:266px;height:266px;
  border:3px solid rgba(232,160,176,.45);
  box-shadow:0 0 12px rgba(232,160,176,.35),0 0 28px rgba(249,115,22,.2);
  --dr:12s;
}
.dr4{
  width:244px;height:244px;
  border:3px solid rgba(249,115,22,.65);
  box-shadow:0 0 14px rgba(249,115,22,.5),0 0 30px rgba(249,115,22,.25);
  --dr:10s;animation-direction:reverse;
}
.dr5{
  width:222px;height:222px;
  border:3.5px solid rgba(251,146,60,.8);
  box-shadow:0 0 16px rgba(251,146,60,.65),0 0 35px rgba(249,115,22,.3);
  --dr:8.5s;
}
.dr6{
  width:200px;height:200px;
  border:4px solid rgba(245,198,208,.85);
  box-shadow:0 0 18px rgba(245,198,208,.7),0 0 40px rgba(232,160,176,.35),0 0 60px rgba(249,115,22,.15);
  --dr:7s;animation-direction:reverse;
}
/* 가장 밝은 핵심 링 */
.dr7{
  width:178px;height:178px;
  border:5px solid rgba(254,215,170,.95);
  box-shadow:
    0 0 20px rgba(254,215,170,.85),
    0 0 45px rgba(251,146,60,.6),
    0 0 75px rgba(249,115,22,.3),
    0 0 100px rgba(168,85,247,.1);
  --dr:5.5s;
}
.dr8{
  width:156px;height:156px;
  border:4px solid rgba(249,115,22,.9);
  box-shadow:0 0 18px rgba(249,115,22,.75),0 0 40px rgba(249,115,22,.4);
  --dr:4.5s;animation-direction:reverse;
}
.dr9{
  width:134px;height:134px;
  border:3px solid rgba(232,160,176,.75);
  box-shadow:0 0 14px rgba(232,160,176,.6),0 0 30px rgba(168,85,247,.25);
  --dr:3.8s;
}
.dr10{
  width:114px;height:114px;
  border:2.5px solid rgba(168,85,247,.6);
  box-shadow:0 0 12px rgba(168,85,247,.5),0 0 28px rgba(107,33,168,.3);
  --dr:3s;animation-direction:reverse;
}
.dr11{
  width:96px;height:96px;
  border:2px solid rgba(107,33,168,.5);
  box-shadow:0 0 10px rgba(107,33,168,.4);
  --dr:2.4s;
}

/* ── 블랙홀 코어 (구체) ── */
.bh-core{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:90px;height:90px;
  border-radius:50%;
  z-index:20;
  /* 완전한 어둠 + 보라 글로우 */
  background:radial-gradient(circle,
    #000 55%,
    rgba(15,0,30,.98) 75%,
    rgba(40,0,80,.9) 90%,
    transparent 100%
  );
  box-shadow:
    0 0 0 2px rgba(168,85,247,.3),
    0 0 20px rgba(107,33,168,.6),
    0 0 45px rgba(107,33,168,.4),
    0 0 80px rgba(59,7,100,.25);
  animation:coreGlow 3s ease-in-out infinite;
}
@keyframes coreGlow{
  0%,100%{
    box-shadow:0 0 0 2px rgba(168,85,247,.3),0 0 20px rgba(107,33,168,.6),0 0 45px rgba(107,33,168,.4),0 0 80px rgba(59,7,100,.25);
  }
  50%{
    box-shadow:0 0 0 3px rgba(168,85,247,.5),0 0 30px rgba(107,33,168,.85),0 0 65px rgba(107,33,168,.6),0 0 120px rgba(59,7,100,.4);
  }
}

/* ── 중력 렌즈 — 원반이 블랙홀 뒤로 휘어 올라오는 효과 ── */
/* 상단 아치: 원반이 블랙홀 뒤에서 위로 구부러진 빛 */
.lens-top{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:200px;height:200px;
  border-radius:50%;
  z-index:15;
  /* 윗부분만 보이게 clip */
  clip-path:ellipse(100px 52px at 50% 42%);
  pointer-events:none;
}
.lens-top::before{
  content:'';
  position:absolute;inset:0;
  border-radius:50%;
  background:
    /* 가장 밝은 중심 아치 */
    radial-gradient(ellipse 80% 30% at 50% 38%,
      rgba(254,215,170,.9) 0%,
      rgba(251,146,60,.75) 35%,
      rgba(249,115,22,.5) 60%,
      rgba(232,160,176,.25) 80%,
      transparent 100%
    );
  animation:lensTop 4s ease-in-out infinite;
}
@keyframes lensTop{
  0%,100%{opacity:.75;}
  50%{opacity:1;}
}

.lens-top2{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:240px;height:240px;
  border-radius:50%;
  z-index:14;
  clip-path:ellipse(120px 60px at 50% 40%);
  pointer-events:none;
}
.lens-top2::before{
  content:'';
  position:absolute;inset:0;
  border-radius:50%;
  background:radial-gradient(ellipse 70% 25% at 50% 36%,
    rgba(245,198,208,.7) 0%,
    rgba(249,115,22,.55) 40%,
    rgba(168,85,247,.2) 75%,
    transparent 100%
  );
  animation:lensTop 4s ease-in-out infinite .5s;
}

/* ── 원반 하단 가리개 (블랙홀 앞 원반 가림) ── */
/* 블랙홀 앞쪽(하단)은 원반이 블랙홀에 가려지는 효과 */
.bh-shadow{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:92px;height:50px;
  border-radius:50%;
  background:radial-gradient(ellipse at 50% 60%,#000 60%,rgba(0,0,0,.9) 80%,transparent 100%);
  z-index:25;
  margin-top:18px;
  pointer-events:none;
}

/* ── 하단 반사 아치 (원반 하단) ── */
.lens-bot{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:180px;height:180px;
  border-radius:50%;
  z-index:18;
  clip-path:ellipse(90px 44px at 50% 62%);
  pointer-events:none;
}
.lens-bot::before{
  content:'';
  position:absolute;inset:0;
  border-radius:50%;
  background:radial-gradient(ellipse 75% 28% at 50% 65%,
    rgba(249,115,22,.8) 0%,
    rgba(232,160,176,.6) 35%,
    rgba(168,85,247,.3) 65%,
    transparent 100%
  );
  animation:lensBot 4s ease-in-out infinite .8s;
}
@keyframes lensBot{
  0%,100%{opacity:.7;}
  50%{opacity:1;}
}

/* ── 전체 원반 광채 (배경 방사) ── */
.disk-glow{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotateX(82deg);
  width:340px;height:340px;
  border-radius:50%;
  background:radial-gradient(ellipse at 50% 50%,
    transparent 35%,
    rgba(249,115,22,.08) 50%,
    rgba(232,160,176,.06) 65%,
    rgba(168,85,247,.04) 80%,
    transparent 100%
  );
  z-index:1;
  animation:diskGlow 5s ease-in-out infinite;
}
@keyframes diskGlow{
  0%,100%{opacity:.6;}
  50%{opacity:1;}
}

/* ════════════════════════════════════════════
   미니 뱃지 버전
════════════════════════════════════════════ */
.bh-mini{
  position:relative;z-index:1;
  width:130px;height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.disk-mini{
  position:absolute;
  width:130px;height:130px;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}
.dm-ring{
  position:absolute;
  border-radius:50%;
  top:50%;left:50%;
  animation:dmSpin var(--dmd) linear infinite;
}
@keyframes dmSpin{
  from{transform:translate(-50%,-50%) rotateX(82deg) rotate(0deg);}
  to{  transform:translate(-50%,-50%) rotateX(82deg) rotate(360deg);}
}
.dm1{width:128px;height:128px;border:1.5px solid rgba(249,115,22,.3);--dmd:15s;}
.dm2{width:116px;height:116px;border:2px solid rgba(249,115,22,.5);--dmd:12s;animation-direction:reverse;}
.dm3{width:104px;height:104px;border:2px solid rgba(245,198,208,.65);--dmd:9.5s;}
.dm4{width:92px;height:92px;border:2.5px solid rgba(254,215,170,.85);box-shadow:0 0 8px rgba(254,215,170,.6),0 0 18px rgba(251,146,60,.35);--dmd:7s;animation-direction:reverse;}
.dm5{width:80px;height:80px;border:2px solid rgba(249,115,22,.75);box-shadow:0 0 7px rgba(249,115,22,.55);--dmd:5.5s;}
.dm6{width:68px;height:68px;border:1.5px solid rgba(232,160,176,.65);box-shadow:0 0 6px rgba(232,160,176,.45);--dmd:4.2s;animation-direction:reverse;}
.dm7{width:56px;height:56px;border:1.5px solid rgba(168,85,247,.55);box-shadow:0 0 5px rgba(168,85,247,.4);--dmd:3.2s;}

.bh-mini-lens-top{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:84px;height:84px;border-radius:50%;
  z-index:15;
  clip-path:ellipse(42px 22px at 50% 42%);
  pointer-events:none;
}
.bh-mini-lens-top::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(ellipse 80% 30% at 50% 38%,
    rgba(254,215,170,.9) 0%,rgba(251,146,60,.7) 40%,rgba(249,115,22,.4) 65%,transparent 100%
  );
  animation:lensTop 4s ease-in-out infinite;
}

.bh-mini-lens-bot{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:76px;height:76px;border-radius:50%;
  z-index:18;
  clip-path:ellipse(38px 18px at 50% 62%);
  pointer-events:none;
}
.bh-mini-lens-bot::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(ellipse 75% 28% at 50% 66%,
    rgba(249,115,22,.75) 0%,rgba(232,160,176,.55) 40%,rgba(168,85,247,.25) 70%,transparent 100%
  );
  animation:lensBot 4s ease-in-out infinite .8s;
}

.bh-mini-core{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:38px;height:38px;border-radius:50%;
  z-index:20;
  background:radial-gradient(circle,#000 55%,rgba(15,0,30,.98) 78%,rgba(40,0,80,.85) 92%,transparent 100%);
  box-shadow:0 0 0 1.5px rgba(168,85,247,.3),0 0 12px rgba(107,33,168,.6),0 0 28px rgba(107,33,168,.35);
  animation:coreGlow 3s ease-in-out infinite;
}
.bh-mini-shadow{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:40px;height:22px;border-radius:50%;
  background:radial-gradient(ellipse at 50% 60%,#000 60%,rgba(0,0,0,.85) 80%,transparent 100%);
  z-index:25;
  margin-top:8px;
  pointer-events:none;
}
</style>
</head>
<body>
<div class="bg"></div>
<script>
const bg=document.querySelector('.bg');
for(let i=0;i<55;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*1.8+.3;
  const c=['#fed7aa','#e8a0b0','#a855f7','#f0eee8','#f97316'];
  s.style.cssText=`width:${sz}px;height:${sz}px;background:${c[Math.floor(Math.random()*c.length)]};left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*4}s;--delay:${Math.random()*6}s;`;
  bg.appendChild(s);
}
</script>

<!-- ══ 메인 심볼 ══ -->
<div class="bh-wrap">
  <div class="disk-system">
    <div class="disk-glow"></div>
    <div class="disk-ring dr1"></div>
    <div class="disk-ring dr2"></div>
    <div class="disk-ring dr3"></div>
    <div class="disk-ring dr4"></div>
    <div class="disk-ring dr5"></div>
    <div class="disk-ring dr6"></div>
    <div class="disk-ring dr7"></div>
    <div class="disk-ring dr8"></div>
    <div class="disk-ring dr9"></div>
    <div class="disk-ring dr10"></div>
    <div class="disk-ring dr11"></div>
  </div>
  <!-- 중력 렌즈 상단 아치 -->
  <div class="lens-top"></div>
  <div class="lens-top2"></div>
  <!-- 하단 반사 -->
  <div class="lens-bot"></div>
  <!-- 블랙홀 코어 -->
  <div class="bh-core"></div>
  <!-- 하단 그림자 (원반 가림) -->
  <div class="bh-shadow"></div>
</div>

<!-- ══ 미니 버전 ══ -->
<div class="bh-mini">
  <div class="disk-mini">
    <div class="dm-ring dm1"></div>
    <div class="dm-ring dm2"></div>
    <div class="dm-ring dm3"></div>
    <div class="dm-ring dm4"></div>
    <div class="dm-ring dm5"></div>
    <div class="dm-ring dm6"></div>
    <div class="dm-ring dm7"></div>
  </div>
  <div class="bh-mini-lens-top"></div>
  <div class="bh-mini-lens-bot"></div>
  <div class="bh-mini-core"></div>
  <div class="bh-mini-shadow"></div>
</div>

</body>
</html>
