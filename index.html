<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ALGO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet"/>

<script>
function buildFavicon(size){
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');

  /* 배경 */
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, size, size);

  /* 배경 글로우 */
  const bgG = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size*0.7);
  bgG.addColorStop(0, 'rgba(124,58,237,0.22)');
  bgG.addColorStop(0.5,'rgba(240,201,106,0.10)');
  bgG.addColorStop(1, 'transparent');
  ctx.fillStyle = bgG;
  ctx.fillRect(0, 0, size, size);

  /* ── ALGO 텍스트: 자동 맞춤 ── */
  const letters = [
    { ch:'A', g:['#ffe49a','#f0c96a','#ff8c00','#ff2020'], glow:'#f0c96a' },
    { ch:'L', g:['#f5c6d0','#e879a0','#a855f7','#7c3aed'], glow:'#e879a0' },
    { ch:'G', g:['#ffe49a','#f0c96a','#ff8c00','#ff2020'], glow:'#f0c96a' },
    { ch:'O', g:['#f5c6d0','#e879a0','#a855f7','#7c3aed'], glow:'#e879a0' },
  ];

  /* 텍스트 영역: 좌우 패딩 6%, 상단 5% ~ 하단 데코라인 위 */
  const padX   = size * 0.06;
  const maxW   = size - padX * 2;
  const lineH  = size * 0.70; /* 데코라인 Y */
  const textY  = lineH * 0.50; /* 글자 중앙 Y */

  /* 폰트 크기 이진탐색: ALGO 전체가 maxW 안에 들어오도록 */
  let lo = 1, hi = size * 0.85, fs = hi / 2;
  for(let iter = 0; iter < 20; iter++){
    ctx.font = `900 ${fs}px Cinzel, serif`;
    const tw = letters.reduce((a,l)=>a+ctx.measureText(l.ch).width, 0);
    if(tw > maxW) hi = fs;
    else          lo = fs;
    fs = (lo + hi) / 2;
  }
  ctx.font = `900 ${fs}px Cinzel, serif`;

  /* 전체 너비 재측정 → 중앙 정렬 시작 X */
  const totalW = letters.reduce((a,l)=>a+ctx.measureText(l.ch).width, 0);
  let curX = (size - totalW) / 2;

  ctx.textBaseline = 'middle';

  letters.forEach(({ ch, g, glow }) => {
    const w = ctx.measureText(ch).width;

    ctx.shadowColor = glow;
    ctx.shadowBlur  = size * 0.12;

    const tG = ctx.createLinearGradient(curX, textY - fs*0.5, curX + w, textY + fs*0.5);
    tG.addColorStop(0,    g[0]);
    tG.addColorStop(0.35, g[1]);
    tG.addColorStop(0.7,  g[2]);
    tG.addColorStop(1,    g[3]);

    ctx.fillStyle = tG;
    ctx.fillText(ch, curX, textY);
    curX += w;
  });

  /* ── 데코 라인 ── */
  ctx.shadowBlur = 0;
  const lineY = size * 0.82;
  const lx1   = size * 0.06;
  const lx2   = size * 0.94;

  const lineG = ctx.createLinearGradient(lx1, lineY, lx2, lineY);
  lineG.addColorStop(0,    'transparent');
  lineG.addColorStop(0.15, '#7c3aed');
  lineG.addColorStop(0.35, '#f0c96a');
  lineG.addColorStop(0.5,  '#f5c6d0');
  lineG.addColorStop(0.65, '#f0c96a');
  lineG.addColorStop(0.85, '#a855f7');
  lineG.addColorStop(1,    'transparent');

  ctx.shadowColor = '#f0c96a';
  ctx.shadowBlur  = size * 0.05;
  ctx.strokeStyle = lineG;
  ctx.lineWidth   = Math.max(1, size * 0.025);
  ctx.beginPath();
  ctx.moveTo(lx1, lineY);
  ctx.lineTo(lx2, lineY);
  ctx.stroke();

  /* 양끝 점 */
  const dotR = Math.max(1, size * 0.038);
  ctx.shadowColor = '#f0c96a';
  ctx.shadowBlur  = size * 0.08;
  ctx.fillStyle   = '#f0c96a';
  ctx.beginPath(); ctx.arc(lx1, lineY, dotR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(lx2, lineY, dotR, 0, Math.PI*2); ctx.fill();

  /* 중앙 다이아몬드 */
  ctx.shadowColor = '#ffe49a';
  ctx.shadowBlur  = size * 0.09;
  ctx.fillStyle   = '#ffe49a';
  ctx.save();
  ctx.translate(size/2, lineY);
  ctx.rotate(Math.PI/4);
  const d = Math.max(1.5, size * 0.05);
  ctx.fillRect(-d, -d, d*2, d*2);
  ctx.restore();

  return c;
}

/* 파비콘 주입 – 폰트 로드 후 */
window.addEventListener('DOMContentLoaded', () => {
  document.fonts.ready.then(() => {
    [16, 32, 64].forEach(sz => {
      const canvas = buildFavicon(sz);
      const link   = document.createElement('link');
      link.rel     = 'icon';
      link.type    = 'image/png';
      link.sizes   = `${sz}x${sz}`;
      link.href    = canvas.toDataURL('image/png');
      document.head.appendChild(link);
    });
    renderPreviews();
  });
});

function renderPreviews(){
  const sizes        = [16, 32, 64, 128];
  const displaySizes = [80, 112, 144, 176];
  const container    = document.getElementById('faviconSizes');
  if(!container) return;
  container.innerHTML = '';

  sizes.forEach((sz, i) => {
    const canvas = buildFavicon(sz);

    const wrap = document.createElement('div');
    wrap.className = 'fav-item';

    const canvasWrap = document.createElement('div');
    canvasWrap.className = 'fav-canvas-wrap';
    canvasWrap.style.cssText = `
      width:${displaySizes[i]}px;
      height:${displaySizes[i]}px;
      border-radius:${8 + i*3}px;
    `;

    canvas.style.cssText = `
      width:${displaySizes[i]}px;
      height:${displaySizes[i]}px;
      display:block;
      image-rendering:pixelated;
    `;
    canvasWrap.appendChild(canvas);

    const label = document.createElement('div');
    label.className   = 'fav-size-label';
    label.textContent = `${sz}×${sz}`;

    wrap.appendChild(canvasWrap);
    wrap.appendChild(label);
    container.appendChild(wrap);
  });
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --purple:#7c3aed;
  --violet:#a855f7;
  --gold:#f0c96a;
  --gold-l:#ffe49a;
  --rose:#f5c6d0;
  --orange:#ff8c00;
  --red:#ff2020;
}

body{
  background:#000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:'Cinzel',serif;
  gap:56px;
}

.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate var(--delay,0s);
}
@keyframes twinkle{
  from{opacity:.15;transform:scale(1);}
  to{opacity:.9;transform:scale(1.5);}
}

/* ── 메인 로고 ── */
.logo-wrap{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
}

.algo-text{
  display:flex;align-items:center;justify-content:center;gap:0;
}

.algo-text span{
  display:inline-block;
  font-family:'Cinzel',serif;font-weight:900;
  font-size:140px;line-height:1;letter-spacing:-2px;
  animation:letterFloat var(--lf,6s) ease-in-out infinite alternate var(--ld,0s);
}

.l-a{
  background:linear-gradient(160deg,#ffe49a 0%,#f0c96a 40%,#ff8c00 80%,#ff2020 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px #f0c96a99) drop-shadow(0 0 40px #ff8c0055);
  --lf:5.8s;--ld:0s;
}
.l-l{
  background:linear-gradient(160deg,#f5c6d0 0%,#e879a0 40%,#a855f7 80%,#7c3aed 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px #e879a099) drop-shadow(0 0 40px #a855f755);
  --lf:6.2s;--ld:.4s;
}
.l-g{
  background:linear-gradient(160deg,#ffe49a 0%,#f0c96a 40%,#ff8c00 80%,#ff2020 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px #f0c96a99) drop-shadow(0 0 40px #ff8c0055);
  --lf:5.5s;--ld:.8s;
}
.l-o{
  background:linear-gradient(160deg,#f5c6d0 0%,#e879a0 40%,#a855f7 80%,#7c3aed 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px #e879a099) drop-shadow(0 0 40px #a855f755);
  --lf:6.5s;--ld:1.2s;
}

@keyframes letterFloat{
  0%{transform:translateY(0) scale(1);}
  100%{transform:translateY(-6px) scale(1.03);}
}

.deco-line{
  position:relative;width:520px;height:2px;margin-top:8px;
  background:linear-gradient(90deg,
    transparent 0%,#7c3aed 15%,#f0c96a 35%,
    #f5c6d0 50%,#f0c96a 65%,#a855f7 85%,transparent 100%);
  animation:linePulse 4s ease-in-out infinite alternate;
}
.deco-line::before,.deco-line::after{
  content:'';position:absolute;top:50%;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;
  background:#f0c96a;box-shadow:0 0 8px 3px #f0c96a;
}
.deco-line::before{left:0;}
.deco-line::after{right:0;}

.deco-diamond{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  width:8px;height:8px;
  background:linear-gradient(135deg,#ffe49a,#f5c6d0);
  box-shadow:0 0 10px 4px #f0c96a99;
  animation:diamondPulse 3s ease-in-out infinite alternate;
}

@keyframes linePulse{
  0%{opacity:.6;filter:brightness(.9);}
  100%{opacity:1;filter:brightness(1.3);}
}
@keyframes diamondPulse{
  0%{transform:translate(-50%,-50%) rotate(45deg) scale(1);}
  100%{transform:translate(-50%,-50%) rotate(45deg) scale(1.5);}
}

.bg-glow{
  position:absolute;width:700px;height:300px;border-radius:50%;
  background:radial-gradient(ellipse,#7c3aed0a 0%,#f0c96a08 40%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:bgGlow 6s ease-in-out infinite alternate;
  pointer-events:none;z-index:-1;
}
@keyframes bgGlow{
  0%{opacity:.5;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}
}

.particles{
  position:absolute;width:600px;height:300px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:-1;
}
.pt{
  position:absolute;border-radius:50%;
  animation:ptFloat var(--pd,8s) ease-in-out infinite alternate var(--pdd,0s);
}
@keyframes ptFloat{
  0%{transform:translateY(0) translateX(0);opacity:.4;}
  50%{opacity:.9;}
  100%{transform:translateY(var(--py,-20px)) translateX(var(--px,10px));opacity:.3;}
}

/* ── 파비콘 미리보기 ── */
.favicon-preview{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}

.favicon-label{
  font-family:'Cinzel',serif;font-size:11px;font-weight:600;
  letter-spacing:4px;text-transform:uppercase;
  color:#f0c96a;opacity:.7;
}

.favicon-sizes{
  display:flex;align-items:flex-end;gap:28px;flex-wrap:wrap;justify-content:center;
}

.fav-item{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}

.fav-canvas-wrap{
  overflow:hidden;
  animation:favGlow 3s ease-in-out infinite alternate;
}
@keyframes favGlow{
  0%{box-shadow:0 0 0 1px #f0c96a33,0 0 12px #a855f722;}
  100%{box-shadow:0 0 0 1px #f0c96a99,0 0 28px #a855f766;}
}

.fav-size-label{
  font-family:'Cinzel',serif;font-size:10px;
  color:#a855f7;letter-spacing:2px;opacity:.8;
}

.divider{
  width:420px;height:1px;
  background:linear-gradient(90deg,transparent,#7c3aed44,#f0c96a44,#a855f744,transparent);
  position:relative;z-index:10;
}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<!-- 메인 로고 -->
<div class="logo-wrap">
  <div class="bg-glow"></div>
  <div class="particles" id="particles"></div>

  <div class="algo-text">
    <span class="l-a">A</span>
    <span class="l-l">L</span>
    <span class="l-g">G</span>
    <span class="l-o">O</span>
  </div>

  <div class="deco-line">
    <div class="deco-diamond"></div>
  </div>
</div>

<div class="divider"></div>

<!-- 파비콘 미리보기 -->
<div class="favicon-preview">
  <div class="favicon-label">Favicon Preview</div>
  <div class="favicon-sizes" id="faviconSizes"></div>
</div>

<script>
/* 별 배경 */
const bg = document.getElementById('bg');
const sc = ['#f0c96a','#a855f7','#f5c6d0','#ff8c00','#ff2020','#ffe49a','#e879a0','#fff'];
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=(Math.random()*1.8+0.3).toFixed(2);
  s.style.cssText=`
    width:${sz}px;height:${sz}px;
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    background:${sc[Math.floor(Math.random()*sc.length)]};
    --d:${(Math.random()*4+1.5).toFixed(2)}s;
    --delay:-${(Math.random()*5).toFixed(2)}s;
  `;
  bg.appendChild(s);
}

/* 파티클 */
const pc = document.getElementById('particles');
const pcColors=['#f0c96a','#a855f7','#f5c6d0','#ff8c00','#e879a0'];
for(let i=0;i<18;i++){
  const p=document.createElement('div');
  p.className='pt';
  const sz=(Math.random()*3+1).toFixed(2);
  p.style.cssText=`
    width:${sz}px;height:${sz}px;
    left:${Math.random()*600}px;top:${Math.random()*300}px;
    background:${pcColors[Math.floor(Math.random()*pcColors.length)]};
    box-shadow:0 0 ${sz*2}px ${pcColors[Math.floor(Math.random()*pcColors.length)]};
    --pd:${(Math.random()*6+5).toFixed(2)}s;
    --pdd:-${(Math.random()*5).toFixed(2)}s;
    --py:${(-(Math.random()*40+10)).toFixed(0)}px;
    --px:${((Math.random()*30-15)).toFixed(0)}px;
  `;
  pc.appendChild(p);
}
</script>
</body>
</html>
