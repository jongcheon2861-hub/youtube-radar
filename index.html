<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ALGO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet"/>

<script>
function buildFavicon(outputSize, renderScale){
  /* renderScale 배수로 슈퍼샘플링 후 다운샘플 */
  const rs  = renderScale || 8;
  const big = outputSize * rs;

  const bigC   = document.createElement('canvas');
  bigC.width   = big; bigC.height = big;
  const bigCtx = bigC.getContext('2d');
  bigCtx.imageSmoothingEnabled = true;
  bigCtx.imageSmoothingQuality = 'high';

  /* 배경 */
  bigCtx.fillStyle = '#000';
  bigCtx.fillRect(0, 0, big, big);

  /* 배경 글로우 */
  const bgG = bigCtx.createRadialGradient(big/2,big/2,0, big/2,big/2, big*0.7);
  bgG.addColorStop(0,   'rgba(100,0,255,0.30)');
  bgG.addColorStop(0.5, 'rgba(255,140,0,0.12)');
  bgG.addColorStop(1,   'transparent');
  bigCtx.fillStyle = bgG;
  bigCtx.fillRect(0, 0, big, big);

  const letters = [
    { ch:'A', top:'#fff5c0', mid:'#FFD700', bot:'#B8400A', glow:'#FFD700' },
    { ch:'L', top:'#f0d0ff', mid:'#9B30FF', bot:'#3A007A', glow:'#9B30FF' },
    { ch:'G', top:'#fff5c0', mid:'#FFD700', bot:'#B8400A', glow:'#FFD700' },
    { ch:'O', top:'#f0d0ff', mid:'#9B30FF', bot:'#3A007A', glow:'#9B30FF' },
  ];

  const padX = big * 0.04;
  const maxW = big - padX * 2;

  /* 이진탐색: 폰트 크기 자동 맞춤 */
  let lo = 1, hi = big, fs = hi / 2;
  for(let iter = 0; iter < 32; iter++){
    bigCtx.font = `900 ${fs}px Cinzel, serif`;
    const tw = letters.reduce((a,l) => a + bigCtx.measureText(l.ch).width, 0);
    if(tw > maxW) hi = fs; else lo = fs;
    fs = (lo + hi) / 2;
  }
  bigCtx.font = `900 ${fs}px Cinzel, serif`;
  bigCtx.textBaseline = 'middle';

  const totalW = letters.reduce((a,l) => a + bigCtx.measureText(l.ch).width, 0);
  let curX = (big - totalW) / 2;
  const textY = big / 2;

  letters.forEach(({ ch, top, mid, bot, glow }) => {
    const w  = bigCtx.measureText(ch).width;
    const cx = curX + w / 2;

    /* 1) 드롭 섀도 */
    bigCtx.shadowColor    = 'rgba(0,0,0,0.9)';
    bigCtx.shadowBlur     = big * 0.04;
    bigCtx.shadowOffsetX  = big * 0.025;
    bigCtx.shadowOffsetY  = big * 0.030;
    const shadowG = bigCtx.createLinearGradient(curX, textY-fs*0.5, curX+w, textY+fs*0.5);
    shadowG.addColorStop(0, 'rgba(0,0,0,0.7)');
    shadowG.addColorStop(1, 'rgba(0,0,0,0.3)');
    bigCtx.fillStyle = shadowG;
    bigCtx.fillText(ch, curX, textY);

    /* 2) 메인 글자 */
    bigCtx.shadowOffsetX = 0;
    bigCtx.shadowOffsetY = 0;
    bigCtx.shadowColor   = glow;
    bigCtx.shadowBlur    = big * 0.18;
    const tG = bigCtx.createLinearGradient(cx, textY-fs*0.52, cx, textY+fs*0.52);
    tG.addColorStop(0,    top);
    tG.addColorStop(0.25, mid);
    tG.addColorStop(0.55, mid);
    tG.addColorStop(0.80, bot);
    tG.addColorStop(1,    '#000');
    bigCtx.fillStyle = tG;
    bigCtx.fillText(ch, curX, textY);

    /* 3) 상단 하이라이트 */
    bigCtx.shadowBlur = 0;
    const hlG = bigCtx.createLinearGradient(cx, textY-fs*0.52, cx, textY);
    hlG.addColorStop(0,   'rgba(255,255,255,0.60)');
    hlG.addColorStop(0.3, 'rgba(255,255,255,0.18)');
    hlG.addColorStop(1,   'rgba(255,255,255,0)');
    bigCtx.fillStyle = hlG;
    bigCtx.fillText(ch, curX, textY);

    curX += w;
  });

  /* 슈퍼샘플 → 출력 사이즈로 다운샘플 */
  const outC   = document.createElement('canvas');
  outC.width   = outputSize; outC.height = outputSize;
  const outCtx = outC.getContext('2d');
  outCtx.imageSmoothingEnabled = true;
  outCtx.imageSmoothingQuality = 'high';
  outCtx.drawImage(bigC, 0, 0, outputSize, outputSize);

  return outC;
}

window.addEventListener('DOMContentLoaded', () => {
  document.fonts.ready.then(() => {
    /* 파비콘: 256px 고화질 단일 주입 */
    const favCanvas = buildFavicon(256, 8);
    const link = document.createElement('link');
    link.rel   = 'icon';
    link.type  = 'image/png';
    link.sizes = '256x256';
    link.href  = favCanvas.toDataURL('image/png');
    document.head.appendChild(link);

    renderPreviews();
  });
});

function renderPreviews(){
  /* 미리보기: 각 사이즈별 8× 슈퍼샘플 */
  const sizes        = [16, 32, 64, 128, 256];
  const displaySizes = [80, 112, 148, 180, 220];
  const container    = document.getElementById('faviconSizes');
  if(!container) return;
  container.innerHTML = '';

  sizes.forEach((sz, i) => {
    const canvas = buildFavicon(sz, 8);
    const wrap   = document.createElement('div');
    wrap.className = 'fav-item';

    const cw = document.createElement('div');
    cw.className = 'fav-canvas-wrap';
    cw.style.cssText = `
      width:${displaySizes[i]}px;
      height:${displaySizes[i]}px;
      border-radius:${6 + i*3}px;
    `;

    canvas.style.cssText = `
      width:${displaySizes[i]}px;
      height:${displaySizes[i]}px;
      display:block;
      image-rendering:auto;
    `;
    cw.appendChild(canvas);

    const lbl = document.createElement('div');
    lbl.className   = 'fav-size-label';
    lbl.textContent = `${sz}×${sz}`;

    wrap.appendChild(cw);
    wrap.appendChild(lbl);
    container.appendChild(wrap);
  });
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold:      #FFD700;
  --gold-l:    #FFF0A0;
  --gold-d:    #B8400A;
  --purple:    #7700EE;
  --purple-l:  #CC66FF;
  --purple-d:  #3A007A;
  --crimson:   #CC0022;
  --orange:    #FF6600;
  --white:     #FFFFFF;
}

body{
  background:#000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:'Cinzel',serif;
  gap:60px;
}

.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate var(--delay,0s);
}
@keyframes twinkle{
  from{opacity:.1;transform:scale(1);}
  to{opacity:1;transform:scale(1.6);}
}

/* ══ 메인 로고 ══ */
.logo-wrap{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
}

.algo-text{
  display:flex;align-items:center;justify-content:center;
  gap:0;
  filter:
    drop-shadow(0 6px 18px rgba(0,0,0,0.9))
    drop-shadow(0 0 40px rgba(255,215,0,0.35))
    drop-shadow(0 0 80px rgba(119,0,238,0.25));
}

.algo-text span{
  display:inline-block;
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:148px;
  line-height:1;
  letter-spacing:-3px;
  position:relative;
  animation:letterFloat var(--lf,6s) ease-in-out infinite alternate var(--ld,0s);
  text-shadow:
    2px 3px 0px rgba(0,0,0,0.95),
    4px 6px 0px rgba(0,0,0,0.7),
    6px 9px 0px rgba(0,0,0,0.4),
    0 0 30px currentColor;
}

.l-a{
  background:linear-gradient(175deg,
    #FFFACD 0%,#FFD700 20%,#FFA500 45%,#CC5500 70%,#7A2200 90%,#1a0800 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  --lf:5.8s;--ld:0s;
}
.l-l{
  background:linear-gradient(175deg,
    #F0D0FF 0%,#CC66FF 20%,#9900FF 45%,#6600BB 70%,#330066 90%,#0a0015 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  --lf:6.2s;--ld:.4s;
}
.l-g{
  background:linear-gradient(175deg,
    #FFFACD 0%,#FFD700 20%,#FFA500 45%,#CC5500 70%,#7A2200 90%,#1a0800 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  --lf:5.5s;--ld:.8s;
}
.l-o{
  background:linear-gradient(175deg,
    #F0D0FF 0%,#CC66FF 20%,#9900FF 45%,#6600BB 70%,#330066 90%,#0a0015 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  --lf:6.5s;--ld:1.2s;
}

@keyframes letterFloat{
  0%{transform:translateY(0) scale(1);}
  100%{transform:translateY(-7px) scale(1.03);}
}

.deco-line{
  position:relative;
  width:540px;height:2px;
  margin-top:10px;
  background:linear-gradient(90deg,
    transparent 0%,#6600BB 12%,#FFD700 30%,
    #FF6600 50%,#FFD700 70%,#9900FF 88%,transparent 100%);
  box-shadow:0 0 12px #FFD70066,0 0 24px #9900FF44;
  animation:linePulse 4s ease-in-out infinite alternate;
}
.deco-line::before,.deco-line::after{
  content:'';position:absolute;top:50%;transform:translateY(-50%);
  width:7px;height:7px;border-radius:50%;
  background:#FFD700;
  box-shadow:0 0 10px 4px #FFD700,0 0 20px #FF6600;
}
.deco-line::before{left:0;}
.deco-line::after{right:0;}

.deco-diamond{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  width:10px;height:10px;
  background:linear-gradient(135deg,#FFFACD,#FF6600,#9900FF);
  box-shadow:0 0 14px 5px #FFD70099,0 0 28px #9900FF66;
  animation:diamondPulse 3s ease-in-out infinite alternate;
}

@keyframes linePulse{
  0%{opacity:.5;filter:brightness(.8);}
  100%{opacity:1;filter:brightness(1.4);}
}
@keyframes diamondPulse{
  0%{transform:translate(-50%,-50%) rotate(45deg) scale(1);}
  100%{transform:translate(-50%,-50%) rotate(45deg) scale(1.7);}
}

.bg-glow{
  position:absolute;width:760px;height:320px;border-radius:50%;
  background:radial-gradient(ellipse,
    rgba(119,0,238,0.08) 0%,rgba(255,215,0,0.06) 40%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:bgGlow 6s ease-in-out infinite alternate;
  pointer-events:none;z-index:-1;
}
@keyframes bgGlow{
  0%{opacity:.4;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}
}

.particles{
  position:absolute;width:640px;height:320px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:-1;
}
.pt{
  position:absolute;border-radius:50%;
  animation:ptFloat var(--pd,8s) ease-in-out infinite alternate var(--pdd,0s);
}
@keyframes ptFloat{
  0%{transform:translateY(0) translateX(0);opacity:.3;}
  50%{opacity:1;}
  100%{transform:translateY(var(--py,-20px)) translateX(var(--px,10px));opacity:.2;}
}

/* ══ 파비콘 미리보기 ══ */
.favicon-preview{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
.favicon-label{
  font-family:'Cinzel',serif;font-size:11px;font-weight:600;
  letter-spacing:5px;text-transform:uppercase;
  color:#FFD700;opacity:.75;
}
.favicon-sizes{
  display:flex;align-items:flex-end;gap:24px;flex-wrap:wrap;justify-content:center;
}
.fav-item{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.fav-canvas-wrap{
  overflow:hidden;
  animation:favGlow 3s ease-in-out infinite alternate;
}
@keyframes favGlow{
  0%{box-shadow:0 0 0 1px #FFD70044,0 0 14px #9900FF33;}
  100%{box-shadow:0 0 0 1px #FFD700BB,0 0 30px #9900FF77;}
}
.fav-size-label{
  font-family:'Cinzel',serif;font-size:10px;
  color:#9900FF;letter-spacing:2px;opacity:.85;
}

.divider{
  width:440px;height:1px;
  background:linear-gradient(90deg,
    transparent,#6600BB55,#FFD70055,#FF660055,#9900FF55,transparent);
  position:relative;z-index:10;
}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<!-- 메인 로고 -->
<div class="logo-wrap">
  <div class="bg-glow"></div>
  <div class="particles" id="particles"></div>

  <div class="algo-text">
    <span class="l-a">A</span>
    <span class="l-l">L</span>
    <span class="l-g">G</span>
    <span class="l-o">O</span>
  </div>

  <div class="deco-line">
    <div class="deco-diamond"></div>
  </div>
</div>

<div class="divider"></div>

<!-- 파비콘 미리보기 -->
<div class="favicon-preview">
  <div class="favicon-label">Favicon Preview</div>
  <div class="favicon-sizes" id="faviconSizes"></div>
</div>

<script>
/* 별 배경 */
const bg = document.getElementById('bg');
const sc = ['#FFD700','#9900FF','#FF6600','#CC66FF','#FFA500','#CC0022','#ffffff','#FFFACD'];
for(let i = 0; i < 90; i++){
  const s  = document.createElement('div');
  s.className = 'star';
  const sz = (Math.random()*2+0.3).toFixed(2);
  s.style.cssText = `
    width:${sz}px;height:${sz}px;
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    background:${sc[Math.floor(Math.random()*sc.length)]};
    box-shadow:0 0 ${sz*2}px ${sc[Math.floor(Math.random()*sc.length)]};
    --d:${(Math.random()*4+1.5).toFixed(2)}s;
    --delay:-${(Math.random()*5).toFixed(2)}s;
  `;
  bg.appendChild(s);
}

/* 파티클 */
const pc       = document.getElementById('particles');
const pcColors = ['#FFD700','#9900FF','#FF6600','#CC66FF','#FFA500'];
for(let i = 0; i < 22; i++){
  const p  = document.createElement('div');
  p.className = 'pt';
  const sz = (Math.random()*3.5+1).toFixed(2);
  const c1 = pcColors[Math.floor(Math.random()*pcColors.length)];
  const c2 = pcColors[Math.floor(Math.random()*pcColors.length)];
  p.style.cssText = `
    width:${sz}px;height:${sz}px;
    left:${Math.random()*640}px;top:${Math.random()*320}px;
    background:${c1};
    box-shadow:0 0 ${sz*3}px ${sz}px ${c2};
    --pd:${(Math.random()*6+5).toFixed(2)}s;
    --pdd:-${(Math.random()*5).toFixed(2)}s;
    --py:${(-(Math.random()*50+10)).toFixed(0)}px;
    --px:${((Math.random()*40-20)).toFixed(0)}px;
  `;
  pc.appendChild(p);
}
</script>
</body>
</html>
