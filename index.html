<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO · 알고리빙1004</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --void:   #04040c;
  --purple: #a855f7;
  --gold:   #d4a942;
  --gold-l: #f0c96a;
  --white:  #f0eee8;
  --dim:    rgba(240,238,232,.35);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body{
  background: var(--void);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 72px;
  padding: 80px 24px;
  overflow-x: hidden;
}

/* ── 배경 ── */
.bg{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 50% 40% at 50% 38%,
      rgba(45,13,92,.18) 0%, transparent 70%),
    #04040c;
}
.star{
  position:fixed; border-radius:50%;
  pointer-events:none; z-index:0;
  animation: twk ease-in-out infinite;
}
@keyframes twk{
  0%,100%{ opacity:.03; }
  50%    { opacity:.3; }
}

/* ── 섹션 레이블 ── */
.sec-label{
  position:relative; z-index:10;
  font-family:'Noto Sans KR',sans-serif;
  font-size:9px; font-weight:300;
  letter-spacing:5px; text-transform:uppercase;
  color:rgba(168,85,247,.28);
  margin-bottom:18px; text-align:center;
}

/* ══════════════════════════════
   대형 로고
══════════════════════════════ */
.logo-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}

.logo-wrap{
  display:flex; flex-direction:column;
  align-items:center; gap:10px;
  animation: float 8s ease-in-out infinite;
}
@keyframes float{
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-6px); }
}

/* 심볼 + 워드마크 가로 배치 */
.logo-mark-row{
  display:flex; align-items:center; gap:14px;
}

/* ── 심볼: 블랙홀 원 ── */
.logo-symbol{
  position:relative;
  width:44px; height:44px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
/* 바깥 원 */
.sym-ring{
  position:absolute; inset:0; border-radius:50%;
  border:1px solid rgba(212,169,66,.3);
  animation: ringPulse 4s ease-in-out infinite;
}
@keyframes ringPulse{
  0%,100%{ border-color:rgba(212,169,66,.25); box-shadow:none; }
  50%    { border-color:rgba(212,169,66,.55); box-shadow:0 0 12px rgba(212,169,66,.15); }
}
/* 안쪽 채움 — 블랙홀 코어 */
.sym-core{
  width:28px; height:28px; border-radius:50%;
  background: radial-gradient(circle at 38% 38%,
    rgba(168,85,247,.55) 0%,
    rgba(45,13,92,.9)    40%,
    rgba(4,4,12,1)       70%);
  position:relative; z-index:2;
  animation: coreSpin 12s linear infinite;
}
@keyframes coreSpin{
  from{ box-shadow: inset 0 0 8px rgba(168,85,247,.3),  0 0 8px rgba(168,85,247,.1); }
  50% { box-shadow: inset 0 0 14px rgba(212,169,66,.35), 0 0 14px rgba(212,169,66,.12); }
  to  { box-shadow: inset 0 0 8px rgba(168,85,247,.3),  0 0 8px rgba(168,85,247,.1); }
}
/* 심볼 고리 — 기울어진 타원 */
.sym-orbit{
  position:absolute; inset:0;
  border-radius:50%;
  border-top:1px solid rgba(212,169,66,.45);
  border-bottom:1px solid transparent;
  border-left:1px solid transparent;
  border-right:1px solid transparent;
  transform: rotateX(68deg) rotateZ(-20deg);
  animation: orbitSpin 6s linear infinite;
}
@keyframes orbitSpin{
  from{ transform: rotateX(68deg) rotateZ(0deg); }
  to  { transform: rotateX(68deg) rotateZ(360deg); }
}

/* ── 워드마크 ── */
.logo-wordmark{
  display:flex; flex-direction:column; gap:2px;
}
.wm-algo{
  font-family:'Cinzel',serif;
  font-size:38px; font-weight:900;
  letter-spacing:10px; padding-right:10px;
  color:var(--white);
  line-height:1;
  text-shadow: 0 0 32px rgba(212,169,66,.22);
  animation: wmGlow 5s ease-in-out infinite;
}
@keyframes wmGlow{
  0%,100%{ text-shadow:0 0 28px rgba(212,169,66,.18); }
  50%    { text-shadow:0 0 44px rgba(212,169,66,.4), 0 0 70px rgba(168,85,247,.15); }
}
.wm-sub{
  font-family:'Noto Sans KR',sans-serif;
  font-size:9px; font-weight:300;
  letter-spacing:5px;
  color:rgba(212,169,66,.42);
  padding-left:2px;
}

/* 슬로건 구분선 */
.logo-rule{
  width:100%; height:1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(168,85,247,.18) 20%,
    rgba(212,169,66,.38) 50%,
    rgba(168,85,247,.18) 80%,
    transparent);
  position:relative;
}
.logo-rule::after{
  content:'';
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  width:4px; height:4px;
  background:var(--gold);
  box-shadow:0 0 6px rgba(212,169,66,.8);
}

/* 슬로건 */
.logo-slogan{
  display:flex; flex-direction:column;
  align-items:center; gap:5px;
  text-align:center;
}
.slogan-line1{
  font-family:'Noto Sans KR',sans-serif;
  font-size:11px; font-weight:300;
  letter-spacing:2px;
  color:rgba(240,238,232,.38);
  line-height:1.7;
}
.slogan-em{
  color:rgba(240,238,232,.65);
  font-weight:400;
}
.slogan-line2{
  font-family:'Noto Sans KR',sans-serif;
  font-size:10px; font-weight:300;
  letter-spacing:3px;
  color:rgba(168,85,247,.45);
  animation: domainPulse 4s ease-in-out infinite;
}
@keyframes domainPulse{
  0%,100%{ opacity:.45; }
  50%    { opacity:.72; }
}

/* ══════════════════════════════
   소형 배지
══════════════════════════════ */
.badge-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}

.badge{
  position:relative;
  display:inline-flex; align-items:center; gap:8px;
  padding:7px 16px 7px 12px;
  border-radius:6px;
  cursor:pointer;
  animation:badgeFloat 6s ease-in-out infinite;
  transition:transform .2s;
}
.badge:hover{ transform:scale(1.04) !important; }
@keyframes badgeFloat{
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-4px); }
}
/* 배지 배경 */
.badge-bg{
  position:absolute; inset:0; border-radius:6px; z-index:0;
  background:rgba(45,13,92,.3);
  backdrop-filter:blur(6px);
}
/* 배지 테두리 */
.badge-frame{
  position:absolute; inset:0; border-radius:6px;
  z-index:1; pointer-events:none;
  border:1px solid rgba(212,169,66,.2);
  transition:border-color .3s;
}
.badge:hover .badge-frame{
  border-color:rgba(212,169,66,.4);
}

/* 배지 미니 심볼 */
.badge-sym{
  position:relative;
  width:18px; height:18px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; z-index:3;
}
.badge-sym-ring{
  position:absolute; inset:0; border-radius:50%;
  border:1px solid rgba(212,169,66,.3);
}
.badge-sym-core{
  width:10px; height:10px; border-radius:50%;
  background:radial-gradient(circle at 38% 38%,
    rgba(168,85,247,.6) 0%,
    rgba(45,13,92,.95)  45%,
    rgba(4,4,12,1)      72%);
  box-shadow: inset 0 0 4px rgba(168,85,247,.3);
}
.badge-sym-orbit{
  position:absolute; inset:0; border-radius:50%;
  border-top:1px solid rgba(212,169,66,.4);
  border-bottom:1px solid transparent;
  border-left:1px solid transparent;
  border-right:1px solid transparent;
  transform:rotateX(68deg);
  animation:orbitSpin 6s linear infinite;
}

/* 배지 텍스트 */
.badge-text{
  display:flex; flex-direction:column; gap:1px;
  z-index:3;
}
.badge-algo{
  font-family:'Cinzel',serif;
  font-size:11px; font-weight:900;
  letter-spacing:4px; padding-right:4px;
  color:var(--white);
  line-height:1;
  text-shadow:0 0 10px rgba(212,169,66,.25);
}
.badge-sub{
  font-family:'Noto Sans KR',sans-serif;
  font-size:7px; font-weight:300;
  letter-spacing:3px;
  color:rgba(212,169,66,.38);
}
</style>
</head>
<body>

<div class="bg"></div>

<script>
(function(){
  const c=['rgba(255,248,231,.9)','rgba(168,85,247,.8)','rgba(212,169,66,.8)'];
  for(let i=0;i<50;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*1.3+.3, col=c[Math.floor(Math.random()*c.length)];
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${col};box-shadow:0 0 ${sz*2}px ${col};animation-duration:${Math.random()*5+3}s;animation-delay:${Math.random()*8}s;`;
    document.body.appendChild(s);
  }
})();
</script>

<!-- ══ 대형 로고 ══ -->
<div class="logo-section">
  <div class="sec-label">◈ &nbsp; Page Title Logo &nbsp; ◈</div>

  <div class="logo-wrap">

    <!-- 심볼 + 워드마크 -->
    <div class="logo-mark-row">
      <div class="logo-symbol">
        <div class="sym-ring"></div>
        <div class="sym-orbit"></div>
        <div class="sym-core"></div>
      </div>
      <div class="logo-wordmark">
        <div class="wm-algo">ALGO</div>
        <div class="wm-sub">알고리빙1004</div>
      </div>
    </div>

    <!-- 룰 -->
    <div class="logo-rule"></div>

    <!-- 슬로건 -->
    <div class="logo-slogan">
      <div class="slogan-line1">
        알고리즘의 블랙홀에 빠진 당신을 위한&nbsp;
        <span class="slogan-em">단 하나의 사이트</span>
      </div>
      <div class="slogan-line2">algo.living1004.com</div>
    </div>

  </div>
</div>

<!-- ══ 소형 배지 ══ -->
<div class="badge-section">
  <div class="sec-label">◈ &nbsp; Card Header Badge &nbsp; ◈</div>

  <div class="badge">
    <div class="badge-bg"></div>
    <div class="badge-frame"></div>

    <div class="badge-sym">
      <div class="badge-sym-ring"></div>
      <div class="badge-sym-orbit"></div>
      <div class="badge-sym-core"></div>
    </div>

    <div class="badge-text">
      <div class="badge-algo">ALGO</div>
      <div class="badge-sub">알고리빙1004</div>
    </div>
  </div>
</div>

</body>
</html>
