<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO · algo.living1004.com</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --void:#04040c;
  --purple:#a855f7;
  --purple-d:#6b21a8;
  --gold:#d4a942;
  --gold-l:#f0c96a;
  --white:#f0eee8;
  --rose:#e8a0b0;
  --rose-d:#c4687e;
  --rose-l:#f5c6d0;
  --rose-g:#ff9eb5;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--void);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:60px;
  font-family:'Noto Sans KR',sans-serif;
  overflow:hidden;
}

/* ── 별 배경 ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;}
@keyframes twinkle{0%{opacity:.1;transform:scale(1);}100%{opacity:.9;transform:scale(1.6);}}

/* ══════════════════════════════════
   메인 로고 래퍼 — 클릭 전체 이동
══════════════════════════════════ */
.logo-link{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:22px;
  text-decoration:none;
  /* 사각형 라운드 테두리 */
  border:1px solid rgba(212,169,66,.35);
  border-radius:20px;
  padding:28px 36px;
  /* 내부 방사 */
  background:
    radial-gradient(ellipse at 30% 50%, rgba(168,85,247,.18) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 50%, rgba(212,169,66,.10) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 0%,  rgba(232,160,176,.07) 0%, transparent 60%),
    rgba(4,4,12,.6);
  box-shadow:
    0 0 0 1px rgba(168,85,247,.1),
    0 0 30px rgba(168,85,247,.12),
    0 0 60px rgba(212,169,66,.06),
    inset 0 0 40px rgba(107,33,168,.15),
    inset 0 0 80px rgba(212,169,66,.05);
  transition:
    border-color .4s,
    box-shadow .4s,
    background .4s;
  cursor:pointer;
  animation:logoFloat 4s ease-in-out infinite;
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}
.logo-link:hover{
  border-color:rgba(232,160,176,.6);
  box-shadow:
    0 0 0 1px rgba(232,160,176,.25),
    0 0 40px rgba(232,160,176,.2),
    0 0 80px rgba(168,85,247,.15),
    inset 0 0 50px rgba(107,33,168,.25),
    inset 0 0 100px rgba(232,160,176,.08);
}

/* 테두리 흐름 효과 */
.logo-link::before{
  content:'';
  position:absolute;inset:0;
  border-radius:20px;
  background:linear-gradient(
    120deg,
    transparent 0%,
    rgba(232,160,176,.15) 30%,
    rgba(212,169,66,.1) 50%,
    rgba(168,85,247,.12) 70%,
    transparent 100%
  );
  background-size:200% 200%;
  animation:borderShine 4s linear infinite;
  pointer-events:none;
}
@keyframes borderShine{
  0%{background-position:0% 50%;}
  100%{background-position:200% 50%;}
}

/* 코너 장식 */
.logo-link::after{
  content:'';
  position:absolute;
  inset:-1px;
  border-radius:20px;
  background:
    linear-gradient(to right, var(--rose-d), transparent 40%) top left / 60px 1px no-repeat,
    linear-gradient(to left,  var(--gold),   transparent 40%) top right/ 60px 1px no-repeat,
    linear-gradient(to right, var(--rose-d), transparent 40%) bottom left / 60px 1px no-repeat,
    linear-gradient(to left,  var(--gold),   transparent 40%) bottom right/ 60px 1px no-repeat;
  pointer-events:none;
  opacity:.8;
  animation:cornerPulse 3s ease-in-out infinite;
}
@keyframes cornerPulse{0%,100%{opacity:.5;}50%{opacity:1;}}

/* ══════════════════════════════════
   블랙홀 심볼 — 메인
══════════════════════════════════ */
.logo-symbol{
  position:relative;
  width:80px;height:80px;
  flex-shrink:0;
}

.sym-radiance{
  position:absolute;inset:-30px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(168,85,247,.55) 0%,rgba(212,169,66,.2) 30%,rgba(232,160,176,.08) 55%,transparent 70%);
  animation:radPulse 2.5s ease-in-out infinite;
}
.sym-radiance2{
  position:absolute;inset:-50px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(107,33,168,.35) 0%,transparent 65%);
  animation:radPulse 3.8s ease-in-out infinite reverse;
}
@keyframes radPulse{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.2);}}

.acc-ring{
  position:absolute;
  border-radius:50%;
  top:50%;left:50%;
  animation:accSpin var(--dur) linear infinite;
}
@keyframes accSpin{
  from{transform:translate(-50%,-50%) rotateX(72deg) rotate(0deg);}
  to{  transform:translate(-50%,-50%) rotateX(72deg) rotate(360deg);}
}
.acc-ring:nth-child(3){width:90px;height:90px;border:2px solid rgba(240,201,106,.95);box-shadow:0 0 8px rgba(240,201,106,.7),inset 0 0 6px rgba(240,201,106,.3);--dur:2.0s;}
.acc-ring:nth-child(4){width:106px;height:106px;border:1.5px solid rgba(168,85,247,.85);box-shadow:0 0 10px rgba(168,85,247,.6);--dur:1.5s;animation-direction:reverse;}
.acc-ring:nth-child(5){width:122px;height:122px;border:1px solid rgba(240,201,106,.5);box-shadow:0 0 14px rgba(240,201,106,.3);--dur:1.1s;}
.acc-ring:nth-child(6){width:140px;height:140px;border:1px solid rgba(168,85,247,.3);box-shadow:0 0 18px rgba(168,85,247,.2);--dur:.75s;animation-direction:reverse;}

.event-horizon{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:38px;height:38px;border-radius:50%;
  background:radial-gradient(circle,#000 30%,rgba(107,33,168,.9) 65%,transparent 100%);
  box-shadow:0 0 0 2px rgba(212,169,66,.4),0 0 16px rgba(168,85,247,.8),0 0 32px rgba(107,33,168,.6),0 0 48px rgba(212,169,66,.2);
  animation:horizonPulse 1.8s ease-in-out infinite;
}
@keyframes horizonPulse{
  0%,100%{box-shadow:0 0 0 2px rgba(212,169,66,.4),0 0 16px rgba(168,85,247,.8),0 0 32px rgba(107,33,168,.6),0 0 48px rgba(212,169,66,.2);}
  50%{box-shadow:0 0 0 3px rgba(240,201,106,.7),0 0 24px rgba(168,85,247,1),0 0 48px rgba(107,33,168,.9),0 0 70px rgba(212,169,66,.4);}
}

.jet{position:absolute;left:50%;transform:translateX(-50%);border-radius:2px;animation:jetPulse 1.4s ease-in-out infinite;}
.jet-top{top:-42px;width:3px;height:38px;background:linear-gradient(to top,rgba(240,201,106,1),rgba(168,85,247,.6),transparent);box-shadow:0 0 6px rgba(240,201,106,.6);}
.jet-bot{bottom:-42px;width:3px;height:38px;background:linear-gradient(to bottom,rgba(168,85,247,1),rgba(107,33,168,.6),transparent);box-shadow:0 0 6px rgba(168,85,247,.6);}
@keyframes jetPulse{0%,100%{opacity:.6;transform:translateX(-50%) scaleY(1);}50%{opacity:1;transform:translateX(-50%) scaleY(1.25);}}

.particle{
  position:absolute;border-radius:50%;top:50%;left:50%;
  transform-origin:0 0;
  animation:pullIn var(--pd) var(--pdelay) ease-in infinite;
}
@keyframes pullIn{
  0%{opacity:1;transform:rotate(var(--pa)) translateX(var(--pr)) scale(1.2);}
  80%{opacity:.6;}
  100%{opacity:0;transform:rotate(calc(var(--pa)+600deg)) translateX(1px) scale(0);}
}

.flare{position:absolute;border-radius:50%;animation:flarePulse 2.2s ease-in-out infinite;}
.flare:nth-child(1){inset:-2px;border:1px solid rgba(240,201,106,.7);animation-delay:0s;}
.flare:nth-child(2){inset:-12px;border:1px solid rgba(168,85,247,.45);animation-delay:.73s;}
.flare:nth-child(3){inset:-22px;border:1px solid rgba(212,169,66,.2);animation-delay:1.46s;}
@keyframes flarePulse{0%{opacity:.9;transform:scale(1);}50%{opacity:.2;transform:scale(1.1);}100%{opacity:.9;transform:scale(1);}}

.gravity-lens{position:absolute;inset:-6px;border-radius:50%;border:1px dashed rgba(240,201,106,.25);animation:lensRotate 8s linear infinite;}
.gravity-lens2{position:absolute;inset:-14px;border-radius:50%;border:1px dashed rgba(168,85,247,.18);animation:lensRotate 12s linear infinite reverse;}
@keyframes lensRotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* ══════════════════════════════════
   메인 워드마크
══════════════════════════════════ */
.wordmark{display:flex;flex-direction:column;gap:5px;position:relative;}

.wm-radiance{
  position:absolute;left:-14px;top:50%;transform:translateY(-50%);
  width:50px;height:70px;
  background:radial-gradient(ellipse at left,rgba(168,85,247,.2),transparent 80%);
  pointer-events:none;
}

.wm-algo{
  font-family:'Cinzel',serif;
  font-size:52px;font-weight:900;letter-spacing:14px;
  color:var(--white);line-height:1;
  text-shadow:0 0 20px rgba(212,169,66,.35),0 0 40px rgba(168,85,247,.2);
}

.wm-rule{display:flex;align-items:center;gap:6px;margin:2px 0;}
.wm-rule-line{flex:1;height:1px;background:linear-gradient(to right,rgba(212,169,66,.7),rgba(168,85,247,.4));}
.wm-rule-diamond{
  width:5px;height:5px;background:var(--gold);transform:rotate(45deg);
  animation:diamondPulse 2s ease-in-out infinite;
}
@keyframes diamondPulse{
  0%,100%{box-shadow:0 0 4px var(--gold);}
  50%{box-shadow:0 0 12px var(--gold),0 0 24px rgba(168,85,247,.6);}
}

/* 로즈골드 도메인 — 고정 */
.wm-domain{
  font-family:'Noto Sans KR',sans-serif;
  font-size:10px;font-weight:300;letter-spacing:3px;
  color:var(--rose) !important;
  text-decoration:none;
  text-shadow:0 0 8px rgba(232,160,176,.6),0 0 18px rgba(196,104,126,.35);
  pointer-events:none; /* 링크는 래퍼에서 처리 */
  position:relative;
}
.wm-domain::before{
  content:'';position:absolute;
  bottom:-2px;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,var(--rose-d),var(--rose),var(--rose-d),transparent);
  opacity:.55;animation:domainLine 3s ease-in-out infinite;
}
@keyframes domainLine{0%,100%{opacity:.3;}50%{opacity:.9;}}

/* ══════════════════════════════════
   미니 뱃지 — 사각형 라운드 테두리 + 내부방사
══════════════════════════════════ */
.badge-section{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:10px;
  /* 사각형 라운드 테두리 */
  border:1px solid rgba(212,169,66,.3);
  border-radius:16px;
  padding:14px 20px 14px 12px;
  /* 내부 방사 */
  background:
    radial-gradient(ellipse at 25% 50%, rgba(168,85,247,.15) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 50%, rgba(212,169,66,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 0%,  rgba(232,160,176,.06) 0%, transparent 60%),
    rgba(4,4,12,.72);
  box-shadow:
    0 0 0 1px rgba(168,85,247,.08),
    0 0 20px rgba(168,85,247,.1),
    0 0 40px rgba(212,169,66,.05),
    inset 0 0 28px rgba(107,33,168,.12),
    inset 0 0 56px rgba(212,169,66,.04);
  cursor:default;
}

/* 뱃지 코너 장식 */
.badge-section::after{
  content:'';
  position:absolute;inset:-1px;
  border-radius:16px;
  background:
    linear-gradient(to right, var(--rose-d), transparent 40%) top left / 36px 1px no-repeat,
    linear-gradient(to left,  var(--gold),   transparent 40%) top right/ 36px 1px no-repeat,
    linear-gradient(to right, var(--rose-d), transparent 40%) bottom left / 36px 1px no-repeat,
    linear-gradient(to left,  var(--gold),   transparent 40%) bottom right/ 36px 1px no-repeat;
  pointer-events:none;opacity:.7;
  animation:cornerPulse 3s ease-in-out infinite;
}

/* 뱃지 심볼 */
.badge-sym{
  position:relative;
  width:36px;height:36px;flex-shrink:0;
}
.badge-sym .sym-radiance{inset:-12px;}
.badge-sym .sym-radiance2{inset:-20px;}
.badge-sym .acc-ring:nth-child(3){width:44px;height:44px;border-width:1.5px;}
.badge-sym .acc-ring:nth-child(4){width:52px;height:52px;border-width:1px;}
.badge-sym .acc-ring:nth-child(5){width:60px;height:60px;border-width:.8px;}
.badge-sym .acc-ring:nth-child(6){width:68px;height:68px;border-width:.6px;}
.badge-sym .jet-top{top:-18px;height:16px;width:2px;}
.badge-sym .jet-bot{bottom:-18px;height:16px;width:2px;}
.badge-sym .event-horizon{width:16px;height:16px;}
.badge-sym .gravity-lens{inset:-3px;}
.badge-sym .gravity-lens2{inset:-7px;}
.badge-sym .flare:nth-child(1){inset:-1px;}
.badge-sym .flare:nth-child(2){inset:-5px;}
.badge-sym .flare:nth-child(3){inset:-9px;}

.badge-text{display:flex;flex-direction:column;gap:2px;}
.badge-algo{
  font-family:'Cinzel',serif;font-size:18px;font-weight:900;
  letter-spacing:6px;color:var(--white);line-height:1;
  text-shadow:0 0 10px rgba(212,169,66,.3);
}
.badge-rule{display:flex;align-items:center;gap:4px;margin:2px 0;}
.badge-rule-line{flex:1;height:1px;background:linear-gradient(to right,rgba(212,169,66,.5),rgba(168,85,247,.25));}
.badge-rule-diamond{width:3px;height:3px;background:var(--gold);transform:rotate(45deg);animation:diamondPulse 2s ease-in-out infinite;}

/* 뱃지 도메인 — 로즈골드 고정, 링크없음 */
.badge-domain{
  font-family:'Noto Sans KR',sans-serif;
  font-size:7px;font-weight:300;letter-spacing:1.5px;
  color:var(--rose) !important;
  text-decoration:none;
  text-shadow:0 0 6px rgba(232,160,176,.5),0 0 12px rgba(196,104,126,.3);
  cursor:default;
  position:relative;
}
.badge-domain::before{
  content:'';position:absolute;
  bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,var(--rose-d),transparent);
  opacity:.45;animation:domainLine 3s ease-in-out infinite;
}
</style>
</head>
<body>
<div class="bg"></div>
<script>
const bg=document.querySelector('.bg');
for(let i=0;i<60;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+.4;
  const colors=['#f0c96a','#a855f7','#f0eee8','#e8a0b0','#d4a942','#c4687e'];
  s.style.cssText=`
    width:${sz}px;height:${sz}px;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --d:${1.5+Math.random()*3.5}s;
    --delay:${Math.random()*5}s;
  `;
  bg.appendChild(s);
}
</script>
