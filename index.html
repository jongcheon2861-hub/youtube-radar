<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 레벨 카드 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070f;--text:#e8e8f0;--sub:#7777aa;--accent:#6c63ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;padding:48px 24px 80px;
}
.page-title{
  text-align:center;font-size:2rem;font-weight:900;
  background:linear-gradient(90deg,#6c63ff,#a78bfa,#6c63ff);
  background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:titleSlide 3s linear infinite;margin-bottom:8px;
}
@keyframes titleSlide{to{background-position:200% center;}}
.page-sub{text-align:center;color:var(--sub);font-size:.88rem;margin-bottom:48px;}
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:70px 40px;padding:40px 20px 60px;
  max-width:1400px;margin:0 auto;
}

/* ══════════════════════════════════════
   SCENE
══════════════════════════════════════ */
.card-scene{
  width:220px;height:308px;
  perspective:900px;
  position:relative;cursor:pointer;
}
.card-tilt{
  position:absolute;inset:0;
  transform-style:preserve-3d;
  transform:rotateX(0deg) rotateY(0deg);
  transition:transform .1s ease;
  will-change:transform;
}

/* ── 테두리 프레임 ── */
.card-frame{
  position:absolute;inset:-3px;border-radius:21px;
  z-index:1;pointer-events:none;
}
.card-frame::after{
  content:'';position:absolute;inset:2px;
  border-radius:19px;background:var(--bg);
}

/* ── 빔 컨테이너 ── */
.beam-container{
  position:absolute;inset:-3px;border-radius:21px;
  overflow:hidden;z-index:2;pointer-events:none;
}
.beam-ring{
  position:absolute;
  width:400%;height:400%;
  top:50%;left:50%;margin-top:-200%;margin-left:-200%;
  background:conic-gradient(
    from 0deg,
    transparent 0%,
    color-mix(in srgb,var(--cb,#fff) 90%,#fff) 3%,
    rgba(255,255,255,1) 5%,
    color-mix(in srgb,var(--cb,#fff) 70%,#fff) 7%,
    transparent 10%,transparent 100%
  );
  animation:beamRingSpin var(--beam-speed,3s) linear infinite;
  transform-origin:center center;
}
@keyframes beamRingSpin{from{rotate:0deg;}to{rotate:360deg;}}

/* ── 카드 본체 ── */
.card-body{
  position:absolute;inset:0;border-radius:18px;z-index:3;
  box-shadow:0 20px 55px rgba(0,0,0,.65),
             0 0 0 1px color-mix(in srgb,var(--cb,#fff) 25%,transparent);
}
.card-face{
  position:absolute;inset:0;border-radius:18px;overflow:hidden;
  background:
    radial-gradient(ellipse 80% 55% at 50% 40%,
      color-mix(in srgb,var(--cb,#6c63ff) 16%,transparent) 0%,transparent 70%),
    linear-gradient(160deg,
      color-mix(in srgb,var(--ca,#333) 28%,#0d0d1a) 0%,
      #0d0d1a 55%,
      color-mix(in srgb,var(--ca,#333) 14%,#07070f) 100%);
  transition:background .08s ease;
}
.card-face::before{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:repeating-linear-gradient(
    -45deg,transparent 0px,transparent 3px,
    rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px);
  pointer-events:none;z-index:1;
}
.card-shine{
  position:absolute;inset:0;border-radius:18px;
  background:
    linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),
    linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%);
  pointer-events:none;z-index:5;mix-blend-mode:screen;
  transition:background .08s ease;
}
.card-top-band{
  position:absolute;top:0;left:0;right:0;height:44%;
  border-radius:18px 18px 0 0;z-index:2;pointer-events:none;
  background:linear-gradient(180deg,
    color-mix(in srgb,var(--cb,#fff) var(--band-op,20%),transparent) 0%,transparent 100%);
}
.card-bot-band{
  position:absolute;bottom:0;left:0;right:0;height:40%;
  border-radius:0 0 18px 18px;z-index:2;pointer-events:none;
  background:linear-gradient(0deg,
    color-mix(in srgb,var(--cb,#fff) var(--band-op,20%),transparent) 0%,transparent 100%);
}
.card-header{
  position:absolute;top:0;left:0;right:0;
  padding:13px 14px 0;
  display:flex;justify-content:space-between;align-items:flex-start;z-index:10;
}
.card-stars{display:flex;gap:2px;}
.card-star{
  color:#ffd700;font-size:13px;
  text-shadow:0 0 5px rgba(255,215,0,.85),0 0 14px rgba(255,215,0,.45);
  animation:starTwinkle var(--st-dur,3s) ease-in-out infinite;
  animation-delay:var(--st-del,0s);
}
@keyframes starTwinkle{0%,100%{opacity:.55;transform:scale(.88);}50%{opacity:1;transform:scale(1.15);}}
.card-badge{
  color:#fff;padding:4px 11px;border-radius:8px;
  font-size:10px;font-weight:900;letter-spacing:.09em;
  box-shadow:0 2px 10px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18);
  background:linear-gradient(135deg,var(--ca,#555) 0%,var(--cb,#888) 100%);
  border:1px solid rgba(255,255,255,.13);
}
.card-bokeh{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden;border-radius:18px;}
.bokeh-dot{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,color-mix(in srgb,var(--cb,#fff) 65%,#fff) 0%,transparent 70%);
  filter:blur(var(--bblur,5px));opacity:var(--bop,.35);
  animation:bokehDrift var(--bdur,7s) ease-in-out infinite;
  animation-delay:var(--bdel,0s);
}
@keyframes bokehDrift{
  0%,100%{transform:translate(0,0) scale(1);}
  25%{transform:translate(7px,-9px) scale(1.12);}
  50%{transform:translate(-6px,7px) scale(.91);}
  75%{transform:translate(9px,4px) scale(1.06);}
}
.card-sparkles{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:hidden;border-radius:18px;}
.sparkle-dot{
  position:absolute;color:#ffd700;font-size:var(--ssz,11px);
  text-shadow:0 0 6px rgba(255,215,0,.9),0 0 16px rgba(255,215,0,.5);
  animation:sparklePop var(--sdur,2.2s) ease-in-out infinite;
  animation-delay:var(--sdel,0s);
}
@keyframes sparklePop{
  0%,100%{opacity:.08;transform:scale(.45) rotate(-12deg);}
  40%{opacity:1;transform:scale(1.25) rotate(12deg);}
  65%{opacity:.75;transform:scale(1.05) rotate(5deg);}
}
.card-icon-wrap{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-54%);z-index:8;
  display:flex;flex-direction:column;align-items:center;gap:9px;
}
.card-main-icon{
  font-size:3.5rem;
  filter:drop-shadow(0 0 14px var(--cb,#fff))
         drop-shadow(0 0 30px color-mix(in srgb,var(--cb,#fff) 55%,transparent))
         drop-shadow(0 5px 18px rgba(0,0,0,.55));
  animation:iconHover 3.5s ease-in-out infinite;
}
@keyframes iconHover{
  0%,100%{transform:translateY(0) rotateY(0deg);}
  30%{transform:translateY(-7px) rotateY(9deg);}
  70%{transform:translateY(-3px) rotateY(-6deg);}
}
.card-main-name{
  font-size:1.06rem;font-weight:900;color:var(--cb,#fff);
  text-shadow:0 0 14px var(--cb,#fff),
              0 0 32px color-mix(in srgb,var(--cb,#fff) 58%,transparent),
              0 2px 8px rgba(0,0,0,.65);
  letter-spacing:.06em;
}
.card-vignette{
  position:absolute;inset:0;z-index:6;pointer-events:none;border-radius:18px;
  background:radial-gradient(ellipse at center,transparent 28%,rgba(4,4,12,.62) 100%);
}
.card-footer{
  position:absolute;bottom:0;left:0;right:0;padding:11px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:10;border-radius:0 0 18px 18px;
  background:linear-gradient(135deg,
    color-mix(in srgb,var(--ca,#222) 88%,#000) 0%,
    color-mix(in srgb,var(--ca,#222) 65%,#000) 100%);
  border-top:1px solid color-mix(in srgb,var(--cb,#fff) 22%,transparent);
}
.footer-lv{
  color:var(--cb,#fff);font-size:10px;font-weight:900;
  background:rgba(0,0,0,.32);padding:3px 9px;border-radius:6px;
  letter-spacing:.07em;border:1px solid color-mix(in srgb,var(--cb,#fff) 35%,transparent);
}
.footer-name{color:var(--cb,#fff);font-size:13px;font-weight:800;text-shadow:0 0 10px var(--cb,#fff),0 2px 5px rgba(0,0,0,.5);}
.footer-subs{color:color-mix(in srgb,var(--cb,#fff) 60%,transparent);font-size:10px;}

/* ── 일반 레벨 글로우 ── */
.card-scene[data-lv="5"] .card-body{box-shadow:0 20px 55px rgba(0,0,0,.6), 0 0 22px color-mix(in srgb,var(--cb) 22%,transparent),0 0 0 1px color-mix(in srgb,var(--cb) 28%,transparent);}
.card-scene[data-lv="6"] .card-body{box-shadow:0 24px 62px rgba(0,0,0,.65),0 0 32px color-mix(in srgb,var(--cb) 30%,transparent),0 0 0 1px color-mix(in srgb,var(--cb) 32%,transparent);}
.card-scene[data-lv="7"] .card-body{box-shadow:0 27px 68px rgba(0,0,0,.68),0 0 44px color-mix(in srgb,var(--cb) 38%,transparent),0 0 0 1px color-mix(in srgb,var(--cb) 36%,transparent);}
.card-scene[data-lv="8"] .card-body{box-shadow:0 27px 68px rgba(0,0,0,.68),0 0 44px color-mix(in srgb,var(--cb) 38%,transparent),0 0 0 1px color-mix(in srgb,var(--cb) 36%,transparent);}
.card-scene[data-lv="9"] .card-body{box-shadow:0 27px 68px rgba(0,0,0,.68),0 0 44px color-mix(in srgb,var(--cb) 38%,transparent),0 0 0 1px color-mix(in srgb,var(--cb) 36%,transparent);}
.card-scene[data-lv="9"] .card-main-name{animation:namePulse9 2s ease-in-out infinite alternate;}
@keyframes namePulse9{
  from{text-shadow:0 0 12px var(--cb),0 0 24px var(--cb);}
  to  {text-shadow:0 0 22px var(--cb),0 0 55px var(--cb),0 0 90px color-mix(in srgb,var(--cb) 50%,transparent);}
}

/* ══════════════════════════════════════
   LV10 – 모든 요소가 단일 hue-rotate로
   이모지 글로우 색상과 완전히 동기화
══════════════════════════════════════ */

/* 공통 순환 속도: 3s – 모든 LV10 요소가 동일 duration 사용 */

/* 이모지 아이콘 글로우 – 기준 색상 순환 */
.card-scene[data-lv="10"] .card-main-icon{
  animation:iconHover 3.5s ease-in-out infinite, lv10Hue 3s linear infinite;
}

/* 핵심: hue-rotate 로 모든 요소 동기화 */
@keyframes lv10Hue{
  0%  {filter:drop-shadow(0 0 18px #ff0040) drop-shadow(0 0 40px #ff0040) drop-shadow(0 0 60px rgba(255,0,64,.4));}
  16% {filter:drop-shadow(0 0 18px #ff8800) drop-shadow(0 0 40px #ff8800) drop-shadow(0 0 60px rgba(255,136,0,.4));}
  33% {filter:drop-shadow(0 0 18px #ffee00) drop-shadow(0 0 40px #ffee00) drop-shadow(0 0 60px rgba(255,238,0,.4));}
  50% {filter:drop-shadow(0 0 18px #00ff88) drop-shadow(0 0 40px #00ff88) drop-shadow(0 0 60px rgba(0,255,136,.4));}
  66% {filter:drop-shadow(0 0 18px #00aaff) drop-shadow(0 0 40px #00aaff) drop-shadow(0 0 60px rgba(0,170,255,.4));}
  83% {filter:drop-shadow(0 0 18px #aa00ff) drop-shadow(0 0 40px #aa00ff) drop-shadow(0 0 60px rgba(170,0,255,.4));}
  100%{filter:drop-shadow(0 0 18px #ff0040) drop-shadow(0 0 40px #ff0040) drop-shadow(0 0 60px rgba(255,0,64,.4));}
}

/* 테두리 프레임 – 동일 hue 순환 */
.card-scene[data-lv="10"] .card-frame{
  background:#ff0040;
  animation:lv10FrameColor 3s linear infinite;
}
@keyframes lv10FrameColor{
  0%  {background:#ff0040; filter:brightness(1.8) blur(0px);}
  16% {background:#ff8800; filter:brightness(1.8) blur(0px);}
  33% {background:#ffee00; filter:brightness(1.8) blur(0px);}
  50% {background:#00ff88; filter:brightness(1.8) blur(0px);}
  66% {background:#00aaff; filter:brightness(1.8) blur(0px);}
  83% {background:#aa00ff; filter:brightness(1.8) blur(0px);}
  100%{background:#ff0040; filter:brightness(1.8) blur(0px);}
}

/* 빔 – 동일 hue 순환 */
.beam-ring.rb{
  background:conic-gradient(
    from 0deg,
    transparent 0%,
    #ff0040 2%,rgba(255,255,255,.95) 5%,#ff0040 8%,
    transparent 12%,transparent 100%
  );
  animation:beamRingSpin var(--beam-speed,2.5s) linear infinite,
            lv10BeamColor 3s linear infinite;
}
@keyframes lv10BeamColor{
  0%  {filter:hue-rotate(0deg)   brightness(2) saturate(1.6);}
  100%{filter:hue-rotate(360deg) brightness(2) saturate(1.6);}
}

/* 상단 밴드 – 동일 hue 순환 */
.card-scene[data-lv="10"] .card-top-band{
  background:linear-gradient(180deg,rgba(255,0,64,.65) 0%,transparent 100%);
  animation:lv10BandColor 3s linear infinite;
}
/* 하단 밴드 – 동일 hue 순환 */
.card-scene[data-lv="10"] .card-bot-band{
  background:linear-gradient(0deg,rgba(255,0,64,.65) 0%,transparent 100%);
  animation:lv10BandColor 3s linear infinite;
}
@keyframes lv10BandColor{
  0%  {filter:hue-rotate(0deg)   brightness(1.6) saturate(1.5);}
  100%{filter:hue-rotate(360deg) brightness(1.6) saturate(1.5);}
}

/* 카드 내부 face – 동일 hue */
.card-scene[data-lv="10"] .card-face{
  background:
    linear-gradient(160deg,#220010 0%,#0d0018 50%,#001022 100%) !important;
  animation:lv10FaceColor 3s linear infinite !important;
}
@keyframes lv10FaceColor{
  0%  {filter:hue-rotate(0deg)   brightness(1.05);}
  100%{filter:hue-rotate(360deg) brightness(1.05);}
}

/* 보케 – 동일 hue */
.card-scene[data-lv="10"] .card-bokeh{
  animation:lv10BandColor 3s linear infinite;
}

/* 이름 텍스트 – 동일 hue */
.card-scene[data-lv="10"] .card-main-name{
  color:#ff0040 !important;
  -webkit-text-fill-color:#ff0040 !important;
  text-shadow:0 0 16px #ff0040, 0 0 32px rgba(255,0,64,.6) !important;
  animation:lv10NameColor 3s linear infinite !important;
  background:none !important;
}
@keyframes lv10NameColor{
  0%  {color:#ff0040;-webkit-text-fill-color:#ff0040;text-shadow:0 0 16px #ff0040,0 0 32px rgba(255,0,64,.6),0 2px 8px rgba(0,0,0,.65);}
  16% {color:#ff8800;-webkit-text-fill-color:#ff8800;text-shadow:0 0 16px #ff8800,0 0 32px rgba(255,136,0,.6),0 2px 8px rgba(0,0,0,.65);}
  33% {color:#ffee00;-webkit-text-fill-color:#ffee00;text-shadow:0 0 16px #ffee00,0 0 32px rgba(255,238,0,.6),0 2px 8px rgba(0,0,0,.65);}
  50% {color:#00ff88;-webkit-text-fill-color:#00ff88;text-shadow:0 0 16px #00ff88,0 0 32px rgba(0,255,136,.6),0 2px 8px rgba(0,0,0,.65);}
  66% {color:#00aaff;-webkit-text-fill-color:#00aaff;text-shadow:0 0 16px #00aaff,0 0 32px rgba(0,170,255,.6),0 2px 8px rgba(0,0,0,.65);}
  83% {color:#aa00ff;-webkit-text-fill-color:#aa00ff;text-shadow:0 0 16px #aa00ff,0 0 32px rgba(170,0,255,.6),0 2px 8px rgba(0,0,0,.65);}
  100%{color:#ff0040;-webkit-text-fill-color:#ff0040;text-shadow:0 0 16px #ff0040,0 0 32px rgba(255,0,64,.6),0 2px 8px rgba(0,0,0,.65);}
}

/* 배지 – 동일 hue */
.card-scene[data-lv="10"] .card-badge{
  background:#ff0040 !important;
  border-color:rgba(255,255,255,.35) !important;
  animation:lv10FrameColor 3s linear infinite !important;
}

/* 별 – 동일 hue */
.card-scene[data-lv="10"] .card-star{
  animation:starTwinkle 2s ease-in-out infinite, lv10StarColor 3s linear infinite;
}
@keyframes lv10StarColor{
  0%  {color:#ff0040;filter:drop-shadow(0 0 5px #ff0040);}
  16% {color:#ff8800;filter:drop-shadow(0 0 5px #ff8800);}
  33% {color:#ffee00;filter:drop-shadow(0 0 5px #ffee00);}
  50% {color:#00ff88;filter:drop-shadow(0 0 5px #00ff88);}
  66% {color:#00aaff;filter:drop-shadow(0 0 5px #00aaff);}
  83% {color:#aa00ff;filter:drop-shadow(0 0 5px #aa00ff);}
  100%{color:#ff0040;filter:drop-shadow(0 0 5px #ff0040);}
}

/* 글로우 box-shadow – 동일 hue */
.card-scene[data-lv="10"] .card-body{
  animation:lv10Glow 3s linear infinite;
}
@keyframes lv10Glow{
  0%  {box-shadow:0 38px 95px rgba(0,0,0,.82),0 0 90px rgba(255,0,64,.7), 0 0 160px rgba(255,0,64,.4), 0 0 0 1px rgba(255,0,64,.5);}
  16% {box-shadow:0 38px 95px rgba(0,0,0,.82),0 0 90px rgba(255,136,0,.7),0 0 160px rgba(255,136,0,.4),0 0 0 1px rgba(255,136,0,.5);}
  33% {box-shadow:0 38px 95px rgba(0,0,0,.82),0 0 90px rgba(255,238,0,.7),0 0 160px rgba(255,238,0,.4),0 0 0 1px rgba(255,238,0,.5);}
  50% {box-shadow:0 38px 95px rgba(0,0,0,.82),0 0 90px rgba(0,255,136,.7),0 0 160px rgba(0,255,136,.4),0 0 0 1px rgba(0,255,136,.5);}
  66% {box-shadow:0 38px 95px rgba(0,0,0,.82),0 0 90px rgba(0,170,255,.7),0 0 160px rgba(0,170,255,.4),0 0 0 1px rgba(0,170,255,.5);}
  83% {box-shadow:0 38px 95px rgba(0,0,0,.82),0 0 90px rgba(170,0,255,.7),0 0 160px rgba(170,0,255,.4),0 0 0 1px rgba(170,0,255,.5);}
  100%{box-shadow:0 38px 95px rgba(0,0,0,.82),0 0 90px rgba(255,0,64,.7), 0 0 160px rgba(255,0,64,.4), 0 0 0 1px rgba(255,0,64,.5);}
}

/* 푸터 – 동일 hue */
.card-scene[data-lv="10"] .card-footer{
  background:#ff0040 !important;
  border-top:1px solid rgba(255,255,255,.3) !important;
  animation:lv10FrameColor 3s linear infinite !important;
}
.card-scene[data-lv="10"] .footer-lv,
.card-scene[data-lv="10"] .footer-name{
  color:#fff !important;-webkit-text-fill-color:#fff !important;
  text-shadow:0 0 8px rgba(255,255,255,.8) !important;
}
.card-scene[data-lv="10"] .footer-subs{color:rgba(255,255,255,.8) !important;}

/* 스파클 – 동일 hue */
.card-scene[data-lv="10"] .sparkle-dot{
  animation:sparklePop var(--sdur,2.2s) ease-in-out infinite,
            lv10StarColor 3s linear infinite;
  animation-delay:var(--sdel,0s),0s;
}
</style>
</head>
<body>

<div class="page-title">▶ 3D 레벨 카드 미리보기</div>
<div class="page-sub">마우스를 카드 위에 올리면 빔·테두리·카드가 함께 3D 틸트됩니다</div>
<div class="cards-grid" id="cards-grid"></div>

<script>
const GRADES=[
  {lv:1, name:'씨앗',            icon:'🌱',badge:'Seed',
   ca:'#546e7a',cb:'#b0bec5',cc:'#eceff1',subs:'0 ~ 100',
   beamSpeed:'4.2s',bandOp:13,stars:1,beamCount:1,
   bokeh:[{w:34,h:34,l:8,t:7,blur:6,op:.28},{w:18,h:18,l:62,t:18,blur:4,op:.22}],
   sparkles:[{l:22,t:34,sd:'2.3s',sl:'0s'},{l:55,t:14,sd:'2.9s',sl:'.4s'},{l:76,t:42,sd:'2.6s',sl:'.8s'}]},

  {lv:2, name:'새싹',            icon:'🌿',badge:'Sprout',
   ca:'#0277bd',cb:'#4fc3f7',cc:'#e1f5fe',subs:'100 ~ 1K',
   beamSpeed:'3.8s',bandOp:17,stars:2,beamCount:1,
   bokeh:[{w:38,h:38,l:7,t:5,blur:7,op:.32},{w:22,h:22,l:58,t:17,blur:4,op:.26},{w:14,h:14,l:32,t:30,blur:3,op:.2}],
   sparkles:[{l:18,t:30,sd:'2s',sl:'0s'},{l:58,t:11,sd:'2.5s',sl:'.3s'},{l:80,t:40,sd:'2.2s',sl:'.7s'}]},

  {lv:3, name:'나무',            icon:'🌳',badge:'Tree',

function buildBeams(g){
  const n=g.beamCount, spd=parseFloat(g.beamSpeed);
  const isRb=g.lv===10;
  let html='';
  for(let i=0;i<n;i++){
    const delay='-'+((spd/n)*i).toFixed(3)+'s';
    const cls=isRb?'beam-ring rb':'beam-ring';
    html+=`<div class="beam-container" style="--cb:${g.cb};">
      <div class="${cls}" style="animation-duration:${g.beamSpeed};animation-delay:${delay};"></div>
    </div>`;
  }
  return html;
}

function buildCardHTML(g){
  const isRb=g.lv===10;
  const stars=Array.from({length:5},(_,i)=>
    `<span class="card-star" style="opacity:${i<g.stars?1:.16};--st-dur:${2+i*.45}s;--st-del:${i*.22}s">&starf;</span>`
  ).join('');
  const bokeh=g.bokeh.map((b,i)=>
    `<div class="bokeh-dot" style="width:${b.w}px;height:${b.h}px;left:${b.l}%;top:${b.t}%;--bblur:${b.blur}px;--bop:${b.op};--bdur:${5.5+i*1.4}s;--bdel:${i*.65}s;"></div>`
  ).join('');
  const sparkles=g.sparkles.map(s=>
    `<span class="sparkle-dot" style="left:${s.l}%;top:${s.t}%;--ssz:${9+Math.min(g.lv,5)}px;--sdur:${s.sd};--sdel:${s.sl};">✦</span>`
  ).join('');
  const frameBg=isRb?'':
    `background:linear-gradient(135deg,
      color-mix(in srgb,${g.cb} 80%,#fff) 0%,
      color-mix(in srgb,${g.cb} 40%,transparent) 40%,
      color-mix(in srgb,${g.cb} 70%,#fff) 60%,
      color-mix(in srgb,${g.cb} 30%,transparent) 100%);`;

  return `
<div class="card-scene" data-lv="${g.lv}"
  style="--ca:${g.ca};--cb:${g.cb};--cc:${g.cc};--band-op:${g.bandOp}%;"
  onmousemove="card3D(event,this)"
  onmouseleave="cardReset(this)">
  <div class="card-tilt">
    <div class="card-frame" style="${frameBg}"></div>
    ${buildBeams(g)}
    <div class="card-body">
      <div class="card-face">
        <div class="card-bokeh">${bokeh}</div>
        <div class="card-sparkles">${sparkles}</div>
        <div class="card-header">
          <div class="card-stars">${stars}</div>
          <div class="card-badge">${g.badge}</div>
        </div>
        <div class="card-icon-wrap">
          <div class="card-main-icon">${g.icon}</div>
          <div class="card-main-name">${g.name}</div>
        </div>
        <div class="card-top-band"></div>
        <div class="card-bot-band"></div>
        <div class="card-vignette"></div>
        <div class="card-shine"></div>
        <div class="card-footer">
          <div class="footer-lv">LV.${g.lv}</div>
          <div class="footer-name">${g.name}</div>
          <div class="footer-subs">${g.subs}</div>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

function card3D(e,el){
  const r=el.getBoundingClientRect();
  const x=e.clientX-r.left,y=e.clientY-r.top;
  const cx=r.width/2,cy=r.height/2,MAX=20;
  const ry=((x-cx)/cx)*MAX,rx=-((y-cy)/cy)*MAX;
  const mx=(x/r.width*100).toFixed(1)+'%';
  const my=(y/r.height*100).toFixed(1)+'%';
  el.querySelector('.card-tilt').style.transform=
    `rotateX(${rx}deg) rotateY(${ry}deg) scale(1.04)`;
  el.querySelector('.card-shine').style.background=`
    linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),
    linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%),
    radial-gradient(ellipse 55% 45% at ${mx} ${my},
      rgba(255,255,255,.22) 0%,rgba(255,255,255,.05) 50%,transparent 75%)`;
  if(el.dataset.lv!=='10'){
    el.querySelector('.card-face').style.background=`
      radial-gradient(ellipse 78% 58% at ${mx} ${my},
        color-mix(in srgb,var(--cb) 24%,transparent) 0%,transparent 68%),
      linear-gradient(160deg,
        color-mix(in srgb,var(--ca) 30%,#0d0d1a) 0%,
        #0d0d1a 55%,
        color-mix(in srgb,var(--ca) 14%,#07070f) 100%)`;
  }
}

function cardReset(el){
  el.querySelector('.card-tilt').style.transform=
    'rotateX(0deg) rotateY(0deg) scale(1)';
  el.querySelector('.card-shine').style.background=`
    linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),
    linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%)`;
  if(el.dataset.lv!=='10')
    el.querySelector('.card-face').style.background='';
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('cards-grid').innerHTML=
    GRADES.map(g=>buildCardHTML(g)).join('');
});
