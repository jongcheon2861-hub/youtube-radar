<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALGO – YTAnalytics Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
  <style>
    /* ══════════════════════════════════════
       ROOT & RESET
    ══════════════════════════════════════ */
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a26;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --gold: #f59e0b;
      --text-primary: #f0f0ff;
      --text-secondary: #8888aa;
      --border: rgba(255,255,255,.08);
      --surface: var(--bg-secondary);
      --danger: #ef4444;
      --success: #10b981;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* ══════════════════════════════════════
       LOGO / FAVICON INTRO
    ══════════════════════════════════════ */
    #logo-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #0a0a0f;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
      animation: fadeOutScreen 0.5s ease 2.2s forwards;
    }
    @keyframes fadeOutScreen {
      to { opacity: 0; pointer-events: none; }
    }
    .logo-cinzel {
      font-family: 'Cinzel', serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: .18em;
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 40%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: logoPulse 1.8s ease infinite alternate;
    }
    @keyframes logoPulse {
      from { filter: drop-shadow(0 0 12px #7c3aed88); }
      to   { filter: drop-shadow(0 0 32px #a855f7cc); }
    }
    .logo-sub {
      font-size: .95rem;
      color: var(--text-secondary);
      letter-spacing: .25em;
      text-transform: uppercase;
    }
    #favicon-previews { display: flex; gap: 12px; align-items: flex-end; }
    #favicon-previews canvas { border-radius: 4px; }

    /* Stars */
    #star-bg {
      position: fixed; inset: 0; z-index: 9998; pointer-events: none;
    }

    /* ══════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════ */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    /* Header */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px;
      background: rgba(10,10,15,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
    }
    .header-logo {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #7c3aed, #a855f7, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .1em;
      white-space: nowrap;
    }
    .header-api-wrap {
      display: flex; align-items: center; gap: 8px;
      flex: 1; max-width: 420px; margin-left: auto;
    }
    .header-api-input {
      flex: 1; padding: 7px 12px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: .8rem;
    }
    .header-api-input:focus { outline: none; border-color: var(--accent); }
    .btn-sm {
      padding: 7px 14px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff;
      font-size: .8rem; font-weight: 600; cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    .btn-sm:hover { background: var(--accent2); }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 56px; left: 0; bottom: 0; z-index: 90;
      width: 64px;
      background: rgba(10,10,15,.92);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 0; gap: 4px;
      transition: width .25s;
      overflow: hidden;
    }
    .sidebar:hover { width: 180px; }
    .nav-item {
      width: 100%; display: flex; align-items: center; gap: 12px;
      padding: 10px 18px; cursor: pointer; border-radius: 0;
      border: none; background: none; color: var(--text-secondary);
      font-size: .88rem; font-weight: 500;
      transition: background .18s, color .18s;
      white-space: nowrap;
    }
    .nav-item .nav-icon { font-size: 1.25rem; min-width: 28px; text-align: center; }
    .nav-item:hover, .nav-item.active {
      background: rgba(124,58,237,.18);
      color: var(--accent2);
    }
    .nav-item.active { border-right: 3px solid var(--accent); }

    /* Main */
    .main-content {
      margin-top: 56px;
      margin-left: 64px;
      padding: 24px 20px;
      min-height: calc(100vh - 56px);
    }
    .content-section { display: none; }
    .content-section.active { display: block; }

    .section-header { margin-bottom: 22px; }
    .section-title { font-size: 1.4rem; font-weight: 800; color: var(--text-primary); }
    .section-subtitle { font-size: .85rem; color: var(--text-secondary); margin-top: 4px; }

    /* ══════════════════════════════════════
       TOAST
    ══════════════════════════════════════ */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--bg-tertiary); border: 1px solid var(--border);
      color: var(--text-primary); padding: 10px 20px; border-radius: 12px;
      font-size: .85rem; z-index: 9999;
      transition: transform .3s, opacity .3s; opacity: 0;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ══════════════════════════════════════
       HOT VIDEOS
    ══════════════════════════════════════ */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px;
    }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-secondary);
      font-size: .8rem; cursor: pointer; transition: all .18s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .search-bar {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .search-input {
      flex: 1; padding: 10px 14px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary); font-size: .88rem;
    }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .video-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      cursor: pointer; transition: transform .2s, box-shadow .2s;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(124,58,237,.25);
    }
    .video-thumb {
      width: 100%; aspect-ratio: 16/9;
      object-fit: cover; display: block;
      background: var(--bg-tertiary);
    }
    .video-info { padding: 12px; }
    .video-title {
      font-size: .88rem; font-weight: 600; color: var(--text-primary);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 6px;
    }
    .video-meta {
      font-size: .75rem; color: var(--text-secondary);
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .video-badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 10px; font-size: .7rem; font-weight: 700;
      background: rgba(124,58,237,.25); color: var(--accent2);
    }

    /* ══════════════════════════════════════
       VIDEO MODAL
    ══════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.82);
      display: none; align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-secondary);
      border-radius: 18px; overflow: hidden;
      width: 91.2vw; max-width: 860px;
      max-height: 90vh; overflow-y: auto;
      position: relative;
    }
    .modal-header { display: none; }
    .modal-player-wrap { position: relative; }
    .modal-player-wrap iframe {
      width: 100%; aspect-ratio: 16/9; display: block; border: none;
    }
    .modal-close {
      position: absolute; top: 10px; right: 10px;
      width: 36px; height: 36px; border-radius: 50%;
      border: none; background: rgba(0,0,0,.7);
      color: #fff; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .modal-ads-top {
      width: 100%; background: rgba(255,255,255,.03);
      display: flex; align-items: center; justify-content: center;
      padding: 6px; border-bottom: 1px solid var(--border);
      font-size: .7rem; color: var(--text-secondary); min-height: 60px;
    }
    .modal-tabs {
      display: flex; border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }
    .modal-tab {
      padding: 10px 16px; font-size: .85rem; font-weight: 600;
      color: var(--text-secondary); cursor: pointer; border: none;
      background: none; border-bottom: 2px solid transparent;
      transition: color .18s, border-color .18s;
    }
    .modal-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
    .modal-tab-content { padding: 16px; display: none; }
    .modal-tab-content.active { display: block; }
    .modal-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; padding: 16px;
    }
    .modal-stat {
      background: var(--bg-tertiary); border-radius: 10px;
      padding: 12px; text-align: center;
    }
    .modal-stat-val { font-size: 1.1rem; font-weight: 800; color: var(--accent2); }
    .modal-stat-lbl { font-size: .7rem; color: var(--text-secondary); margin-top: 2px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-chip {
      padding: 4px 10px; border-radius: 12px;
      background: rgba(124,58,237,.18); color: var(--accent2);
      font-size: .75rem;
    }
    .copy-btn {
      margin-top: 10px; padding: 7px 16px; border-radius: 8px;
      border: 1px solid var(--accent); background: none;
      color: var(--accent2); font-size: .8rem; cursor: pointer;
    }
    .copy-btn:hover { background: rgba(124,58,237,.2); }
    .desc-box {
      font-size: .82rem; color: var(--text-secondary);
      line-height: 1.7; white-space: pre-wrap;
      max-height: 260px; overflow-y: auto;
    }

    /* ══════════════════════════════════════
       CHANNEL ANALYSIS
    ══════════════════════════════════════ */
    .channel-search { display: flex; gap: 8px; margin-bottom: 20px; }
    .channel-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      display: flex; gap: 16px; align-items: flex-start;
      margin-bottom: 20px;
    }
    .channel-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--accent);
    }
    .channel-name { font-size: 1.15rem; font-weight: 700; }
    .channel-handle { font-size: .82rem; color: var(--text-secondary); margin-bottom: 8px; }
    .channel-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-top: 16px;
    }
    .ch-stat {
      background: var(--bg-tertiary); border-radius: 10px;
      padding: 12px; text-align: center;
    }
    .ch-stat-val { font-size: 1.05rem; font-weight: 800; color: var(--gold); }
    .ch-stat-lbl { font-size: .7rem; color: var(--text-secondary); }
    .recent-videos { margin-top: 20px; }
    .recent-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }

    /* ══════════════════════════════════════
       REVENUE CALCULATOR
    ══════════════════════════════════════ */
    .rev-wrap { display: flex; flex-direction: column; gap: 18px; }
    .rev-input-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px 14px;
    }
    .rev-label {
      font-size: .85rem; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 12px;
    }
    .rev-gauge-wrap {
      display: flex; align-items: center; gap: 10px;
    }
    .rev-gauge-btn {
      width: 44px; height: 44px; min-width: 44px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1.3rem; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
      user-select: none;
    }
    .rev-gauge-btn:active { background: var(--accent); transform: scale(.93); }
    .rev-gauge-track {
      flex: 1; height: 28px; border-radius: 14px;
      background: rgba(255,255,255,.07);
      border: 1px solid var(--border);
      position: relative; cursor: pointer;
      touch-action: none; overflow: hidden;
    }
    .rev-gauge-fill {
      height: 100%; border-radius: 14px;
      background: linear-gradient(90deg, #7c3aed, #a855f7, #f59e0b);
      transition: width .1s; pointer-events: none;
    }
    .rev-gauge-val {
      text-align: right; font-size: .92rem; font-weight: 700;
      color: var(--text-primary); margin-top: 8px; letter-spacing: -.2px;
    }
    .rev-results-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; margin-top: 4px;
    }
    .rev-result-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .rev-result-val {
      font-size: 1.15rem; font-weight: 800; color: var(--accent);
    }
    .rev-result-lbl {
      font-size: .75rem; color: var(--text-secondary); margin-top: 4px;
    }
    .rev-tip {
      text-align: center; font-size: .88rem;
      color: var(--text-secondary); padding: 10px 0 2px;
    }

    /* ══════════════════════════════════════
       AI IDEA GENERATOR
    ══════════════════════════════════════ */
    .genre-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .genre-tag {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-secondary);
      font-size: .8rem; cursor: pointer; transition: all .18s;
    }
    .genre-tag.active, .genre-tag:hover {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .idea-btn {
      width: 100%; padding: 13px; border-radius: 12px;
      border: none; background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-bottom: 20px;
      transition: opacity .2s;
    }
    .idea-btn:hover { opacity: .88; }
    .idea-list { display: flex; flex-direction: column; gap: 12px; }
    .idea-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
    }
    .idea-title { font-size: .92rem; font-weight: 700; margin-bottom: 6px; }
    .idea-desc { font-size: .8rem; color: var(--text-secondary); }

    /* ══════════════════════════════════════
       TOOLS
    ══════════════════════════════════════ */
    .tool-tabs {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px;
    }
    .tool-tab {
      padding: 7px 16px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-secondary);
      font-size: .82rem; font-weight: 600; cursor: pointer;
      transition: all .18s;
    }
    .tool-tab.active, .tool-tab:hover {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .tool-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 14px;
      cursor: pointer; transition: transform .2s, box-shadow .2s;
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; text-align: center;
    }
    .tool-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(124,58,237,.2);
    }
    .tool-icon {
      width: 44px; height: 44px; border-radius: 10px;
      object-fit: contain; background: var(--bg-tertiary);
      padding: 4px;
    }
    .tool-name { font-size: .88rem; font-weight: 700; }
    .tool-desc { font-size: .75rem; color: var(--text-secondary); }
    .tool-badge {
      font-size: .68rem; font-weight: 700; padding: 2px 8px;
      border-radius: 8px;
    }
    .tb-free { background: rgba(16,185,129,.2); color: #10b981; }
    .tb-paid { background: rgba(239,68,68,.2); color: #ef4444; }
    .tb-freemium { background: rgba(245,158,11,.2); color: #f59e0b; }

    /* Tool Modal */
    .tool-modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.8);
      display: none; align-items: center; justify-content: center;
    }
    .tool-modal-overlay.open { display: flex; }
    .tool-modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 18px; padding: 28px;
      max-width: 400px; width: 90%; text-align: center;
      position: relative;
    }
    .tool-modal-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none; color: var(--text-secondary);
      font-size: 1.2rem; cursor: pointer;
    }
    .tool-modal-icon {
      width: 64px; height: 64px; border-radius: 14px;
      object-fit: contain; background: var(--bg-tertiary);
      padding: 8px; margin-bottom: 12px;
    }
    .tool-modal-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; }
    .tool-modal-desc {
      font-size: .85rem; color: var(--text-secondary);
      line-height: 1.6; margin-bottom: 18px;
    }
    .tool-modal-link {
      display: inline-block; padding: 10px 28px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-weight: 700; font-size: .9rem;
      transition: opacity .2s;
    }
    .tool-modal-link:hover { opacity: .85; }

    /* ══════════════════════════════════════
       SHOP
    ══════════════════════════════════════ */
    .shop-notice {
      font-size: .75rem; color: var(--text-secondary);
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px;
      margin-bottom: 20px; text-align: center;
    }
    .shop-cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .shop-cat-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; padding: 28px 16px 22px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px; cursor: pointer;
      transition: transform .22s, box-shadow .22s, border-color .22s;
      position: relative; overflow: hidden; text-align: center;
    }
    .shop-cat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
      border-color: var(--cat-color, var(--accent));
    }
    .shop-cat-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,.3)); }
    .shop-cat-label { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); }
    .shop-cat-desc { font-size: .78rem; color: var(--text-secondary); }
    .shop-cat-cta {
      margin-top: 6px; font-size: .82rem; font-weight: 600;
      color: var(--cat-color, var(--accent));
      background: rgba(255,255,255,.06);
      border: 1px solid var(--cat-color, var(--accent));
      border-radius: 20px; padding: 5px 16px;
    }
    @media (max-width: 600px) {
      .shop-cat-grid { grid-template-columns: repeat(2, 1fr); }
      .shop-cat-card { padding: 18px 10px 14px; }
    }

    /* ══════════════════════════════════════
       LOADING SPINNER
    ══════════════════════════════════════ */
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .7s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 600px) {
      .main-content { margin-left: 0; padding: 16px 12px; padding-bottom: 80px; }
      .sidebar {
        top: auto; bottom: 0; left: 0; right: 0;
        width: 100% !important; height: 60px;
        flex-direction: row; padding: 0;

<script>
/* ══════════════════════════════════════════════════════════
   FAVICON / LOGO INIT
══════════════════════════════════════════════════════════ */
(function buildFavicon() {
  const sizes = [16, 32, 64, 256];
  const previews = document.getElementById('favicon-previews');
  sizes.forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    const ctx = canvas.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, size, size);
    g.addColorStop(0, '#7c3aed');
    g.addColorStop(0.5, '#a855f7');
    g.addColorStop(1, '#f59e0b');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `900 ${size * 0.55}px 'Cinzel', serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('A', size / 2, size / 2 + size * 0.04);
    const link = document.createElement('link');
    link.rel = 'icon';
    link.type = 'image/png';
    link.sizes = `${size}x${size}`;
    link.href = canvas.toDataURL();
    document.head.appendChild(link);
    if (size <= 64 && previews) {
      canvas.style.width = canvas.style.height = Math.max(size, 24) + 'px';
      previews.appendChild(canvas);
    }
  });
})();

/* Star background */
(function initStars() {
  const cv = document.getElementById('star-bg');
  const ctx = cv.getContext('2d');
  let stars = [];
  function resize() {
    cv.width = innerWidth; cv.height = innerHeight;
    stars = Array.from({ length: 120 }, () => ({
      x: Math.random() * cv.width, y: Math.random() * cv.height,
      r: Math.random() * 1.2 + 0.2, a: Math.random(),
      da: (Math.random() - 0.5) * 0.005
    }));
  }
  resize();
  window.addEventListener('resize', resize);
  function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    stars.forEach(s => {
      s.a = Math.max(0.05, Math.min(1, s.a + s.da));
      if (s.a <= 0.05 || s.a >= 1) s.da *= -1;
      ctx.globalAlpha = s.a;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* Show app after logo */
setTimeout(() => {
  document.getElementById('logo-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  loadHotVideos();
}, 2700);

/* ══════════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════════ */
function fmt(n) {
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
  if (n >= 10000) return (n / 10000).toFixed(1) + '만';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n?.toLocaleString() ?? '0';
}
function fmtDate(iso) {
  if (!iso) return '';
  return iso.slice(0, 10).replace(/-/g, '.');
}
function fmtDuration(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = +m[1] || 0, min = +m[2] || 0, s = +m[3] || 0;
  return h ? `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`
           : `${min}:${String(s).padStart(2,'0')}`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function getApiKey() { return localStorage.getItem('yt_api_key') || ''; }
function saveApiKey() {
  const v = document.getElementById('apiKeyInput').value.trim();
  if (!v) { showToast('API Key를 입력하세요'); return; }
  localStorage.setItem('yt_api_key', v);
  showToast('API Key 저장됨 ✓');
  loadHotVideos();
}

/* ══════════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════════ */
function showSec(id) {
  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  if (id === 'revenue') { buildRevInputs(); calcRevenue(); }
  if (id === 'ideas')   { buildGenreTags(); }
  if (id === 'tools')   { renderTools(); }
  if (id === 'shop')    { buildShop(); }
}

/* ══════════════════════════════════════════════════════════
   HOT VIDEOS
══════════════════════════════════════════════════════════ */
let allVideos = [];
let currentCat = '0';

async function loadHotVideos() {
  const key = getApiKey();
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = '<div class="spinner"></div>';
  if (!key) {
    grid.innerHTML = '<p style="color:var(--text-secondary);padding:20px">API Key를 입력하고 저장하세요.</p>';
    return;
  }
  try {
    const catParam = currentCat !== '0' ? `&videoCategoryId=${currentCat}` : '';
    const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&regionCode=KR&maxResults=50&key=${key}${catParam}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    allVideos = data.items || [];
    renderVideos(allVideos);
  } catch (e) {
    grid.innerHTML = `<p style="color:var(--danger);padding:20px">오류: ${e.message}</p>`;
  }
}

function renderVideos(videos) {
  const grid = document.getElementById('videoGrid');
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q ? videos.filter(v => v.snippet.title.toLowerCase().includes(q)) : videos;
  if (!filtered.length) { grid.innerHTML = '<p style="color:var(--text-secondary);padding:20px">영상이 없습니다.</p>'; return; }
  grid.innerHTML = filtered.map((v, i) => `
    <div class="video-card" onclick="openModal('${v.id}')">
      <img class="video-thumb" src="${v.snippet.thumbnails?.medium?.url || ''}" alt="" loading="lazy" />
      <div class="video-info">
        <div class="video-badge">#${i + 1}</div>
        <div class="video-title">${v.snippet.title}</div>
        <div class="video-meta">
          <span>👁 ${fmt(+v.statistics.viewCount)}</span>
          <span>❤️ ${fmt(+v.statistics.likeCount)}</span>
          <span>⏱ ${fmtDuration(v.contentDetails.duration)}</span>
          <span>📅 ${fmtDate(v.snippet.publishedAt)}</span>
        </div>
      </div>
    </div>`).join('');
}

function filterCat(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  loadHotVideos();
}
function filterSearch() { renderVideos(allVideos); }

/* ══════════════════════════════════════════════════════════
   VIDEO MODAL
══════════════════════════════════════════════════════════ */
async function openModal(videoId) {
  const key = getApiKey();
  document.getElementById('videoModal').classList.add('open');
  document.getElementById('modalIframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById('modal-title-text').textContent = '불러오는 중...';
  document.getElementById('modal-tags').innerHTML = '';
  document.getElementById('modal-desc').textContent = '';
  document.getElementById('modal-stats').innerHTML = '';
  if (!key) return;
  try {
    const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${videoId}&key=${key}`);
    const data = await res.json();
    const v = data.items?.[0];
    if (!v) return;
    const sn = v.snippet, st = v.statistics;
    document.getElementById('modal-title-text').textContent = sn.title;
    const tags = sn.tags || [];
    document.getElementById('modal-tags').innerHTML = tags.map(t => `<span class="tag-chip">#${t}</span>`).join('');
    document.getElementById('modal-desc').textContent = sn.description || '설명 없음';
    document.getElementById('modal-stats').innerHTML = [
      ['조회수', fmt(+st.viewCount)],
      ['좋아요', fmt(+st.likeCount)],
      ['댓글', fmt(+(st.commentCount||0))],
      ['길이', fmtDuration(v.contentDetails.duration)],
      ['게시일', fmtDate(sn.publishedAt)],
      ['카테고리', sn.categoryId]
    ].map(([l,v2])=>`<div class="modal-stat"><div class="modal-stat-val">${v2}</div><div class="modal-stat-lbl">${l}</div></div>`).join('');
  } catch(e) { console.error(e); }
}

function closeModal(e) {
  if (e.target === document.getElementById('videoModal')) {
    document.getElementById('videoModal').classList.remove('open');
    document.getElementById('modalIframe').src = '';
  }
}
function switchModalTab(btn, id) {
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.modal-tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
}
function copyText(id) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.textContent).then(() => showToast('복사됨 ✓'));
}
function copyTags() {
  const tags = [...document.querySelectorAll('#modal-tags .tag-chip')].map(t => t.textContent).join(' ');
  navigator.clipboard.writeText(tags).then(() => showToast('해시태그 복사됨 ✓'));
}

/* ══════════════════════════════════════════════════════════
   CHANNEL ANALYSIS
══════════════════════════════════════════════════════════ */
async function searchChannel() {
  const key = getApiKey();
  const q = document.getElementById('channelInput').value.trim();
  const result = document.getElementById('channelResult');
  if (!key) { showToast('API Key를 먼저 저장하세요'); return; }
  if (!q) { showToast('채널명을 입력하세요'); return; }
  result.innerHTML = '<div class="spinner"></div>';
  try {
    const sr = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(q)}&maxResults=1&key=${key}`);
    const sd = await sr.json();
    const channelId = sd.items?.[0]?.id?.channelId;
    if (!channelId) throw new Error('채널을 찾을 수 없습니다');
    const cr = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,contentDetails&id=${channelId}&key=${key}`);
    const cd = await cr.json();
    const ch = cd.items?.[0];
    if (!ch) throw new Error('채널 정보 없음');
    const sn = ch.snippet, st = ch.statistics;
    const uploadsId = ch.contentDetails.relatedPlaylists.uploads;
    result.innerHTML = `
      <div class="channel-card">
        <img class="channel-avatar" src="${sn.thumbnails?.medium?.url||''}" alt="" />
        <div style="flex:1">
          <div class="channel-name">${sn.title}</div>
          <div class="channel-handle">${sn.customUrl||''}</div>
          <div style="font-size:.8rem;color:var(--text-secondary)">${sn.description?.slice(0,120)||''}...</div>
          <div class="channel-stats">
            <div class="ch-stat"><div class="ch-stat-val">${fmt(+st.subscriberCount)}</div><div class="ch-stat-lbl">구독자</div></div>
            <div class="ch-stat"><div class="ch-stat-val">${fmt(+st.viewCount)}</div><div class="ch-stat-lbl">총 조회수</div></div>
            <div class="ch-stat"><div class="ch-stat-val">${fmt(+st.videoCount)}</div><div class="ch-stat-lbl">영상 수</div></div>
          </div>
        </div>
      </div>
      <div class="recent-videos">
        <div class="recent-title">최근 업로드 영상</div>
        <div class="video-grid" id="recentGrid"><div class="spinner"></div></div>
      </div>`;
    loadRecentVideos(uploadsId, key);
  } catch(e) {
    result.innerHTML = `<p style="color:var(--danger);padding:20px">${e.message}</p>`;
  }
}

async function loadRecentVideos(uploadsId, key) {
  try {
    const pr = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=12&key=${key}`);
    const pd = await pr.json();
    const ids = pd.items.map(i => i.snippet.resourceId.videoId).join(',');
    const vr = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${ids}&key=${key}`);
    const vd = await vr.json();
    document.getElementById('recentGrid').innerHTML = vd.items.map(v => `
      <div class="video-card" onclick="openModal('${v.id}')">
        <img class="video-thumb" src="${v.snippet.thumbnails?.medium?.url||''}" alt="" loading="lazy" />
        <div class="video-info">
          <div class="video-title">${v.snippet.title}</div>
          <div class="video-meta">
            <span>👁 ${fmt(+v.statistics.viewCount)}</span>
            <span>❤️ ${fmt(+v.statistics.likeCount)}</span>
            <span>⏱ ${fmtDuration(v.contentDetails.duration)}</span>
          </div>
        </div>
      </div>`).join('');
  } catch(e) { console.error(e); }
}

/* ══════════════════════════════════════════════════════════
   REVENUE CALCULATOR
══════════════════════════════════════════════════════════ */
const REV_INPUTS = [
  { id:'views',  label:'월 예상 조회수',    unit:'회', min:1000,  max:50000000, step:10000, val:100000, fmt:n=>n.toLocaleString() },
  { id:'rpm',    label:'예상 RPM',          unit:'원', min:100,   max:30000,    step:100,   val:2500,   fmt:n=>n.toLocaleString() },
  { id:'ctr',    label:'CTR (클릭률)',      unit:'%',  min:0.1,   max:20,       step:0.1,   val:4,      fmt:n=>n.toFixed(1) },
  { id:'cpc',    label:'CPC (클릭당 단가)', unit:'원', min:10,    max:5000,     step:10,    val:200,    fmt:n=>n.toLocaleString() },
  { id:'clicks', label:'월 광고 클릭수',    unit:'회', min:0,     max:500000,   step:500,   val:4000,   fmt:n=>n.toLocaleString() },
];
const revVals = {};
REV_INPUTS.forEach(x => { revVals[x.id] = x.val; });

function buildRevInputs() {
  document.getElementById('revInputs').innerHTML = REV_INPUTS.map(inp => {
    const pct = ((revVals[inp.id] - inp.min) / (inp.max - inp.min) * 100).toFixed(1);
    return `
    <div class="rev-input-card">
      <div class="rev-label">📊 ${inp.label}</div>
      <div class="rev-gauge-wrap">
        <button class="rev-gauge-btn rev-gauge-minus" onpointerdown="adjRev('${inp.id}',-1)">−</button>
        <div class="rev-gauge-track" id="track_${inp.id}"
             onpointerdown="startDrag(event,'${inp.id}')"
             onclick="trackClick(event,'${inp.id}')">
          <div class="rev-gauge-fill" id="fill_${inp.id}" style="width:${pct}%"></div>
        </div>
        <button class="rev-gauge-btn rev-gauge-plus" onpointerdown="adjRev('${inp.id}',1)">+</button>
      </div>
      <div class="rev-gauge-val" id="val_${inp.id}">${inp.fmt(revVals[inp.id])} ${inp.unit}</div>
    </div>`;
  }).join('');
}

let dragId = null;
function startDrag(e, id) {
  dragId = id;
  e.currentTarget.setPointerCapture(e.pointerId);
  applyDrag(e, id);
  e.currentTarget.onpointermove = ev => { if (dragId === id) applyDrag(ev, id); };
  e.currentTarget.onpointerup = () => { dragId = null; };
  e.currentTarget.onpointercancel = () => { dragId = null; };
}
function applyDrag(e, id) {
  const inp = REV_INPUTS.find(x => x.id === id);
  const track = document.getElementById('track_' + id);
  const rect = track.getBoundingClientRect();
  let pct = (e.clientX - rect.left) / rect.width;
  pct = Math.max(0, Math.min(1, pct));
  revVals[id] = Math.round((inp.min + pct * (inp.max - inp.min)) / inp.step) * inp.step;
  revVals[id] = Math.min(Math.max(revVals[id], inp.min), inp.max);
  updateRevGauge(inp);
  calcRevenue();
}
function adjRev(id, dir) {
  const inp = REV_INPUTS.find(x => x.id === id);
  revVals[id] = Math.min(Math.max(revVals[id] + inp.step * dir, inp.min), inp.max);
  updateRevGauge(inp);
  calcRevenue();
}
function trackClick(e, id) { applyDrag(e, id); }
function updateRevGauge(inp) {
  const pct = ((revVals[inp.id] - inp.min) / (inp.max - inp.min) * 100).toFixed(1);
  const f = document.getElementById('fill_' + inp.id);
  const v = document.getElementById('val_' + inp.id);
  if (f) f.style.width = pct + '%';
  if (v) v.textContent = inp.fmt(revVals[inp.id]) + ' ' + inp.unit;
}
function calcRevenue() {
  const { views, rpm, ctr, cpc, clicks } = revVals;
  const rpmRevenue = Math.round(views / 1000 * rpm);
  const cpcRevenue = Math.round(clicks * cpc);
  const ctrClicks  = Math.round(views * (ctr / 100));
  const monthly    = Math.round((rpmRevenue + cpcRevenue) / 2);
  const fmt2 = n => n.toLocaleString('ko-KR') + '원';
  document.getElementById('revResults').innerHTML = `
    <div class="rev-result-card"><div class="rev-result-val">${fmt2(monthly)}</div><div class="rev-result-lbl">월 예상 수익</div></div>
    <div class="rev-result-card"><div class="rev-result-val">${fmt2(monthly * 12)}</div><div class="rev-result-lbl">연 예상 수익</div></div>
    <div class="rev-result-card"><div class="rev-result-val">${fmt2(rpmRevenue)}</div><div class="rev-result-lbl">RPM 기반 광고수익</div></div>
    <div class="rev-result-card"><div class="rev-result-val">${ctrClicks.toLocaleString()}회</div><div class="rev-result-lbl">CTR 예측 클릭수</div></div>`;
  document.getElementById('revTip').textContent =
    monthly >= 5000000 ? '🔥 상위 1% 수준! 정말 대단해요!' :
    monthly >= 1000000 ? '💪 월 100만원 이상! 전업 유튜버 가능한 수준이에요.' :
    monthly >= 300000  ? '📈 성장 중! 조금만 더 하면 큰 수익이 기다려요.' :
    '🌱 아직 시작 단계예요. 꾸준함이 핵심입니다!';
}
