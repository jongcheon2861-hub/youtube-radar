<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTAnalytics Pro – 유튜브 채널 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a25;
  --border:#2a2a3a;--text:#e8e8f0;--text2:#9090b0;
  --accent:#4f8ef7;--card-bg:#12121e;--card-border:#252535;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── KEYFRAMES ── */
@keyframes rainbowText{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes borderPulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes scoreIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
/* 3D float animation */
@keyframes float3d{
  0%  {transform:perspective(800px) rotateX(0deg) rotateY(0deg) translateY(0px);}
  25% {transform:perspective(800px) rotateX(3deg) rotateY(-4deg) translateY(-6px);}
  50% {transform:perspective(800px) rotateX(-2deg) rotateY(5deg) translateY(-10px);}
  75% {transform:perspective(800px) rotateX(4deg) rotateY(-2deg) translateY(-4px);}
  100%{transform:perspective(800px) rotateX(0deg) rotateY(0deg) translateY(0px);}
}
/* shimmer sweep */
@keyframes shimmer{
  0%  {background-position:-200% center;}
  100%{background-position:200% center;}
}
/* glow pulse for high-level text */
@keyframes glowPulse{
  0%,100%{text-shadow:0 0 8px var(--tc,#fff)66,0 0 20px var(--tc,#fff)33;}
  50%    {text-shadow:0 0 16px var(--tc,#fff)cc,0 0 40px var(--tc,#fff)66,0 0 60px var(--tc,#fff)33;}
}
/* border rotate glow for lv6+ */
@keyframes rotateBorder{
  0%  {background-position:0% 50%;}
  100%{background-position:400% 50%;}
}
@keyframes hoverLift{
  0%  {transform:perspective(800px) rotateX(0deg) rotateY(0deg) translateY(0);}
  100%{transform:perspective(800px) rotateX(-6deg) rotateY(8deg) translateY(-14px) scale(1.04);}
}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 16px;height:54px;}
.logo{font-size:1.1rem;font-weight:900;color:#ff4040;flex-shrink:0;}
.logo span{color:var(--accent);}
.header-search{flex:1;max-width:360px;display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.header-search input{flex:1;background:none;border:none;outline:none;color:var(--text);padding:7px 13px;font-size:.84rem;font-family:inherit;}
.header-search button{background:var(--accent);border:none;color:#fff;padding:7px 12px;cursor:pointer;font-size:.8rem;transition:background .2s;}
.header-search button:hover{background:#3a7ae8;}
.header-nav{display:flex;gap:4px;margin-left:auto;}
.nav-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:14px;cursor:pointer;font-size:.74rem;font-family:inherit;transition:all .2s;white-space:nowrap;}
.nav-btn:hover,.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.menu-btn{display:none;background:none;border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;cursor:pointer;}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 54px);}
.sidebar{width:190px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:10px 7px;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:.8rem;transition:all .2s;margin-bottom:2px;}
.sidebar-item:hover,.sidebar-item.active{background:var(--bg3);color:var(--text);transform:translateX(3px);}
.sidebar-icon{font-size:.9rem;width:18px;text-align:center;}

/* ── MAIN + AD ZONE ── */
.main-wrapper{flex:1;display:flex;min-width:0;}
.main{flex:1;padding:16px;overflow-y:auto;min-width:0;}
/* ad: 400px × 0.7 = 280px */
.ad-zone{width:280px;flex-shrink:0;padding:8px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;gap:8px;}
.ad-slot{background:var(--bg3);border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.68rem;color:var(--text2);text-align:center;}

.section{display:none;animation:fadeIn .33s ease;}
.section.active{display:block;}
.section-title{font-size:1.15rem;font-weight:900;margin-bottom:13px;color:var(--text);display:flex;align-items:center;gap:9px;}
.section-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
.btn{padding:7px 16px;border-radius:7px;border:none;font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#3a7ae8;transform:translateY(-1px);}
.btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.search-form{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.search-form input{flex:1;min-width:180px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:7px 12px;font-size:.83rem;font-family:inherit;outline:none;transition:border-color .2s;}
.search-form input:focus{border-color:var(--accent);}

/* ══════════════════════════════════════════
   LEVEL CARD  –  3D animated, no sparks
   border thickness: lv1=1px … lv10=10px
   lv6+ rotating gradient border + glow text
══════════════════════════════════════════ */
.lv-card-wrap{perspective:1000px;display:flex;justify-content:center;margin-bottom:10px;}

.lv-card{
  position:relative;
  width:252px;height:308px;
  border-radius:20px;
  background:var(--card-bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  cursor:pointer;
  animation:float3d 6s ease-in-out infinite;
  transition:animation .3s;
  /* border & glow applied via JS */
  border-style:solid;
}
.lv-card:hover{
  animation:none;
  transform:perspective(800px) rotateX(-6deg) rotateY(8deg) translateY(-14px) scale(1.04);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}
/* pseudo glow outer ring */
.lv-card::before{
  content:'';position:absolute;inset:-4px;border-radius:24px;
  border:inherit;border-color:var(--lv-glow,#4f8ef7);
  opacity:.28;filter:blur(5px);pointer-events:none;z-index:0;
  animation:borderPulse 2.4s ease-in-out infinite;
}
/* bottom ambient */
.lv-card::after{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(ellipse at 50% 110%,var(--lv-glow,#4f8ef7)22,transparent 62%);
  opacity:.18;pointer-events:none;z-index:0;
}

/* ── lv6+ rotating gradient border wrapper ── */
.lv-card.high-lv{border:none!important;}
.lv-card.high-lv .grad-border{
  position:absolute;inset:-2px;border-radius:22px;
  padding:2px;z-index:0;
  background:linear-gradient(var(--grad-angle,0deg),var(--lv-glow,#fff),var(--lv-glow2,#fff)33,var(--lv-glow,#fff)66,var(--lv-glow2,#fff));
  background-size:400% 400%;
  animation:rotateBorder 3s linear infinite;
}
.lv-card.high-lv .grad-border-inner{
  width:100%;height:100%;border-radius:20px;background:var(--card-bg);
}

/* ── level number ── */
.lv-num{
  font-size:4.8rem;font-weight:900;line-height:1;
  position:relative;z-index:2;letter-spacing:-2px;
  color:var(--lv-color,#9ca3af);
  -webkit-text-stroke:var(--lv-stroke,1px) var(--lv-color,#9ca3af);
  text-shadow:0 0 14px var(--lv-color,#9ca3af)66;
  transition:text-shadow .3s;
}
.lv-num.rainbow{
  background:linear-gradient(90deg,#ff0080,#ff6b00,#ffd700,#00e5ff,#7c3aed,#ff0080);
  background-size:300% 100%;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;-webkit-text-stroke:0;
  animation:rainbowText 2.5s linear infinite;filter:none;
}
/* lv6+ glow pulse on number */
.lv-num.glowing{
  --tc:var(--lv-color,#fff);
  animation:glowPulse 2s ease-in-out infinite;
}

.lv-label{font-size:.58rem;font-weight:700;letter-spacing:5px;color:var(--text2);text-transform:uppercase;position:relative;z-index:2;margin-top:-3px;}

/* ── grade name ── */
.lv-name{
  font-size:.98rem;font-weight:700;
  color:var(--lv-color,#9ca3af);
  position:relative;z-index:2;margin-top:7px;
  -webkit-text-stroke:var(--name-stroke,.3px) var(--lv-color,#9ca3af);
  text-shadow:0 0 5px var(--lv-color,#9ca3af)44;
}
.lv-name.rainbow{
  background:linear-gradient(90deg,#ff0080,#ff6b00,#ffd700,#00e5ff,#7c3aed,#ff0080);
  background-size:300% 100%;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;-webkit-text-stroke:0;
  animation:rainbowText 2.5s linear infinite;
}
.lv-name.glowing{
  --tc:var(--lv-color,#fff);
  animation:glowPulse 2.2s ease-in-out infinite;
}

/* lv6+ shimmer sweep on name */
.lv-name.shimmer-name{
  background:linear-gradient(90deg,var(--lv-color,#fff) 20%,#fff 50%,var(--lv-color,#fff) 80%);
  background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shimmer 2s linear infinite, glowPulse 2s ease-in-out infinite;
  -webkit-text-stroke:0;
}

.lv-range{font-size:.68rem;color:var(--lv-color,#9ca3af);opacity:.6;position:relative;z-index:2;margin-top:4px;text-align:center;}

/* ── overlay badges ── */
.lv-rank-badge{position:absolute;top:10px;left:12px;font-size:.6rem;padding:2px 7px;border-radius:6px;background:rgba(0,0,0,.65);border:1px solid var(--lv-glow,#333);color:var(--lv-color,#9ca3af);z-index:6;font-weight:700;}
.lv-pct-ring{position:absolute;top:8px;right:10px;width:40px;height:40px;z-index:6;}
.lv-pct-ring svg{width:100%;height:100%;}
.lv-pct-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:700;line-height:1.2;text-align:center;}
.lv-score-badge{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;z-index:6;}
.lv-score-inner{background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:3px 11px;font-size:.63rem;color:var(--text2);}
.lv-score-inner b{color:var(--lv-color,#9ca3af);}

/* ── lv decision ── */
.lv-decision{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px;}
.lv-dec-badge{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:7px;background:var(--bg3);border:1px solid var(--card-border);}
.lv-dec-arrow{color:var(--text2);font-size:.72rem;}
.lv-dec-final{font-size:.8rem;font-weight:900;}

/* ════ ANALYSIS LAYOUT ════ */
.analysis-container{display:grid;grid-template-columns:264px 1fr;gap:14px;align-items:start;}
.analysis-right{display:flex;flex-direction:column;gap:9px;}
.ch-info-card{display:flex;align-items:center;gap:10px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:11px 13px;}
.ch-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--card-border);}
.ch-meta h3{font-size:.86rem;font-weight:700;}
.ch-meta p{font-size:.68rem;color:var(--text2);margin-top:2px;line-height:1.35;}

/* ════ FACTOR CARDS ════ */
.factor-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.factor-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:9px;padding:10px 12px;position:relative;overflow:hidden;}
.factor-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fc-c,#4f8ef7);border-radius:3px 0 0 3px;}
.f-icon{font-size:1.1rem;margin-bottom:2px;}
.f-label{font-size:.63rem;color:var(--text2);margin-bottom:1px;}
.f-big{font-size:1.25rem;font-weight:900;line-height:1.05;margin-bottom:1px;}
.f-sub{font-size:.6rem;color:var(--text2);}
.f-quality{display:inline-flex;align-items:center;gap:2px;margin-top:3px;font-size:.58rem;font-weight:700;padding:1px 6px;border-radius:6px;}
.fq-best{background:#0d2b0d;color:#4ade80;border:1px solid #1a4a1a;}
.fq-good{background:#1a2505;color:#a3e635;border:1px solid #2a3a0a;}
.fq-mid {background:#2b2005;color:#fbbf24;border:1px solid #3a3010;}
.fq-low {background:#2b0505;color:#f87171;border:1px solid #3a1010;}
.f-bar-wrap{margin-top:4px;height:3px;background:var(--border);border-radius:2px;}
.f-bar{height:100%;border-radius:2px;transition:width 1.1s cubic-bezier(.22,1,.36,1);}

/* ════ SCORE BREAKDOWN ════ */
.score-breakdown{background:var(--card-bg);border:1px solid var(--card-border);border-radius:9px;padding:12px 14px;}
.score-breakdown h4{font-size:.8rem;font-weight:700;margin-bottom:9px;}
.score-row{margin-bottom:7px;}
.score-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;font-size:.72rem;}
.score-key{color:var(--text2);}
.score-val{font-weight:700;}
.bonus-tag{font-size:.56rem;padding:1px 5px;border-radius:5px;background:#0d2b0d;color:#4ade80;border:1px solid #1a4a1a;margin-left:3px;}
.score-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.score-bar{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.22,1,.36,1);}
.total-score-box{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:7px;padding:9px 12px;border:1px solid var(--card-border);margin-top:8px;animation:scoreIn .6s ease;}
.total-score-label{font-size:.72rem;color:var(--text2);}
.total-score-num{font-size:1.4rem;font-weight:900;}
.total-score-num.rainbow{background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:rainbowText 2s linear infinite;}

/* ════ INLINE GRADE TABLE ════ */
/* compact: LV | 등급명 | 구독자 | 상위% only */
.grade-table-wrap{overflow-x:auto;}
table.grade-table{width:100%;border-collapse:collapse;font-size:.77rem;}
.grade-table th{background:var(--bg3);color:var(--text2);font-weight:600;padding:6px 8px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;}
.grade-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.grade-table tr{cursor:default;transition:background .15s;}
.grade-table tr.active-row{background:rgba(79,142,247,.07);border-left:3px solid var(--row-c,#4f8ef7);}
/* simple number chip */
.lv-chip-n{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:50%;
  background:var(--card-bg);border:1.5px solid var(--chip-c,#555);
  font-size:.68rem;font-weight:900;color:var(--chip-c,#9ca3af);
}
/* lv6+ chip glow */
.lv-chip-n.chip-glow{
  box-shadow:0 0 6px var(--chip-c,#555)88;
  animation:borderPulse 2s ease-in-out infinite;
}

/* ════ INLINE SECTION TITLE ════ */
.inline-title{font-size:.88rem;font-weight:900;margin:16px 0 9px;color:var(--text);display:flex;align-items:center;gap:7px;}
.inline-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

/* ════ BENCH TIPS ════ */
.bench-tip-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:10px 13px;margin-bottom:7px;border-left:3px solid var(--tip-c,#4f8ef7);transition:transform .18s;}
.bench-tip-card:hover{transform:translateX(3px);}
.bench-tip-card h4{font-size:.78rem;font-weight:700;margin-bottom:3px;color:var(--tip-c,#4f8ef7);}
.bench-tip-card p{font-size:.71rem;color:var(--text2);line-height:1.56;}

/* ════ MODAL ════ */
.modal-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.effect-modal{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;width:min(700px,96vw);max-height:90vh;overflow-y:auto;padding:20px;animation:fadeIn .3s ease;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.modal-head h2{font-size:.98rem;font-weight:900;}
.modal-close{background:none;border:1px solid var(--border);color:var(--text);width:27px;height:27px;border-radius:50%;cursor:pointer;font-size:.84rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{background:var(--bg3);border-color:var(--accent);}
.modal-nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;justify-content:center;}
.lv-nav-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--nb-c,#555);background:var(--card-bg);color:var(--nb-c,#aaa);font-size:.68rem;font-weight:900;cursor:pointer;transition:all .2s;font-family:inherit;}
.lv-nav-btn:hover,.lv-nav-btn.active{background:var(--nb-c,#555);color:#000;transform:scale(1.12);}
.modal-body{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start;}

/* ── modal preview card: identical to main lv-card ── */
.prev-card-wrap{perspective:800px;display:flex;justify-content:center;}
.prev-card{
  width:200px;height:256px;border-radius:18px;
  background:var(--card-bg);
  position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  cursor:default;border-style:solid;
  animation:float3d 5s ease-in-out infinite;
}
.prev-card::before{content:'';position:absolute;inset:-4px;border-radius:22px;border:inherit;border-color:var(--prev-glow,#4f8ef7);opacity:.25;filter:blur(4px);pointer-events:none;z-index:0;animation:borderPulse 2.4s ease-in-out infinite;}
.prev-card::after{content:'';position:absolute;inset:0;border-radius:18px;background:radial-gradient(ellipse at 50% 110%,var(--prev-glow,#4f8ef7)1a,transparent 62%);opacity:.2;pointer-events:none;z-index:0;}
.prev-card.high-lv{border:none!important;}
.prev-card.high-lv .grad-border{position:absolute;inset:-2px;border-radius:20px;padding:2px;z-index:0;background:linear-gradient(var(--grad-angle,0deg),var(--prev-glow,#fff),var(--prev-glow2,#fff)33,var(--prev-glow,#fff)66,var(--prev-glow2,#fff));background-size:400% 400%;animation:rotateBorder 3s linear infinite;}
.prev-card.high-lv .grad-border-inner{width:100%;height:100%;border-radius:17px;background:var(--card-bg);}

.prev-num{font-size:3.6rem;font-weight:900;line-height:1;position:relative;z-index:2;color:var(--prev-color,#9ca3af);-webkit-text-stroke:var(--prev-stroke,1px) var(--prev-color,#9ca3af);text-shadow:0 0 12px var(--prev-color,#9ca3af)66;}
.prev-num.rainbow{background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;}
.prev-num.glowing{--tc:var(--prev-color,#fff);animation:glowPulse 2s ease-in-out infinite;}
.prev-label{font-size:.56rem;font-weight:700;letter-spacing:5px;color:var(--text2);z-index:2;margin-top:-3px;}
.prev-name{font-size:.84rem;font-weight:700;color:var(--prev-color,#9ca3af);z-index:2;margin-top:6px;-webkit-text-stroke:.25px var(--prev-color,#9ca3af);}
.prev-name.rainbow{background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;}
.prev-name.shimmer-name{background:linear-gradient(90deg,var(--prev-color,#fff) 20%,#fff 50%,var(--prev-color,#fff) 80%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 2s linear infinite,glowPulse 2s ease-in-out infinite;-webkit-text-stroke:0;}
.prev-name.glowing{--tc:var(--prev-color,#fff);animation:glowPulse 2.2s ease-in-out infinite;}

<script>
/* ══════════════════════
   GRADE DATA
══════════════════════ */
const GRADES=[
  {lv:1, name:'입문 크리에이터',   color:'#9ca3af', color2:'#6b7280',subMin:0,       subMax:100,      rankPct:'하위 37%',  scoreMin:0,      scoreMax:499,    nextGoal:'첫 100명 → 커스텀 URL',perks:['채널 개설','기본 업로드'],intensity:0.08},
  {lv:2, name:'성장 시작',         color:'#6ee7b7', color2:'#34d399',subMin:100,     subMax:500,      rankPct:'상위 63%',  scoreMin:500,    scoreMax:1499,   nextGoal:'500명 → 커뮤니티 탭',perks:['커스텀 URL','커뮤니티 탭'],intensity:0.16},
  {lv:3, name:'모멘텀 빌더',       color:'#34d399', color2:'#10b981',subMin:500,     subMax:1000,     rankPct:'상위 42%',  scoreMin:1500,   scoreMax:2999,   nextGoal:'1,000명 + 4,000h → YPP',perks:['커뮤니티 탭','라이브'],intensity:0.25},
  {lv:4, name:'수익화 크리에이터', color:'#fbbf24', color2:'#f59e0b',subMin:1000,    subMax:10000,    rankPct:'상위 34%',  scoreMin:3000,   scoreMax:7999,   nextGoal:'1만명 → 알고리즘 추천 급증',perks:['광고 수익','멤버십','슈퍼챗'],intensity:0.36},
  {lv:5, name:'실버 트래커',       color:'#c0c0c0', color2:'#a0a0a0',subMin:10000,   subMax:100000,   rankPct:'상위 6%',   scoreMin:8000,   scoreMax:24999,  nextGoal:'10만명 → 실버 버튼',perks:['브랜드 협찬','Analytics 심화'],intensity:0.50},
  {lv:6, name:'실버 플레이버튼',   color:'#e8e8e8', color2:'#aaaaaa',subMin:100000,  subMax:1000000,  rankPct:'상위 1%',   scoreMin:25000,  scoreMax:74999,  nextGoal:'100만명 → 골드 버튼',perks:['실버 버튼','브랜드딜'],intensity:0.62},
  {lv:7, name:'골드 플레이버튼',   color:'#ffd700', color2:'#ffaa00',subMin:1000000, subMax:5000000,  rankPct:'상위 0.1%', scoreMin:75000,  scoreMax:199999, nextGoal:'500만명 → 다이아몬드',perks:['골드 버튼','행사 초청'],intensity:0.74},
  {lv:8, name:'다이아몬드 버튼',   color:'#00e5ff', color2:'#0099cc',subMin:5000000, subMax:10000000, rankPct:'상위 0.02%',scoreMin:200000, scoreMax:499999, nextGoal:'1000만명 → 레드 다이아몬드',perks:['다이아몬드 버튼','YT 프로모션'],intensity:0.85},
  {lv:9, name:'레드 다이아몬드',   color:'#ff1744', color2:'#ff5500',subMin:10000000,subMax:50000000, rankPct:'상위 0.002%',scoreMin:500000,scoreMax:999999, nextGoal:'5000만명 → 유튜브 레전드',perks:['레드 다이아몬드','이사회 면담'],intensity:0.94},
  {lv:10,name:'유튜브 레전드',     color:'#ff0080', color2:'#7c3aed',subMin:50000000,subMax:Infinity, rankPct:'상위 0.00005%',scoreMin:1000000,scoreMax:Infinity,nextGoal:'전 세계 최고 크리에이터 전당',perks:['레전드 트로피','공동 마케팅'],intensity:1.0}
];
const HIGH_LV=6; // lv >= 6: glow effects

function getBW(lv){return lv+'px';}
function getGlow(lv,c){
  const s=lv,b=lv*3;
  return`0 0 0 ${s}px ${c}, 0 0 ${b}px ${s*2}px ${c}44, 0 0 ${b*2}px ${s*3}px ${c}1a`;
}
function getSW(lv){return[1,1.2,1.4,1.6,1.8,0,0,0,0,0][lv-1]+'px';}
function getNS(lv){return[.3,.35,.4,.45,.5,0,0,0,0,0][lv-1]+'px';}

function fmt(n){
  if(n===Infinity||n==null)return'∞';
  if(n>=1e8)return Math.floor(n/1e8)+'억';
  if(n>=1e4)return Math.floor(n/1e4)+'만';
  if(n>=1e3)return Math.floor(n/1e3)+'천';
  return Math.floor(n)+'';
}
function fmtMoney(n){return'₩'+Math.floor(n).toLocaleString('ko-KR');}
function calcPct(s){
  if(s>=5e7)return'0.00005%';if(s>=1e7)return'0.002%';if(s>=5e6)return'0.02%';
  if(s>=1e6)return'0.1%';if(s>=1e5)return'1%';if(s>=1e4)return'6%';
  if(s>=1e3)return'34%';if(s>=500)return'42%';if(s>=100)return'63%';return'100%';
}
function qual(v,t){
  if(v>=t[0])return{cls:'fq-best',txt:'압도적 🔥'};
  if(v>=t[1])return{cls:'fq-good',txt:'우수 ✓'};
  if(v>=t[2])return{cls:'fq-mid',txt:'보통'};
  return{cls:'fq-low',txt:'개선 필요'};
}

/* ══════════════════════
   APPLY CARD STYLE (main + modal unified)
══════════════════════ */
function styleCard(el, g, isMain){
  const isR=g.lv===10, isHigh=g.lv>=HIGH_LV;
  const lvC=isR?'#ff0080':g.color;
  const lvC2=isR?'#7c3aed':(g.color2||g.color);

  el.style.setProperty('--lv-glow', lvC);
  el.style.setProperty('--prev-glow', lvC);
  el.style.setProperty('--lv-color', lvC);
  el.style.setProperty('--prev-color', lvC);

  if(isHigh){
    el.classList.add('high-lv');
    el.style.boxShadow=getGlow(g.lv, lvC);
    el.style.setProperty('--lv-glow2', lvC2);
    el.style.setProperty('--prev-glow2', lvC2);
    // ensure grad-border exists
    if(!el.querySelector('.grad-border')){
      const gb=document.createElement('div');
      gb.className='grad-border';
      const gbi=document.createElement('div');
      gbi.className='grad-border-inner';
      gb.appendChild(gbi);
      el.insertBefore(gb, el.firstChild);
    }
  } else {
    el.classList.remove('high-lv');
    el.style.borderWidth=getBW(g.lv);
    el.style.borderColor=lvC;
    el.style.boxShadow=getGlow(g.lv, lvC);
    const gb=el.querySelector('.grad-border');
    if(gb)gb.remove();
  }
}

/* ══════════════════════
   SET TEXT ELEMENTS
══════════════════════ */
function setCardText(numEl, nameEl, rangeEl, g, prefix){
  const isR=g.lv===10, isHigh=g.lv>=HIGH_LV;
  const lvC=isR?'#ff0080':g.color;
  const sw=(prefix==='lv')?getSW(g.lv):getSW(g.lv);
  const ns=(prefix==='lv')?getNS(g.lv):getNS(g.lv);

  // number
  numEl.className=(prefix==='lv'?'lv-num':'prev-num')+(isR?' rainbow':isHigh?' glowing':'');
  if(isR){numEl.style.cssText='';}
  else if(isHigh){
    numEl.style.color=lvC;
    numEl.style.webkitTextStroke='0';
    numEl.style.setProperty('--tc',lvC);
    numEl.style.textShadow='';
  } else {
    numEl.style.color=lvC;
    numEl.style.webkitTextStroke=sw+' '+lvC;
    numEl.style.textShadow='0 0 12px '+lvC+'66';
    numEl.style.setProperty('--tc',lvC);
  }

  // name
  const nameBase=prefix==='lv'?'lv-name':'prev-name';
  if(isR){nameEl.className=nameBase+' rainbow';nameEl.style.cssText='';}
  else if(isHigh){nameEl.className=nameBase+' shimmer-name';nameEl.style.setProperty('--lv-color',lvC);nameEl.style.setProperty('--prev-color',lvC);nameEl.style.setProperty('--tc',lvC);}
  else{nameEl.className=nameBase;nameEl.style.color=lvC;nameEl.style.webkitTextStroke=ns+' '+lvC;nameEl.style.setProperty('--tc',lvC);}
  nameEl.textContent=g.name;

  // range
  if(rangeEl){rangeEl.style.color=lvC;rangeEl.textContent=fmt(g.subMin)+' ~ '+fmt(g.subMax)+' 구독자';}
}

/* ══════════════════════
   SCORING
══════════════════════ */
function computeScore(subs,tv,videos,eng,freq,avg){
  const sS=subs<1000?subs*.5:subs<10000?500+(subs-1000)*.22:subs<100000?2700+(subs-10000)*.11:subs<1e6?13000+(subs-100000)*.045:53500+Math.sqrt(subs-1e6)*22;
  const vS=tv*.000018,eS=Math.min(eng,20)*1400,fS=Math.min(freq,16)*380,aS=Math.min(avg,8e6)*.00045;
  let bonus=0;const bLog=[];
  if(subs>=1e7){bonus+=sS*.25;bLog.push({k:'구독자 압도적',v:'+25%'});}
  else if(subs>=1e6){bonus+=sS*.15;bLog.push({k:'구독자 우수',v:'+15%'});}
  const vr=subs>0?avg/subs:0;
  if(vr>=2){bonus+=aS*.5;bLog.push({k:'조회/구독 200%+',v:'+50%'});}
  else if(vr>=1){bonus+=aS*.3;bLog.push({k:'조회/구독 100%+',v:'+30%'});}
  if(eng>=8){bonus+=eS*.4;bLog.push({k:'참여율 8%+',v:'+40%'});}
  else if(eng>=4){bonus+=eS*.2;bLog.push({k:'참여율 4%+',v:'+20%'});}
  if(freq>=12){bonus+=fS*.35;bLog.push({k:'업로드 월12+',v:'+35%'});}
  else if(freq>=6){bonus+=fS*.15;bLog.push({k:'업로드 월6+',v:'+15%'});}
  return{total:Math.round(sS+vS+eS+fS+aS+bonus),bd:{sS:Math.round(sS),vS:Math.round(vS),eS:Math.round(eS),fS:Math.round(fS),aS:Math.round(aS),bonus:Math.round(bonus)},bLog,vr};
}
function lvScore(s){for(let i=GRADES.length-1;i>=0;i--)if(s>=GRADES[i].scoreMin)return GRADES[i].lv;return 1;}
function lvSubs(s){for(let i=GRADES.length-1;i>=0;i--)if(s>=GRADES[i].subMin)return GRADES[i].lv;return 1;}

/* ══════════════════════

const API_KEYS=['AIzaSyAYi9B4vIFjl75uYBS56GbTSMJfV_TLuzE','YOUR_API_KEY_2'];
let apiIdx=0;const getKey=()=>API_KEYS[apiIdx%API_KEYS.length];

async function analyzeChannel(demo){

  const result=document.getElementById('channelResult');
  result.innerHTML='<p style="color:var(--text2);padding:16px 0">분석 중…</p>';

    subs=460000000;tv=70000000000;videos=830;
    title='MrBeast (데모)';avatar='https://yt3.googleusercontent.com/ytc/AL5GRJVDk1pPh3Kut9-VBowXSmxgMOHJOFEwt9-RHJiE=s240';
    desc='세계 최대 유튜브 채널 – 데모 데이터';freq=6;avg=120000000;eng=2.4;
  } else {
    try{
      const sr=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(query)}&maxResults=1&key=${getKey()}`);
      const sd=await sr.json();
      if(!sd.items?.length){result.innerHTML='<p style="color:#f87171">채널을 찾을 수 없습니다.</p>';return;}
      const cId=sd.items[0].snippet.channelId||sd.items[0].id.channelId;
      const cr=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${cId}&key=${getKey()}`);
      const cd=await cr.json();const ch=cd.items[0];
      subs=+ch.statistics.subscriberCount;tv=+ch.statistics.viewCount;videos=+ch.statistics.videoCount;

    }catch(e){result.innerHTML='<p style="color:#f87171">API 오류. 데모 데이터로 대체합니다.</p>';setTimeout(()=>analyzeChannel('demo'),900);return;}
  }

  const sd2=computeScore(subs,tv,videos,eng,freq,avg);
  const score=sd2.total,bd=sd2.bd;
  const sLv=lvScore(score),subLv=lvSubs(subs),fLv=Math.max(sLv,subLv);

  /* build card HTML */
  const numCls='lv-num'+(isR?' rainbow':isHigh?' glowing':'');
  const nameCls='lv-name'+(isR?' rainbow':isHigh?' shimmer-name':'');
  const numStyle=isR?'':isHigh?`color:${lvC};--tc:${lvC};`:`color:${lvC};-webkit-text-stroke:${getSW(fLv)} ${lvC};text-shadow:0 0 12px ${lvC}66;`;
  const nameStyle=isR||isHigh?'':(`color:${lvC};-webkit-text-stroke:${getNS(fLv)} ${lvC};`);

  const bw=isHigh?'0':getBW(fLv)+'px';
  const shadow=getGlow(fLv,lvC);
  const gradBorder=isHigh?`<div class="grad-border"><div class="grad-border-inner"></div></div>`:'';

  result.innerHTML=`
  <div class="analysis-container">
    <!-- LEFT -->
    <div>
      <div class="lv-card-wrap">
        <div class="lv-card ${isHigh?'high-lv':''}" id="mainCard"
          style="${isHigh?`box-shadow:${shadow};--lv-glow:${lvC};--lv-glow2:${g.color2||lvC};--lv-color:${lvC};`:`border-width:${getBW(fLv)}px;border-color:${lvC};box-shadow:${shadow};--lv-glow:${lvC};--lv-color:${lvC};`}"
          onclick="openModal(${fLv})">
          ${gradBorder}
          <div class="lv-rank-badge" style="border-color:${lvC}44;color:${lvC};">상위 ${pct}</div>
          <div class="lv-pct-ring">
            <svg viewBox="0 0 40 40">
              <circle cx="20" cy="20" r="16" fill="none" stroke="#2a2a3a" stroke-width="2.6"/>
              <circle cx="20" cy="20" r="16" fill="none" stroke="${lvC}" stroke-width="2.6"
                stroke-dasharray="${Math.min(100,parseFloat(pct)||50)*1.005} 100.5"
                stroke-linecap="round" transform="rotate(-90 20 20)"/>
            </svg>
            <div class="lv-pct-text" style="color:${lvC};">${pct.replace('%','')}<br><span style="font-size:.42rem">%</span></div>
          </div>
          <div class="${numCls}" style="${numStyle}">${fLv}</div>
          <div class="lv-label" style="color:${lvC};opacity:.55;">LEVEL</div>
          <div class="${nameCls}" style="${nameStyle}">${g.name}</div>
          <div class="lv-range" style="color:${lvC};">${fmt(g.subMin)} ~ ${fmt(g.subMax)}</div>
          <div class="lv-score-badge">
            <div class="lv-score-inner">알고리즘 <b style="color:${lvC}">${score.toLocaleString()}</b></div>
          </div>
        </div>
      </div>
      <p style="text-align:center;font-size:.6rem;color:var(--text2);margin-top:5px;">🔍 카드 클릭 → 효과 미리보기</p>
      <div class="lv-decision">
        <span class="lv-dec-badge" style="color:${GRADES[subLv-1].color};border-color:${GRADES[subLv-1].color}44;">구독 LV${subLv}</span>
        <span class="lv-dec-arrow">vs</span>
        <span class="lv-dec-badge" style="color:${GRADES[sLv-1].color};border-color:${GRADES[sLv-1].color}44;">점수 LV${sLv}</span>
        <span class="lv-dec-arrow">→</span>
        <span class="lv-dec-final" style="color:${lvC};">최종 LV${fLv}</span>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="analysis-right">
      <div class="ch-info-card">
        <img class="ch-avatar" src="${avatar}" onerror="this.src='https://via.placeholder.com/44x44/12121e/666?text=YT'">
        <div class="ch-meta"><h3>${title}</h3><p>${desc}</p></div>
      </div>
      <div class="factor-grid">
        ${[
          {icon:'👥',label:'구독자',      big:fmt(subs),   sub:pct+' 구간',              q:{cls:subLv>=9?'fq-best':subLv>=7?'fq-good':subLv>=5?'fq-mid':'fq-low',txt:subLv>=9?'압도적 🔥':subLv>=7?'우수 ✓':subLv>=5?'보통':'개선 필요'},c:lvC,  bar:Math.min(100,subs/5e8*100)},
          {icon:'👁',label:'총 조회수',   big:fmt(tv),     sub:fmt(videos)+'개 영상',     q:vrQ, c:'#4f8ef7',bar:Math.min(100,tv/1e11*100)},
          {icon:'📊',label:'평균 조회수', big:fmt(avg),    sub:'구독비 '+sd2.vr.toFixed(1)+'×',q:vrQ,c:'#a78bfa',bar:Math.min(100,avg/5e6*100)},
          {icon:'💬',label:'참여율',      big:eng.toFixed(1)+'%',sub:'기준 4%+',          q:engQ,c:'#34d399',bar:Math.min(100,eng/10*100)},
          {icon:'📅',label:'업로드 주기', big:'월 '+freq+'회',sub:'주 '+(freq/4).toFixed(1)+'회',q:freqQ,c:'#fbbf24',bar:Math.min(100,freq/16*100)},
          {icon:'⚡',label:'알고리즘',    big:score.toLocaleString(),sub:'LV'+fLv+' '+g.name,q:lvQ,c:lvC,bar:Math.min(100,score/200000*100)},
        ].map(f=>`

            <div class="f-bar-wrap"><div class="f-bar" style="width:${f.bar}%;background:${f.c}"></div></div>
          </div>`).join('')}
      </div>
      <div class="score-breakdown">
        <h4>📊 알고리즘 점수 분석</h4>
        ${[
          {k:'구독자',    v:bd.sS, max:200000,c:lvC},
          {k:'조회수',    v:bd.vS, max:80000, c:'#4f8ef7'},
          {k:'참여율',    v:bd.eS, max:28000, c:'#34d399'},
          {k:'업로드',    v:bd.fS, max:6000,  c:'#fbbf24'},
          {k:'평균조회',  v:bd.aS, max:4000,  c:'#a78bfa'},
          {k:'보너스',    v:bd.bonus,max:Math.max(bd.bonus,1),c:'#4ade80'},
        ].map(r=>{
          const p=Math.min(100,(r.v/(r.max||1))*100);

          return`<div class="score-row">
            <div class="score-row-head">
              <span class="score-key">${r.k}</span>

/* ══════════════════════
   GRADE TABLE
   Columns: LV | 등급명 | 구독자 | 상위%
   - No 별표 bug: use separate flag, not lv number
   - lv6+ chip gets glow class
══════════════════════ */
function buildGradeTable(activeLv){
  const rows=GRADES.map(g=>{
    const isAct=g.lv===activeLv;
    const isR10=g.lv===10,isHigh=g.lv>=HIGH_LV;
    const c=isR10?'#ff0080':g.color;
    const nameStyle=isR10
      ?`background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:rainbowText 2.5s linear infinite;font-weight:700;display:inline-block;`
      :isHigh
        ?`color:${c};font-weight:700;animation:glowPulse 2.2s ease-in-out infinite;--tc:${c};`
        :`color:${c};font-weight:700;`;

    return`<tr style="${isAct?`background:${c}0d;border-left:3px solid ${c};--row-c:${c};`:''}"
             class="${isAct?'active-row':''}">
      <td>
        <span class="lv-chip-n ${isHigh?'chip-glow':''}" style="--chip-c:${c};">
          ${isAct?'▶':g.lv}
        </span>
      </td>
      <td><span style="${nameStyle}">${g.name}</span></td>
      <td style="color:var(--text2);font-size:.72rem;white-space:nowrap;">${fmt(g.subMin)}~${fmt(g.subMax)}</td>
      <td><span style="color:${c};font-weight:700;font-size:.73rem;">${g.rankPct}</span></td>
    </tr>`;
  }).join('');
  return`<div class="grade-table-wrap">
    <table class="grade-table">
      <thead><tr>
        <th style="width:36px">LV</th><th>등급명</th><th>구독자</th><th>상위%</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <p style="font-size:.6rem;color:var(--text2);margin-top:4px;">▶ = 현재 레벨</p>
  </div>`;
}

/* ══════════════════════
   BENCHMARK
══════════════════════ */
function buildBench(lv,eng,freq,vr){
  const g=GRADES[lv-1];
  const tips=[{c:'#4f8ef7',icon:'📌',t:'현재 레벨',b:`LV${lv} (${g.name}) – ${g.rankPct}. ${g.nextGoal}`}];
  if(eng<4)tips.push({c:'#f87171',icon:'💬',t:'참여율 개선 필요',b:`현재 ${eng.toFixed(1)}%. 댓글 질문·라이브로 4%+ 목표.`});
  else if(eng>=8)tips.push({c:'#4ade80',icon:'💬',t:'참여율 압도적!',b:`${eng.toFixed(1)}% – 최상위 수준.`});
  if(freq<2)tips.push({c:'#fbbf24',icon:'📅',t:'업로드 빈도 증가',b:`월 ${freq}회 → 주 1~2회로 늘리면 노출 대폭 증가.`});
  else if(freq>=12)tips.push({c:'#4ade80',icon:'📅',t:'업로드 압도적!',b:`월 ${freq}회 – 품질 유지에 집중하세요.`});
  if(vr<0.3)tips.push({c:'#f87171',icon:'👁',t:'조회수 최적화',b:'썸네일 A/B 테스트로 CTR을 높이세요.'});
  if(lv<=3)tips.push({c:'#a78bfa',icon:'💰',t:'수익화까지',b:'1,000명 + 4,000h → YPP 신청 가능.'});
  if(lv>=5)tips.push({c:'#00e5ff',icon:'🤝',t:'콜라보 전략',b:'유사 규모(±30%) 채널 콜라보 → 구독자 15~25% 유입.'});
  tips.push({c:'#ffd700',icon:'🤖',t:'AI 활용 (2026)',b:'크리에이터 84%가 AI 도구 활용 중.'});
  return tips.map(t=>`<div class="bench-tip-card" style="--tip-c:${t.c};border-left-color:${t.c};"><h4>${t.icon} ${t.t}</h4><p>${t.b}</p></div>`).join('');
}

/* ══════════════════════
   EFFECT MODAL
══════════════════════ */
function openModal(lv){
  document.getElementById('effectModal').classList.add('open');
  buildModalNav();renderModal(lv);
}
function closeModal(){
  document.getElementById('effectModal').classList.remove('open');
}
function buildModalNav(){
  document.getElementById('modalNav').innerHTML=GRADES.map(g=>{
    const c=g.lv===10?'#ff0080':g.color;
    return`<button class="lv-nav-btn" id="mnb${g.lv}" data-lv="${g.lv}"
      style="--nb-c:${c};border-color:${c};color:${c};"
      onclick="renderModal(${g.lv})">${g.lv}</button>`;
  }).join('');
}
function renderModal(lv){
  document.querySelectorAll('.lv-nav-btn').forEach(b=>b.classList.toggle('active',+b.dataset.lv===lv));
  const g=GRADES[lv-1],isR=lv===10,isHigh=lv>=HIGH_LV;
  const lvC=isR?'#ff0080':g.color;
  document.getElementById('modalTitle').textContent=`LV${lv} – ${g.name} 미리보기`;

  /* style prev-card */
  const pc=document.getElementById('prevCard');
  pc.style.setProperty('--prev-glow',lvC);
  pc.style.setProperty('--prev-color',lvC);
  if(isHigh){
    pc.classList.add('high-lv');
    pc.style.borderWidth='0';
    pc.style.boxShadow=getGlow(lv,lvC);
    pc.style.setProperty('--prev-glow2',g.color2||lvC);
    if(!pc.querySelector('.grad-border')){
      const gb=document.createElement('div');gb.className='grad-border';
      const gbi=document.createElement('div');gbi.className='grad-border-inner';
      gb.appendChild(gbi);pc.insertBefore(gb,pc.firstChild);
    }
  } else {
    pc.classList.remove('high-lv');
    pc.style.borderWidth=getBW(lv)+'px';
    pc.style.borderColor=lvC;
    pc.style.boxShadow=getGlow(lv,lvC);
    const gb=pc.querySelector('.grad-border');if(gb)gb.remove();
  }

  /* set text */
  const numEl=document.getElementById('prevNum');
  const nameEl=document.getElementById('prevName');
  const rangeEl=document.getElementById('prevRange');
  numEl.textContent=lv;
  setCardText(numEl,nameEl,rangeEl,g,'prev');

  /* modal info */
  const bars=[
    {l:'구독자 규모',v:Math.min(100,((lv-1)/9)*100+5)},
    {l:'3D 효과 강도',v:lv*9.5},
    {l:'알고리즘 점수',v:Math.min(100,g.scoreMin/10000)},
    {l:'희귀도',      v:[.1,1,5,10,20,35,55,72,88,100][lv-1]},
  ];
  document.getElementById('modalInfo').innerHTML=`
    <h3 style="color:${lvC}">LV${lv} – ${g.name}</h3>
    <div class="compare-bars">
      ${bars.map(b=>`<div class="cbar-row"><div class="cbar-label"><span>${b.l}</span><span>${b.v.toFixed(0)}%</span></div><div class="cbar-wrap"><div class="cbar-fill" style="width:${b.v}%;background:${isR?'linear-gradient(90deg,#ff0080,#7c3aed,#00e5ff)':lvC}"></div></div></div>`).join('')}
    </div>
    ${[['구독자',`${fmt(g.subMin)} ~ ${fmt(g.subMax)}`],['상위 %',g.rankPct],['점수 범위',`${g.scoreMin.toLocaleString()} ~`]]
      .map(([k,v])=>`<div class="stat-row"><span class="stat-key">${k}</span><span class="stat-val" style="color:${lvC}">${v}</span></div>`).join('')}
    <div style="background:var(--bg3);border-radius:7px;padding:8px 10px;border:1px solid var(--card-border);">
      <div style="font-size:.72rem;font-weight:700;margin-bottom:2px">📌 다음 목표</div>
      <p style="font-size:.68rem;color:var(--text2);line-height:1.5">${g.nextGoal}</p>
    </div>
    <div class="perk-tags">${g.perks.map(p=>`<span class="perk-tag">✓ ${p}</span>`).join('')}</div>`;
}

/* ══════════════════════
   REVENUE
══════════════════════ */
function calcRevenue(){
  const views=+document.getElementById('rv_views').value||0;
  const cpm=+document.getElementById('rv_cpm').value||0;
  const country=+document.getElementById('rv_country').value||1;
  const vtr=+document.getElementById('rv_vtr').value/100||.35;
  const rev=views*vtr*(cpm/1000)*country*.55;
  document.getElementById('revNum').textContent=fmtMoney(rev);
  document.getElementById('revDetail').textContent=`${Math.floor(views).toLocaleString()}조회 × VTR${Math.floor(vtr*100)}% × CPM₩${Math.floor(cpm).toLocaleString()} × ${country} × 55%`;
}

function buildExtras(){
  document.getElementById('toolsGrid').innerHTML=TOOLS.map(t=>`<div class="extra-item" onclick="window.open('${t.url}','_blank')"><div class="extra-icon">${t.icon}</div><div class="extra-name">${t.name}</div><div class="extra-desc">${t.desc}</div></div>`).join('');
  document.getElementById('ideasGrid').innerHTML=IDEAS.map(i=>`<div class="extra-item"><div class="extra-icon">${i.icon}</div><div class="extra-name">${i.name}</div><div class="extra-desc">${i.desc}</div></div>`).join('');
  document.getElementById('shopGrid').innerHTML=SHOP.map(s=>`<div class="extra-item" onclick="window.open('${s.url}','_blank')"><div class="extra-icon">${s.icon}</div><div class="extra-name">${s.name}</div><div class="extra-desc">${s.desc}</div></div>`).join('');
}

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn,.sidebar-item').forEach(b=>b.classList.remove('active'));
  const s=document.getElementById('sec-'+id);if(s)s.classList.add('active');
  document.querySelectorAll(`[onclick*="'${id}'"]`).forEach(b=>b.classList.add('active'));
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
function handleGlobalSearch(){
  const q=document.getElementById('globalSearchInput').value.trim();if(!q)return;
  document.getElementById('channelInput').value=q;showSection('channel');analyzeChannel();
}
document.addEventListener('DOMContentLoaded',()=>{buildExtras();loadHotVideos();calcRevenue();});
