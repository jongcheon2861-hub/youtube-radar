<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTAnalytics Pro – 유튜브 채널 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a25;
  --border: #2a2a3a;
  --text: #e8e8f0;
  --text2: #9090b0;
  --accent: #4f8ef7;
  --card-bg: #12121e;
  --card-border: #252535;
  --r: 14px;
  --sh: 0 4px 24px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

@keyframes rainbowText{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes floatUp{0%{transform:translateY(0) rotateY(0deg)}50%{transform:translateY(-7px) rotateY(4deg)}100%{transform:translateY(0) rotateY(0deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes borderGlow{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes scoreAnim{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes shimmerBar{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 16px;height:56px;}
.logo{font-size:1.15rem;font-weight:900;color:#ff4040;flex-shrink:0;letter-spacing:-.5px;}
.logo span{color:var(--accent);}
.header-search{flex:1;max-width:380px;display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:22px;overflow:hidden;}
.header-search input{flex:1;background:none;border:none;outline:none;color:var(--text);padding:7px 14px;font-size:.85rem;font-family:inherit;}
.header-search button{background:var(--accent);border:none;color:#fff;padding:7px 13px;cursor:pointer;font-size:.82rem;transition:background .2s;}
.header-search button:hover{background:#3a7ae8;}
.header-nav{display:flex;gap:4px;margin-left:auto;}
.nav-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 11px;border-radius:16px;cursor:pointer;font-size:.76rem;font-family:inherit;transition:all .2s;white-space:nowrap;}
.nav-btn:hover,.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.menu-btn{display:none;background:none;border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:7px;cursor:pointer;}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 56px);}
.sidebar{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:12px 8px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;transition:transform .3s;}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:.82rem;transition:all .2s;margin-bottom:2px;}
.sidebar-item:hover,.sidebar-item.active{background:var(--bg3);color:var(--text);transform:translateX(3px);}
.sidebar-icon{font-size:.95rem;width:19px;text-align:center;}

/* ── MAIN + AD SAFE ZONE ── */
.main-wrapper{flex:1;display:flex;gap:0;min-width:0;}
.main{flex:1;padding:20px;overflow-y:auto;min-width:0;max-width:calc(100% - 160px);}
.ad-zone{width:160px;flex-shrink:0;padding:12px 8px;border-left:1px solid var(--border);background:var(--bg2);}
.ad-placeholder{width:140px;min-height:300px;background:var(--bg3);border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--text2);text-align:center;padding:10px;margin-bottom:10px;}

.section{display:none;animation:fadeIn .35s ease;}
.section.active{display:block;}

/* ── COMMON ── */
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:16px;transition:transform .22s,box-shadow .22s;}
.card:hover{transform:translateY(-2px);box-shadow:var(--sh);}
.section-title{font-size:1.25rem;font-weight:900;margin-bottom:16px;color:var(--text);display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
.btn{padding:8px 18px;border-radius:8px;border:none;font-family:inherit;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#3a7ae8;transform:translateY(-1px);}
.btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.search-form{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.search-form input{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 13px;font-size:.86rem;font-family:inherit;outline:none;transition:border-color .2s;}
.search-form input:focus{border-color:var(--accent);}

/* ══════════════════════════════════════════════
   LEVEL CARD  –  dark bg, glowing border rim
══════════════════════════════════════════════ */
.lv-card-wrap{perspective:1000px;display:flex;justify-content:center;}
.lv-card{
  position:relative;
  width:260px;height:320px;
  border-radius:20px;
  background:var(--card-bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transform-style:preserve-3d;
  animation:floatUp 5s ease-in-out infinite;
  transition:transform .5s,box-shadow .4s;
  overflow:hidden;
  cursor:pointer;
  /* ── glowing rim border ── */
  border:2px solid transparent;
  box-shadow:
    0 0 0 2px var(--lv-glow,#4f8ef7),
    0 0 16px 4px var(--lv-glow,#4f8ef7)55,
    0 0 40px 8px var(--lv-glow,#4f8ef7)22,
    inset 0 0 30px 0 var(--lv-glow,#4f8ef7)08;
  animation:floatUp 5s ease-in-out infinite, borderGlow 2.5s ease-in-out infinite;
}
/* pseudo rim glow layer */
.lv-card::before{
  content:'';position:absolute;inset:-2px;border-radius:22px;
  background:transparent;
  border:2px solid var(--lv-glow,#4f8ef7);
  opacity:.6;pointer-events:none;z-index:5;
  animation:borderGlow 2.5s ease-in-out infinite;
  box-shadow:0 0 12px 4px var(--lv-glow,#4f8ef7)66,inset 0 0 12px 2px var(--lv-glow,#4f8ef7)22;
}
/* bottom inner glow */
.lv-card::after{content:'';position:absolute;inset:0;border-radius:20px;background:radial-gradient(ellipse at 50% 115%,var(--lv-glow,#4f8ef7)22,transparent 60%);opacity:.25;pointer-events:none;z-index:1;}
.lv-card:hover{transform:rotateY(8deg) rotateX(-5deg) scale(1.03);}

.lv-card canvas.spark-canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:20px;z-index:0;pointer-events:none;}

/* number */
.lv-num{
  font-size:5.2rem;font-weight:900;line-height:1;
  position:relative;z-index:2;
  color:var(--lv-color,#9ca3af);
  -webkit-text-stroke:var(--lv-stroke,1.5px) var(--lv-color,#9ca3af);
  text-shadow:0 0 20px var(--lv-color,#9ca3af)99,0 0 40px var(--lv-color,#9ca3af)44;
  letter-spacing:-2px;
}
.lv-num.rainbow{background:linear-gradient(90deg,#ff0080,#ff6b00,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;filter:none;}
.lv-label{font-size:.65rem;font-weight:700;letter-spacing:4px;color:var(--text2);text-transform:uppercase;position:relative;z-index:2;margin-top:-5px;}
.lv-name{font-size:1.05rem;font-weight:700;color:var(--lv-color,#9ca3af);position:relative;z-index:2;margin-top:8px;-webkit-text-stroke:var(--name-stroke,.6px) var(--lv-color,#9ca3af);text-shadow:0 0 8px var(--lv-color,#9ca3af)66;}
.lv-name.rainbow{background:linear-gradient(90deg,#ff0080,#ff6b00,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;}
.lv-range{font-size:.72rem;color:var(--text2);position:relative;z-index:2;margin-top:5px;text-align:center;}
.lv-play{font-size:.65rem;padding:3px 10px;border-radius:16px;border:1px solid var(--card-border);color:var(--text2);background:rgba(0,0,0,.4);position:relative;z-index:2;margin-top:9px;}
.lv-rank-badge{position:absolute;top:10px;left:12px;font-size:.62rem;padding:2px 7px;border-radius:7px;background:rgba(0,0,0,.6);border:1px solid var(--card-border);color:var(--text2);z-index:3;}
.lv-pct-ring{position:absolute;top:8px;right:10px;width:42px;height:42px;z-index:3;}
.lv-pct-ring svg{width:100%;height:100%;}
.lv-pct-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.56rem;font-weight:700;line-height:1.2;text-align:center;color:var(--lv-color,#9ca3af);}
.lv-score-badge{position:absolute;bottom:11px;left:0;right:0;display:flex;justify-content:center;z-index:3;}
.lv-score-inner{background:rgba(0,0,0,.65);border:1px solid var(--card-border);border-radius:18px;padding:3px 12px;font-size:.67rem;color:var(--text2);}
.lv-score-inner span{font-weight:700;}

/* ══════════════════════════════════════════════
   ANALYSIS LAYOUT
══════════════════════════════════════════════ */
.analysis-container{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start;}
.analysis-right{display:flex;flex-direction:column;gap:11px;}

/* channel info */
.ch-info-card{display:flex;align-items:center;gap:11px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:11px;padding:12px 14px;}
.ch-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--card-border);}
.ch-meta h3{font-size:.9rem;font-weight:700;}
.ch-meta p{font-size:.72rem;color:var(--text2);margin-top:2px;line-height:1.4;}

/* ── LV DECISION ROW ── */
.lv-decision{background:var(--card-bg);border:1px solid var(--card-border);border-radius:9px;padding:9px 13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.lv-dec-badge{font-size:.76rem;font-weight:700;padding:3px 10px;border-radius:10px;background:var(--bg3);border:1px solid var(--card-border);}
.lv-dec-arrow{color:var(--text2);font-size:.78rem;}
.lv-dec-final{font-size:.85rem;font-weight:900;}

/* ══════════════════════════════════════════════
   VISUAL FACTOR CARDS  (big & clear)
══════════════════════════════════════════════ */
.factor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.factor-card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:11px;padding:12px 14px;
  position:relative;overflow:hidden;
}
/* colored left accent bar */
.factor-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fc-color,#4f8ef7);border-radius:3px 0 0 3px;}
.factor-icon{font-size:1.3rem;margin-bottom:4px;}
.factor-label{font-size:.68rem;color:var(--text2);margin-bottom:2px;font-weight:500;}
.factor-big{font-size:1.4rem;font-weight:900;line-height:1;margin-bottom:2px;}
.factor-sub{font-size:.65rem;color:var(--text2);}
.factor-quality{
  display:inline-flex;align-items:center;gap:3px;
  margin-top:4px;font-size:.62rem;font-weight:700;
  padding:2px 7px;border-radius:8px;
}
.fq-best{background:#0d2b0d;color:#4ade80;border:1px solid #1a4a1a;}
.fq-good{background:#1a2505;color:#a3e635;border:1px solid #2a3a0a;}
.fq-mid {background:#2b2005;color:#fbbf24;border:1px solid #3a3010;}
.fq-low {background:#2b0505;color:#f87171;border:1px solid #3a1010;}

/* bar inside factor card */
.factor-bar-wrap{margin-top:6px;height:4px;background:var(--border);border-radius:2px;}
.factor-bar{height:100%;border-radius:2px;transition:width 1.1s cubic-bezier(.22,1,.36,1);}

/* ══════════════════════════════════════════════
   SCORE BREAKDOWN
══════════════════════════════════════════════ */
.score-breakdown{background:var(--card-bg);border:1px solid var(--card-border);border-radius:11px;padding:14px 16px;}
.score-breakdown h4{font-size:.85rem;font-weight:700;margin-bottom:11px;}
.score-row{margin-bottom:9px;}
.score-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;font-size:.77rem;}
.score-key{color:var(--text2);}
.score-val{font-weight:700;}
.bonus-tag{font-size:.6rem;padding:1px 6px;border-radius:7px;background:#0d2b0d;color:#4ade80;border:1px solid #1a4a1a;margin-left:4px;}
.score-bar-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.score-bar{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.22,1,.36,1);}

/* total score */
.total-score-box{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:9px;padding:11px 14px;border:1px solid var(--card-border);margin-top:10px;animation:scoreAnim .6s ease;}
.total-score-label{font-size:.78rem;color:var(--text2);}
.total-score-num{font-size:1.55rem;font-weight:900;}
.total-score-num.rainbow{background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:rainbowText 2s linear infinite;}

/* ══════════════════════════════════════════════
   GRADE TABLE
══════════════════════════════════════════════ */
.grade-controls{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap;align-items:center;}
.toggle-btn{padding:5px 13px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:.78rem;font-family:inherit;transition:all .2s;}
.toggle-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.grade-table-wrap{overflow-x:auto;}
table.grade-table{width:100%;border-collapse:collapse;font-size:.8rem;}
.grade-table th{background:var(--bg3);color:var(--text2);font-weight:600;padding:8px 9px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;}
.grade-table td{padding:7px 9px;border-bottom:1px solid var(--border);vertical-align:middle;}
.grade-table tr{cursor:pointer;transition:background .15s;}
.grade-table tr:hover{background:var(--bg3);}
.grade-table tr.selected{background:rgba(79,142,247,.1);}
.lv-chip{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:var(--card-bg);border:2px solid var(--chip-color,#555);font-size:.72rem;font-weight:900;color:var(--chip-color,#9ca3af);-webkit-text-stroke:var(--chip-stroke,.5px) var(--chip-color,#9ca3af);text-shadow:0 0 6px var(--chip-color,#9ca3af);}
.ach-bar-wrap{width:65px;height:4px;background:var(--border);border-radius:2px;}
.ach-bar{height:100%;border-radius:2px;}

/* card grid */
.grade-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;}
.grade-mini-card{
  background:var(--card-bg);
  border:1.5px solid var(--card-border);
  border-radius:12px;padding:14px 11px;text-align:center;cursor:pointer;
  position:relative;overflow:hidden;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  /* glowing rim */
  box-shadow:0 0 0 1.5px transparent;
}
.grade-mini-card::before{content:'';position:absolute;inset:-1.5px;border-radius:13px;background:transparent;border:1.5px solid var(--gmc,#555);opacity:.4;pointer-events:none;z-index:2;box-shadow:0 0 8px 2px var(--gmc,#555)44,inset 0 0 8px 1px var(--gmc,#555)11;}
.grade-mini-card::after{content:'';position:absolute;inset:0;border-radius:12px;background:radial-gradient(ellipse at 50% 115%,var(--gmc,#555)18,transparent 60%);opacity:.12;pointer-events:none;}
.grade-mini-card:hover{transform:translateY(-5px);box-shadow:0 8px 24px rgba(0,0,0,.5);border-color:var(--gmc,#555);}
.grade-mini-card.selected{border-color:var(--gmc,#555);box-shadow:0 0 0 2px var(--gmc,#555)44;}
.gmc-num{font-size:2.4rem;font-weight:900;line-height:1.1;color:var(--gmc,#9ca3af);-webkit-text-stroke:var(--gmc-stroke,1.5px) var(--gmc,#9ca3af);text-shadow:0 0 10px var(--gmc,#9ca3af)88;position:relative;z-index:1;}
.gmc-num.rainbow{background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;}
.gmc-name{font-size:.72rem;font-weight:700;color:var(--gmc,#9ca3af);position:relative;z-index:1;margin-top:3px;-webkit-text-stroke:.25px var(--gmc,#9ca3af);}
.gmc-name.rainbow{background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;}
.gmc-range{font-size:.62rem;color:var(--text2);position:relative;z-index:1;margin-top:3px;}
.gmc-pct{font-size:.62rem;color:var(--gmc,#9ca3af);opacity:.75;position:relative;z-index:1;margin-top:1px;}
.gmc-btn{margin-top:6px;font-size:.63rem;padding:3px 8px;border-radius:9px;border:1px solid var(--card-border);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;position:relative;z-index:1;transition:all .2s;}
.gmc-btn:hover{border-color:var(--gmc,#555);color:var(--gmc,#9ca3af);}

/* compare panel */
.compare-panel{display:none;margin-top:16px;animation:fadeIn .35s ease;}
.compare-panel.show{display:block;}
.compare-grid{display:grid;grid-template-columns:1fr 1.08fr 1fr;gap:10px;margin-bottom:12px;}
.cmp-card{border-radius:12px;padding:13px;text-align:center;background:var(--card-bg);border:1px solid var(--card-border);transition:transform .3s;}
.cmp-card.curr{border-color:var(--c-color,#4f8ef7);box-shadow:0 0 16px var(--c-color,#4f8ef7)33;transform:scale(1.03);}
.cmp-label{font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
.cmp-num{font-size:2.4rem;font-weight:900;line-height:1;color:var(--c-color,#fff);-webkit-text-stroke:var(--c-stroke,1.5px) var(--c-color,#fff);text-shadow:0 0 12px var(--c-color,#fff)88;}
.cmp-num.rainbow{background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;}
.cmp-name{font-size:.77rem;font-weight:700;color:var(--c-color,#fff);margin-top:2px;}
.cmp-range{font-size:.65rem;color:var(--text2);margin-top:2px;}
.cmp-pct{font-size:.65rem;color:var(--c-color,#fff);opacity:.8;margin-top:1px;}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.effect-modal{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;width:min(760px,96vw);max-height:90vh;overflow-y:auto;padding:22px;animation:fadeIn .3s ease;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-head h2{font-size:1.05rem;font-weight:900;}
.modal-close{background:none;border:1px solid var(--border);color:var(--text);width:29px;height:29px;border-radius:50%;cursor:pointer;font-size:.88rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{background:var(--bg3);border-color:var(--accent);}
.modal-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;justify-content:center;}
.lv-nav-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--nb-color,#555);background:var(--card-bg);color:var(--nb-color,#aaa);font-size:.72rem;font-weight:900;cursor:pointer;transition:all .2s;font-family:inherit;}
.lv-nav-btn:hover,.lv-nav-btn.active{background:var(--nb-color,#555);color:#000;transform:scale(1.12);}
.modal-body{display:grid;grid-template-columns:240px 1fr;gap:18px;align-items:start;}
.prev-card-wrap{perspective:600px;display:flex;justify-content:center;}
.prev-card{
  width:220px;height:280px;border-radius:16px;
  background:var(--card-bg);
  position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transform-style:preserve-3d;animation:floatUp 3.5s ease-in-out infinite;overflow:hidden;
  border:2px solid transparent;

/* ════════════════════════════════════
   SPARK
════════════════════════════════════ */
class Spark{
  constructor(canvas,g){this.c=canvas;this.ctx=canvas.getContext('2d');this.g=g;this.particles=[];this.raf=null;}
  _spawn(){
    const W=this.c.width,H=this.c.height,s=Math.floor(Math.random()*4);
    let x,y,vx,vy;const spd=.7+Math.random()*1.6*this.g.intensity;
    if(s===0){x=Math.random()*W;y=H;vx=(Math.random()-.5)*1.8;vy=-spd;}
    else if(s===1){x=0;y=Math.random()*H;vx=spd;vy=(Math.random()-.5)*1.8;}
    else if(s===2){x=W;y=Math.random()*H;vx=-spd;vy=(Math.random()-.5)*1.8;}
    else{x=Math.random()*W;y=0;vx=(Math.random()-.5)*1.8;vy=spd;}
    const pal=this.g.lv===10?['#ff0080','#7c3aed','#00e5ff','#ffd700','#ff4500']:[this.g.color,'#fff',this.g.color+'99'];
    return{x,y,vx,vy,maxLife:.7+Math.random()*1.3,life:.7+Math.random()*1.3,size:1.1+Math.random()*2.3*this.g.intensity,color:pal[Math.floor(Math.random()*pal.length)],trail:[]};
  }
  tick(){
    const W=this.c.width,H=this.c.height,ctx=this.ctx;
    ctx.clearRect(0,0,W,H);
    const n=Math.ceil(this.g.intensity*5);
    for(let i=0;i<n;i++)this.particles.push(this._spawn());
    this.particles=this.particles.filter(p=>p.life>0);
    for(const p of this.particles){
      p.trail.push({x:p.x,y:p.y});if(p.trail.length>6)p.trail.shift();
      p.x+=p.vx;p.y+=p.vy;p.vy-=.025*this.g.intensity;p.vx*=.985;p.life-=.022;
      const a=Math.max(0,p.life/p.maxLife);
      if(p.trail.length>1){ctx.beginPath();ctx.moveTo(p.trail[0].x,p.trail[0].y);for(let i=1;i<p.trail.length;i++)ctx.lineTo(p.trail[i].x,p.trail[i].y);ctx.strokeStyle=p.color+Math.floor(a*65).toString(16).padStart(2,'0');ctx.lineWidth=p.size*.4;ctx.stroke();}
      if(this.g.lv>=4){const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3);gr.addColorStop(0,p.color+Math.floor(a*90).toString(16).padStart(2,'0'));gr.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(p.x,p.y,p.size*3,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();}
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=p.color+Math.floor(a*255).toString(16).padStart(2,'0');ctx.fill();
    }
  }
  start(){const loop=()=>{this.tick();this.raf=requestAnimationFrame(loop);};loop();}
  stop(){cancelAnimationFrame(this.raf);if(this.ctx)this.ctx.clearRect(0,0,this.c.width,this.c.height);}
}

function getStrokeWidth(lv){return[1.5,2,2.5,3,3.5,4,4.5,5.5,7,0][lv-1]+'px';}
function getNameStroke(lv){return[.5,.6,.7,.8,.9,1,1.1,1.3,1.8,0][lv-1]+'px';}
function fmt(n){if(n>=1e8)return(n/1e8).toFixed(1)+'억';if(n>=1e4)return(n/1e4).toFixed(1)+'만';if(n>=1e3)return(n/1e3).toFixed(1)+'천';return n+'';}
function fmtMoney(n){return'₩'+n.toLocaleString('ko-KR');}
function calcPct(subs){
  if(subs>=5e7)return'0.00005%';if(subs>=1e7)return'0.002%';if(subs>=5e6)return'0.02%';
  if(subs>=1e6)return'0.1%';if(subs>=1e5)return'1%';if(subs>=1e4)return'6%';
  if(subs>=1e3)return'34%';if(subs>=500)return'42%';if(subs>=100)return'63%';return'100%';
}

/* ════════════════════════════════════
   SCORING ENGINE
════════════════════════════════════ */
function computeScore(subs,totalViews,videos,engRate,uploadFreq,avgViews){
  const subS=subs<1000?subs*.5:subs<10000?500+(subs-1000)*.22:subs<100000?2700+(subs-10000)*.11:subs<1e6?13000+(subs-100000)*.045:53500+Math.sqrt(subs-1e6)*22;
  const viewS=totalViews*.000018,engS=Math.min(engRate,20)*1400,freqS=Math.min(uploadFreq,16)*380,avgS=Math.min(avgViews,8e6)*.00045;
  let bonus=0;const bonusLog=[];
  if(subs>=1e7){bonus+=subS*.25;bonusLog.push({k:'구독자 압도적',v:'+25%'});}
  else if(subs>=1e6){bonus+=subS*.15;bonusLog.push({k:'구독자 우수',v:'+15%'});}
  const vr=subs>0?avgViews/subs:0;
  if(vr>=2){bonus+=avgS*.5;bonusLog.push({k:'조회/구독 200%+',v:'+50%'});}
  else if(vr>=1){bonus+=avgS*.3;bonusLog.push({k:'조회/구독 100%+',v:'+30%'});}
  if(engRate>=8){bonus+=engS*.4;bonusLog.push({k:'참여율 압도적(8%+)',v:'+40%'});}
  else if(engRate>=4){bonus+=engS*.2;bonusLog.push({k:'참여율 우수(4%+)',v:'+20%'});}
  if(uploadFreq>=12){bonus+=freqS*.35;bonusLog.push({k:'업로드 압도적(월12+)',v:'+35%'});}
  else if(uploadFreq>=6){bonus+=freqS*.15;bonusLog.push({k:'업로드 우수(월6+)',v:'+15%'});}
  return{total:Math.round(subS+viewS+engS+freqS+avgS+bonus),bd:{subS:Math.round(subS),viewS:Math.round(viewS),engS:Math.round(engS),freqS:Math.round(freqS),avgS:Math.round(avgS),bonus:Math.round(bonus)},bonusLog,vr};
}
function lvFromScore(s){for(let i=GRADES.length-1;i>=0;i--)if(s>=GRADES[i].scoreMin)return GRADES[i].lv;return 1;}
function lvFromSubs(s){for(let i=GRADES.length-1;i>=0;i--)if(s>=GRADES[i].subMin)return GRADES[i].lv;return 1;}

/* quality label */
function qual(v,tiers){
  const[t1,t2,t3]=tiers;
  if(v>=t1)return{cls:'fq-best',txt:'압도적 🔥'};
  if(v>=t2)return{cls:'fq-good',txt:'우수 ✓'};
  if(v>=t3)return{cls:'fq-mid', txt:'보통'};
  return{cls:'fq-low',txt:'개선 필요'};
}

  const numEl=document.getElementById('prevNum');
  numEl.className='prev-num'+(isR?' rainbow':'');
  if(!isR){numEl.style.color=lvC;numEl.style.webkitTextStroke=`${stroke} ${lvC}`;numEl.style.textShadow=`0 0 16px ${lvC}88`;}
  else numEl.style.cssText='';
  numEl.textContent=lv;
  const nameEl=document.getElementById('prevName');
  nameEl.className='prev-name'+(isR?' rainbow':'');
  if(!isR){nameEl.style.color=lvC;nameEl.style.webkitTextStroke=`${nStroke} ${lvC}`;nameEl.style.textShadow=`0 0 8px ${lvC}66`;}
  else nameEl.style.cssText='';
  nameEl.textContent=g.name;
  document.getElementById('prevRange').textContent=`${fmt(g.subMin)} ~ ${g.subMax===Infinity?'∞':fmt(g.subMax)} 구독자`;
  if(prevSpark)prevSpark.stop();
  const cv=document.getElementById('prevCanvas'),pw=document.getElementById('prevCard');
  cv.width=pw.offsetWidth||220;cv.height=pw.offsetHeight||280;
  prevSpark=new Spark(cv,g);prevSpark.start();
  const bars=[{l:'구독자 규모',v:Math.min(100,((lv-1)/9)*100+5)},{l:'스파크 강도',v:g.intensity*100},{l:'알고리즘 점수',v:Math.min(100,g.scoreMin/10000)},{l:'희귀도',v:[.1,1,5,10,20,35,55,72,88,100][lv-1]}];
  document.getElementById('modalInfo').innerHTML=`
    <h3 style="color:${lvC}">LV${lv} – ${g.name}</h3>
    <div class="compare-bars">
      ${bars.map(b=>`<div class="cbar-row"><div class="cbar-label"><span>${b.l}</span><span>${b.v.toFixed(0)}%</span></div><div class="cbar-wrap"><div class="cbar-fill" style="width:${b.v}%;background:${isR?'linear-gradient(90deg,#ff0080,#7c3aed,#00e5ff)':lvC}"></div></div></div>`).join('')}
    </div>
    ${[['구독자 범위',`${fmt(g.subMin)}~${g.subMax===Infinity?'∞':fmt(g.subMax)}`],['상위 %',g.rankPct],['채널 수',g.chCount],['점수 범위',`${g.scoreMin.toLocaleString()}~${g.scoreMax===Infinity?'∞':g.scoreMax.toLocaleString()}`],['플레이버튼',g.play]]
      .map(([k,v])=>`<div class="stat-row"><span class="stat-key">${k}</span><span class="stat-val" style="color:${lvC}">${v}</span></div>`).join('')}
    <div style="background:var(--bg3);border-radius:8px;padding:9px 12px;border:1px solid var(--card-border);">
      <div style="font-size:.76rem;font-weight:700;margin-bottom:3px">📌 다음 목표</div>
      <p style="font-size:.73rem;color:var(--text2);line-height:1.55">${g.nextGoal}</p>
    </div>
    <div class="perk-tags">${g.perks.map(p=>`<span class="perk-tag">✓ ${p}</span>`).join('')}</div>`;
}

/* ════════════════════════════════════
   REVENUE
════════════════════════════════════ */
function calcRevenue(){
  const views=+document.getElementById('rv_views').value||0;
  const cpm=+document.getElementById('rv_cpm').value||0;
  const country=+document.getElementById('rv_country').value||1;
  const vtr=+document.getElementById('rv_vtr').value/100||.35;
  const rev=views*vtr*(cpm/1000)*country*.55;
  document.getElementById('revNum').textContent=fmtMoney(Math.round(rev));
  document.getElementById('revDetail').textContent=`조회수 ${views.toLocaleString()} × VTR ${(vtr*100).toFixed(0)}% × CPM ₩${cpm.toLocaleString()} × 국가 ×${country} × YT 55%`;
}

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn,.sidebar-item').forEach(b=>b.classList.remove('active'));
  const s=document.getElementById('sec-'+id);if(s)s.classList.add('active');
  document.querySelectorAll(`[onclick*="'${id}'"]`).forEach(b=>b.classList.add('active'));
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
function handleGlobalSearch(){
  const q=document.getElementById('globalSearchInput').value.trim();if(!q)return;
  document.getElementById('channelInput').value=q;showSection('channel');analyzeChannel();
}
