<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTAnalytics Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-AF8853448" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #1e1e2e;
      --bg-hover: #252535;
      --accent: #ff4757;
      --accent2: #ffa502;
      --accent3: #2ed573;
      --accent4: #1e90ff;
      --text-primary: #e8e8f0;
      --text-secondary: #9898b0;
      --text-muted: #606078;
      --border: #2a2a3e;
      --gradient: linear-gradient(135deg, #ff4757, #ff6b81);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(15,15,26,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .logo-icon {
      width: 36px; height: 36px; background: var(--gradient);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 18px; font-weight: 700; }
    .logo-text span { color: var(--accent); }
    .api-status {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      background: rgba(46,213,115,0.15); color: var(--accent3);
      border: 1px solid rgba(46,213,115,0.3);
    }
    .api-status.error {
      background: rgba(255,71,87,0.15); color: var(--accent);
      border-color: rgba(255,71,87,0.3);
    }
    #global-error-banner {
      display: none; position: fixed; top: 60px; left: 0; right: 0; z-index: 99;
      background: rgba(255,71,87,0.92); color: #fff;
      padding: 10px 24px; font-size: 14px; font-weight: 500; text-align: center;
    }
    .app-layout { display: flex; padding-top: 60px; min-height: 100vh; }
    .sidebar {
      width: 220px; background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 20px 12px;
      position: fixed; top: 60px; left: 0; bottom: 0; overflow-y: auto;
    }
    .nav-section-title {
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 0 8px 8px; margin-top: 16px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 14px; font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.2s; border: none; background: none;
      width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active { background: rgba(255,71,87,0.15); color: var(--accent); }
    .nav-item .nav-icon { font-size: 18px; width: 24px; text-align: center; }
    .main-content { margin-left: 220px; flex: 1; padding: 24px; min-width: 0; }
    .section-page { display: none; }
    .section-page.active { display: block; }
    .section-header { margin-bottom: 24px; }
    .section-title { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .section-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }

    /* 검색창 */
    .hot-search-box { display: flex; gap: 10px; margin-bottom: 20px; }
    .hot-search-input {
      flex: 1; padding: 11px 18px; border-radius: var(--radius);
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-primary); font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .hot-search-input:focus { border-color: var(--accent); }
    .hot-search-input::placeholder { color: var(--text-muted); }
    .hot-search-btn {
      padding: 11px 22px; border-radius: var(--radius); border: none;
      background: var(--accent); color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .hot-search-btn:hover { opacity: 0.85; }

    /* 카테고리 탭 */
    .cat-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .cat-btn {
      padding: 7px 18px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-secondary);
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* 쇼츠/롱폼 탭 */
    .hot-tab-bar {
      display: flex; margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    .hot-tab-btn {
      padding: 10px 28px; background: none; border: none; cursor: pointer;
      font-size: 14px; font-weight: 600; color: var(--text-secondary);
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all 0.2s;
    }
    .hot-tab-btn:hover { color: var(--text-primary); }
    .hot-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* 비디오 그리드 */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px; margin-bottom: 20px;
    }
    .video-card {
      background: var(--bg-card); border-radius: var(--radius);
      overflow: hidden; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid var(--border);
    }
    .video-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .thumb-wrap {
      position: relative; width: 100%; padding-top: 56.25%;
      overflow: hidden; background: #111;
    }
    .thumb-wrap img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s;
    }
    .video-card:hover .thumb-wrap img { transform: scale(1.05); }
    .duration-badge {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.85); color: #fff;
      font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
    }
    .shorts-badge {
      position: absolute; top: 6px; left: 6px;
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
    }
    .video-info { padding: 12px; }
    .video-title {
      font-size: 13px; font-weight: 600; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px;
    }
    .video-meta { display: flex; justify-content: space-between; align-items: center; }
    .video-channel { font-size: 12px; color: var(--text-secondary); }
    .video-stats { display: flex; gap: 8px; font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .viral-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 700;
    }
    .viral-badge.hot  { background: rgba(255,71,87,0.2);  color: var(--accent); }
    .viral-badge.warm { background: rgba(255,165,2,0.2);  color: var(--accent2); }
    .viral-badge.cool { background: rgba(30,144,255,0.2); color: var(--accent4); }

    .more-btn {
      display: none; margin: 0 auto 32px;
      padding: 12px 36px; border-radius: 24px;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-primary); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .more-btn:hover { background: var(--accent); border-color: var(--accent); }

    .loader-wrap { text-align: center; padding: 40px; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-data { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
    .no-data-icon { font-size: 48px; margin-bottom: 12px; }
    .no-data h3 { font-size: 16px; margin-bottom: 6px; }
    .no-data p  { font-size: 13px; }

    .error-card {
      background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3);
      border-radius: var(--radius); padding: 20px 24px; margin-bottom: 20px;
      color: var(--accent);
    }
    .error-card h3 { font-size: 15px; margin-bottom: 6px; }
    .error-card p  { font-size: 13px; opacity: 0.85; }

    /* 검색결과 헤더 */
    .search-result-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .search-result-header span { font-size: 14px; color: var(--text-secondary); }
    .search-result-header strong { color: var(--accent); }
    .search-clear-btn {
      margin-left: auto; padding: 5px 14px; border-radius: 16px;
      border: 1px solid var(--border); background: none;
      color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .search-clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* 채널 분석 */
    .channel-search-box { display: flex; gap: 10px; margin-bottom: 24px; }
    .search-input {
      flex: 1; padding: 12px 18px; border-radius: var(--radius);
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-btn {
      padding: 12px 24px; border-radius: var(--radius); border: none;
      background: var(--accent); color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .search-btn:hover { opacity: 0.85; }
    .channel-result-card {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 24px; margin-bottom: 20px;
    }
    .channel-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .channel-avatar {
      width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent);
    }
    .channel-name { font-size: 20px; font-weight: 700; }
    .channel-handle { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px;
    }
    .stat-card {
      background: var(--bg-secondary); border-radius: var(--radius-sm);
      padding: 16px; text-align: center; border: 1px solid var(--border);
    }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .grade-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; border-radius: 50%;
      font-size: 20px; font-weight: 900; border: 3px solid;
    }

    /* 수익 계산기 */
    .calc-form {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 24px; margin-bottom: 24px;
    }
    .form-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .form-group { flex: 1; min-width: 160px; }
    .form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
      background: var(--bg-secondary); border: 1px solid var(--border);
      color: var(--text-primary); font-size: 14px; outline: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .calc-btn {
      padding: 12px 32px; border-radius: var(--radius); border: none;
      background: var(--gradient); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .result-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;
    }
    .result-card {
      background: var(--bg-card); border-radius: var(--radius);
      padding: 20px; border: 1px solid var(--border); text-align: center;
    }
    .result-value { font-size: 24px; font-weight: 700; color: var(--accent); }
    .result-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    /* AI 아이디어 */
    .ai-form {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 24px; margin-bottom: 24px;
    }
    .ai-idea-list { display: flex; flex-direction: column; gap: 12px; }
    .ai-idea-card {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 16px 20px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .ai-idea-card:hover { border-color: var(--accent); }
    .ai-idea-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .ai-idea-desc  { font-size: 13px; color: var(--text-secondary); }

    /* 도구 & 쇼핑 */
    .tools-grid, .shop-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;
    }
    .tool-card, .shop-card {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 20px; transition: all 0.2s;
    }
    .tool-card:hover, .shop-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .tool-icon  { font-size: 32px; margin-bottom: 12px; }
    .tool-name, .shop-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .tool-desc, .shop-desc { font-size: 13px; color: var(--text-secondary); }
    .shop-price { font-size: 18px; font-weight: 700; color: var(--accent); margin-top: 10px; }
    .shop-link {
      display: inline-block; margin-top: 10px; padding: 7px 18px;
      border-radius: 20px; background: var(--accent); color: #fff;
      font-size: 13px; font-weight: 600; text-decoration: none;
    }

    /* 모달 */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 28px;
      max-width: 600px; width: 92%; max-height: 85vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px; margin-bottom: 16px;
    }
    .modal-title { font-size: 16px; font-weight: 700; line-height: 1.4; flex: 1; }
    .modal-close {
      flex-shrink: 0; background: var(--bg-hover); border: 1px solid var(--border);
      color: var(--text-secondary); font-size: 18px; cursor: pointer;
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* 모달 내 iframe 래퍼 */
    .player-wrap {
      position: relative; width: 100%; padding-top: 56.25%;
      border-radius: 8px; overflow: hidden; margin-bottom: 16px; background: #000;
    }
    .player-wrap iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
    }

    /* 모달 통계 */
    .modal-stats {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px;
      margin-bottom: 14px;
    }
    .modal-stat {
      background: var(--bg-secondary); border-radius: var(--radius-sm);
      padding: 12px; text-align: center; border: 1px solid var(--border);
    }
    .modal-stat-value { font-size: 18px; font-weight: 700; color: var(--accent); }
    .modal-stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

    @media (max-width: 768px) {
      .sidebar { width: 64px; }
      .sidebar .nav-item span:not(.nav-icon) { display: none; }
      .sidebar .nav-section-title { display: none; }
      .main-content { margin-left: 64px; padding: 16px; }
      .hot-search-box { flex-direction: column; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo" onclick="showSec('hot')">
    <div class="logo-icon">▶</div>
    <div class="logo-text">YT<span>Analytics</span> Pro</div>
  </div>
  <div class="api-status" id="api-status">● API 연결 중</div>
</header>

<div id="global-error-banner"></div>

<div class="app-layout">
  <nav class="sidebar">
    <div class="nav-section-title">탐색</div>
    <button class="nav-item active" data-section="hot" onclick="showSec('hot')">
      <span class="nav-icon">🔥</span><span>인기영상</span>
    </button>
    <button class="nav-item" data-section="channel" onclick="showSec('channel')">
      <span class="nav-icon">📊</span><span>채널 분석</span>
    </button>
    <div class="nav-section-title">도구</div>
    <button class="nav-item" data-section="revenue" onclick="showSec('revenue')">
      <span class="nav-icon">💰</span><span>수익 계산기</span>
    </button>
    <button class="nav-item" data-section="ai" onclick="showSec('ai')">
      <span class="nav-icon">🤖</span><span>AI 아이디어</span>
    </button>
    <button class="nav-item" data-section="tools" onclick="showSec('tools')">
      <span class="nav-icon">🛠️</span><span>유튜버 도구</span>
    </button>
    <button class="nav-item" data-section="shop" onclick="showSec('shop')">
      <span class="nav-icon">🛒</span><span>장비 쇼핑</span>
    </button>
  </nav>

  <main class="main-content">

    <!-- 인기영상 -->
    <section class="section-page active" id="section-hot">
      <div class="section-header">
        <div class="section-title">🔥 인기영상</div>
        <div class="section-subtitle">카테고리별 한국 인기 YouTube 영상</div>
      </div>
      <div class="hot-search-box">
        <input class="hot-search-input" id="hot-kw-input"
          placeholder="🔍  키워드로 영상 검색 (예: 먹방, 게임, 브이로그)"
          onkeydown="if(event.key==='Enter') doHotSearch()" />
        <button class="hot-search-btn" onclick="doHotSearch()">검색</button>
      </div>
      <div class="cat-tabs" id="cat-tabs"></div>
      <div class="hot-tab-bar">
        <button class="hot-tab-btn active" data-type="shorts" id="tab-shorts">🎬 쇼츠</button>
        <button class="hot-tab-btn"        data-type="longs"  id="tab-longs" >📹 롱폼</button>
      </div>
      <div id="search-result-header" style="display:none" class="search-result-header">
        <span>검색 결과: <strong id="search-kw-label"></strong></span>
        <button class="search-clear-btn" onclick="clearHotSearch()">✕ 검색 초기화</button>
      </div>
      <div id="hot-loader" class="loader-wrap">
        <div class="spinner"></div>
        <div style="color:var(--text-secondary);font-size:13px">인기영상 로딩 중...</div>
      </div>
      <div id="shorts-grid" class="video-grid"></div>
      <button class="more-btn" id="shorts-more-btn" onclick="loadMoreShorts()">쇼츠 더 보기 ▼</button>
      <div id="longs-grid" class="video-grid" style="display:none"></div>
      <button class="more-btn" id="longs-more-btn" onclick="loadMoreLongs()">롱폼 더 보기 ▼</button>
    </section>

    <!-- 채널 분석 -->
    <section class="section-page" id="section-channel">
      <div class="section-header">
        <div class="section-title">📊 채널 분석</div>
        <div class="section-subtitle">YouTube 채널 성과 및 등급 분석</div>
      </div>
      <div class="channel-search-box">
        <input class="search-input" id="ch-input"
          placeholder="채널명 또는 핸들 (@채널명) 입력"
          onkeydown="if(event.key==='Enter') doChannelSearch()" />
        <button class="search-btn" onclick="doChannelSearch()">분석</button>
      </div>
      <div id="channel-result"></div>
    </section>

    <!-- 수익 계산기 -->
    <section class="section-page" id="section-revenue">
      <div class="section-header">
        <div class="section-title">💰 수익 계산기</div>
        <div class="section-subtitle">예상 유튜브 광고 수익 분석</div>
      </div>
      <div class="calc-form">
        <div class="form-row">
          <div class="form-group">

/* ── 한국식 단위 변환 ── */
function fmt(n) {
  n = parseInt(n, 10) || 0;
  if (n >= 100_000_000) return (n / 100_000_000).toFixed(1).replace(/\.0$/, '') + '억';
  if (n >= 10_000)      return (n / 10_000).toFixed(1).replace(/\.0$/, '') + '만';
  if (n >= 1_000)       return (n / 1_000).toFixed(1).replace(/\.0$/, '') + '천';
  return n.toLocaleString('ko-KR');
}

function parseDurSec(iso) {
  if (!iso) return 0;
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0)*3600)+(parseInt(m[2]||0)*60)+parseInt(m[3]||0);
}
function fmtDur(iso) {
  const s = parseDurSec(iso);
  if (!s) return '--:--';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function isShorts(item) {
  return parseDurSec(item.contentDetails?.duration||'') > 0
      && parseDurSec(item.contentDetails?.duration||'') <= 180;
}
function viralOf(item) {
  const s = item.statistics||{};
  return (parseInt(s.viewCount||0))+(parseInt(s.likeCount||0)*30)+(parseInt(s.commentCount||0)*60);
}
function gradeOf(sub) {
  const n = parseInt(sub||0);
  return GRADES.find(g=>n>=g.min)||GRADES[GRADES.length-1];
}
function showGlobalError(msg) {
  const el = document.getElementById('global-error-banner');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('api-status').className = 'api-status error';
  document.getElementById('api-status').textContent = '● API 오류';
}
function hideGlobalError() {
  document.getElementById('global-error-banner').style.display = 'none';

async function openVideoModal(vid) {
  const overlay    = document.getElementById('video-modal');
  const playerWrap = document.getElementById('player-wrap');
  const titleEl    = document.getElementById('modal-video-title');
  const statsEl    = document.getElementById('modal-stats');
  const descEl     = document.getElementById('modal-desc');
  const linkEl     = document.getElementById('modal-yt-link');

  /* 이전 iframe 잔여 제거 */
  playerWrap.innerHTML = '';
  titleEl.textContent  = '로딩 중...';
  statsEl.innerHTML    = '<div class="loader-wrap" style="padding:20px"><div class="spinner"></div></div>';
  descEl.textContent   = '';
  linkEl.href          = `https://www.youtube.com/watch?v=${vid}`;
  overlay.classList.add('open');

  try {
    /* ★ part에 snippet,statistics,contentDetails 모두 포함 */
    const data = await apiFetch(
      `https://www.googleapis.com/youtube/v3/videos` +
      `?part=snippet%2Cstatistics%2CcontentDetails&id=${vid}`
    );
    const item = data.items?.[0];
    if (!item) {
      statsEl.innerHTML = '<div class="error-card"><h3>영상 정보를 불러올 수 없습니다.</h3></div>';
      return;
    }

    const sn = item.snippet       || {};
    const st = item.statistics    || {};   // ★ 실제 API 통계값
    const cd = item.contentDetails|| {};

    /* 제목 */
    titleEl.textContent = sn.title || '';

    /* ★ iframe을 동적으로 생성해서 삽입 (닫을 때 제거) */
    const iframe = document.createElement('iframe');
    iframe.src              = `https://www.youtube.com/embed/${vid}?autoplay=1`;
    iframe.allow            = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen  = true;
    iframe.loading          = 'lazy';
    playerWrap.appendChild(iframe);

    /* 통계 카드 – API에서 받은 실제 값 사용 */
    statsEl.innerHTML = `
      <div class="modal-stat">
        <div class="modal-stat-value">${fmt(st.viewCount)}</div>
        <div class="modal-stat-label">조회수</div>

        <div class="modal-stat-label">좋아요</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-value">${fmt(st.commentCount)}</div>
        <div class="modal-stat-label">댓글</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-value">${fmtDur(cd.duration)}</div>
        <div class="modal-stat-label">길이</div>
      </div>`;

  } catch(e) {

  }
}

/* ================================================================
   APIFETCH
================================================================ */
async function apiFetch(url) {
  const validKeys = API_KEYS.filter(k=>k&&k.length>20&&!k.startsWith('YOUR_'));
  if (!validKeys.length) throw new Error('유효한 API 키가 없습니다.');
  for (let i=0; i<validKeys.length; i++) {
    const k = validKeys[(keyIdx+i)%validKeys.length];
    const sep = url.includes('?')?'&':'?';
    try {
      const r = await fetch(url+sep+'key='+k);
      let data; try { data=await r.json(); } catch { data={}; }
      if (r.status===403||r.status===429) { keyIdx=(keyIdx+i+1)%validKeys.length; continue; }
      if (data.error) {
        const code=data.error.code||0, reason=data.error.errors?.[0]?.reason||'';
        if ([403,429].includes(code)||['quotaExceeded','keyInvalid','forbidden','dailyLimitExceeded'].includes(reason)) {
          keyIdx=(keyIdx+i+1)%validKeys.length; continue;
        }
        if (['invalidSearchFilter','invalidVideoFilter','invalidFilter'].includes(reason)) {
          const cleaned=url.replace(/[&?]videoCategoryId=[^&]*/g,'').replace(/[&?]videoDuration=[^&]*/g,'');
          return apiFetch(cleaned);
        }
        throw new Error(`API 오류 [${code}] ${reason}`);
      }
      if (!r.ok) throw new Error('HTTP '+r.status);
      keyIdx=(keyIdx+i)%validKeys.length;
      hideGlobalError();
      return data;
    } catch(e) {
      if (i===validKeys.length-1) throw e;
    }
  }
  throw new Error('모든 API 키 소진');
}

/* 키워드 검색 */
async function doHotSearch() {
  const q=document.getElementById('hot-kw-input').value.trim();
  if (!q) { clearHotSearch(); return; }
  hotSearchMode=true; hotSearchQuery=q;
  searchShortsPage=0; searchLongsPage=0; searchShorts=[]; searchLongs=[];
  document.getElementById('search-result-header').style.display='flex';
  document.getElementById('search-kw-label').textContent=`"${q}"`;
  document.querySelectorAll('.cat-btn').forEach(b=>{b.classList.remove('active');b.style.opacity='0.4';});
  showHotLoader();
  try {
    /* 쇼츠 */
    const sr=await apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&regionCode=KR&relevanceLanguage=ko&q=${encodeURIComponent(q)}&maxResults=25&order=viewCount`);
    const sIds=(sr.items||[]).map(i=>i.id?.videoId).filter(Boolean);
    if (sIds.length) {
      const d=await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&id=${sIds.join(',')}`);
      searchShorts=(d.items||[]).filter(isShorts);
    }
    /* 롱폼 medium */
    const mr=await apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=medium&regionCode=KR&relevanceLanguage=ko&q=${encodeURIComponent(q)}&maxResults=25&order=viewCount`);
    const mIds=(mr.items||[]).map(i=>i.id?.videoId).filter(Boolean);
    if (mIds.length) {
      const d=await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&id=${mIds.join(',')}`);
      searchLongs=(d.items||[]).filter(v=>!isShorts(v));
    }
    /* 롱폼 long */
    const lr=await apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=long&regionCode=KR&relevanceLanguage=ko&q=${encodeURIComponent(q)}&maxResults=25&order=viewCount`);
    const lIds=(lr.items||[]).map(i=>i.id?.videoId).filter(Boolean);
    if (lIds.length) {
      const d=await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&id=${lIds.join(',')}`);
      (d.items||[]).filter(v=>!isShorts(v)).forEach(v=>{ if(!searchLongs.find(l=>l.id===v.id)) searchLongs.push(v); });
    }
    hideHotLoader(); renderSearchResult();
  } catch(e) { hideHotLoader(); showHotError(e.message); showGlobalError('검색 실패: '+e.message); }
}

function renderSearchResult() {
  const sg=document.getElementById('shorts-grid'), lg=document.getElementById('longs-grid');
  const sm=document.getElementById('shorts-more-btn'), lm=document.getElementById('longs-more-btn');
  if (activeType==='shorts') {
    sg.style.display=''; lg.style.display='none'; lm.style.display='none';
    if (!searchShorts.length) {
      sg.innerHTML=`<div class="no-data" style="grid-column:1/-1"><div class="no-data-icon">🔍</div><h3>"${hotSearchQuery}" 쇼츠 결과 없음</h3><p>다른 키워드로 검색해 보세요.</p></div>`;
      sm.style.display='none';
    } else {
      const sl=searchShorts.slice(0,(searchShortsPage+1)*PAGE);
      sg.innerHTML=sl.map(v=>makeVideoCard(v,'shorts')).join('');
      sm.style.display=sl.length<searchShorts.length?'block':'none';
    }
  } else {
    sg.style.display='none'; sm.style.display='none'; lg.style.display='';
    if (!searchLongs.length) {
      lg.innerHTML=`<div class="no-data" style="grid-column:1/-1"><div class="no-data-icon">🔍</div><h3>"${hotSearchQuery}" 롱폼 결과 없음</h3><p>다른 키워드로 검색해 보세요.</p></div>`;
      lm.style.display='none';
    } else {
      const sl=searchLongs.slice(0,(searchLongsPage+1)*PAGE);
      lg.innerHTML=sl.map(v=>makeVideoCard(v,'longs')).join('');
      lm.style.display=sl.length<searchLongs.length?'block':'none';
    }
  }
}

function clearHotSearch() {
  hotSearchMode=false; hotSearchQuery='';
  searchShorts=[]; searchLongs=[]; searchShortsPage=0; searchLongsPage=0;
  document.getElementById('hot-kw-input').value='';
  document.getElementById('search-result-header').style.display='none';
  document.querySelectorAll('.cat-btn').forEach(b=>{ b.style.opacity=''; b.classList.toggle('active',b.textContent===activeCat); });
  shortsPage=0; longsPage=0; renderHotSplit();
}

async function loadHot() {
  buildCatTabs(); showHotLoader();
  try {
    await loadUntilFull(CAT_KEYS[0]);
    hideHotLoader(); renderHotSplit();
    for (const k of CAT_KEYS.slice(1)) {
      if (!catShortsCache[k]&&!catLongCache[k]) loadUntilFull(k).catch(e=>console.warn('[bg]',k,e.message));
    }
  } catch(err) { hideHotLoader(); showGlobalError('인기영상 로드 실패: '+err.message); showHotError(err.message); }
}

async function loadUntilFull(cat) {
  const cfg=CAT_CFG[cat]; if (!cfg) return;
  let shorts=[],longs=[];
  try {
    const d=await apiFetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics` +
      `&chart=mostPopular&regionCode=KR&hl=ko&maxResults=50` +
      (cfg.categoryId?`&videoCategoryId=${cfg.categoryId}`:'')
    );
    (d.items||[]).forEach(it=>(isShorts(it)?shorts:longs).push(it));
  } catch(e) { console.warn('[mostPopular]',cat,e.message); }

  if (shorts.length<12) {
    for (const kw of cfg.shortsKw||[]) {
      if (shorts.length>=24) break;
      try {
        const r=await apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&regionCode=KR&relevanceLanguage=ko&q=${encodeURIComponent(kw)}&maxResults=25`);
        const ids=(r.items||[]).map(i=>i.id?.videoId).filter(Boolean);
        if (ids.length) {
          const d=await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&id=${ids.join(',')}`);
          (d.items||[]).forEach(it=>{ if(isShorts(it)&&!shorts.find(s=>s.id===it.id)) shorts.push(it); });
        }
      } catch(e) { console.warn('[쇼츠보완]',kw,e.message); }
    }
  }

  if (longs.length<12) {
    for (const kw of cfg.keywords||[]) {
      if (longs.length>=24) break;
      try {
        const r=await apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=medium&regionCode=KR&relevanceLanguage=ko&q=${encodeURIComponent(kw)}&maxResults=25`);
        const ids=(r.items||[]).map(i=>i.id?.videoId).filter(Boolean);
        if (ids.length) {
          const d=await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&id=${ids.join(',')}`);
          (d.items||[]).forEach(it=>{ if(!isShorts(it)&&!longs.find(l=>l.id===it.id)) longs.push(it); });
        }
      } catch(e) { console.warn('[롱폼보완]',kw,e.message); }
    }
  }

  const byViral=arr=>arr.slice().sort((a,b)=>viralOf(b)-viralOf(a));
  catShortsCache[cat]=byViral(shorts);
  catLongCache[cat]=byViral(longs);
}

function renderHotSplit() {
  if (hotSearchMode) { renderSearchResult(); return; }
  const sg=document.getElementById('shorts-grid'), lg=document.getElementById('longs-grid');
  const sm=document.getElementById('shorts-more-btn'), lm=document.getElementById('longs-more-btn');
  const sl=catShortsCache[activeCat]||[], ll=catLongCache[activeCat]||[];
  if (activeType==='shorts') {
    sg.style.display=''; lg.style.display='none'; lm.style.display='none';
    if (!sl.length) {
      sg.innerHTML=`<div class="no-data" style="grid-column:1/-1"><div class="no-data-icon">🎬</div><h3>쇼츠 데이터 없음</h3><p>${activeCat} 카테고리에 쇼츠가 없습니다.</p></div>`;
      sm.style.display='none';
    } else {
      const s=sl.slice(0,(shortsPage+1)*PAGE);
      sg.innerHTML=s.map(v=>makeVideoCard(v,'shorts')).join('');
      sm.style.display=s.length<sl.length?'block':'none';
    }
  } else {
    sg.style.display='none'; sm.style.display='none'; lg.style.display='';
    if (!ll.length) {
      lg.innerHTML=`<div class="no-data" style="grid-column:1/-1"><div class="no-data-icon">📹</div><h3>롱폼 데이터 없음</h3><p>${activeCat} 카테고리에 롱폼 영상이 없습니다.</p></div>`;
      lm.style.display='none';
    } else {
      const s=ll.slice(0,(longsPage+1)*PAGE);
      lg.innerHTML=s.map(v=>makeVideoCard(v,'longs')).join('');
      lm.style.display=s.length<ll.length?'block':'none';
    }
  }
}

function loadMoreShorts() { if(hotSearchMode){searchShortsPage++;renderSearchResult();}else{shortsPage++;renderHotSplit();} }
function loadMoreLongs()  { if(hotSearchMode){searchLongsPage++;renderSearchResult();}else{longsPage++;renderHotSplit();} }

/* ── VIDEO CARD ──
   카드에 표시되는 조회수/좋아요는 videos.list에서 받은 statistics 값을 그대로 사용
   (search.list snippet에는 statistics 없음 → videos.list로 상세 조회 후 렌더링)
*/
function makeVideoCard(item, type) {
  const sn=item.snippet||{}, st=item.statistics||{}, cd=item.contentDetails||{};
  const vid=item.id;
  const title=sn.title||'제목 없음';
  const ch=sn.channelTitle||'';
  const thumb=sn.thumbnails?.medium?.url||sn.thumbnails?.default?.url||'';
  const dur=fmtDur(cd.duration);
  /* ★ statistics가 없는 경우를 대비해 fallback */
  const views = st.viewCount != null ? fmt(st.viewCount) : '-';
  const likes = st.likeCount != null ? fmt(st.likeCount) : '-';
  const viral=viralOf(item);
  const vc=viral>5_000_000?'hot':viral>500_000?'warm':'cool';
  const vl=viral>5_000_000?'🔥 핫':viral>500_000?'🌡️ 상승':'📈 주목';
  const safeTitle=title.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `
    <div class="video-card" onclick="openVideoModal('${vid}')">
      <div class="thumb-wrap">
        <img src="${thumb}" alt="${safeTitle}" loading="lazy"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 320 180%22><rect fill=%22%23222%22 width=%22320%22 height=%22180%22/><text fill=%22%23666%22 x=%22160%22 y=%2295%22 text-anchor=%22middle%22 font-size=%2224%22>▶</text></svg>'" />
        ${type==='shorts'?'<span class="shorts-badge">Shorts</span>':''}
        <span class="duration-badge">${dur}</span>
      </div>
      <div class="video-info">
        <div class="video-title">${title}</div>
        <div class="video-meta">
          <span class="video-channel">${ch}</span>
          <span class="viral-badge ${vc}">${vl}</span>
        </div>
        <div class="video-stats">
          <span>👁 ${views}</span><span>👍 ${likes}</span>
        </div>
      </div>
    </div>`;
}

/* ================================================================

================================================================ */
async function doChannelSearch() {
  const q=document.getElementById('ch-input').value.trim();
  const out=document.getElementById('channel-result');
  if (!q) return;
  out.innerHTML='<div class="loader-wrap"><div class="spinner"></div></div>';
  try {
    let channelId;
    if (q.startsWith('@')) {
      const d=await apiFetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet%2Cstatistics&forHandle=${encodeURIComponent(q)}`);
      channelId=d.items?.[0]?.id;
    } else {
      const d=await apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(q)}&maxResults=1`);
      channelId=d.items?.[0]?.id?.channelId;
    }
    if (!channelId) { out.innerHTML='<div class="error-card"><h3>채널을 찾을 수 없습니다.</h3></div>'; return; }
    const ch=await apiFetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet%2Cstatistics%2CbrandingSettings&id=${channelId}`);
    const c=ch.items?.[0];
    if (!c) { out.innerHTML='<div class="error-card"><h3>채널 정보 없음</h3></div>'; return; }
    const sn=c.snippet||{}, st=c.statistics||{};
    const grade=gradeOf(st.subscriberCount);
    out.innerHTML=`
      <div class="channel-result-card">
        <div class="channel-header">
          <img class="channel-avatar" src="${sn.thumbnails?.medium?.url||''}" alt="${sn.title}" />
          <div>
            <div class="channel-name">${sn.title||''}</div>
            <div class="channel-handle">${sn.customUrl||channelId}</div>
            <div class="grade-badge" style="margin-top:8px;color:${grade.color};border-color:${grade.color};background:${grade.bg}">${grade.label}</div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-value">${fmt(st.subscriberCount)}</div><div class="stat-label">구독자</div></div>
          <div class="stat-card"><div class="stat-value">${fmt(st.viewCount)}</div><div class="stat-label">총 조회수</div></div>
          <div class="stat-card"><div class="stat-value">${fmt(st.videoCount)}</div><div class="stat-label">영상 수</div></div>
          <div class="stat-card"><div class="stat-value">${sn.country||'-'}</div><div class="stat-label">국가</div></div>
        </div>
        <p style="font-size:13px;color:var(--text-secondary);margin-top:16px">
          ${(sn.description||'').slice(0,200)}${(sn.description||'').length>200?'…':''}</p>
        <a href="https://www.youtube.com/channel/${channelId}" target="_blank"
           style="display:inline-block;margin-top:14px;padding:8px 20px;background:var(--accent);color:#fff;border-radius:20px;font-size:13px;text-decoration:none">
           채널 바로가기</a>
      </div>`;
  } catch(e) {
    out.innerHTML=`<div class="error-card"><h3>분석 실패</h3><p>${e.message}</p></div>`;
  }
}

/* ================================================================
   수익 계산기
================================================================ */
function calcRevenue() {
  const views=parseInt(document.getElementById('rev-views').value)||0;
  const rpm=parseFloat(document.getElementById('rev-cat').value)||1.5;
  const ctr=parseFloat(document.getElementById('rev-ctr').value)||5;
  const imp=views*(ctr/100);
  const mon=(imp/1000)*rpm, yr=mon*12;
  const per=views>0?(mon/views*1000).toFixed(4):0;
  document.getElementById('rev-result').innerHTML=`
    <div class="result-card"><div class="result-value">$${mon.toFixed(0)}</div><div class="result-label">월 예상 수익</div></div>
    <div class="result-card"><div class="result-value">$${yr.toFixed(0)}</div><div class="result-label">연 예상 수익</div></div>
    <div class="result-card"><div class="result-value">${fmt(Math.round(imp))}</div><div class="result-label">월 광고 노출</div></div>
    <div class="result-card"><div class="result-value">$${per}</div><div class="result-label">1K뷰 수익</div></div>`;
}
