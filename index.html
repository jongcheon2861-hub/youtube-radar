<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTAnalytics Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- AdSense (본인 계정으로 교체) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
  <style>
    /* ══════════════════════════════════════════
       CSS Variables & Reset
    ══════════════════════════════════════════ */
    :root {
      --bg:              #0f0f1a;
      --surface:         #1a1a2e;
      --surface2:        #16213e;
      --border:          rgba(255,255,255,0.08);
      --accent:          #ff6b35;
      --accent2:         #a855f7;
      --text-primary:    #f0f0f5;
      --text-secondary:  #8888aa;
      --radius:          14px;
      --sidebar-w:       220px;
      --header-h:        60px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }
    input, textarea, select { font-family: inherit; outline: none; }

    /* ══════════════════════════════════════════
       Scrollbar
    ══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

    /* ══════════════════════════════════════════
       Layout
    ══════════════════════════════════════════ */
    .app-header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
      background: rgba(15,15,26,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px; gap: 14px;
      z-index: 1000;
    }
    .app-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.1rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .app-logo-icon { font-size: 1.5rem; -webkit-text-fill-color: initial; }
    .header-spacer { flex: 1; }
    .header-api-wrap { display: flex; align-items: center; gap: 8px; }
    .header-api-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 7px 12px;
      font-size: 0.82rem;
      width: 260px;
    }
    .header-api-input::placeholder { color: var(--text-secondary); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #ff8c42);
      color: #fff; border-radius: 8px;
      padding: 7px 16px; font-size: 0.85rem; font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }

    .sidebar {
      position: fixed; top: var(--header-h); left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto; padding: 16px 10px;
      z-index: 900;
    }
    .sidebar-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: all 0.18s;
      margin-bottom: 2px;
    }
    .sidebar-nav-item:hover,
    .sidebar-nav-item.active {
      background: rgba(255,107,53,0.12);
      color: var(--accent);
    }
    .sidebar-nav-item .nav-icon { font-size: 1.1rem; min-width: 20px; text-align: center; }

    .main-wrap {
      margin-left: var(--sidebar-w);
      padding-top: var(--header-h);
      min-height: 100vh;
    }
    .main-content { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

    .content-section { display: none; }
    .content-section.active { display: block; }

    .section-header { margin-bottom: 20px; }
    .section-title {
      font-size: 1.35rem; font-weight: 800;
      background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .section-subtitle {
      color: var(--text-secondary); font-size: 0.88rem; margin-top: 4px;
    }

    /* ══════════════════════════════════════════
       Cards / Grids
    ══════════════════════════════════════════ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    /* ══════════════════════════════════════════
       Ad Banners
    ══════════════════════════════════════════ */
    .ad-banner {
      width: 100%; min-height: 90px;
      background: rgba(255,255,255,0.02);
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); font-size: 0.78rem;
      margin-bottom: 20px;
    }

    /* ══════════════════════════════════════════
       Section: 인기 동영상
    ══════════════════════════════════════════ */
    .search-bar {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .search-input {
      flex: 1; min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      padding: 10px 16px; font-size: 0.9rem;
    }
    .search-input::placeholder { color: var(--text-secondary); }
    .search-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      padding: 10px 14px; font-size: 0.88rem;
    }
    .search-select option { background: var(--surface); }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
      border-color: var(--accent);
    }
    .video-thumb {
      position: relative; width: 100%; padding-bottom: 56.25%; background: #111;
    }
    .video-thumb img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .video-thumb-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; background: var(--surface2);
    }
    .video-duration {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.8); color: #fff;
      font-size: 0.72rem; font-weight: 600;
      padding: 2px 6px; border-radius: 4px;
    }
    .video-info { padding: 12px; }
    .video-title {
      font-size: 0.88rem; font-weight: 600;
      line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 6px;
    }
    .video-meta { font-size: 0.78rem; color: var(--text-secondary); }
    .video-meta span { margin-right: 8px; }

    /* ══════════════════════════════════════════
       Modal
    ══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 2000;
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      width: 91.2vw; max-width: 1330px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    /* 광고 영역 (모달 최상단, 패딩 없이 붙임) */
    .modal-ads-top {
      margin: 0;
      padding: 0;
      border-radius: var(--radius) var(--radius) 0 0;
      overflow: hidden;
      min-height: 60px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); font-size: 0.78rem;
    }

    /* 모달 헤더 — 타이틀 없음, 닫기버튼만 (player-wrap 내부 absolute) */
    .modal-header {
      display: none; /* 타이틀 제거 후 헤더 자체 숨김 */
    }

    /* 닫기버튼은 player-wrap 내부 absolute */
    .player-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
    }
    .player-wrap iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: 0;
    }
    .modal-close {
      position: absolute;
      top: 10px; right: 10px;
      z-index: 10;
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      color: #fff;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* 제목/해시태그/설명 탭 — stats 바로 위 */
    .modal-info-tabs {
      display: flex; gap: 6px;
      padding: 14px 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .modal-info-tab {
      padding: 7px 16px;
      border-radius: 8px 8px 0 0;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.85rem; font-weight: 600;
      border: 1px solid transparent;
      border-bottom: none;
      transition: all 0.18s;
    }
    .modal-info-tab.active,
    .modal-info-tab:hover {
      color: var(--accent);
      background: rgba(255,107,53,0.08);
      border-color: var(--border);
    }
    .modal-info-panel {
      display: none;
      padding: 14px 20px;
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.6;
      max-height: 160px;
      overflow-y: auto;
      border-bottom: 1px solid var(--border);
    }
    .modal-info-panel.active { display: block; }

    .hashtag-chip {
      display: inline-block;
      background: rgba(168,85,247,0.15);
      color: var(--accent2);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.8rem;
      margin: 3px 3px 3px 0;
      cursor: pointer;
      transition: background 0.18s;
    }
    .hashtag-chip:hover { background: rgba(168,85,247,0.28); }

    /* 통계 카드 */
    .modal-stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .stat-card-icon { font-size: 1.5rem; margin-bottom: 6px; }
    .stat-card-value {
      font-size: 1.1rem; font-weight: 700;
      color: var(--text-primary); margin-bottom: 3px;
    }
    .stat-card-label {
      font-size: 0.75rem; color: var(--text-secondary);
    }

    .modal-body { padding: 16px 20px; }
    .modal-section-title {
      font-size: 0.92rem; font-weight: 700;
      margin-bottom: 10px; color: var(--text-primary);
    }

    /* ══════════════════════════════════════════
       Section: 채널 분석
    ══════════════════════════════════════════ */
    .channel-search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
    .channel-search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      padding: 10px 16px; font-size: 0.9rem;
    }
    .channel-search-input::placeholder { color: var(--text-secondary); }

    .channel-profile {
      display: flex; gap: 20px; align-items: center;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .channel-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; border: 3px solid var(--accent);
    }
    .channel-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
    .channel-handle { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
    .channel-desc {
      font-size: 0.82rem; color: var(--text-secondary);
      line-height: 1.5; max-width: 600px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .channel-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }

    .channel-videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    /* ══════════════════════════════════════════
       Section: 수익 계산기
    ══════════════════════════════════════════ */
    .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 700px) { .calc-grid { grid-template-columns: 1fr; } }

    .calc-field { margin-bottom: 14px; }
    .calc-label {
      font-size: 0.82rem; color: var(--text-secondary);
      margin-bottom: 6px; display: block;
    }
    .calc-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 9px 12px; font-size: 0.9rem;
    }
    .calc-input:focus { border-color: var(--accent); }
    .calc-range { width: 100%; accent-color: var(--accent); }

    .revenue-result {
      text-align: center; padding: 20px;
      background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(168,85,247,0.1));
      border-radius: 12px;
      border: 1px solid rgba(255,107,53,0.2);
    }
    .revenue-main {
      font-size: 2.2rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .revenue-sub { font-size: 0.85rem; color: var(--text-secondary); margin-top: 6px; }

    /* ══════════════════════════════════════════
       Section: AI 아이디어
    ══════════════════════════════════════════ */
    .idea-form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .idea-textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      padding: 12px 16px; font-size: 0.9rem;
      min-height: 80px; resize: vertical;
    }
    .idea-textarea::placeholder { color: var(--text-secondary); }
    .idea-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .idea-tag {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px; font-size: 0.82rem;
      color: var(--text-secondary);
      cursor: pointer; transition: all 0.18s;
    }
    .idea-tag:hover, .idea-tag.active {
      background: rgba(255,107,53,0.15);
      border-color: var(--accent); color: var(--accent);
    }
    .idea-result-list { display: flex; flex-direction: column; gap: 12px; }
    .idea-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      transition: border-color 0.18s;
    }
    .idea-item:hover { border-color: var(--accent); }
    .idea-item-title { font-size: 0.92rem; font-weight: 700; margin-bottom: 4px; }
    .idea-item-desc { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; }
    .idea-item-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .idea-item-tag {
      font-size: 0.75rem;
      background: rgba(168,85,247,0.12);
      color: var(--accent2);
      border-radius: 10px;
      padding: 2px 8px;
    }

    /* ══════════════════════════════════════════
       Section: 도구 모음
    ══════════════════════════════════════════ */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.22s;
    }
    .tool-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      border-color: var(--accent);
    }
    .tool-icon { font-size: 2.4rem; margin-bottom: 10px; }
    .tool-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
    .tool-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.5; }

    /* ══════════════════════════════════════════
       Section: 장비 쇼핑
    ══════════════════════════════════════════ */
    .shop-notice {
      font-size: 0.75rem;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 20px;
      text-align: center;
    }

    .shop-cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .shop-cat-card {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      padding: 28px 16px 22px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      position: relative; overflow: hidden;
      text-align: center;
    }
    .shop-cat-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--cat-color) 0%, transparent 60%);
      opacity: 0.07;
      transition: opacity 0.22s ease;
      border-radius: inherit;
    }
    .shop-cat-card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 12px 32px rgba(0,0,0,0.35), 0 0 0 2px var(--cat-color);
      border-color: var(--cat-color);
    }
    .shop-cat-card:hover::before { opacity: 0.16; }

    .shop-cat-icon {
      font-size: 3rem; line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
      transition: transform 0.22s ease;
    }
    .shop-cat-card:hover .shop-cat-icon {
      transform: scale(1.15) rotate(-4deg);
    }
    .shop-cat-label {
      font-size: 1.05rem; font-weight: 700;
      color: var(--text-primary);
    }
    .shop-cat-desc {
      font-size: 0.78rem; color: var(--text-secondary); line-height: 1.5;
    }
    .shop-cat-cta {
      margin-top: 6px;
      font-size: 0.82rem; font-weight: 600;
      color: var(--cat-color);
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--cat-color);
      border-radius: 20px;
      padding: 5px 16px;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .shop-cat-card:hover .shop-cat-cta {
      background: var(--cat-color);
      color: #fff;
    }

    /* ══════════════════════════════════════════
       Loading / Skeleton / Empty
    ══════════════════════════════════════════ */
    .skeleton {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.08) 50%,
        rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: skeleton-wave 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes skeleton-wave { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .empty-state {
      text-align: center; padding: 50px 20px;
      color: var(--text-secondary); font-size: 0.9rem;
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 14px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════
       Toast
    ══════════════════════════════════════════ */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.88rem; color: var(--text-primary);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 9999;
      transform: translateY(20px); opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ══════════════════════════════════════════
       Responsive
    ══════════════════════════════════════════ */
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; }
      .sidebar { display: none; }
      .main-content { padding: 16px 14px; }
      .modal { width: 100%; border-radius: 14px; }

      .shop-cat-card { padding: 20px 10px 16px; }
      .shop-cat-icon { font-size: 2.2rem; }
      .modal-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<div class="toast" id="toast"></div>

<!-- ══ JAVASCRIPT ══════════════════════════════════════════ -->
<script>
/* ─────────────────────────────────────────────
   Config
───────────────────────────────────────────── */
let API_KEY = localStorage.getItem('AIzaSyDV0UqoCP26AQpv4fkatmxVYqo2pXC3Rog') || '';
const YT_API = 'https://www.googleapis.com/youtube/v3';

/* ─────────────────────────────────────────────
   Utility
───────────────────────────────────────────── */
function fmt(n) {
  n = parseInt(n) || 0;
  if (n >= 100000000) return (n/100000000).toFixed(1) + '억';
  if (n >= 10000)     return (n/10000).toFixed(1) + '만';
  if (n >= 1000)      return (n/1000).toFixed(1) + 'K';
  return n.toLocaleString();
}
function fmtDate(s) {
  if (!s) return '-';
  return new Date(s).toLocaleDateString('ko-KR', {year:'numeric',month:'short',day:'numeric'});
}
function fmtDuration(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}
function showToast(msg, duration=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}
function saveApiKey() {
  const v = document.getElementById('api-key-input').value.trim();
  if (!v) { showToast('API 키를 입력해주세요'); return; }
  API_KEY = v;
  localStorage.setItem('yt_api_key', v);
  showToast('✅ API 키가 저장되었습니다');
  loadPopularVideos();
}

/* ─────────────────────────────────────────────
   Navigation
───────────────────────────────────────────── */
function switchSection(id) {
  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.sidebar-nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('section-' + id)?.classList.add('active');
  document.querySelector(`[data-section="${id}"]`)?.classList.add('active');
}

/* ─────────────────────────────────────────────
   인기 동영상
───────────────────────────────────────────── */
async function loadPopularVideos() {
  if (!API_KEY) {
    document.getElementById('video-grid').innerHTML =
      `<div class="empty-state" style="grid-column:1/-1">
         <div class="empty-state-icon">🔑</div>
         YouTube API 키를 입력해주세요
       </div>`;
    return;
  }
  const grid = document.getElementById('video-grid');
  grid.innerHTML = '<div class="spinner" style="grid-column:1/-1"></div>';

  const region = document.getElementById('search-region').value;
  const cat    = document.getElementById('search-category').value;
  const url =
    `${YT_API}/videos?part=snippet,statistics,contentDetails`+
    `&chart=mostPopular&regionCode=${region}&videoCategoryId=${cat}`+
    `&maxResults=24&key=${API_KEY}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    renderVideoGrid(data.items, grid);
  } catch(e) {
    grid.innerHTML =
      `<div class="empty-state" style="grid-column:1/-1">
         <div class="empty-state-icon">⚠️</div>
         ${e.message}
       </div>`;
  }
}

async function searchVideos() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) { showToast('검색어를 입력해주세요'); return; }
  if (!API_KEY) { showToast('API 키를 먼저 입력해주세요'); return; }

  const grid = document.getElementById('video-grid');
  grid.innerHTML = '<div class="spinner" style="grid-column:1/-1"></div>';

  const region = document.getElementById('search-region').value;
  const searchUrl =
    `${YT_API}/search?part=snippet&type=video&q=${encodeURIComponent(q)}`+
    `&regionCode=${region}&maxResults=24&key=${API_KEY}`;
  try {
    const sRes  = await fetch(searchUrl);
    const sData = await sRes.json();
    if (sData.error) throw new Error(sData.error.message);
    const ids = sData.items.map(i => i.id.videoId).join(',');
    if (!ids) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">😅</div>결과가 없습니다</div>'; return; }

    const detUrl =
      `${YT_API}/videos?part=snippet,statistics,contentDetails&id=${ids}&key=${API_KEY}`;
    const dRes  = await fetch(detUrl);
    const dData = await dRes.json();
    renderVideoGrid(dData.items, grid);
  } catch(e) {
    grid.innerHTML =
      `<div class="empty-state" style="grid-column:1/-1">
         <div class="empty-state-icon">⚠️</div>
         ${e.message}
       </div>`;
  }
}

function renderVideoGrid(items, grid) {
  if (!items || items.length === 0) {
    grid.innerHTML =
      '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">😅</div>결과가 없습니다</div>';
    return;
  }
  grid.innerHTML = items.map(v => {
    const sn    = v.snippet;
    const stats = v.statistics || {};
    const thumb = sn.thumbnails?.medium?.url || sn.thumbnails?.default?.url || '';
    const dur   = fmtDuration(v.contentDetails?.duration || '');
    return `
      <div class="video-card" onclick="openVideoModal('${v.id}')">
        <div class="video-thumb">
          ${thumb
            ? `<img src="${thumb}" alt="" loading="lazy" />`
            : `<div class="video-thumb-placeholder">🎬</div>`}
          ${dur ? `<span class="video-duration">${dur}</span>` : ''}
        </div>
        <div class="video-info">
          <div class="video-title">${sn.title}</div>
          <div class="video-meta">
            <span>👁 ${fmt(stats.viewCount)}</span>
            <span>👍 ${fmt(stats.likeCount)}</span>
            <span>💬 ${fmt(stats.commentCount)}</span>
          </div>
          <div class="video-meta" style="margin-top:4px">
            <span>📅 ${fmtDate(sn.publishedAt)}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

/* ─────────────────────────────────────────────
   Video Modal
───────────────────────────────────────────── */
async function openVideoModal(videoId) {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  /* iframe 주입 (닫기버튼 보존) */
  const pw  = document.getElementById('player-wrap');
  const old = pw.querySelector('iframe');
  if (old) old.remove();

  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
  iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
  iframe.allowFullscreen = true;
  iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:0;';
  pw.insertBefore(iframe, document.getElementById('modal-close-btn'));

  /* 패널 초기화 */
  ['title','hashtag','desc'].forEach(p => {
    document.getElementById('modal-panel-' + p).innerHTML =
      '<div class="spinner" style="margin:16px auto;width:24px;height:24px;border-width:2px"></div>';
  });
  document.querySelectorAll('.modal-info-tab').forEach((t,i)=>t.classList.toggle('active', i===0));
  document.querySelectorAll('.modal-info-panel').forEach((p,i)=>p.classList.toggle('active', i===0));

  document.getElementById('modal-stats').innerHTML = '';
  document.getElementById('modal-body').innerHTML  = '';

  if (!API_KEY) return;
  try {
    const res  = await fetch(
      `${YT_API}/videos?part=snippet,statistics,contentDetails&id=${videoId}&key=${API_KEY}`
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const v     = data.items?.[0];
    if (!v) return;
    const sn    = v.snippet || {};
    const stats = v.statistics || {};
    const cd    = v.contentDetails || {};

    /* 제목 패널 */
    document.getElementById('modal-panel-title').innerHTML =
      `<p style="font-size:0.95rem;font-weight:600;color:var(--text-primary)">${sn.title || '-'}</p>
       <p style="font-size:0.78rem;color:var(--text-secondary);margin-top:4px">
         📺 ${sn.channelTitle || '-'} &nbsp;|&nbsp; 📅 ${fmtDate(sn.publishedAt)}
       </p>`;

    /* 해시태그 패널 */
    const tags = (sn.tags || []).slice(0, 30);
    document.getElementById('modal-panel-hashtag').innerHTML = tags.length
      ? tags.map(t =>
          `<span class="hashtag-chip" onclick="document.getElementById('search-input').value='${t}';switchSection('hot');searchVideos()">#${t}</span>`
        ).join('')
      : '<span style="color:var(--text-secondary);font-size:0.85rem">등록된 해시태그가 없습니다</span>';

    /* 설명 패널 */
    const descText = (sn.description || '설명 없음')
      .replace(/</g, '&lt;').replace(/\n/g, '<br>');
    document.getElementById('modal-panel-desc').innerHTML =
      `<div style="font-size:0.84rem;color:var(--text-secondary)">${descText}</div>`;

    /* 통계 카드 */
    const engRate = stats.viewCount > 0
      ? ((parseInt(stats.likeCount||0) + parseInt(stats.commentCount||0))
         / parseInt(stats.viewCount) * 100).toFixed(2)
      : '0.00';
    document.getElementById('modal-stats').innerHTML = [
      {icon:'👁',  value:fmt(stats.viewCount),    label:'조회수'},
      {icon:'👍',  value:fmt(stats.likeCount),     label:'좋아요'},
      {icon:'💬',  value:fmt(stats.commentCount),  label:'댓글'},
      {icon:'📈',  value:engRate+'%',              label:'참여율'},
      {icon:'⏱',  value:fmtDuration(cd.duration), label:'길이'},
      {icon:'📅',  value:fmtDate(sn.publishedAt),  label:'업로드일'},
    ].map(s =>
      `<div class="stat-card">
         <div class="stat-card-icon">${s.icon}</div>
         <div class="stat-card-value">${s.value}</div>
         <div class="stat-card-label">${s.label}</div>
       </div>`
    ).join('');

    /* modal-body: 카테고리/화질 정보 등 */
    document.getElementById('modal-body').innerHTML =
      `<div class="modal-section-title">추가 정보</div>
       <div style="font-size:0.84rem;color:var(--text-secondary);line-height:1.8">
         🗂 카테고리 ID: ${sn.categoryId || '-'}<br>
         🌐 언어: ${sn.defaultAudioLanguage || sn.defaultLanguage || '-'}<br>
         🔒 라이선스: ${cd.licensedContent ? '✅ 라이선스 있음' : '-'}<br>
         🎬 화질: ${cd.definition?.toUpperCase() || '-'}&nbsp;/&nbsp;${cd.projection || '-'}
       </div>`;
  } catch(e) {
    document.getElementById('modal-stats').innerHTML =
      `<div class="empty-state" style="grid-column:1/-1">⚠️ ${e.message}</div>`;
  }
}

function closeVideoModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  const pw = document.getElementById('player-wrap');
  const iframe = pw.querySelector('iframe');
  if (iframe) iframe.remove();
}

function switchInfoPanel(name) {
  document.querySelectorAll('.modal-info-tab').forEach(t =>

async function searchChannel() {
  const q = document.getElementById('channel-input').value.trim();
  if (!q) { showToast('채널 이름을 입력해주세요'); return; }
  if (!API_KEY) { showToast('API 키를 먼저 입력해주세요'); return; }

  const resultEl = document.getElementById('channel-result');
  resultEl.innerHTML = '<div class="spinner"></div>';

  try {
    const handle  = q.startsWith('@') ? q : '@' + q;
    const sRes    = await fetch(
      `${YT_API}/search?part=snippet&type=channel&q=${encodeURIComponent(q)}&maxResults=1&key=${API_KEY}`
    );
    const sData   = await sRes.json();
    if (sData.error) throw new Error(sData.error.message);
    const channelId = sData.items?.[0]?.id?.channelId;
    if (!channelId) throw new Error('채널을 찾을 수 없습니다');

    const cRes  = await fetch(
      `${YT_API}/channels?part=snippet,statistics,brandingSettings&id=${channelId}&key=${API_KEY}`
    );
    const cData = await cRes.json();
    const ch    = cData.items?.[0];
    if (!ch) throw new Error('채널 정보를 불러올 수 없습니다');

    const sn    = ch.snippet;
    const stats = ch.statistics;
    const avatar = sn.thumbnails?.high?.url || sn.thumbnails?.default?.url || '';

    resultEl.innerHTML = `
      <div class="channel-profile">
        ${avatar ? `<img class="channel-avatar" src="${avatar}" alt="" />` : ''}
        <div>
          <div class="channel-name">${sn.title}</div>
          <div class="channel-handle">${handle}</div>
          <div class="channel-desc">${sn.description || '설명 없음'}</div>
        </div>
      </div>
      <div class="channel-stats-grid">
        ${[
          {icon:'👥', value:fmt(stats.subscriberCount)+'명', label:'구독자'},
          {icon:'📹', value:fmt(stats.videoCount)+'개',       label:'동영상'},
          {icon:'👁', value:fmt(stats.viewCount),             label:'총 조회수'},
          {icon:'📅', value:fmtDate(sn.publishedAt),          label:'채널 개설일'},
        ].map(s =>
          `<div class="stat-card">
             <div class="stat-card-icon">${s.icon}</div>
             <div class="stat-card-value">${s.value}</div>
             <div class="stat-card-label">${s.label}</div>
           </div>`
        ).join('')}
      </div>
      <div class="modal-section-title">최근 동영상</div>
      <div class="channel-videos-grid" id="channel-videos">
        <div class="spinner"></div>
      </div>`;

    /* 최근 동영상 */
    const vRes  = await fetch(
      `${YT_API}/search?part=snippet&channelId=${channelId}&type=video&order=date&maxResults=12&key=${API_KEY}`
    );
    const vData = await vRes.json();
    const ids   = vData.items?.map(i => i.id.videoId).join(',') || '';
    if (ids) {
      const dRes  = await fetch(
        `${YT_API}/videos?part=snippet,statistics,contentDetails&id=${ids}&key=${API_KEY}`
      );
      const dData = await dRes.json();
      renderVideoGrid(dData.items, document.getElementById('channel-videos'));
    }
  } catch(e) {
    resultEl.innerHTML =
      `<div class="empty-state"><div class="empty-state-icon">⚠️</div>${e.message}</div>`;
  }
}

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
function calcRevenue() {
  const views   = parseInt(document.getElementById('calc-views').value)   || 0;
  const cpm     = parseInt(document.getElementById('calc-cpm').value)     || 0;
  const adRate  = parseInt(document.getElementById('calc-adrate').value)  || 0;
  const share   = parseInt(document.getElementById('calc-share').value)   || 0;

  document.getElementById('calc-cpm-val').textContent   = '₩' + cpm.toLocaleString();
  document.getElementById('calc-adrate-val').textContent = adRate;
  document.getElementById('calc-share-val').textContent  = share;

  const adViews   = views * (adRate / 100);
  const gross     = adViews / 1000 * cpm;
  const net       = gross  * (share / 100);
  const yearly    = net * 12;

  document.getElementById('rev-monthly').textContent = '₩' + Math.round(net).toLocaleString();
  document.getElementById('rev-yearly').textContent  = '연 환산: ₩' + Math.round(yearly).toLocaleString();
  document.getElementById('rev-detail').innerHTML    =
    `광고 노출 조회수: <b>${Math.round(adViews).toLocaleString()}</b>회<br>
     총 광고 수익 (gross): <b>₩${Math.round(gross).toLocaleString()}</b><br>
     유튜브 공제 후 (${share}%): <b>₩${Math.round(net).toLocaleString()}</b>`;
}
calcRevenue();

function generateIdeas() {
  const kw   = document.getElementById('idea-keyword').value.trim();
  const active = [...document.querySelectorAll('.idea-tag.active')].map(el => el.textContent);
  const pool = [...(IDEA_DB['기본'] || [])];
  active.forEach(g => { if (IDEA_DB[g]) pool.push(...IDEA_DB[g]); });
  if (kw) pool.unshift({
    title: `🔍 "${kw}" 특화 아이디어`,
    desc: `"${kw}"를 주제로 비교·랭킹·챌린지·시리즈 포맷 중 하나를 선택해 제목에 감정 자극 단어를 추가하세요.`,
    tags: [kw, '맞춤아이디어']
  });

  const shown = pool.slice(0, 8);
  document.getElementById('idea-results').innerHTML =
    shown.length === 0
      ? '<div class="empty-state"><div class="empty-state-icon">🤔</div>장르를 선택하거나 키워드를 입력해주세요</div>'
      : `<div class="idea-result-list">${shown.map(i =>
          `<div class="idea-item">
             <div class="idea-item-title">${i.title}</div>
             <div class="idea-item-desc">${i.desc}</div>
             <div class="idea-item-tags">${(i.tags||[]).map(t =>
               `<span class="idea-item-tag">#${t}</span>`).join('')}
             </div>
           </div>`
        ).join('')}</div>`;
}
