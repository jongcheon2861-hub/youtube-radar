<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Sphere Symbol</title>
<style>
:root{
  --void:#000000;
  --c1:#ff2020;      /* 레드 */
  --c2:#ff5500;      /* 레드오렌지 */
  --c3:#ff8800;      /* 오렌지 */
  --c4:#cc2200;      /* 다크레드 */
  --c5:#1a0000;      /* 거의블랙레드 */
  --c6:#331100;      /* 블랙오렌지 */
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:80px;
  overflow:hidden;
}

/* ── 별 배경 ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;border-radius:50%;
  animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;
}
@keyframes twinkle{
  0%{opacity:.03;transform:scale(1);}
  100%{opacity:.75;transform:scale(2);}
}

/* ════════════════════════════
   메인 씬
════════════════════════════ */
.scene{
  position:relative;z-index:1;
  width:420px;height:420px;
  display:flex;align-items:center;justify-content:center;
}

/* ════════════════════════════
   외부 방사
════════════════════════════ */
.outer-radiance{
  position:absolute;
  width:440px;height:440px;
  border-radius:50%;
  background:radial-gradient(circle,
    transparent 28%,
    rgba(255,32,32,.04)  38%,
    rgba(255,85,0,.07)   50%,
    rgba(204,34,0,.05)   62%,
    transparent 76%
  );
  animation:outerRad 5s ease-in-out infinite;
}
@keyframes outerRad{
  0%,100%{transform:scale(1);opacity:.6;}
  50%{transform:scale(1.1);opacity:1;}
}

/* ════════════════════════════
   구체 — 완전한 블랙
════════════════════════════ */
.sphere{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:140px;height:140px;
  border-radius:50%;
  z-index:20;
  background:
    radial-gradient(circle at 34% 28%,
      rgba(40,5,5,.5)    0%,
      rgba(15,2,2,.8)   22%,
      rgba(5,0,0,.95)   45%,
      #000              68%,
      #000              100%
    );
  box-shadow:
    0 0 0 1.5px rgba(255,32,32,.5),
    0 0 0 4px   rgba(255,32,32,.12),
    0 0 22px    rgba(255,32,32,.65),
    0 0 55px    rgba(204,34,0,.45),
    0 0 100px   rgba(100,10,0,.3),
    inset 0 0 28px rgba(180,20,0,.35),
    inset 0 0 55px rgba(80,5,0,.6);
  animation:spherePulse 3s ease-in-out infinite;
}
@keyframes spherePulse{
  0%,100%{
    box-shadow:
      0 0 0 1.5px rgba(255,32,32,.5),
      0 0 0 4px rgba(255,32,32,.12),
      0 0 22px rgba(255,32,32,.65),
      0 0 55px rgba(204,34,0,.45),
      0 0 100px rgba(100,10,0,.3),
      inset 0 0 28px rgba(180,20,0,.35),
      inset 0 0 55px rgba(80,5,0,.6);
  }
  50%{
    box-shadow:
      0 0 0 2px rgba(255,32,32,.75),
      0 0 0 7px rgba(255,32,32,.2),
      0 0 35px rgba(255,32,32,.9),
      0 0 80px rgba(204,34,0,.65),
      0 0 150px rgba(100,10,0,.45),
      inset 0 0 38px rgba(180,20,0,.55),
      inset 0 0 70px rgba(80,5,0,.75);
  }
}

/* 구체 하이라이트 */
.sphere-hl{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:140px;height:140px;
  border-radius:50%;z-index:21;
  background:radial-gradient(circle at 30% 25%,
    rgba(255,120,80,.14) 0%,
    rgba(255,60,20,.07)  25%,
    transparent          52%
  );
  pointer-events:none;
}

/* ════════════════════════════
   궤도 라인 6개
   간격: 14px
   r: 78 92 106 120 134 148
   색: c1 c2 c3 c4 c5 c6
════════════════════════════ */
.orbit-line{
  position:absolute;top:50%;left:50%;
  border-radius:50%;border-style:solid;
  animation:orbitSpin var(--os) linear infinite;
}
@keyframes orbitSpin{
  from{transform:translate(-50%,-50%) var(--tilt) rotate(0deg);}
  to{  transform:translate(-50%,-50%) var(--tilt) rotate(360deg);}
}

/* 1 — 레드 */
.ol1{
  width:156px;height:156px;
  border:1.5px solid rgba(255,32,32,.9);
  box-shadow:0 0 7px rgba(255,32,32,.75),0 0 16px rgba(255,32,32,.3);
  --os:4s;
  --tilt:rotateX(90deg);
}
/* 2 — 레드오렌지 */
.ol2{
  width:184px;height:184px;
  border:1.5px solid rgba(255,85,0,.88);
  box-shadow:0 0 7px rgba(255,85,0,.7),0 0 16px rgba(255,85,0,.28);
  --os:5.5s;
  --tilt:rotateX(75deg) rotateZ(30deg);
  animation-direction:reverse;
}
/* 3 — 오렌지 */
.ol3{
  width:212px;height:212px;
  border:1.5px solid rgba(255,136,0,.88);
  box-shadow:0 0 7px rgba(255,136,0,.7),0 0 16px rgba(255,136,0,.28);
  --os:7s;
  --tilt:rotateX(60deg) rotateZ(60deg);
}
/* 4 — 다크레드 */
.ol4{
  width:240px;height:240px;
  border:1.5px solid rgba(204,34,0,.85);
  box-shadow:0 0 7px rgba(204,34,0,.65),0 0 16px rgba(204,34,0,.25);
  --os:9s;
  --tilt:rotateX(80deg) rotateZ(100deg);
  animation-direction:reverse;
}
/* 5 — 블랙레드 */
.ol5{
  width:268px;height:268px;
  border:1.5px solid rgba(120,15,0,.9);
  box-shadow:0 0 5px rgba(120,15,0,.7),0 0 12px rgba(120,15,0,.3);
  --os:11s;
  --tilt:rotateX(70deg) rotateZ(130deg);
}
/* 6 — 블랙오렌지 */
.ol6{
  width:296px;height:296px;
  border:1.5px solid rgba(90,20,0,.88);
  box-shadow:0 0 5px rgba(90,20,0,.65),0 0 12px rgba(90,20,0,.25);
  --os:13.5s;
  --tilt:rotateX(85deg) rotateZ(160deg);
  animation-direction:reverse;
}

/* ════════════════════════════
   토성 링 (뒤 레이어) z:10
════════════════════════════ */
.ring-system{
  position:absolute;top:50%;left:50%;
  width:400px;height:400px;
  transform:translate(-50%,-50%);
  z-index:10;
}
.saturn-ring{
  position:absolute;border-radius:50%;border-style:solid;top:50%;left:50%;
  animation:ringSpin var(--rs) linear infinite;
}
@keyframes ringSpin{
  from{transform:translate(-50%,-50%) rotateX(72deg) rotate(0deg);}
  to{  transform:translate(-50%,-50%) rotateX(72deg) rotate(360deg);}
}
/* 링 1 — 레드 */
.sr1{
  width:156px;height:156px;
  border:1.8px solid rgba(255,32,32,.9);
  box-shadow:0 0 10px rgba(255,32,32,.75),0 0 24px rgba(255,32,32,.3);
  --rs:4s;
}
/* 링 2 — 레드오렌지 */
.sr2{
  width:184px;height:184px;
  border:1.8px solid rgba(255,85,0,.88);
  box-shadow:0 0 10px rgba(255,85,0,.7),0 0 22px rgba(255,85,0,.28);
  --rs:5.5s;animation-direction:reverse;
}
/* 링 3 — 오렌지 */
.sr3{
  width:212px;height:212px;
  border:1.8px solid rgba(255,136,0,.88);
  box-shadow:0 0 10px rgba(255,136,0,.7),0 0 22px rgba(255,136,0,.28);
  --rs:7s;
}
/* 링 4 — 다크레드 */
.sr4{
  width:240px;height:240px;
  border:1.8px solid rgba(204,34,0,.85);
  box-shadow:0 0 9px rgba(204,34,0,.65),0 0 20px rgba(204,34,0,.25);
  --rs:9s;animation-direction:reverse;
}
/* 링 5 — 블랙레드 */
.sr5{
  width:268px;height:268px;
  border:1.8px solid rgba(120,15,0,.88);
  box-shadow:0 0 7px rgba(120,15,0,.65),0 0 16px rgba(120,15,0,.25);
  --rs:11s;
}
/* 링 6 — 블랙오렌지 */
.sr6{
  width:296px;height:296px;
  border:1.8px solid rgba(90,20,0,.85);
  box-shadow:0 0 7px rgba(90,20,0,.6),0 0 16px rgba(90,20,0,.22);
  --rs:13.5s;animation-direction:reverse;
}

/* ════════════════════════════
   토성 링 전면 (구체 앞) z:25
   하단 절반만 렌더 → 입체감
════════════════════════════ */
.ring-front{
  position:absolute;top:50%;left:50%;
  width:400px;height:400px;
  transform:translate(-50%,-50%);
  z-index:25;pointer-events:none;
}
.saturn-ring-front{
  position:absolute;border-radius:50%;top:50%;left:50%;
  animation:ringFrontSpin var(--rfs) linear infinite;
}
@keyframes ringFrontSpin{
  from{transform:translate(-50%,-50%) rotateX(72deg) rotate(0deg);}
  to{  transform:translate(-50%,-50%) rotateX(72deg) rotate(360deg);}
}
.srf1{width:156px;height:156px;border-bottom:1.8px solid rgba(255,32,32,.9);border-left:1.8px solid rgba(255,32,32,.55);border-right:1.8px solid rgba(255,32,32,.55);border-top:1.8px solid transparent;box-shadow:0 0 8px rgba(255,32,32,.55);--rfs:4s;}
.srf2{width:184px;height:184px;border-bottom:1.8px solid rgba(255,85,0,.88);border-left:1.8px solid rgba(255,85,0,.5);border-right:1.8px solid rgba(255,85,0,.5);border-top:1.8px solid transparent;box-shadow:0 0 8px rgba(255,85,0,.5);--rfs:5.5s;animation-direction:reverse;}
.srf3{width:212px;height:212px;border-bottom:1.8px solid rgba(255,136,0,.88);border-left:1.8px solid rgba(255,136,0,.5);border-right:1.8px solid rgba(255,136,0,.5);border-top:1.8px solid transparent;box-shadow:0 0 8px rgba(255,136,0,.5);--rfs:7s;}
.srf4{width:240px;height:240px;border-bottom:1.8px solid rgba(204,34,0,.85);border-left:1.8px solid rgba(204,34,0,.45);border-right:1.8px solid rgba(204,34,0,.45);border-top:1.8px solid transparent;box-shadow:0 0 7px rgba(204,34,0,.45);--rfs:9s;animation-direction:reverse;}
.srf5{width:268px;height:268px;border-bottom:1.8px solid rgba(120,15,0,.88);border-left:1.8px solid rgba(120,15,0,.42);border-right:1.8px solid rgba(120,15,0,.42);border-top:1.8px solid transparent;box-shadow:0 0 6px rgba(120,15,0,.42);--rfs:11s;}
.srf6{width:296px;height:296px;border-bottom:1.8px solid rgba(90,20,0,.85);border-left:1.8px solid rgba(90,20,0,.38);border-right:1.8px solid rgba(90,20,0,.38);border-top:1.8px solid transparent;box-shadow:0 0 6px rgba(90,20,0,.38);--rfs:13.5s;animation-direction:reverse;}

/* ════════════════════════════
   미니 버전
════════════════════════════ */
.mini-scene{
  position:relative;z-index:1;
  width:180px;height:180px;
  display:flex;align-items:center;justify-content:center;
}
.mini-sphere{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:52px;height:52px;border-radius:50%;z-index:20;
  background:radial-gradient(circle at 34% 28%,rgba(40,5,5,.5) 0%,rgba(15,2,2,.8) 22%,#000 55%,#000 100%);
  box-shadow:0 0 0 1.5px rgba(255,32,32,.5),0 0 14px rgba(255,32,32,.7),0 0 32px rgba(204,34,0,.45),inset 0 0 14px rgba(180,20,0,.35);
  animation:spherePulse 3s ease-in-out infinite;
}
.mini-sphere-hl{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:52px;height:52px;border-radius:50%;z-index:21;
  background:radial-gradient(circle at 30% 25%,rgba(255,120,80,.14) 0%,transparent 50%);
  pointer-events:none;
}

/* 미니 궤도 라인 */
.mini-ol{
  position:absolute;top:50%;left:50%;
  border-radius:50%;border-style:solid;
  animation:orbitSpin var(--os) linear infinite;
}
.mol1{width:58px;height:58px;border:1px solid rgba(255,32,32,.9);box-shadow:0 0 5px rgba(255,32,32,.7);--os:4s;--tilt:rotateX(90deg);}
.mol2{width:68px;height:68px;border:1px solid rgba(255,85,0,.88);box-shadow:0 0 5px rgba(255,85,0,.65);--os:5.5s;--tilt:rotateX(75deg) rotateZ(30deg);animation-direction:reverse;}
.mol3{width:78px;height:78px;border:1px solid rgba(255,136,0,.88);box-shadow:0 0 5px rgba(255,136,0,.65);--os:7s;--tilt:rotateX(60deg) rotateZ(60deg);}
.mol4{width:88px;height:88px;border:1px solid rgba(204,34,0,.85);box-shadow:0 0 5px rgba(204,34,0,.6);--os:9s;--tilt:rotateX(80deg) rotateZ(100deg);animation-direction:reverse;}
.mol5{width:98px;height:98px;border:1px solid rgba(120,15,0,.88);box-shadow:0 0 4px rgba(120,15,0,.6);--os:11s;--tilt:rotateX(70deg) rotateZ(130deg);}
.mol6{width:108px;height:108px;border:1px solid rgba(90,20,0,.85);box-shadow:0 0 4px rgba(90,20,0,.55);--os:13.5s;--tilt:rotateX(85deg) rotateZ(160deg);animation-direction:reverse;}

/* 미니 토성링 뒤 */
.mini-sr{
  position:absolute;top:50%;left:50%;
  border-radius:50%;border-style:solid;
  animation:ringSpin var(--rs) linear infinite;
}
.msr1{width:58px;height:58px;border:1px solid rgba(255,32,32,.9);box-shadow:0 0 6px rgba(255,32,32,.7);--rs:4s;}
.msr2{width:68px;height:68px;border:1px solid rgba(255,85,0,.88);box-shadow:0 0 6px rgba(255,85,0,.65);--rs:5.5s;animation-direction:reverse;}
.msr3{width:78px;height:78px;border:1px solid rgba(255,136,0,.88);box-shadow:0 0 6px rgba(255,136,0,.65);--rs:7s;}
.msr4{width:88px;height:88px;border:1px solid rgba(204,34,0,.85);box-shadow:0 0 5px rgba(204,34,0,.6);--rs:9s;animation-direction:reverse;}
.msr5{width:98px;height:98px;border:1px solid rgba(120,15,0,.88);box-shadow:0 0 5px rgba(120,15,0,.6);--rs:11s;}
.msr6{width:108px;height:108px;border:1px solid rgba(90,20,0,.85);box-shadow:0 0 4px rgba(90,20,0,.55);--rs:13.5s;animation-direction:reverse;}

/* 미니 토성링 앞 */
.mini-ring-front{
  position:absolute;top:50%;left:50%;
  width:180px;height:180px;
  transform:translate(-50%,-50%);
  z-index:25;pointer-events:none;
}
.mini-srf{
  position:absolute;top:50%;left:50%;
  border-radius:50%;
  animation:ringFrontSpin var(--rfs) linear infinite;
}
.msrf1{width:58px;height:58px;border-bottom:1px solid rgba(255,32,32,.9);border-left:1px solid rgba(255,32,32,.45);border-right:1px solid rgba(255,32,32,.45);border-top:1px solid transparent;--rfs:4s;}
.msrf2{width:68px;height:68px;border-bottom:1px solid rgba(255,85,0,.88);border-left:1px solid rgba(255,85,0,.42);border-right:1px solid rgba(255,85,0,.42);border-top:1px solid transparent;--rfs:5.5s;animation-direction:reverse;}
.msrf3{width:78px;height:78px;border-bottom:1px solid rgba(255,136,0,.88);border-left:1px solid rgba(255,136,0,.42);border-right:1px solid rgba(255,136,0,.42);border-top:1px solid transparent;--rfs:7s;}
.msrf4{width:88px;height:88px;border-bottom:1px solid rgba(204,34,0,.85);border-left:1px solid rgba(204,34,0,.38);border-right:1px solid rgba(204,34,0,.38);border-top:1px solid transparent;--rfs:9s;animation-direction:reverse;}
.msrf5{width:98px;height:98px;border-bottom:1px solid rgba(120,15,0,.88);border-left:1px solid rgba(120,15,0,.35);border-right:1px solid rgba(120,15,0,.35);border-top:1px solid transparent;--rfs:11s;}
.msrf6{width:108px;height:108px;border-bottom:1px solid rgba(90,20,0,.85);border-left:1px solid rgba(90,20,0,.32);border-right:1px solid rgba(90,20,0,.32);border-top:1px solid transparent;--rfs:13.5s;animation-direction:reverse;}
</style>
</head>
<body>
<div class="bg"></div>
<script>
const bg=document.querySelector('.bg');
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*1.8+.3;
  const c=['#ff2020','#ff5500','#ff8800','#cc2200','#ff6030','#ffffff','#ffaa60'];
  s.style.cssText=`width:${sz}px;height:${sz}px;background:${c[Math.floor(Math.random()*c.length)]};left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*4}s;--delay:${Math.random()*6}s;`;
  bg.appendChild(s);
}
</script>

<!-- ══ 메인 ══ -->
<div class="scene">

  <div class="outer-radiance"></div>

  <!-- 토성링 뒤 -->
  <div class="ring-system">
    <div class="saturn-ring sr1"></div>
    <div class="saturn-ring sr2"></div>
    <div class="saturn-ring sr3"></div>
    <div class="saturn-ring sr4"></div>
    <div class="saturn-ring sr5"></div>
    <div class="saturn-ring sr6"></div>
  </div>

  <!-- 궤도라인 -->
  <div class="orbit-line ol1" style="z-index:15;"></div>
  <div class="orbit-line ol2" style="z-index:15;"></div>
  <div class="orbit-line ol3" style="z-index:15;"></div>
  <div class="orbit-line ol4" style="z-index:15;"></div>
  <div class="orbit-line ol5" style="z-index:15;"></div>
  <div class="orbit-line ol6" style="z-index:15;"></div>

  <!-- 구체 -->
  <div class="sphere"></div>
  <div class="sphere-hl"></div>

  <!-- 토성링 앞 -->
  <div class="ring-front">
    <div class="saturn-ring-front srf1"></div>
    <div class="saturn-ring-front srf2"></div>
    <div class="saturn-ring-front srf3"></div>
    <div class="saturn-ring-front srf4"></div>
    <div class="saturn-ring-front srf5"></div>
    <div class="saturn-ring-front srf6"></div>
  </div>

</div>

<!-- ══ 미니 ══ -->
<div class="mini-scene">

  <div style="position:absolute;top:50%;left:50%;width:180px;height:180px;transform:translate(-50%,-50%);z-index:10;">
    <div class="mini-sr msr1"></div>
    <div class="mini-sr msr2"></div>
    <div class="mini-sr msr3"></div>
    <div class="mini-sr msr4"></div>
    <div class="mini-sr msr5"></div>
    <div class="mini-sr msr6"></div>
  </div>

  <div class="mini-ol mol1" style="z-index:15;"></div>
  <div class="mini-ol mol2" style="z-index:15;"></div>
  <div class="mini-ol mol3" style="z-index:15;"></div>
  <div class="mini-ol mol4" style="z-index:15;"></div>
  <div class="mini-ol mol5" style="z-index:15;"></div>
  <div class="mini-ol mol6" style="z-index:15;"></div>

  <div class="mini-sphere"></div>
  <div class="mini-sphere-hl"></div>

  <div class="mini-ring-front">
    <div class="mini-srf msrf1"></div>
    <div class="mini-srf msrf2"></div>
    <div class="mini-srf msrf3"></div>
    <div class="mini-srf msrf4"></div>
    <div class="mini-srf msrf5"></div>
    <div class="mini-srf msrf6"></div>
  </div>

</div>

</body>
</html>
