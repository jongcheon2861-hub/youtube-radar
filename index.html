<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ALGO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet"/>

<script>
function buildFavicon(outputSize){
  const SCALE = 8;
  const big   = outputSize * SCALE;

  const bigC   = document.createElement('canvas');
  bigC.width   = big; bigC.height = big;
  const ctx    = bigC.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  /* 배경 – 딥 퍼플 */
  const bgBase = ctx.createRadialGradient(big/2,big/2,0, big/2,big/2, big*0.85);
  bgBase.addColorStop(0,   '#1a0a2e');
  bgBase.addColorStop(0.5, '#0e0520');
  bgBase.addColorStop(1,   '#080012');
  ctx.fillStyle = bgBase;
  ctx.fillRect(0, 0, big, big);

  /* 배경 글로우 */
  const bgG = ctx.createRadialGradient(big/2,big/2,0, big/2,big/2, big*0.7);
  bgG.addColorStop(0,   'rgba(124,58,237,0.30)');
  bgG.addColorStop(0.5, 'rgba(240,201,106,0.12)');
  bgG.addColorStop(1,   'transparent');
  ctx.fillStyle = bgG;
  ctx.fillRect(0, 0, big, big);

  const letters = [
    { ch:'A', g:['#ffe49a','#f0c96a','#ff8c00','#ff2020'], glow:'#f0c96a' },
    { ch:'L', g:['#f5c6d0','#e879a0','#a855f7','#7c3aed'], glow:'#e879a0' },
    { ch:'G', g:['#ffe49a','#f0c96a','#ff8c00','#ff2020'], glow:'#f0c96a' },
    { ch:'O', g:['#f5c6d0','#e879a0','#a855f7','#7c3aed'], glow:'#e879a0' },
  ];

  const padX = big * 0.05;
  const maxW = big - padX * 2;

  let lo = 1, hi = big, fs = hi / 2;
  for(let iter = 0; iter < 32; iter++){
    ctx.font = `900 ${fs}px Cinzel, serif`;
    const tw = letters.reduce((a,l) => a + ctx.measureText(l.ch).width, 0);
    if(tw > maxW) hi = fs; else lo = fs;
    fs = (lo + hi) / 2;
  }
  ctx.font = `900 ${fs}px Cinzel, serif`;
  ctx.textBaseline = 'middle';

  const totalW = letters.reduce((a,l) => a + ctx.measureText(l.ch).width, 0);
  let curX = (big - totalW) / 2;
  const textY = big / 2;

  letters.forEach(({ ch, g, glow }) => {
    const w = ctx.measureText(ch).width;
    ctx.shadowColor = glow;
    ctx.shadowBlur  = big * 0.14;
    const tG = ctx.createLinearGradient(curX, textY - fs*0.5, curX + w, textY + fs*0.5);
    tG.addColorStop(0,    g[0]);
    tG.addColorStop(0.35, g[1]);
    tG.addColorStop(0.7,  g[2]);
    tG.addColorStop(1,    g[3]);
    ctx.fillStyle = tG;
    ctx.fillText(ch, curX, textY);
    curX += w;
  });

  const outC   = document.createElement('canvas');
  outC.width   = outputSize; outC.height = outputSize;
  const outCtx = outC.getContext('2d');
  outCtx.imageSmoothingEnabled = true;
  outCtx.imageSmoothingQuality = 'high';
  outCtx.drawImage(bigC, 0, 0, outputSize, outputSize);
  return outC;
}

window.addEventListener('DOMContentLoaded', () => {
  document.fonts.ready.then(() => {
    [16, 32, 64, 256].forEach(sz => {
      const canvas = buildFavicon(sz);
      const link   = document.createElement('link');
      link.rel     = 'icon';
      link.type    = 'image/png';
      link.sizes   = `${sz}x${sz}`;
      link.href    = canvas.toDataURL('image/png');
      document.head.appendChild(link);
    });
    renderPreviews();
  });
});

function renderPreviews(){
  const sizes        = [16, 32, 64, 128, 256];
  const displaySizes = [80, 112, 144, 176, 220];
  const container    = document.getElementById('faviconSizes');
  if(!container) return;
  container.innerHTML = '';
  sizes.forEach((sz, i) => {
    const canvas = buildFavicon(sz);
    const wrap   = document.createElement('div');
    wrap.className = 'fav-item';
    const cw = document.createElement('div');
    cw.className = 'fav-canvas-wrap';
    cw.style.cssText = `
      width:${displaySizes[i]}px;
      height:${displaySizes[i]}px;
      border-radius:${8 + i*3}px;
    `;
    canvas.style.cssText = `
      width:${displaySizes[i]}px;
      height:${displaySizes[i]}px;
      display:block;
      image-rendering:auto;
    `;
    cw.appendChild(canvas);
    const lbl = document.createElement('div');
    lbl.className   = 'fav-size-label';
    lbl.textContent = `${sz}×${sz}`;
    wrap.appendChild(cw);
    wrap.appendChild(lbl);
    container.appendChild(wrap);
  });
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --purple:#7c3aed;
  --violet:#a855f7;
  --gold:#f0c96a;
  --gold-l:#ffe49a;
  --rose:#f5c6d0;
  --orange:#ff8c00;
  --red:#ff2020;

  /* 배경 퍼플 팔레트 */
  --bg-core:   #1e0b38;
  --bg-mid:    #130524;
  --bg-edge:   #0a0016;
}

body{
  background: radial-gradient(ellipse at 50% 40%,
    var(--bg-core) 0%,
    var(--bg-mid)  45%,
    var(--bg-edge) 100%
  );
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:'Cinzel',serif;
  gap:56px;
}

/* ── 별 배경 ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate var(--delay,0s);
}
@keyframes twinkle{
  from{opacity:.12;transform:scale(1);}
  to{opacity:.95;transform:scale(1.6);}
}

/* ══ 메인 로고 ══ */
.logo-wrap{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
}

.algo-text{
  display:flex;align-items:center;justify-content:center;gap:0;
}

.algo-text span{
  display:inline-block;
  font-family:'Cinzel',serif;font-weight:900;
  font-size:140px;line-height:1;letter-spacing:-2px;
  animation:letterFloat var(--lf,6s) ease-in-out infinite alternate var(--ld,0s);
}

.l-a{
  background:linear-gradient(160deg,#ffe49a 0%,#f0c96a 40%,#ff8c00 80%,#ff2020 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px #f0c96a99) drop-shadow(0 0 40px #ff8c0055);
  --lf:5.8s;--ld:0s;
}
.l-l{
  background:linear-gradient(160deg,#f5c6d0 0%,#e879a0 40%,#a855f7 80%,#7c3aed 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px #e879a099) drop-shadow(0 0 40px #a855f755);
  --lf:6.2s;--ld:.4s;
}
.l-g{
  background:linear-gradient(160deg,#ffe49a 0%,#f0c96a 40%,#ff8c00 80%,#ff2020 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px #f0c96a99) drop-shadow(0 0 40px #ff8c0055);
  --lf:5.5s;--ld:.8s;
}
.l-o{
  background:linear-gradient(160deg,#f5c6d0 0%,#e879a0 40%,#a855f7 80%,#7c3aed 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px #e879a099) drop-shadow(0 0 40px #a855f755);
  --lf:6.5s;--ld:1.2s;
}

@keyframes letterFloat{
  0%{transform:translateY(0) scale(1);}
  100%{transform:translateY(-6px) scale(1.03);}
}

/* ── 데코 라인 ── */
.deco-line{
  position:relative;width:520px;height:2px;margin-top:8px;
  background:linear-gradient(90deg,
    transparent 0%,#7c3aed 15%,#f0c96a 35%,
    #f5c6d0 50%,#f0c96a 65%,#a855f7 85%,transparent 100%);
  animation:linePulse 4s ease-in-out infinite alternate;
}
.deco-line::before,.deco-line::after{
  content:'';position:absolute;top:50%;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;
  background:#f0c96a;box-shadow:0 0 8px 3px #f0c96a;
}
.deco-line::before{left:0;}
.deco-line::after{right:0;}

.deco-diamond{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  width:8px;height:8px;
  background:linear-gradient(135deg,#ffe49a,#f5c6d0);
  box-shadow:0 0 10px 4px #f0c96a99;
  animation:diamondPulse 3s ease-in-out infinite alternate;
}

@keyframes linePulse{
  0%{opacity:.6;filter:brightness(.9);}
  100%{opacity:1;filter:brightness(1.3);}
}
@keyframes diamondPulse{
  0%{transform:translate(-50%,-50%) rotate(45deg) scale(1);}
  100%{transform:translate(-50%,-50%) rotate(45deg) scale(1.5);}
}

/* ── 배경 글로우 ── */
.bg-glow{
  position:absolute;width:700px;height:300px;border-radius:50%;
  background:radial-gradient(ellipse,
    rgba(124,58,237,0.18) 0%,
    rgba(240,201,106,0.08) 40%,
    transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:bgGlow 6s ease-in-out infinite alternate;
  pointer-events:none;z-index:-1;
}
@keyframes bgGlow{
  0%{opacity:.5;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}
}

/* ── 파티클 ── */
.particles{
  position:absolute;width:600px;height:300px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:-1;
}
.pt{
  position:absolute;border-radius:50%;
  animation:ptFloat var(--pd,8s) ease-in-out infinite alternate var(--pdd,0s);
}
@keyframes ptFloat{
  0%{transform:translateY(0) translateX(0);opacity:.4;}
  50%{opacity:.9;}
  100%{transform:translateY(var(--py,-20px)) translateX(var(--px,10px));opacity:.3;}
}

/* ══ 파비콘 미리보기 ══ */
.favicon-preview{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.favicon-label{
  font-family:'Cinzel',serif;font-size:11px;font-weight:600;
  letter-spacing:4px;text-transform:uppercase;
  color:#f0c96a;opacity:.7;
}
.favicon-sizes{
  display:flex;align-items:flex-end;gap:24px;flex-wrap:wrap;justify-content:center;
}
.fav-item{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.fav-canvas-wrap{
  overflow:hidden;
  animation:favGlow 3s ease-in-out infinite alternate;
}
@keyframes favGlow{
  0%{box-shadow:0 0 0 1px #f0c96a33,0 0 12px #a855f722;}
  100%{box-shadow:0 0 0 1px #f0c96a99,0 0 28px #a855f766;}
}
.fav-size-label{
  font-family:'Cinzel',serif;font-size:10px;
  color:#a855f7;letter-spacing:2px;opacity:.8;
}

/* ── 구분선 ── */
.divider{
  width:420px;height:1px;
  background:linear-gradient(90deg,
    transparent,
    rgba(124,58,237,0.5),
    rgba(240,201,106,0.4),
    rgba(168,85,247,0.5),
    transparent);
  position:relative;z-index:10;
}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<!-- 메인 로고 -->
<div class="logo-wrap">
  <div class="bg-glow"></div>
  <div class="particles" id="particles"></div>

  <div class="algo-text">
    <span class="l-a">A</span>
    <span class="l-l">L</span>
    <span class="l-g">G</span>
    <span class="l-o">O</span>
  </div>

  <div class="deco-line">
    <div class="deco-diamond"></div>
  </div>
</div>

<div class="divider"></div>

<!-- 파비콘 미리보기 -->
<div class="favicon-preview">
  <div class="favicon-label">Favicon Preview</div>
  <div class="favicon-sizes" id="faviconSizes"></div>
</div>

<script>
/* 별 배경 */
const bg = document.getElementById('bg');
const sc = ['#f0c96a','#a855f7','#f5c6d0','#ff8c00','#ff2020','#ffe49a','#e879a0','#c4b5fd','#ddd6fe'];
for(let i=0;i<90;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=(Math.random()*1.8+0.3).toFixed(2);
  s.style.cssText=`
    width:${sz}px;height:${sz}px;
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    background:${sc[Math.floor(Math.random()*sc.length)]};
    box-shadow:0 0 ${sz*2}px ${sc[Math.floor(Math.random()*sc.length)]};
    --d:${(Math.random()*4+1.5).toFixed(2)}s;
    --delay:-${(Math.random()*5).toFixed(2)}s;
  `;
  bg.appendChild(s);
}

/* 파티클 */
const pc = document.getElementById('particles');
const pcColors=['#f0c96a','#a855f7','#f5c6d0','#ff8c00','#e879a0','#c4b5fd'];
for(let i=0;i<18;i++){
  const p=document.createElement('div');
  p.className='pt';
  const sz=(Math.random()*3+1).toFixed(2);
  p.style.cssText=`
    width:${sz}px;height:${sz}px;
    left:${Math.random()*600}px;top:${Math.random()*300}px;
    background:${pcColors[Math.floor(Math.random()*pcColors.length)]};
    box-shadow:0 0 ${sz*2}px ${pcColors[Math.floor(Math.random()*pcColors.length)]};
    --pd:${(Math.random()*6+5).toFixed(2)}s;
    --pdd:-${(Math.random()*5).toFixed(2)}s;
    --py:${(-(Math.random()*40+10)).toFixed(0)}px;
    --px:${((Math.random()*30-15)).toFixed(0)}px;
  `;
  pc.appendChild(p);
}
</script>
</body>
</html>
