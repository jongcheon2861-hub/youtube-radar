<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>🔥 떡상레이더 - 유튜브 급상승 영상</title>
    <meta name="description" content="지금 유튜브에서 가장 빠르게 떡상하고 있는 영상을 실시간으로 확인하세요">
    <meta property="og:title" content="🔥 떡상레이더">
    <meta property="og:description" content="유튜브 급상승 영상 실시간 분석">
    <meta name="theme-color" content="#ff0000">

    <!-- 애드센스 -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4409875039737384" crossorigin="anonymous"></script>

    <style>
        :root {
            --red: #ff0000;
            --red-dark: #cc0000;
            --bg: #0a0a0a;
            --card: #141414;
            --card2: #1c1c1c;
            --border: #2a2a2a;
            --text: #ffffff;
            --text2: #aaaaaa;
            --text3: #555555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html { scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* ── 헤더 ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 700px;
            margin: 0 auto;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--red);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text span { color: var(--red); }

        .live-dot {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            color: var(--red);
            background: rgba(255,0,0,0.1);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,0,0,0.3);
        }

        .live-dot::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--red);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .refresh-btn {
            width: 36px;
            height: 36px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text2);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .refresh-btn:active { transform: scale(0.9); background: var(--red); color: white; }
        .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 상단 광고 ── */
        .ad-top {
            max-width: 700px;
            margin: 0 auto;
            padding: 8px 16px;
        }

        .ad-label {
            font-size: 10px;
            color: var(--text3);
            text-align: center;
            margin-bottom: 3px;
        }

        /* ── 카테고리 탭 ── */
        .category-wrap {
            position: sticky;
            top: 65px;
            z-index: 100;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .category-scroll {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            gap: 6px;
            padding: 10px 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .category-scroll::-webkit-scrollbar { display: none; }

        .cat-btn {
            flex-shrink: 0;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .cat-btn.active {
            background: var(--red);
            border-color: var(--red);
            color: white;
            font-weight: 700;
        }

        .cat-btn:active { transform: scale(0.95); }

        /* ── 정렬 바 ── */
        .sort-bar {
            max-width: 700px;
            margin: 0 auto;
            padding: 12px 16px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .result-info {
            font-size: 13px;
            color: var(--text3);
        }

        .result-info strong {
            color: var(--text2);
        }

        .sort-tabs {
            display: flex;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .sort-tab {
            background: none;
            border: none;
            color: var(--text3);
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sort-tab.active {
            background: var(--red);
            color: white;
            font-weight: 700;
        }

        /* ── 영상 리스트 ── */
        .video-list {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── 영상 카드 ── */
        .video-card {
            display: flex;
            gap: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.25s;
            padding: 10px;
            position: relative;
        }

        .video-card:active {
            transform: scale(0.98);
            border-color: var(--red);
        }

        .video-card.hot {
            border-color: rgba(255,0,0,0.4);
            background: linear-gradient(135deg, #141414 0%, #1a0a0a 100%);
        }

        /* 썸네일 */
        .thumb-wrap {
            position: relative;
            flex-shrink: 0;
            width: 130px;
            height: 84px;
            border-radius: 10px;
            overflow: hidden;
            background: var(--card2);
        }

        @media (max-width: 400px) {
            .thumb-wrap { width: 110px; height: 72px; }
        }

        .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .rank-num {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0,0,0,0.85);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 5px;
            line-height: 1.2;
        }

        .rank-num.top { background: var(--red); }

        .hot-tag {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--red);
            color: white;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 5px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        /* 정보 영역 */
        .video-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 6px;
        }

        .video-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.35;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .channel {
            font-size: 12px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stats-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stat {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .stat.v { color: #ffffff; font-weight: 600; }
        .stat.l { color: #ff6b6b; }
        .stat.t { color: var(--text3); }

        /* 속도바 */
        .speed-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speed-bar-bg {
            flex: 1;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .speed-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1s ease;
        }

        .speed-val {
            font-size: 10px;
            color: var(--text3);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── 인라인 광고 ── */
        .ad-inline {
            max-width: 700px;
            margin: 0 auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px;
            text-align: center;
        }

        /* ── 로딩 ── */
        .loading-wrap {
            max-width: 700px;
            margin: 0 auto;
            padding: 60px 16px;
            text-align: center;
        }

        .loader {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-text {
            color: var(--text2);
            font-size: 15px;
            font-weight: 500;
        }

        .loading-sub {
            color: var(--text3);
            font-size: 13px;
            margin-top: 6px;
        }

        /* 스켈레톤 */
        .skeleton-card {
            display: flex;
            gap: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px;
        }

        .skeleton-thumb {
            width: 130px;
            height: 84px;
            border-radius: 10px;
            background: var(--card2);
            flex-shrink: 0;
            animation: shimmer 1.5s infinite;
        }

        .skeleton-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }

        .skeleton-line {
            height: 12px;
            background: var(--card2);
            border-radius: 6px;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── 에러 ── */
        .error-wrap {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 16px;
            text-align: center;
        }

        .error-box {
            background: var(--card);
            border: 1px solid rgba(255,0,0,0.3);
            border-radius: 16px;
            padding: 28px 20px;
        }

        .error-icon { font-size: 40px; margin-bottom: 12px; }
        .error-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .error-msg { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }

        .retry-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .retry-btn:active { transform: scale(0.95); background: var(--red-dark); }

        /* ── 업데이트 시간 ── */
        .update-bar {
            max-width: 700px;
            margin: 16px auto 0;
            padding: 0 16px;
            text-align: center;
            font-size: 11px;
            color: var(--text3);
        }

        /* ── 푸터 ── */
        footer {
            max-width: 700px;
            margin: 20px auto 0;
            padding: 20px 16px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        footer p {
            font-size: 12px;
            color: var(--text3);
            line-height: 2;
        }

        footer a { color: var(--text2); text-decoration: none; }
        footer a:hover { color: var(--red); }

        /* ── 모바일 하단 앵커 광고 ── */
        .ad-bottom-anchor {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,10,0.97);
            border-top: 1px solid var(--border);
            padding: 6px;
            text-align: center;
            z-index: 300;
        }

        /* ── 빈 상태 ── */
        .empty-wrap {
            padding: 60px 16px;
            text-align: center;
            color: var(--text3);
        }

        .empty-wrap .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-wrap p { font-size: 14px; }

        /* ── 배지 ── */
        .cat-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            margin-left: auto;
            flex-shrink: 0;
        }

        /* 반응형 */
        @media (min-width: 600px) {
            .thumb-wrap { width: 160px; height: 100px; }
            .video-title { font-size: 15px; }
            .ad-bottom-anchor { display: none; }
            body { padding-bottom: 20px; }
        }
    </style>
</head>
<body>

    <span class="result-info" id="resultInfo">불러오는 중...</span>

        <button class="sort-tab active" data-sort="viewCount" onclick="selectSort(this)">👁 조회수</button>
        <button class="sort-tab" data-sort="velocity" onclick="selectSort(this)">⚡ 급상승</button>

<script>
// =====================
// 설정
// =====================
const API_KEY   = 'AIzaSyCySRGVUW8FVz7m3ALEnr_KQvJqEcFIR5Y';
const REGION    = 'KR';
const MAX_RES   = 30;

// =====================
// 상태
// =====================
let videos      = [];
let currentCat  = '0';
let currentSort = 'viewCount';
let isLoading   = false;

// =====================
// 유틸
// =====================
const fmt = n => {
    n = parseInt(n) || 0;
    if (n >= 100000000) return (n/100000000).toFixed(1) + '억';
    if (n >= 10000)     return (n/10000).toFixed(1) + '만';
    if (n >= 1000)      return (n/1000).toFixed(1) + 'K';
    return n.toLocaleString();
};

const ago = d => {
    const s = (Date.now() - new Date(d)) / 1000;
    if (s < 3600)   return Math.floor(s/60) + '분 전';
    if (s < 86400)  return Math.floor(s/3600) + '시간 전';
    if (s < 604800) return Math.floor(s/86400) + '일 전';
    return Math.floor(s/604800) + '주 전';
};

const velocity = v => {
    const views = parseInt(v.statistics?.viewCount) || 0;
    const hrs   = Math.max(1, (Date.now() - new Date(v.snippet.publishedAt)) / 3600000);
    return Math.round(views / hrs);
};

const catColor = id => ({
    '10':'#ff6b9d','20':'#00e676','22':'#64b5f6',
    '23':'#ffd54f','24':'#ff8a65','25':'#ef5350',
    '17':'#66bb6a','28':'#7c4dff','26':'#ff4081'
})[id] || '#ff0000';

const catName = id => ({
    '10':'🎵 음악','20':'🎮 게임','22':'👥 브이로그',
    '23':'😂 코미디','24':'🎬 엔터','25':'📰 뉴스',
    '17':'⚽ 스포츠','28':'🔬 과학','26':'💄 스타일',
    '1':'🎬 영화','2':'🚗 자동차','15':'🐾 동물','27':'📚 교육'
})[id] || '📹 기타';

// =====================
// API
// =====================
async function fetchVideos(catId) {
    const p = new URLSearchParams({
        part: 'snippet,statistics',
        chart: 'mostPopular',
        regionCode: REGION,
        maxResults: MAX_RES,
        hl: 'ko',
        key: API_KEY
    });
    if (catId !== '0') p.append('videoCategoryId', catId);
    const r = await fetch(`https://www.googleapis.com/youtube/v3/videos?${p}`);
    if (!r.ok) throw new Error(`오류 ${r.status}: API 호출 실패`);
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return d.items || [];
}

// =====================
// 정렬
// =====================
function sorted(list, type) {
    return [...list].sort((a, b) => {
        if (type === 'viewCount') return (parseInt(b.statistics?.viewCount)||0) - (parseInt(a.statistics?.viewCount)||0);
        if (type === 'velocity')  return velocity(b) - velocity(a);
        if (type === 'date')      return new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt);
        return 0;
    });
}

// =====================
// 스켈레톤 렌더
// =====================
function renderSkeleton() {
    const wrap = document.createElement('div');
    wrap.className = 'video-list';
    wrap.id = 'videoList';
    for (let i = 0; i < 6; i++) {
        wrap.innerHTML += `
        <div class="skeleton-card">
            <div class="skeleton-thumb"></div>
            <div class="skeleton-info">
                <div class="skeleton-line" style="width:90%"></div>
                <div class="skeleton-line" style="width:70%"></div>
                <div class="skeleton-line" style="width:50%"></div>
            </div>
        </div>`;
    }
    document.getElementById('mainContent').innerHTML = '';
    document.getElementById('mainContent').appendChild(wrap);
}

// =====================
// 카드 렌더
// =====================
function cardHTML(v, rank) {
    const s      = v.statistics || {};
    const views  = parseInt(s.viewCount) || 0;
    const likes  = parseInt(s.likeCount) || 0;
    const vel    = velocity(v);
    const maxVel = Math.max(...videos.map(velocity));
    const pct    = Math.min(100, Math.round(vel / Math.max(1, maxVel) * 100));
    const color  = catColor(v.snippet.categoryId);
    const isTop  = rank <= 3;
    const thumb  = v.snippet.thumbnails?.medium?.url || v.snippet.thumbnails?.default?.url || '';
    const url    = `https://www.youtube.com/watch?v=${v.id}`;

    return `
    <a class="video-card${isTop ? ' hot' : ''}" href="${url}" target="_blank" rel="noopener noreferrer">
        <div class="thumb-wrap">
            <img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'">
            <span class="rank-num${isTop ? ' top' : ''}">#${rank}</span>
            ${isTop ? '<span class="hot-tag">HOT🔥</span>' : ''}
        </div>
        <div class="video-info">
            <div class="video-title">${v.snippet.title}</div>
            <div class="channel">📺 ${v.snippet.channelTitle}</div>
            <div class="stats-row">
                <span class="stat v">👁 ${fmt(views)}</span>
                <span class="stat l">❤️ ${fmt(likes)}</span>
                <span class="stat t">🕐 ${ago(v.snippet.publishedAt)}</span>
            </div>
            <div class="speed-row">
                <div class="speed-bar-bg">
                    <div class="speed-bar-fill" style="width:${pct}%;background:${color}"></div>
                </div>
                <span class="speed-val">⚡${fmt(vel)}/h</span>
            </div>
        </div>
    </a>`;
}

// =====================
// 인라인 광고 HTML
// =====================
function adHTML() {
    return `
    <div class="ad-inline">
        <div class="ad-label">광고</div>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-4409875039737384"
             data-ad-slot="auto"
             data-ad-format="fluid"
             data-ad-layout="in-article"></ins>
    </div>`;
}

// =====================
// 메인 렌더
// =====================
function render() {
    const list = sorted(videos, currentSort);
    const wrap = document.createElement('div');
    wrap.className = 'video-list';
    wrap.id = 'videoList';

    list.forEach((v, i) => {
        wrap.innerHTML += cardHTML(v, i + 1);
        if ((i + 1) % 6 === 0 && i < list.length - 1) {
            wrap.innerHTML += adHTML();
        }
    });

    document.getElementById('mainContent').innerHTML = '';
    document.getElementById('mainContent').appendChild(wrap);
    document.getElementById('resultInfo').innerHTML = `<strong>${list.length}개</strong> 영상 분석`;
    document.getElementById('updateBar').textContent = `업데이트: ${new Date().toLocaleString('ko-KR')}`;

    // 광고 초기화
    document.querySelectorAll('#videoList .adsbygoogle').forEach(() => {
        try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
    });
}

// =====================
// 에러 렌더
// =====================
function renderError(msg) {
    document.getElementById('mainContent').innerHTML = `
    <div class="error-wrap">
        <div class="error-box">
            <div class="error-icon">😵</div>
            <div class="error-title">데이터를 불러오지 못했어요</div>
            <div class="error-msg">${msg}<br><br>잠시 후 다시 시도해주세요.</div>
            <button class="retry-btn" onclick="loadData()">🔄 다시 시도</button>
        </div>
    </div>`;
    document.getElementById('resultInfo').textContent = '오류 발생';
}

// =====================
// 데이터 로드
// =====================
async function loadData() {
    if (isLoading) return;
    isLoading = true;

    renderSkeleton();
    document.getElementById('resultInfo').textContent = '분석 중...';

    try {
        videos = await fetchVideos(currentCat);
        render();
    } catch(e) {
        renderError(e.message);
    } finally {
        isLoading = false;
    }
}

// =====================
// 이벤트 핸들러
// =====================
function selectCat(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.id;
    // 탭 중앙 스크롤
    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    loadData();
}

function selectSort(btn) {
    document.querySelectorAll('.sort-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    render();
}

async function handleRefresh() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    btn.style.pointerEvents = 'none';
    await loadData();
    btn.classList.remove('spinning');
    btn.style.pointerEvents = '';
}

// =====================
// 초기 실행
// =====================
loadData();
</script>

</body>
</html>
