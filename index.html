<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ALGO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet"/>

<script>
(function(){
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');

  /* 배경 */
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,64,64);

  const bgG = ctx.createRadialGradient(32,32,2,32,32,32);
  bgG.addColorStop(0,'#1a0030');
  bgG.addColorStop(0.6,'#0a0015');
  bgG.addColorStop(1,'#000');
  ctx.fillStyle = bgG;
  ctx.beginPath();
  ctx.arc(32,32,32,0,Math.PI*2);
  ctx.fill();

  /* 글로우 */
  const glG = ctx.createRadialGradient(32,32,0,32,32,30);
  glG.addColorStop(0,'rgba(168,85,247,0.25)');
  glG.addColorStop(0.5,'rgba(240,201,106,0.12)');
  glG.addColorStop(1,'transparent');
  ctx.fillStyle = glG;
  ctx.beginPath();
  ctx.arc(32,32,32,0,Math.PI*2);
  ctx.fill();

  /* "A" 텍스트 */
  const tG = ctx.createLinearGradient(8,8,56,56);
  tG.addColorStop(0,'#ffe49a');
  tG.addColorStop(0.35,'#f0c96a');
  tG.addColorStop(0.7,'#ff8c00');
  tG.addColorStop(1,'#a855f7');
  ctx.font = 'bold 42px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#f0c96a';
  ctx.shadowBlur = 14;
  ctx.fillStyle = tG;
  ctx.fillText('A', 32, 34);

  /* 원형 테두리 */
  ctx.shadowBlur = 0;
  const brdG = ctx.createLinearGradient(0,0,64,64);
  brdG.addColorStop(0,'#f0c96a');
  brdG.addColorStop(0.3,'#a855f7');
  brdG.addColorStop(0.6,'#f5c6d0');
  brdG.addColorStop(1,'#f0c96a');
  ctx.strokeStyle = brdG;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(32,32,30,0,Math.PI*2);
  ctx.stroke();

  /* 하단 데코 라인 */
  ctx.shadowColor = '#f0c96a';
  ctx.shadowBlur = 6;
  const lineG = ctx.createLinearGradient(14,52,50,52);
  lineG.addColorStop(0,'transparent');
  lineG.addColorStop(0.3,'#f0c96a');
  lineG.addColorStop(0.5,'#f5c6d0');
  lineG.addColorStop(0.7,'#a855f7');
  lineG.addColorStop(1,'transparent');
  ctx.strokeStyle = lineG;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(14,52);
  ctx.lineTo(50,52);
  ctx.stroke();

  /* 다이아몬드 */
  ctx.shadowColor = '#ffe49a';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ffe49a';
  ctx.save();
  ctx.translate(32,52);
  ctx.rotate(Math.PI/4);
  ctx.fillRect(-3,-3,6,6);
  ctx.restore();

  const link = document.createElement('link');
  link.rel = 'icon';
  link.type = 'image/png';
  link.href = c.toDataURL('image/png');
  document.head.appendChild(link);

  /* 파비콘 미리보기용 전역 저장 */
  window._faviconCanvas = c;
})();
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --purple:#7c3aed;
  --violet:#a855f7;
  --gold:#f0c96a;
  --gold-l:#ffe49a;
  --rose:#f5c6d0;
  --orange:#ff8c00;
  --red:#ff2020;
}

body{
  background:#000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:'Cinzel',serif;
  gap:60px;
}

/* 별 배경 */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;
  border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate var(--delay,0s);
}
@keyframes twinkle{
  from{opacity:.15;transform:scale(1);}
  to{opacity:.9;transform:scale(1.5);}
}

/* ── 메인 로고 ── */
.logo-wrap{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.algo-text{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0;
}

.algo-text span{
  display:inline-block;
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:140px;
  line-height:1;
  letter-spacing:-2px;
  position:relative;
  animation:letterFloat var(--lf,6s) ease-in-out infinite alternate var(--ld,0s);
  /* 반사 제거: ::after 없음 */
}

.l-a{
  background:linear-gradient(160deg,#ffe49a 0%,#f0c96a 40%,#ff8c00 80%,#ff2020 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 18px #f0c96a99) drop-shadow(0 0 40px #ff8c0055);
  --lf:5.8s;--ld:0s;
}
.l-l{
  background:linear-gradient(160deg,#f5c6d0 0%,#e879a0 40%,#a855f7 80%,#7c3aed 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 18px #e879a099) drop-shadow(0 0 40px #a855f755);
  --lf:6.2s;--ld:.4s;
}
.l-g{
  background:linear-gradient(160deg,#ffe49a 0%,#f0c96a 40%,#ff8c00 80%,#ff2020 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 18px #f0c96a99) drop-shadow(0 0 40px #ff8c0055);
  --lf:5.5s;--ld:.8s;
}
.l-o{
  background:linear-gradient(160deg,#f5c6d0 0%,#e879a0 40%,#a855f7 80%,#7c3aed 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 18px #e879a099) drop-shadow(0 0 40px #a855f755);
  --lf:6.5s;--ld:1.2s;
}

@keyframes letterFloat{
  0%{transform:translateY(0) scale(1);}
  100%{transform:translateY(-6px) scale(1.03);}
}

/* 데코 라인 */
.deco-line{
  position:relative;
  width:520px;
  height:2px;
  margin-top:8px;
  background:linear-gradient(90deg,
    transparent 0%,
    #7c3aed 15%,
    #f0c96a 35%,
    #f5c6d0 50%,
    #f0c96a 65%,
    #a855f7 85%,
    transparent 100%
  );
  animation:linePulse 4s ease-in-out infinite alternate;
}
.deco-line::before,.deco-line::after{
  content:'';
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:6px;height:6px;
  border-radius:50%;
  background:#f0c96a;
  box-shadow:0 0 8px 3px #f0c96a;
}
.deco-line::before{left:0;}
.deco-line::after{right:0;}

.deco-diamond{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  width:8px;height:8px;
  background:linear-gradient(135deg,#ffe49a,#f5c6d0);
  box-shadow:0 0 10px 4px #f0c96a99;
  animation:diamondPulse 3s ease-in-out infinite alternate;
}

@keyframes linePulse{
  0%{opacity:.6;filter:brightness(.9);}
  100%{opacity:1;filter:brightness(1.3);}
}
@keyframes diamondPulse{
  0%{transform:translate(-50%,-50%) rotate(45deg) scale(1);}
  100%{transform:translate(-50%,-50%) rotate(45deg) scale(1.5);}
}

.bg-glow{
  position:absolute;
  width:700px;height:300px;
  border-radius:50%;
  background:radial-gradient(ellipse,#7c3aed0a 0%,#f0c96a08 40%,transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  animation:bgGlow 6s ease-in-out infinite alternate;
  pointer-events:none;
  z-index:-1;
}
@keyframes bgGlow{
  0%{opacity:.5;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}
}

.particles{
  position:absolute;
  width:600px;height:300px;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:-1;
}
.pt{
  position:absolute;
  border-radius:50%;
  animation:ptFloat var(--pd,8s) ease-in-out infinite alternate var(--pdd,0s);
}
@keyframes ptFloat{
  0%{transform:translateY(0) translateX(0);opacity:.4;}
  50%{opacity:.9;}
  100%{transform:translateY(var(--py,-20px)) translateX(var(--px,10px));opacity:.3;}
}

/* ── 파비콘 미리보기 섹션 ── */
.favicon-preview{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}

.favicon-label{
  font-family:'Cinzel',serif;
  font-size:11px;
  font-weight:600;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#f0c96a;
  opacity:.7;
}

.favicon-sizes{
  display:flex;
  align-items:flex-end;
  gap:24px;
}

.fav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

.fav-canvas-wrap{
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 0 1px #f0c96a33, 0 0 20px #a855f722;
  image-rendering:pixelated;
  animation:favGlow 3s ease-in-out infinite alternate;
}
@keyframes favGlow{
  0%{box-shadow:0 0 0 1px #f0c96a33, 0 0 12px #a855f722;}
  100%{box-shadow:0 0 0 1px #f0c96a88, 0 0 24px #a855f755;}
}

.fav-size-label{
  font-family:'Cinzel',serif;
  font-size:10px;
  color:#a855f7;
  letter-spacing:2px;
  opacity:.8;
}

/* 구분선 */
.divider{
  width:400px;
  height:1px;
  background:linear-gradient(90deg,transparent,#7c3aed44,#f0c96a44,#a855f744,transparent);
  position:relative;
  z-index:10;
}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<!-- 메인 로고 -->
<div class="logo-wrap">
  <div class="bg-glow"></div>
  <div class="particles" id="particles"></div>

  <div class="algo-text">
    <span class="l-a">A</span>
    <span class="l-l">L</span>
    <span class="l-g">G</span>
    <span class="l-o">O</span>
  </div>

  <div class="deco-line">
    <div class="deco-diamond"></div>
  </div>
</div>

<div class="divider"></div>

<!-- 파비콘 미리보기 -->
<div class="favicon-preview">
  <div class="favicon-label">Favicon Preview</div>
  <div class="favicon-sizes" id="faviconSizes"></div>
</div>

<script>
/* ── 별 배경 ── */
const bg = document.getElementById('bg');
const sc = ['#f0c96a','#a855f7','#f5c6d0','#ff8c00','#ff2020','#ffe49a','#e879a0','#fff'];
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=(Math.random()*1.8+0.3).toFixed(2);
  s.style.cssText=`
    width:${sz}px;height:${sz}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    background:${sc[Math.floor(Math.random()*sc.length)]};
    --d:${(Math.random()*4+1.5).toFixed(2)}s;
    --delay:-${(Math.random()*5).toFixed(2)}s;
  `;
  bg.appendChild(s);
}

/* ── 파티클 ── */
const pc = document.getElementById('particles');
const pcColors=['#f0c96a','#a855f7','#f5c6d0','#ff8c00','#e879a0'];
for(let i=0;i<18;i++){
  const p=document.createElement('div');
  p.className='pt';
  const sz=(Math.random()*3+1).toFixed(2);
  p.style.cssText=`
    width:${sz}px;height:${sz}px;
    left:${Math.random()*600}px;
    top:${Math.random()*300}px;
    background:${pcColors[Math.floor(Math.random()*pcColors.length)]};
    box-shadow:0 0 ${sz*2}px ${pcColors[Math.floor(Math.random()*pcColors.length)]};
    --pd:${(Math.random()*6+5).toFixed(2)}s;
    --pdd:-${(Math.random()*5).toFixed(2)}s;
    --py:${(-(Math.random()*40+10)).toFixed(0)}px;
    --px:${((Math.random()*30-15)).toFixed(0)}px;
  `;
  pc.appendChild(p);
}

/* ── 파비콘 미리보기 렌더링 ── */
function drawFavicon(size){
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const s = size / 64;

  /* 배경 */
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,size,size);

  const bgG=ctx.createRadialGradient(size/2,size/2,size*0.03,size/2,size/2,size/2);
  bgG.addColorStop(0,'#1a0030');
  bgG.addColorStop(0.6,'#0a0015');
  bgG.addColorStop(1,'#000');
  ctx.fillStyle=bgG;
  ctx.beginPath();
  ctx.arc(size/2,size/2,size/2,0,Math.PI*2);
  ctx.fill();

  /* 글로우 */
  const glG=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size*0.47);
  glG.addColorStop(0,'rgba(168,85,247,0.28)');
  glG.addColorStop(0.5,'rgba(240,201,106,0.14)');
  glG.addColorStop(1,'transparent');
  ctx.fillStyle=glG;
  ctx.beginPath();
  ctx.arc(size/2,size/2,size/2,0,Math.PI*2);
  ctx.fill();

  /* "A" */
  const tG=ctx.createLinearGradient(size*0.12,size*0.12,size*0.88,size*0.88);
  tG.addColorStop(0,'#ffe49a');
  tG.addColorStop(0.35,'#f0c96a');
  tG.addColorStop(0.7,'#ff8c00');
  tG.addColorStop(1,'#a855f7');
  ctx.font=`bold ${Math.round(42*s)}px serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.shadowColor='#f0c96a';
  ctx.shadowBlur=14*s;
  ctx.fillStyle=tG;
  ctx.fillText('A',size/2,size*0.53);

  /* 테두리 */
  ctx.shadowBlur=0;
  const brdG=ctx.createLinearGradient(0,0,size,size);
  brdG.addColorStop(0,'#f0c96a');
  brdG.addColorStop(0.3,'#a855f7');
  brdG.addColorStop(0.6,'#f5c6d0');
  brdG.addColorStop(1,'#f0c96a');
  ctx.strokeStyle=brdG;
  ctx.lineWidth=2.5*s;
  ctx.beginPath();
  ctx.arc(size/2,size/2,size*0.47,0,Math.PI*2);
  ctx.stroke();

  /* 데코 라인 */
  ctx.shadowColor='#f0c96a';
  ctx.shadowBlur=6*s;
  const lineG=ctx.createLinearGradient(size*0.22,size*0.81,size*0.78,size*0.81);
  lineG.addColorStop(0,'transparent');
  lineG.addColorStop(0.3,'#f0c96a');
  lineG.addColorStop(0.5,'#f5c6d0');
  lineG.addColorStop(0.7,'#a855f7');
  lineG.addColorStop(1,'transparent');
  ctx.strokeStyle=lineG;
  ctx.lineWidth=1.5*s;
  ctx.beginPath();
  ctx.moveTo(size*0.22,size*0.81);
  ctx.lineTo(size*0.78,size*0.81);
  ctx.stroke();

  /* 다이아몬드 */
  ctx.shadowColor='#ffe49a';
  ctx.shadowBlur=8*s;
  ctx.fillStyle='#ffe49a';
  ctx.save();
  ctx.translate(size/2,size*0.81);
  ctx.rotate(Math.PI/4);
  const d=3*s;
  ctx.fillRect(-d,-d,d*2,d*2);
  ctx.restore();

  return c;
}

/* 3가지 사이즈로 미리보기 */
const sizes=[16,32,64];
const displaySizes=[64,96,128];
const container=document.getElementById('faviconSizes');

sizes.forEach((sz,i)=>{
  const canvas=drawFavicon(sz);
  const wrap=document.createElement('div');
  wrap.className='fav-item';

  const canvasWrap=document.createElement('div');
  canvasWrap.className='fav-canvas-wrap';
  canvasWrap.style.cssText=`
    width:${displaySizes[i]}px;
    height:${displaySizes[i]}px;
    border-radius:${12+i*4}px;
  `;

  /* 실제 사이즈 캔버스를 display 크기로 스케일 */
  canvas.style.cssText=`
    width:${displaySizes[i]}px;
    height:${displaySizes[i]}px;
    display:block;
    image-rendering:pixelated;
  `;
  canvasWrap.appendChild(canvas);

  const label=document.createElement('div');
  label.className='fav-size-label';
  label.textContent=`${sz}×${sz}`;

  wrap.appendChild(canvasWrap);
  wrap.appendChild(label);
  container.appendChild(wrap);
});
</script>
</body>
</html>
