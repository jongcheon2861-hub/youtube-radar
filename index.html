<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YTAnalytics Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
/* ===== RESET & ROOT ===== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#07070e;--bg1:#0f0f1c;--bg2:#181828;--bg3:#22223a;
  --acc:#7c5cfc;--acc2:#fc5c7d;--acc3:#00d4aa;
  --txt:#e8e8f0;--txt2:#9999bb;
  --gold:#ffd700;--orange:#ff8c00;
  --left-w:220px;--right-w:280px;--header-h:64px;
  --radius:14px;--shadow:0 8px 32px rgba(0,0,0,.55);
}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg0);color:var(--txt);overflow-x:hidden}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:var(--acc);border-radius:3px}

/* ===== HEADER ===== */
#hdr{
  position:sticky;top:0;z-index:200;
  height:var(--header-h);
  background:rgba(7,7,14,.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(124,92,252,.18);
  display:flex;align-items:center;gap:12px;padding:0 18px;
}
#logo{
  font-size:22px;font-weight:900;
  background:linear-gradient(135deg,var(--acc),var(--acc2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;white-space:nowrap;flex-shrink:0;
}
#hdrSearch{
  flex:1;max-width:520px;
  display:flex;gap:8px;align-items:center;
  background:var(--bg2);border:1px solid rgba(124,92,252,.25);
  border-radius:40px;padding:0 16px;
}
#hdrSearch input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:14px;padding:10px 0}
#hdrSearch button{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:20px;color:#fff;padding:6px 16px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap}
#hdrRight{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdrBtn{background:var(--bg2);border:1px solid rgba(124,92,252,.3);border-radius:8px;color:var(--txt);padding:7px 14px;cursor:pointer;font-size:12px;font-weight:600;transition:.2s}
.hdrBtn:hover{border-color:var(--acc);color:var(--acc)}

/* ===== MAIN LAYOUT ===== */
#layout{
  display:flex;
  min-height:calc(100vh - var(--header-h));
  padding-right:var(--right-w);
}

/* ===== SIDEBAR ===== */
#sidebar{
  width:var(--left-w);flex-shrink:0;
  background:var(--bg1);
  border-right:1px solid rgba(124,92,252,.12);
  display:flex;flex-direction:column;
  position:sticky;top:var(--header-h);
  height:calc(100vh - var(--header-h));
  overflow-y:auto;
}
.navItem{
  display:flex;align-items:center;gap:10px;
  padding:13px 18px;cursor:pointer;
  color:var(--txt2);font-size:14px;font-weight:500;
  border-left:3px solid transparent;
  transition:.2s;
}
.navItem:hover{background:rgba(124,92,252,.08);color:var(--txt);border-left-color:rgba(124,92,252,.4)}
.navItem.active{background:rgba(124,92,252,.14);color:var(--acc);border-left-color:var(--acc);font-weight:700}
.navItem .ni{font-size:18px;width:22px;text-align:center}
#sideAd{padding:14px;margin-top:auto}
.sideAdBox{
  background:var(--bg2);border:1px solid rgba(124,92,252,.2);
  border-radius:var(--radius);padding:12px;text-align:center;
  color:var(--txt2);font-size:11px;min-height:120px;
  display:flex;align-items:center;justify-content:center;
}

/* ===== MAIN CONTENT ===== */
#main{flex:1;padding:22px 24px;overflow-x:hidden;min-width:0}

/* ===== SECTION ===== */
.section{display:none}
.section.active{display:block}

/* ===== SECTION AD BANNER ===== */
.secAdBanner{
  background:linear-gradient(90deg,rgba(124,92,252,.08),rgba(252,92,125,.08));
  border:1px solid rgba(124,92,252,.18);
  border-radius:var(--radius);
  padding:12px 18px;
  margin-bottom:22px;
  text-align:center;
  min-height:90px;
  display:flex;align-items:center;justify-content:center;
  color:var(--txt2);font-size:12px;
}

/* ===== SECTION TITLE ===== */
.secTitle{font-size:20px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.secTitle span{font-size:24px}

/* ===== TYPE FILTER TABS ===== */
.typeFilter{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tfBtn{
  background:var(--bg2);border:1px solid rgba(124,92,252,.25);
  border-radius:30px;color:var(--txt2);padding:7px 18px;
  cursor:pointer;font-size:13px;font-weight:600;transition:.2s;
}
.tfBtn:hover{border-color:var(--acc);color:var(--txt)}
.tfBtn.on{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border-color:transparent;box-shadow:0 0 14px rgba(124,92,252,.5)}

/* ===== CATEGORY TABS ===== */
.catTabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.catTab{
  background:var(--bg2);border:1px solid rgba(255,255,255,.08);
  border-radius:20px;color:var(--txt2);padding:6px 14px;
  cursor:pointer;font-size:12px;font-weight:600;transition:.2s;
}
.catTab:hover{border-color:var(--acc2);color:var(--txt)}
.catTab.on{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border-color:transparent}

/* ===== VIDEO GRID ===== */
.vidGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;margin-bottom:20px}
.vidCard{
  background:var(--bg1);border:1px solid rgba(255,255,255,.06);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  transition:.25s;position:relative;
}
.vidCard:hover{transform:translateY(-4px) scale(1.02);border-color:rgba(124,92,252,.4);box-shadow:0 12px 36px rgba(0,0,0,.6)}
.vidThumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.vidInfo{padding:10px 12px}
.vidTitle{font-size:12px;font-weight:600;line-height:1.45;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vidMeta{display:flex;gap:6px;flex-wrap:wrap}
.vidBadge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.badge-shorts{background:linear-gradient(135deg,#ff5252,#ff1744);color:#fff}
.badge-long{background:linear-gradient(135deg,var(--acc),#4527a0);color:#fff}
.badge-views{background:rgba(255,255,255,.08);color:var(--txt2)}

/* ===== PAGINATION ===== */
.pagRow{display:flex;gap:8px;justify-content:center;margin-top:18px}
.pagBtn{background:var(--bg2);border:1px solid rgba(124,92,252,.25);border-radius:8px;color:var(--txt2);padding:8px 18px;cursor:pointer;font-size:13px;transition:.2s}
.pagBtn:hover{border-color:var(--acc);color:var(--acc)}
.pagBtn:disabled{opacity:.3;cursor:default}

/* ===== KEYWORD SEARCH RESULT ===== */
.kwTypeFilter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.kwResTitle{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--acc)}
.kwNoResult{color:var(--txt2);font-size:14px;padding:30px;text-align:center}

/* ===== CHANNEL ANALYSIS ===== */
#chInput{
  display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;
}
#chInput input{
  flex:1;min-width:220px;
  background:var(--bg2);border:1px solid rgba(124,92,252,.3);
  border-radius:12px;color:var(--txt);padding:12px 18px;
  font-size:14px;outline:none;transition:.2s;
}
#chInput input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,92,252,.2)}
#chInput button{
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  border:none;border-radius:12px;color:#fff;
  padding:12px 26px;cursor:pointer;font-size:14px;font-weight:700;
  box-shadow:0 4px 16px rgba(124,92,252,.4);transition:.2s;
}
#chInput button:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,92,252,.55)}
#chResult{margin-top:8px}

/* ── Grade Orb 3D ── */
.grade-orb-wrap{
  display:flex;flex-direction:column;align-items:center;
  gap:6px;margin:0 auto 28px;width:fit-content;
}
.grade-orb{
  width:130px;height:130px;border-radius:50%;
  position:relative;cursor:default;
  display:flex;align-items:center;justify-content:center;
  font-size:42px;
  box-shadow:
    0 0 0 4px rgba(255,255,255,.08),
    0 0 28px 8px var(--orb-glow,rgba(124,92,252,.6)),
    inset 0 -8px 24px rgba(0,0,0,.45),
    inset 0 8px 20px rgba(255,255,255,.2);
  animation:orbPulse 3s ease-in-out infinite, orbFloat 4s ease-in-out infinite;
  transition:background .6s;
}
@keyframes orbPulse{
  0%,100%{box-shadow:0 0 0 4px rgba(255,255,255,.08),0 0 28px 8px var(--orb-glow,rgba(124,92,252,.6)),inset 0 -8px 24px rgba(0,0,0,.45),inset 0 8px 20px rgba(255,255,255,.2)}
  50%{box-shadow:0 0 0 6px rgba(255,255,255,.12),0 0 52px 18px var(--orb-glow,rgba(124,92,252,.8)),inset 0 -8px 24px rgba(0,0,0,.45),inset 0 8px 20px rgba(255,255,255,.25)}
}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.grade-lv-txt{
  font-size:28px;font-weight:900;
  background:linear-gradient(135deg,var(--orb-color,#7c5cfc),#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 8px var(--orb-glow,rgba(124,92,252,.7)));
}
.grade-name-txt{font-size:15px;font-weight:700;color:var(--orb-color,#7c5cfc);letter-spacing:.5px}

/* ── XP Bar ── */
.xp-section{margin-bottom:24px}
.xp-label{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:7px;color:var(--txt2)}
.xp-bar-bg{height:14px;background:rgba(255,255,255,.07);border-radius:7px;overflow:hidden;position:relative}
.xp-bar-fill{
  height:100%;border-radius:7px;
  background:linear-gradient(90deg,var(--orb-color,#7c5cfc),rgba(255,255,255,.4),var(--orb-color,#7c5cfc));
  background-size:200% 100%;
  animation:xpShimmer 2.5s linear infinite;
  transition:width .8s cubic-bezier(.17,.67,.4,1.2);
}
@keyframes xpShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Channel Card ── */
.ch-card{
  background:var(--bg2);border:1px solid rgba(255,255,255,.06);
  border-radius:18px;padding:24px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  max-width:760px;margin:0 auto;
}
.ch-header{display:flex;gap:18px;align-items:center;margin-bottom:22px}
.ch-avatar{
  width:78px;height:78px;border-radius:50%;object-fit:cover;
  border:3px solid var(--orb-color,#7c5cfc);
  box-shadow:0 0 18px var(--orb-glow,rgba(124,92,252,.6));
}
.ch-info{flex:1}
.ch-name{font-size:20px;font-weight:800;margin-bottom:4px}
.ch-handle{font-size:13px;color:var(--txt2);margin-bottom:8px}
.ch-desc{font-size:12px;color:var(--txt2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── Stats Row ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.stat-box{
  background:var(--bg3);border-radius:12px;padding:14px 16px;
  text-align:center;border:1px solid rgba(255,255,255,.06);
  transition:.2s;position:relative;overflow:hidden;
}
.stat-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--sb-color,rgba(124,92,252,.1)),transparent 70%);opacity:.5}
.stat-val{font-size:22px;font-weight:900;color:var(--sb-color,var(--acc));margin-bottom:2px}
.stat-lbl{font-size:11px;color:var(--txt2);font-weight:600}

/* ── Metric Bars ── */
.metric-section{margin-bottom:22px}
.metric-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--txt2)}
.metric-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.metric-label{font-size:12px;font-weight:600;color:var(--txt2);width:90px;flex-shrink:0}
.metric-bar-bg{flex:1;height:10px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden}
.metric-bar-fill{height:100%;border-radius:5px;transition:width .8s cubic-bezier(.17,.67,.4,1.2)}
.metric-val{font-size:12px;font-weight:700;width:46px;text-align:right;flex-shrink:0}

/* ── Algorithm Notice ── */
.algo-notice{
  background:linear-gradient(135deg,rgba(0,212,170,.08),rgba(124,92,252,.08));
  border:1px solid rgba(0,212,170,.25);
  border-radius:12px;padding:14px 18px;
  font-size:12px;color:var(--acc3);line-height:1.7;
  margin-bottom:20px;
  display:flex;gap:10px;align-items:flex-start;
}
.algo-notice .ai{font-size:18px;flex-shrink:0;margin-top:1px}

/* ── Benchmark ── */
.bench-section{margin-bottom:20px}
.bench-title{font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:10px}
.bench-row{display:flex;justify-content:space-between;font-size:12px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.04);margin-bottom:6px}
.bench-row.highlight{background:rgba(124,92,252,.12);color:var(--acc);font-weight:700}

/* ── Grade Table ── */
.grade3d-table{width:100%;border-collapse:separate;border-spacing:0 4px;margin-bottom:10px}
.grade3d-table th{font-size:11px;color:var(--txt2);padding:6px 10px;text-align:left}
.grade3d-table td{padding:8px 10px;font-size:12px;background:rgba(255,255,255,.04);border-radius:6px}
.grade3d-table tr.gCurrent td{font-weight:700;background:rgba(124,92,252,.12)}
.gBadge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;
  border:1px solid currentColor;
}

/* ===== EDITING TOOLS ===== */
.toolTabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.toolTab{
  background:var(--bg2);border:1px solid rgba(255,255,255,.08);
  border-radius:20px;color:var(--txt2);padding:7px 16px;
  cursor:pointer;font-size:13px;font-weight:600;transition:.2s;
}
.toolTab:hover{border-color:var(--acc2);color:var(--txt)}
.toolTab.on{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border-color:transparent}
.toolGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.toolCard{
  background:var(--bg2);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--radius);padding:18px;
  display:flex;flex-direction:column;gap:8px;
  transition:.2s;cursor:pointer;text-decoration:none;
  color:var(--txt);
}
.toolCard:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toolIcon{font-size:28px}
.toolName{font-size:14px;font-weight:700}
.toolDesc{font-size:11px;color:var(--txt2);line-height:1.5}
.toolBadge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;width:fit-content}
.tb-free{background:rgba(0,212,170,.18);color:var(--acc3)}
.tb-paid{background:rgba(252,92,125,.18);color:var(--acc2)}
.tb-freemium{background:rgba(255,215,0,.18);color:var(--gold)}

/* ===== AI IDEAS ===== */
.ideaGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.ideaCard{
  background:var(--bg2);border:2px solid rgba(255,255,255,.07);
  border-radius:14px;padding:18px;cursor:pointer;
  transition:.25s;
}
.ideaCard:hover{border-color:var(--acc);box-shadow:0 0 18px rgba(124,92,252,.3)}
.ideaCard.picked{border-color:var(--gold);box-shadow:0 0 22px rgba(255,215,0,.4)}
.ideaTag{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:700;margin-bottom:10px;display:inline-block;background:rgba(124,92,252,.2);color:var(--acc)}
.ideaTitle{font-size:14px;font-weight:700;line-height:1.5;margin-bottom:8px}
.ideaDesc{font-size:12px;color:var(--txt2);line-height:1.6}
.ideaActions{display:flex;gap:8px;margin-top:12px}
.ideaBtn{
  flex:1;background:var(--bg3);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;color:var(--txt2);padding:6px;
  cursor:pointer;font-size:11px;font-weight:600;transition:.2s;text-align:center;
}
.ideaBtn:hover{border-color:var(--acc);color:var(--acc)}

/* ===== REVENUE CALCULATOR ===== */
.revenueWrap{
  max-width:700px;margin:0 auto;
  background:linear-gradient(135deg,rgba(124,92,252,.06),rgba(252,92,125,.06));
  border:1px solid rgba(124,92,252,.18);border-radius:20px;padding:28px;
}
.revInputGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:22px}
.revField{display:flex;flex-direction:column;gap:6px}
.revField label{font-size:12px;font-weight:600;color:var(--txt2)}
.revField input,.revField select{
  background:var(--bg2);border:1px solid rgba(124,92,252,.25);
  border-radius:10px;color:var(--txt);padding:10px 14px;font-size:14px;outline:none;transition:.2s;
}
.revField input:focus,.revField select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,92,252,.2)}
.revCalcBtn{
  width:100%;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  border:none;border-radius:12px;color:#fff;padding:14px;
  font-size:15px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 20px rgba(124,92,252,.4);transition:.2s;
  margin-bottom:22px;
}
.revCalcBtn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,92,252,.55)}
.revResultGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.revBox{
  border-radius:14px;padding:16px;text-align:center;
  background:var(--bg2);border:1px solid rgba(255,255,255,.07);
  position:relative;overflow:hidden;
}
.revBox::before{content:'';position:absolute;inset:0;opacity:.15}
.revBox.rb1::before{background:linear-gradient(135deg,var(--acc),var(--acc2))}
.revBox.rb2::before{background:linear-gradient(135deg,var(--gold),#ff8c00)}
.revBox.rb3::before{background:linear-gradient(135deg,var(--acc3),#00acc1)}
.revBox.rb4::before{background:linear-gradient(135deg,var(--acc2),#9c27b0)}
.revBox .rv-val{font-size:22px;font-weight:900;margin-bottom:4px}
.revBox .rv-lbl{font-size:11px;color:var(--txt2);font-weight:600}
.revTip{
  background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.2);
  border-radius:12px;padding:14px 18px;font-size:12px;color:var(--gold);line-height:1.7
}

/* ===== SHOP (3D ANIMATION) ===== */
.shopGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:18px}
.shopCard{
  background:var(--bg1);
  border-radius:18px;overflow:hidden;cursor:pointer;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .4s,box-shadow .4s;
  border:1px solid rgba(255,140,0,.18);
  box-shadow:0 6px 24px rgba(0,0,0,.5);
  text-decoration:none;color:var(--txt);display:block;
}
.shopCard:hover{
  transform:perspective(600px) rotateY(-8deg) rotateX(4deg) translateY(-6px) scale(1.03);
  box-shadow:0 16px 48px rgba(255,140,0,.3),0 0 0 1px rgba(255,140,0,.4);
}
.shopCard::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,140,0,.12),rgba(255,180,0,.06),transparent 60%);
  opacity:0;transition:opacity .3s;z-index:1;
}
.shopCard:hover::before{opacity:1}
.shopImgWrap{
  width:100%;aspect-ratio:1/1;overflow:hidden;position:relative;
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
}
.shopImgWrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.shopCard:hover .shopImgWrap img{transform:scale(1.08)}
.shopRankBadge{
  position:absolute;top:8px;left:8px;z-index:2;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;
}
.sr1{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000;box-shadow:0 0 12px rgba(255,215,0,.6)}
.sr2{background:linear-gradient(135deg,#c0c0c0,#9e9e9e);color:#000}
.sr3{background:linear-gradient(135deg,#cd7f32,#8d4e28);color:#fff}
.shopDiscBadge{
  position:absolute;top:8px;right:8px;z-index:2;

<script>
/* =========================================================
   CONFIG
   ========================================================= */
const API_KEYS = ['YOUR_API_KEY_1','YOUR_API_KEY_2'];
let apiKeyIdx = 0;
function getKey(){ return API_KEYS[apiKeyIdx % API_KEYS.length]; }
function nextKey(){ apiKeyIdx++; }

const PC = 'AF8853448';

/* =========================================================
   GRADE SYSTEM  LV1–LV10
   ========================================================= */
const GRADES = [
  {lv:1,  name:'LV 1',  icon:'⚪',  color:'#78909c', glow:'rgba(120,144,156,.55)', min:0,  max:10},
  {lv:2,  name:'LV 2',  icon:'🟢',  color:'#43a047', glow:'rgba(67,160,71,.6)',   min:10, max:22},
  {lv:3,  name:'LV 3',  icon:'🔵',  color:'#1e88e5', glow:'rgba(30,136,229,.65)', min:22, max:35},
  {lv:4,  name:'LV 4',  icon:'🟣',  color:'#8e24aa', glow:'rgba(142,36,170,.68)', min:35, max:48},
  {lv:5,  name:'LV 5',  icon:'🥈',  color:'#bdbdbd', glow:'rgba(189,189,189,.7)', min:48, max:58},
  {lv:6,  name:'LV 6',  icon:'🏆',  color:'#fdd835', glow:'rgba(253,216,53,.72)', min:58, max:68},
  {lv:7,  name:'LV 7',  icon:'💎',  color:'#00b8d4', glow:'rgba(0,184,212,.75)',  min:68, max:78},
  {lv:8,  name:'LV 8',  icon:'🔴',  color:'#e53935', glow:'rgba(229,57,53,.8)',   min:78, max:87},
  {lv:9,  name:'LV 9',  icon:'⚡',  color:'#00e5ff', glow:'rgba(0,229,255,.85)',  min:87, max:94},
  {lv:10, name:'LV 10', icon:'👑',  color:'#ff9100', glow:'rgba(255,145,0,.92)',  min:94, max:101},
];

function getGrade(score){
  for(let i=GRADES.length-1;i>=0;i--){
    if(score >= GRADES[i].min) return GRADES[i];
  }
  return GRADES[0];
}

/* =========================================================
   NAVIGATION
   ========================================================= */
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.navItem').forEach(n=>n.classList.remove('active'));
  const sec = document.getElementById('sec-'+id);
  if(sec) sec.classList.add('active');
  document.querySelectorAll('.navItem').forEach(n=>{
    if(n.getAttribute('onclick') && n.getAttribute('onclick').includes("'"+id+"'"))
      n.classList.add('active');
  });
  // lazy init
  if(id==='tools') renderTools();
  if(id==='ai') renderIdeas();
  if(id==='shop') renderShop();
  if(id==='rev') calcRevenue();
  // init ads
  setTimeout(()=>{
    try{ (adsbygoogle=window.adsbygoogle||[]).push({}); }catch(e){}
  },200);
}

/* =========================================================
   CATEGORY MAP (여행·교육 제거)
   ========================================================= */
const CAT_MAP = {
  '전체':'',
  '게임':'20',
  '음악':'10',
  '스포츠':'17',
  '뷰티':'26',
  '요리':'26',
  '엔터':'24',
  '뉴스':'25',
  '과학':'28',
  '자동차':'2',
};

/* =========================================================
   HOT VIDEOS
   ========================================================= */
let hotFeed=[],hotFiltered=[],hotTypeFilt='all',hotCatKey='전체';
let hotPage=0;const HOT_PER_PAGE=12;
let hotTokens=[];

function buildCatTabs(){
  const el=document.getElementById('catTabs');
  el.innerHTML='';
  Object.keys(CAT_MAP).forEach(k=>{
    const b=document.createElement('button');
    b.className='catTab'+(k==='전체'?' on':'');
    b.textContent=k;
    b.onclick=()=>{ hotCatKey=k; el.querySelectorAll('.catTab').forEach(x=>x.classList.remove('on')); b.classList.add('on'); hotPage=0; hotTokens=[]; loadHot(); };
    el.appendChild(b);
  });
}

async function loadHot(){
  const grid=document.getElementById('hotGrid');
  const empty=document.getElementById('hotEmpty');
  grid.innerHTML='<div style="color:var(--txt2);padding:30px;font-size:14px">불러오는 중...</div>';
  empty.style.display='none';

  const catId=CAT_MAP[hotCatKey]||'';
  const params=new URLSearchParams({
    part:'snippet,contentDetails,statistics',
    chart:'mostPopular',
    regionCode:'KR',
    maxResults:'50',
    key:getKey(),
  });
  if(catId) params.set('videoCategoryId',catId);
  const token=hotTokens[hotPage-1]||'';
  if(token) params.set('pageToken',token);

  try{
    const r=await fetch('https://www.googleapis.com/youtube/v3/videos?'+params);
    if(r.status===403||r.status===429){nextKey();return loadHot();}
    const d=await r.json();
    hotFeed=(d.items||[]);
    if(d.nextPageToken) hotTokens[hotPage]=d.nextPageToken;
    applyHotFilter();
  }catch(e){
    grid.innerHTML='<div style="color:var(--acc2);padding:30px;font-size:14px">API 오류가 발생했습니다. API KEY를 확인하세요.</div>';
  }
}

function applyHotFilter(){
  hotFiltered=hotFeed.filter(v=>{
    const dur=v.contentDetails?.duration||'';
    const isShorts=isShortsDur(dur);
    if(hotTypeFilt==='shorts') return isShorts;
    if(hotTypeFilt==='long') return !isShorts;
    return true;
  });
  renderHotPage();
}

function renderHotPage(){
  const grid=document.getElementById('hotGrid');
  const empty=document.getElementById('hotEmpty');
  const start=0,end=hotFiltered.length;
  const items=hotFiltered.slice(start,end);
  if(!items.length){ grid.innerHTML=''; empty.style.display='block'; }
  else{ empty.style.display='none'; grid.innerHTML=items.map(v=>vidCardHTML(v)).join(''); }
  updatePag();
}

function updatePag(){
  document.getElementById('pagPrev').disabled=(hotPage===0);
  document.getElementById('pagNext').disabled=(!hotTokens[hotPage]);

   ========================================================= */
function fmtNum(n){
  n=parseInt(n)||0;
  if(n>=100000000) return (n/100000000).toFixed(1)+'억';
  if(n>=10000) return Math.floor(n/10000)+'만';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

function isShortsDur(dur){
  if(!dur) return false;
  const m=dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return false;
  const h=parseInt(m[1]||0),mn=parseInt(m[2]||0),s=parseInt(m[3]||0);
  const total=h*3600+mn*60+s;
  return total>0 && total<=60;
}

function vidCardHTML(v){
  const id=v.id;
  const sn=v.snippet||{};
  const st=v.statistics||{};
  const dur=v.contentDetails?.duration||'';
  const isS=isShortsDur(dur);
  const thumb=sn.thumbnails?.medium?.url||sn.thumbnails?.default?.url||'';
  const title=(sn.title||'').replace(/'/g,"&#39;");
  const views=fmtNum(st.viewCount);
  return `<div class="vidCard" onclick="openVidModal('${id}','${title}')">
    <img class="vidThumb" src="${thumb}" alt="" loading="lazy">
    <div class="vidInfo">
      <div class="vidTitle">${sn.title||''}</div>
      <div class="vidMeta">
        <span class="vidBadge ${isS?'badge-shorts':'badge-long'}">${isS?'쇼츠':'롱폼'}</span>
        <span class="vidBadge badge-views">👁 ${views}</span>
      </div>
    </div>
  </div>`;
}

async function searchKw(){
  const kw=document.getElementById('kwInput').value.trim();
  if(!kw){ alert('키워드를 입력하세요.'); return; }

  const sec=document.getElementById('kwResultSec');
  const grid=document.getElementById('kwGrid');
  const empty=document.getElementById('kwEmpty');
  sec.style.display='block';
  document.getElementById('kwResTitle').textContent=`"${kw}" 검색 결과`;
  grid.innerHTML='<div style="color:var(--txt2);padding:20px;font-size:14px">검색 중...</div>';
  empty.style.display='none';

  try{
    // Step 1: Search
    const sp=new URLSearchParams({part:'snippet',q:kw,type:'video',regionCode:'KR',maxResults:'24',key:getKey()});
    const sr=await fetch('https://www.googleapis.com/youtube/v3/search?'+sp);
    if(sr.status===403||sr.status===429){nextKey();return searchKw();}
    const sd=await sr.json();
    const items=sd.items||[];
    if(!items.length){ grid.innerHTML=''; empty.style.display='block'; return; }

    // Step 2: Videos details
    const ids=items.map(i=>i.id.videoId).filter(Boolean).join(',');
    const vp=new URLSearchParams({part:'snippet,contentDetails,statistics',id:ids,key:getKey()});
    const vr=await fetch('https://www.googleapis.com/youtube/v3/videos?'+vp);
    const vd=await vr.json();
    kwRawResults=vd.items||[];

    renderKwResults();
  }catch(e){
    grid.innerHTML='<div style="color:var(--acc2);padding:20px;font-size:14px">검색 오류가 발생했습니다.</div>';
  }
}

function renderKwResults(){
  const grid=document.getElementById('kwGrid');
  const empty=document.getElementById('kwEmpty');
  let filtered=kwRawResults.filter(v=>{
    const dur=v.contentDetails?.duration||'';
    const isS=isShortsDur(dur);
    if(kwTypeFilt==='shorts') return isS;
    if(kwTypeFilt==='long') return !isS;
    return true;
  });
  if(!filtered.length){ grid.innerHTML=''; empty.style.display='block'; }
  else{ empty.style.display='none'; grid.innerHTML=filtered.map(v=>vidCardHTML(v)).join(''); }
}

async function resolveChannelId(input){
  input=input.trim();
  // Direct channel ID
  if(/^UC[a-zA-Z0-9_-]{22}$/.test(input)) return input;

  // URL extraction
  const chMatch=input.match(/youtube\.com\/channel\/(UC[a-zA-Z0-9_-]{22})/);
  if(chMatch) return chMatch[1];

  // Handle extraction
  let handle=input;
  const hMatch=input.match(/youtube\.com\/(@[^/?]+)/);
  if(hMatch) handle=hMatch[1];
  if(handle.startsWith('@')){
    const r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${encodeURIComponent(handle)}&key=${getKey()}`);
    if(r.status===403||r.status===429){nextKey();}
    const d=await r.json();
    if(d.items&&d.items.length) return d.items[0].id;
  }

  // Search fallback
  const sp=new URLSearchParams({part:'snippet',q:input,type:'channel',maxResults:'1',key:getKey()});
  const sr=await fetch('https://www.googleapis.com/youtube/v3/search?'+sp);
  if(sr.status===403||sr.status===429){nextKey();}
  const sd=await sr.json();
  if(sd.items&&sd.items.length) return sd.items[0].id.channelId||sd.items[0].snippet?.channelId;
  return null;
}

async function analyzeChannel(){
  const input=document.getElementById('chUrlInput').value.trim();
  if(!input){ alert('채널 URL, @핸들 또는 채널명을 입력하세요.'); return; }

  const res=document.getElementById('chResult');
  res.innerHTML='<div style="color:var(--txt2);padding:30px;text-align:center;font-size:14px">분석 중...</div>';

  try{
    const cid=await resolveChannelId(input);
    if(!cid){ res.innerHTML='<div style="color:var(--acc2);padding:20px">채널을 찾을 수 없습니다. URL 또는 채널명을 확인하세요.</div>'; return; }

    // Channel data
    const cp=new URLSearchParams({part:'snippet,statistics,brandingSettings',id:cid,key:getKey()});
    const cr=await fetch('https://www.googleapis.com/youtube/v3/channels?'+cp);
    if(cr.status===403||cr.status===429){nextKey();}
    const cd=await cr.json();
    if(!cd.items||!cd.items.length){ res.innerHTML='<div style="color:var(--acc2);padding:20px">채널 데이터를 가져올 수 없습니다.</div>'; return; }
    const ch=cd.items[0];

    // Recent videos
    const vp=new URLSearchParams({part:'snippet,contentDetails,statistics',channelId:cid,order:'date',maxResults:'12',key:getKey(),type:'video'});
    const vr=await fetch('https://www.googleapis.com/youtube/v3/search?'+vp);
    let vids=[];
    if(vr.ok){
      const vd=await vr.json();
      if(vd.items&&vd.items.length){
        const vids2=vd.items.map(i=>i.id?.videoId).filter(Boolean);
        if(vids2.length){
          const dp=new URLSearchParams({part:'snippet,contentDetails,statistics',id:vids2.join(','),key:getKey()});
          const dr=await fetch('https://www.googleapis.com/youtube/v3/videos?'+dp);
          const dd=await dr.json();
          vids=dd.items||[];
        }
      }
    }

    renderChannel(ch,vids,res);
  }catch(e){
    res.innerHTML='<div style="color:var(--acc2);padding:20px">분석 중 오류가 발생했습니다: '+e.message+'</div>';
  }
}

function calcScore(ch,vids){
  const st=ch.statistics||{};
  const subs=parseInt(st.subscriberCount)||0;
  const totalViews=parseInt(st.viewCount)||0;
  const videoCount=parseInt(st.videoCount)||1;

  // 구독자 점수 (0~25)
  let subScore=0;
  if(subs>=10000000) subScore=25;
  else if(subs>=1000000) subScore=22;
  else if(subs>=100000) subScore=18;
  else if(subs>=10000) subScore=13;
  else if(subs>=1000) subScore=8;
  else subScore=3;

  // 조회수/영상 효율 점수 (0~25)
  const avgViews=totalViews/(videoCount||1);
  let viewScore=0;
  if(avgViews>=5000000) viewScore=25;
  else if(avgViews>=1000000) viewScore=22;
  else if(avgViews>=500000) viewScore=18;
  else if(avgViews>=100000) viewScore=13;
  else if(avgViews>=10000) viewScore=8;
  else viewScore=3;

  // 참여율 점수 (0~25) - 최근 영상 기준
  let engScore=12;
  if(vids.length){
    const totalEng=vids.reduce((a,v)=>{
      const s=v.statistics||{};
      return a+(parseInt(s.likeCount)||0)+(parseInt(s.commentCount)||0);
    },0);
    const totalVidViews=vids.reduce((a,v)=>a+(parseInt(v.statistics?.viewCount)||0),0);
    const engRate=totalVidViews>0?(totalEng/totalVidViews)*100:0;
    if(engRate>=5) engScore=25;
    else if(engRate>=3) engScore=21;
    else if(engRate>=1) engScore=16;
    else if(engRate>=0.5) engScore=11;
    else engScore=5;
  }

  // 꾸준함 점수 (0~25) - 최근 영상 빈도
  let conScore=12;
  if(vids.length>=2){
    const dates=vids.map(v=>new Date(v.snippet?.publishedAt||Date.now())).sort((a,b)=>b-a);
    const spans=[];
    for(let i=0;i<dates.length-1;i++) spans.push((dates[i]-dates[i+1])/(1000*3600*24));
    const avgGap=spans.reduce((a,b)=>a+b,0)/spans.length;
    if(avgGap<=3) conScore=25;
    else if(avgGap<=7) conScore=21;
    else if(avgGap<=14) conScore=16;
    else if(avgGap<=30) conScore=11;
    else conScore=5;
  }

  const total=subScore+viewScore+engScore+conScore;
  return {total,subScore,viewScore,engScore,conScore};
}

        ${grade.icon}

    <!-- XP Bar -->

        <span>${xpPct}%</span>
      </div>
      <div class="xp-bar-bg">

    <!-- 채널 헤더 -->

  ],
};

function genIdeas(){
  const kw=(document.getElementById('aiKeyword').value.trim())||'기본';
  const pool=IDEAS_POOL[kw]||IDEAS_POOL['기본'];
  const grid=document.getElementById('ideaGrid');
  const extra=[
    {tag:kw,title:`${kw} 완전 정복 가이드`,desc:`${kw}에 관한 A부터 Z까지 총정리 영상`},
    {tag:kw,title:`${kw} 실패담 & 교훈`,desc:`실패 스토리는 공감과 조회수 모두 잡는 전략`},
    {tag:kw,title:`${kw} 초보자 vs 전문가 비교`,desc:`비교 영상은 알고리즘에 잘 잡히는 포맷`},
    {tag:kw,title:`${kw} 최신 트렌드 2025`,desc:`최신 트렌드 영상은 검색 유입이 큼`},
  ];
  const all=[...pool,...extra];
  grid.innerHTML=all.map((idea,i)=>`
    <div class="ideaCard" id="idea${i}" onclick="pickIdea(${i})">
      <div class="ideaTag">${idea.tag}</div>
      <div class="ideaTitle">${idea.title}</div>
      <div class="ideaDesc">${idea.desc}</div>
      <div class="ideaActions">
        <button class="ideaBtn" onclick="event.stopPropagation();copyIdea('${idea.title.replace(/'/g,"\\'")}')">📋 복사</button>
        <button class="ideaBtn" onclick="event.stopPropagation();pickIdea(${i})">⭐ 선택</button>
      </div>
    </div>`).join('');
}
function pickIdea(i){
  document.querySelectorAll('.ideaCard').forEach(c=>c.classList.remove('picked'));
  const el=document.getElementById('idea'+i);
  if(el) el.classList.add('picked');
}
function copyIdea(t){
  navigator.clipboard.writeText(t).then(()=>alert('클립보드에 복사되었습니다!')).catch(()=>alert('복사 실패'));
}

/* =========================================================
   REVENUE CALCULATOR
   ========================================================= */
function calcRevenue(){
  const views=parseInt(document.getElementById('ri-views')?.value)||100000;
  const rpm=parseFloat(document.getElementById('ri-cat')?.value)||3.5;
  const mult=parseFloat(document.getElementById('ri-mult')?.value)||0.55;
  const sc=parseInt(document.getElementById('ri-sc')?.value)||0;
  const ppv=parseInt(document.getElementById('ri-ppv')?.value)||0;
  const subs=parseInt(document.getElementById('ri-subs')?.value)||1000;

  const adRev=Math.round((views/1000)*rpm*mult);
  const totalMon=adRev+sc+ppv;
  const totalYear=totalMon*12;
  const nextSub=Math.ceil(subs/1000)*1000;
  const needSub=Math.max(0,nextSub-subs);
  const perVid=Math.round(totalMon/Math.max(1,4));

  const rEl=document.getElementById('revResults');
  if(!rEl) return;
  rEl.innerHTML=`
    <div class="revBox rb1"><div class="rv-val" style="color:var(--acc)">₩${totalMon.toLocaleString()}</div><div class="rv-lbl">월 예상 수익</div></div>
    <div class="revBox rb2"><div class="rv-val" style="color:var(--gold)">₩${totalYear.toLocaleString()}</div><div class="rv-lbl">연간 예상 수익</div></div>
    <div class="revBox rb3"><div class="rv-val" style="color:var(--acc3)">₩${adRev.toLocaleString()}</div><div class="rv-lbl">광고 수익 (월)</div></div>
    <div class="revBox rb4"><div class="rv-val" style="color:var(--acc2)">₩${perVid.toLocaleString()}</div><div class="rv-lbl">영상당 예상 수익</div></div>`;

  const tipEl=document.getElementById('revTip');
  if(tipEl){
    let tip='';
    if(totalMon<100000) tip='💡 월 10만원 달성을 위해 조회수 2배 목표! 업로드 빈도를 높이거나 쇼츠 병행을 추천합니다.';
    else if(totalMon<500000) tip='🚀 성장 구간! 협찬·PPL을 적극 유치하면 수익이 빠르게 증가합니다.';
    else if(totalMon<2000000) tip='🏆 월 200만원 달성 근접! 멤버십·슈퍼챗 활성화로 수익 다각화를 추천합니다.';
    else tip='👑 상위 크리에이터! 브랜드 채널 분리 및 플랫폼 다각화를 고려해 보세요.';
    tipEl.textContent=tip;
  }
}
