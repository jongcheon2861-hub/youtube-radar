<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometric Black Hole Symbols</title>
<style>
:root{
  --void:#04040c;
  --purple:#a855f7;
  --purple-d:#6b21a8;
  --purple-dd:#3b0764;
  --gold:#d4a942;
  --gold-l:#f0c96a;
  --gold-ll:#fff3c4;
  --orange:#f97316;
  --rose:#e8a0b0;
  --rose-d:#c4687e;
  --rose-l:#f5c6d0;
  --white:#f0eee8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--void);
  min-height:100vh;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  align-items:center;
  justify-items:center;
  gap:0;
  padding:50px 20px;
  overflow-x:hidden;
}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d) var(--delay) infinite alternate;}
@keyframes twinkle{0%{opacity:.05;}100%{opacity:.7;}}

.card{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;gap:18px;
  padding:30px 16px;
}
.label{
  font-family:'Courier New',monospace;
  font-size:8px;letter-spacing:3px;
  color:rgba(240,201,106,.35);
  text-transform:uppercase;
  text-align:center;
}
.sym{
  position:relative;
  display:flex;align-items:center;justify-content:center;
}

/* ═══════════════════════════════════
   1. HEXAGON CORE — 육각 블랙홀
═══════════════════════════════════ */
.s1{width:110px;height:110px;}
.s1 svg{width:100%;height:100%;overflow:visible;}

/* ═══════════════════════════════════
   2. SACRED RING — 다이아 + 원 + 삼각
═══════════════════════════════════ */
.s2{width:110px;height:110px;}
.s2 svg{width:100%;height:100%;overflow:visible;}

/* ═══════════════════════════════════
   3. METATRON — 메타트론 큐브
═══════════════════════════════════ */
.s3{width:110px;height:110px;}
.s3 svg{width:100%;height:100%;overflow:visible;}

/* ═══════════════════════════════════
   4. OCTAGRAM — 팔각별
═══════════════════════════════════ */
.s4{width:110px;height:110px;}
.s4 svg{width:100%;height:100%;overflow:visible;}

/* ═══════════════════════════════════
   5. TORUS KNOT — 토러스 매듭
═══════════════════════════════════ */
.s5{width:110px;height:110px;}
.s5 svg{width:100%;height:100%;overflow:visible;}

/* ═══════════════════════════════════
   6. SRI YANTRA — 삼각 중첩
═══════════════════════════════════ */
.s6{width:110px;height:110px;}
.s6 svg{width:100%;height:100%;overflow:visible;}

/* ═══════════════════════════════════
   7. PENROSE — 펜로즈 무한 삼각
═══════════════════════════════════ */
.s7{width:110px;height:110px;}
.s7 svg{width:100%;height:100%;overflow:visible;}

/* ═══════════════════════════════════
   8. QUANTUM FIELD — 양자장 격자
═══════════════════════════════════ */
.s8{width:110px;height:110px;}
.s8 svg{width:100%;height:100%;overflow:visible;}

/* ═══════════════════════════════════
   9. VESICA — 베시카 피시스
═══════════════════════════════════ */
.s9{width:110px;height:110px;}
.s9 svg{width:100%;height:100%;overflow:visible;}

/* ═══════════════════════════════════
   10. SINGULARITY POINT — 특이점 결정
═══════════════════════════════════ */
.s10{width:110px;height:110px;}
.s10 svg{width:100%;height:100%;overflow:visible;}

/* 공통 애니메이션 */
@keyframes rotCW{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes rotCCW{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
@keyframes rotCW2{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
@keyframes pulse2{0%,100%{opacity:.3;}50%{opacity:.9;}}
@keyframes scaleP{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes colorShift{
  0%{filter:drop-shadow(0 0 6px rgba(232,160,176,.8)) drop-shadow(0 0 14px rgba(249,115,22,.4));}
  33%{filter:drop-shadow(0 0 8px rgba(168,85,247,.9)) drop-shadow(0 0 18px rgba(249,115,22,.5));}
  66%{filter:drop-shadow(0 0 6px rgba(249,115,22,.8)) drop-shadow(0 0 14px rgba(232,160,176,.4));}
  100%{filter:drop-shadow(0 0 6px rgba(232,160,176,.8)) drop-shadow(0 0 14px rgba(249,115,22,.4));}
}
@keyframes colorShift2{
  0%{filter:drop-shadow(0 0 5px rgba(168,85,247,.8)) drop-shadow(0 0 12px rgba(212,169,66,.4));}
  50%{filter:drop-shadow(0 0 8px rgba(212,169,66,.9)) drop-shadow(0 0 20px rgba(168,85,247,.5));}
  100%{filter:drop-shadow(0 0 5px rgba(168,85,247,.8)) drop-shadow(0 0 12px rgba(212,169,66,.4));}
}
</style>
</head>
<body>
<div class="bg"></div>
<script>
const bg=document.querySelector('.bg');
for(let i=0;i<60;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*1.8+.3;
  const c=['#f0c96a','#a855f7','#f0eee8','#e8a0b0','#f97316'];
  s.style.cssText=`width:${sz}px;height:${sz}px;background:${c[Math.floor(Math.random()*c.length)]};left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`;
  bg.appendChild(s);
}
</script>

<!-- ══ 1. HEXAGON CORE ══ -->
<div class="card">
  <div class="sym s1">
    <svg viewBox="-60 -60 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow1"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <linearGradient id="hg1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f5c6d0"/>
          <stop offset="50%" stop-color="#f97316"/>
          <stop offset="100%" stop-color="#a855f7"/>
        </linearGradient>
      </defs>
      <!-- 바깥 회전 육각형 -->
      <g style="animation:rotCW 12s linear infinite;transform-origin:0 0">
        <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25"
          fill="none" stroke="url(#hg1)" stroke-width="1" opacity=".4" filter="url(#glow1)"/>
      </g>
      <!-- 중간 역회전 -->
      <g style="animation:rotCCW 8s linear infinite;transform-origin:0 0">
        <polygon points="0,-38 32.9,-19 32.9,19 0,38 -32.9,19 -32.9,-19"
          fill="none" stroke="#f97316" stroke-width="1.5" opacity=".65" filter="url(#glow1)"/>
      </g>
      <!-- 내부 회전 -->
      <g style="animation:rotCW 5s linear infinite;transform-origin:0 0">
        <polygon points="0,-26 22.5,-13 22.5,13 0,26 -22.5,13 -22.5,-13"
          fill="none" stroke="#e8a0b0" stroke-width="2" opacity=".85" filter="url(#glow1)"/>
      </g>
      <!-- 중심 다이아 -->
      <g style="animation:rotCCW 3s linear infinite;transform-origin:0 0">
        <polygon points="0,-14 14,0 0,14 -14,0"
          fill="none" stroke="#f0c96a" stroke-width="2" opacity=".95" filter="url(#glow1)"/>
      </g>
      <!-- 코어 -->
      <circle cx="0" cy="0" r="7" fill="#000"
        style="filter:drop-shadow(0 0 8px rgba(168,85,247,.9)) drop-shadow(0 0 18px rgba(249,115,22,.5));animation:pulse 2s ease-in-out infinite"/>
      <circle cx="0" cy="0" r="3.5" fill="#a855f7"
        style="animation:pulse2 1.5s ease-in-out infinite"/>
      <!-- 육각 꼭짓점 원 -->
      <circle cx="0" cy="-50" r="2" fill="#f5c6d0" opacity=".8"/>
      <circle cx="43.3" cy="-25" r="2" fill="#f97316" opacity=".8"/>
      <circle cx="43.3" cy="25" r="2" fill="#a855f7" opacity=".8"/>
      <circle cx="0" cy="50" r="2" fill="#f5c6d0" opacity=".8"/>
      <circle cx="-43.3" cy="25" r="2" fill="#f97316" opacity=".8"/>
      <circle cx="-43.3" cy="-25" r="2" fill="#a855f7" opacity=".8"/>
    </svg>
  </div>
  <span class="label">01 · Hexagon</span>
</div>

<!-- ══ 2. SACRED RING ══ -->
<div class="card">
  <div class="sym s2">
    <svg viewBox="-60 -60 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e8a0b0"/>
          <stop offset="50%" stop-color="#f97316"/>
          <stop offset="100%" stop-color="#a855f7"/>
        </linearGradient>
      </defs>
      <!-- 바깥 원 -->
      <g style="animation:rotCW 15s linear infinite;transform-origin:0 0">
        <circle cx="0" cy="0" r="52" fill="none" stroke="url(#sg2)" stroke-width="1" opacity=".4" filter="url(#glow2)" stroke-dasharray="8 4"/>
      </g>
      <circle cx="0" cy="0" r="46" fill="none" stroke="rgba(249,115,22,.35)" stroke-width="1" filter="url(#glow2)"/>
      <!-- 바깥 삼각형 위 -->
      <g style="animation:rotCW 20s linear infinite;transform-origin:0 0">

      </g>
      <!-- 바깥 삼각형 아래 -->
      <g style="animation:rotCCW 20s linear infinite;transform-origin:0 0">

      <g style="animation:rotCCW 8s linear infinite;transform-origin:0 0">

      </g>
      <!-- 안쪽 삼각 아래 -->
      <g style="animation:rotCW 8s linear infinite;transform-origin:0 0">
        <polygon points="0,26 22.5,-13 -22.5,-13"
          fill="none" stroke="#f97316" stroke-width="1.8" opacity=".8" filter="url(#glow2)"/>
      </g>
      <!-- 내부 원 -->
      <circle cx="0" cy="0" r="13" fill="none" stroke="rgba(240,201,106,.6)" stroke-width="1.5" filter="url(#glow2)"/>
      <!-- 코어 -->
      <circle cx="0" cy="0" r="7" fill="#000"
        style="filter:drop-shadow(0 0 10px rgba(249,115,22,.9)) drop-shadow(0 0 22px rgba(168,85,247,.5));"/>
      <circle cx="0" cy="0" r="3" fill="#f97316" style="animation:pulse2 2s ease-in-out infinite"/>
    </svg>
  </div>
  <span class="label">02 · Sacred</span>
</div>

<!-- ══ 3. METATRON ══ -->

      </defs>
      <!-- 외곽 원 회전 -->
      <g style="animation:rotCW 25s linear infinite;transform-origin:0 0">
        <circle cx="0" cy="0" r="52" fill="none" stroke="rgba(168,85,247,.25)" stroke-width="1" stroke-dasharray="3 6"/>

        <circle cx="45.07" cy="26" r="8" fill="none" stroke="rgba(168,85,247,.5)" stroke-width="1" filter="url(#glow3)"/>
        <circle cx="0" cy="52" r="8" fill="none" stroke="rgba(249,115,22,.5)" stroke-width="1" filter="url(#glow3)"/>
        <circle cx="-45.07" cy="26" r="8" fill="none" stroke="rgba(232,160,176,.5)" stroke-width="1" filter="url(#glow3)"/>

      </g>

      <g style="animation:rotCCW 18s linear infinite;transform-origin:0 0;opacity:.55">

        <line x1="-34.64" y1="20" x2="0" y2="-40" stroke="#a855f7" stroke-width="1" filter="url(#glow3)"/>

        <line x1="-34.64" y1="-20" x2="0" y2="40" stroke="#e8a0b0" stroke-width="1" filter="url(#glow3)"/>
      </g>

<!-- ══ 4. OCTAGRAM ══ -->

<!-- ══ 5. TORUS KNOT ══ -->

    <svg viewBox="-60 -60 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>

</div>

<!-- ══ 6. SRI YANTRA ══ -->
<div class="card">
  <div class="sym s6">
    <svg viewBox="-60 -60 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow6"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- 바깥 사각형 -->
      <g style="animation:rotCW 20s linear infinite;transform-origin:0 0">
        <rect x="-52" y="-52" width="104" height="104" fill="none" stroke="rgba(249,115,22,.3)" stroke-width="1"/>
      </g>
