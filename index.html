<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>YTAnalytics Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--card:#1e1e2e;
  --acc:#6c63ff;--acc2:#ff6584;--acc3:#43e97b;--acc4:#f7971e;
  --txt:#e8e8f0;--txt2:#9999bb;--border:#2a2a3e;
  --header-h:62px;--ad-h:0px;--top-offset:62px;
  --radius:14px;--shadow:0 8px 32px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);padding-top:var(--top-offset);transition:padding-top .3s}

/* ── STICKY AD ── */
#sticky-ad{
  position:fixed;top:var(--header-h);left:0;right:0;z-index:900;
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 12px;
  transition:transform .3s;
}
#sticky-ad.hidden{transform:translateY(-110%)}
#sticky-ad ins{display:block;min-height:60px;flex:1;max-width:728px}
#ad-toggle{
  position:fixed;top:calc(var(--header-h) + var(--ad-h) - 1px);right:10px;z-index:901;
  background:var(--acc);color:#fff;border:none;border-radius:0 0 8px 8px;
  font-size:11px;padding:3px 10px;cursor:pointer;
}

/* ── HEADER ── */
header{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--header-h);
  background:linear-gradient(135deg,#0d0d1a,#1a1a2e);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;
}
.logo{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.nav-tabs{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{
  padding:7px 14px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:500;
  background:transparent;color:var(--txt2);transition:all .2s;white-space:nowrap;
}
.nav-tab.active,.nav-tab:hover{background:var(--acc);color:#fff}
.header-credits{
  background:linear-gradient(135deg,var(--acc4),#f9c220);color:#000;
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer;
}

/* ── LAYOUT ── */
.app{display:flex;min-height:calc(100vh - var(--top-offset))}
aside{
  width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  position:sticky;top:var(--top-offset);height:calc(100vh - var(--top-offset));overflow-y:auto;padding:16px 10px;
}
.sidebar-sec{margin-bottom:20px}
.sidebar-sec h4{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;padding:0 8px 8px}
.side-btn{
  width:100%;padding:9px 12px;border-radius:10px;border:none;cursor:pointer;
  background:transparent;color:var(--txt2);font-size:13px;text-align:left;transition:all .2s;display:flex;align-items:center;gap:8px;
}
.side-btn:hover,.side-btn.active{background:var(--acc);color:#fff}
main{flex:1;padding:20px;overflow-x:hidden}
.section{display:none}.section.active{display:block}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:16px}
.card h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* ── VIDEO GRID ── */
.hot-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.search-wrap{display:flex;gap:8px;flex:1;min-width:200px}
.search-wrap input{
  flex:1;padding:9px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg3);color:var(--txt);font-size:13px;
}
.search-wrap input:focus{outline:none;border-color:var(--acc)}
.search-wrap button{
  padding:9px 18px;border-radius:20px;border:none;background:var(--acc);color:#fff;cursor:pointer;font-size:13px;
}
.type-tabs{display:flex;gap:6px}
.type-tab{
  padding:7px 16px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);
  color:var(--txt2);cursor:pointer;font-size:12px;transition:all .2s;
}
.type-tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.cat-chips{display:flex;gap:6px;flex-wrap:wrap}
.cat-chip{
  padding:5px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);
  color:var(--txt2);cursor:pointer;font-size:12px;transition:all .2s;
}
.cat-chip:hover,.cat-chip.active{background:var(--acc2);color:#fff;border-color:var(--acc2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.vcard{background:var(--bg3);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .2s,box-shadow .2s}
.vcard:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.vcard-thumb{position:relative;padding-top:56.25%;overflow:hidden}
.vcard-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.badge{position:absolute;top:6px;left:6px;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700}
.badge.shorts{background:#ff0000;color:#fff}
.badge.long{background:#1a73e8;color:#fff}
.vcard-info{padding:10px}
.vcard-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vcard-meta{font-size:11px;color:var(--txt2);display:flex;gap:8px;flex-wrap:wrap}
.viral-bar{height:3px;border-radius:2px;margin-top:8px;background:linear-gradient(90deg,var(--acc3),var(--acc2))}

/* ── CHANNEL ANALYSIS ── */
.ch-input-row{display:flex;gap:10px;margin-bottom:16px}
.ch-input-row input{
  flex:1;padding:11px 16px;border-radius:12px;border:1px solid var(--border);
  background:var(--bg3);color:var(--txt);font-size:14px;
}
.btn-primary{
  padding:11px 24px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));
  color:#fff;font-weight:700;cursor:pointer;font-size:14px;transition:opacity .2s;
}
.btn-primary:hover{opacity:.85}
.ch-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.stat-box{background:var(--bg3);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-lbl{font-size:11px;color:var(--txt2);margin-top:4px}

/* ── TOOLS GRID ── */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.tool-card{
  background:var(--bg3);border-radius:14px;border:1px solid var(--border);padding:16px;
  transition:transform .2s,box-shadow .2s;cursor:pointer;text-decoration:none;color:var(--txt);display:block;
}
.tool-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--acc)}
.tool-icon{font-size:32px;margin-bottom:10px}
.tool-name{font-size:14px;font-weight:700;margin-bottom:4px}
.tool-desc{font-size:11px;color:var(--txt2);line-height:1.5}
.tool-tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;margin-top:6px}
.tag-free{background:rgba(67,233,123,.15);color:var(--acc3)}
.tag-paid{background:rgba(255,101,132,.15);color:var(--acc2)}
.tag-freemium{background:rgba(108,99,255,.15);color:var(--acc)}
.tool-section-title{font-size:18px;font-weight:800;margin:24px 0 14px;display:flex;align-items:center;gap:10px;color:var(--txt)}
.tool-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── AD GATE ── */
.modal-blur{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal-blur.show{display:flex}
.modal-box{background:var(--card);border-radius:20px;padding:32px;max-width:420px;width:90%;text-align:center;border:1px solid var(--border);position:relative}
.modal-box h2{font-size:22px;margin-bottom:10px}
.modal-box p{color:var(--txt2);font-size:14px;margin-bottom:20px;line-height:1.6}
.circle-wrap{position:relative;width:90px;height:90px;margin:0 auto 18px}
.circle-wrap svg{transform:rotate(-90deg)}
.circle-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--acc)}
.ad-skip-btn{
  display:block;width:100%;padding:13px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:700;font-size:15px;cursor:pointer;
  margin-top:10px;pointer-events:none;opacity:.5;transition:opacity .2s;
}
.ad-skip-btn.ready{pointer-events:auto;opacity:1}

/* ── VIDEO POPUP ── */
.vid-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:3000;display:none;align-items:center;justify-content:center}
.vid-modal.show{display:flex}
.vid-wrap{display:flex;gap:12px;align-items:flex-start;max-width:1200px;width:95%}
.vid-side-ad{width:160px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.vid-side-ad ins{display:block;min-height:300px}
.vid-center{flex:1;max-width:700px}
.vid-center iframe{width:100%;aspect-ratio:16/9;border-radius:12px;border:none}
.vid-close{position:absolute;top:16px;right:20px;background:var(--acc2);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer}

/* ── REVENUE CALC ── */
.calc-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.calc-row label{font-size:13px;color:var(--txt2);display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.calc-row input[type=range]{width:100%}
.calc-result{background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:12px;padding:20px;text-align:center;margin-top:12px}
.calc-result .num{font-size:32px;font-weight:900;color:#fff}
.calc-result .sub{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px}

/* ── RESPONSIVE ── */
@media(max-width:900px){aside{display:none}.vid-side-ad{display:none}}
@media(max-width:600px){.grid{grid-template-columns:1fr 1fr}.tools-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- ===== STICKY AD ===== -->
<div id="sticky-ad">
  <ins class="adsbygoogle" style="display:block;min-height:60px;max-width:728px;width:100%"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="1111111111" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
</div>
<button id="ad-toggle" onclick="toggleStickyAd()">▲ 광고 숨기기</button>

<!-- ===== HEADER ===== -->
<header>
  <div class="logo">⚡ YT Pro</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showSection('hot')"><i class="fa fa-fire"></i> 인기영상</button>
    <button class="nav-tab" onclick="showSection('analyze')"><i class="fa fa-chart-bar"></i> 채널분석</button>
    <button class="nav-tab" onclick="showSection('ai')"><i class="fa fa-robot"></i> AI 아이디어</button>
    <button class="nav-tab" onclick="showSection('tools')"><i class="fa fa-tools"></i> 영상제작도구</button>
    <button class="nav-tab" onclick="showSection('revenue')"><i class="fa fa-won-sign"></i> 수익계산기</button>
  </div>
  <div class="header-credits" onclick="showSection('analyze')">💎 <span id="credit-display">0</span></div>
</header>

<!-- ===== LAYOUT ===== -->
<div class="app">
<aside>
  <div class="sidebar-sec">
    <h4>메뉴</h4>
    <button class="side-btn active" onclick="showSection('hot')"><i class="fa fa-fire"></i> 인기영상</button>
    <button class="side-btn" onclick="showSection('analyze')"><i class="fa fa-chart-bar"></i> 채널분석</button>
    <button class="side-btn" onclick="showSection('ai')"><i class="fa fa-robot"></i> AI 아이디어</button>
    <button class="side-btn" onclick="showSection('tools')"><i class="fa fa-tools"></i> 제작도구</button>
    <button class="side-btn" onclick="showSection('revenue')"><i class="fa fa-calculator"></i> 수익계산기</button>
  </div>
  <div class="sidebar-sec">
    <h4>바이럴 카테고리</h4>
    <div id="sidebar-cats"></div>
  </div>
</aside>

<main>

<!-- ====== HOT VIDEOS ====== -->
<section id="sec-hot" class="section active">
  <div class="card">
    <h3><i class="fa fa-fire" style="color:var(--acc2)"></i> 실시간 인기 영상</h3>
    <div class="hot-controls">
      <div class="search-wrap">
        <!-- ★ FIX: oninput 제거, Enter키 + 버튼으로만 검색 트리거 -->
        <input id="hot-search" type="text" placeholder="🔍 키워드 검색..." onkeydown="if(event.key==='Enter')manualSearch()"/>
        <button onclick="manualSearch()"><i class="fa fa-search"></i> 검색</button>
      </div>
      <div class="type-tabs">
        <button class="type-tab active" onclick="setType('all',this)">전체</button>
        <button class="type-tab" onclick="setType('short',this)">🩳 쇼츠</button>
        <button class="type-tab" onclick="setType('long',this)">🎬 롱폼</button>
      </div>
    </div>
    <div class="cat-chips" id="cat-chips"></div>
    <div style="margin-top:14px" id="hot-grid"><div style="text-align:center;padding:40px;color:var(--txt2)"><i class="fa fa-spinner fa-spin" style="font-size:28px"></i><p style="margin-top:10px">로딩 중...</p></div></div>
  </div>
</section>

<!-- ====== ANALYZE ====== -->
<section id="sec-analyze" class="section">
  <div class="card">
    <h3><i class="fa fa-chart-bar" style="color:var(--acc)"></i> 채널 분석</h3>
    <div class="ch-input-row">
      <input id="ch-input" type="text" placeholder="채널 핸들(@handle), URL, 또는 채널명 입력" onkeydown="if(event.key==='Enter')startAnalyze()"/>
      <button class="btn-primary" onclick="startAnalyze()"><i class="fa fa-search"></i> 분석</button>
    </div>
    <div id="ch-result"></div>
  </div>
</section>

<!-- ====== AI IDEAS ====== -->
<section id="sec-ai" class="section">
  <div class="card">
    <h3><i class="fa fa-robot" style="color:var(--acc3)"></i> AI 바이럴 아이디어</h3>
    <div id="ai-ideas"></div>
  </div>
</section>

<!-- ====== TOOLS ====== -->
<section id="sec-tools" class="section">
  <div class="card">
    <h3><i class="fa fa-tools" style="color:var(--acc4)"></i> 영상 제작 완전정복 도구 모음</h3>
    <p style="color:var(--txt2);font-size:13px;margin-bottom:4px">이 페이지 하나로 기획→촬영→편집→배포→수익화까지 전 과정 해결</p>
    <div id="tools-content"></div>
  </div>
</section>

<!-- ====== REVENUE ====== -->
<section id="sec-revenue" class="section">
  <div class="card">
    <h3><i class="fa fa-won-sign" style="color:var(--acc4)"></i> 유튜브 수익 계산기</h3>
    <div class="calc-row">
      <label>월 조회수 <b id="v-val">100만</b>
        <input type="range" min="10000" max="10000000" step="10000" value="1000000" oninput="calcRev()" id="r-views"/>
      </label>
      <label>CPM (달러) <b id="c-val">$3</b>
        <input type="range" min="0.5" max="20" step="0.5" value="3" oninput="calcRev()" id="r-cpm"/>
      </label>
      <label>CTR (%) <b id="t-val">3%</b>
        <input type="range" min="0.5" max="15" step="0.5" value="3" oninput="calcRev()" id="r-ctr"/>
      </label>
    </div>
    <div class="calc-result" id="calc-out"></div>
    <div style="margin-top:20px" id="rev-tips"></div>
  </div>
</section>

</main>
</div>

<!-- ===== AD GATE MODAL ===== -->
<div class="modal-blur" id="ad-gate">
  <div class="modal-box">
    <h2>⚡ 분석 크레딧 충전</h2>
    <p>광고를 시청하면 채널 분석 크레딧 <strong>+3개</strong>가 지급됩니다.<br>광고 시청 후 버튼이 활성화됩니다.</p>
    <div class="circle-wrap">
      <svg width="90" height="90"><circle cx="45" cy="45" r="38" fill="none" stroke="var(--border)" stroke-width="6"/>
      <circle id="gate-circ" cx="45" cy="45" r="38" fill="none" stroke="var(--acc)" stroke-width="6" stroke-dasharray="238.8" stroke-dashoffset="238.8" stroke-linecap="round"/></svg>
      <div class="circle-num" id="gate-num">15</div>
    </div>
    <ins class="adsbygoogle" style="display:block;min-height:90px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="2222222222" data-ad-format="rectangle"></ins>
    <button class="ad-skip-btn" id="gate-btn" onclick="closeAdGate()">⏳ 광고 시청 중...</button>
  </div>
</div>

<!-- ===== INTERSTITIAL ===== -->
<div class="modal-blur" id="inter-modal">
  <div class="modal-box">
    <h2>🎬 다음 카테고리 로딩 중</h2>
    <p>잠시 광고를 시청해 주세요.</p>
    <div class="circle-wrap">
      <svg width="90" height="90"><circle cx="45" cy="45" r="38" fill="none" stroke="var(--border)" stroke-width="6"/>
      <circle id="inter-circ" cx="45" cy="45" r="38" fill="none" stroke="var(--acc2)" stroke-width="6" stroke-dasharray="238.8" stroke-dashoffset="238.8" stroke-linecap="round"/></svg>
      <div class="circle-num" id="inter-num">5</div>
    </div>
    <ins class="adsbygoogle" style="display:block;min-height:90px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="3333333333" data-ad-format="rectangle"></ins>
    <button class="ad-skip-btn" id="inter-btn" onclick="closeInter()">⏳ 잠시만요...</button>
  </div>
</div>

<!-- ===== VIDEO POPUP ===== -->
<div class="vid-modal" id="vid-modal" onclick="if(event.target===this)closeVid()">
  <div class="vid-wrap">
    <div class="vid-side-ad">
      <ins class="adsbygoogle" style="display:block;width:160px;height:300px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="4444444444"></ins>
      <ins class="adsbygoogle" style="display:block;width:160px;height:250px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="5555555555"></ins>
    </div>
    <div class="vid-center" id="vid-frame-wrap"></div>
    <div class="vid-side-ad">
      <ins class="adsbygoogle" style="display:block;width:160px;height:300px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="6666666666"></ins>
      <ins class="adsbygoogle" style="display:block;width:160px;height:250px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="7777777777"></ins>
    </div>
  </div>
  <button class="vid-close" onclick="closeVid()">✕</button>
</div>

<script>
/* ============================================================
   CONFIG
============================================================ */
const CFG = {
  KEYS: ['AIzaSyAYi9B4vIFjl75uYBS56GbTSMJfV_TLuzE','AIzaSyAOxeRU2ZbMEzskqVvcErs_BAXNQlz2_zs','AIzaSyCEAvGfUpGLZOr3TYLr4WrRd40Pc7e01bE']
,
  keyIdx: 0,
  REGION: 'KR',
  MAX_EACH: 25,
  AD_DUR: 15,
  INTER_DUR: 5,
  TYPE: 'all',        // 'all' | 'short' | 'long'
  CURRENT_QUERY: '',  // ★ 현재 검색어 (카테고리 or 수동 검색)
  IS_MANUAL: false,   // 수동 검색 여부
  LAST_CAT: null,
};

/* ============================================================
   VIRAL CATEGORIES — 강력한 해시태그 포함 쿼리
============================================================ */
const CATS = [

/* ============================================================
   CACHE
============================================================ */
const CACHE = {
  _s:{},
  key(url){ return url.replace(/[&?]key=[^&]*/g,''); },
  get(url){ const k=this.key(url); return this._s[k]||null; },
  set(url,d){ this._s[this.key(url)]=d; },
};

/* ============================================================
   API CALL
============================================================ */
async function apiCall(endpoint, params={}) {
  const key = CFG.KEYS[CFG.keyIdx % CFG.KEYS.length];
  const qs = new URLSearchParams({...params, key}).toString();
  const url = `https://www.googleapis.com/youtube/v3/${endpoint}?${qs}`;
  const cached = CACHE.get(url);
  if(cached) return cached;
  const res = await fetch(url);
  if(!res.ok){
    CFG.keyIdx++;
    if(CFG.keyIdx < CFG.KEYS.length * 2) return apiCall(endpoint, params);
    throw new Error('API quota exceeded');
  }
  const data = await res.json();
  CACHE.set(url, data);
  return data;
}

/* ============================================================
   ★ IS SHORTS (≤180s OR #Shorts in title/desc)
============================================================ */
function isShorts(vid){
  const dur = vid._durationSec || 0;
  const title = (vid.snippet?.title||'').toLowerCase();
  const desc = (vid.snippet?.description||'').toLowerCase();
  return dur <= 180 || title.includes('#shorts') || desc.includes('#shorts');
}
function parseDuration(iso){
  if(!iso) return 0;
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return 0;
  return (parseInt(m[1]||0)*3600)+(parseInt(m[2]||0)*60)+parseInt(m[3]||0);
}

/* ============================================================
   FETCH VIDEOS BY DURATION
   ★ FIX: q 파라미터를 encodeURIComponent 없이 URLSearchParams에 넘기면
          자동 인코딩됨 — 별도 encode 제거
============================================================ */
async function fetchByDuration(query, durParam, seen){
  const params = {
    part:'snippet',
    type:'video',
    maxResults: CFG.MAX_EACH,
    regionCode: CFG.REGION,
    relevanceLanguage:'ko',
    order:'viewCount',
    q: query,          // URLSearchParams가 자동 인코딩
  };
  if(durParam !== 'any') params.videoDuration = durParam; // short|medium|long
  let data;
  try{ data = await apiCall('search', params); }
  catch(e){ console.error(e); return []; }
  if(!data.items?.length) return [];

  const ids = data.items.map(i=>i.id?.videoId).filter(Boolean);
  let details;
  try{
    details = await apiCall('videos',{ part:'snippet,contentDetails,statistics', id: ids.join(',') });
  }catch(e){ return []; }

  return (details.items||[]).filter(v=>{
    if(seen.has(v.id)){ return false; }
    seen.add(v.id);
    v._durationSec = parseDuration(v.contentDetails?.duration);
    return true;
  });
}

/* ============================================================
   LOAD HOT VIDEOS
   ★ FIX: CFG.CURRENT_QUERY 사용, 빈 경우 기본값 설정
============================================================ */
async function loadHot(){
  const grid = document.getElementById('hot-grid');
  grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--txt2)"><i class="fa fa-spinner fa-spin" style="font-size:28px"></i><p style="margin-top:10px">검색 중...</p></div>';

  // ★ 쿼리가 비어있으면 인기 한국 영상 기본값
  let q = CFG.CURRENT_QUERY.trim();
  if(!q) q = '한국 인기 유튜브 2025';

  const seen = new Set();
  let items = [];

  if(CFG.TYPE === 'all'){
    const [shorts, longs] = await Promise.all([
      fetchByDuration(q, 'short', seen),
      fetchByDuration(q, 'medium', seen),
    ]);
    // 인터리브 (short-long-short-long...)
    const maxLen = Math.max(shorts.length, longs.length);
    for(let i=0;i<maxLen;i++){
      if(i<shorts.length) items.push(shorts[i]);
      if(i<longs.length)  items.push(longs[i]);
    }
  } else if(CFG.TYPE === 'short'){
    items = await fetchByDuration(q, 'short', seen);
    // API short(<4min)에서 실제 쇼츠(≤180s)만 필터
    items = items.filter(v=>isShorts(v));
    // 부족하면 medium에서도 보충
    if(items.length < 10){
      const extra = await fetchByDuration(q, 'medium', seen);
      items = [...items, ...extra.filter(v=>isShorts(v))];
    }
  } else {
    // long: medium + long (1분 초과)
    const [med, lng] = await Promise.all([
      fetchByDuration(q, 'medium', seen),
      fetchByDuration(q, 'long', seen),
    ]);
    items = [...med, ...lng].filter(v=>!isShorts(v));
  }

  if(!items.length){
    grid.innerHTML='<div style="text-align:center;padding:40px;color:var(--txt2)"><i class="fa fa-search" style="font-size:28px"></i><p style="margin-top:10px">검색 결과가 없습니다. 다른 키워드를 시도해보세요.</p></div>';
    return;
  }
  renderHotGrid(items);
}

function renderHotGrid(items){
  const grid = document.getElementById('hot-grid');
  const rendered = new Set();
  grid.innerHTML='';
  const g = document.createElement('div'); g.className='grid';
  items.forEach(v=>{
    if(rendered.has(v.id)) return;
    rendered.add(v.id);
    const shorts = isShorts(v);
    const views = parseInt(v.statistics?.viewCount||0);
    const viral = Math.min(100, Math.round((Math.log10(views+1)/7)*100));
    const dur = v._durationSec||0;
    const durStr = dur>=3600
      ? `${Math.floor(dur/3600)}:${String(Math.floor((dur%3600)/60)).padStart(2,'0')}:${String(dur%60).padStart(2,'0')}`
      : `${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}`;
    const thumb = v.snippet?.thumbnails?.medium?.url || v.snippet?.thumbnails?.default?.url || '';
    const card = document.createElement('div');
    card.className='vcard';
    card.innerHTML=`
      <div class="vcard-thumb">
        <img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'">
        <span class="badge ${shorts?'shorts':'long'}">${shorts?'Shorts':'롱폼'}</span>
        <span style="position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;padding:2px 6px;border-radius:6px">${durStr}</span>
      </div>
      <div class="vcard-info">
        <div class="vcard-title">${v.snippet?.title||''}</div>
        <div class="vcard-meta">
          <span>👁 ${fmtNum(views)}</span>
          <span>❤️ ${fmtNum(v.statistics?.likeCount||0)}</span>
          <span>💬 ${fmtNum(v.statistics?.commentCount||0)}</span>
        </div>
        <div class="viral-bar" style="width:${viral}%"></div>
        <div style="font-size:10px;color:var(--txt2);margin-top:3px">바이럴 지수 ${viral}</div>
      </div>`;
    card.onclick=()=>openVid(v.id);
    g.appendChild(card);
  });
  grid.appendChild(g);
}

/* ============================================================
   RESOLVE HANDLE — 6단계 폴백
============================================================ */
async function resolveHandle(raw){
  let handle = raw.trim();
  // URL에서 추출
  const urlMatch = handle.match(/youtube\.com\/(?:@|channel\/|c\/|user\/)([^/?&\s]+)/);
  if(urlMatch) handle = urlMatch[1];
  // channel/ 형식
  if(handle.startsWith('UC') && handle.length >= 20) return handle;

  const cleanHandle = handle.replace(/^@/,'');

  // 1) forHandle=@handle
  try{
    const d = await apiCall('channels',{part:'snippet,statistics',forHandle:'@'+cleanHandle});
    if(d.items?.[0]) return d.items[0].id;
  }catch(e){}

  // 2) forHandle=handle (@ 없이)
  try{
    const d = await apiCall('channels',{part:'snippet,statistics',forHandle:cleanHandle});
    if(d.items?.[0]) return d.items[0].id;
  }catch(e){}

  // 3) forUsername
  try{
    const d = await apiCall('channels',{part:'snippet,statistics',forUsername:cleanHandle});
    if(d.items?.[0]) return d.items[0].id;
  }catch(e){}

  // 4) search — 정확한 채널명 매칭
  try{
    const d = await apiCall('search',{part:'snippet',type:'channel',q:cleanHandle,maxResults:5,regionCode:'KR'});
    if(d.items?.length){
      const exact = d.items.find(i=>
        i.snippet?.channelTitle?.toLowerCase()===cleanHandle.toLowerCase() ||
        i.snippet?.customUrl?.replace('@','').toLowerCase()===cleanHandle.toLowerCase()
      );
      if(exact) return exact.snippet.channelId;
      return d.items[0].snippet.channelId; // 최상위 결과 반환
    }
  }catch(e){}

  // 5) search '@handle'
  try{
    const d = await apiCall('search',{part:'snippet',type:'channel',q:'@'+cleanHandle,maxResults:3});
    if(d.items?.[0]) return d.items[0].snippet.channelId;
  }catch(e){}

  // 6) search '채널'
  try{
    const d = await apiCall('search',{part:'snippet',type:'channel',q:cleanHandle+' 채널',maxResults:3});
    if(d.items?.[0]) return d.items[0].snippet.channelId;
  }catch(e){}

  return null;
}

      <div class="stat-box"><div class="stat-num">${vids.toLocaleString()}</div><div class="stat-lbl">영상 수</div></div>
      <div class="stat-box"><div class="stat-num">${fmtNum(avgViews)}</div><div class="stat-lbl">영상당 평균 조회</div></div>
      <div class="stat-box"><div class="stat-num" style="background:linear-gradient(135deg,var(--acc2),var(--acc4));-webkit-background-clip:text">${score}</div><div class="stat-lbl">채널 점수</div></div>
    </div>
    <div style="margin-top:16px;padding:14px;background:var(--bg3);border-radius:12px">

        <li>✅ 구독자 대비 조회수 비율: <b style="color:var(--acc3)">${subs>0?(views/subs).toFixed(1):'N/A'}x</b></li>

/* ============================================================
   REVENUE CALCULATOR
============================================================ */
function calcRev(){
  const views=parseInt(document.getElementById('r-views').value);
  const cpm=parseFloat(document.getElementById('r-cpm').value);
  const ctr=parseFloat(document.getElementById('r-ctr').value);
  document.getElementById('v-val').textContent=views>=1000000?`${(views/1000000).toFixed(1)}백만`:views>=10000?`${(views/10000).toFixed(0)}만`:`${views.toLocaleString()}`;
  document.getElementById('c-val').textContent=`$${cpm}`;
  document.getElementById('t-val').textContent=`${ctr}%`;
  const impressions=views*(ctr/100);
  const usd=impressions*(cpm/1000)*0.55; // 유튜브 수수료 45% 차감
  const krw=usd*1300;
  document.getElementById('calc-out').innerHTML=`
    <div class="num">₩${Math.round(krw).toLocaleString()}</div>
    <div class="sub">예상 월 수익 (광고 수익만 해당) | $${usd.toFixed(0)} USD</div>
    <div style="margin-top:8px;font-size:11px;opacity:.75">광고 노출 수: ${Math.round(impressions).toLocaleString()} | CPM: $${cpm} | 유튜브 45% 공제 반영</div>`;
}

/* ============================================================
   UTILS
============================================================ */
function fmtNum(n){
  n=parseInt(n)||0;
  if(n>=100000000) return (n/100000000).toFixed(1)+'억';
  if(n>=10000) return (n/10000).toFixed(1)+'만';
  if(n>=1000) return (n/1000).toFixed(1)+'천';
  return n.toLocaleString();
}
