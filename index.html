<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTAnalytics Pro – 유튜브 채널 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROOT & RESET
═══════════════════════════════════════════ */
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a25;
  --border: #2a2a3a;
  --text: #e8e8f0;
  --text2: #9090b0;
  --accent: #4f8ef7;
  --card-bg: #12121e;
  --card-border: #252535;
  --lv1: #9ca3af;
  --lv2: #6ee7b7;
  --lv3: #34d399;
  --lv4: #fbbf24;
  --lv5: #c0c0c0;
  --lv6: #d4d4d4;
  --lv7: #ffd700;
  --lv8: #00e5ff;
  --lv9: #ff1744;
  --lv10-a: #ff0080;
  --r: 14px;
  --sh: 0 4px 24px rgba(0,0,0,.6);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════════ */
@keyframes rainbowText {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes borderPulse {
  0%,100% { opacity: .5; }
  50%      { opacity: 1; }
}
@keyframes floatUp {
  0%   { transform: translateY(0) rotateY(0deg); }
  50%  { transform: translateY(-8px) rotateY(3deg); }
  100% { transform: translateY(0) rotateY(0deg); }
}
@keyframes fadeIn   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes shimmer  {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
@keyframes scoreCount { from { opacity:0; transform:scale(.8); } to { opacity:1; transform:scale(1); } }

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; height: 58px;
}
.logo { font-size: 1.2rem; font-weight: 900; color: #ff4040; flex-shrink: 0; letter-spacing: -0.5px; }
.logo span { color: var(--accent); }
.header-search {
  flex: 1; max-width: 420px;
  display: flex; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 24px; overflow: hidden;
}
.header-search input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); padding: 8px 16px; font-size: .88rem; font-family: inherit;
}
.header-search button {
  background: var(--accent); border: none; color: #fff;
  padding: 8px 14px; cursor: pointer; font-size: .85rem; transition: background .2s;
}
.header-search button:hover { background: #3a7ae8; }
.header-nav { display: flex; gap: 4px; margin-left: auto; }
.nav-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text2); padding: 5px 12px; border-radius: 18px;
  cursor: pointer; font-size: .78rem; font-family: inherit;
  transition: all .2s; white-space: nowrap;
}
.nav-btn:hover,.nav-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.menu-btn { display: none; background: none; border: 1px solid var(--border); color: var(--text); padding: 5px 9px; border-radius: 7px; cursor: pointer; }

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.layout { display: flex; min-height: calc(100vh - 58px); }
.sidebar {
  width: 210px; flex-shrink: 0;
  background: var(--bg2); border-right: 1px solid var(--border);
  padding: 14px 8px; position: sticky; top: 58px;
  height: calc(100vh - 58px); overflow-y: auto; transition: transform .3s;
}
.sidebar-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 11px; border-radius: 9px;
  cursor: pointer; color: var(--text2); font-size: .85rem;
  transition: all .2s; margin-bottom: 3px;
}
.sidebar-item:hover,.sidebar-item.active { background: var(--bg3); color: var(--text); transform: translateX(3px); }
.sidebar-icon { font-size: 1rem; width: 20px; text-align: center; }
.main { flex: 1; padding: 22px; overflow-y: auto; }
.section { display: none; animation: fadeIn .35s ease; }
.section.active { display: block; }

/* ═══════════════════════════════════════════
   COMMON CARDS
═══════════════════════════════════════════ */
.card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--r); padding: 18px;
  transition: transform .25s, box-shadow .25s;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--sh); }
.section-title {
  font-size: 1.3rem; font-weight: 900; margin-bottom: 18px; color: var(--text);
  display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(90deg,var(--accent),transparent); }
.tag { display: inline-block; padding: 3px 9px; border-radius: 18px; font-size: .72rem; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); margin: 2px; }

/* ═══════════════════════════════════════════
   ★ UNIFIED CARD DESIGN (dark card, only text is colored)
═══════════════════════════════════════════ */
.lv-card-wrap { perspective: 1000px; display: flex; justify-content: center; }

.lv-card {
  position: relative;
  width: 270px; height: 330px;
  border-radius: 20px;
  background: var(--card-bg);         /* ← unified dark background */
  border: 1px solid var(--card-border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0;
  transform-style: preserve-3d;
  animation: floatUp 5s ease-in-out infinite;
  transition: transform .5s, box-shadow .4s;
  overflow: hidden; cursor: pointer;
  box-shadow: 0 0 0 1px var(--card-border), var(--sh);
}
/* subtle inner glow only — no heavy border flash */
.lv-card::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 20px;
  background: radial-gradient(ellipse at 50% 110%, var(--lv-glow,#4f8ef7)18, transparent 65%);
  opacity: .18; pointer-events: none; z-index: 1;
}
.lv-card:hover { transform: rotateY(8deg) rotateX(-5deg) scale(1.03); box-shadow: 0 16px 48px rgba(0,0,0,.7); }

/* spark canvas */
.lv-card canvas.spark-canvas {
  position: absolute; inset: 0; width: 100%; height: 100%;
  border-radius: 20px; z-index: 0; pointer-events: none;
}

/* ── LEVEL NUMBER (colored) ── */
.lv-num {
  font-size: 5.5rem; font-weight: 900; line-height: 1;
  position: relative; z-index: 2;
  color: var(--lv-color, #9ca3af);
  -webkit-text-stroke: var(--lv-stroke, 3px) var(--lv-color, #9ca3af);
  text-shadow: 0 0 24px var(--lv-color,#9ca3af), 0 0 48px var(--lv-color,#9ca3af)66;
  filter: drop-shadow(0 0 10px var(--lv-color,#9ca3af));
  letter-spacing: -2px;
}
.lv-num.rainbow {
  background: linear-gradient(90deg,#ff0080,#ff6b00,#ffd700,#00e5ff,#7c3aed,#ff0080);
  background-size: 300% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; -webkit-text-stroke: 0;
  animation: rainbowText 2.5s linear infinite; filter: none;
}

/* ── LEVEL LABEL ── */
.lv-label {
  font-size: .68rem; font-weight: 700; letter-spacing: 4px;
  color: var(--text2); text-transform: uppercase;
  position: relative; z-index: 2; margin-top: -6px;
}

/* ── GRADE NAME (colored) ── */
.lv-name {
  font-size: 1.1rem; font-weight: 700;
  color: var(--lv-color, #9ca3af);
  position: relative; z-index: 2; margin-top: 10px;
  -webkit-text-stroke: var(--name-stroke, 1px) var(--lv-color,#9ca3af);
  text-shadow: 0 0 10px var(--lv-color,#9ca3af)88;
}
.lv-name.rainbow {
  background: linear-gradient(90deg,#ff0080,#ff6b00,#ffd700,#00e5ff,#7c3aed,#ff0080);
  background-size: 300% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; -webkit-text-stroke: 0;
  animation: rainbowText 2.5s linear infinite;
}

/* ── sub info (neutral) ── */
.lv-range { font-size: .75rem; color: var(--text2); position: relative; z-index: 2; margin-top: 5px; text-align: center; }
.lv-play {
  font-size: .68rem; padding: 3px 11px; border-radius: 18px;
  border: 1px solid var(--card-border); color: var(--text2);
  background: var(--bg3); position: relative; z-index: 2; margin-top: 10px;
}

/* rank / pct overlays */
.lv-rank-badge {
  position: absolute; top: 11px; left: 13px;
  font-size: .65rem; padding: 3px 7px; border-radius: 8px;
  background: rgba(0,0,0,.55); border: 1px solid var(--card-border);
  color: var(--text2); z-index: 3;
}
.lv-pct-ring { position: absolute; top: 8px; right: 11px; width: 44px; height: 44px; z-index: 3; }
.lv-pct-ring svg { width: 100%; height: 100%; }
.lv-pct-text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .58rem; font-weight: 700; line-height: 1.2; text-align: center;
  color: var(--lv-color, #9ca3af);
}

/* algo score overlay */
.lv-score-badge {
  position: absolute; bottom: 12px; left: 0; right: 0;
  display: flex; justify-content: center; z-index: 3;
}
.lv-score-inner {
  background: rgba(0,0,0,.6); border: 1px solid var(--card-border);
  border-radius: 20px; padding: 4px 14px;
  font-size: .7rem; color: var(--text2);
}
.lv-score-inner span { color: var(--lv-color,#9ca3af); font-weight: 700; }

/* ═══════════════════════════════════════════
   ANALYSIS LAYOUT
═══════════════════════════════════════════ */
.analysis-container { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; }

/* right panels */
.analysis-right { display: flex; flex-direction: column; gap: 12px; }
.ch-info-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 12px; padding: 13px 16px;
}
.ch-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--card-border); }
.ch-meta h3 { font-size: .95rem; font-weight: 700; }
.ch-meta p  { font-size: .75rem; color: var(--text2); margin-top: 2px; line-height: 1.4; }

/* ── SCORE BREAKDOWN CARD ── */
.score-breakdown {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 12px; padding: 16px;
}
.score-breakdown h4 { font-size: .88rem; font-weight: 700; margin-bottom: 12px; }

.score-row { margin-bottom: 10px; }
.score-row-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: .8rem; }
.score-key { color: var(--text2); }
.score-val { font-weight: 700; }
.bonus-tag { font-size: .65rem; padding: 1px 7px; border-radius: 8px; background: #1a2e0a; color: #4ade80; border: 1px solid #2a4a14; margin-left: 5px; }
.score-bar-wrap { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.score-bar { height: 100%; border-radius: 3px; transition: width 1.2s cubic-bezier(.22,1,.36,1); }

/* total score */
.total-score-box {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg3); border-radius: 10px; padding: 12px 16px;
  border: 1px solid var(--card-border); margin-top: 10px;
  animation: scoreCount .6s ease;
}
.total-score-label { font-size: .8rem; color: var(--text2); }
.total-score-num { font-size: 1.6rem; font-weight: 900; }
.total-score-num.rainbow {
  background: linear-gradient(90deg,#ff0080,#ffd700,#00e5ff);
  background-size: 300% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rainbowText 2s linear infinite;
}

/* algo factors grid */
.factor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.factor-box {
  background: var(--bg3); border: 1px solid var(--card-border);
  border-radius: 9px; padding: 10px 12px;
}
.factor-label { font-size: .7rem; color: var(--text2); margin-bottom: 3px; }
.factor-val   { font-size: 1rem; font-weight: 700; }
.factor-sub   { font-size: .65rem; color: var(--text2); margin-top: 1px; }
.factor-bonus { font-size: .62rem; color: #4ade80; font-weight: 700; margin-top: 2px; }

/* level decision row */
.lv-decision {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 10px; padding: 10px 14px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.lv-dec-badge {
  font-size: .8rem; font-weight: 700; padding: 4px 12px;
  border-radius: 12px; background: var(--bg3); border: 1px solid var(--card-border);
}
.lv-dec-arrow { color: var(--text2); font-size: .8rem; }
.lv-dec-final { font-size: .88rem; font-weight: 900; }

/* ═══════════════════════════════════════════
   GRADE TABLE
═══════════════════════════════════════════ */
.grade-controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.toggle-btn {
  padding: 5px 14px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text2); cursor: pointer; font-size: .8rem; font-family: inherit; transition: all .2s;
}
.toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* table */
.grade-table-wrap { overflow-x: auto; }
table.grade-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
.grade-table th {
  background: var(--bg3); color: var(--text2); font-weight: 600;
  padding: 9px 10px; text-align: left; border-bottom: 2px solid var(--border); white-space: nowrap;
}
.grade-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.grade-table tr { cursor: pointer; transition: background .15s; }
.grade-table tr:hover   { background: var(--bg3); }
.grade-table tr.selected{ background: rgba(79,142,247,.1); }

/* LV chip — dark bg, colored text */
.lv-chip {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--card-bg); border: 2px solid var(--chip-color,#555);
  font-size: .75rem; font-weight: 900;
  color: var(--chip-color,#9ca3af);
  -webkit-text-stroke: var(--chip-stroke,.5px) var(--chip-color,#9ca3af);
  text-shadow: 0 0 8px var(--chip-color,#9ca3af);
}
.ach-bar-wrap { width: 72px; height: 5px; background: var(--border); border-radius: 3px; }
.ach-bar { height: 100%; border-radius: 3px; }

/* card grid */
.grade-card-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 12px; }

/* ── grade mini card: dark unified bg ── */
.grade-mini-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 13px; padding: 16px 12px;
  text-align: center; cursor: pointer; position: relative; overflow: hidden;
  transition: transform .28s, box-shadow .28s;
}
.grade-mini-card::after {
  content: '';
  position: absolute; inset: 0; border-radius: 13px;
  background: radial-gradient(ellipse at 50% 120%, var(--gmc,#4f8ef7)20, transparent 60%);
  opacity: .12; pointer-events: none;
}
.grade-mini-card:hover { transform: translateY(-5px); box-shadow: 0 8px 28px rgba(0,0,0,.5); border-color: var(--gmc,#555); }
.grade-mini-card.selected { border-color: var(--gmc,#555); box-shadow: 0 0 0 2px var(--gmc,#555)55; }

.gmc-num {
  font-size: 2.5rem; font-weight: 900; line-height: 1.1;
  color: var(--gmc,#9ca3af);
  -webkit-text-stroke: var(--gmc-stroke,2px) var(--gmc,#9ca3af);
  text-shadow: 0 0 12px var(--gmc,#9ca3af);
  position: relative; z-index: 1;
}
.gmc-num.rainbow {
  background: linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#7c3aed,#ff0080);
  background-size:300% 100%; -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; -webkit-text-stroke:0; animation:rainbowText 2.5s linear infinite;
}
.gmc-name {
  font-size: .75rem; font-weight: 700; color: var(--gmc,#9ca3af);
  position: relative; z-index: 1; margin-top: 3px;
  -webkit-text-stroke: .3px var(--gmc,#9ca3af);
}
.gmc-name.rainbow {
  background: linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#7c3aed,#ff0080);
  background-size:300% 100%; -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; -webkit-text-stroke:0; animation:rainbowText 2.5s linear infinite;
}
.gmc-range { font-size: .64rem; color: var(--text2); position: relative; z-index: 1; margin-top: 3px; }
.gmc-pct   { font-size: .64rem; color: var(--gmc,#9ca3af); opacity: .75; position: relative; z-index: 1; margin-top: 1px; }
.gmc-btn   {
  margin-top: 7px; font-size: .65rem; padding: 3px 9px;
  border-radius: 10px; border: 1px solid var(--card-border);
  background: var(--bg3); color: var(--text2);
  cursor: pointer; font-family: inherit; position: relative; z-index: 1; transition: all .2s;
}
.gmc-btn:hover { border-color: var(--gmc,#555); color: var(--gmc,#9ca3af); }

/* ═══════════════════════════════════════════
   COMPARE PANEL
═══════════════════════════════════════════ */
.compare-panel { display: none; margin-top: 18px; animation: fadeIn .35s ease; }
.compare-panel.show { display: block; }
.compare-grid { display: grid; grid-template-columns: 1fr 1.08fr 1fr; gap: 12px; margin-bottom: 14px; }

.cmp-card {
  border-radius: 13px; padding: 15px; text-align: center;
  background: var(--card-bg); border: 1px solid var(--card-border);
  transition: transform .3s;
}
.cmp-card.curr {
  border-color: var(--c-color,#4f8ef7);
  box-shadow: 0 0 18px var(--c-color,#4f8ef7)33; transform: scale(1.03);
}
.cmp-label { font-size: .62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); margin-bottom: 7px; }
.cmp-num {
  font-size: 2.6rem; font-weight: 900; line-height: 1;
  color: var(--c-color,#fff);
  -webkit-text-stroke: var(--c-stroke,2px) var(--c-color,#fff);
  text-shadow: 0 0 14px var(--c-color,#fff);
}
.cmp-num.rainbow {
  background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;
}
.cmp-name  { font-size: .8rem; font-weight: 700; color: var(--c-color,#fff); margin-top: 3px; }
.cmp-range { font-size: .68rem; color: var(--text2); margin-top: 2px; }
.cmp-pct   { font-size: .68rem; color: var(--c-color,#fff); opacity:.8; margin-top: 1px; }

/* ═══════════════════════════════════════════
   EFFECT MODAL
═══════════════════════════════════════════ */
.modal-overlay { display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center; }
.modal-overlay.open { display:flex; }
.effect-modal {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 18px; width:min(780px,96vw); max-height:90vh;
  overflow-y:auto; padding:24px; animation:fadeIn .3s ease;
}
.modal-head { display:flex;justify-content:space-between;align-items:center;margin-bottom:18px; }
.modal-head h2 { font-size:1.1rem;font-weight:900; }
.modal-close {
  background:none;border:1px solid var(--border);color:var(--text);
  width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.modal-close:hover{background:var(--bg3);border-color:var(--accent);}
.modal-nav{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;justify-content:center;}
.lv-nav-btn {
  width:32px;height:32px;border-radius:50%;border:2px solid var(--nb-color,#555);
  background:var(--card-bg);color:var(--nb-color,#aaa);
  font-size:.75rem;font-weight:900;cursor:pointer;transition:all .2s;font-family:inherit;
}
.lv-nav-btn:hover,.lv-nav-btn.active{background:var(--nb-color,#555);color:#000;transform:scale(1.12);}
.modal-body{display:grid;grid-template-columns:250px 1fr;gap:20px;align-items:start;}

/* prev card in modal — same unified dark */
.prev-card-wrap{perspective:600px;display:flex;justify-content:center;}
.prev-card {
  width:230px;height:290px;border-radius:17px;
  background:var(--card-bg);border:1px solid var(--card-border);
  position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  transform-style:preserve-3d;animation:floatUp 3.5s ease-in-out infinite;overflow:hidden;
}
.prev-card::after {

class Spark {
  constructor(canvas, g) {
    this.c = canvas; this.ctx = canvas.getContext('2d');
    this.g = g; this.particles = []; this.raf = null;
  }
  _spawn() {
    const W = this.c.width, H = this.c.height;
    const side = Math.floor(Math.random() * 4);
    let x, y, vx, vy;
    const spd = 0.7 + Math.random() * 1.6 * this.g.intensity;
    if (side===0){x=Math.random()*W;y=H;vx=(Math.random()-.5)*1.8;vy=-spd;}
    else if(side===1){x=0;y=Math.random()*H;vx=spd;vy=(Math.random()-.5)*1.8;}
    else if(side===2){x=W;y=Math.random()*H;vx=-spd;vy=(Math.random()-.5)*1.8;}
    else{x=Math.random()*W;y=0;vx=(Math.random()-.5)*1.8;vy=spd;}
    const isR = this.g.lv === 10;
    const palette = isR
      ? ['#ff0080','#7c3aed','#00e5ff','#ffd700','#ff4500']
      : [this.g.color, '#ffffff', this.g.color + '99'];
    return {
      x, y, vx, vy,
      maxLife: 0.7 + Math.random() * 1.3,
      life: 0.7 + Math.random() * 1.3,
      size: 1.1 + Math.random() * 2.4 * this.g.intensity,
      color: palette[Math.floor(Math.random() * palette.length)],
      trail: []
    };
  }
  tick() {
    const W = this.c.width, H = this.c.height, ctx = this.ctx;
    ctx.clearRect(0, 0, W, H);
    const n = Math.ceil(this.g.intensity * 5);
    for (let i = 0; i < n; i++) this.particles.push(this._spawn());
    this.particles = this.particles.filter(p => p.life > 0);
    for (const p of this.particles) {
      p.trail.push({x: p.x, y: p.y});
      if (p.trail.length > 6) p.trail.shift();
      p.x += p.vx; p.y += p.vy; p.vy -= 0.025 * this.g.intensity; p.vx *= 0.985;
      p.life -= 0.022;
      const a = Math.max(0, p.life / p.maxLife);
      if (p.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(p.trail[0].x, p.trail[0].y);
        for (let i = 1; i < p.trail.length; i++) ctx.lineTo(p.trail[i].x, p.trail[i].y);
        ctx.strokeStyle = p.color + Math.floor(a * 70).toString(16).padStart(2,'0');
        ctx.lineWidth = p.size * .45; ctx.stroke();
      }
      if (this.g.lv >= 4) {
        const gr = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3.2);
        gr.addColorStop(0, p.color + Math.floor(a*100).toString(16).padStart(2,'0'));
        gr.addColorStop(1,'transparent');
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*3.2,0,Math.PI*2);
        ctx.fillStyle = gr; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle = p.color + Math.floor(a*255).toString(16).padStart(2,'0');
      ctx.fill();
    }
  }
  start() { const loop=()=>{this.tick();this.raf=requestAnimationFrame(loop);}; loop(); }
  stop()  { cancelAnimationFrame(this.raf); if(this.ctx) this.ctx.clearRect(0,0,this.c.width,this.c.height); }
}

function getStrokeWidth(lv) {
  return [3,4.5,6,7.5,9,10.5,12,15,21,0][lv-1] + 'px';
}
function getNameStroke(lv) {
  return [1.2,1.6,2,2.5,3,3.5,4,5,7,0][lv-1] + 'px';
}
function fmt(n) {
  if(n>=1e8) return (n/1e8).toFixed(1)+'억';
  if(n>=1e4) return (n/1e4).toFixed(1)+'만';
  if(n>=1e3) return (n/1e3).toFixed(1)+'천';
  return n+'';
}
function fmtMoney(n){ return '₩'+n.toLocaleString('ko-KR'); }

/* ══════════════════════════════════════════
   SCORING ENGINE
   Factors: subscribers, views, engagement,
   upload frequency, avg views per video.
   Bonus multipliers for outliers.
══════════════════════════════════════════ */
function computeDetailedScore(subs, totalViews, videos, engRate, uploadFreqPerMonth, avgViewsPerVideo) {

  /* base scores */
  const subScore = subs < 1000    ? subs * 0.5
                 : subs < 10000   ? 500  + (subs-1000)*0.22
                 : subs < 100000  ? 2700 + (subs-10000)*0.11
                 : subs < 1e6     ? 13000+ (subs-100000)*0.045
                 : 53500 + Math.sqrt(subs-1e6)*22;

  const viewScore  = totalViews * 0.000018;
  const engScore   = Math.min(engRate, 20) * 1400;
  const freqScore  = Math.min(uploadFreqPerMonth, 16) * 380;
  const avgVScore  = Math.min(avgViewsPerVideo, 8e6) * 0.00045;

  /* bonus multipliers for outstanding metrics */
  let bonus = 0;
  const bonusLog = [];

  // subs bonus
  if (subs >= 1e7)       { bonus += subScore * 0.25; bonusLog.push({key:'구독자 압도적',val:'+25%'}); }
  else if (subs >= 1e6)  { bonus += subScore * 0.15; bonusLog.push({key:'구독자 우수',val:'+15%'}); }

  // view ratio bonus (avg views / subs)
  const viewRatio = subs > 0 ? avgViewsPerVideo / subs : 0;
  if (viewRatio >= 2)     { bonus += avgVScore * 0.5; bonusLog.push({key:'조회수 압도적(구독비 200%+)',val:'+50%'}); }
  else if (viewRatio >= 1){ bonus += avgVScore * 0.3; bonusLog.push({key:'조회수 우수(구독비 100%+)',val:'+30%'}); }

  // engagement bonus
  if (engRate >= 8)       { bonus += engScore * 0.4;  bonusLog.push({key:'참여율 압도적(8%+)',val:'+40%'}); }
  else if (engRate >= 4)  { bonus += engScore * 0.2;  bonusLog.push({key:'참여율 우수(4%+)',val:'+20%'}); }

  // upload frequency bonus
  if (uploadFreqPerMonth >= 12){ bonus += freqScore * 0.35; bonusLog.push({key:'업로드 압도적(월12+)',val:'+35%'}); }
  else if (uploadFreqPerMonth >= 6){ bonus += freqScore * 0.15; bonusLog.push({key:'업로드 우수(월6+)',val:'+15%'}); }

  const total = Math.round(subScore + viewScore + engScore + freqScore + avgVScore + bonus);

  return {
    total,
    breakdown: {
      subScore:   Math.round(subScore),
      viewScore:  Math.round(viewScore),
      engScore:   Math.round(engScore),
      freqScore:  Math.round(freqScore),
      avgVScore:  Math.round(avgVScore),
      bonus:      Math.round(bonus),
    },
    bonusLog,
    factors: { subs, totalViews, videos, engRate, uploadFreqPerMonth, avgViewsPerVideo, viewRatio }
  };
}

function getLvFromScore(score) {
  for (let i = GRADES.length-1; i >= 0; i--)
    if (score >= GRADES[i].scoreMin) return GRADES[i].lv;
  return 1;
}
function getLvFromSubs(subs) {
  for (let i = GRADES.length-1; i >= 0; i--)
    if (subs >= GRADES[i].subMin) return GRADES[i].lv;
  return 1;
}
function calcPercentile(subs) {
  if(subs>=5e7)  return '0.00005%';
  if(subs>=1e7)  return '0.002%';
  if(subs>=5e6)  return '0.02%';
  if(subs>=1e6)  return '0.1%';
  if(subs>=1e5)  return '1%';
  if(subs>=1e4)  return '6%';
  if(subs>=1e3)  return '34%';
  if(subs>=500)  return '42%';
  if(subs>=100)  return '63%';
  return '100%';
}

      <table style="border-collapse:collapse;font-size:.78rem;background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;overflow:hidden;">
        <thead><tr style="background:var(--bg3);"><th style="padding:7px 10px;text-align:left;color:var(--text2);">항목</th><th style="padding:7px 10px;text-align:left;color:var(--text2);">값</th></tr></thead>

        <div class="score-breakdown">
          <h4>📊 알고리즘 점수 세부 분석</h4>
          ${[
            {key:'구독자 점수',    val:bd.subScore,  max:200000, color:lvColor},
            {key:'조회수 점수',    val:bd.viewScore, max:80000,  color:'#4f8ef7'},
            {key:'참여율 점수',    val:bd.engScore,  max:28000,  color:'#34d399'},
            {key:'업로드 빈도 점수',val:bd.freqScore,max:6000,  color:'#fbbf24'},
            {key:'평균 조회 점수', val:bd.avgVScore, max:4000,   color:'#a78bfa'},
            {key:'보너스 점수',    val:bd.bonus,     max:Math.max(bd.bonus,5000), color:'#4ade80'},
          ].map(r=>{
            const pct2=Math.min(100,(r.val/(r.max||1))*100);
            const hasBonusForThis = r.key==='보너스 점수' && scoreData.bonusLog.length>0;
            return `<div class="score-row">
              <div class="score-row-head">
                <span class="score-key">${r.key}</span>
                <span class="score-val" style="color:${r.color};">${r.val.toLocaleString()}
                  ${hasBonusForThis?scoreData.bonusLog.map(b=>`<span class="bonus-tag">${b.key} ${b.val}</span>`).join(''):''}
                </span>
              </div>
              <div class="score-bar-wrap">
                <div class="score-bar" style="width:${pct2}%;background:${r.color};"></div>
              </div>
            </div>`;
          }).join('')}

          <div class="total-score-box">
            <div>
              <div class="total-score-label">최종 알고리즘 점수</div>
              <div style="font-size:.72rem;color:var(--text2);margin-top:2px;">LV${finalLv} – ${g.name}</div>
            </div>
            <div class="total-score-num ${isR?'rainbow':''}" style="${isR?'':'color:'+lvColor}">${score.toLocaleString()}</div>
          </div>
        </div>
      </div>
    </div>`;

  /* spark */
  if (mainSpark) mainSpark.stop();
  requestAnimationFrame(() => {
    const cv = document.getElementById('mainSparkCanvas');
    const cd2= document.getElementById('mainLvCard');
    if(!cv||!cd2) return;
    cv.width=cd2.offsetWidth; cv.height=cd2.offsetHeight;
    mainSpark = new Spark(cv, g); mainSpark.start();
  });
}

/* ══════════════════════════════════════════
   EFFECT MODAL
══════════════════════════════════════════ */
function openModal(lv){
  document.getElementById('effectModal').classList.add('open');
  buildModalNav(); renderModal(lv);
}
function closeModal(){
  document.getElementById('effectModal').classList.remove('open');
  if(prevSpark){prevSpark.stop();prevSpark=null;}
}
function buildModalNav(){
  document.getElementById('modalNav').innerHTML = GRADES.map(g=>{
    const c = g.lv===10?'#ff0080':g.color;
    return `<button class="lv-nav-btn" id="mnb${g.lv}" data-lv="${g.lv}"
      style="--nb-color:${c};border-color:${c};" onclick="renderModal(${g.lv})">${g.lv}</button>`;
  }).join('');
}
function renderModal(lv){
  document.querySelectorAll('.lv-nav-btn').forEach(b=>b.classList.toggle('active',+b.dataset.lv===lv));
  const g=GRADES[lv-1]; const isR=lv===10;
  const stroke=getStrokeWidth(lv); const nStroke=getNameStroke(lv);
  const lvC=isR?'#ff0080':g.color;

  document.getElementById('modalTitle').textContent=`LV${lv} – ${g.name} 효과 미리보기`;

  const prevCard=document.getElementById('prevCard');
  prevCard.style.setProperty('--prev-glow',lvC);
  prevCard.style.setProperty('--prev-color',lvC);
  prevCard.style.setProperty('--prev-stroke',stroke);

  const numEl=document.getElementById('prevNum');
  numEl.className='prev-num'+(isR?' rainbow':'');
  if(!isR){numEl.style.color=lvC;numEl.style.webkitTextStroke=`${stroke} ${lvC}`;numEl.style.textShadow=`0 0 18px ${lvC}`;numEl.style.filter=`drop-shadow(0 0 10px ${lvC})`;}
  else{numEl.style.cssText='';}
  numEl.textContent=lv;

  const nameEl=document.getElementById('prevName');
  nameEl.className='prev-name'+(isR?' rainbow':'');
  if(!isR){nameEl.style.color=lvC;nameEl.style.webkitTextStroke=`${nStroke} ${lvC}`;nameEl.style.textShadow=`0 0 8px ${lvC}`;}
  else{nameEl.style.cssText='';}
  nameEl.textContent=g.name;
  document.getElementById('prevRange').textContent=`${fmt(g.subMin)} ~ ${g.subMax===Infinity?'∞':fmt(g.subMax)} 구독자`;

  if(prevSpark)prevSpark.stop();
  const cv=document.getElementById('prevCanvas');
  const pc=document.getElementById('prevCard');
  cv.width=pc.offsetWidth||230; cv.height=pc.offsetHeight||290;
  prevSpark=new Spark(cv,g); prevSpark.start();

  const bars=[
    {label:'구독자 규모',   val:Math.min(100,((lv-1)/9)*100+5)},
    {label:'스파크 강도',   val:g.intensity*100},
    {label:'알고리즘 점수', val:Math.min(100,g.scoreMin/10000)},
    {label:'희귀도',        val:[0.1,1,5,10,20,35,55,72,88,100][lv-1]},
  ];
  document.getElementById('modalInfo').innerHTML=`
    <h3 style="color:${lvC};">LV${lv} – ${g.name}</h3>
    <div class="compare-bars">
      ${bars.map(b=>`
        <div class="cbar-row">
          <div class="cbar-label"><span>${b.label}</span><span>${b.val.toFixed(0)}%</span></div>
          <div class="cbar-wrap"><div class="cbar-fill" style="width:${b.val}%;background:${isR?'linear-gradient(90deg,#ff0080,#7c3aed,#00e5ff)':lvC};"></div></div>
        </div>`).join('')}
    </div>
    ${[['구독자 범위',`${fmt(g.subMin)}~${g.subMax===Infinity?'∞':fmt(g.subMax)}`],['상위 %',g.rankPct],['채널 수',g.chCount],['점수 범위',`${g.scoreMin.toLocaleString()}~${g.scoreMax===Infinity?'∞':g.scoreMax.toLocaleString()}`],['플레이버튼',g.play]]
      .map(([k,v])=>`<div class="stat-row"><span class="stat-key">${k}</span><span class="stat-val" style="color:${lvC}">${v}</span></div>`).join('')}
    <div style="background:var(--bg3);border-radius:9px;padding:10px 13px;border:1px solid var(--card-border);">
      <div style="font-size:.78rem;font-weight:700;margin-bottom:4px;">📌 다음 목표</div>
      <p style="font-size:.75rem;color:var(--text2);line-height:1.55;">${g.nextGoal}</p>
    </div>
    <div class="perk-tags">${g.perks.map(p=>`<span class="perk-tag">✓ ${p}</span>`).join('')}</div>`;
}

/* ══════════════════════════════════════════
   REVENUE
══════════════════════════════════════════ */
function calcRevenue(){
  const views=+document.getElementById('rv_views').value||0;
  const cpm=+document.getElementById('rv_cpm').value||0;
  const country=+document.getElementById('rv_country').value||1;
  const vtr=+document.getElementById('rv_vtr').value/100||.35;
  const rev=views*vtr*(cpm/1000)*country*0.55;
  document.getElementById('revNum').textContent=fmtMoney(Math.round(rev));
  document.getElementById('revDetail').textContent=`조회수 ${views.toLocaleString()} × VTR ${(vtr*100).toFixed(0)}% × CPM ₩${cpm.toLocaleString()} × 국가 ×${country} × YT 55%`;
}
