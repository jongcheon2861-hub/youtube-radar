<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTAnalytics Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
:root {
  --bg: #0a0a14;
  --bg2: #10101e;
  --card-bg: #12121f;
  --border: #2a2a3e;
  --text: #e0e0f0;
  --text2: #9090b0;
  --accent: #6c63ff;
  --r: 16px;
  --ad-w: 200px;

  /* Level colors */
  --lv1: #ffffff;
  --lv2: #4fc3f7;
  --lv3: #fff176;
  --lv4: #ffb74d;
  --lv5: #66bb6a;
  --lv6: #ce93d8;
  --lv7: #f48fb1;
  --lv8: #ef5350;
  --lv9-a: #ff6b6b; --lv9-b: #ffd93d; --lv9-c: #6bcb77; --lv9-d: #4d96ff;
  --lv10-a:#ff0040; --lv10-b:#ff8c00; --lv10-c:#ffe600; --lv10-d:#00ff88; --lv10-e:#00cfff; --lv10-f:#bf00ff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* ── KEYFRAMES ── */
@keyframes rotateBorder {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes rainbowRotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes glowPulse {
  0%, 100% { opacity: 1; filter: brightness(1); }
  50% { opacity: 0.7; filter: brightness(1.6); }
}
@keyframes rainbowText {
  0%   { color: #ff0040; }
  16%  { color: #ff8c00; }
  33%  { color: #ffe600; }
  50%  { color: #00ff88; }
  66%  { color: #00cfff; }
  83%  { color: #bf00ff; }
  100% { color: #ff0040; }
}
@keyframes float3d {
  0%, 100% { transform: translateY(0) rotateX(0deg); }
  50% { transform: translateY(-6px) rotateX(3deg); }
}
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes colorPulse {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.4) saturate(1.5); }
}

/* ── LAYOUT ── */
.app-wrap { display: flex; flex-direction: column; min-height: 100vh; }
header {
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; height: 56px;
  background: linear-gradient(135deg, #0f0f20, #1a1a30);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 1.3rem; font-weight: 900; background: linear-gradient(90deg,#ff0040,#ff8c00,#ffe600,#00ff88,#00cfff,#bf00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.search-bar { flex: 1; max-width: 480px; display: flex; gap: 8px; }
.search-bar input { flex: 1; padding: 8px 14px; background: #1a1a2e; border: 1px solid var(--border); border-radius: 24px; color: var(--text); font-size: .9rem; }
.search-bar input:focus { outline: none; border-color: var(--accent); }
.btn { padding: 8px 18px; border: none; border-radius: 20px; cursor: pointer; font-size: .85rem; font-weight: 700; transition: all .2s; }
.btn-primary { background: linear-gradient(135deg, #6c63ff, #a855f7); color: #fff; }
.btn-primary:hover { transform: scale(1.04); filter: brightness(1.15); }

.body-row { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 200px; min-width: 200px; background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 12px 8px; display: flex; flex-direction: column; gap: 4px;
  overflow-y: auto;
}
.sidebar-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; border-radius: 10px; cursor: pointer;
  font-size: .85rem; font-weight: 500; color: var(--text2);
  transition: all .2s;
}
.sidebar-item:hover, .sidebar-item.active { background: #1e1e35; color: var(--text); }
.sidebar-item span.ic { font-size: 1.1rem; }

/* Main content */
.main-area { flex: 1; overflow-y: auto; padding: 20px; min-width: 0; }

/* Ad zone */
.ad-zone {
  width: var(--ad-w); min-width: var(--ad-w); flex-shrink: 0;
  background: var(--bg2); border-left: 1px solid var(--border);
  padding: 12px 8px; display: flex; flex-direction: column; gap: 12px;
  overflow-y: auto;
}
.ad-slot {
  background: #1a1a2e; border: 1px dashed var(--border);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: .7rem; color: var(--text2); text-align: center;
  flex: 1; min-height: 180px;
}

/* ── SECTIONS ── */
.section { display: none; animation: fadeIn .4s ease; }
.section.active { display: block; }

/* ── LEVEL CARD (conic-gradient border) ── */
.lv-card-outer {
  position: relative;
  padding: 3px;
  border-radius: calc(var(--r) + 3px);
  cursor: pointer;
  transition: transform .3s ease;
  animation: float3d 4s ease-in-out infinite;
}
.lv-card-outer:hover { transform: scale(1.04) translateY(-4px); animation-play-state: paused; }

/* Rotating conic border pseudo-element */
.lv-card-outer::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: calc(var(--r) + 5px);
  z-index: 0;
  animation: rotateBorder 2.5s linear infinite;
}
/* Glow layer */
.lv-card-outer::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: calc(var(--r) + 7px);
  z-index: -1;
  filter: blur(12px);
  opacity: 0.7;
  animation: rotateBorder 2.5s linear infinite, glowPulse 2s ease-in-out infinite;
}

.lv-card-inner {
  position: relative; z-index: 1;
  background: var(--card-bg);
  border-radius: var(--r);
  padding: 20px 16px;
  text-align: center;
  overflow: hidden;
}
/* shimmer overlay inside card */
.lv-card-inner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.04) 50%, transparent 60%);
  background-size: 200% 100%;
  animation: shimmer 3s infinite;
  pointer-events: none;
}

.lv-num {
  font-size: 3.2rem;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
  letter-spacing: -1px;
}
.lv-name {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 10px;
}
.lv-sub-range {
  font-size: .78rem;
  color: var(--text2);
  margin-bottom: 6px;
}
.lv-rank {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: .72rem;
  font-weight: 700;
  margin-bottom: 8px;
}
.lv-desc {
  font-size: .75rem;
  color: var(--text2);
  line-height: 1.5;
}
.lv-score-range {
  font-size: .7rem;
  margin-top: 6px;
  font-weight: 600;
  opacity: .8;
}

/* Level colors for conic gradients */
.lv1-border::before  { background: conic-gradient(from 0deg, #ffffff, #cccccc, #ffffff); }
.lv1-border::after   { background: conic-gradient(from 0deg, #ffffff, #cccccc, #ffffff); }
.lv2-border::before  { background: conic-gradient(from 0deg, #4fc3f7, #0288d1, #4fc3f7); }
.lv2-border::after   { background: conic-gradient(from 0deg, #4fc3f7, #0288d1, #4fc3f7); }
.lv3-border::before  { background: conic-gradient(from 0deg, #fff176, #f9a825, #fff176); }
.lv3-border::after   { background: conic-gradient(from 0deg, #fff176, #f9a825, #fff176); }
.lv4-border::before  { background: conic-gradient(from 0deg, #ffb74d, #e65100, #ffb74d); }
.lv4-border::after   { background: conic-gradient(from 0deg, #ffb74d, #e65100, #ffb74d); }
.lv5-border::before  { background: conic-gradient(from 0deg, #66bb6a, #1b5e20, #66bb6a); }
.lv5-border::after   { background: conic-gradient(from 0deg, #66bb6a, #1b5e20, #66bb6a); }
.lv6-border::before  { background: conic-gradient(from 0deg, #ce93d8, #6a1b9a, #ce93d8); }
.lv6-border::after   { background: conic-gradient(from 0deg, #ce93d8, #6a1b9a, #ce93d8); }
.lv7-border::before  { background: conic-gradient(from 0deg, #f48fb1, #880e4f, #f48fb1); }
.lv7-border::after   { background: conic-gradient(from 0deg, #f48fb1, #880e4f, #f48fb1); }
.lv8-border::before  { background: conic-gradient(from 0deg, #ef5350, #b71c1c, #ef5350); }
.lv8-border::after   { background: conic-gradient(from 0deg, #ef5350, #b71c1c, #ef5350); }
.lv9-border::before  { background: conic-gradient(from 0deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #ff6b6b); }
.lv9-border::after   { background: conic-gradient(from 0deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #ff6b6b); }
.lv10-border::before { background: conic-gradient(from 0deg, #ff0040, #ff8c00, #ffe600, #00ff88, #00cfff, #bf00ff, #ff0040); animation-duration: 1.5s; }
.lv10-border::after  { background: conic-gradient(from 0deg, #ff0040, #ff8c00, #ffe600, #00ff88, #00cfff, #bf00ff, #ff0040); animation-duration: 1.5s; }

/* ── GRADE TABLE ── */
.grade-table-wrap { background: var(--card-bg); border-radius: var(--r); overflow: hidden; border: 1px solid var(--border); }
.grade-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
.grade-table th { background: #1a1a30; padding: 10px 12px; font-size: .75rem; color: var(--text2); font-weight: 600; text-align: left; }
.grade-table td { padding: 9px 12px; border-top: 1px solid var(--border); }
.grade-table tr.current-row td { background: rgba(108,99,255,.12); }
.lv-chip {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 8px; font-weight: 900; font-size: .85rem;
}
.star-badge { color: #ffd700; font-size: .9rem; margin-left: 4px; }

/* ── ANALYZE SECTION ── */
.analyze-box {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px; margin-bottom: 20px;
}
.analyze-box h3 { font-size: 1rem; margin-bottom: 14px; color: var(--text2); }
.input-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
.field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
.field label { font-size: .75rem; color: var(--text2); }
.field input {
  padding: 9px 12px; background: #1a1a2e; border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: .87rem;
}
.field input:focus { outline: none; border-color: var(--accent); }

/* Result */
.result-wrap { animation: fadeIn .5s ease; }
.result-hero { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
.result-card-col { flex: 0 0 220px; }
.result-info-col { flex: 1; min-width: 260px; }

.decision-row {
  display: flex; gap: 10px; flex-wrap: wrap;
  background: #1a1a2e; border-radius: 12px; padding: 14px; margin-bottom: 16px;
}
.dec-item { flex: 1; min-width: 120px; text-align: center; }
.dec-label { font-size: .7rem; color: var(--text2); margin-bottom: 4px; }
.dec-val { font-size: 1.1rem; font-weight: 900; }
.dec-arrow { display: flex; align-items: center; font-size: 1.4rem; color: var(--text2); }

.factor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 16px; }
.factor-card {
  background: #1a1a2e; border-radius: 12px; padding: 12px 14px;
  border-left: 3px solid var(--accent); transition: transform .2s;
}
.factor-card:hover { transform: translateY(-2px); }
.fc-label { font-size: .7rem; color: var(--text2); margin-bottom: 4px; }
.fc-value { font-size: 1.2rem; font-weight: 900; margin-bottom: 4px; }
.fc-bar-wrap { height: 4px; background: rgba(255,255,255,.08); border-radius: 2px; }
.fc-bar { height: 4px; border-radius: 2px; transition: width .8s ease; }
.fc-badge {
  display: inline-block; font-size: .62rem; font-weight: 700;
  padding: 1px 7px; border-radius: 10px; margin-top: 5px;
}
.fq-best { background: rgba(102,187,106,.2); color: #66bb6a; }
.fq-good { background: rgba(79,195,247,.2); color: #4fc3f7; }
.fq-mid  { background: rgba(255,183,77,.2);  color: #ffb74d; }
.fq-low  { background: rgba(239,83,80,.2);   color: #ef5350; }

.score-breakdown { background: #1a1a2e; border-radius: 12px; padding: 14px; margin-bottom: 16px; }
.score-breakdown h4 { font-size: .85rem; margin-bottom: 10px; color: var(--text2); }
.sb-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.sb-label { font-size: .75rem; color: var(--text2); width: 100px; flex-shrink: 0; }
.sb-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,.08); border-radius: 3px; }
.sb-bar { height: 6px; border-radius: 3px; }
.sb-val { font-size: .75rem; font-weight: 700; width: 60px; text-align: right; }

/* Bonus log */
.bonus-log { background: #1a1a2e; border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; }
.bonus-log h4 { font-size: .82rem; margin-bottom: 8px; color: #66bb6a; }
.bonus-item { font-size: .75rem; color: #66bb6a; padding: 2px 0; }

/* Inline grade table */
.inline-grade-table-wrap { margin-top: 16px; background: var(--card-bg); border-radius: var(--r); overflow: hidden; border: 1px solid var(--border); }

/* ── CARD GRID ── */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

/* ── REVENUE ── */
.rev-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
.rev-box h3 { margin-bottom: 14px; }
.rev-inputs { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 14px; }
.rev-result { background: #1a1a2e; border-radius: 12px; padding: 16px; text-align: center; }
.rev-result .rev-amount { font-size: 2rem; font-weight: 900; color: #66bb6a; }
.rev-result .rev-note { font-size: .75rem; color: var(--text2); margin-top: 4px; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
  z-index: 1000; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; animation: fadeIn .3s ease; }
.modal-box {
  background: var(--card-bg); border-radius: 20px; padding: 28px;
  width: 380px; max-width: 95vw; text-align: center; position: relative;
}
.modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--text2); font-size: 1.4rem; cursor: pointer; }
.modal-nav { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.modal-nav-btn { padding: 4px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: .75rem; font-weight: 700; background: #1a1a2e; color: var(--text2); transition: all .2s; }
.modal-nav-btn.active, .modal-nav-btn:hover { color: #fff; }

/* ── HOT VIDEOS ── */
.hot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.hot-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform .2s; }
.hot-card:hover { transform: translateY(-3px); }
.hot-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
.hot-info { padding: 8px 10px; }
.hot-title { font-size: .78rem; font-weight: 600; margin-bottom: 3px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.hot-meta { font-size: .68rem; color: var(--text2); }

/* ── BENCH TIPS ── */
.bench-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
.bench-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 16px; transition: transform .2s; }
.bench-card:hover { transform: translateY(-3px); }
.bench-card .bench-icon { font-size: 1.6rem; margin-bottom: 8px; }
.bench-card h4 { font-size: .88rem; font-weight: 700; margin-bottom: 6px; }
.bench-card p { font-size: .75rem; color: var(--text2); line-height: 1.5; }

/* ── EXTRAS ── */
.extra-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.extra-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; cursor: pointer; transition: all .2s; text-decoration: none; display: block; color: var(--text); }
.extra-card:hover { transform: translateY(-3px); border-color: var(--accent); }
.extra-card .ex-icon { font-size: 1.8rem; margin-bottom: 6px; }
.extra-card .ex-name { font-size: .82rem; font-weight: 700; margin-bottom: 3px; }
.extra-card .ex-desc { font-size: .7rem; color: var(--text2); }

/* Section header */
.sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.sec-head h2 { font-size: 1.15rem; font-weight: 800; }
.sec-head .sec-badge { padding: 2px 10px; background: var(--accent); border-radius: 20px; font-size: .72rem; font-weight: 700; }

/* Utility */
.mt16 { margin-top: 16px; }
.mb16 { margin-bottom: 16px; }
.text-lv { font-weight: 900; }
</style>
</head>
<body>
<div class="app-wrap">

<!-- HEADER -->
<header>
  <div class="logo">📊 YTAnalytics Pro</div>
  <div class="search-bar">
    <input type="text" id="globalSearch" placeholder="채널명 또는 키워드 검색…" onkeydown="if(event.key==='Enter')handleGlobalSearch()">
    <button class="btn btn-primary" onclick="handleGlobalSearch()">검색</button>
  </div>
  <button class="btn btn-primary" onclick="showSection('analyze')">🔍 채널 분석</button>
</header>

<div class="body-row">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-item active" onclick="showSection('analyze');setActive(this)"><span class="ic">🔍</span>채널 분석</div>
  <div class="sidebar-item" onclick="showSection('hot');setActive(this)"><span class="ic">🔥</span>인기 영상</div>
  <div class="sidebar-item" onclick="showSection('revenue');setActive(this)"><span class="ic">💰</span>수익 계산</div>
  <div class="sidebar-item" onclick="showSection('tools');setActive(this)"><span class="ic">🛠️</span>크리에이터 도구</div>
  <div class="sidebar-item" onclick="showSection('ideas');setActive(this)"><span class="ic">💡</span>아이디어</div>
  <div class="sidebar-item" onclick="showSection('shop');setActive(this)"><span class="ic">🛒</span>추천 장비</div>
</aside>

<!-- MAIN -->
<main class="main-area" id="mainArea">

  <!-- ── ANALYZE ── -->
  <div id="sec-analyze" class="section active">
    <div class="sec-head">
      <h2>🔍 채널 분석</h2>
      <span class="sec-badge">Algorithm Score</span>
    </div>
    <div class="analyze-box">
      <h3>채널 URL 또는 정보 입력</h3>
      <div class="input-row">
        <div class="field" style="flex:2;min-width:220px">
          <label>채널 URL / @핸들</label>
          <input type="text" id="chanInput" placeholder="예: @MrBeast 또는 채널 URL">
        </div>
        <div class="field">
          <label>구독자 수</label>
          <input type="number" id="inSubs" placeholder="예: 1000000">
        </div>
        <div class="field">
          <label>총 조회수</label>
          <input type="number" id="inViews" placeholder="예: 50000000">
        </div>
      </div>
      <div class="input-row">
        <div class="field">
          <label>업로드 영상 수</label>
          <input type="number" id="inVids" placeholder="예: 500">
        </div>
        <div class="field">
          <label>참여율 (%)</label>
          <input type="number" id="inEng" placeholder="예: 4.5" step="0.1">
        </div>
        <div class="field">
          <label>월 업로드 빈도</label>
          <input type="number" id="inFreq" placeholder="예: 8">
        </div>
        <button class="btn btn-primary" style="align-self:flex-end;height:38px" onclick="analyzeChannel(false)">분석 시작</button>
        <button class="btn" style="align-self:flex-end;height:38px;background:#1a1a2e;color:var(--text2)" onclick="analyzeChannel(true)">데모 실행</button>
      </div>
    </div>
    <div id="resultArea"></div>
  </div>

  <!-- ── HOT ── -->
  <div id="sec-hot" class="section">

function fmt(n){
  if(n===undefined||n===null) return '0';
  n = parseFloat(n);
  if(n>=100000000) return (n/100000000).toFixed(1)+'억';
  if(n>=10000) return (n/10000).toFixed(1)+'만';
  if(n>=1000) return (n/1000).toFixed(1)+'천';
  return n.toLocaleString();
}
function fmtMoney(usd){
  const krw = Math.round(usd*1350);
  return `$${usd.toFixed(2)} (₩${krw.toLocaleString()})`;
}
function qual(v, good, great){
  if(v >= great) return {cls:'fq-best', label:'최상'};
  if(v >= good)  return {cls:'fq-good', label:'양호'};
  if(v >= good*0.5) return {cls:'fq-mid', label:'보통'};
  return {cls:'fq-low', label:'부족'};
}

function lvFromScore(score){

}
function lvFromSubs(subs){

}

function buildCardHTML(g, extraClass=''){

  }

  }

  if(isHigh && !is10){

  }
  if(is10){

  }

  const rankBg = g.color+'33';
  const subRangeText = g.subMax === Infinity
    ? `${fmt(g.subMin)}+ 구독자`
    : `${fmt(g.subMin)} ~ ${fmt(g.subMax)} 구독자`;

  return `
  <div class="lv-card-outer ${lvBorderClass(g.lv)} ${extraClass}" onclick="openModal(${g.lv})">
    <div class="lv-card-inner">
      <div class="lv-num" style="${numStyle}">LV.${g.lv}</div>

      <div class="lv-score-range" style="color:${g.color}">점수 ${fmt(g.score[0])} ~ ${g.score[1]===Infinity?'∞':fmt(g.score[1])}</div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════
   COMPUTE SCORE
═══════════════════════════════════════════════ */
function computeDetailedScore(subs, views, vids, eng, freq){
  subs  = parseFloat(subs)||0;
  views = parseFloat(views)||0;
  vids  = parseInt(vids)||1;
  eng   = parseFloat(eng)||0;
  freq  = parseFloat(freq)||0;

  const avgViews = views / Math.max(vids,1);
  const vsr      = views / Math.max(subs,1);  // view-to-sub ratio

  // Base scores
  const sSubs  = Math.min(Math.log10(Math.max(subs,1))*80000, 400000);
  const sViews = Math.min(Math.log10(Math.max(views,1))*50000, 250000);
  const sEng   = Math.min(eng * 30000, 150000);
  const sFreq  = Math.min(freq * 8000, 80000);
  const sAvg   = Math.min(Math.log10(Math.max(avgViews,1))*25000, 120000);

  let base = sSubs + sViews + sEng + sFreq + sAvg;

  // Bonus
  let bonus = 0;
  let bonusLog = [];
  if(subs >= 1000000)   { bonus += base*0.15; bonusLog.push('구독자 100만+ 보너스 +15%'); }
  else if(subs >= 100000){ bonus += base*0.07; bonusLog.push('구독자 10만+ 보너스 +7%'); }
  if(vsr >= 5)          { bonus += base*0.12; bonusLog.push('조회/구독 비율 5배+ 보너스 +12%'); }
  else if(vsr >= 2)     { bonus += base*0.06; bonusLog.push('조회/구독 비율 2배+ 보너스 +6%'); }
  if(eng >= 10)         { bonus += base*0.10; bonusLog.push('참여율 10%+ 보너스 +10%'); }
  else if(eng >= 6)     { bonus += base*0.05; bonusLog.push('참여율 6%+ 보너스 +5%'); }
  if(freq >= 15)        { bonus += base*0.08; bonusLog.push('주 3회+ 업로드 보너스 +8%'); }
  else if(freq >= 8)    { bonus += base*0.04; bonusLog.push('주 2회+ 업로드 보너스 +4%'); }

  const total = Math.round(base + bonus);
  return {
    total, base: Math.round(base), bonus: Math.round(bonus), bonusLog,
    breakdown:{ subs: Math.round(sSubs), views: Math.round(sViews), eng: Math.round(sEng), freq: Math.round(sFreq), avg: Math.round(sAvg) },
    factors:{ subs, views, vids, eng, freq, avgViews, vsr }
  };
}

        ${fG.perks.map(p=>`<span style="background:${fG.color}22;color:${fG.color};border-radius:20px;padding:3px 12px;font-size:.75rem;font-weight:600">${p}</span>`).join('')}
      </div>
    </div>

    <!-- Inline Grade Table -->
    <div class="inline-grade-table-wrap">
      <table class="grade-table" id="inlineGradeTable">
        <thead><tr><th>LV</th><th>등급</th><th>구독자 구간</th><th>상위%</th><th>점수 범위</th></tr></thead>
        <tbody id="inlineGradeTbody"></tbody>
      </table>
    </div>
  </div>`;

  document.getElementById('resultArea').innerHTML = html;
  buildInlineGradeTable(finalLv);
}

function factorCard(label, value, pct, color, q){
  return `
  <div class="factor-card" style="border-left-color:${color}">
    <div class="fc-label">${label}</div>
    <div class="fc-value" style="color:${color}">${value}</div>
    <div class="fc-bar-wrap"><div class="fc-bar" style="width:${Math.min(pct,100)}%;background:${color}"></div></div>
    <span class="fc-badge ${q.cls}">${q.label}</span>
  </div>`;
}

function sbRow(label, val, max, color){
  const pct = Math.min(val/max*100,100);
  return `
  <div class="sb-row">
    <div class="sb-label">${label}</div>
    <div class="sb-bar-wrap"><div class="sb-bar" style="width:${pct}%;background:${color}"></div></div>
    <div class="sb-val" style="color:${color}">${fmt(val)}</div>
  </div>`;
}

function buildInlineGradeTable(currentLv){
  const tbody = document.getElementById('inlineGradeTbody');
  if(!tbody) return;
  tbody.innerHTML = GRADES.map(g=>{
    const isCur = g.lv === currentLv;
    const subMax = g.subMax===Infinity ? '∞' : fmt(g.subMax);
    const scoreMax = g.score[1]===Infinity ? '∞' : fmt(g.score[1]);
    return `<tr class="${isCur?'current-row':''}">
      <td><span class="lv-chip" style="background:${g.color}22;color:${g.color}">${g.lv}</span>${isCur?'<span class="star-badge">★</span>':''}</td>
      <td style="color:${g.color};font-weight:700">${g.name}</td>
      <td>${fmt(g.subMin)} ~ ${subMax}</td>
      <td>${g.rankPct}</td>
      <td>${fmt(g.score[0])} ~ ${scoreMax}</td>
    </tr>`;
  }).join('');
}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
let modalLv = 1;
function openModal(lv){
  modalLv = lv;
  document.getElementById('modalOverlay').classList.add('open');
  buildModalNav();
  renderModal(lv);
}
function closeModal(e){
  if(!e || e.target===document.getElementById('modalOverlay')){
    document.getElementById('modalOverlay').classList.remove('open');
  }
}
function buildModalNav(){
  const nav = document.getElementById('modalNav');
  nav.innerHTML = GRADES.map(g=>`
    <button class="modal-nav-btn ${g.lv===modalLv?'active':''}"
      style="${g.lv===modalLv?'background:'+g.color+';color:#000':''}"
      onclick="renderModal(${g.lv})">${g.lv}</button>
  `).join('');
}
function renderModal(lv){
  modalLv = lv;
  const g = GRADES[lv-1];
  buildModalNav();
  const isHigh = lv>=6; const is10 = lv===10;
  let numStyle = `color:${g.color};font-size:3rem;font-weight:900;`;
  if(isHigh&&!is10) numStyle+=`text-shadow:0 0 16px ${g.color};animation:glowPulse 2s infinite;`;
  if(is10) numStyle+=`animation:rainbowText 2s linear infinite;`;
  let nameStyle = `color:${g.color};font-size:1.2rem;font-weight:700;`;
  if(isHigh&&!is10) nameStyle+=`text-shadow:0 0 10px ${g.color};animation:glowPulse 2s infinite;`;
  if(is10) nameStyle+=`animation:rainbowText 2s linear infinite;`;
  const subMax = g.subMax===Infinity?'∞':fmt(g.subMax);
  document.getElementById('modalContent').innerHTML = `
    <div class="lv-card-outer ${lvBorderClass(lv)}" style="margin:0 auto 16px;max-width:280px">
      <div class="lv-card-inner">
        <div style="${numStyle}">LV.${lv}</div>
        <div style="${nameStyle};margin-bottom:10px">${g.name}</div>
        <div style="font-size:.8rem;color:var(--text2);margin-bottom:8px">${fmt(g.subMin)} ~ ${subMax} 구독자</div>
        <div class="lv-rank" style="background:${g.color}33;color:${g.color}">${g.rankPct}</div>
        <div style="font-size:.75rem;color:var(--text2);margin-top:8px;line-height:1.5">${g.desc}</div>
      </div>
    </div>
    <div style="background:#1a1a2e;border-radius:10px;padding:12px;text-align:left;font-size:.78rem">
      <div style="margin-bottom:8px;font-weight:700;color:${g.color}">🎯 다음 목표</div>
      <div style="color:var(--text2);margin-bottom:10px">${g.nextGoal}</div>
      <div style="font-weight:700;margin-bottom:6px">✨ 특권</div>
      ${g.perks.map(p=>`<div style="color:var(--text2);padding:2px 0">• ${p}</div>`).join('')}
    </div>`;
}

/* ═══════════════════════════════════════════════
   REVENUE
═══════════════════════════════════════════════ */
function calcRevenue(){
  const views   = parseFloat(document.getElementById('rViews').value)||0;
  const cpm     = parseFloat(document.getElementById('rCpm').value)||0;
  const vtr     = parseFloat(document.getElementById('rVtr').value)||0;
  const country = parseFloat(document.getElementById('rCountry').value)||1;
  const mViews  = views * (vtr/100);
  const gross   = (mViews/1000) * cpm * country;
  const net     = gross * 0.55;
  document.getElementById('revResult').innerHTML = `
    <div style="font-size:.8rem;color:var(--text2);margin-bottom:6px">예상 월 수익 (YouTube 55% 지급)</div>
    <div class="rev-amount">${fmtMoney(net)}</div>
    <div class="rev-note">수익화 조회수 ${fmt(mViews)} · 총 예상 ${fmtMoney(gross)} → YouTube 수수료 45% 제외</div>`;
}
