<script>
/* ============================================================
   YTAnalytics Pro — 완전 수정판 v5.0
   수정 내역:
   1. apiFetch: error.code 완전 처리, 키 순환, invalidSearchFilter 자동 제거
   2. loadHot: finally 보장, 빈결과 폴백, 분류 안전처리
   3. renderHotSplit: DOM 존재 검사, 중복 선언 제거
   4. 탭 전환 시 loadHot() 첫 진입 보장
   5. videoCategoryId 제거, 키워드 기반 검색
   ============================================================ */

// ── 1. API 키 설정 ────────────────────────────────────────────
const API_KEYS = [
  'YOUR_REAL_KEY_1',   // ← 실제 키 입력
  'YOUR_REAL_KEY_2'    // ← 실제 키 입력 (없으면 한 개만)
];
let _keyIdx = 0;

function _getValidKeys() {
  return API_KEYS.filter(k => k && k.length > 20 && !k.startsWith('YOUR_'));
}

// ── 2. apiFetch — 핵심 fetch 함수 ────────────────────────────
async function apiFetch(url) {
  const keys = _getValidKeys();
  if (!keys.length) {
    showGlobalError('API 키가 설정되지 않았습니다. API_KEYS 배열에 실제 키를 입력하세요.');
    throw new Error('NO_VALID_KEY');
  }

  for (let i = 0; i < keys.length; i++) {
    const key = keys[(_keyIdx + i) % keys.length];
    const sep = url.includes('?') ? '&' : '?';
    const fullUrl = `${url}${sep}key=${key}`;

    try {
      console.log('[apiFetch] 요청:', fullUrl.replace(key, key.slice(0,8)+'...'));
      const res = await fetch(fullUrl);
      const data = await res.json();

      // API 레벨 에러 처리
      if (data.error) {
        const code   = data.error.code;
        const reason = data.error.errors?.[0]?.reason || '';
        const msg    = data.error.message || '';
        console.warn(`[apiFetch] 에러 code=${code} reason=${reason} msg=${msg}`);

        if (reason === 'quotaExceeded' || code === 429) {
          _keyIdx = (_keyIdx + 1) % keys.length;
          continue; // 다음 키 시도
        }
        if (code === 403 || reason === 'keyInvalid' || reason === 'forbidden' || reason === 'accessNotConfigured') {
          _keyIdx = (_keyIdx + 1) % keys.length;
          continue;
        }
        if (reason === 'invalidSearchFilter' || reason === 'invalidVideoFilter') {
          // videoCategoryId 또는 videoDuration 파라미터 제거 후 재시도
          const cleaned = url
            .replace(/[&?]videoCategoryId=[^&]*/g, '')
            .replace(/[&?]videoDuration=[^&]*/g, '');
          console.warn('[apiFetch] invalidSearchFilter → 파라미터 제거 후 재시도');
          return apiFetch(cleaned);
        }
        throw new Error(`API_ERROR [${code}] ${reason}: ${msg}`);
      }

      if (!res.ok) throw new Error(`HTTP_${res.status}`);

      _keyIdx = (_keyIdx + i) % keys.length; // 성공한 키 유지
      return data;

    } catch (e) {
      console.error('[apiFetch] fetch 실패:', e.message);
      if (i === keys.length - 1) throw e;
    }
  }
  throw new Error('ALL_KEYS_EXHAUSTED');
}

// ── 3. 글로벌 에러 표시 ───────────────────────────────────────
function showGlobalError(msg) {
  const bar = document.getElementById('apiStatusBar') || (() => {
    const el = document.createElement('div');
    el.id = 'apiStatusBar';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff4444;color:#fff;padding:10px 16px;z-index:9999;font-size:14px;text-align:center;';
    document.body.prepend(el);
    return el;
  })();
  bar.textContent = '⚠️ ' + msg;
  bar.style.display = 'block';
}

function hideGlobalError() {
  const bar = document.getElementById('apiStatusBar');
  if (bar) bar.style.display = 'none';
}

// ── 4. 네비게이션 상태 ────────────────────────────────────────
let activeSection = 'hot';
const sectionLoaded = { hot: false, channel: false, tools: false, ai: false, revenue: false, shop: false };

function navigateTo(section) {
  activeSection = section;

  // 모든 섹션 숨김
  document.querySelectorAll('.section-page').forEach(el => el.style.display = 'none');

  // 대상 섹션 표시
  const target = document.getElementById('section-' + section);
  if (target) target.style.display = 'block';

  // 네비 활성화
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navItem = document.querySelector(`.nav-item[data-section="${section}"]`);
  if (navItem) navItem.classList.add('active');

  // 첫 진입 시 데이터 로드
  if (!sectionLoaded[section]) {
    sectionLoaded[section] = true;
    if (section === 'hot')     loadHot();
    if (section === 'channel') initChannelSection();
    if (section === 'tools')   renderTools();
    if (section === 'ai')      initAI();
    if (section === 'revenue') initRevenue();
    if (section === 'shop')    renderShop();
  }
}

// ── 5. 인기영상 상태 변수 ─────────────────────────────────────
let hotShorts    = null;   // 쇼츠 배열
let hotLongs     = null;   // 롱폼 배열
let hotType      = 'shorts'; // 'shorts' | 'longs'
let shortsPage   = 0;
let longsPage    = 0;
const PAGE_SIZE  = 12;

// 카테고리 키워드 맵 (videoCategoryId 대신 사용)
const CAT_KEYWORDS = {
  all:      '',
  music:    '음악 뮤직비디오',
  gaming:   '게임 플레이',
  news:     '뉴스 시사',
  sports:   '스포츠 하이라이트',
  edu:      '교육 강의',
  entertain:'예능 오락',
  tech:     '기술 IT'
};

let currentCat = 'all';

// ── 6. loadHot — 메인 로드 함수 ───────────────────────────────
async function loadHot(cat) {
  if (cat !== undefined) currentCat = cat;

  hotShorts  = null;
  hotLongs   = null;
  shortsPage = 0;
  longsPage  = 0;

  showHotSkeleton();
  hideGlobalError();

  try {
    // ① mostPopular 차트로 인기영상 50개 가져오기
    const trendIds = await fetchTrendingIds();

    if (!trendIds || trendIds.length === 0) {
      // mostPopular 실패 → 키워드 검색 폴백
      console.warn('[loadHot] trending 없음 → 키워드 검색 폴백');
      await loadHotBySearch();
      return;
    }

    // ② videos.list로 상세정보(duration) 가져오기
    const videos = await fetchVideoDetails(trendIds);

    // ③ 쇼츠/롱폼 분류
    classifyVideos(videos);

  } catch (e) {
    console.error('[loadHot] 오류:', e.message);
    // 오류 시 키워드 검색 폴백
    try {
      await loadHotBySearch();
    } catch (e2) {
      console.error('[loadHot] 폴백도 실패:', e2.message);
      showHotError(e2.message);
    }
  } finally {
    hideHotSkeleton();
    renderHotSplit();
  }
}

// ── 7. fetchTrendingIds — mostPopular 차트 ID 수집 ────────────
async function fetchTrendingIds() {
  const keyword = CAT_KEYWORDS[currentCat] || '';
  let ids = [];
  let pageToken = '';

  for (let page = 0; page < 3 && ids.length < 50; page++) {
    let url = `https://www.googleapis.com/youtube/v3/videos`
            + `?part=id`
            + `&chart=mostPopular`
            + `&regionCode=KR`
            + `&maxResults=50`
            + (pageToken ? `&pageToken=${pageToken}` : '');

    // 카테고리가 all이 아닌 경우 별도 검색으로 대체
    if (keyword) break;

    try {
      const data = await apiFetch(url);
      if (data.items && data.items.length > 0) {
        ids = ids.concat(data.items.map(v => v.id));
      }
      pageToken = data.nextPageToken || '';
      if (!pageToken) break;
    } catch (e) {
      console.warn('[fetchTrendingIds]', e.message);
      break;
    }
  }

  return ids;
}

// ── 8. fetchVideoDetails — videos.list로 상세정보 가져오기 ────
async function fetchVideoDetails(ids) {
  const results = [];
  // 50개씩 나눠서 요청
  for (let i = 0; i < ids.length; i += 50) {
    const chunk = ids.slice(i, i + 50).join(',');
    try {
      const data = await apiFetch(
        `https://www.googleapis.com/youtube/v3/videos`
        + `?part=snippet,statistics,contentDetails`
        + `&id=${chunk}`
      );
      if (data.items) results.push(...data.items);
    } catch (e) {
      console.warn('[fetchVideoDetails]', e.message);
    }
  }
  return results;
}

// ── 9. loadHotBySearch — 키워드 검색 폴백 ────────────────────
async function loadHotBySearch() {
  const keyword = CAT_KEYWORDS[currentCat] || '인기 한국';
  const allItems = [];

  // 쇼츠용 검색 (60초 이하)
  try {
    const shortData = await apiFetch(
      `https://www.googleapis.com/youtube/v3/search`
      + `?part=snippet`
      + `&q=${encodeURIComponent(keyword || '인기 급상승')}`
      + `&type=video`
      + `&videoDuration=short`
      + `&regionCode=KR`
      + `&relevanceLanguage=ko`
      + `&order=viewCount`
      + `&maxResults=25`
    );
    if (shortData.items) {
      const ids = shortData.items.map(i => i.id.videoId).join(',');
      const details = await apiFetch(
        `https://www.googleapis.com/youtube/v3/videos`
        + `?part=snippet,statistics,contentDetails`
        + `&id=${ids}`
      );
      if (details.items) allItems.push(...details.items);
    }
  } catch (e) { console.warn('[loadHotBySearch/short]', e.message); }

  // 롱폼용 검색
  try {
    const longData = await apiFetch(
      `https://www.googleapis.com/youtube/v3/search`
      + `?part=snippet`
      + `&q=${encodeURIComponent(keyword || '인기 한국')}`
      + `&type=video`
      + `&videoDuration=medium`
      + `&regionCode=KR`
      + `&relevanceLanguage=ko`
      + `&order=viewCount`
      + `&maxResults=25`
    );
    if (longData.items) {
      const ids = longData.items.map(i => i.id.videoId).join(',');
      const details = await apiFetch(
        `https://www.googleapis.com/youtube/v3/videos`
        + `?part=snippet,statistics,contentDetails`
        + `&id=${ids}`
      );
      if (details.items) allItems.push(...details.items);
    }
  } catch (e) { console.warn('[loadHotBySearch/long]', e.message); }

  classifyVideos(allItems);
}

// ── 10. classifyVideos — 쇼츠/롱폼 분류 ─────────────────────
function classifyVideos(items) {
  if (!items || items.length === 0) {
    hotShorts = [];
    hotLongs  = [];
    return;
  }

  hotShorts = [];
  hotLongs  = [];

  items.forEach(v => {
    const dur = v.contentDetails?.duration || '';
    const secs = parseDuration(dur);
    if (secs <= 60) {
      hotShorts.push(v);
    } else {
      hotLongs.push(v);
    }
  });

  console.log(`[classifyVideos] 쇼츠: ${hotShorts.length}개, 롱폼: ${hotLongs.length}개`);
}

// ISO 8601 duration → 초 변환
function parseDuration(iso) {
  if (!iso) return 0;
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0);
}

function formatDuration(iso) {
  const s = parseDuration(iso);
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function formatViews(n) {
  const num = parseInt(n) || 0;
  if (num >= 100000000) return (num/100000000).toFixed(1) + '억';
  if (num >= 10000)     return (num/10000).toFixed(1) + '만';
  return num.toLocaleString();
}

// ── 11. setHotType — 쇼츠/롱폼 탭 전환 ──────────────────────
function setHotType(type) {
  hotType = type;

  document.querySelectorAll('.hot-tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);
  });

  const sg = document.getElementById('shorts-grid');
  const lg = document.getElementById('longs-grid');
  if (sg) sg.style.display = type === 'shorts' ? 'grid' : 'none';
  if (lg) lg.style.display = type === 'longs'  ? 'grid' : 'none';
}

// ── 12. renderHotSplit — 쇼츠/롱폼 렌더링 ───────────────────
function renderHotSplit() {
  const sg = document.getElementById('shorts-grid');
  const lg = document.getElementById('longs-grid');

  if (!sg || !lg) {
    console.error('[renderHotSplit] shorts-grid 또는 longs-grid 요소를 찾을 수 없음');
    return;
  }

  // 쇼츠 렌더
  if (!hotShorts || hotShorts.length === 0) {
    sg.innerHTML = '<div class="no-data-msg">😅 쇼츠 데이터가 없습니다.<br>API 키를 확인하세요.</div>';
  } else {
    const chunk = hotShorts.slice(0, PAGE_SIZE);
    sg.innerHTML = chunk.map(v => makeVideoCard(v, 'short')).join('');
    shortsPage = 1;
  }

  // 롱폼 렌더
  if (!hotLongs || hotLongs.length === 0) {
    lg.innerHTML = '<div class="no-data-msg">😅 롱폼 데이터가 없습니다.<br>API 키를 확인하세요.</div>';
  } else {
    const chunk = hotLongs.slice(0, PAGE_SIZE);
    lg.innerHTML = chunk.map(v => makeVideoCard(v, 'long')).join('');
    longsPage = 1;
  }

  // 더보기 버튼 업데이트
  const sMoreBtn = document.getElementById('shorts-more-btn');
  const lMoreBtn = document.getElementById('longs-more-btn');
  if (sMoreBtn) sMoreBtn.style.display = (hotShorts && hotShorts.length > PAGE_SIZE) ? 'block' : 'none';
  if (lMoreBtn) lMoreBtn.style.display = (hotLongs  && hotLongs.length  > PAGE_SIZE) ? 'block' : 'none';

  // 현재 탭 설정 유지
  setHotType(hotType);
}

// ── 13. makeVideoCard — 카드 HTML 생성 ───────────────────────
function makeVideoCard(v, type) {
  const id      = v.id || '';
  const snippet = v.snippet || {};
  const stats   = v.statistics || {};
  const thumb   = snippet.thumbnails?.medium?.url
               || snippet.thumbnails?.default?.url
               || `https://i.ytimg.com/vi/${id}/mqdefault.jpg`;
  const title   = (snippet.title || '제목 없음').replace(/</g, '&lt;');
  const channel = (snippet.channelTitle || '').replace(/</g, '&lt;');
  const views   = formatViews(stats.viewCount);
  const dur     = formatDuration(v.contentDetails?.duration || '');
  const pubDate = snippet.publishedAt ? snippet.publishedAt.slice(0,10) : '';

  return `
    <div class="video-card" onclick="window.open('https://www.youtube.com/watch?v=${id}','_blank')">
      <div class="thumb-wrap">
        <img src="${thumb}" alt="${title}" loading="lazy" onerror="this.src='https://i.ytimg.com/vi/${id}/mqdefault.jpg'">
        ${dur ? `<span class="duration-badge">${dur}</span>` : ''}
        ${type === 'short' ? '<span class="shorts-badge">SHORT</span>' : ''}
      </div>
      <div class="card-info">
        <p class="card-title">${title}</p>
        <p class="card-channel">${channel}</p>
        <div class="card-meta">
          <span>👁 ${views}</span>
          ${pubDate ? `<span>📅 ${pubDate}</span>` : ''}
        </div>
      </div>
    </div>`;
}

// ── 14. 더보기 기능 ───────────────────────────────────────────
function loadMoreShorts() {
  if (!hotShorts || hotShorts.length === 0) return;
  const sg = document.getElementById('shorts-grid');
  if (!sg) return;

  const start = shortsPage * PAGE_SIZE;
  const chunk = hotShorts.slice(start, start + PAGE_SIZE);
  if (chunk.length === 0) return;

  sg.insertAdjacentHTML('beforeend', chunk.map(v => makeVideoCard(v, 'short')).join(''));
  shortsPage++;

  const btn = document.getElementById('shorts-more-btn');
  if (btn) btn.style.display = (shortsPage * PAGE_SIZE >= hotShorts.length) ? 'none' : 'block';
}

function loadMoreLongs() {
  if (!hotLongs || hotLongs.length === 0) return;
  const lg = document.getElementById('longs-grid');
  if (!lg) return;

  const start = longsPage * PAGE_SIZE;
  const chunk = hotLongs.slice(start, start + PAGE_SIZE);
  if (chunk.length === 0) return;

  lg.insertAdjacentHTML('beforeend', chunk.map(v => makeVideoCard(v, 'long')).join(''));
  longsPage++;

  const btn = document.getElementById('longs-more-btn');
  if (btn) btn.style.display = (longsPage * PAGE_SIZE >= hotLongs.length) ? 'none' : 'block';
}

// ── 15. 스켈레톤/에러 UI ──────────────────────────────────────
function showHotSkeleton() {
  const sg = document.getElementById('shorts-grid');
  const lg = document.getElementById('longs-grid');
  const skeletonHTML = Array(8).fill(0).map(() => `
    <div class="video-card skeleton">
      <div class="thumb-wrap skeleton-box"></div>
      <div class="card-info">
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
      </div>
    </div>`).join('');
  if (sg) sg.innerHTML = skeletonHTML;
  if (lg) lg.innerHTML = skeletonHTML;
}

function hideHotSkeleton() {
  // renderHotSplit이 덮어쓰므로 별도 처리 불필요
}

function showHotError(msg) {
  const errorHTML = `
    <div class="api-error-card">
      <div style="font-size:48px">⚠️</div>
      <h3>영상을 불러오지 못했습니다</h3>
      <p>${msg || 'API 키를 확인하세요.'}</p>
      <button onclick="sectionLoaded.hot=false; loadHot();" class="retry-btn">🔄 다시 시도</button>
    </div>`;
  const sg = document.getElementById('shorts-grid');
  const lg = document.getElementById('longs-grid');
  if (sg) sg.innerHTML = errorHTML;
  if (lg) lg.innerHTML = '';
}

// ── 16. 카테고리 필터 ─────────────────────────────────────────
function selectHotCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
  sectionLoaded.hot = false;
  loadHot(cat);
}

// ── 17. 채널 분석 (stub) ──────────────────────────────────────
function initChannelSection() {
  console.log('[채널 분석] 초기화');
  // 기존 채널 분석 로직 연결
}

async function analyzeChannel() {
  const input = document.getElementById('channelInput');
  if (!input) return;
  const query = input.value.trim();
  if (!query) return alert('채널명 또는 URL을 입력하세요.');

  const resultEl = document.getElementById('channelResult');
  if (resultEl) resultEl.innerHTML = '<p>🔍 분석 중...</p>';

  try {
    // 채널 검색
    const searchData = await apiFetch(
      `https://www.googleapis.com/youtube/v3/search`
      + `?part=snippet&type=channel&q=${encodeURIComponent(query)}&maxResults=1`
    );
    if (!searchData.items?.length) {
      if (resultEl) resultEl.innerHTML = '<p>채널을 찾을 수 없습니다.</p>';
      return;
    }

    const cid = searchData.items[0].id.channelId;

    // 채널 상세
    const chData = await apiFetch(
      `https://www.googleapis.com/youtube/v3/channels`
      + `?part=snippet,statistics,brandingSettings&id=${cid}`
    );

    const ch    = chData.items?.[0];
    const stats = ch?.statistics || {};
    const subs  = formatViews(stats.subscriberCount);
    const vids  = parseInt(stats.videoCount||0).toLocaleString();
    const views = formatViews(stats.viewCount);
    const name  = ch?.snippet?.title || query;
    const thumb = ch?.snippet?.thumbnails?.medium?.url || '';
    const desc  = (ch?.snippet?.description || '').slice(0,200);

    if (resultEl) resultEl.innerHTML = `
      <div class="channel-result-card">
        ${thumb ? `<img src="${thumb}" alt="${name}" style="border-radius:50%;width:80px;height:80px;">` : ''}
        <h2>${name}</h2>
        <div class="channel-stats">
          <div><b>구독자</b><br>${subs}</div>
          <div><b>동영상</b><br>${vids}</div>
          <div><b>총 조회수</b><br>${views}</div>
        </div>
        <p style="margin-top:12px;color:#aaa;font-size:13px;">${desc}</p>
      </div>`;

  } catch (e) {
    if (resultEl) resultEl.innerHTML = `<p style="color:#f66">오류: ${e.message}</p>`;
  }
}

// ── 18. 도구/AI/수익/쇼핑 stub ───────────────────────────────
function renderTools()  { console.log('[Tools] 렌더'); }
function initAI()       { console.log('[AI] 초기화'); }
function initRevenue()  { console.log('[Revenue] 초기화'); }
function renderShop()   { console.log('[Shop] 렌더'); }

// ── 19. 수익 계산기 ───────────────────────────────────────────
function calcRevenue() {
  const views   = parseFloat(document.getElementById('revenueViews')?.value || 0);
  const cpm     = parseFloat(document.getElementById('revenueCPM')?.value   || 2);
  const rev     = (views / 1000) * cpm * 0.55;
  const resultEl = document.getElementById('revenueResult');
  if (resultEl) resultEl.textContent = `예상 수익: $${rev.toFixed(2)} (월 ${(rev*30).toFixed(0)}달러)`;
}

// ── 20. DOMContentLoaded 초기화 ───────────────────────────────
document.addEventListener('DOMContentLoaded', () => {

  // 네비게이션 이벤트 바인딩
  document.querySelectorAll('.nav-item[data-section]').forEach(btn => {
    btn.addEventListener('click', () => navigateTo(btn.dataset.section));
  });

  // 쇼츠/롱폼 탭 전환 버튼
  document.querySelectorAll('.hot-tab-btn[data-type]').forEach(btn => {
    btn.addEventListener('click', () => setHotType(btn.dataset.type));
  });

  // 카테고리 버튼
  document.querySelectorAll('.cat-btn[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => selectHotCat(btn.dataset.cat));
  });

  // 더보기 버튼
  const sMoreBtn = document.getElementById('shorts-more-btn');
  const lMoreBtn = document.getElementById('longs-more-btn');
  if (sMoreBtn) sMoreBtn.addEventListener('click', loadMoreShorts);
  if (lMoreBtn) lMoreBtn.addEventListener('click', loadMoreLongs);

  // 채널 분석 버튼
  const analyzeBtn = document.getElementById('analyzeBtn');
  if (analyzeBtn) analyzeBtn.addEventListener('click', analyzeChannel);

  // Enter 키
  const channelInput = document.getElementById('channelInput');
  if (channelInput) channelInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') analyzeChannel();
  });

  // 초기 섹션 로드 (hot)
  navigateTo('hot');
});
</script>
