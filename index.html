<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX 카드 10종 컬렉션</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070f;--text:#e8e8f0;--sub:#7777aa;}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;padding:48px 24px 80px;
}
.page-title{
  text-align:center;font-size:1.9rem;font-weight:900;
  background:linear-gradient(90deg,#c084fc,#ffd700,#00ffff,#ffd700,#c084fc);
  background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:titleSlide 4s linear infinite;margin-bottom:8px;
}
@keyframes titleSlide{to{background-position:200% center;}}
.page-sub{text-align:center;color:var(--sub);font-size:.88rem;margin-bottom:60px;}
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:80px 40px;padding:40px 20px 60px;
  max-width:1400px;margin:0 auto;
}
.card-wrap{display:flex;flex-direction:column;align-items:center;}
.sample-label{
  text-align:center;margin-top:14px;
  font-size:.75rem;font-weight:700;letter-spacing:.07em;color:var(--sub);
}

/* ══════════════════════════════════
   공통 카드 구조
══════════════════════════════════ */
.card-scene{
  width:220px;height:308px;
  perspective:900px;position:relative;cursor:pointer;
}
.card-tilt{
  position:absolute;inset:0;transform-style:preserve-3d;
  transform:rotateX(0deg) rotateY(0deg);
  transition:transform .1s ease;will-change:transform;
}
.card-frame{
  position:absolute;inset:-3px;border-radius:21px;
  z-index:1;pointer-events:none;
}
.card-frame::after{
  content:'';position:absolute;inset:2px;
  border-radius:19px;background:var(--bg);
}
.beam-container{
  position:absolute;inset:-3px;border-radius:21px;
  overflow:hidden;z-index:2;pointer-events:none;
}
.beam-ring{
  position:absolute;width:400%;height:400%;
  top:50%;left:50%;margin-top:-200%;margin-left:-200%;
  animation:beamRingSpin var(--spd,2.5s) linear infinite;
  transform-origin:center center;
}
@keyframes beamRingSpin{from{rotate:0deg;}to{rotate:360deg;}}
.card-body{
  position:absolute;inset:0;border-radius:18px;z-index:3;
  transition:box-shadow .3s ease;
}
.card-face{
  position:absolute;inset:0;border-radius:18px;overflow:hidden;
}
.card-face::before{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:repeating-linear-gradient(
    -45deg,transparent 0px,transparent 3px,
    rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px);
  pointer-events:none;z-index:1;
}
.card-shine{
  position:absolute;inset:0;border-radius:18px;
  pointer-events:none;z-index:5;mix-blend-mode:screen;
  transition:background .08s ease;
}
.card-top-band{
  position:absolute;top:0;left:0;right:0;height:44%;
  border-radius:18px 18px 0 0;z-index:2;pointer-events:none;
}
.card-bot-band{
  position:absolute;bottom:0;left:0;right:0;height:40%;
  border-radius:0 0 18px 18px;z-index:2;pointer-events:none;
}
.card-header{
  position:absolute;top:0;left:0;right:0;padding:13px 14px 0;
  display:flex;justify-content:space-between;align-items:flex-start;z-index:10;
}
.card-stars{display:flex;gap:2px;}
.card-star{
  font-size:13px;
  animation:starTwinkle var(--st-dur,3s) ease-in-out infinite;
  animation-delay:var(--st-del,0s);
}
@keyframes starTwinkle{0%,100%{opacity:.55;transform:scale(.88);}50%{opacity:1;transform:scale(1.15);}}
.card-badge{
  color:#fff;padding:4px 11px;border-radius:8px;
  font-size:10px;font-weight:900;letter-spacing:.09em;
  box-shadow:0 2px 10px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.2);
}
.card-bokeh{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden;border-radius:18px;}
.bokeh-dot{
  position:absolute;border-radius:50%;
  filter:blur(var(--bb,5px));opacity:var(--bo,.35);
  animation:bokehDrift var(--bd,7s) ease-in-out infinite;
  animation-delay:var(--bdl,0s);
}
@keyframes bokehDrift{
  0%,100%{transform:translate(0,0) scale(1);}
  25%{transform:translate(7px,-9px) scale(1.12);}
  50%{transform:translate(-6px,7px) scale(.91);}
  75%{transform:translate(9px,4px) scale(1.06);}
}
.card-sparkles{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:hidden;border-radius:18px;}
.sparkle-dot{
  position:absolute;font-size:var(--ssz,11px);
  animation:sparklePop var(--sdur,2.2s) ease-in-out infinite;
  animation-delay:var(--sdel,0s);
}
@keyframes sparklePop{
  0%,100%{opacity:.08;transform:scale(.45) rotate(-12deg);}
  40%{opacity:1;transform:scale(1.25) rotate(12deg);}
  65%{opacity:.75;transform:scale(1.05) rotate(5deg);}
}
.card-icon-wrap{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-54%);z-index:8;
  display:flex;flex-direction:column;align-items:center;gap:9px;
}
.card-main-icon{
  font-size:3.5rem;
  animation:iconHover 3.5s ease-in-out infinite;
}
@keyframes iconHover{
  0%,100%{transform:translateY(0) rotateY(0deg);}
  30%{transform:translateY(-7px) rotateY(9deg);}
  70%{transform:translateY(-3px) rotateY(-6deg);}
}
.card-main-name{font-size:1.06rem;font-weight:900;letter-spacing:.06em;}
.card-vignette{
  position:absolute;inset:0;z-index:6;pointer-events:none;border-radius:18px;
  background:radial-gradient(ellipse at center,transparent 28%,rgba(4,4,12,.62) 100%);
}
.card-footer{
  position:absolute;bottom:0;left:0;right:0;padding:11px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:10;border-radius:0 0 18px 18px;
}
.footer-lv{
  font-size:10px;font-weight:900;
  background:rgba(0,0,0,.32);padding:3px 9px;border-radius:6px;letter-spacing:.07em;
}
.footer-name{font-size:13px;font-weight:800;}
.footer-subs{font-size:10px;opacity:.7;}

/* ══════════════════════════════════
   1. MAX — 딥 퍼플 + 골드 (픽스)
══════════════════════════════════ */
.c1 .card-frame{
  background:linear-gradient(135deg,#1a0030,#7b2fff,#c084fc,#ffd700,#c084fc,#7b2fff,#1a0030);
  background-size:300% 300%;animation:c1Frame 2.5s ease-in-out infinite;
}
@keyframes c1Frame{
  0%{background-position:0% 50%;filter:brightness(1.4) saturate(1.4);}
  50%{background-position:100% 50%;filter:brightness(1.9) saturate(1.7);}
  100%{background-position:0% 50%;filter:brightness(1.4) saturate(1.4);}
}
.c1 .beam-ring{
  background:conic-gradient(from 0deg,transparent 0%,#3d007a 2%,#9b40ff 4%,#ffd700 5.5%,#9b40ff 7%,#3d007a 9%,transparent 11%,transparent 100%);
  filter:brightness(1.7) saturate(1.5);
}
.c1 .card-body{animation:c1Glow 2.5s ease-in-out infinite;}
@keyframes c1Glow{
  0%,100%{box-shadow:0 25px 65px rgba(0,0,0,.8),0 0 50px rgba(123,47,255,.4),0 0 90px rgba(123,47,255,.2),0 0 0 1px rgba(192,132,252,.35);}
  50%{box-shadow:0 25px 65px rgba(0,0,0,.8),0 0 80px rgba(150,80,255,.6),0 0 140px rgba(123,47,255,.35),0 0 0 1px rgba(220,160,255,.55);}
}
.c1 .card-face{background:radial-gradient(ellipse 70% 55% at 50% 38%,rgba(140,60,255,.22) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 50% 38%,rgba(255,215,0,.08) 0%,transparent 60%),linear-gradient(160deg,#0d0018 0%,#060010 50%,#0d0018 100%);}
.c1 .card-top-band{background:linear-gradient(180deg,rgba(155,64,255,.4) 0%,transparent 100%);}
.c1 .card-bot-band{background:linear-gradient(0deg,rgba(123,47,255,.35) 0%,transparent 100%);}
.c1 .card-badge{background:linear-gradient(135deg,#3d007a,#9b40ff,#ffd700);color:#fff;}
.c1 .card-star{color:#ffd700;text-shadow:0 0 8px #ffd700,0 0 20px rgba(200,100,255,.7);}
.c1 .bokeh-dot{background:radial-gradient(circle,rgba(180,100,255,.8) 0%,transparent 70%);}
.c1 .sparkle-dot{color:#ffd700;text-shadow:0 0 8px #ffd700,0 0 20px rgba(180,100,255,.9);}
.c1 .card-main-icon{filter:drop-shadow(0 0 16px #9b40ff) drop-shadow(0 0 36px rgba(123,47,255,.7)) drop-shadow(0 0 8px #ffd700) drop-shadow(0 5px 18px rgba(0,0,0,.6));}
.c1 .card-main-name{background:linear-gradient(90deg,#c084fc,#ffd700,#fff,#ffd700,#c084fc);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:cNameSlide 2s linear infinite;filter:brightness(1.2);}
.c1 .card-shine{background:linear-gradient(135deg,rgba(200,150,255,.14) 0%,rgba(255,215,0,.06) 35%,transparent 60%),linear-gradient(225deg,rgba(180,100,255,.09) 0%,transparent 50%);}
.c1 .card-footer{background:linear-gradient(135deg,#0d0018 0%,#1a0035 100%);border-top:1px solid rgba(180,100,255,.3);}
.c1 .footer-lv{color:#c084fc;border:1px solid rgba(180,100,255,.4);}
.c1 .footer-name{color:#e0b0ff;text-shadow:0 0 10px rgba(180,100,255,.7);}
.c1 .footer-subs{color:rgba(192,132,252,.55);}

function buildCard(c){
  const stars=Array.from({length:5},(_,i)=>
    `<span class="card-star" style="--st-dur:${2+i*.4}s;--st-del:${i*.2}s;">★</span>`
  ).join('');

  const bokeh=BOKEH_BASE.map((b,i)=>
    `<div class="bokeh-dot" style="width:${b.w}px;height:${b.h}px;left:${b.l}%;top:${b.t}%;--bb:${b.blur}px;--bo:${b.op};--bd:${b.dur}s;--bdl:${b.del}s;"></div>`
  ).join('');

  const sparkles=SPARKLE_BASE.map(s=>
    `<span class="sparkle-dot" style="left:${s.l}%;top:${s.t}%;--ssz:${s.sz}px;--sdur:${s.dur};--sdel:${s.del};">✦</span>`
  ).join('');

  /* 빔 4개 */
  let beams='';
  for(let i=0;i<4;i++){
    beams+=`<div class="beam-container"><div class="beam-ring" style="--spd:2.5s;animation-delay:-${(2.5/4*i).toFixed(3)}s;"></div></div>`;
  }

  return `
<div class="card-wrap">
  <div class="card-scene ${c.cls}"
    onmousemove="card3D(event,this)"
    onmouseleave="cardReset(this)">
    <div class="card-tilt">
      <div class="card-frame"></div>
      ${beams}
      <div class="card-body">
        <div class="card-face">
          <div class="card-bokeh">${bokeh}</div>
          <div class="card-sparkles">${sparkles}</div>
          <div class="card-header">
            <div class="card-stars">${stars}</div>
            <div class="card-badge">${c.badge}</div>
          </div>
          <div class="card-icon-wrap">
            <div class="card-main-icon">${c.icon}</div>
            <div class="card-main-name">${c.name}</div>
          </div>
          <div class="card-top-band"></div>
          <div class="card-bot-band"></div>
          <div class="card-vignette"></div>
          <div class="card-shine"></div>
          <div class="card-footer">
            <div class="footer-lv">LV.${c.lv}</div>
            <div class="footer-name">${c.name}</div>
            <div class="footer-subs">${c.subs}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="sample-label">${c.label}</div>
</div>`;
}

function card3D(e,el){
  const r=el.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;
  const ry=((x-r.width/2)/(r.width/2))*20;
  const rx=-((y-r.height/2)/(r.height/2))*20;
  const mx=(x/r.width*100).toFixed(1)+'%';
  const my=(y/r.height*100).toFixed(1)+'%';
  el.querySelector('.card-tilt').style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) scale(1.04)`;
  el.querySelector('.card-shine').style.background=`
    linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),
    linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%),
    radial-gradient(ellipse 55% 45% at ${mx} ${my},rgba(255,255,255,.22) 0%,rgba(255,255,255,.05) 50%,transparent 75%)`;
}
function cardReset(el){
  el.querySelector('.card-tilt').style.transform='rotateX(0deg) rotateY(0deg) scale(1)';
  el.querySelector('.card-shine').style.background=`
    linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),
    linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%)`;
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('cards-grid').innerHTML=CARDS.map(buildCard).join('');
});
</script>
</body>
</html>
