<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTAnalytics Pro – 유튜브 채널 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --bg2:#111118; --bg3:#1a1a25;
  --border:#2a2a3a; --text:#e8e8f0; --text2:#9090b0;
  --accent:#4f8ef7; --card-bg:#12121e; --card-border:#252535;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

@keyframes rainbowText{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes floatUp{0%,100%{transform:translateY(0) rotateY(0deg)}50%{transform:translateY(-8px) rotateY(4deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes borderPulse{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes scoreIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}

/* ════ HEADER ════ */
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 16px;height:54px;}
.logo{font-size:1.1rem;font-weight:900;color:#ff4040;flex-shrink:0;letter-spacing:-.5px;}
.logo span{color:var(--accent);}
.header-search{flex:1;max-width:360px;display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.header-search input{flex:1;background:none;border:none;outline:none;color:var(--text);padding:7px 13px;font-size:.84rem;font-family:inherit;}
.header-search button{background:var(--accent);border:none;color:#fff;padding:7px 12px;cursor:pointer;font-size:.8rem;transition:background .2s;}
.header-search button:hover{background:#3a7ae8;}
.header-nav{display:flex;gap:4px;margin-left:auto;}
.nav-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:14px;cursor:pointer;font-size:.74rem;font-family:inherit;transition:all .2s;white-space:nowrap;}
.nav-btn:hover,.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.menu-btn{display:none;background:none;border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;cursor:pointer;}

/* ════ LAYOUT ════ */
.layout{display:flex;min-height:calc(100vh - 54px);}
.sidebar{width:195px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:11px 7px;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;transition:transform .3s;}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:.8rem;transition:all .2s;margin-bottom:2px;}
.sidebar-item:hover,.sidebar-item.active{background:var(--bg3);color:var(--text);transform:translateX(3px);}
.sidebar-icon{font-size:.9rem;width:18px;text-align:center;}

/* ════ MAIN + AD SAFE ZONE ════ */
.main-wrapper{flex:1;display:flex;min-width:0;}
.main{flex:1;padding:18px;overflow-y:auto;min-width:0;}
/* 광고 영역: 기존 160px → 400px (2.5배) */
.ad-zone{width:400px;flex-shrink:0;padding:10px 10px;border-left:1px solid var(--border);background:var(--bg2);}
.ad-placeholder{width:100%;min-height:300px;background:var(--bg3);border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--text2);text-align:center;padding:10px;margin-bottom:10px;}

.section{display:none;animation:fadeIn .33s ease;}
.section.active{display:block;}
.btn{padding:8px 17px;border-radius:8px;border:none;font-family:inherit;font-size:.83rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#3a7ae8;transform:translateY(-1px);}
.btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.search-form{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.search-form input{flex:1;min-width:190px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 12px;font-size:.84rem;font-family:inherit;outline:none;transition:border-color .2s;}
.search-form input:focus{border-color:var(--accent);}
.section-title{font-size:1.2rem;font-weight:900;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:9px;}
.section-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:13px;padding:15px;transition:transform .22s,box-shadow .22s;}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.5);}

/* ══════════════════════════════════════════════════
   LEVEL CARD  – unified design, border thickness by lv
══════════════════════════════════════════════════ */
.lv-card-wrap{perspective:1000px;display:flex;justify-content:center;}

/* border thickness per level: lv1=1px … lv10=10px */
.lv-card{
  position:relative;
  width:255px; height:315px;
  border-radius:20px;
  background:var(--card-bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transform-style:preserve-3d;
  animation:floatUp 5s ease-in-out infinite;
  transition:transform .5s,box-shadow .4s;
  overflow:hidden; cursor:pointer;
  /* border & glow set via JS */
  border-style:solid;
  border-color:var(--lv-glow,#4f8ef7);
}
/* outer glow rings */
.lv-card::before{
  content:'';position:absolute;inset:-4px;border-radius:24px;
  background:transparent;
  border:inherit;
  border-color:var(--lv-glow,#4f8ef7);
  opacity:.3;filter:blur(4px);
  pointer-events:none;z-index:5;
  animation:borderPulse 2.5s ease-in-out infinite;
}
/* bottom inner ambient */
.lv-card::after{content:'';position:absolute;inset:0;border-radius:20px;background:radial-gradient(ellipse at 50% 115%,var(--lv-glow,#4f8ef7)1a,transparent 60%);opacity:.2;pointer-events:none;z-index:1;}
.lv-card:hover{transform:rotateY(8deg) rotateX(-4deg) scale(1.03);}
.lv-card canvas.spark-canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:20px;z-index:0;pointer-events:none;}

/* ── level number ── */
.lv-num{
  font-size:5rem;font-weight:900;line-height:1;
  position:relative;z-index:2;
  color:var(--lv-color,#9ca3af);
  /* stroke thinned */
  -webkit-text-stroke:var(--lv-stroke,1px) var(--lv-color,#9ca3af);
  text-shadow:0 0 18px var(--lv-color,#9ca3af)88,0 0 36px var(--lv-color,#9ca3af)33;
  letter-spacing:-2px;
}
.lv-num.rainbow{background:linear-gradient(90deg,#ff0080,#ff6b00,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;filter:none;}

/* ── LEVEL label ── */
.lv-label{font-size:.6rem;font-weight:700;letter-spacing:5px;color:var(--text2);text-transform:uppercase;position:relative;z-index:2;margin-top:-4px;}

/* ── grade name ── */
.lv-name{font-size:1rem;font-weight:700;color:var(--lv-color,#9ca3af);position:relative;z-index:2;margin-top:7px;-webkit-text-stroke:var(--name-stroke,.4px) var(--lv-color,#9ca3af);text-shadow:0 0 6px var(--lv-color,#9ca3af)55;}
.lv-name.rainbow{background:linear-gradient(90deg,#ff0080,#ff6b00,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;}

/* ── sub range ── */
.lv-range{font-size:.7rem;color:var(--lv-color,#9ca3af);opacity:.65;position:relative;z-index:2;margin-top:4px;text-align:center;}

/* ── play badge ── */
.lv-play{font-size:.62rem;padding:2px 9px;border-radius:14px;border:1px solid var(--card-border);color:var(--text2);background:rgba(0,0,0,.4);position:relative;z-index:2;margin-top:8px;}

/* ── top rank badge ── */
.lv-rank-badge{
  position:absolute;top:10px;left:12px;
  font-size:.6rem;padding:2px 7px;border-radius:6px;
  background:rgba(0,0,0,.65);border:1px solid var(--lv-glow,#333);
  color:var(--lv-color,#9ca3af);z-index:6;font-weight:700;
}

/* ── pct ring ── */
.lv-pct-ring{position:absolute;top:8px;right:10px;width:40px;height:40px;z-index:6;}
.lv-pct-ring svg{width:100%;height:100%;}
.lv-pct-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.54rem;font-weight:700;line-height:1.2;text-align:center;color:var(--lv-color,#9ca3af);}

/* ── algo score badge ── */
.lv-score-badge{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;z-index:6;}
.lv-score-inner{background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:3px 11px;font-size:.64rem;color:var(--text2);}
.lv-score-inner b{color:var(--lv-color,#9ca3af);}

/* ════ ANALYSIS LAYOUT ════ */
.analysis-container{display:grid;grid-template-columns:270px 1fr;gap:16px;align-items:start;}
.analysis-right{display:flex;flex-direction:column;gap:10px;}

/* channel info */
.ch-info-card{display:flex;align-items:center;gap:10px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:11px 13px;}
.ch-avatar{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--card-border);}
.ch-meta h3{font-size:.88rem;font-weight:700;}
.ch-meta p{font-size:.7rem;color:var(--text2);margin-top:2px;line-height:1.35;}

/* lv decision */
.lv-decision{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.lv-dec-badge{font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:8px;background:var(--bg3);border:1px solid var(--card-border);}
.lv-dec-arrow{color:var(--text2);font-size:.74rem;}
.lv-dec-final{font-size:.82rem;font-weight:900;}

/* ════ FACTOR CARDS ════ */
.factor-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.factor-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:11px 13px;position:relative;overflow:hidden;}
.factor-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fc-color,#4f8ef7);border-radius:3px 0 0 3px;}
.f-icon{font-size:1.2rem;margin-bottom:3px;}
.f-label{font-size:.65rem;color:var(--text2);margin-bottom:1px;font-weight:500;}
.f-big{font-size:1.3rem;font-weight:900;line-height:1.05;margin-bottom:1px;}
.f-sub{font-size:.62rem;color:var(--text2);}
.f-quality{display:inline-flex;align-items:center;gap:2px;margin-top:3px;font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:7px;}
.fq-best{background:#0d2b0d;color:#4ade80;border:1px solid #1a4a1a;}
.fq-good{background:#1a2505;color:#a3e635;border:1px solid #2a3a0a;}
.fq-mid {background:#2b2005;color:#fbbf24;border:1px solid #3a3010;}
.fq-low {background:#2b0505;color:#f87171;border:1px solid #3a1010;}
.f-bar-wrap{margin-top:5px;height:3px;background:var(--border);border-radius:2px;}
.f-bar{height:100%;border-radius:2px;transition:width 1.1s cubic-bezier(.22,1,.36,1);}

/* ════ SCORE BREAKDOWN ════ */
.score-breakdown{background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:13px 15px;}
.score-breakdown h4{font-size:.82rem;font-weight:700;margin-bottom:10px;}
.score-row{margin-bottom:8px;}
.score-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;font-size:.74rem;}
.score-key{color:var(--text2);}
.score-val{font-weight:700;}
.bonus-tag{font-size:.57rem;padding:1px 5px;border-radius:5px;background:#0d2b0d;color:#4ade80;border:1px solid #1a4a1a;margin-left:3px;}
.score-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.score-bar{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.22,1,.36,1);}
.total-score-box{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:8px;padding:10px 13px;border:1px solid var(--card-border);margin-top:9px;animation:scoreIn .6s ease;}
.total-score-label{font-size:.75rem;color:var(--text2);}
.total-score-num{font-size:1.45rem;font-weight:900;}
.total-score-num.rainbow{background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:rainbowText 2s linear infinite;}

/* ════ GRADE TABLE (inline, compact) ════ */
.grade-table-wrap{overflow-x:auto;}
table.grade-table{width:100%;border-collapse:collapse;font-size:.78rem;}
.grade-table th{background:var(--bg3);color:var(--text2);font-weight:600;padding:7px 8px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;}
.grade-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.grade-table tr{cursor:pointer;transition:background .15s;}
.grade-table tr:hover{background:var(--bg3);}
.grade-table tr.active-row{background:rgba(79,142,247,.08);border-left:2px solid var(--row-color,#4f8ef7);}
/* lv chip: just a colored number, no special fx */
.lv-chip-simple{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;
  background:var(--card-bg);
  font-size:.72rem;font-weight:900;
  color:var(--chip-c,#9ca3af);
  border:1.5px solid var(--chip-c,#555);
}
.ach-bar-wrap{width:55px;height:4px;background:var(--border);border-radius:2px;}
.ach-bar{height:100%;border-radius:2px;}
.play-badge{font-size:.65rem;padding:1px 6px;border-radius:5px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);}
.prev-btn{font-size:.6rem;padding:2px 7px;border-radius:6px;border:1px solid var(--card-border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .18s;white-space:nowrap;}
.prev-btn:hover{border-color:var(--btn-c,#4f8ef7);color:var(--btn-c,#4f8ef7);}

/* ════ INLINE SECTION TITLES ════ */
.inline-title{font-size:.92rem;font-weight:900;margin:18px 0 10px;color:var(--text);display:flex;align-items:center;gap:8px;}
.inline-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

/* ════ BENCHMARK TIPS ════ */
.bench-tip-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:9px;padding:11px 14px;margin-bottom:8px;transition:transform .18s,border-color .18s;border-left:3px solid var(--tip-c,#4f8ef7);}
.bench-tip-card:hover{transform:translateX(3px);}
.bench-tip-card h4{font-size:.8rem;font-weight:700;margin-bottom:3px;color:var(--tip-c,#4f8ef7);}
.bench-tip-card p{font-size:.73rem;color:var(--text2);line-height:1.58;}

/* ════ EFFECT MODAL ════ */
.modal-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.effect-modal{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;width:min(720px,96vw);max-height:90vh;overflow-y:auto;padding:20px;animation:fadeIn .3s ease;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-head h2{font-size:1rem;font-weight:900;}
.modal-close{background:none;border:1px solid var(--border);color:var(--text);width:27px;height:27px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{background:var(--bg3);border-color:var(--accent);}
.modal-nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;justify-content:center;}
.lv-nav-btn{width:29px;height:29px;border-radius:50%;border:2px solid var(--nb-c,#555);background:var(--card-bg);color:var(--nb-c,#aaa);font-size:.7rem;font-weight:900;cursor:pointer;transition:all .2s;font-family:inherit;}
.lv-nav-btn:hover,.lv-nav-btn.active{background:var(--nb-c,#555);color:#000;transform:scale(1.1);}
.modal-body{display:grid;grid-template-columns:240px 1fr;gap:16px;align-items:start;}
/* ── MODAL PREVIEW CARD: same as main card ── */
.prev-card-wrap{perspective:600px;display:flex;justify-content:center;}
.prev-card{
  width:215px;height:275px;border-radius:18px;
  background:var(--card-bg);
  position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  transform-style:preserve-3d;
  animation:floatUp 3.5s ease-in-out infinite;
  overflow:hidden;cursor:default;
  border-style:solid;
  border-color:var(--prev-glow,#4f8ef7);
}
.prev-card::before{content:'';position:absolute;inset:-4px;border-radius:22px;background:transparent;border:inherit;border-color:var(--prev-glow,#4f8ef7);opacity:.3;filter:blur(4px);pointer-events:none;z-index:5;animation:borderPulse 2.5s ease-in-out infinite;}
.prev-card::after{content:'';position:absolute;inset:0;border-radius:18px;background:radial-gradient(ellipse at 50% 115%,var(--prev-glow,#4f8ef7)1a,transparent 60%);opacity:.2;pointer-events:none;z-index:1;}
.prev-card canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;}
/* same text elements as lv-card */
.prev-num{font-size:3.8rem;font-weight:900;line-height:1;position:relative;z-index:2;color:var(--prev-color,#9ca3af);-webkit-text-stroke:var(--prev-stroke,1px) var(--prev-color,#9ca3af);text-shadow:0 0 16px var(--prev-color,#9ca3af)77;}
.prev-num.rainbow{background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;}
.prev-label{font-size:.58rem;font-weight:700;letter-spacing:5px;color:var(--text2);z-index:2;margin-top:-4px;}
.prev-name{font-size:.86rem;font-weight:700;color:var(--prev-color,#9ca3af);z-index:2;margin-top:6px;-webkit-text-stroke:.3px var(--prev-color,#9ca3af);}
.prev-name.rainbow{background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#7c3aed,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;-webkit-text-stroke:0;animation:rainbowText 2.5s linear infinite;}
.prev-range{font-size:.64rem;color:var(--prev-color,#9ca3af);opacity:.6;z-index:2;margin-top:3px;text-align:center;}
.prev-play{font-size:.6rem;padding:2px 8px;border-radius:12px;border:1px solid var(--card-border);color:var(--text2);background:rgba(0,0,0,.4);z-index:2;margin-top:7px;}
.modal-info{display:flex;flex-direction:column;gap:8px;}
.modal-info h3{font-size:.9rem;font-weight:900;}
.stat-row{display:flex;align-items:center;gap:7px;font-size:.75rem;padding:4px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.stat-key{color:var(--text2);min-width:78px;}
.stat-val{font-weight:700;}
.compare-bars{display:flex;flex-direction:column;gap:5px;}
.cbar-row{display:flex;flex-direction:column;gap:2px;}
.cbar-label{font-size:.65rem;color:var(--text2);display:flex;justify-content:space-between;}
.cbar-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.cbar-fill{height:100%;border-radius:3px;transition:width 1s ease;}
.perk-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px;}
.perk-tag{padding:2px 7px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);font-size:.62rem;color:var(--text2);}

/* hot videos */
.hot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.hot-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:9px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;}
.hot-card:hover{transform:translateY(-3px);box-shadow:0 4px 18px rgba(0,0,0,.5);}
.hot-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.hot-meta{padding:7px 9px;}

/* border thickness per level: lv1=1px, lv10=10px */
function getBorderWidth(lv){ return lv+'px'; }
/* box-shadow glow scale per level */
function getGlowShadow(lv, color){
  const s=lv;
  return `0 0 0 ${s}px ${color}, 0 0 ${s*4}px ${s*2}px ${color}44, 0 0 ${s*10}px ${s*3}px ${color}22`;
}

function getStrokeWidth(lv){ return [1,1.2,1.4,1.6,1.8,2,2.2,2.6,3.2,0][lv-1]+'px'; }
function getNameStroke(lv) { return [.3,.35,.4,.45,.5,.55,.6,.7,.85,0][lv-1]+'px'; }

/* fmt: integer only, no decimals */
function fmt(n){
  if(n===Infinity||n===undefined)return'∞';
  if(n>=1e8)return Math.floor(n/1e8)+'억';
  if(n>=1e4)return Math.floor(n/1e4)+'만';
  if(n>=1e3)return Math.floor(n/1e3)+'천';
  return Math.floor(n)+'';
}
function fmtMoney(n){return'₩'+Math.floor(n).toLocaleString('ko-KR');}
function calcPct(s){
  if(s>=5e7)return'0.00005%';if(s>=1e7)return'0.002%';if(s>=5e6)return'0.02%';
  if(s>=1e6)return'0.1%';if(s>=1e5)return'1%';if(s>=1e4)return'6%';
  if(s>=1e3)return'34%';if(s>=500)return'42%';if(s>=100)return'63%';return'100%';
}

/* ══════════════════════════════
   SPARK
══════════════════════════════ */
class Spark{
  constructor(c,g){this.c=c;this.ctx=c.getContext('2d');this.g=g;this.particles=[];this.raf=null;}
  _spawn(){
    const W=this.c.width,H=this.c.height,s=Math.floor(Math.random()*4);
    let x,y,vx,vy;const spd=.6+Math.random()*1.5*this.g.intensity;
    if(s===0){x=Math.random()*W;y=H;vx=(Math.random()-.5)*1.6;vy=-spd;}
    else if(s===1){x=0;y=Math.random()*H;vx=spd;vy=(Math.random()-.5)*1.6;}
    else if(s===2){x=W;y=Math.random()*H;vx=-spd;vy=(Math.random()-.5)*1.6;}
    else{x=Math.random()*W;y=0;vx=(Math.random()-.5)*1.6;vy=spd;}
    const pal=this.g.lv===10?['#ff0080','#7c3aed','#00e5ff','#ffd700']:[this.g.color,'#ffffff',this.g.color+'88'];
    return{x,y,vx,vy,maxL:.7+Math.random()*1.2,life:.7+Math.random()*1.2,size:1+Math.random()*2.2*this.g.intensity,color:pal[Math.floor(Math.random()*pal.length)],trail:[]};
  }
  tick(){
    const W=this.c.width,H=this.c.height,ctx=this.ctx;
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<Math.ceil(this.g.intensity*5);i++)this.particles.push(this._spawn());
    this.particles=this.particles.filter(p=>p.life>0);
    for(const p of this.particles){
      p.trail.push({x:p.x,y:p.y});if(p.trail.length>6)p.trail.shift();
      p.x+=p.vx;p.y+=p.vy;p.vy-=.022*this.g.intensity;p.vx*=.986;p.life-=.022;
      const a=Math.max(0,p.life/p.maxL);
      if(p.trail.length>1){ctx.beginPath();ctx.moveTo(p.trail[0].x,p.trail[0].y);for(let i=1;i<p.trail.length;i++)ctx.lineTo(p.trail[i].x,p.trail[i].y);ctx.strokeStyle=p.color+Math.floor(a*60).toString(16).padStart(2,'0');ctx.lineWidth=p.size*.38;ctx.stroke();}
      if(this.g.lv>=4){const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*2.8);gr.addColorStop(0,p.color+Math.floor(a*85).toString(16).padStart(2,'0'));gr.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(p.x,p.y,p.size*2.8,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();}
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=p.color+Math.floor(a*255).toString(16).padStart(2,'0');ctx.fill();
    }
  }
  start(){const loop=()=>{this.tick();this.raf=requestAnimationFrame(loop);};loop();}
  stop(){cancelAnimationFrame(this.raf);if(this.ctx)this.ctx.clearRect(0,0,this.c.width,this.c.height);}
}

function computeScore(subs,totalViews,videos,engRate,uploadFreq,avgViews){
  const subS=subs<1000?subs*.5:subs<10000?500+(subs-1000)*.22:subs<100000?2700+(subs-10000)*.11:subs<1e6?13000+(subs-100000)*.045:53500+Math.sqrt(subs-1e6)*22;
  const viewS=totalViews*.000018,engS=Math.min(engRate,20)*1400,freqS=Math.min(uploadFreq,16)*380,avgS=Math.min(avgViews,8e6)*.00045;
  let bonus=0;const bonusLog=[];
  if(subs>=1e7){bonus+=subS*.25;bonusLog.push({k:'구독자 압도적',v:'+25%'});}
  else if(subs>=1e6){bonus+=subS*.15;bonusLog.push({k:'구독자 우수',v:'+15%'});}
  const vr=subs>0?avgViews/subs:0;
  if(vr>=2){bonus+=avgS*.5;bonusLog.push({k:'조회/구독 200%+',v:'+50%'});}
  else if(vr>=1){bonus+=avgS*.3;bonusLog.push({k:'조회/구독 100%+',v:'+30%'});}
  if(engRate>=8){bonus+=engS*.4;bonusLog.push({k:'참여율 압도적(8%+)',v:'+40%'});}
  else if(engRate>=4){bonus+=engS*.2;bonusLog.push({k:'참여율 우수(4%+)',v:'+20%'});}
  if(uploadFreq>=12){bonus+=freqS*.35;bonusLog.push({k:'업로드 압도적(월12+)',v:'+35%'});}
  else if(uploadFreq>=6){bonus+=freqS*.15;bonusLog.push({k:'업로드 우수(월6+)',v:'+15%'});}
  return{total:Math.round(subS+viewS+engS+freqS+avgS+bonus),bd:{subS:Math.round(subS),viewS:Math.round(viewS),engS:Math.round(engS),freqS:Math.round(freqS),avgS:Math.round(avgS),bonus:Math.round(bonus)},bonusLog,vr};
}
function lvFromScore(s){for(let i=GRADES.length-1;i>=0;i--)if(s>=GRADES[i].scoreMin)return GRADES[i].lv;return 1;}
function lvFromSubs(s){for(let i=GRADES.length-1;i>=0;i--)if(s>=GRADES[i].subMin)return GRADES[i].lv;return 1;}
function qual(v,tiers){
  if(v>=tiers[0])return{cls:'fq-best',txt:'압도적 🔥'};
  if(v>=tiers[1])return{cls:'fq-good',txt:'우수 ✓'};
  if(v>=tiers[2])return{cls:'fq-mid',txt:'보통'};
  return{cls:'fq-low',txt:'개선 필요'};
}

/* ══════════════════════════════

function applyCardStyle(cardEl, g){
  const isR=g.lv===10;
  const lvC=isR?'#ff0080':g.color;
  const bw=getBorderWidth(g.lv);
  const shadow=getGlowShadow(g.lv, lvC);
  cardEl.style.setProperty('--lv-glow', lvC);
  cardEl.style.setProperty('--lv-color', lvC);
  cardEl.style.setProperty('--lv-stroke', getStrokeWidth(g.lv));
  cardEl.style.setProperty('--name-stroke', getNameStroke(g.lv));
  cardEl.style.borderWidth=bw;
  cardEl.style.borderColor=lvC;
  cardEl.style.boxShadow=shadow;
}
function applyPrevCardStyle(cardEl, g){
  const isR=g.lv===10;
  const lvC=isR?'#ff0080':g.color;
  const bw=getBorderWidth(g.lv);
  const shadow=getGlowShadow(g.lv, lvC);
  cardEl.style.setProperty('--prev-glow', lvC);
  cardEl.style.setProperty('--prev-color', lvC);
  cardEl.style.setProperty('--prev-stroke', getStrokeWidth(g.lv));
  cardEl.style.borderWidth=bw;
  cardEl.style.borderColor=lvC;
  cardEl.style.boxShadow=shadow;
}

      const cId=sd.items[0].snippet.channelId||sd.items[0].id.channelId;
      const cr=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${cId}&key=${getKey()}`);
      const cd=await cr.json();const ch=cd.items[0];
      subs=+ch.statistics.subscriberCount;totalViews=+ch.statistics.viewCount;videos=+ch.statistics.videoCount;
      title=ch.snippet.title;avatar=ch.snippet.thumbnails.medium?.url||ch.snippet.thumbnails.default?.url;
      desc=(ch.snippet.description||'').slice(0,100)+'…';
      avgViews=videos>0?totalViews/videos:0;uploadFreq=2;engRate=subs>0?(avgViews*.02/subs)*100:0;
    }catch(e){result.innerHTML='<p style="color:#f87171">API 오류. 데모 데이터로 대체합니다.</p>';setTimeout(()=>analyzeChannel('demo'),900);return;}
  }

  const sd2=computeScore(subs,totalViews,videos,engRate,uploadFreq,avgViews);
  const score=sd2.total,bd=sd2.bd;
  const scoreLv=lvFromScore(score),subsLv=lvFromSubs(subs),finalLv=Math.max(scoreLv,subsLv);
  const g=GRADES[finalLv-1],isR=finalLv===10;
  const lvC=isR?'#ff0080':g.color;
  const pct=calcPct(subs);
  const bw=getBorderWidth(finalLv);
  const shadow=getGlowShadow(finalLv, lvC);

  /* factor quality */
  const engQ   =qual(engRate,   [8,4,1]);
  const freqQ  =qual(uploadFreq,[12,6,2]);
  const vrQ    =qual(sd2.vr,    [2,1,.3]);
  const lvQ    ={cls:finalLv>=9?'fq-best':finalLv>=7?'fq-good':finalLv>=5?'fq-mid':'fq-low',txt:finalLv>=9?'압도적 🔥':finalLv>=7?'우수 ✓':finalLv>=5?'보통':'개선 필요'};

  result.innerHTML=`
  <div class="analysis-container">
    <!-- LEFT: level card -->
    <div>
      <div class="lv-card-wrap">
        <div class="lv-card" id="mainLvCard"
          style="border-width:${bw};border-color:${lvC};box-shadow:${shadow};--lv-glow:${lvC};--lv-color:${lvC};--lv-stroke:${getStrokeWidth(finalLv)};--name-stroke:${getNameStroke(finalLv)};"
          onclick="openModal(${finalLv})">
          <canvas class="spark-canvas" id="mainSparkCanvas"></canvas>

          <!-- top-left: rank badge colored -->
          <div class="lv-rank-badge" style="border-color:${lvC}44;color:${lvC};">상위 ${pct}</div>

          <!-- top-right: pct ring -->
          <div class="lv-pct-ring">
            <svg viewBox="0 0 40 40">
              <circle cx="20" cy="20" r="16" fill="none" stroke="#2a2a3a" stroke-width="2.8"/>
              <circle cx="20" cy="20" r="16" fill="none" stroke="${lvC}" stroke-width="2.8"
                stroke-dasharray="${Math.min(100,parseFloat(pct)||50)*1.005} 100.5"
                stroke-linecap="round" transform="rotate(-90 20 20)"/>
            </svg>
            <div class="lv-pct-text" style="color:${lvC};">${pct.replace('%','')}<br><span style="font-size:.44rem">%</span></div>
          </div>

          <!-- level number -->
          <div class="lv-num ${isR?'rainbow':''}" style="${isR?'':'color:'+lvC+';-webkit-text-stroke:'+getStrokeWidth(finalLv)+' '+lvC+';text-shadow:0 0 20px '+lvC+'88,0 0 40px '+lvC+'33;'}">${finalLv}</div>
          <div class="lv-label" style="color:${lvC};opacity:.6;">LEVEL</div>
          <div class="lv-name ${isR?'rainbow':''}" style="${isR?'':'color:'+lvC+';-webkit-text-stroke:'+getNameStroke(finalLv)+' '+lvC+';'}">${g.name}</div>
          <div class="lv-range" style="color:${lvC};">${fmt(g.subMin)} ~ ${fmt(g.subMax)} 구독자</div>
          <div class="lv-play">${g.play}</div>
          <div class="lv-score-badge">
            <div class="lv-score-inner">알고리즘 <b style="color:${lvC}">${score.toLocaleString()}</b></div>
          </div>
        </div>
      </div>
      <p style="text-align:center;font-size:.62rem;color:var(--text2);margin-top:6px;">🔍 카드 클릭 → 효과 미리보기</p>

      <!-- LV decision -->
      <div class="lv-decision" style="margin-top:9px;">
        <span class="lv-dec-badge" style="color:${GRADES[subsLv-1].color};border-color:${GRADES[subsLv-1].color}44;">구독 LV${subsLv}</span>
        <span class="lv-dec-arrow">vs</span>
        <span class="lv-dec-badge" style="color:${GRADES[scoreLv-1].color};border-color:${GRADES[scoreLv-1].color}44;">점수 LV${scoreLv}</span>
        <span class="lv-dec-arrow">→</span>
        <span class="lv-dec-final" style="color:${lvC};">최종 LV${finalLv}</span>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="analysis-right">
      <!-- channel info -->
      <div class="ch-info-card">
        <img class="ch-avatar" src="${avatar}" onerror="this.src='https://via.placeholder.com/46x46/12121e/666?text=YT'">
        <div class="ch-meta"><h3>${title}</h3><p>${desc}</p></div>
      </div>

      <!-- FACTOR CARDS -->
      <div class="factor-grid">
        ${[
          {icon:'👥',label:'구독자',        big:fmt(subs),         sub:pct+' 구간',                     q:{cls:subsLv>=9?'fq-best':subsLv>=7?'fq-good':subsLv>=5?'fq-mid':'fq-low',txt:subsLv>=9?'압도적 🔥':subsLv>=7?'우수 ✓':subsLv>=5?'보통':'개선 필요'}, color:lvC,  bar:Math.min(100,subs/5e8*100)},
          {icon:'👁',label:'총 조회수',      big:fmt(totalViews),   sub:fmt(videos)+'개 영상',            q:vrQ,  color:'#4f8ef7',bar:Math.min(100,totalViews/1e11*100)},
          {icon:'📊',label:'평균 조회수',    big:fmt(avgViews),     sub:'구독 대비 '+sd2.vr.toFixed(1)+'×',q:vrQ,  color:'#a78bfa',bar:Math.min(100,avgViews/5e6*100)},
          {icon:'💬',label:'참여율',         big:engRate.toFixed(1)+'%',sub:'기준: 4%+',                q:engQ, color:'#34d399',bar:Math.min(100,engRate/10*100)},
          {icon:'📅',label:'업로드 주기',    big:'월 '+uploadFreq+'회',sub:'주 '+(uploadFreq/4).toFixed(1)+'회', q:freqQ,color:'#fbbf24',bar:Math.min(100,uploadFreq/16*100)},
          {icon:'⚡',label:'알고리즘 점수',  big:score.toLocaleString(),sub:'LV'+finalLv+' '+g.name,    q:lvQ,  color:lvC,  bar:Math.min(100,score/200000*100)},
        ].map(f=>`
          <div class="factor-card" style="--fc-color:${f.color}">
            <div class="f-icon">${f.icon}</div>
            <div class="f-label">${f.label}</div>
            <div class="f-big" style="color:${f.color}">${f.big}</div>
            <div class="f-sub">${f.sub}</div>
            <span class="f-quality ${f.q.cls}">${f.q.txt}</span>
            <div class="f-bar-wrap"><div class="f-bar" style="width:${f.bar}%;background:${f.color}"></div></div>
          </div>`).join('')}
      </div>

      <!-- SCORE BREAKDOWN -->
      <div class="score-breakdown">
        <h4>📊 알고리즘 점수 세부 분석</h4>
        ${[
          {k:'구독자',    v:bd.subS,  max:200000,c:lvC},
          {k:'조회수',    v:bd.viewS, max:80000, c:'#4f8ef7'},
          {k:'참여율',    v:bd.engS,  max:28000, c:'#34d399'},
          {k:'업로드 빈도',v:bd.freqS,max:6000,  c:'#fbbf24'},
          {k:'평균 조회', v:bd.avgS,  max:4000,  c:'#a78bfa'},
          {k:'보너스',    v:bd.bonus, max:Math.max(bd.bonus,1),c:'#4ade80'},
        ].map(r=>{
          const p=Math.min(100,(r.v/(r.max||1))*100);
          const isB=r.k==='보너스'&&sd2.bonusLog.length>0;
          return`<div class="score-row">
            <div class="score-row-head">
              <span class="score-key">${r.k}</span>
              <span class="score-val" style="color:${r.c}">${r.v.toLocaleString()}${isB?sd2.bonusLog.map(b=>`<span class="bonus-tag">${b.k} ${b.v}</span>`).join(''):''}
              </span>
            </div>
            <div class="score-bar-wrap"><div class="score-bar" style="width:${p}%;background:${r.c}"></div></div>
          </div>`;
        }).join('')}

/* ══════════════════════════════
   INLINE GRADE TABLE
   – compact, number chip only, no special effects on number
══════════════════════════════ */
function buildInlineGradeTable(activeLv){
  const rows=GRADES.map(g=>{
    const isActive=g.lv===activeLv;
    const c=g.lv===10?'#ff0080':g.color;
    const nameStyle=g.lv===10
      ?`background:linear-gradient(90deg,#ff0080,#ffd700,#00e5ff,#ff0080);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:rainbowText 2.5s linear infinite;font-weight:700;display:inline-block;`
      :`color:${c};font-weight:700;`;
    return`<tr class="${isActive?'active-row':''}" style="${isActive?`--row-color:${c};`:''}cursor:pointer;" onclick="openModal(${g.lv})">
      <td>
        <span class="lv-chip-simple" style="--chip-c:${c};">${isActive?'★':g.lv}</span>
      </td>
      <td><span style="${nameStyle}">${g.name}</span></td>
      <td style="color:var(--text2);font-size:.73rem;white-space:nowrap;">${fmt(g.subMin)}~${fmt(g.subMax)}</td>
      <td><span style="color:${c};font-weight:700;font-size:.74rem;">${g.rankPct}</span></td>
      <td style="color:var(--text2);font-size:.73rem;">${g.chCount}</td>
      <td><span class="play-badge">${g.play}</span></td>
      <td><div class="ach-bar-wrap"><div class="ach-bar" style="width:${g.lv*10}%;background:${g.lv===10?'linear-gradient(90deg,#ff0080,#7c3aed,#00e5ff)':c};${isActive?'box-shadow:0 0 4px '+c+'77;':''}"></div></div></td>
      <td><button class="prev-btn" style="--btn-c:${c};" onclick="event.stopPropagation();openModal(${g.lv})">미리보기</button></td>
    </tr>`;
  }).join('');
  return`<div class="grade-table-wrap">
    <table class="grade-table">
      <thead><tr>
        <th>LV</th><th>등급명</th><th>구독자</th><th>상위%</th><th>채널수</th><th>플레이버튼</th><th>달성도</th><th>효과</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <p style="font-size:.62rem;color:var(--text2);margin-top:5px;">★ 현재 레벨 &nbsp;|&nbsp; 행 클릭 → 효과 미리보기</p>
  </div>`;
}

/* ══════════════════════════════
   INLINE BENCHMARK
══════════════════════════════ */
function buildInlineBench(lv, engRate, uploadFreq, vr){
  const g=GRADES[lv-1];
  const tips=[
    {c:'#4f8ef7',icon:'📌',t:'현재 레벨',b:`LV${lv} (${g.name}) – ${g.rankPct}. ${g.nextGoal}`},
  ];
  if(engRate<4)tips.push({c:'#f87171',icon:'💬',t:'참여율 개선 필요',b:`현재 ${engRate.toFixed(1)}%. 댓글 질문·라이브·커뮤니티로 4%+ 목표.`});
  else if(engRate>=8)tips.push({c:'#4ade80',icon:'💬',t:'참여율 압도적!',b:`${engRate.toFixed(1)}% – 최상위 수준. 이 강점을 알고리즘에 적극 활용하세요.`});
  if(uploadFreq<2)tips.push({c:'#fbbf24',icon:'📅',t:'업로드 빈도 증가 권장',b:`월 ${uploadFreq}회 → 주 1~2회로 늘리면 노출이 대폭 증가합니다.`});
  else if(uploadFreq>=12)tips.push({c:'#4ade80',icon:'📅',t:'업로드 압도적!',b:`월 ${uploadFreq}회 – 매우 활발! 품질 유지에 집중하세요.`});
  if(vr<0.3)tips.push({c:'#f87171',icon:'👁',t:'조회수 최적화 필요',b:'썸네일 A/B 테스트, 제목 키워드 최적화로 CTR을 높이세요.'});
  if(lv<=3)tips.push({c:'#a78bfa',icon:'💰',t:'수익화까지',b:'1,000명 + 4,000시간 시청 → YPP(유튜브 파트너 프로그램) 신청 가능.'});
  if(lv>=5)tips.push({c:'#00e5ff',icon:'🤝',t:'콜라보 전략',b:'유사 규모(±30%) 채널 콜라보 → 신규 구독자 15~25% 유입 증가.'});
  tips.push({c:'#ffd700',icon:'🤖',t:'AI 도구 활용 (2026)',b:'크리에이터 84%가 AI 활용 중. 스크립트·썸네일·키워드에 적극 사용하세요.'});
  return tips.map(t=>`<div class="bench-tip-card" style="--tip-c:${t.c};border-left-color:${t.c};"><h4>${t.icon} ${t.t}</h4><p>${t.b}</p></div>`).join('');
}

function openModal(lv){document.getElementById('effectModal').classList.add('open');buildModalNav();renderModal(lv);}
function closeModal(){document.getElementById('effectModal').classList.remove('open');if(prevSpark){prevSpark.stop();prevSpark=null;}}
function buildModalNav(){
  document.getElementById('modalNav').innerHTML=GRADES.map(g=>{
    const c=g.lv===10?'#ff0080':g.color;
    return`<button class="lv-nav-btn" id="mnb${g.lv}" data-lv="${g.lv}" style="--nb-c:${c};border-color:${c};color:${c};" onclick="renderModal(${g.lv})">${g.lv}</button>`;
  }).join('');
}
function renderModal(lv){
  document.querySelectorAll('.lv-nav-btn').forEach(b=>b.classList.toggle('active',+b.dataset.lv===lv));
  const g=GRADES[lv-1],isR=lv===10;
  const lvC=isR?'#ff0080':g.color;
  const stroke=getStrokeWidth(lv),nStroke=getNameStroke(lv);

  document.getElementById('modalTitle').textContent=`LV${lv} – ${g.name} 효과 미리보기`;

  /* apply unified card style */
  const pc=document.getElementById('prevCard');
  applyPrevCardStyle(pc, g);

  /* number */
  const numEl=document.getElementById('prevNum');
  numEl.className='prev-num'+(isR?' rainbow':'');
  if(!isR){numEl.style.color=lvC;numEl.style.webkitTextStroke=`${stroke} ${lvC}`;numEl.style.textShadow=`0 0 16px ${lvC}77`;}
  else numEl.style.cssText='';
  numEl.textContent=lv;

  /* name */
  const nameEl=document.getElementById('prevName');
  nameEl.className='prev-name'+(isR?' rainbow':'');
  if(!isR){nameEl.style.color=lvC;nameEl.style.webkitTextStroke=`${nStroke} ${lvC}`;nameEl.style.textShadow=`0 0 6px ${lvC}55`;}
  else nameEl.style.cssText='';
  nameEl.textContent=g.name;

  document.getElementById('prevRange').textContent=`${fmt(g.subMin)} ~ ${fmt(g.subMax)} 구독자`;
  document.getElementById('prevRange').style.color=lvC;
  document.getElementById('prevPlay').textContent=g.play;

  /* spark */
  if(prevSpark)prevSpark.stop();
  const cv=document.getElementById('prevCanvas');
  const pw=document.getElementById('prevCard');
  cv.width=pw.offsetWidth||215;cv.height=pw.offsetHeight||275;
  prevSpark=new Spark(cv,g);prevSpark.start();

  /* info panel */
  const bars=[
    {l:'구독자 규모',   v:Math.min(100,((lv-1)/9)*100+5)},
    {l:'스파크 강도',   v:g.intensity*100},
    {l:'알고리즘 점수', v:Math.min(100,g.scoreMin/10000)},
    {l:'희귀도',        v:[.1,1,5,10,20,35,55,72,88,100][lv-1]},
  ];
  document.getElementById('modalInfo').innerHTML=`
    <h3 style="color:${lvC}">LV${lv} – ${g.name}</h3>
    <div class="compare-bars">
      ${bars.map(b=>`<div class="cbar-row"><div class="cbar-label"><span>${b.l}</span><span>${b.v.toFixed(0)}%</span></div><div class="cbar-wrap"><div class="cbar-fill" style="width:${b.v}%;background:${isR?'linear-gradient(90deg,#ff0080,#7c3aed,#00e5ff)':lvC}"></div></div></div>`).join('')}
    </div>
    ${[['구독자',`${fmt(g.subMin)} ~ ${fmt(g.subMax)}`],['상위 %',g.rankPct],['채널 수',g.chCount],['점수',`${g.scoreMin.toLocaleString()} ~`],['플레이버튼',g.play]]
      .map(([k,v])=>`<div class="stat-row"><span class="stat-key">${k}</span><span class="stat-val" style="color:${lvC}">${v}</span></div>`).join('')}
    <div style="background:var(--bg3);border-radius:7px;padding:8px 11px;border:1px solid var(--card-border);">
      <div style="font-size:.73rem;font-weight:700;margin-bottom:3px">📌 다음 목표</div>
      <p style="font-size:.7rem;color:var(--text2);line-height:1.5">${g.nextGoal}</p>
    </div>
    <div class="perk-tags">${g.perks.map(p=>`<span class="perk-tag">✓ ${p}</span>`).join('')}</div>`;
}

/* ══════════════════════════════
   REVENUE
══════════════════════════════ */
function calcRevenue(){
  const views=+document.getElementById('rv_views').value||0;
  const cpm=+document.getElementById('rv_cpm').value||0;
  const country=+document.getElementById('rv_country').value||1;
  const vtr=+document.getElementById('rv_vtr').value/100||.35;
  const rev=views*vtr*(cpm/1000)*country*.55;
  document.getElementById('revNum').textContent=fmtMoney(rev);
  document.getElementById('revDetail').textContent=`조회수 ${Math.floor(views).toLocaleString()} × VTR ${Math.floor(vtr*100)}% × CPM ₩${Math.floor(cpm).toLocaleString()} × ${country} × 55%`;
}

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn,.sidebar-item').forEach(b=>b.classList.remove('active'));
  const s=document.getElementById('sec-'+id);if(s)s.classList.add('active');
  document.querySelectorAll(`[onclick*="'${id}'"]`).forEach(b=>b.classList.add('active'));
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
function handleGlobalSearch(){
  const q=document.getElementById('globalSearchInput').value.trim();if(!q)return;
  document.getElementById('channelInput').value=q;showSection('channel');analyzeChannel();
}
