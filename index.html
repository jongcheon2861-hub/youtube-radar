<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>🔥 떡상레이더 - 유튜브 급상승 & 채널 레벨 분석</title>
    <meta name="description" content="유튜브 급상승 영상 실시간 분석 + 내 채널 레벨 확인">
    <meta name="theme-color" content="#ff0000">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4409875039737384" crossorigin="anonymous"></script>

    <style>
        :root {
            --red: #ff0000;
            --bg: #0a0a0a;
            --card: #141414;
            --card2: #1c1c1c;
            --border: #2a2a2a;
            --text: #ffffff;
            --text2: #aaaaaa;
            --text3: #555555;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { scroll-behavior:smooth; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; }

        /* ── 헤더 ── */
        .header {
            position:sticky; top:0; z-index:200;
            background:rgba(10,10,10,0.97);
            backdrop-filter:blur(12px);
            border-bottom:1px solid var(--border);
        }
        .header-inner {
            max-width:700px; margin:0 auto;
            padding:12px 16px;
            display:flex; align-items:center; justify-content:space-between; gap:12px;
        }
        .logo { display:flex; align-items:center; gap:8px; }
        .logo-icon { width:34px; height:34px; background:var(--red); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; }
        .logo-text { font-size:17px; font-weight:800; }
        .logo-text span { color:var(--red); }
        .live-dot {
            display:flex; align-items:center; gap:5px;
            font-size:11px; font-weight:700; color:var(--red);
            background:rgba(255,0,0,0.1); padding:4px 10px;
            border-radius:20px; border:1px solid rgba(255,0,0,0.3);
        }
        .live-dot::before { content:''; width:6px; height:6px; background:var(--red); border-radius:50%; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
        .refresh-btn {
            width:34px; height:34px; background:var(--card2);
            border:1px solid var(--border); border-radius:9px;
            color:var(--text2); font-size:15px; cursor:pointer;
            display:flex; align-items:center; justify-content:center; transition:all 0.2s;
        }
        .refresh-btn:active { transform:scale(0.9); background:var(--red); color:white; }
        .refresh-btn.spinning { animation:spin 0.7s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* ── 탭 네비 ── */
        .main-tabs {
            max-width:700px; margin:0 auto;
            display:grid; grid-template-columns:1fr 1fr;
            border-bottom:1px solid var(--border);
        }
        .main-tab {
            background:none; border:none; color:var(--text3);
            padding:13px; font-size:14px; font-weight:600;
            cursor:pointer; transition:all 0.2s;
            border-bottom:2px solid transparent;
            display:flex; align-items:center; justify-content:center; gap:6px;
        }
        .main-tab.active { color:var(--red); border-bottom-color:var(--red); }

        /* ── 상단 광고 ── */
        .ad-wrap { max-width:700px; margin:0 auto; padding:8px 16px; text-align:center; }
        .ad-label { font-size:10px; color:var(--text3); margin-bottom:3px; }

        /* ── 카테고리 탭 ── */
        .cat-wrap {
            position:sticky; top:57px; z-index:100;
            background:rgba(10,10,10,0.97); backdrop-filter:blur(12px);
            border-bottom:1px solid var(--border);
        }
        .cat-scroll {
            max-width:700px; margin:0 auto;
            display:flex; gap:6px; padding:10px 16px;
            overflow-x:auto; scrollbar-width:none;
        }
        .cat-scroll::-webkit-scrollbar { display:none; }
        .cat-btn {
            flex-shrink:0; background:var(--card); border:1px solid var(--border);
            color:var(--text2); padding:7px 14px; border-radius:20px;
            font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; white-space:nowrap;
        }
        .cat-btn.active { background:var(--red); border-color:var(--red); color:white; font-weight:700; }
        .cat-btn:active { transform:scale(0.95); }

        /* ── 정렬바 ── */
        .sort-bar {
            max-width:700px; margin:0 auto;
            padding:10px 16px 6px;
            display:flex; align-items:center; justify-content:space-between;
        }
        .result-info { font-size:13px; color:var(--text3); }
        .result-info strong { color:var(--text2); }
        .sort-tabs { display:flex; background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
        .sort-tab { background:none; border:none; color:var(--text3); padding:6px 11px; font-size:12px; font-weight:500; cursor:pointer; transition:all 0.2s; }
        .sort-tab.active { background:var(--red); color:white; font-weight:700; }

        /* ── 영상 리스트 ── */
        .video-list { max-width:700px; margin:0 auto; padding:0 16px; display:flex; flex-direction:column; gap:10px; }

        /* ── 영상 카드 ── */
        .video-card {
            display:flex; gap:12px;
            background:var(--card); border:1px solid var(--border);
            border-radius:14px; overflow:hidden;
            text-decoration:none; color:inherit;
            transition:all 0.25s; padding:10px; position:relative;
        }
        .video-card.hot { border-color:rgba(255,0,0,0.4); background:linear-gradient(135deg,#141414,#1a0a0a); }
        .video-card:active { transform:scale(0.98); border-color:var(--red); }

        .thumb-wrap { position:relative; flex-shrink:0; width:130px; height:84px; border-radius:10px; overflow:hidden; background:var(--card2); }
        @media(max-width:400px){ .thumb-wrap{width:110px;height:72px} }
        .thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
        .rank-num { position:absolute; bottom:5px; left:5px; background:rgba(0,0,0,0.85); color:white; font-size:11px; font-weight:800; padding:2px 6px; border-radius:5px; }
        .rank-num.top { background:var(--red); }
        .hot-tag { position:absolute; top:5px; right:5px; background:var(--red); color:white; font-size:9px; font-weight:800; padding:2px 5px; border-radius:4px; }

        /* 레벨 뱃지 - 영상카드용 */
        .level-badge-sm {
            display:inline-flex; align-items:center; gap:3px;
            font-size:10px; font-weight:700; padding:2px 7px;
            border-radius:10px; white-space:nowrap;
        }

        .video-info { flex:1; min-width:0; display:flex; flex-direction:column; justify-content:space-between; gap:5px; }
        .video-title { font-size:14px; font-weight:600; line-height:1.35; color:var(--text); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .channel { font-size:12px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .stats-row { display:flex; gap:8px; flex-wrap:wrap; }
        .stat { font-size:12px; display:flex; align-items:center; gap:2px; }
        .stat.v { color:#fff; font-weight:600; }
        .stat.l { color:#ff6b6b; }
        .stat.t { color:var(--text3); }
        .speed-row { display:flex; align-items:center; gap:8px; }
        .speed-bar-bg { flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
        .speed-bar-fill { height:100%; border-radius:2px; transition:width 1s ease; }
        .speed-val { font-size:10px; color:var(--text3); white-space:nowrap; }

        /* ── 인라인 광고 ── */
        .ad-inline { max-width:700px; margin:0 auto; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:10px; text-align:center; }

        /* ── 전면 팝업 광고 오버레이 ── */
        .ad-overlay {
            display:none; position:fixed; inset:0; z-index:9999;
            background:rgba(0,0,0,0.85); backdrop-filter:blur(4px);
            align-items:center; justify-content:center; flex-direction:column;
            animation:fadeIn 0.3s ease;
        }
        .ad-overlay.show { display:flex; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .ad-overlay-box {
            background:var(--card); border:1px solid var(--border);
            border-radius:20px; width:calc(100% - 32px); max-width:420px;
            overflow:hidden; position:relative;
        }
        .ad-overlay-header {
            display:flex; align-items:center; justify-content:space-between;
            padding:12px 16px; border-bottom:1px solid var(--border);
        }
        .ad-overlay-title { font-size:13px; color:var(--text2); font-weight:600; }
        .ad-overlay-countdown {
            font-size:13px; color:var(--red); font-weight:700;
            background:rgba(255,0,0,0.1); padding:3px 10px; border-radius:20px;
        }
        .ad-overlay-close {
            background:var(--red); color:white; border:none;
            padding:8px 20px; border-radius:10px; font-size:14px;
            font-weight:700; cursor:pointer; margin:12px; width:calc(100% - 24px);
            transition:all 0.2s;
        }
        .ad-overlay-close:disabled { background:var(--card2); color:var(--text3); cursor:not-allowed; }
        .ad-overlay-close:not(:disabled):active { transform:scale(0.97); }
        .ad-overlay-content { padding:12px; text-align:center; min-height:250px; display:flex; align-items:center; justify-content:center; }

        /* ── 채널 레벨 체커 탭 ── */
        .channel-checker { max-width:700px; margin:0 auto; padding:16px; display:none; flex-direction:column; gap:16px; }
        .channel-checker.active { display:flex; }

        .search-box {
            display:flex; gap:8px;
        }
        .search-input {
            flex:1; background:var(--card); border:1px solid var(--border);
            color:var(--text); padding:13px 16px; border-radius:12px;
            font-size:15px; outline:none; transition:border-color 0.2s;
        }
        .search-input:focus { border-color:var(--red); }
        .search-input::placeholder { color:var(--text3); }
        .search-btn {
            background:var(--red); color:white; border:none;
            padding:13px 20px; border-radius:12px; font-size:15px;
            font-weight:700; cursor:pointer; transition:all 0.2s; white-space:nowrap;
        }
        .search-btn:active { transform:scale(0.95); background:#cc0000; }

        .search-hint { font-size:12px; color:var(--text3); padding:0 4px; line-height:1.6; }

        /* 채널 결과 카드 */
        .channel-result {
            background:var(--card); border:1px solid var(--border);
            border-radius:16px; overflow:hidden; display:none;
        }
        .channel-result.show { display:block; }

        .ch-header {
            display:flex; align-items:center; gap:14px;
            padding:18px; border-bottom:1px solid var(--border);
        }
        .ch-avatar {
            width:60px; height:60px; border-radius:50%;
            object-fit:cover; border:2px solid var(--border);
            flex-shrink:0;
        }
        .ch-avatar-placeholder {
            width:60px; height:60px; border-radius:50%;
            background:var(--card2); display:flex; align-items:center;
            justify-content:center; font-size:24px; flex-shrink:0;
        }
        .ch-meta { flex:1; min-width:0; }
        .ch-name { font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .ch-subs { font-size:13px; color:var(--text2); margin-top:3px; }

        /* 레벨 표시 */
        .level-display {
            padding:20px 18px;
            border-bottom:1px solid var(--border);
            text-align:center;
        }
        .level-number {
            font-size:64px; font-weight:900; line-height:1;
            margin-bottom:6px;
        }
        .level-name {
            font-size:18px; font-weight:700; margin-bottom:8px;
        }
        .level-desc {
            font-size:13px; color:var(--text2); line-height:1.6;
            max-width:320px; margin:0 auto;
        }

        /* 레벨 게이지 */
        .level-gauge-wrap { padding:16px 18px; border-bottom:1px solid var(--border); }
        .gauge-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text2); margin-bottom:8px; }
        .gauge-track { height:10px; background:var(--border); border-radius:5px; overflow:hidden; }
        .gauge-fill { height:100%; border-radius:5px; transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
        .gauge-steps { display:flex; justify-content:space-between; margin-top:6px; }
        .gauge-step { font-size:10px; color:var(--text3); }

        /* 스탯 그리드 */
        .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border-bottom:1px solid var(--border); }
        .stat-cell { background:var(--card); padding:14px 16px; }
        .stat-cell-label { font-size:11px; color:var(--text3); margin-bottom:4px; }
        .stat-cell-value { font-size:18px; font-weight:700; }
        .stat-cell-sub { font-size:11px; color:var(--text2); margin-top:2px; }

        /* 레벨 기준표 */
        .level-table { padding:16px 18px; }
        .level-table-title { font-size:13px; font-weight:700; color:var(--text2); margin-bottom:12px; }
        .level-row {
            display:flex; align-items:center; gap:10px;
            padding:8px 10px; border-radius:10px; margin-bottom:4px;
            transition:background 0.2s;
        }
        .level-row.current { background:rgba(255,0,0,0.1); border:1px solid rgba(255,0,0,0.3); }
        .level-row-num { font-size:13px; font-weight:800; width:28px; flex-shrink:0; }
        .level-row-name { font-size:13px; font-weight:600; flex:1; }
        .level-row-range { font-size:11px; color:var(--text3); }
        .level-row-check { font-size:14px; }

        /* 채널 검색 로딩 */
        .ch-loading { padding:40px; text-align:center; color:var(--text2); }
        .ch-loader { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }

        /* 채널 에러 */
        .ch-error { padding:30px 20px; text-align:center; }
        .ch-error-icon { font-size:36px; margin-bottom:10px; }
        .ch-error-msg { font-size:14px; color:var(--text2); line-height:1.6; }

        /* ── 스켈레톤 ── */
        .skeleton-card { display:flex; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:10px; }
        .skeleton-thumb { width:130px; height:84px; border-radius:10px; background:var(--card2); flex-shrink:0; animation:shimmer 1.5s infinite; }
        .skeleton-info { flex:1; display:flex; flex-direction:column; gap:8px; justify-content:center; }
        .skeleton-line { height:12px; background:var(--card2); border-radius:6px; animation:shimmer 1.5s infinite; }
        @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ── 에러 ── */
        .error-wrap { max-width:700px; margin:0 auto; padding:40px 16px; text-align:center; }
        .error-box { background:var(--card); border:1px solid rgba(255,0,0,0.3); border-radius:16px; padding:28px 20px; }
        .error-icon { font-size:40px; margin-bottom:12px; }
        .error-title { font-size:16px; font-weight:700; margin-bottom:8px; }
        .error-msg { font-size:13px; color:var(--text2); margin-bottom:20px; line-height:1.5; }
        .retry-btn { background:var(--red); color:white; border:none; padding:12px 28px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; }

        /* ── 업데이트 바 ── */
        .update-bar { max-width:700px; margin:14px auto 0; padding:0 16px; text-align:center; font-size:11px; color:var(--text3); }

        /* ── 푸터 ── */
        footer { max-width:700px; margin:20px auto 0; padding:20px 16px; border-top:1px solid var(--border); text-align:center; }
        footer p { font-size:12px; color:var(--text3); line-height:2; }
        footer a { color:var(--text2); text-decoration:none; }

        /* ── 모바일 앵커 광고 ── */
        .ad-anchor { position:fixed; bottom:0; left:0; right:0; background:rgba(10,10,10,0.97); border-top:1px solid var(--border); padding:6px; text-align:center; z-index:300; }
        @media(min-width:600px){ .ad-anchor{display:none} body{padding-bottom:20px} .thumb-wrap{width:160px;height:100px} }
    </style>
</head>
<body>

<!-- 전면 팝업 광고 오버레이 -->
<div class="ad-overlay" id="adOverlay">
    <div class="ad-overlay-box">
        <div class="ad-overlay-header">
            <span class="ad-overlay-title">📢 광고</span>
            <span class="ad-overlay-countdown" id="adCountdown">5초 후 닫기</span>
        </div>
        <div class="ad-overlay-content">
            <ins class="adsbygoogle"
                 style="display:block;width:300px;height:250px"
                 data-ad-client="ca-pub-4409875039737384"
                 data-ad-slot="auto"></ins>
        </div>
        <button class="ad-overlay-close" id="adCloseBtn" disabled onclick="closeAd()">
            ⏳ 5초 후 닫을 수 있습니다
        </button>
    </div>
</div>

<!-- 헤더 -->
<header class="header">
    <div class="header-inner">
        <div class="logo">
            <div class="logo-icon">🔥</div>
            <div class="logo-text">떡상<span>레이더</span></div>
        </div>
        <div class="live-dot">LIVE</div>
        <button class="refresh-btn" id="refreshBtn" onclick="handleRefresh()">🔄</button>
    </div>
</header>

<!-- 메인 탭 -->
<div class="main-tabs">
    <button class="main-tab active" id="tabTrend" onclick="switchTab('trend')">🔥 급상승 영상</button>
    <button class="main-tab" id="tabChannel" onclick="switchTab('channel')">📊 채널 레벨 확인</button>
</div>

<!-- ════════════════════════════
     탭 1: 급상승 영상
════════════════════════════ -->
<div id="trendSection">

    <!-- 상단 광고 -->
    <div class="ad-wrap">
        <div class="ad-label">광고</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4409875039737384" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <!-- 카테고리 -->
    <div class="cat-wrap">
        <div class="cat-scroll">
            <button class="cat-btn active" data-id="0" onclick="selectCat(this)">🔥 전체</button>
            <button class="cat-btn" data-id="10" onclick="selectCat(this)">🎵 음악</button>
            <button class="cat-btn" data-id="20" onclick="selectCat(this)">🎮 게임</button>
            <button class="cat-btn" data-id="24" onclick="selectCat(this)">🎬 엔터</button>
            <button class="cat-btn" data-id="17" onclick="selectCat(this)">⚽ 스포츠</button>
            <button class="cat-btn" data-id="25" onclick="selectCat(this)">📰 뉴스</button>
            <button class="cat-btn" data-id="22" onclick="selectCat(this)">👥 브이로그</button>
            <button class="cat-btn" data-id="23" onclick="selectCat(this)">😂 코미디</button>
            <button class="cat-btn" data-id="28" onclick="selectCat(this)">🔬 과학</button>
            <button class="cat-btn" data-id="26" onclick="selectCat(this)">💄 스타일</button>
        </div>
    </div>

    <!-- 정렬바 -->
    <div class="sort-bar">
        <span class="result-info" id="resultInfo">불러오는 중...</span>
        <div class="sort-tabs">
            <button class="sort-tab active" data-sort="viewCount" onclick="selectSort(this)">👁 조회수</button>
            <button class="sort-tab" data-sort="velocity" onclick="selectSort(this)">⚡ 급상승</button>
            <button class="sort-tab" data-sort="date" onclick="selectSort(this)">🕐 최신</button>
        </div>
    </div>

    <!-- 영상 리스트 -->
    <div id="mainContent"></div>

    <div class="update-bar" id="updateBar"></div>
</div>

<!-- ════════════════════════════
     탭 2: 채널 레벨 확인
════════════════════════════ -->
<div class="channel-checker" id="channelSection">

    <!-- 광고 -->
    <div style="text-align:center">
        <div class="ad-label">광고</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4409875039737384" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="search-box">
        <input class="search-input" id="channelInput" type="text"
               placeholder="채널명 또는 @핸들 입력"
               onkeydown="if(event.key==='Enter') searchChannel()">
        <button class="search-btn" onclick="searchChannel()">분석</button>
    </div>

    <p class="search-hint">
        💡 예시: <strong>채널명</strong> 또는 <strong>@ondollife</strong> 형태로 입력하세요.<br>
        구독자 대비 조회수를 분석해 <strong>레벨 1~10</strong>으로 평가합니다.
    </p>

    <!-- 레벨 기준 미리보기 -->

// ═══════════════════════════
// 설정
// ═══════════════════════════
const API_KEY = 'AIzaSyCySRGVUW8FVz7m3ALEnr_KQvJqEcFIR5Y';

// ═══════════════════════════
// 레벨 시스템 정의

const LEVELS = [

    { lv:2,  name:'새싹',      emoji:'🌿', color:'#66bb6a', range:'0.1~0.5%',      minRatio:0.001,  maxRatio:0.005,  desc:'조금씩 구독자들이 반응하고 있어요. 좋은 시작이에요!' },
    { lv:3,  name:'일반',      emoji:'📺', color:'#29b6f6', range:'0.5~1%',        minRatio:0.005,  maxRatio:0.01,   desc:'평균적인 채널 수준이에요. 썸네일과 제목을 개선해보세요!' },

];

function getLevel(ratio) {
    for (let i = LEVELS.length - 1; i >= 0; i--) {
        if (ratio >= LEVELS[i].minRatio) return LEVELS[i];
    }
    return LEVELS[0];
}

// ═══════════════════════════
// 전역 상태
// ═══════════════════════════
let videos      = [];
let currentCat  = '0';
let currentSort = 'viewCount';
let isLoading   = false;
let adCount     = 0; // 광고 노출 카운터
let adTimer     = null;

// ═══════════════════════════
// 유틸
// ═══════════════════════════
const fmt = n => {
    n = parseInt(n)||0;
    if(n>=100000000) return (n/100000000).toFixed(1)+'억';
    if(n>=10000)     return (n/10000).toFixed(1)+'만';
    if(n>=1000)      return (n/1000).toFixed(1)+'K';
    return n.toLocaleString();
};
const ago = d => {
    const s=(Date.now()-new Date(d))/1000;
    if(s<3600)   return Math.floor(s/60)+'분 전';
    if(s<86400)  return Math.floor(s/3600)+'시간 전';
    if(s<604800) return Math.floor(s/86400)+'일 전';
    return Math.floor(s/604800)+'주 전';
};
const velocity = v => {
    const views=parseInt(v.statistics?.viewCount)||0;
    const hrs=Math.max(1,(Date.now()-new Date(v.snippet.publishedAt))/3600000);
    return Math.round(views/hrs);
};
const catColor = id => ({'10':'#ff6b9d','20':'#00e676','22':'#64b5f6','23':'#ffd54f','24':'#ff8a65','25':'#ef5350','17':'#66bb6a','28':'#7c4dff','26':'#ff4081'})[id]||'#ff0000';

        } else {
            counter.textContent = `${sec}초 후 닫기`;
            btn.textContent = `⏳ ${sec}초 후 닫을 수 있습니다`;

// 탭 전환

function switchTab(tab) {

// ═══════════════════════════
// API: 영상
// ═══════════════════════════
async function fetchVideos(catId) {
    const p = new URLSearchParams({ part:'snippet,statistics', chart:'mostPopular', regionCode:REGION, maxResults:MAX_RES, hl:'ko', key:API_KEY });
    if (catId !== '0') p.append('videoCategoryId', catId);
    const r = await fetch(`https://www.googleapis.com/youtube/v3/videos?${p}`);
    if (!r.ok) throw new Error(`API 오류 ${r.status}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return d.items || [];
}

// ═══════════════════════════
// API: 채널 검색
// ═══════════════════════════
async function fetchChannelByQuery(query) {
    // 핸들(@) 처리
    const isHandle = query.startsWith('@');

    // 1) search로 채널 찾기
    const sp = new URLSearchParams({ part:'snippet', type:'channel', q:query, maxResults:1, key:API_KEY });
    const sr = await fetch(`https://www.googleapis.com/youtube/v3/search?${sp}`);
    const sd = await sr.json();
    if (sd.error) throw new Error(sd.error.message);
    if (!sd.items?.length) throw new Error('채널을 찾을 수 없어요.\n채널명을 정확히 입력해주세요.');

    const channelId = sd.items[0].snippet.channelId;

    // 2) 채널 상세정보
    const cp = new URLSearchParams({ part:'snippet,statistics', id:channelId, key:API_KEY });
    const cr = await fetch(`https://www.googleapis.com/youtube/v3/channels?${cp}`);
    const cd = await cr.json();
    if (!cd.items?.length) throw new Error('채널 정보를 불러올 수 없어요.');

    // 3) 최근 영상 10개 조회수 평균
    const vsp = new URLSearchParams({ part:'id', channelId:channelId, order:'date', maxResults:10, type:'video', key:API_KEY });
    const vsr = await fetch(`https://www.googleapis.com/youtube/v3/search?${vsp}`);
    const vsd = await vsr.json();
    let avgViews = 0;
    let recentVideos = [];

    if (vsd.items?.length) {
        const ids = vsd.items.map(i => i.id.videoId).filter(Boolean).join(',');
        if (ids) {
            const vp = new URLSearchParams({ part:'statistics,snippet', id:ids, key:API_KEY });
            const vr = await fetch(`https://www.googleapis.com/youtube/v3/videos?${vp}`);
            const vd = await vr.json();
            recentVideos = vd.items || [];
            const views = recentVideos.map(v => parseInt(v.statistics?.viewCount)||0);
            avgViews = views.length ? Math.round(views.reduce((a,b)=>a+b,0)/views.length) : 0;
        }
    }

    return { channel: cd.items[0], avgViews, recentVideos };
}

// ═══════════════════════════
// 정렬
// ═══════════════════════════
function sorted(list, type) {
    return [...list].sort((a,b) => {
        if(type==='viewCount') return (parseInt(b.statistics?.viewCount)||0)-(parseInt(a.statistics?.viewCount)||0);
        if(type==='velocity')  return velocity(b)-velocity(a);
        if(type==='date')      return new Date(b.snippet.publishedAt)-new Date(a.snippet.publishedAt);
        return 0;
    });
}

// 스켈레톤

function renderSkeleton() {

// ═══════════════════════════
// 영상 카드
// ═══════════════════════════
function cardHTML(v, rank) {
    const s      = v.statistics||{};
    const views  = parseInt(s.viewCount)||0;
    const likes  = parseInt(s.likeCount)||0;
    const subs   = parseInt(v.snippet._subscriberCount)||0;
    const vel    = velocity(v);
    const maxVel = Math.max(...videos.map(velocity));
    const pct    = Math.min(100, Math.round(vel/Math.max(1,maxVel)*100));
    const color  = catColor(v.snippet.categoryId);
    const isTop  = rank<=3;
    const thumb  = v.snippet.thumbnails?.medium?.url||'';
    const url    = `https://www.youtube.com/watch?v=${v.id}`;

    // 레벨 뱃지 (영상 카드에는 급상승 속도 레벨로 표시)
    const velRatio  = pct/100;
    const lv        = getLevel(velRatio);

    return `
    <a class="video-card${isTop?' hot':''}" href="${url}" target="_blank" rel="noopener">
        <div class="thumb-wrap">
            <img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'">
            <span class="rank-num${isTop?' top':''}">#${rank}</span>
            ${isTop?'<span class="hot-tag">HOT🔥</span>':''}
        </div>
        <div class="video-info">
            <div class="video-title">${v.snippet.title}</div>
            <div class="channel">📺 ${v.snippet.channelTitle}</div>
            <div class="stats-row">
                <span class="stat v">👁 ${fmt(views)}</span>
                <span class="stat l">❤️ ${fmt(likes)}</span>
                <span class="stat t">🕐 ${ago(v.snippet.publishedAt)}</span>
            </div>
            <div class="speed-row">
                <div class="speed-bar-bg">
                    <div class="speed-bar-fill" style="width:${pct}%;background:${color}"></div>
                </div>
                <span class="level-badge-sm" style="background:${lv.color}20;color:${lv.color};border:1px solid ${lv.color}50">
                    ${lv.emoji} Lv.${lv.lv}
                </span>
            </div>
        </div>
    </a>`;
}

// ═══════════════════════════
// 인라인 광고

function adHTML() {

}

// ═══════════════════════════
// 영상 렌더
// ═══════════════════════════
function render() {
    const list = sorted(videos, currentSort);

    });

// ═══════════════════════════
// 에러 렌더
// ═══════════════════════════
function renderError(msg) {
    document.getElementById('mainContent').innerHTML = `
    <div class="error-wrap"><div class="error-box">

        <div class="error-title">데이터를 불러오지 못했어요</div>

    </div></div>`;

}

// ═══════════════════════════
// 데이터 로드
// ═══════════════════════════
async function loadData() {
    if (isLoading) return;
    isLoading = true;
    renderSkeleton();
    document.getElementById('resultInfo').textContent = '분석 중...';
    try {
        videos = await fetchVideos(currentCat);
        render();
    } catch(e) {
        renderError(e.message);
    } finally {
        isLoading = false;
    }
}

                <div class="stat-cell-sub">총 ${fmt(videoCount)}개 영상</div>
            </div>
            <div class="stat-cell">
                <div class="stat-cell-label">👁 총 조회수</div>
                <div class="stat-cell-value">${fmt(totalViews)}</div>
                <div class="stat-cell-sub">영상당 평균 ${fmt(Math.round(totalViews/videoCount))}</div>
            </div>
            <div class="stat-cell">
                <div class="stat-cell-label">⚡ 참여율 지수</div>
                <div class="stat-cell-value" style="color:${lv.color}">${lv.lv >= 7 ? '🔥 폭발적' : lv.lv >= 5 ? '⭐ 우수' : lv.lv >= 3 ? '📈 보통' : '📉 낮음'}</div>
                <div class="stat-cell-sub">Lv.${lv.lv}/10 기준</div>
            </div>
        </div>

        <!-- 최근 영상 미리보기 -->
        ${recentVideos.length ? `
        <div style="padding:14px 16px;border-top:1px solid var(--border)">
            <div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px">📹 최근 업로드 영상</div>
            <div style="display:flex;flex-direction:column;gap:8px">
                ${recentVideos.slice(0,5).map(v => {
                    const vViews = parseInt(v.statistics?.viewCount)||0;
                    const vRatio = vViews/subs;
                    const vLv    = getLevel(vRatio);
                    return `
                    <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener"
                       style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;padding:8px;background:var(--bg);border-radius:10px;">
                        <img src="${v.snippet.thumbnails?.default?.url||''}" style="width:64px;height:40px;object-fit:cover;border-radius:6px;flex-shrink:0" alt="">
                        <div style="flex:1;min-width:0">
                            <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.snippet.title}</div>
                            <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
                                <span style="font-size:11px;color:var(--text2)">👁 ${fmt(vViews)}</span>
                                <span class="level-badge-sm" style="background:${vLv.color}20;color:${vLv.color};border:1px solid ${vLv.color}40">${vLv.emoji} Lv.${vLv.lv}</span>
                            </div>
                        </div>
                    </a>`;
                }).join('')}
            </div>
        </div>` : ''}

        <!-- 레벨 기준표 -->
        <div class="level-table">
            <div class="level-table-title">📋 전체 레벨 기준</div>
            ${LEVELS.map(l => `
                <div class="level-row${l.lv===lv.lv?' current':''}">
                    <span class="level-row-num" style="color:${l.color}">${l.emoji}</span>
                    <div style="flex:1">
                        <div style="font-size:13px;font-weight:${l.lv===lv.lv?'800':'600'};color:${l.lv===lv.lv?l.color:'var(--text)'}">Lv.${l.lv} ${l.name}</div>
                        <div style="font-size:11px;color:var(--text3)">${l.range}</div>
                    </div>
                    ${l.lv===lv.lv?`<span style="font-size:12px;font-weight:700;color:${l.color}">← 현재</span>`:''}
                </div>
            `).join('')}
        </div>`;

        // 게이지 애니메이션
        setTimeout(() => {
            document.getElementById('gaugeFill').style.width = lvPct + '%';
        }, 100);

        // 광고 노출
        adEl.style.display = 'block';
        try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
        renderLevelTablePreview(lv.lv);

        // 전면광고 (채널 분석 시)
        showAd();

    } catch(e) {
        result.innerHTML = `
        <div class="ch-error">
            <div class="ch-error-icon">🔍</div>
            <div class="ch-error-msg">${e.message}</div>
        </div>`;
    }
}

// ═══════════════════════════
// 초기 실행
// ═══════════════════════════
renderLevelTablePreview();
loadData();
</script>
</body>
</html>
