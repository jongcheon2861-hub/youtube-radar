<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>농구 선수 카드</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .card {
            width: 280px;
            height: 392px;
            background: linear-gradient(135deg, #ff6ec7 0%, #a855f7 50%, #7c3aed 100%);
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .card-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            color: #ffd700;
            font-size: 14px;
            text-shadow: 0 0 3px rgba(255, 215, 0, 0.5);
        }

        .badge {
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .sparkles {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 9;
        }

        .sparkle {
            position: absolute;
            color: #ffd700;
            font-size: 12px;
            animation: sparkle 2s infinite;
        }

        .sparkle:nth-child(1) { left: 20px; top: 5px; animation-delay: 0s; }
        .sparkle:nth-child(2) { left: 35px; top: 15px; animation-delay: 0.3s; }
        .sparkle:nth-child(3) { left: 15px; top: 25px; animation-delay: 0.6s; }

        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .bokeh {
            position: absolute;
            top: 20px;
            left: 15px;
            z-index: 8;
        }

        .bokeh-light {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 182, 77, 0.6) 0%, transparent 70%);
            filter: blur(4px);
        }

        .bokeh-light:nth-child(1) {
            width: 40px;
            height: 40px;
            left: 0;
            top: 0;
        }

        .bokeh-light:nth-child(2) {
            width: 25px;
            height: 25px;
            left: 30px;
            top: 10px;
            background: radial-gradient(circle, rgba(255, 150, 100, 0.5) 0%, transparent 70%);
        }

        .player-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            object-position: center top;
            position: relative;
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 320px;
            background: radial-gradient(ellipse at center, transparent 20%, rgba(26, 26, 46, 0.5) 80%);
            pointer-events: none;
        }

        .card-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #7c3aed 0%, #6b21a8 100%);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .season {
            color: white;
            font-size: 13px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .player-name {
            color: white;
            font-size: 15px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-inner">
            <!-- 상단 헤더 -->
            <div class="card-header">
                <div class="stars">
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                </div>
                <div class="badge">Legend</div>
            </div>

            <!-- 반짝임 효과 -->
            <div class="sparkles">
                <span class="sparkle">✦</span>
                <span class="sparkle">✦</span>
                <span class="sparkle">✦</span>
            </div>

            <!-- 보케 효과 -->
            <div class="bokeh">
                <div class="bokeh-light"></div>
                <div class="bokeh-light"></div>
            </div>

            <!-- 선수 이미지 -->
            <img src="https://www.genspark.ai/api/files/s/6AptYkWr" alt="선수 사진" class="player-image">
            
            <!-- 이미지 오버레이 -->
            <div class="image-overlay"></div>

            <!-- 하단 정보 -->
            <div class="card-footer">
                <div class="season">'17-'18</div>
                <div class="player-name">문선</div>
            </div>
        </div>
    </div>
</body>
</html>
