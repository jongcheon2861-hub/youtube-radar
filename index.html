<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO · 알고리빙1004</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --void:   #04040c;
  --purple: #a855f7;
  --gold:   #d4a942;
  --gold-l: #f0c96a;
  --white:  #f0eee8;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body{
  background: var(--void);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 64px;
  padding: 80px 24px;
  overflow-x: hidden;
}

/* ── 배경 ── */
.bg{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 50% 40% at 50% 38%,
      rgba(45,13,92,.18) 0%, transparent 70%),
    #04040c;
}
.star{
  position:fixed; border-radius:50%;
  pointer-events:none; z-index:0;
  animation: twk ease-in-out infinite;
}
@keyframes twk{
  0%,100%{ opacity:.03; }
  50%    { opacity:.28; }
}

/* ── 섹션 레이블 ── */
.sec-label{
  position:relative; z-index:10;
  font-family:'Noto Sans KR',sans-serif;
  font-size:9px; font-weight:300;
  letter-spacing:5px; text-transform:uppercase;
  color:rgba(168,85,247,.28);
  margin-bottom:18px; text-align:center;
}

/* ══════════════════════════════
   대형 로고
══════════════════════════════ */
.logo-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}
.logo-wrap{
  display:flex; flex-direction:column;
  align-items:center; gap:14px;
  animation: float 8s ease-in-out infinite;
}
@keyframes float{
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-6px); }
}

/* 심볼 + 워드마크 */
.logo-mark-row{
  display:flex; align-items:center; gap:18px;
  position:relative;
}

/* ── 방사 효과 (로고 전체 뒤) ── */
.logo-radiance{
  position:absolute;
  width:320px; height:120px;
  top:50%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none; z-index:0;
  border-radius:50%;
  background: radial-gradient(ellipse at center,
    rgba(212,169,66,.13)  0%,
    rgba(168,85,247,.09)  35%,
    rgba(107,33,168,.04)  60%,
    transparent           80%);
  filter: blur(18px);
  animation: radiancePulse 5s ease-in-out infinite;
}
@keyframes radiancePulse{
  0%,100%{ opacity:.7; transform:translate(-50%,-50%) scale(1); }
  50%    { opacity:1;  transform:translate(-50%,-50%) scale(1.15); }
}

/* ══════════════════════════════
   심볼 아이콘 (고급화)
══════════════════════════════ */
.logo-symbol{
  position:relative;
  width:56px; height:56px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; z-index:2;
}

/* 심볼 내부 방사 코어 */
.sym-radiance{
  position:absolute;
  width:70px; height:70px;
  border-radius:50%;
  background: radial-gradient(circle at center,
    rgba(212,169,66,.25)  0%,
    rgba(168,85,247,.15)  30%,
    rgba(107,33,168,.06)  55%,
    transparent           72%);
  filter: blur(8px);
  pointer-events:none; z-index:0;
  animation: symRadPulse 4s ease-in-out infinite;
}
@keyframes symRadPulse{
  0%,100%{ opacity:.7; transform:scale(1); }
  50%    { opacity:1;  transform:scale(1.2); }
}

/* 바깥 원 — 얇고 정제된 골드 */
.sym-outer{
  position:absolute;
  width:54px; height:54px;
  border-radius:50%;
  border:1px solid rgba(212,169,66,.28);
  z-index:1;
  animation: outerPulse 5s ease-in-out infinite;
}
@keyframes outerPulse{
  0%,100%{ border-color:rgba(212,169,66,.22); }
  50%    { border-color:rgba(212,169,66,.5); box-shadow:0 0 14px rgba(212,169,66,.12); }
}

/* 중간 원 — 퍼플 */
.sym-mid{
  position:absolute;
  width:42px; height:42px;
  border-radius:50%;
  border:1px solid rgba(168,85,247,.18);
  z-index:1;
  animation: midPulse 5s ease-in-out infinite .8s;
}
@keyframes midPulse{
  0%,100%{ border-color:rgba(168,85,247,.14); }
  50%    { border-color:rgba(168,85,247,.38); }
}

/* 코어 — 블랙홀 */
.sym-core{
  position:relative; z-index:3;
  width:26px; height:26px;
  border-radius:50%;
  background: radial-gradient(circle at 35% 32%,
    rgba(212,169,66,.18)  0%,
    rgba(107,33,168,.75)  30%,
    rgba(20,5,45,.95)     58%,
    rgba(4,4,12,1)        80%);
  box-shadow:
    inset 0 0 8px rgba(168,85,247,.4),
    inset 0 0 3px rgba(212,169,66,.2),
    0 0 10px rgba(107,33,168,.25),
    0 0 20px rgba(107,33,168,.1);
  animation: coreGlow 4s ease-in-out infinite;
}
@keyframes coreGlow{
  0%,100%{
    box-shadow:
      inset 0 0 8px rgba(168,85,247,.35),
      inset 0 0 3px rgba(212,169,66,.18),
      0 0 8px rgba(107,33,168,.2),
      0 0 18px rgba(107,33,168,.08);
  }
  50%{
    box-shadow:
      inset 0 0 14px rgba(168,85,247,.6),
      inset 0 0 5px rgba(212,169,66,.35),
      0 0 16px rgba(107,33,168,.4),
      0 0 32px rgba(107,33,168,.18),
      0 0 48px rgba(212,169,66,.08);
  }
}

/* 궤도 링 1 — 기울어진 골드 타원 */
.sym-orbit-1{
  position:absolute;
  width:52px; height:52px;
  border-radius:50%;
  border:1px solid transparent;
  border-top-color: rgba(212,169,66,.55);
  border-right-color: rgba(212,169,66,.15);
  z-index:2;
  transform: rotateX(65deg) rotateZ(0deg);
  animation: orbit1 7s linear infinite;
}
@keyframes orbit1{
  from{ transform: rotateX(65deg) rotateZ(0deg); }
  to  { transform: rotateX(65deg) rotateZ(360deg); }
}

/* 궤도 링 2 — 반대 방향 퍼플 */
.sym-orbit-2{
  position:absolute;
  width:44px; height:44px;
  border-radius:50%;
  border:1px solid transparent;
  border-bottom-color: rgba(168,85,247,.45);
  border-left-color:   rgba(168,85,247,.12);
  z-index:2;
  transform: rotateX(65deg) rotateZ(120deg);
  animation: orbit2 10s linear infinite reverse;
}
@keyframes orbit2{
  from{ transform: rotateX(65deg) rotateZ(0deg); }
  to  { transform: rotateX(65deg) rotateZ(360deg); }
}

/* 궤도 링 3 — 수직 골드 */
.sym-orbit-3{
  position:absolute;
  width:36px; height:36px;
  border-radius:50%;
  border:1px solid transparent;
  border-top-color:  rgba(212,169,66,.3);
  border-left-color: rgba(212,169,66,.1);
  z-index:2;
  transform: rotateY(72deg) rotateZ(45deg);
  animation: orbit3 14s linear infinite;
}
@keyframes orbit3{
  from{ transform: rotateY(72deg) rotateZ(0deg); }
  to  { transform: rotateY(72deg) rotateZ(360deg); }
}

/* 코어 중심 광점 */
.sym-dot{
  position:absolute;
  width:4px; height:4px;
  border-radius:50%;
  background: var(--gold-l);
  box-shadow: 0 0 6px rgba(240,201,106,.9), 0 0 14px rgba(240,201,106,.5);
  z-index:4;
  animation: dotPulse 3s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{ transform:scale(1); opacity:.85; }
  50%    { transform:scale(1.5); opacity:1;
    box-shadow:0 0 10px rgba(240,201,106,1), 0 0 22px rgba(240,201,106,.6), 0 0 36px rgba(168,85,247,.3); }
}

/* ── 워드마크 ── */
.logo-wordmark{
  display:flex; flex-direction:column;
  gap:4px; z-index:2;
  position:relative;
}

/* 워드마크 내부 방사 */
.wm-radiance{
  position:absolute;
  width:180px; height:60px;
  top:50%; left:0; transform:translateY(-50%);
  border-radius:50%;
  background: radial-gradient(ellipse at 20% 50%,
    rgba(212,169,66,.1)  0%,
    rgba(168,85,247,.06) 40%,
    transparent          70%);
  filter: blur(12px);
  pointer-events:none; z-index:0;
  animation: radiancePulse 5s ease-in-out infinite;
}

.wm-algo{
  font-family:'Cinzel',serif;
  font-size:40px; font-weight:900;
  letter-spacing:12px; padding-right:12px;
  color:var(--white);
  line-height:1;
  position:relative; z-index:2;
  animation: wmGlow 5s ease-in-out infinite;
}
@keyframes wmGlow{
  0%,100%{ text-shadow:0 0 24px rgba(212,169,66,.15); }
  50%    { text-shadow:0 0 40px rgba(212,169,66,.38), 0 0 65px rgba(168,85,247,.12); }
}
.wm-sub{
  font-family:'Noto Sans KR',sans-serif;
  font-size:9px; font-weight:300;
  letter-spacing:5px;
  color:rgba(212,169,66,.38);
  padding-left:3px;
  position:relative; z-index:2;
}

/* ── 구분선 ── */
.logo-rule{
  width:100%; height:1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(168,85,247,.15) 20%,
    rgba(212,169,66,.35) 50%,
    rgba(168,85,247,.15) 80%,
    transparent);
  position:relative;
}
.logo-rule::after{
  content:'';
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  width:4px; height:4px;
  background:var(--gold);
  box-shadow:0 0 6px rgba(212,169,66,.8);
}

/* ══════════════════════════════
   소형 배지
══════════════════════════════ */
.badge-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}
.badge{
  position:relative;
  display:inline-flex; align-items:center; gap:10px;
  padding:8px 18px 8px 12px;
  border-radius:6px;
  cursor:pointer;
  animation: badgeFloat 6s ease-in-out infinite;
  transition:transform .2s;
}
.badge:hover{ transform:scale(1.04) !important; }
@keyframes badgeFloat{
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-4px); }
}

/* 배지 배경 */
.badge-bg{
  position:absolute; inset:0; border-radius:6px; z-index:0;
  background: rgba(45,13,92,.28);
  backdrop-filter:blur(8px);
}

/* 배지 내부 방사 */
.badge-radiance{
  position:absolute; inset:0; border-radius:6px; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse at 25% 50%,
    rgba(212,169,66,.1)  0%,
    rgba(168,85,247,.07) 45%,
    transparent          70%);
  animation: radiancePulse 5s ease-in-out infinite;
}

/* 배지 테두리 */
.badge-frame{
  position:absolute; inset:0; border-radius:6px;
  z-index:1; pointer-events:none;
  border:1px solid rgba(212,169,66,.18);
  transition: border-color .3s;
}
.badge:hover .badge-frame{ border-color:rgba(212,169,66,.38); }

/* 배지 샤인 */
.badge-shine{
  position:absolute; inset:0; border-radius:6px;
  z-index:2; overflow:hidden; pointer-events:none;
}
.badge-shine::after{
  content:''; position:absolute;
  top:0; left:-120%; width:55%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.07), transparent);
  transform:skewX(-20deg);
  animation: shine 6s ease-in-out infinite;
}
@keyframes shine{
  0%,60%,100%{ left:-120%; }
  82%        { left:130%; }
}

/* 배지 미니 심볼 */
.badge-sym{
  position:relative;
  width:22px; height:22px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; z-index:3;
}
.badge-sym-radiance{
  position:absolute;
  width:28px; height:28px; border-radius:50%;
  background:radial-gradient(circle at center,
    rgba(212,169,66,.2) 0%, rgba(168,85,247,.1) 40%, transparent 68%);
  filter:blur(4px);
  animation: symRadPulse 4s ease-in-out infinite;
}
.badge-sym-outer{
  position:absolute; inset:0; border-radius:50%;
  border:1px solid rgba(212,169,66,.28);
}
.badge-sym-mid{
  position:absolute;
  width:16px; height:16px;
  border-radius:50%;
  border:1px solid rgba(168,85,247,.18);
}
.badge-sym-core{
  width:10px; height:10px; border-radius:50%; z-index:2;
  background: radial-gradient(circle at 35% 32%,
    rgba(212,169,66,.15)  0%,
    rgba(107,33,168,.8)   35%,
    rgba(4,4,12,1)        78%);
  box-shadow: inset 0 0 5px rgba(168,85,247,.45), 0 0 6px rgba(107,33,168,.3);
  animation: coreGlow 4s ease-in-out infinite;
}
.badge-sym-orbit{
  position:absolute;
  width:20px; height:20px; border-radius:50%;
  border:1px solid transparent;
  border-top-color: rgba(212,169,66,.5);
  border-right-color: rgba(212,169,66,.12);
  transform: rotateX(65deg);
  animation: orbit1 7s linear infinite;
}
.badge-sym-dot{
  position:absolute;
  width:2.5px; height:2.5px; border-radius:50%;
  background:var(--gold-l);
  box-shadow:0 0 4px rgba(240,201,106,.9);
  z-index:4;
  animation: dotPulse 3s ease-in-out infinite;
}

/* 배지 텍스트 */
.badge-text{
  display:flex; flex-direction:column; gap:2px; z-index:3;
}
.badge-algo{
  font-family:'Cinzel',serif;
  font-size:12px; font-weight:900;
  letter-spacing:4px; padding-right:4px;
  color:var(--white); line-height:1;
  text-shadow:0 0 10px rgba(212,169,66,.22);
}
.badge-sub{
  font-family:'Noto Sans KR',sans-serif;
  font-size:7px; font-weight:300;
  letter-spacing:3px;
  color:rgba(212,169,66,.35);
}
</style>
</head>
<body>

<div class="bg"></div>

<script>
(function(){
  const c=['rgba(255,248,231,.85)','rgba(168,85,247,.75)','rgba(212,169,66,.75)'];
  for(let i=0;i<50;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*1.3+.3, col=c[Math.floor(Math.random()*c.length)];
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${col};box-shadow:0 0 ${sz*2}px ${col};animation-duration:${Math.random()*5+3}s;animation-delay:${Math.random()*8}s;`;
    document.body.appendChild(s);
  }
})();
</script>

<!-- ══ 대형 로고 ══ -->
<div class="logo-section">
  <div class="sec-label">◈ &nbsp; Page Title Logo &nbsp; ◈</div>

  <div class="logo-wrap">
    <div class="logo-mark-row">

      <!-- 방사 효과 -->
      <div class="logo-radiance"></div>

      <!-- 고급 심볼 -->
      <div class="logo-symbol">
        <div class="sym-radiance"></div>
        <div class="sym-outer"></div>
        <div class="sym-mid"></div>
        <div class="sym-orbit-1"></div>
        <div class="sym-orbit-2"></div>
        <div class="sym-orbit-3"></div>
        <div class="sym-core"></div>
        <div class="sym-dot"></div>
      </div>

      <!-- 워드마크 -->
      <div class="logo-wordmark">
        <div class="wm-radiance"></div>
        <div class="wm-algo">ALGO</div>
        <div class="wm-sub">알고리빙1004</div>
      </div>

    </div>

    <!-- 룰 -->
    <div class="logo-rule"></div>

  </div>
</div>

<!-- ══ 소형 배지 ══ -->
<div class="badge-section">
  <div class="sec-label">◈ &nbsp; Card Header Badge &nbsp; ◈</div>

  <div class="badge">
    <div class="badge-bg"></div>
    <div class="badge-radiance"></div>
    <div class="badge-frame"></div>
    <div class="badge-shine"></div>

    <div class="badge-sym">
      <div class="badge-sym-radiance"></div>
      <div class="badge-sym-outer"></div>
      <div class="badge-sym-mid"></div>
      <div class="badge-sym-orbit"></div>
      <div class="badge-sym-core"></div>
      <div class="badge-sym-dot"></div>
    </div>

    <div class="badge-text">
      <div class="badge-algo">ALGO</div>
      <div class="badge-sub">알고리빙1004</div>
    </div>
  </div>

</div>

</body>
</html>
