<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YTAnalytics Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
:root{
  --bg0:#111118;--bg1:#18181f;--bg2:#22222e;--bg3:#2a2a38;
  --acc:#7c5cfc;--acc2:#a78bfa;--gold:#f59e0b;--red:#ef4444;--green:#22c55e;
  --text:#e8e8f0;--text2:#a0a0b8;--text3:#6b6b88;
  --border:rgba(255,255,255,.07);--card-bg:#1e1e2c;
  --sidebar:240px;--header:56px;--right:280px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* ── HEADER ── */
header{
  position:fixed;top:0;left:0;right:0;height:var(--header);
  background:rgba(17,17,24,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;z-index:200
}
.logo{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#7c5cfc,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.hdr-search{flex:1;max-width:380px;position:relative}
.hdr-search input{
  width:100%;padding:8px 14px 8px 38px;border-radius:20px;
  background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:.85rem;outline:none
}
.hdr-search::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.85rem}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.hdr-btn{padding:7px 14px;border-radius:16px;font-size:.78rem;font-weight:600;
  background:linear-gradient(135deg,var(--acc),#a78bfa);color:#fff;transition:.2s}
.hdr-btn:hover{opacity:.85}

/* ── LAYOUT ── */
.layout{display:flex;margin-top:var(--header);min-height:calc(100vh - var(--header))}
.sidebar{position:fixed;top:var(--header);left:0;bottom:0;width:var(--sidebar);
  background:var(--bg1);border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;z-index:100}
.main-wrap{margin-left:var(--sidebar);margin-right:var(--right);flex:1;padding:20px;min-width:0}
.right-col{position:fixed;top:var(--header);right:0;bottom:0;width:var(--right);
  background:var(--bg1);border-left:1px solid var(--border);
  overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}

/* ── SIDEBAR ── */
.nav-section{padding:12px 8px 4px;font-size:.7rem;color:var(--text3);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-radius:10px;margin:2px 8px;cursor:pointer;font-size:.88rem;
  transition:.15s;color:var(--text2)}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(124,92,252,.25),rgba(167,139,250,.1));
  color:var(--acc2);font-weight:700}
.nav-icon{font-size:1.1rem;width:22px;text-align:center}
.sidebar-ad{margin:auto 12px 12px;padding:10px;background:var(--bg2);border-radius:10px;
  border:1px solid var(--border);text-align:center;min-height:80px}

/* ── SECTION ── */
.section{display:none}
.section.active{display:block}
.top-ad{background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(245,158,11,.1));
  border:1px solid rgba(124,92,252,.2);border-radius:12px;
  padding:10px 16px;margin-bottom:16px;text-align:center;min-height:60px;
  display:flex;align-items:center;justify-content:center}
.section-title{font-size:1.2rem;font-weight:800;margin-bottom:16px;
  background:linear-gradient(135deg,var(--acc2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px}
.card-title{font-size:.95rem;font-weight:700;margin-bottom:12px;color:var(--text)}

/* ════════════════════════════════
   LIGHT BEAM / FIRE PILLAR SYSTEM
════════════════════════════════ */
/* 레벨 ROW */
.lv-row{display:flex;gap:16px;align-items:flex-start;margin-bottom:20px}

/* 빛기둥 카드 */
.beam-card{
  background:transparent;border:none;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 16px;min-width:200px;position:relative
}
/* Canvas 빛기둥 */
.beam-canvas{display:block;position:relative;z-index:1}
/* 레벨 텍스트 오버레이 */
.beam-text-wrap{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  margin-top:-10px
}
.lv-num{font-size:2.4rem;font-weight:900;line-height:1;margin-bottom:2px}
.lv-name-txt{font-size:.82rem;font-weight:700;letter-spacing:.08em;margin-bottom:4px}
.lv-pct{font-size:.74rem;margin-bottom:2px;animation:pctPulse 2s ease-in-out infinite}
.algo-score-box{
  margin-top:8px;padding:6px 16px;border-radius:20px;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);
  font-size:.78rem;font-weight:700;backdrop-filter:blur(4px)
}
@keyframes pctPulse{0%,100%{opacity:.75;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}

/* 등급표 */
.grade-mini-wrap{flex:1;max-width:50%;margin-left:auto}
.grade-mini-title{font-size:.82rem;font-weight:700;color:var(--text2);margin-bottom:8px}
.grade-mini-table{width:100%;border-collapse:collapse;font-size:.76rem}
.grade-mini-table th{padding:5px 8px;text-align:left;color:var(--text3);
  border-bottom:1px solid var(--border);font-weight:600;font-size:.7rem}
.grade-mini-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:.15s}
.grade-mini-table tr:hover td{background:rgba(255,255,255,.04)}
.grade-mini-table tr.cur-lv td{background:rgba(124,92,252,.15);font-weight:700}
.grade-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.preview-hint{font-size:.62rem;color:var(--text3);float:right;margin-top:1px}

/* ── 레벨 미리보기 모달 ── */
.beam-preview-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);
  z-index:3000;align-items:center;justify-content:center;flex-direction:column;gap:20px
}
.beam-preview-overlay.open{display:flex}
.beam-preview-box{
  background:rgba(10,10,20,.95);border-radius:20px;padding:32px 40px;
  border:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;gap:12px;
  position:relative;min-width:280px
}
.bp-close{position:absolute;top:12px;right:16px;font-size:1.2rem;color:var(--text2);cursor:pointer}
.bp-close:hover{color:var(--red)}
.bp-lv-label{font-size:1rem;font-weight:700;color:var(--text2);margin-bottom:4px}
.bp-nav{display:flex;gap:12px;margin-top:8px}
.bp-nav-btn{padding:7px 18px;border-radius:10px;background:var(--bg2);color:var(--text2);
  border:1px solid var(--border);font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s}
.bp-nav-btn:hover{background:var(--acc);color:#fff}
.bp-nav-btn:disabled{opacity:.3;cursor:not-allowed}

/* ── BENCHMARK ── */
.bench-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.bench-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:14px;position:relative;overflow:hidden}
.bench-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,92,252,.05),transparent);pointer-events:none}
.bench-label{font-size:.72rem;color:var(--text3);margin-bottom:6px;font-weight:600}
.bench-val{font-size:1.2rem;font-weight:900;color:var(--text);margin-bottom:4px}
.bench-avg{font-size:.72rem;color:var(--text3)}
.bench-diff{font-size:.75rem;font-weight:700;margin-top:4px}
.bench-diff.pos{color:var(--green)} .bench-diff.neg{color:var(--red)}
.bench-bar-wrap{height:4px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden;position:relative}
.bench-bar-ch{height:100%;border-radius:2px;background:var(--acc);transition:width .8s}
.bench-bar-avg-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.5)}

/* ── PROS / CONS ── */
.pros-cons-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.pros-card{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:12px;padding:14px}
.cons-card{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:14px}
.pros-card h4{color:var(--green);font-size:.85rem;margin-bottom:8px}
.cons-card h4{color:var(--red);font-size:.85rem;margin-bottom:8px}
.pros-card li,.cons-card li{font-size:.8rem;color:var(--text2);line-height:1.6;margin-left:14px}

/* ── METRIC ── */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--bg2);border-radius:10px;padding:12px;border:1px solid var(--border)}
.metric-label{font-size:.7rem;color:var(--text3);margin-bottom:4px}
.metric-val{font-size:1.1rem;font-weight:800;color:var(--text)}

/* ── HOT VIDEOS ── */
.hot-layout{display:flex;gap:16px}
.hot-sidebar-filters{width:160px;flex-shrink:0;display:flex;flex-direction:column;gap:4px}
.filter-group-label{font-size:.7rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:4px 4px 2px}
.type-btn,.cat-btn{display:block;width:100%;text-align:left;padding:8px 12px;border-radius:8px;
  font-size:.81rem;color:var(--text2);background:var(--bg2);border:1px solid transparent;
  transition:.15s;cursor:pointer;margin-bottom:3px}
.type-btn:hover,.cat-btn:hover{background:var(--bg3);color:var(--text)}
.type-btn.active,.cat-btn.active{background:rgba(124,92,252,.2);color:var(--acc2);border-color:rgba(124,92,252,.3);font-weight:700}
.hot-content{flex:1;min-width:0}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.vid-card{background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:.2s}
.vid-card:hover{transform:translateY(-3px);border-color:rgba(124,92,252,.3);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.vid-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#000}
.vid-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.vid-dur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;font-size:.7rem;padding:2px 5px;border-radius:4px}
.vid-shorts-badge{position:absolute;top:6px;left:6px;background:#ff0050;color:#fff;font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:10px}
.vid-info{padding:10px}
.vid-title{font-size:.82rem;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.vid-meta{font-size:.72rem;color:var(--text3)}
.viral-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden}
.viral-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--acc),var(--gold))}
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px}
.page-btn{padding:8px 16px;border-radius:8px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);font-size:.82rem;transition:.15s;cursor:pointer}
.page-btn:hover:not(:disabled){background:var(--acc);color:#fff}
.page-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── REVENUE ── */
.rev-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.rev-inputs{display:flex;flex-direction:column;gap:14px}
.rev-item label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:6px;font-weight:600}
.gauge-wrap{position:relative;height:36px;cursor:pointer;user-select:none}
.gauge-track{position:absolute;top:50%;left:0;right:0;height:8px;transform:translateY(-50%);background:var(--bg3);border-radius:4px;overflow:hidden}
.gauge-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc),var(--gold));pointer-events:none}
.gauge-thumb{position:absolute;top:50%;width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--acc);transform:translate(-50%,-50%);box-shadow:0 2px 8px rgba(0,0,0,.4);pointer-events:none}
.gauge-value{font-size:.85rem;font-weight:700;color:var(--acc2);margin-top:4px}
.gauge-range{display:flex;justify-content:space-between;font-size:.67rem;color:var(--text3);margin-top:2px}
.rev-results{display:flex;flex-direction:column;gap:10px}
.rev-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rev-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.rev-card-label{font-size:.72rem;color:var(--text3);margin-bottom:6px}
.rev-card-val{font-size:1.3rem;font-weight:900;color:var(--gold)}
.rev-tip{background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.2);border-radius:10px;padding:12px;font-size:.8rem;color:var(--text2);line-height:1.6}

/* ── TOOLS ── */
.tools-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tool-tab{padding:6px 14px;border-radius:16px;font-size:.78rem;font-weight:600;background:var(--bg2);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:.15s}
.tool-tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.tool-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;gap:6px}
.tool-card:hover{border-color:var(--acc);transform:translateY(-2px)}
.tool-icon{width:36px;height:36px;border-radius:8px;object-fit:cover}
.tool-name{font-size:.82rem;font-weight:700}
.tool-desc{font-size:.7rem;color:var(--text3);line-height:1.4}
.tool-tag{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px}
.tool-tag.free{background:rgba(34,197,94,.15);color:var(--green)}
.tool-tag.premium{background:rgba(245,158,11,.15);color:var(--gold)}
.tool-tag.paid{background:rgba(239,68,68,.15);color:var(--red)}

/* ── AI IDEAS ── */
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.idea-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:.2s}
.idea-card:hover{border-color:var(--acc);transform:translateY(-2px)}
.idea-num{font-size:.7rem;color:var(--text3);margin-bottom:4px}
.idea-title{font-size:.9rem;font-weight:700;margin-bottom:6px}
.idea-hook{font-size:.78rem;color:var(--text2);line-height:1.5;margin-bottom:8px}
.idea-tags{display:flex;flex-wrap:wrap;gap:4px}
.idea-tag{font-size:.65rem;padding:2px 8px;border-radius:10px;background:rgba(124,92,252,.15);color:var(--acc2);font-weight:600}

/* ── SHOP ── */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.shop-card{background:#252535;border:1px solid rgba(124,92,252,.25);border-radius:14px;overflow:hidden;transition:.2s;display:flex;flex-direction:column;aspect-ratio:1/1}
.shop-card:hover{transform:translateY(-3px);border-color:var(--acc);box-shadow:0 8px 24px rgba(124,92,252,.2)}
.shop-card-inner{flex:1;display:flex;flex-direction:column;padding:12px;gap:5px;overflow:hidden}
.shop-emoji{font-size:2rem;text-align:center;margin-bottom:2px}
.shop-rank{font-size:.65rem;font-weight:700;color:var(--gold)}
.shop-name{font-size:.8rem;font-weight:700;color:var(--text);line-height:1.3;flex:1}
.shop-price{font-size:.9rem;font-weight:900;color:var(--gold)}
.shop-orig{font-size:.7rem;color:var(--text3);text-decoration:line-through}
.shop-disc{font-size:.7rem;font-weight:700;color:var(--red)}
.shop-btn{display:block;padding:9px;background:linear-gradient(135deg,#ff6600,#ff9900);color:#fff;font-size:.78rem;font-weight:700;text-align:center;border-top:1px solid rgba(255,255,255,.1);transition:.15s;cursor:pointer;width:100%;border:none;white-space:nowrap}
.shop-btn:hover{opacity:.85}

/* ── RIGHT COL ── */
.right-ad-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;min-height:100px}
.right-ad-title{font-size:.72rem;color:var(--text3);margin-bottom:6px;font-weight:600}
.coupang-search{display:flex;flex-direction:column;gap:6px}
.coupang-input{padding:8px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:.8rem;outline:none}
.coupang-btn{padding:8px;border-radius:8px;background:linear-gradient(135deg,#ff6600,#ff9900);color:#fff;font-size:.8rem;font-weight:700;cursor:pointer}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg1);border-radius:16px;width:100%;max-width:780px;border:1px solid var(--border);overflow:hidden;position:relative}
.modal-close{position:absolute;top:10px;right:12px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,.15);transition:.15s}
.modal-close:hover{background:var(--red)}
.modal-player{position:relative;aspect-ratio:16/9}
.modal-player iframe{width:100%;height:100%;border:none;display:block}
.modal-info{padding:14px 16px}
.modal-title{font-size:.95rem;font-weight:700;margin-bottom:4px}
.modal-meta{font-size:.78rem;color:var(--text3);margin-bottom:10px}
.modal-ad{padding:0 16px 16px}
.tool-modal-box{background:var(--bg1);border-radius:16px;width:100%;max-width:480px;border:1px solid var(--border);padding:24px;position:relative}
.tool-modal-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.tool-modal-icon{width:56px;height:56px;border-radius:12px;object-fit:cover}
.tool-modal-name{font-size:1.1rem;font-weight:800}
.tool-modal-desc{font-size:.85rem;color:var(--text2);line-height:1.7;margin-bottom:16px}
.tool-modal-link{display:block;padding:12px;border-radius:10px;text-align:center;background:linear-gradient(135deg,var(--acc),#a78bfa);color:#fff;font-weight:700}
.idea-modal-box{background:var(--bg1);border-radius:16px;width:100%;max-width:600px;border:1px solid var(--border);padding:24px;position:relative;max-height:85vh;overflow-y:auto}
.idea-section-title{font-size:.75rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:12px 0 4px}
.idea-content{font-size:.85rem;color:var(--text2);line-height:1.7}
.copy-btn{margin-top:14px;padding:10px 20px;border-radius:8px;background:var(--bg3);color:var(--text);font-size:.82rem;cursor:pointer;border:1px solid var(--border);transition:.15s}
.copy-btn:hover{background:var(--acc);color:#fff}
.tag-pill{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(124,92,252,.15);color:var(--acc2)}

/* ── POPUP ── */
.popup-ad-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center}
.popup-ad-overlay.open{display:flex}
.popup-ad-box{background:var(--bg1);border-radius:16px;padding:24px;width:90%;max-width:400px;border:1px solid var(--border);text-align:center;position:relative}
.popup-close-btn{position:absolute;top:10px;right:12px;font-size:1.1rem;color:var(--text2);cursor:pointer}
.popup-close-btn:hover{color:var(--red)}
.popup-countdown{font-size:.75rem;color:var(--text3);margin-top:8px}
.loading-spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--text3)}

<script>
/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const API_KEYS = ['AIzaSyAYi9B4vIFjl75uYBS56GbTSMJfV_TLuzE','YOUR_API_KEY_2'];
const PC = 'AF8853448';
let apiIdx = 0;
function getKey(){ return API_KEYS[apiIdx % API_KEYS.length]; }

/* ══════════════════════════════════════════
   GRADE DEFINITIONS  LV1–LV10
   색상 순서: 회색→파랑→노랑→주황→오렌지→초록→빨강→핑크→보라→무지개
══════════════════════════════════════════ */
const GRADES = [
  { lv:1,  name:'새싹',   min:0,  max:9,
    color:'#9ca3af', glow:'rgba(156,163,175,', neon:false,
    beamW:6,  beamH:120, coreW:2,
    beamRGB:[156,163,175], sideCount:4, particleSize:2 },
  { lv:2,  name:'성장',   min:10, max:19,
    color:'#3b82f6', glow:'rgba(59,130,246,',  neon:false,
    beamW:10, beamH:150, coreW:3,
    beamRGB:[59,130,246],  sideCount:6, particleSize:3 },
  { lv:3,  name:'활성',   min:20, max:29,
    color:'#eab308', glow:'rgba(234,179,8,',   neon:false,
    beamW:14, beamH:170, coreW:4,
    beamRGB:[234,179,8],   sideCount:8, particleSize:3 },
  { lv:4,  name:'강자',   min:30, max:39,
    color:'#f97316', glow:'rgba(249,115,22,',  neon:false,
    beamW:18, beamH:190, coreW:5,
    beamRGB:[249,115,22],  sideCount:10, particleSize:4 },
  { lv:5,  name:'유명',   min:40, max:49,
    color:'#fb923c', glow:'rgba(251,146,60,',  neon:false,
    beamW:22, beamH:210, coreW:6,
    beamRGB:[251,146,60],  sideCount:12, particleSize:4 },
  { lv:6,  name:'파워',   min:50, max:59,
    color:'#22c55e', glow:'rgba(34,197,94,',   neon:true,
    beamW:28, beamH:230, coreW:7,
    beamRGB:[34,197,94],   sideCount:14, particleSize:5 },
  { lv:7,  name:'전설',   min:60, max:69,
    color:'#ef4444', glow:'rgba(239,68,68,',   neon:true,
    beamW:34, beamH:250, coreW:8,
    beamRGB:[239,68,68],   sideCount:16, particleSize:5 },
  { lv:8,  name:'초월',   min:70, max:79,
    color:'#ec4899', glow:'rgba(236,72,153,',  neon:true,
    beamW:40, beamH:265, coreW:9,
    beamRGB:[236,72,153],  sideCount:18, particleSize:6 },
  { lv:9,  name:'신화',   min:80, max:89,
    color:'#a855f7', glow:'rgba(168,85,247,',  neon:true,
    beamW:48, beamH:280, coreW:10,
    beamRGB:[168,85,247],  sideCount:20, particleSize:6 },
  { lv:10, name:'신',     min:90, max:100,
    color:'#fff', glow:'rgba(255,255,255,',    neon:true,
    beamW:58, beamH:300, coreW:12,
    beamRGB:[255,200,50],  sideCount:24, particleSize:7,
    rainbow:true }
];

/* ══════════════════════════════════════════
   CANVAS BEAM RENDERER
   스크린샷 속 빛기둥 + 타오르는 사이드 이펙트
══════════════════════════════════════════ */
class BeamRenderer {
  constructor(canvas, gradeIdx){
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.g = GRADES[gradeIdx] || GRADES[0];
    this.t = 0;
    this.particles = [];
    this.running = false;
    this.raf = null;
    this._initParticles();
  }

  _initParticles(){
    this.particles = [];
    const g = this.g;
    const cx = this.canvas.width / 2;
    const count = g.sideCount * 3;
    for(let i = 0; i < count; i++){
      this.particles.push(this._newParticle(cx, true));
    }
  }

  _newParticle(cx, randomY){
    const g = this.g;
    const h = this.canvas.height;
    const side = Math.random() < 0.5 ? -1 : 1;
    const spread = g.beamW * 0.5 + Math.random() * g.beamW * 1.8;
    return {
      x: cx + side * (g.beamW * 0.4 + Math.random() * spread),
      y: randomY ? Math.random() * h : h,
      vy: -(0.4 + Math.random() * 1.4) * (g.lv * 0.12 + 0.5),
      vx: side * (Math.random() * 0.6),
      size: g.particleSize * (0.4 + Math.random() * 0.8),
      life: 1.0,
      decay: 0.008 + Math.random() * 0.015,
      side: side,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.04 + Math.random() * 0.06
    };
  }

  _rainbowColor(t, alpha){
    const h = (t * 80) % 360;
    return `hsla(${h},100%,65%,${alpha})`;
  }

  _getColor(alpha){
    const g = this.g;
    if(g.rainbow) return this._rainbowColor(this.t * 0.02, alpha);
    const [r,b_,gr] = g.beamRGB;
    return `rgba(${r},${b_},${gr},${alpha})`;
  }

  drawBeam(){
    const ctx = this.ctx;
    const g = this.g;
    const cw = this.canvas.width;
    const ch = this.canvas.height;
    const cx = cw / 2;
    const t = this.t;

    // 빛기둥 흔들림
    const wobble = Math.sin(t * 0.04) * (g.lv * 0.3);

    // ── 외곽 글로우 (두꺼운 퍼짐) ──
    const glowLayers = g.neon ? 5 : 3;
    for(let i = glowLayers; i >= 1; i--){
      const w = g.beamW * (1 + i * 0.9);
      const alpha = g.neon ? 0.06 + i * 0.01 : 0.04 + i * 0.008;
      const grad = ctx.createLinearGradient(cx, 0, cx, ch);
      grad.addColorStop(0, this._getColor(0));
      grad.addColorStop(0.2, this._getColor(alpha));
      grad.addColorStop(0.7, this._getColor(alpha * 1.4));
      grad.addColorStop(1, this._getColor(alpha * 0.3));
      ctx.save();
      ctx.filter = `blur(${i * 4 + 2}px)`;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.rect(cx - w/2 + wobble * 0.3, 0, w, ch);
      ctx.fill();
      ctx.restore();
    }

    // ── 메인 빛기둥 ──
    const mainGrad = ctx.createLinearGradient(cx, 0, cx, ch);
    if(g.rainbow){
      mainGrad.addColorStop(0, this._rainbowColor(t*0.02, 0));
      mainGrad.addColorStop(0.15, this._rainbowColor(t*0.02+0.3, 0.7));
      mainGrad.addColorStop(0.5, this._rainbowColor(t*0.02+0.6, 0.95));
      mainGrad.addColorStop(0.85, this._rainbowColor(t*0.02+0.9, 0.7));
      mainGrad.addColorStop(1, this._rainbowColor(t*0.02+1.2, 0.1));
    } else {
      const [r,b_,gr] = g.beamRGB;
      mainGrad.addColorStop(0, `rgba(${r},${b_},${gr},0)`);
      mainGrad.addColorStop(0.1, `rgba(${r},${b_},${gr},0.6)`);
      mainGrad.addColorStop(0.5, `rgba(${r},${b_},${gr},1)`);
      mainGrad.addColorStop(0.9, `rgba(${r},${b_},${gr},0.6)`);
      mainGrad.addColorStop(1, `rgba(${r},${b_},${gr},0.1)`);
    }
    ctx.save();
    if(g.neon) ctx.filter = `blur(1px)`;
    ctx.fillStyle = mainGrad;
    ctx.beginPath();
    ctx.rect(cx - g.beamW/2 + wobble, 0, g.beamW, ch);
    ctx.fill();
    ctx.restore();

    // ── 코어 (가장 밝은 중심선) ──
    const coreGrad = ctx.createLinearGradient(cx, 0, cx, ch);
    coreGrad.addColorStop(0, 'rgba(255,255,255,0)');
    coreGrad.addColorStop(0.2, 'rgba(255,255,255,0.5)');
    coreGrad.addColorStop(0.5, 'rgba(255,255,255,0.95)');
    coreGrad.addColorStop(0.8, 'rgba(255,255,255,0.5)');
    coreGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.save();
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.rect(cx - g.coreW/2 + wobble, 0, g.coreW, ch);
    ctx.fill();
    ctx.restore();

    // ── 사이드 타오르는 곡선 (스크린샷 속 불꽃 곡선 효과) ──
    const sideCount = Math.floor(g.sideCount / 2);
    for(let s = 0; s < sideCount; s++){
      const phase = t * 0.05 + s * 0.7;
      const side = s % 2 === 0 ? 1 : -1;
      const baseX = cx + wobble;
      const spread = g.beamW * (0.5 + s * 0.15);
      const amp = g.beamW * (0.3 + Math.sin(phase) * 0.3);
      const alpha = g.neon ? 0.25 - s * 0.04 : 0.15 - s * 0.02;
      if(alpha <= 0) continue;

      ctx.save();
      ctx.strokeStyle = this._getColor(Math.max(0.05, alpha));
      ctx.lineWidth = Math.max(1, g.beamW * 0.12 - s * 0.5);
      if(g.neon) ctx.shadowColor = g.color;
      if(g.neon) ctx.shadowBlur = 8 + g.lv;
      ctx.beginPath();
      const startY = ch * (0.05 + Math.random() * 0.02);
      const endY = ch * (0.92 + Math.random() * 0.05);
      const cp1x = baseX + side * (spread + amp * Math.sin(phase));
      const cp1y = ch * 0.25;
      const cp2x = baseX + side * (spread * 0.6 + amp * Math.cos(phase + 1));
      const cp2y = ch * 0.65;
      ctx.moveTo(baseX + side * g.beamW * 0.3, startY);
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, baseX + side * g.beamW * 0.2, endY);
      ctx.stroke();
      ctx.restore();
    }
  }

  drawParticles(){
    const ctx = this.ctx;
    const g = this.g;
    const cx = this.canvas.width / 2;

    this.particles.forEach((p, i) => {
      p.y += p.vy;
      p.x += p.vx + Math.sin(p.wobble) * 0.5;
      p.wobble += p.wobbleSpeed;
      p.life -= p.decay;

      if(p.life <= 0 || p.y < -10){
        this.particles[i] = this._newParticle(cx, false);
        return;
      }

      const alpha = p.life * (g.neon ? 0.9 : 0.7);
      ctx.save();
      ctx.globalAlpha = alpha;
      if(g.rainbow){
        ctx.fillStyle = this._rainbowColor(this.t * 0.03 + i * 0.1, 1);
      } else {
        const [r,b_,gr] = g.beamRGB;
        ctx.fillStyle = `rgb(${r},${b_},${gr})`;
      }
      if(g.neon){ ctx.shadowColor = g.color; ctx.shadowBlur = p.size * 3; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  drawGround(){
    const ctx = this.ctx;
    const g = this.g;
    const cx = this.canvas.width / 2;
    const ch = this.canvas.height;
    // 하단 바닥 글로우 (빛기둥이 땅에 닿는 효과)
    const radGrad = ctx.createRadialGradient(cx, ch - 10, 0, cx, ch - 10, g.beamW * 2.5);
    radGrad.addColorStop(0, this._getColor(g.neon ? 0.6 : 0.4));
    radGrad.addColorStop(0.5, this._getColor(g.neon ? 0.2 : 0.12));
    radGrad.addColorStop(1, this._getColor(0));
    ctx.save();
    if(g.neon){ ctx.shadowColor = g.color; ctx.shadowBlur = 20; }
    ctx.fillStyle = radGrad;
    ctx.beginPath();
    ctx.ellipse(cx, ch - 10, g.beamW * 2.5, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  drawTop(){
    const ctx = this.ctx;
    const g = this.g;
    const cx = this.canvas.width / 2;
    // 상단 빛 폭발 (빛기둥 꼭대기)
    const radGrad = ctx.createRadialGradient(cx, 8, 0, cx, 8, g.beamW * 2);
    radGrad.addColorStop(0, this._getColor(g.neon ? 0.7 : 0.5));
    radGrad.addColorStop(1, this._getColor(0));
    ctx.save();
    if(g.neon){ ctx.shadowColor = g.color; ctx.shadowBlur = 20; }
    ctx.fillStyle = radGrad;
    ctx.beginPath();
    ctx.ellipse(cx, 8, g.beamW * 2, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  render(){
    const ctx = this.ctx;
    const cw = this.canvas.width;
    const ch = this.canvas.height;
    ctx.clearRect(0, 0, cw, ch);

    this.drawGround();
    this.drawBeam();
    this.drawTop();
    this.drawParticles();

    this.t++;
  }

  start(){
    if(this.running) return;
    this.running = true;
    const loop = () => {
      if(!this.running) return;
      this.render();
      this.raf = requestAnimationFrame(loop);
    };
    loop();
  }

  stop(){
    this.running = false;
    if(this.raf) cancelAnimationFrame(this.raf);
    this.raf = null;
  }

  setGrade(idx){
    this.stop();
    this.g = GRADES[idx] || GRADES[0];
    this._initParticles();
    this.t = 0;
    this.start();
  }
}

let bpRenderer = null;

function openBeamPreview(lvIdx){

function _renderBpFrame(){
  const g = GRADES[bpCurrentIdx];
  document.getElementById('bpLabel').innerHTML =
    `<span style="color:${g.color};font-size:1.2rem;font-weight:900;
      ${g.neon?`text-shadow:0 0 10px ${g.color},0 0 24px ${g.color}`:''}">

    </span>`;

  const canvas = document.getElementById('bpCanvas');
  // canvas 크기를 레벨에 맞게 조정
  const cw = Math.max(160, g.beamW * 5 + 80);
  const ch = Math.max(200, g.beamH + 40);
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = Math.min(cw, 280) + 'px';
  canvas.style.height = Math.min(ch, 340) + 'px';

  // 텍스트
  const neonStyle = g.neon
    ? `text-shadow:0 0 8px ${g.color},0 0 20px ${g.color},0 0 40px ${g.color}`
    : `text-shadow:0 0 6px ${g.color}`;

    <div style="font-size:.72rem;color:var(--text3)">점수 범위 ${g.min}–${g.max}</div>`;

  document.getElementById('bpPrev').disabled = bpCurrentIdx === 0;

  if(!bpRenderer){
    bpRenderer = new BeamRenderer(canvas, bpCurrentIdx);

  } else {
    bpRenderer.canvas = canvas;
    bpRenderer.ctx = canvas.getContext('2d');
    bpRenderer.setGrade(bpCurrentIdx);
  }
}

}

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n){
  if(n>=100000000) return (n/100000000).toFixed(1)+'억';
  if(n>=10000) return (n/10000).toFixed(1)+'만';
  if(n>=1000) return (n/1000).toFixed(1)+'천';
  return String(n);
}
function fmtMoney(n){ return n.toLocaleString('ko-KR')+'원'; }
function hashScore(subs,views,vids){
  let h = (subs*1.1 + views*0.7 + vids*3.3) % 1000;
  return Math.min(99,Math.max(0,Math.floor(h % 100)));
}
function getLvFromScore(sc){ return GRADES.find(g=>sc>=g.min&&sc<=g.max)||GRADES[0]; }
function getLvIdx(g){ return GRADES.indexOf(g); }

/* ══════════════════════════════════════════
   BENCHMARK
══════════════════════════════════════════ */
function buildBenchmark(data){
  const {subs,views,vids} = data;
  const avgVPV = vids>0?Math.round(views/vids):0;
  const engIdx = subs>0?((views/Math.max(vids,1))/subs*100).toFixed(2):'0.00';
  const items=[
    {label:'구독자 수',ch:subs,avg:100000,unit:''},
    {label:'총 조회수',ch:views,avg:5000000,unit:''},
    {label:'영상 개수',ch:vids,avg:150,unit:'개'},
    {label:'영상당 평균 조회',ch:avgVPV,avg:30000,unit:''},
    {label:'참여 지수(%)',ch:parseFloat(engIdx),avg:2.5,unit:'%'},
  ];
  return items.map(b=>{
    const diff=b.avg>0?(((b.ch-b.avg)/b.avg)*100).toFixed(1):'0';
    const isPos=parseFloat(diff)>=0;
    const chW=Math.min(100,Math.round(b.avg>0?(b.ch/b.avg)*100:0));
    return `<div class="bench-card">
      <div class="bench-label">${b.label}</div>
      <div class="bench-val">${b.unit==='%'?b.ch+'%':fmt(b.ch)+(b.unit||'')}</div>
      <div class="bench-avg">업계 평균: ${b.unit==='%'?b.avg+'%':fmt(b.avg)+(b.unit||'')}</div>
      <div class="bench-diff ${isPos?'pos':'neg'}">${isPos?'▲ +':'▼ '}${diff}%</div>
      <div class="bench-bar-wrap"><div class="bench-bar-ch" style="width:${chW}%"></div><div class="bench-bar-avg-line" style="left:100%"></div></div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   PROS / CONS
══════════════════════════════════════════ */
function buildProsCons(data){
  const pros=[], cons=[];
  if(data.subs>=10000) pros.push('구독자 1만명 이상 — 인지도 확보');
  else cons.push('구독자 1만명 미만 — 꾸준한 업로드와 홍보 필요');
  if(data.vids>=50) pros.push('영상 50개 이상 — 채널 볼륨 충분');
  else cons.push('영상 수 부족 — 더 많은 콘텐츠 제작 권장');
  const avgV=data.vids>0?data.views/data.vids:0;
  if(avgV>=10000) pros.push('영상당 평균 조회 1만 이상 — 높은 콘텐츠 완성도');
  else cons.push('영상당 평균 조회 낮음 — 썸네일·제목 최적화 필요');
  if(data.desc&&data.desc.length>=100) pros.push('채널 설명 충분 — SEO 효과 기대 가능');
  else cons.push('채널 설명 짧음 — 키워드 포함 상세 설명 작성 권장');
  if(data.country) pros.push(`지역 설정(${data.country}) 완료 — 현지 알고리즘 유리`);
  else cons.push('지역 설정 없음 — YouTube Studio에서 국가 설정 권장');
  if(data.hashtags>=2) pros.push('해시태그 활용 — 노출 강화');
  else cons.push('해시태그 미흡 — 영상별 3–5개 추가 권장');
  return `<div class="pros-cons-grid">
    <div class="pros-card"><h4>✅ 장점</h4><ul>${pros.map(p=>`<li>${p}</li>`).join('')}</ul></div>
    <div class="cons-card"><h4>⚠️ 개선점</h4><ul>${cons.map(c=>`<li>${c}</li>`).join('')}</ul></div>
  </div>`;
}

const CATS=[
  {id:'0',name:'전체'},{id:'10',name:'음악'},{id:'20',name:'게임'},
  {id:'22',name:'인물/블로그'},{id:'23',name:'코미디'},{id:'24',name:'엔터'},
  {id:'25',name:'뉴스'},{id:'26',name:'스타일'},{id:'27',name:'교육'},{id:'28',name:'과학/기술'},
];
let curCat='0',curType='all',curPage=0;
const PAGE_SIZE=12;
let allVideos=[],filteredVideos=[];

function buildCatList(){
  document.getElementById('catList').innerHTML=CATS.map(c=>`
    <button class="cat-btn ${c.id===curCat?'active':''}" onclick="setCat('${c.id}',this)">${c.name}</button>`).join('');

function setType(t,el){
  curType=t;curPage=0;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}
async function loadHotVideos(){
  const grid=document.getElementById('videoGrid');
  grid.innerHTML='<div class="loading-spinner"><div class="spinner"></div><span>불러오는 중…</span></div>';
  try{
    const catParam=curCat!=='0'?`&videoCategoryId=${curCat}`:'';
    const res=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=50&regionCode=KR${catParam}&key=${getKey()}`);
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    allVideos=data.items||[];
    applyFilter();
  }catch(e){
    grid.innerHTML=`<div class="empty-msg">⚠️ 영상 로드 실패: ${esc(e.message)}</div>`;
  }
}
function isShorts(v){
  const dur=v.contentDetails?.duration||'';
  const m=dur.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return false;
  const mn=parseInt(m[1]||0),s=parseInt(m[2]||0);
  return mn===0&&s<=60;
}
function applyFilter(){
  if(curType==='shorts') filteredVideos=allVideos.filter(v=>isShorts(v));
  else if(curType==='long') filteredVideos=allVideos.filter(v=>!isShorts(v));
  else filteredVideos=[...allVideos];
  curPage=0; renderPage();
}
function formatDuration(dur){
  const m=dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return '';
  const h=parseInt(m[1]||0),mn=parseInt(m[2]||0),s=parseInt(m[3]||0);
  return h>0?`${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${mn}:${String(s).padStart(2,'0')}`;
}
function renderPage(){
  const grid=document.getElementById('videoGrid');
  const total=Math.ceil(filteredVideos.length/PAGE_SIZE)||1;
  const slice=filteredVideos.slice(curPage*PAGE_SIZE,(curPage+1)*PAGE_SIZE);
  document.getElementById('pageInfo').textContent=`${curPage+1} / ${total}`;
  document.getElementById('prevBtn').disabled=curPage===0;
  document.getElementById('nextBtn').disabled=curPage>=total-1;
  if(!slice.length){grid.innerHTML='<div class="empty-msg">해당 조건의 영상이 없습니다</div>';return;}
  grid.innerHTML=slice.map(v=>{
    const s=v.snippet||{},st=v.statistics||{};
    const views=parseInt(st.viewCount||0),likes=parseInt(st.likeCount||0);
    const viral=Math.min(100,Math.round((views/500000)*40+(likes/10000)*60));
    const thumb=s.thumbnails?.medium?.url||'';
    const shorts=isShorts(v);
    const dur=formatDuration(v.contentDetails?.duration||'');
    const vid=esc(v.id),title=esc(s.title||''),ch=esc(s.channelTitle||''),date=esc((s.publishedAt||'').slice(0,10));
    return `<div class="vid-card" onclick="openVidModal('${vid}','${title}','${ch}','${date}')">
      <div class="vid-thumb">
        <img src="${esc(thumb)}" alt="" onerror="this.style.background='#333'">
        ${shorts?'<span class="vid-shorts-badge">Shorts</span>':''}
        ${dur?`<span class="vid-dur">${dur}</span>`:''}
      </div>
      <div class="vid-info">
        <div class="vid-title">${title}</div>
        <div class="vid-meta">${ch} · ${fmt(views)} 조회 · ${date}</div>
        <div class="viral-bar"><div class="viral-fill" style="width:${viral}%"></div></div>
        <div style="font-size:.67rem;color:var(--text3);margin-top:2px">바이럴 지수 ${viral}</div>
      </div>
    </div>`;
  }).join('');
}
function changePage(dir){
  const total=Math.ceil(filteredVideos.length/PAGE_SIZE)||1;
  curPage=Math.max(0,Math.min(total-1,curPage+dir));
  renderPage();
}

/* VIDEO MODAL */
function openVidModal(vid,title,ch,date){
  document.getElementById('vidFrame').src=`https://www.youtube.com/embed/${vid}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3`;
  document.getElementById('vidTitle').textContent=decodeHtml(title);
  document.getElementById('vidMeta').textContent=decodeHtml(ch)+' · '+date;
  document.getElementById('vidModal').classList.add('open');
  try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
}
function closeVidModal(){
  document.getElementById('vidModal').classList.remove('open');
  document.getElementById('vidFrame').src='';
}
function decodeHtml(s){const t=document.createElement('textarea');t.innerHTML=s;return t.value;}
document.getElementById('vidModal').addEventListener('click',function(e){if(e.target===this)closeVidModal();});
function closeModal(id){document.getElementById(id).classList.remove('open');}

/* TOOL MODAL */
function openToolModal(t){
  document.getElementById('tmIcon').src=`https://www.google.com/s2/favicons?domain=${encodeURIComponent(t.url)}&sz=64`;
  document.getElementById('tmName').textContent=t.name;

  tagEl.textContent=t.tag==='free'?'무료':t.tag==='premium'?'프리미엄':'유료';
  tagEl.className=`tool-modal-tag tool-tag ${t.tag}`;
  document.getElementById('tmDesc').textContent=t.desc;
  document.getElementById('tmLink').href=t.url;
  document.getElementById('toolModal').classList.add('open');
}

/* ══════════════════════════════════════════
   REVENUE CALCULATOR
══════════════════════════════════════════ */
const REV_INPUTS=[
  {id:'views',label:'월간 조회수',min:1000,max:10000000,step:10000,val:100000,unit:'회'},
  {id:'rpm',label:'RPM (광고단가)',min:0.5,max:20,step:0.1,val:2.5,unit:'$'},
  {id:'sponsor',label:'협찬 수입(월)',min:0,max:10000000,step:100000,val:0,unit:'원'},
];
let revVals={};
REV_INPUTS.forEach(r=>{ revVals[r.id]=r.val; });
function initRevenue(){
  document.getElementById('revInputsBox').innerHTML=REV_INPUTS.map(r=>`
    <div class="rev-item">
      <label>${r.label}</label>
      <div class="gauge-wrap" id="gw-${r.id}"
           onpointerdown="startGauge(event,'${r.id}')"
           onpointermove="moveGauge(event,'${r.id}')"
           onpointerup="endGauge(event,'${r.id}')"
           onpointercancel="endGauge(event,'${r.id}')">
        <div class="gauge-track"><div class="gauge-fill" id="gf-${r.id}" style="width:${gaugePercent(r.id,r)}%"></div></div>
        <div class="gauge-thumb" id="gt-${r.id}" style="left:${gaugePercent(r.id,r)}%"></div>
      </div>
      <div class="gauge-value" id="gv-${r.id}">${fmtRevVal(r.id,revVals[r.id])}</div>
      <div class="gauge-range"><span>${fmtRevVal(r.id,r.min)}</span><span>${fmtRevVal(r.id,r.max)}</span></div>
    </div>`).join('');
  calcRevenue();
}
const gaugeActive={};
function gaugePercent(id,r){ const ri=r||REV_INPUTS.find(x=>x.id===id); return Math.round(((revVals[id]-ri.min)/(ri.max-ri.min))*100); }
function fmtRevVal(id,v){ if(id==='rpm') return '$'+Number(v).toFixed(2); if(id==='sponsor') return fmtMoney(v); return fmt(v)+'회'; }
function startGauge(e,id){ const el=e.currentTarget; el.setPointerCapture(e.pointerId); gaugeActive[id]=true; updateGaugeFromEvent(e,id); }
function moveGauge(e,id){ if(gaugeActive[id]) updateGaugeFromEvent(e,id); }
function endGauge(e,id){ gaugeActive[id]=false; }
function updateGaugeFromEvent(e,id){
  const ri=REV_INPUTS.find(x=>x.id===id);
  const track=e.currentTarget.querySelector('.gauge-track');
  const rect=track.getBoundingClientRect();
  let pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  let val=ri.min+(ri.max-ri.min)*pct;
  val=Math.round(val/ri.step)*ri.step;
  val=Math.max(ri.min,Math.min(ri.max,val));
  revVals[id]=val;
  const p=Math.round(pct*100);
  document.getElementById('gf-'+id).style.width=p+'%';
  document.getElementById('gt-'+id).style.left=p+'%';
  document.getElementById('gv-'+id).textContent=fmtRevVal(id,val);
  calcRevenue();
}
function calcRevenue(){
  const views=revVals['views']||0, rpm=revVals['rpm']||0, sponsor=revVals['sponsor']||0;
  const adRev=Math.round((views/1000)*rpm*1350);
  const total=adRev+sponsor;
  const annual=total*12;
  document.getElementById('revCards').innerHTML=`
    <div class="rev-card"><div class="rev-card-label">📺 광고 수익 (월)</div><div class="rev-card-val">${fmtMoney(adRev)}</div></div>
    <div class="rev-card"><div class="rev-card-label">🤝 협찬 포함 (월)</div><div class="rev-card-val">${fmtMoney(total)}</div></div>
    <div class="rev-card"><div class="rev-card-label">📅 연간 예상</div><div class="rev-card-val">${fmtMoney(annual)}</div></div>
    <div class="rev-card"><div class="rev-card-label">👁️ 조회당 수익</div><div class="rev-card-val">${views>0?(total/views*100).toFixed(2)+'원':'—'}</div></div>`;
  let tip='';
  if(total<100000) tip='💡 초기 단계입니다. 꾸준한 업로드와 썸네일 최적화로 성장하세요!';
  else if(total<500000) tip='📈 좋은 출발! RPM 높은 카테고리(재테크·IT·교육)로 확장을 고려하세요.';
  else if(total<2000000) tip='🚀 안정적 수익 구조! 멤버십·협찬으로 수익 다각화를 추천합니다.';
  else tip='🏆 훌륭한 채널! 강의·굿즈·컨설팅으로 브랜드를 확장하세요.';
  document.getElementById('revTip').textContent=tip;
}

let popTimer=null;
function showPopupAd(){
  const ov=document.getElementById('popupAd'); ov.classList.add('open');
  let sec=5;
  document.getElementById('popupCountdown').textContent=`${sec}초 후 닫기 가능…`;
  document.getElementById('popupCloseBtn').style.display='none';
  if(popTimer) clearInterval(popTimer);
  popTimer=setInterval(()=>{
    sec--;
    if(sec<=0){ clearInterval(popTimer); document.getElementById('popupCloseBtn').style.display='block'; document.getElementById('popupCountdown').textContent=''; }
    else document.getElementById('popupCountdown').textContent=`${sec}초 후 닫기 가능…`;
  },1000);
  try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
}
function closePopup(){ document.getElementById('popupAd').classList.remove('open'); }
