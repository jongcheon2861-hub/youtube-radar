<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블랙홀 심볼 컨셉</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --void:#04040c;
  --purple:#a855f7;
  --purple-d:#6b21a8;
  --purple-dd:#3b0764;
  --gold:#d4a942;
  --gold-l:#f0c96a;
  --gold-ll:#fff3c4;
  --orange:#f97316;
  --orange-l:#fb923c;
  --rose:#e8a0b0;
  --white:#f0eee8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--void);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:50px;
  padding:60px 20px;
  font-family:'Cinzel',serif;
  overflow-x:hidden;
}

/* 별 배경 */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;}
@keyframes twinkle{0%{opacity:.08;transform:scale(1);}100%{opacity:.85;transform:scale(1.8);}}

/* 컨셉 행 */
.concept-row{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:30px;
}
.concept-label{
  font-size:11px;letter-spacing:3px;
  color:rgba(240,201,106,.5);
  width:80px;text-align:right;
  text-transform:uppercase;
}

/* ════════════════════════════════
   공통 심볼 래퍼
════════════════════════════════ */
.sym{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* ════════════════════════════════
   A. 퍼플 제트 블랙홀
   이미지1 참조: 보라 제트 + 골드 강착원반
════════════════════════════════ */
.sym-a{width:90px;height:90px;}

.a-disk-wrap{
  position:absolute;
  width:110px;height:110px;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotateX(70deg);
  animation:diskSpin 6s linear infinite;
}
@keyframes diskSpin{from{transform:translate(-50%,-50%) rotateX(70deg) rotate(0deg);}to{transform:translate(-50%,-50%) rotateX(70deg) rotate(360deg);}}

.a-disk{
  position:absolute;inset:0;border-radius:50%;
  border:none;
  background:conic-gradient(
    from 0deg,
    rgba(249,115,22,0)   0deg,
    rgba(249,115,22,.9)  40deg,
    rgba(240,201,106,1)  80deg,
    rgba(212,169,66,1)   120deg,
    rgba(251,146,60,.8)  160deg,
    rgba(249,115,22,.4)  200deg,
    rgba(168,85,247,.5)  240deg,
    rgba(107,33,168,.3)  280deg,
    rgba(249,115,22,0)   360deg
  );
  filter:blur(1.5px);
}
.a-disk2{
  position:absolute;inset:8px;border-radius:50%;
  background:conic-gradient(
    from 180deg,
    rgba(240,201,106,.7)  0deg,
    rgba(249,115,22,.9)   60deg,
    rgba(168,85,247,.6)   140deg,
    rgba(240,201,106,.5)  220deg,
    rgba(249,115,22,.8)   300deg,
    rgba(240,201,106,.7)  360deg
  );
  filter:blur(2px);
  animation:diskSpin 4s linear infinite reverse;
}

.a-jet-top{
  position:absolute;
  left:50%;transform:translateX(-50%);
  top:-55px;width:4px;height:52px;
  background:linear-gradient(to top,rgba(168,85,247,1),rgba(200,120,255,.7),rgba(232,160,176,.3),transparent);
  box-shadow:0 0 8px rgba(168,85,247,.8),0 0 16px rgba(168,85,247,.4);
  border-radius:2px;
  animation:jetA 1.6s ease-in-out infinite;
  filter:blur(.5px);
}
.a-jet-bot{
  position:absolute;
  left:50%;transform:translateX(-50%);
  bottom:-55px;width:3px;height:44px;
  background:linear-gradient(to bottom,rgba(168,85,247,.9),rgba(107,33,168,.5),transparent);
  box-shadow:0 0 6px rgba(107,33,168,.6);
  border-radius:2px;
  animation:jetA 1.6s ease-in-out infinite .4s;
  filter:blur(.5px);
}
@keyframes jetA{0%,100%{opacity:.7;transform:translateX(-50%) scaleY(1);}50%{opacity:1;transform:translateX(-50%) scaleY(1.15);}}

.a-core{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:32px;height:32px;border-radius:50%;
  background:radial-gradient(circle,#000 40%,rgba(30,10,60,.95) 70%,transparent 100%);
  box-shadow:
    0 0 0 2px rgba(212,169,66,.5),
    0 0 12px rgba(168,85,247,.9),
    0 0 28px rgba(107,33,168,.7),
    0 0 50px rgba(212,169,66,.25);
  animation:coreA 2s ease-in-out infinite;
  z-index:10;
}
@keyframes coreA{0%,100%{box-shadow:0 0 0 2px rgba(212,169,66,.5),0 0 12px rgba(168,85,247,.9),0 0 28px rgba(107,33,168,.7),0 0 50px rgba(212,169,66,.25);}50%{box-shadow:0 0 0 3px rgba(240,201,106,.8),0 0 20px rgba(168,85,247,1),0 0 45px rgba(107,33,168,1),0 0 80px rgba(212,169,66,.45);}}

/* ════════════════════════════════
   B. 인터스텔라형 강착원반
   이미지2 참조: 수평 원반, 오렌지 라인
════════════════════════════════ */
.sym-b{width:120px;height:60px;}

.b-wrap{
  position:absolute;width:120px;height:120px;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotateX(78deg);
}

.b-ring{
  position:absolute;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:bRingSpin var(--brd) linear infinite;
}
@keyframes bRingSpin{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}

.b-ring:nth-child(1){width:120px;height:120px;border:2.5px solid rgba(249,115,22,.95);box-shadow:0 0 8px rgba(249,115,22,.8),0 0 16px rgba(249,115,22,.4);--brd:3s;}
.b-ring:nth-child(2){width:106px;height:106px;border:2px solid rgba(251,146,60,.85);box-shadow:0 0 6px rgba(251,146,60,.7);--brd:2.4s;animation-direction:reverse;}
.b-ring:nth-child(3){width:92px;height:92px;border:1.5px solid rgba(240,201,106,.75);box-shadow:0 0 6px rgba(240,201,106,.6);--brd:2s;}
.b-ring:nth-child(4){width:78px;height:78px;border:1.2px solid rgba(212,169,66,.6);box-shadow:0 0 5px rgba(212,169,66,.5);--brd:1.6s;animation-direction:reverse;}
.b-ring:nth-child(5){width:64px;height:64px;border:1px solid rgba(249,115,22,.5);box-shadow:0 0 4px rgba(249,115,22,.4);--brd:1.2s;}
.b-ring:nth-child(6){width:50px;height:50px;border:1px solid rgba(168,85,247,.4);box-shadow:0 0 4px rgba(168,85,247,.3);--brd:0.9s;animation-direction:reverse;}

.b-core{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:36px;height:36px;border-radius:50%;
  background:#000;
  box-shadow:0 0 0 2px rgba(249,115,22,.3),0 0 14px rgba(249,115,22,.5),0 0 30px rgba(168,85,247,.4);
  z-index:10;
  animation:bCore 2.5s ease-in-out infinite;
}
@keyframes bCore{0%,100%{box-shadow:0 0 0 2px rgba(249,115,22,.3),0 0 14px rgba(249,115,22,.5),0 0 30px rgba(168,85,247,.4);}50%{box-shadow:0 0 0 3px rgba(249,115,22,.6),0 0 22px rgba(249,115,22,.8),0 0 50px rgba(168,85,247,.6);}}

/* 광자 링 */
.b-photon{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotateX(78deg);
  width:42px;height:42px;border-radius:50%;
  border:1.5px solid rgba(255,243,196,.6);
  box-shadow:0 0 6px rgba(255,243,196,.5),0 0 12px rgba(240,201,106,.3);
  animation:photonPulse 1.5s ease-in-out infinite;
  z-index:9;
}
@keyframes photonPulse{0%,100%{opacity:.6;}50%{opacity:1;}}

/* ════════════════════════════════
   C. 성운 블랙홀
   이미지3 참조: 로즈·보라 성운 + 검은 구체
════════════════════════════════ */
.sym-c{width:90px;height:90px;}

.c-nebula{
  position:absolute;inset:-20px;
  border-radius:50%;
  animation:nebulaSpin 20s linear infinite;
}
@keyframes nebulaSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.c-nebula::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:
    radial-gradient(ellipse 60% 40% at 30% 40%,rgba(232,160,176,.55) 0%,transparent 60%),
    radial-gradient(ellipse 50% 35% at 70% 60%,rgba(168,85,247,.5) 0%,transparent 55%),
    radial-gradient(ellipse 40% 50% at 50% 20%,rgba(107,33,168,.4) 0%,transparent 60%),
    radial-gradient(ellipse 55% 45% at 60% 80%,rgba(196,104,126,.35) 0%,transparent 55%);
  filter:blur(4px);
}

.c-halo{
  position:absolute;inset:2px;border-radius:50%;
  border:2px solid rgba(232,160,176,.35);
  box-shadow:
    0 0 12px rgba(232,160,176,.5),
    0 0 25px rgba(168,85,247,.3),
    inset 0 0 12px rgba(232,160,176,.15);
  animation:haloGlow 2.5s ease-in-out infinite;
}
@keyframes haloGlow{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}

.c-inner-glow{
  position:absolute;inset:12px;border-radius:50%;
  background:radial-gradient(circle,transparent 45%,rgba(232,160,176,.2) 65%,rgba(168,85,247,.15) 80%,transparent 100%);
  animation:innerGlow 3s ease-in-out infinite;
}
@keyframes innerGlow{0%,100%{opacity:.5;}50%{opacity:1;}}

.c-core{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:36px;height:36px;border-radius:50%;
  background:radial-gradient(circle,#000 50%,rgba(20,5,40,.9) 80%,transparent 100%);
  box-shadow:
    0 0 0 3px rgba(232,160,176,.3),
    0 0 14px rgba(232,160,176,.5),
    0 0 30px rgba(168,85,247,.4),
    0 0 55px rgba(107,33,168,.3);
  z-index:10;
  animation:cCore 2.2s ease-in-out infinite;
}
@keyframes cCore{0%,100%{box-shadow:0 0 0 3px rgba(232,160,176,.3),0 0 14px rgba(232,160,176,.5),0 0 30px rgba(168,85,247,.4),0 0 55px rgba(107,33,168,.3);}50%{box-shadow:0 0 0 4px rgba(232,160,176,.6),0 0 22px rgba(232,160,176,.8),0 0 50px rgba(168,85,247,.7),0 0 90px rgba(107,33,168,.5);}}

/* ════════════════════════════════
   D. 레인보우 나선 은하
   이미지4 참조: 블루·옐로·퍼플 나선
════════════════════════════════ */
.sym-d{width:100px;height:100px;}

.d-spiral{
  position:absolute;inset:0;border-radius:50%;
  animation:dSpin 8s linear infinite;
}
@keyframes dSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.d-spiral svg{width:100%;height:100%;}

.d-glow{
  position:absolute;inset:-15px;border-radius:50%;
  background:
    radial-gradient(circle,rgba(59,130,246,.2) 0%,rgba(168,85,247,.15) 40%,rgba(212,169,66,.08) 70%,transparent 100%);
  animation:dGlow 3s ease-in-out infinite;
}
@keyframes dGlow{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.12);}}

.d-core{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle,#000 35%,rgba(59,130,246,.6) 65%,rgba(168,85,247,.4) 85%,transparent 100%);
  box-shadow:
    0 0 0 2px rgba(59,130,246,.5),
    0 0 10px rgba(59,130,246,.7),
    0 0 22px rgba(168,85,247,.5),
    0 0 40px rgba(212,169,66,.2);
  z-index:10;
  animation:dCore 1.8s ease-in-out infinite;
}
@keyframes dCore{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.2);}}

/* ════════════════════════════════
   E. 골드링 블랙홀
   이미지5 참조: 심플 골드 링 + 검은 구체
════════════════════════════════ */
.sym-e{width:100px;height:100px;}

.e-outer-ring{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotateX(20deg);
  width:100px;height:100px;border-radius:50%;
  border:3px solid transparent;
  background:
    linear-gradient(#04040c,#04040c) padding-box,
    conic-gradient(
      from 0deg,
      rgba(212,169,66,0) 0deg,
      rgba(240,201,106,1) 60deg,
      rgba(255,243,196,1) 100deg,
      rgba(240,201,106,.9) 140deg,
      rgba(212,169,66,.5) 200deg,
      rgba(168,85,247,.4) 260deg,
      rgba(212,169,66,.2) 320deg,
      rgba(212,169,66,0) 360deg
    ) border-box;
  box-shadow:0 0 12px rgba(212,169,66,.5),0 0 28px rgba(212,169,66,.25);
  animation:eOuter 4s linear infinite;
}
@keyframes eOuter{from{transform:translate(-50%,-50%) rotateX(20deg) rotate(0deg);}to{transform:translate(-50%,-50%) rotateX(20deg) rotate(360deg);}}

.e-inner-ring{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotateX(20deg);
  width:76px;height:76px;border-radius:50%;
  border:2px solid transparent;
  background:
    linear-gradient(#04040c,#04040c) padding-box,
    conic-gradient(
      from 180deg,
      rgba(249,115,22,0) 0deg,
      rgba(249,115,22,.8) 80deg,
      rgba(240,201,106,.6) 160deg,
      rgba(249,115,22,.3) 240deg,
      rgba(249,115,22,0) 360deg
    ) border-box;
  box-shadow:0 0 8px rgba(249,115,22,.4);
  animation:eInner 3s linear infinite reverse;
}
@keyframes eInner{from{transform:translate(-50%,-50%) rotateX(20deg) rotate(0deg);}to{transform:translate(-50%,-50%) rotateX(20deg) rotate(360deg);}}

.e-shadow-disk{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotateX(20deg);
  width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle,#000 60%,rgba(212,169,66,.15) 100%);
  box-shadow:0 0 20px rgba(0,0,0,.9);
  z-index:5;
}

.e-core{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle,#000 55%,rgba(20,10,5,.95) 80%,transparent 100%);
  box-shadow:
    0 0 0 2px rgba(212,169,66,.35),
    0 0 16px rgba(212,169,66,.4),
    0 0 35px rgba(168,85,247,.3),
    0 0 60px rgba(212,169,66,.12);
  z-index:10;
  animation:eCore 2.8s ease-in-out infinite;
}
@keyframes eCore{0%,100%{box-shadow:0 0 0 2px rgba(212,169,66,.35),0 0 16px rgba(212,169,66,.4),0 0 35px rgba(168,85,247,.3),0 0 60px rgba(212,169,66,.12);}50%{box-shadow:0 0 0 3px rgba(240,201,106,.6),0 0 26px rgba(212,169,66,.7),0 0 55px rgba(168,85,247,.5),0 0 95px rgba(212,169,66,.25);}}

.e-flare-h{
  position:absolute;top:50%;left:0;right:0;
  transform:translateY(-50%);
  height:2px;
  background:linear-gradient(to right,transparent 5%,rgba(240,201,106,.6) 30%,rgba(255,243,196,.8) 50%,rgba(240,201,106,.6) 70%,transparent 95%);
  box-shadow:0 0 6px rgba(240,201,106,.5);
  animation:eFlare 2s ease-in-out infinite;
  z-index:6;
}
@keyframes eFlare{0%,100%{opacity:.6;}50%{opacity:1;}}

/* 레이블 구분선 */
.divider{
  position:relative;z-index:1;
  width:300px;height:1px;
  background:linear-gradient(to right,transparent,rgba(212,169,66,.2),transparent);
}
</style>
</head>
<body>
<div class="bg"></div>
<script>
const bg=document.querySelector('.bg');
for(let i=0;i<70;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+.3;
  const colors=['#f0c96a','#a855f7','#f0eee8','#e8a0b0','#d4a942','#3b82f6'];
  s.style.cssText=`width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*4}s;--delay:${Math.random()*6}s;`;
  bg.appendChild(s);
}
</script>

<!-- A: 퍼플 제트 -->
<div class="concept-row">
  <span class="concept-label">A · JET</span>
  <div class="sym sym-a">
    <div class="a-disk-wrap">
      <div class="a-disk"></div>
      <div class="a-disk2"></div>
    </div>
    <div class="a-jet-top"></div>
    <div class="a-jet-bot"></div>
    <div class="a-core"></div>
  </div>
</div>

<div class="divider"></div>

<!-- B: 인터스텔라 -->
<div class="concept-row">
  <span class="concept-label">B · ORBIT</span>
  <div class="sym sym-b">
    <div class="b-wrap">
      <div class="b-ring"></div>
      <div class="b-ring"></div>
      <div class="b-ring"></div>
      <div class="b-ring"></div>
      <div class="b-ring"></div>
      <div class="b-ring"></div>
    </div>
    <div class="b-photon"></div>
    <div class="b-core"></div>
  </div>
</div>

<div class="divider"></div>

<!-- C: 성운 -->
<div class="concept-row">
  <span class="concept-label">C · NEBULA</span>
  <div class="sym sym-c">
    <div class="c-nebula"></div>
    <div class="c-halo"></div>
    <div class="c-inner-glow"></div>
    <div class="c-core"></div>
  </div>
</div>

<div class="divider"></div>

<!-- D: 레인보우 나선 -->
<div class="concept-row">
  <span class="concept-label">D · SPIRAL</span>
  <div class="sym sym-d">
    <div class="d-glow"></div>
    <div class="d-spiral">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="sg1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity=".9"/>
            <stop offset="40%" stop-color="#a855f7" stop-opacity=".7"/>
            <stop offset="80%" stop-color="#d4a942" stop-opacity=".5"/>
            <stop offset="100%" stop-color="#f97316" stop-opacity=".3"/>
          </radialGradient>
          <filter id="sf1"><feGaussianBlur stdDeviation="1.2"/></filter>
        </defs>
        <!-- 나선팔 1 -->
        <path d="M50,50 Q65,35 75,20 Q82,10 78,5" stroke="url(#sg1)" stroke-width="3" fill="none" filter="url(#sf1)" opacity=".9"/>
        <path d="M50,50 Q35,65 25,80 Q18,90 22,95" stroke="url(#sg1)" stroke-width="3" fill="none" filter="url(#sf1)" opacity=".9"/>
        <!-- 나선팔 2 -->
        <path d="M50,50 Q68,55 82,65 Q90,72 88,80" stroke="#f0c96a" stroke-width="2.5" fill="none" filter="url(#sf1)" opacity=".8"/>
        <path d="M50,50 Q32,45 18,35 Q10,28 12,20" stroke="#f0c96a" stroke-width="2.5" fill="none" filter="url(#sf1)" opacity=".8"/>
        <!-- 나선팔 3 -->
        <path d="M50,50 Q55,68 48,82 Q44,92 38,95" stroke="#a855f7" stroke-width="2" fill="none" filter="url(#sf1)" opacity=".75"/>
        <path d="M50,50 Q45,32 52,18 Q56,8 62,5" stroke="#a855f7" stroke-width="2" fill="none" filter="url(#sf1)" opacity=".75"/>
        <!-- 헤일로 -->
        <circle cx="50" cy="50" r="28" stroke="rgba(240,201,106,.25)" stroke-width="1" fill="none"/>
        <circle cx="50" cy="50" r="20" stroke="rgba(168,85,247,.2)" stroke-width=".8" fill="none"/>
      </svg>
    </div>
    <div class="d-core"></div>
  </div>
</div>

<div class="divider"></div>

<!-- E: 골드링 -->
<div class="concept-row">
  <span class="concept-label">E · GOLD</span>
  <div class="sym sym-e">
    <div class="e-outer-ring"></div>
    <div class="e-inner-ring"></div>
    <div class="e-shadow-disk"></div>
    <div class="e-flare-h"></div>
    <div class="e-core"></div>
  </div>
</div>

</body>
</html>
