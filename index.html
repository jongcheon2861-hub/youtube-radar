<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>YTAnalytics Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--card:#1e1e2e;
  --acc:#6c63ff;--acc2:#ff6584;--acc3:#43e97b;--acc4:#f7971e;
  --txt:#e8e8f0;--txt2:#9999bb;--border:#2a2a3e;
  --header-h:62px;--ad-h:0px;--top-offset:62px;
  --radius:14px;--shadow:0 8px 32px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);padding-top:var(--top-offset);transition:padding-top .3s}

/* ── STICKY TOP AD ── */
#sticky-ad{position:fixed;top:var(--header-h);left:0;right:0;z-index:900;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:5px 12px;transition:transform .3s}
#sticky-ad.hidden{transform:translateY(-110%)}
#sticky-ad ins{display:block;min-height:60px;flex:1;max-width:728px}
#ad-toggle{position:fixed;top:calc(var(--header-h) + var(--ad-h) - 1px);right:6px;z-index:901;background:rgba(108,99,255,.28);color:rgba(255,255,255,.5);border:none;border-radius:0 0 6px 6px;font-size:9px;padding:2px 8px;cursor:pointer;backdrop-filter:blur(4px);transition:background .2s,color .2s}
#ad-toggle:hover{background:rgba(108,99,255,.6);color:#fff}

/* ── HEADER ── */
header{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--header-h);background:linear-gradient(135deg,#0d0d1a,#1a1a2e);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px}
.logo{font-size:19px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.nav-tabs{display:flex;gap:3px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:7px 13px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:500;background:transparent;color:var(--txt2);transition:all .2s;white-space:nowrap}
.nav-tab.active,.nav-tab:hover{background:var(--acc);color:#fff}
.header-credits{background:linear-gradient(135deg,var(--acc4),#f9c220);color:#000;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer}

/* ── LAYOUT ── */
.app{display:flex;min-height:calc(100vh - var(--top-offset))}
aside{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);position:sticky;top:var(--top-offset);height:calc(100vh - var(--top-offset));overflow-y:auto;padding:12px 8px;display:flex;flex-direction:column}
.aside-menu{flex:1}
.aside-ad{padding-top:12px;border-top:1px solid var(--border);margin-top:auto}
.aside-ad-label{font-size:9px;color:var(--txt2);text-align:center;margin-bottom:3px;letter-spacing:.5px}
.aside-ad ins{display:block;width:190px;min-height:180px}
.sidebar-sec{margin-bottom:14px}
.sidebar-sec h4{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;padding:0 8px 8px}
.side-btn{width:100%;padding:8px 11px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:var(--txt2);font-size:13px;text-align:left;transition:all .2s;display:flex;align-items:center;gap:8px}
.side-btn:hover,.side-btn.active{background:var(--acc);color:#fff}
main{flex:1;padding:18px;overflow-x:hidden;min-width:0}
.section{display:none}.section.active{display:block}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin-bottom:14px}
.card>h3{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── 검색창 + 탭 ── */
.hot-search-row{display:flex;gap:8px;margin-bottom:10px}
.search-wrap{display:flex;gap:6px;flex:1}
.search-wrap input{flex:1;padding:9px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--txt);font-size:13px}
.search-wrap input:focus{outline:none;border-color:var(--acc)}
.search-wrap button{padding:9px 17px;border-radius:20px;border:none;background:var(--acc);color:#fff;cursor:pointer;font-size:13px}
.type-tab-row{display:flex;gap:6px;margin-bottom:10px}
.type-tab{padding:6px 16px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap}
.type-tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.type-tab[data-t="short"].active{background:#e00;border-color:#e00}
.type-tab[data-t="long"].active{background:#1a73e8;border-color:#1a73e8}
.cat-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cat-chip{padding:5px 11px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);cursor:pointer;font-size:12px;transition:all .2s}
.cat-chip:hover,.cat-chip.active{background:var(--acc2);color:#fff;border-color:var(--acc2)}

/* ── VIDEO GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:13px}
.vcard{background:var(--bg3);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .2s,box-shadow .2s}
.vcard:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.vcard-thumb{position:relative;padding-top:56.25%;background:#111;overflow:hidden}
.vcard-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.badge{position:absolute;top:6px;left:6px;padding:2px 7px;border-radius:7px;font-size:10px;font-weight:700}
.badge.shorts{background:#e00;color:#fff}
.badge.long{background:#1a73e8;color:#fff}
.dur-badge{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,.75);color:#fff;font-size:10px;padding:1px 5px;border-radius:5px}
.vcard-info{padding:9px}
.vcard-title{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vcard-meta{font-size:10px;color:var(--txt2);display:flex;gap:7px;flex-wrap:wrap}
.viral-bar{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--acc3),var(--acc2));margin-top:7px}
.viral-lbl{font-size:9px;color:var(--txt2);margin-top:2px}

/* ── CHANNEL ANALYZE ── */
.ch-input-row{display:flex;gap:10px;margin-bottom:16px}
.ch-input-row input{flex:1;padding:10px 15px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--txt);font-size:13px}
.btn-primary{padding:10px 22px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:700;cursor:pointer;font-size:13px;transition:opacity .2s;white-space:nowrap}
.btn-primary:hover{opacity:.85}

/* ② 채널분석 인라인 광고 박스 */
.ch-ad-banner{
  width:100%;margin:16px 0;text-align:center;
  background:var(--bg3);border-radius:12px;padding:8px;
  border:1px solid var(--border);
}
.ch-ad-banner ins{display:block;min-height:90px;width:100%}
.ch-ad-banner-label{font-size:9px;color:var(--txt2);margin-bottom:4px;letter-spacing:.5px}

/* 레벨 배지 */
.level-badge-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px 22px;background:var(--bg3);border-radius:20px;border:2px solid var(--border);margin-bottom:18px;position:relative;overflow:hidden}
.level-badge-wrap::before{content:'';position:absolute;inset:0;border-radius:20px;background:radial-gradient(circle at 50% 0%,var(--lc,#6c63ff),transparent 65%);opacity:.12;pointer-events:none}
.level-crown{font-size:54px;line-height:1;margin-bottom:6px;filter:drop-shadow(0 0 18px var(--lc,#6c63ff))}
.level-name{font-size:30px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--lc,#6c63ff),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:3px}
.level-sub{font-size:11px;color:var(--txt2);letter-spacing:.5px;margin-bottom:14px}
.level-score-row{display:flex;align-items:baseline;gap:5px}
.level-score-num{font-size:52px;font-weight:900;color:var(--lc,#6c63ff);line-height:1}
.level-score-max{font-size:17px;color:var(--txt2)}
.level-next-txt{margin-top:10px;font-size:12px;color:var(--txt2);text-align:center}

/* 게이지 */
.gauge-section{margin-bottom:18px}
.gauge-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:12px}
.gauge-header span{color:var(--txt2)}.gauge-header strong{color:var(--txt)}
.gauge-track{height:16px;background:var(--bg3);border-radius:20px;overflow:hidden;border:1px solid var(--border);position:relative}
.gauge-fill{height:100%;border-radius:20px;position:relative;background:linear-gradient(90deg,var(--lc,#6c63ff),var(--lc2,#ff6584));transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.gauge-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:rgba(255,255,255,.5);border-radius:2px}
.gauge-pct{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);white-space:nowrap;pointer-events:none}
.gauge-minmax{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--txt2)}

/* 개선 항목 */
.improve-box{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1px dashed var(--lc,#6c63ff);background:rgba(0,0,0,.25);margin-bottom:16px}
.improve-icon{font-size:28px;flex-shrink:0}
.improve-title{font-size:13px;font-weight:700;margin-bottom:3px}
.improve-desc{font-size:11px;color:var(--txt2);line-height:1.5}
.improve-pts{font-size:11px;margin-top:3px}

/* 레벨 로드맵 */
.level-ladder{display:flex;background:var(--bg3);border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:18px}
.level-step{flex:1;padding:8px 3px;text-align:center;border-right:1px solid var(--border)}
.level-step:last-child{border-right:none}
.level-step.done{background:rgba(67,233,123,.08)}
.level-step.current{background:rgba(108,99,255,.18)}
.level-step-icon{font-size:15px;display:block;margin-bottom:2px}
.level-step-name{font-size:8px;font-weight:700;display:block;margin-bottom:1px}
.level-step-range{font-size:8px;color:var(--txt2);display:block}

/* 점수 항목 */
.score-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.score-item{background:var(--bg3);border-radius:11px;padding:11px;border:1px solid var(--border);transition:border-color .2s}
.score-item:hover{border-color:var(--acc)}
.score-item-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.score-item-nm{font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
.score-item-pt{font-size:12px;font-weight:900}
.score-item-track{height:5px;background:var(--bg2);border-radius:8px;overflow:hidden;margin-bottom:5px}
.score-item-bar{height:100%;border-radius:8px;transition:width 1s .3s}
.score-item-tip{font-size:10px;color:var(--txt2);line-height:1.45}
.score-item-tip b{color:var(--acc4)}

/* 통계 */
.ch-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px;margin-bottom:14px}
.stat-box{background:var(--bg3);border-radius:11px;padding:11px;text-align:center}
.stat-num{font-size:19px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-lbl{font-size:10px;color:var(--txt2);margin-top:3px}

/* 피드백 */
.feedback-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fb-box{background:var(--bg3);border-radius:11px;padding:12px;border-left:3px solid var(--acc)}
.fb-box.warn{border-left-color:var(--acc2)}.fb-box.tip{border-left-color:var(--acc4);grid-column:1/-1}
.fb-box h5{font-size:11px;font-weight:700;margin-bottom:7px}
.fb-box ul{list-style:none;padding:0}
.fb-box ul li{font-size:11px;color:var(--txt2);padding:2px 0;line-height:1.5}
.fb-box ul li::before{content:'• ';color:var(--acc)}
.fb-box.warn ul li::before{color:var(--acc2)}.fb-box.tip ul li::before{color:var(--acc4)}

/* ── TOOLS ── */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:11px}
.tool-card{background:var(--bg3);border-radius:13px;border:1px solid var(--border);padding:13px;transition:transform .2s,box-shadow .2s,border-color .2s;text-decoration:none;color:var(--txt);display:block}
.tool-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--acc)}
.tool-icon{font-size:26px;margin-bottom:7px}
.tool-name{font-size:13px;font-weight:700;margin-bottom:3px}
.tool-desc{font-size:11px;color:var(--txt2);line-height:1.5}
.tool-tag{display:inline-block;padding:2px 7px;border-radius:7px;font-size:10px;font-weight:600;margin-top:5px}
.tag-free{background:rgba(67,233,123,.15);color:var(--acc3)}
.tag-paid{background:rgba(255,101,132,.15);color:var(--acc2)}
.tag-freemium{background:rgba(108,99,255,.15);color:var(--acc)}
.tool-sec-title{font-size:15px;font-weight:800;margin:20px 0 11px;display:flex;align-items:center;gap:9px}
.tool-sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── AI IDEAS ── */
.idea-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border-radius:8px;margin-bottom:5px}
.idea-item span{font-size:12px;flex:1}
.idea-copy{padding:3px 9px;border-radius:7px;border:none;background:var(--acc);color:#fff;font-size:11px;cursor:pointer;flex-shrink:0}

/* ── REVENUE ── */
.calc-row{display:flex;gap:11px;flex-wrap:wrap;margin-bottom:11px}
.calc-row label{font-size:12px;color:var(--txt2);display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.calc-row input[type=range]{width:100%}
.calc-result{background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:12px;padding:18px;text-align:center;margin-top:10px}
.calc-result .cnum{font-size:30px;font-weight:900;color:#fff}
.calc-result .csub{font-size:12px;color:rgba(255,255,255,.75);margin-top:3px}

/* ── MODALS ── */
.modal-blur{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:2000;display:none;align-items:center;justify-content:center}
.modal-blur.show{display:flex}
.modal-box{background:var(--card);border-radius:20px;padding:28px;max-width:390px;width:90%;text-align:center;border:1px solid var(--border)}
.modal-box h2{font-size:19px;margin-bottom:7px}
.modal-box p{color:var(--txt2);font-size:13px;margin-bottom:16px;line-height:1.6}
.circle-wrap{position:relative;width:82px;height:82px;margin:0 auto 13px}
.circle-wrap svg{transform:rotate(-90deg)}
.circle-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--acc)}
.ad-skip-btn{display:block;width:100%;padding:11px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-top:10px;pointer-events:none;opacity:.4;transition:opacity .25s}
.ad-skip-btn.ready{pointer-events:auto;opacity:1}
#search-ad-modal{z-index:2500}

/* ── VIDEO POPUP ── */
.vid-modal{position:fixed;top:var(--top-offset);left:210px;right:0;bottom:0;background:rgba(10,10,15,.96);z-index:800;display:none;align-items:center;justify-content:center;overflow:auto}
.vid-modal.show{display:flex}
.vid-outer{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:780px;padding:20px}
.vid-close-row{display:flex;justify-content:flex-end;width:100%}
.vid-close-btn{background:rgba(255,255,255,.1);color:var(--txt2);border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;transition:background .2s}
.vid-close-btn:hover{background:var(--acc2);color:#fff}
.vid-center{width:100%}
.vid-center iframe{width:100%;aspect-ratio:16/9;border-radius:12px;border:none;display:block}
.vid-title{font-size:13px;font-weight:600;margin-top:8px;color:var(--txt);line-height:1.4;text-align:center}
.vid-bottom-ad{width:100%;margin-top:10px;text-align:center}
.vid-bottom-ad ins{display:inline-block;min-height:90px;width:100%;max-width:728px}

/* ── RESPONSIVE ── */
@media(max-width:900px){aside{display:none}.vid-modal{left:0}}
@media(max-width:600px){.grid{grid-template-columns:1fr 1fr}.tools-grid{grid-template-columns:1fr 1fr}.score-breakdown{grid-template-columns:1fr}.level-ladder{flex-wrap:wrap}.level-step{min-width:25%}.feedback-grid{grid-column:1fr}}
</style>
</head>
<body>

<!-- STICKY TOP AD -->
<div id="sticky-ad">
  <ins class="adsbygoogle" style="display:block;min-height:60px;max-width:728px;width:100%"
    data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="1111111111"
    data-ad-format="horizontal" data-full-width-responsive="true"></ins>
</div>
<button id="ad-toggle" onclick="toggleStickyAd()" title="광고 토글">▲</button>

<!-- HEADER -->
<header>
  <div class="logo">⚡ YT Pro</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showSec('hot')"><i class="fa fa-fire"></i> 인기영상</button>
    <button class="nav-tab" onclick="showSec('analyze')"><i class="fa fa-chart-bar"></i> 채널분석</button>
    <button class="nav-tab" onclick="showSec('ai')"><i class="fa fa-robot"></i> AI아이디어</button>
    <button class="nav-tab" onclick="showSec('tools')"><i class="fa fa-tools"></i> 제작도구</button>
    <button class="nav-tab" onclick="showSec('revenue')"><i class="fa fa-won-sign"></i> 수익계산기</button>
  </div>
  <div class="header-credits" onclick="showSec('analyze')">💎 <span id="credit-display">0</span></div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside>
    <div class="aside-menu">
      <div class="sidebar-sec">
        <h4>메뉴</h4>
        <button class="side-btn active" onclick="showSec('hot')"><i class="fa fa-fire"></i> 인기영상</button>
        <button class="side-btn" onclick="showSec('analyze')"><i class="fa fa-chart-bar"></i> 채널분석</button>
        <button class="side-btn" onclick="showSec('ai')"><i class="fa fa-robot"></i> AI아이디어</button>
        <button class="side-btn" onclick="showSec('tools')"><i class="fa fa-tools"></i> 제작도구</button>
        <button class="side-btn" onclick="showSec('revenue')"><i class="fa fa-calculator"></i> 수익계산기</button>
      </div>
    </div>
    <div class="aside-ad">
      <div class="aside-ad-label">AD</div>
      <ins class="adsbygoogle" style="display:block;width:190px;min-height:180px"
        data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="8888888888"
        data-ad-format="rectangle" data-full-width-responsive="false"></ins>
    </div>
  </aside>

  <main>
    <!-- 인기영상 -->
    <section id="sec-hot" class="section active">
      <div class="card">
        <h3><i class="fa fa-fire" style="color:var(--acc2)"></i> 실시간 인기 영상</h3>
        <div class="hot-search-row">
          <div class="search-wrap">
            <input id="hot-search" type="text" placeholder="🔍 키워드 검색 후 Enter 또는 버튼"
              onkeydown="if(event.key==='Enter')manualSearch()"/>
            <button onclick="manualSearch()"><i class="fa fa-search"></i></button>
          </div>
        </div>
        <div class="type-tab-row">
          <button class="type-tab active" data-t="all"   onclick="setType('all',this)">🔥 전체</button>
          <button class="type-tab"        data-t="short" onclick="setType('short',this)">🩳 쇼츠</button>
          <button class="type-tab"        data-t="long"  onclick="setType('long',this)">🎬 롱폼</button>
        </div>
        <div class="cat-chips" id="cat-chips"></div>

/* ════════════════════════════════════════
   CACHE & API
════════════════════════════════════════ */
const CACHE={
  _s:{},
  key(u){return u.replace(/[&?]key=[^&]*/g,'')},
  get(u){return this._s[this.key(u)]||null},
  set(u,d){this._s[this.key(u)]=d},
};
async function apiCall(ep,params={}){
  const key=CFG.KEYS[CFG.keyIdx%CFG.KEYS.length];
  const qs=new URLSearchParams({...params,key}).toString();
  const url=`https://www.googleapis.com/youtube/v3/${ep}?${qs}`;
  const hit=CACHE.get(url);
  if(hit)return hit;
  const res=await fetch(url);
  if(!res.ok){
    CFG.keyIdx++;
    if(CFG.keyIdx<CFG.KEYS.length*2)return apiCall(ep,params);
    throw new Error('API 할당량 초과. 잠시 후 다시 시도해 주세요.');
  }
  const data=await res.json();
  CACHE.set(url,data);
  return data;
}

/* ════════════════════════════════════════
   DURATION UTILS
════════════════════════════════════════ */
function parseDur(iso){
  if(!iso)return 0;
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return 0;
  return (parseInt(m[1]||0)*3600)+(parseInt(m[2]||0)*60)+parseInt(m[3]||0);
}
function isShorts(v){
  const s=v._sec||0;
  return s<=180||(v.snippet?.title||'').toLowerCase().includes('shorts');
}
function fmtDur(s){
  if(s>=3600)return`${Math.floor(s/3600)}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`;
  return`${Math.floor(s/60)}:${pad(s%60)}`;
}
function pad(n){return String(n).padStart(2,'0');}

/* ════════════════════════════════════════
   ① FETCH — 순수 키워드 쿼리로 API 호출
   ★ q 파라미터에 # 기호 절대 포함하지 않음
   ★ 검색 결과 없을 시 폴백 쿼리 자동 시도
════════════════════════════════════════ */
async function fetchByDur(q,durParam,seen){
  /* 쿼리 정제: # 제거, 앞뒤 공백 제거 */
  const cleanQ=q.replace(/#\S+/g,'').replace(/\s+/g,' ').trim();
  if(!cleanQ)return[];

  const p={
    part:'snippet',
    type:'video',
    maxResults:CFG.MAX_EACH,
    regionCode:CFG.REGION,
    relevanceLanguage:'ko',
    order:'viewCount',
    q:cleanQ,
  };
  if(durParam!=='any')p.videoDuration=durParam;

  let data;
  try{data=await apiCall('search',p);}catch(e){console.error('fetch error',e);return[];}
  if(!data.items?.length)return[];

  const ids=data.items.map(i=>i.id?.videoId).filter(Boolean);
  if(!ids.length)return[];

  let det;
  try{det=await apiCall('videos',{part:'snippet,contentDetails,statistics',id:ids.join(',')});}
  catch(e){return[];}

  return(det.items||[]).filter(v=>{
    if(seen.has(v.id))return false;
    seen.add(v.id);
    v._sec=parseDur(v.contentDetails?.duration);
    return true;
  });
}

/* ════════════════════════════════════════
   LOAD HOT — 주 쿼리 + 보조 쿼리 병합, 바이럴 정렬
════════════════════════════════════════ */
async function loadHot(){
  const grid=document.getElementById('hot-grid');
  grid.innerHTML='<div style="text-align:center;padding:50px;color:var(--txt2)"><i class="fa fa-spinner fa-spin" style="font-size:28px"></i><p style="margin-top:10px">검색 중...</p></div>';

  const q =(CFG.CURRENT_QUERY||'한국 인기 유튜브 바이럴 2025').trim();
  const eq=(CFG.EXTRA_QUERY||'').trim();
  const seen=new Set();
  let items=[];

  if(CFG.TYPE==='all'){
    /* 주 쿼리: 쇼츠 + 롱폼 동시 */
    const[sh,lo]=await Promise.all([fetchByDur(q,'short',seen),fetchByDur(q,'medium',seen)]);
    /* 보조 쿼리로 보강 */
    if(eq){
      const[sh2,lo2]=await Promise.all([fetchByDur(eq,'short',seen),fetchByDur(eq,'medium',seen)]);
      sh.push(...sh2);lo.push(...lo2);
    }
    const mx=Math.max(sh.length,lo.length);
    for(let i=0;i<mx;i++){
      if(i<sh.length)items.push(sh[i]);
      if(i<lo.length)items.push(lo[i]);
    }
  }else if(CFG.TYPE==='short'){
    items=await fetchByDur(q,'short',seen);
    items=items.filter(v=>isShorts(v));
    if(eq&&items.length<10){
      const ex=await fetchByDur(eq,'short',seen);
      items=[...items,...ex.filter(v=>isShorts(v))];
    }
    if(items.length<8){
      const ex2=await fetchByDur(q,'medium',seen);
      items=[...items,...ex2.filter(v=>isShorts(v))];
    }
  }else{
    const[med,lng]=await Promise.all([fetchByDur(q,'medium',seen),fetchByDur(q,'long',seen)]);
    items=[...med,...lng].filter(v=>!isShorts(v));
    if(eq){
      const[m2,l2]=await Promise.all([fetchByDur(eq,'medium',seen),fetchByDur(eq,'long',seen)]);
      items=[...items,...[...m2,...l2].filter(v=>!isShorts(v))];
    }
  }

  if(!items.length){
    grid.innerHTML='<div style="text-align:center;padding:40px;color:var(--txt2)"><i class="fa fa-search" style="font-size:28px"></i><p style="margin-top:10px">검색 결과 없음 — 다른 키워드를 시도해보세요.</p></div>';
    return;
  }

  /* 바이럴 지수(조회수) 높은 순 정렬 */
  items.sort((a,b)=>parseInt(b.statistics?.viewCount||0)-parseInt(a.statistics?.viewCount||0));
  renderGrid(items);
}

/* ════════════════════════════════════════
   RENDER GRID
════════════════════════════════════════ */
function renderGrid(items){
  const wrap=document.getElementById('hot-grid');
  const g=document.createElement('div');g.className='grid';
  const seen=new Set();
  items.forEach(v=>{
    if(seen.has(v.id))return;seen.add(v.id);
    const sh=isShorts(v);
    const views=parseInt(v.statistics?.viewCount||0);
    const viral=Math.min(100,Math.round((Math.log10(views+1)/7)*100));
    const thumb=v.snippet?.thumbnails?.medium?.url||v.snippet?.thumbnails?.default?.url||'';
    const c=document.createElement('div');c.className='vcard';
    c.innerHTML=`
      <div class="vcard-thumb">
        <img src="${thumb}" loading="lazy" onerror="this.style.display='none'">
        <span class="badge ${sh?'shorts':'long'}">${sh?'Shorts':'롱폼'}</span>
        <span class="dur-badge">${fmtDur(v._sec||0)}</span>
      </div>
      <div class="vcard-info">
        <div class="vcard-title">${esc(v.snippet?.title||'')}</div>
        <div class="vcard-meta">
          <span>👁 ${fmt(views)}</span>
          <span>❤️ ${fmt(v.statistics?.likeCount||0)}</span>
          <span>💬 ${fmt(v.statistics?.commentCount||0)}</span>
        </div>
        <div class="viral-bar" style="width:${viral}%"></div>
        <div class="viral-lbl">🔥 바이럴 ${viral}</div>
      </div>`;
    c.onclick=()=>openVid(v.id,v.snippet?.title||'');
    g.appendChild(c);
  });
  wrap.innerHTML='';wrap.appendChild(g);
}

async function startAnalyze(){
  const raw=document.getElementById('ch-input').value.trim();
  if(!raw){toast('채널 정보를 입력하세요','warn');return;}
  if(credits<=0){showAdGate(()=>startAnalyze());return;}
  credits--;saveCredits();
  document.getElementById('ch-result').innerHTML=
    '<div style="text-align:center;padding:30px"><i class="fa fa-spinner fa-spin" style="font-size:24px;color:var(--acc)"></i><p style="margin-top:8px;color:var(--txt2)">채널 분석 중...</p></div>';
  try{
    const chId=await resolveHandle(raw);
    if(!chId)throw new Error('채널을 찾을 수 없습니다. @핸들, URL, 채널명을 다시 확인해 주세요.');
    await doAnalyze(chId);
  }catch(e){
    document.getElementById('ch-result').innerHTML=
      `<div style="color:var(--acc2);padding:14px;background:var(--bg3);border-radius:11px">⚠️ ${e.message}</div>`;
  }
}

async function resolveHandle(raw){
  let h=raw.trim();
  const um=h.match(/youtube\.com\/(?:@|channel\/|c\/|user\/)([^/?&\s]+)/);
  if(um)h=um[1];
  if(/^UC[A-Za-z0-9_-]{20,}$/.test(h))return h;
  const clean=h.replace(/^@/,'');
  const steps=[
    ()=>apiCall('channels',{part:'snippet,statistics',forHandle:'@'+clean}),
    ()=>apiCall('channels',{part:'snippet,statistics',forHandle:clean}),
    ()=>apiCall('channels',{part:'snippet,statistics',forUsername:clean}),
    ()=>apiCall('search',{part:'snippet',type:'channel',q:clean,maxResults:5,regionCode:'KR'}),
    ()=>apiCall('search',{part:'snippet',type:'channel',q:'@'+clean,maxResults:3}),
    ()=>apiCall('search',{part:'snippet',type:'channel',q:clean+' 채널',maxResults:3}),
  ];
  for(let i=0;i<steps.length;i++){
    try{
      const d=await steps[i]();
      if(i<3){if(d.items?.[0])return d.items[0].id;}
      else if(d.items?.length){
        const ex=d.items.find(x=>
          x.snippet?.channelTitle?.toLowerCase()===clean.toLowerCase()||
          (x.snippet?.customUrl||'').replace('@','').toLowerCase()===clean.toLowerCase()
        );
        return(ex||d.items[0]).snippet.channelId;
      }
    }catch(e){}
  }
  return null;
}

/* ════════════════════════════════════════
   FEEDBACK
════════════════════════════════════════ */
function buildFeedback(subs,views,vids,avgV,score){
  const ratio=subs>0?views/subs:0;
  const str=[],warn=[],tip=[];
  if(ratio>30)str.push('조회수/구독자 비율이 매우 높아 알고리즘 노출 활발');
  if(avgV>100000)str.push('평균 조회수 10만+ 콘텐츠 파워 강함');
  if(vids>200)str.push('200개 이상 영상으로 채널 신뢰도 높음');
  if(score>=80)str.push('종합 점수 80+ 최상위 크리에이터');
  if(!str.length){str.push('꾸준한 업로드로 성장 잠재력 보유','초기 채널로 성장 여지 큼');}
  if(ratio<10&&subs>1000)warn.push('조회수/구독자 비율 낮음 — 썸네일·제목 개선 시급');
  if(avgV<5000&&subs>10000)warn.push('구독자 대비 평균 조회수 낮음 — 콘텐츠 기획 재검토');
  if(vids<20)warn.push('영상 수 부족 — 최소 50개 이상 업로드 권장');
  if(score<30)warn.push('전반적 채널 지표 개선 시급 — 장기 전략 수립');
  if(!warn.length){warn.push('현재 큰 문제점 없음','지속적 업로드 유지 권장');}
  if(subs<1000){tip.push('쇼츠로 구독자 1,000명 빠르게 확보','해시태그 3~5개 필수 사용','유사 채널 댓글 활동으로 노출 증대');}
  else if(subs<100000){tip.push('주 2~3회 롱폼+쇼츠 혼합 전략','업로드 후 48시간 조회수 최대화','커뮤니티 게시판 활성화');}
  else{tip.push('브랜드 협찬·스폰서십 유치','멤버십·슈퍼챗 수익화 확대','영어 자막으로 글로벌 진출');}
  return[
    `<div class="fb-box"><h5>✅ 강점</h5><ul>${str.map(s=>`<li>${s}</li>`).join('')}</ul></div>`,
    `<div class="fb-box warn"><h5>⚠️ 개선 필요</h5><ul>${warn.map(s=>`<li>${s}</li>`).join('')}</ul></div>`,
    `<div class="fb-box tip"><h5>💡 성장 전략</h5><ul>${tip.map(s=>`<li>${s}</li>`).join('')}</ul></div>`,
  ].join('');
}

/* ════════════════════════════════════════
   REVENUE
════════════════════════════════════════ */
function calcRev(){
  const v=parseInt(document.getElementById('r-views').value);
  const cpm=parseFloat(document.getElementById('r-cpm').value);
  const ctr=parseFloat(document.getElementById('r-ctr').value);
  document.getElementById('v-val').textContent=v>=1000000?`${(v/1e6).toFixed(1)}백만`:v>=10000?`${(v/10000).toFixed(0)}만`:`${v.toLocaleString()}`;
  document.getElementById('c-val').textContent=`$${cpm}`;
  document.getElementById('t-val').textContent=`${ctr}%`;
  const imp=v*(ctr/100);
  const usd=imp*(cpm/1000)*0.55;
  const krw=usd*1300;
  document.getElementById('calc-out').innerHTML=`
    <div class="cnum">₩${Math.round(krw).toLocaleString()}</div>
    <div class="csub">예상 월 수익 | $${usd.toFixed(0)} USD</div>
    <div style="margin-top:5px;font-size:10px;opacity:.7">광고 노출 수: ${Math.round(imp).toLocaleString()} | YouTube 45% 공제 반영</div>`;
}

/* ════════════════════════════════════════
   UTILS
════════════════════════════════════════ */
function fmt(n){
  n=parseInt(n)||0;
  if(n>=100000000)return(n/1e8).toFixed(1)+'억';
  if(n>=10000)return(n/10000).toFixed(1)+'만';
  if(n>=1000)return(n/1000).toFixed(1)+'천';
  return n.toLocaleString();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type='ok'){
  const t=document.createElement('div');
  t.textContent=msg;
  Object.assign(t.style,{position:'fixed',bottom:'28px',left:'50%',transform:'translateX(-50%)',
    background:type==='warn'?'var(--acc2)':'var(--acc)',color:'#fff',
    padding:'8px 20px',borderRadius:'20px',fontSize:'13px',
    zIndex:'9999',opacity:'1',transition:'opacity .4s',pointerEvents:'none'});
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},1800);
}
