<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YTAnalytics Pro – 유튜브 분석 & 제작도구</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
/* ===================== RESET & BASE ===================== */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#0f0f13;color:#e8e8f0;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;outline:none}
:root{
  --red:#ff3b5c;--blue:#4f8ef7;--green:#22c55e;--gold:#f59e0b;--purple:#a855f7;
  --bg:#0f0f13;--bg2:#18181f;--bg3:#22222e;--bg4:#2a2a38;
  --border:#333345;--text:#e8e8f0;--sub:#888899;
  --hdr:56px;--sticky:60px;--aside:230px;--radius:12px;
  --shadow:0 4px 24px rgba(0,0,0,.45);
}

/* ===================== STICKY TOP AD ===================== */
#sticky-ad{
  position:fixed;top:0;left:0;right:0;z-index:1100;
  background:#111118;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  min-height:var(--sticky);padding:4px 8px;
}
#sticky-ad ins{max-width:728px;width:100%;min-height:50px;display:block}
#ad-toggle{
  position:fixed;top:calc(var(--sticky) - 1px);right:12px;z-index:1101;
  background:rgba(30,30,40,.7);color:var(--sub);font-size:10px;
  padding:2px 8px;border-radius:0 0 6px 6px;border:1px solid var(--border);
  border-top:none;transition:.3s;
}
#ad-toggle:hover{color:var(--text)}

/* ===================== HEADER ===================== */
header{
  position:fixed;top:var(--sticky);left:0;right:0;z-index:1000;
  height:var(--hdr);background:#16161e;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:8px;
}
.logo{font-size:18px;font-weight:900;color:var(--red);margin-right:12px;white-space:nowrap}
.logo span{color:var(--blue)}
.nav-tabs{display:flex;gap:4px;flex:1;overflow-x:auto}
.nav-tab{
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;
  background:transparent;color:var(--sub);transition:.2s;white-space:nowrap;
}
.nav-tab.active,.nav-tab:hover{background:var(--bg4);color:var(--text)}
.nav-tab.active{color:var(--red);font-weight:700}

/* ===================== LAYOUT ===================== */
.app{
  display:flex;
  margin-top:calc(var(--sticky)+var(--hdr));
  min-height:calc(100vh - var(--sticky) - var(--hdr));
}
aside{
  width:var(--aside);min-width:var(--aside);
  background:var(--bg2);border-right:1px solid var(--border);
  position:fixed;top:calc(var(--sticky)+var(--hdr));bottom:0;
  overflow-y:auto;display:flex;flex-direction:column;z-index:900;
}
.aside-menu{padding:12px 8px}
.aside-title{font-size:10px;font-weight:700;color:var(--sub);padding:8px 8px 4px;letter-spacing:.08em;text-transform:uppercase}
.aside-btn{
  width:100%;text-align:left;padding:8px 12px;border-radius:8px;
  font-size:13px;color:var(--sub);background:transparent;transition:.2s;
  display:flex;align-items:center;gap:8px;
}
.aside-btn:hover,.aside-btn.active{background:var(--bg4);color:var(--text)}
.aside-btn.active{color:var(--red);font-weight:700}
.aside-ad{
  margin:auto 8px 12px;border-radius:8px;overflow:hidden;
  background:var(--bg3);border:1px solid var(--border);min-height:160px;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.aside-ad ins{width:100%;min-height:160px;display:block}

main{
  margin-left:var(--aside);flex:1;padding:20px;
  min-height:calc(100vh - var(--sticky) - var(--hdr));
}
.section{display:none}
.section.active{display:block}

/* ===================== SEARCH ROW ===================== */
.search-wrap{margin-bottom:12px}
.search-row{display:flex;gap:8px;align-items:center}
.search-input{
  flex:1;background:var(--bg3);border:1.5px solid var(--border);
  color:var(--text);padding:10px 16px;border-radius:24px;font-size:14px;
  transition:.2s;font-family:inherit;
}
.search-input:focus{outline:none;border-color:var(--blue)}
.search-btn{
  background:var(--red);color:#fff;padding:10px 20px;
  border-radius:24px;font-size:14px;font-weight:700;transition:.2s;
}
.search-btn:hover{filter:brightness(1.15)}
.type-tabs{display:flex;gap:6px;margin-top:8px}
.type-tab{
  padding:5px 16px;border-radius:16px;font-size:12px;font-weight:600;
  background:var(--bg3);color:var(--sub);border:1.5px solid var(--border);transition:.2s;
}
.type-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.type-tab:hover:not(.active){border-color:var(--blue);color:var(--blue)}

/* ===================== VIDEO GRID ===================== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:4px}
.vcard{
  background:var(--bg2);border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);cursor:pointer;transition:.2s;
}
.vcard:hover{transform:translateY(-3px);border-color:var(--blue)}
.vcard-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#000}
.vcard-thumb img{width:100%;height:100%;object-fit:cover;transition:.3s}
.vcard:hover .vcard-thumb img{transform:scale(1.04)}
.badge{
  position:absolute;top:6px;left:6px;padding:2px 8px;border-radius:10px;
  font-size:10px;font-weight:700;
}
.badge.shorts{background:var(--red);color:#fff}
.badge.long{background:var(--blue);color:#fff}
.viral-score{
  position:absolute;top:6px;right:6px;background:rgba(0,0,0,.75);
  color:var(--gold);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;
}
.vcard-info{padding:10px 12px}
.vcard-title{font-size:13px;font-weight:600;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vcard-meta{font-size:11px;color:var(--sub);margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
.load-more-btn{
  display:block;margin:20px auto 0;padding:10px 32px;
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:24px;color:var(--sub);font-size:13px;transition:.2s;
}
.load-more-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ===================== SECTION HEADER ===================== */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sec-hdr h2{font-size:20px;font-weight:800}
.sec-hdr .count-badge{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--sub);font-size:12px;padding:2px 10px;border-radius:12px;
}

/* ===================== CHANNEL ANALYZE ===================== */
.analyze-box{
  background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);
  padding:24px;max-width:820px;margin-bottom:20px;
}
.analyze-input-row{display:flex;gap:8px;margin-bottom:8px}
.analyze-input{
  flex:1;background:var(--bg3);border:1.5px solid var(--border);
  color:var(--text);padding:10px 16px;border-radius:24px;font-size:14px;
  font-family:inherit;transition:.2s;
}
.analyze-input:focus{outline:none;border-color:var(--blue)}
.analyze-btn{
  background:var(--blue);color:#fff;padding:10px 22px;
  border-radius:24px;font-size:14px;font-weight:700;transition:.2s;
}
.analyze-btn:hover{filter:brightness(1.15)}
.analyze-tip{font-size:12px;color:var(--sub);padding:0 4px}

/* Level Badge */
.level-badge-wrap{
  display:flex;flex-direction:column;align-items:center;
  padding:24px 0 16px;
}
.level-icon{font-size:56px;line-height:1;margin-bottom:6px;filter:drop-shadow(0 0 16px currentColor)}
.level-name{font-size:22px;font-weight:900;letter-spacing:.04em}
.level-desc{font-size:12px;color:var(--sub);margin-top:4px;text-align:center}
.level-score-big{font-size:48px;font-weight:900;margin:8px 0 4px}
.level-score-label{font-size:12px;color:var(--sub)}

/* Gauge */
.gauge-wrap{width:100%;max-width:480px;margin:12px auto}
.gauge-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:4px}
.gauge-track{height:12px;background:var(--bg4);border-radius:6px;overflow:hidden;position:relative}
.gauge-fill{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(.4,0,.2,1);width:0}
.gauge-tip{font-size:12px;color:var(--gold);text-align:center;margin-top:8px;font-weight:600}

/* Score cards */
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:16px}
.score-card{
  background:var(--bg3);border-radius:10px;padding:14px;border:1px solid var(--border);transition:.2s;
}
.score-card.weak{border-color:var(--red)}
.score-card-label{font-size:11px;color:var(--sub);margin-bottom:6px}
.score-card-val{font-size:22px;font-weight:800;margin-bottom:6px}
.score-bar-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;width:0;transition:width 1s .3s}
.score-card-tip{font-size:10px;color:var(--sub);margin-top:6px}
.score-card-tip.bad{color:var(--red)}

/* Level ladder */
.level-ladder{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px;justify-content:center}
.ladder-item{
  padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;
  background:var(--bg4);color:var(--sub);border:2px solid transparent;transition:.2s;
}
.ladder-item.current{border-color:currentColor;font-weight:800}
.ladder-item.passed{opacity:.5}

/* Channel stats */
.channel-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:16px}
.stat-card{background:var(--bg3);border-radius:10px;padding:14px;border:1px solid var(--border)}
.stat-label{font-size:11px;color:var(--sub);margin-bottom:4px}
.stat-val{font-size:20px;font-weight:800}
.stat-sub{font-size:11px;color:var(--sub);margin-top:3px}

/* Subscriber rank */
.sub-rank-wrap{
  background:var(--bg3);border-radius:10px;padding:16px;
  border:1px solid var(--border);margin-top:12px;
}
.sub-rank-title{font-size:12px;color:var(--sub);margin-bottom:6px}
.sub-rank-val{font-size:20px;font-weight:800;color:var(--gold)}

/* Feedback */
.feedback-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.fb-item{
  background:var(--bg3);border-radius:8px;padding:12px 14px;
  border-left:3px solid var(--blue);font-size:13px;
}
.fb-item.warn{border-color:var(--gold)}
.fb-item.bad{border-color:var(--red)}
.fb-item.good{border-color:var(--green)}

/* ===================== AI IDEAS ===================== */
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.idea-card{
  background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);
  padding:16px;transition:.2s;
}
.idea-card:hover{border-color:var(--purple)}
.idea-badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.idea-badge{
  padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;
}
.idea-title{font-size:14px;font-weight:700;margin-bottom:6px;line-height:1.4}
.idea-desc{font-size:12px;color:var(--sub);line-height:1.5;margin-bottom:10px}
.idea-copy{
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  padding:5px 14px;border-radius:16px;font-size:12px;font-weight:600;transition:.2s;
}
.idea-copy:hover{border-color:var(--purple);color:var(--purple)}

/* ===================== TOOLS ===================== */
.tools-section-title{
  font-size:16px;font-weight:800;margin:24px 0 10px;
  padding-left:12px;border-left:3px solid var(--blue);
}
.tools-section-title:first-child{margin-top:0}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.tool-card{
  background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);
  padding:14px;display:flex;flex-direction:column;gap:4px;
  transition:.2s;position:relative;
}
.tool-card:hover{border-color:var(--blue);transform:translateY(-2px)}
.tool-icon{font-size:28px}
.tool-name{font-size:14px;font-weight:700}
.tool-desc{font-size:12px;color:var(--sub);line-height:1.4;flex:1}
.tool-tag{
  align-self:flex-start;padding:2px 10px;border-radius:10px;
  font-size:10px;font-weight:700;margin-top:4px;
}
.tag-free{background:rgba(34,197,94,.15);color:var(--green)}
.tag-freemium{background:rgba(79,142,247,.15);color:var(--blue)}
.tag-paid{background:rgba(168,85,247,.15);color:var(--purple)}

/* Tools in-content ad */
.tools-ad-divider{
  margin:28px 0;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px;min-height:100px;
  display:flex;align-items:center;justify-content:center;
}
.tools-ad-divider ins{width:100%;min-height:90px;display:block}

/* ===================== REVENUE CALC ===================== */
.rev-wrap{max-width:560px}
.rev-card{
  background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);
  padding:24px;margin-bottom:16px;
}
.rev-label{font-size:13px;color:var(--sub);margin-bottom:8px;font-weight:600}
.rev-input{
  width:100%;background:var(--bg3);border:1.5px solid var(--border);
  color:var(--text);padding:10px 14px;border-radius:10px;font-size:16px;
  font-family:inherit;font-weight:700;transition:.2s;margin-bottom:4px;
}
.rev-input:focus{outline:none;border-color:var(--blue)}
.rev-range{width:100%;margin:4px 0 8px;accent-color:var(--blue)}
.rev-val{font-size:12px;color:var(--blue);font-weight:700;margin-bottom:12px}
.calc-btn{
  width:100%;padding:12px;background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;border-radius:12px;font-size:15px;font-weight:800;transition:.2s;
}
.calc-btn:hover{filter:brightness(1.1)}
.calc-out{
  background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border);
  padding:20px;text-align:center;margin-top:16px;
}
.calc-out .num{font-size:36px;font-weight:900;color:var(--green)}
.calc-out .sub{font-size:14px;color:var(--sub);margin-top:6px}
.calc-out .detail{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;
}
.calc-out .d-item{background:var(--bg4);border-radius:8px;padding:10px;text-align:center}
.calc-out .d-val{font-size:16px;font-weight:800;color:var(--text)}
.calc-out .d-lbl{font-size:10px;color:var(--sub);margin-top:2px}

/* ===================== VIDEO MODAL ===================== */
#vid-modal{
  display:none;position:fixed;
  top:calc(var(--sticky)+var(--hdr));left:var(--aside);right:0;
  bottom:0;z-index:800;
  background:rgba(10,10,15,.92);
  padding:20px;overflow-y:auto;
}
#vid-modal.open{display:flex;align-items:flex-start;justify-content:center;gap:16px}
.vid-wrap{
  background:var(--bg2);border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);max-width:900px;width:100%;
}
.vid-iframe-wrap{position:relative;aspect-ratio:16/9;width:100%;background:#000}
.vid-iframe-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.vid-info{padding:16px}
.vid-title{font-size:16px;font-weight:700;line-height:1.4;margin-bottom:8px}
.vid-meta{font-size:12px;color:var(--sub);display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.vid-close-btn{
  background:var(--red);color:#fff;padding:8px 20px;
  border-radius:20px;font-size:13px;font-weight:700;transition:.2s;
}
.vid-close-btn:hover{filter:brightness(1.15)}
/* Side ads in video modal */
.vid-side-ads{
  display:flex;flex-direction:column;gap:10px;width:180px;min-width:160px;
}
.vid-side-ad{
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;min-height:250px;display:flex;align-items:center;justify-content:center;
}
.vid-side-ad ins{width:160px;min-height:250px;display:block}

/* ===================== AD GATE MODAL ===================== */
#ad-gate{
  display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(5,5,10,.95);
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#ad-gate.open{display:flex}
#ad-gate ins{max-width:728px;width:100%;min-height:90px;display:block}
.gate-timer{
  font-size:36px;font-weight:900;color:var(--red);
  width:70px;height:70px;border-radius:50%;
  border:4px solid var(--red);display:flex;align-items:center;justify-content:center;
}
.gate-btn{
  background:var(--red);color:#fff;padding:12px 32px;
  border-radius:24px;font-size:15px;font-weight:800;transition:.2s;opacity:.4;pointer-events:none;
}
.gate-btn.ready{opacity:1;pointer-events:auto}
.gate-btn.ready:hover{filter:brightness(1.1)}
.gate-msg{font-size:14px;color:var(--sub)}

/* ===================== INTERSTITIAL ===================== */
#inter-modal{
  display:none;position:fixed;inset:0;z-index:1900;
  background:rgba(5,5,10,.95);
  flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
#inter-modal.open{display:flex}
#inter-modal ins{max-width:728px;width:100%;min-height:90px;display:block}
.inter-timer{font-size:28px;font-weight:900;color:var(--blue)}
.inter-skip{
  background:var(--bg3);color:var(--sub);padding:8px 24px;
  border-radius:20px;font-size:13px;font-weight:700;transition:.2s;opacity:.4;pointer-events:none;
}
.inter-skip.ready{opacity:1;pointer-events:auto;color:var(--blue)}

/* ===================== SEARCH AD MODAL ===================== */
#search-ad-modal{
  display:none;position:fixed;inset:0;z-index:1800;
  background:rgba(5,5,10,.95);
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#search-ad-modal.open{display:flex}
#search-ad-modal ins{max-width:728px;width:100%;min-height:90px;display:block}
.search-ad-timer{
  font-size:34px;font-weight:900;color:var(--blue);
  width:70px;height:70px;border-radius:50%;
  border:4px solid var(--blue);display:flex;align-items:center;justify-content:center;
}
.search-ad-btn{
  background:var(--blue);color:#fff;padding:12px 32px;
  border-radius:24px;font-size:15px;font-weight:800;transition:.2s;opacity:.4;pointer-events:none;
}
.search-ad-btn.ready{opacity:1;pointer-events:auto}
.search-ad-btn.ready:hover{filter:brightness(1.1)}

/* ===================== ANALYZE AD ===================== */
.analyze-ad-row{
  margin:16px 0;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px;
  display:flex;align-items:center;justify-content:center;min-height:100px;
}
.analyze-ad-row ins{width:100%;min-height:90px;display:block;max-width:728px}

/* ===================== TOAST ===================== */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#23232f;color:var(--text);padding:10px 20px;border-radius:24px;
  font-size:13px;z-index:3000;transition:.3s;opacity:0;pointer-events:none;
  border:1px solid var(--border);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===================== SPINNER ===================== */
.spinner{
  width:36px;height:36px;border:3px solid var(--bg4);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .8s linear infinite;margin:40px auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-msg{text-align:center;color:var(--sub);padding:40px 0;font-size:14px}

/* ===================== RESPONSIVE ===================== */
@media(max-width:768px){
  :root{--aside:0px}
  aside{display:none}
  main{margin-left:0;padding:12px}
  #vid-modal{left:0}
  .vid-side-ads{display:none}
}
</style>
</head>
<body>

<!-- ========== STICKY TOP AD ========== -->
<div id="sticky-ad">
  <ins class="adsbygoogle"
       style="display:block;width:100%;max-width:728px;min-height:50px"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="1111111111"
       data-ad-format="horizontal"
       data-full-width-responsive="true"></ins>
</div>
<button id="ad-toggle" onclick="toggleStickyAd()">▲ 숨기기</button>

<!-- ========== HEADER ========== -->
<header>
  <div class="logo">YT<span>Analytics</span></div>
  <div class="nav-tabs">

<script>
/* ============================================================
   CONFIG
============================================================ */
const CFG = {
  KEYS:['AIzaSyAYi9B4vIFjl75uYBS56GbTSMJfV_TLuzE','AIzaSyAOxeRU2ZbMEzskqVvcErs_BAXNQlz2_zs','AIzaSyCEAvGfUpGLZOr3TYLr4WrRd40Pc7e01bE'],
  keyIdx: 0,
  REGION: 'KR',
  MAX_EACH: 25,
  AD_DUR: 15,
  INTER_DUR: 5,
  TYPE: 'all',          // 'all' | 'short' | 'long'
  CURRENT_QUERY: '',
  IS_MANUAL: false,
  LAST_CAT: null,
  PAGE_TOKEN: null,     // for load more
  GATE_SHOWN: false,
};

/* ============================================================
   CATEGORIES  (# 기호 없이 순수 키워드)
============================================================ */
const CATS = [
  { name:'🇰🇷 국뽕', q:'외국인 반응 한국 문화 충격 kpop kdrama 한류 Korean pride', eq:'외국인이 놀란 한국 대한민국 위대한 자랑스러운' },
  { name:'💸 재테크', q:'주식투자 부동산 경제 ETF 재테크 절약 돈버는법', eq:'주식 코인 부동산 투자 재무 경제 자산관리' },
  { name:'✨ 변신', q:'다이어트 성공 살빼기 체중감량 헤어 패션 변신 비포애프터', eq:'운동 헬스 뷰티 스킨케어 메이크업 변화' },
  { name:'😱 충격', q:'충격 반전 경악 놀라운 믿기힘든 실화 사건 사고', eq:'역대급 역사상 최초 세계최고 기네스' },
  { name:'😂 유머', q:'웃긴 개그 코미디 유머 망한 드립 병맛', eq:'짤 밈 meme 숏츠 유머영상 웃음' },
  { name:'🎮 게임', q:'게임 롤 로스트아크 배그 마인크래프트 게임방송', eq:'리뷰 공략 신작게임 e스포츠 스트리머' },
  { name:'🍜 먹방', q:'먹방 맛집 음식 리뷰 mukbang 대식가 도전', eq:'편의점 신메뉴 요리 레시피 맛있는' },
  { name:'🏆 스포츠', q:'스포츠 축구 야구 농구 EPL 손흥민 하이라이트', eq:'선수 경기 스포츠중계 트레이닝 운동선수' },
  { name:'🌏 여행', q:'여행 브이로그 해외여행 유럽여행 일본 동남아 여행일기', eq:'맛집 숙소 여행지 관광 트립' },
  { name:'📚 교육', q:'공부법 유익한 교육 지식 강의 설명 공부', eq:'역사 과학 수학 영어 자기계발 배움' },
];

let catChangeCount = 0;
let interCallback = null;
let searchAdCallback = null;
let gateCallback = null;
let allVideos = []; // all loaded videos for load-more

/* ============================================================
   UTILS
============================================================ */
function fmtNum(n) {
  if (!n) return '0';
  n = parseInt(n);
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
  if (n >= 10000) return (n / 10000).toFixed(1) + '만';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString();
}
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, dur=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function isShorts(v) {
  const dur = v.contentDetails?.duration || '';
  const m = dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return false;
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  return h===0 && min===0 && s<=60;
}
function viralScore(v) {
  const views = parseInt(v.statistics?.viewCount||0);
  const likes = parseInt(v.statistics?.likeCount||0);
  const comments = parseInt(v.statistics?.commentCount||0);
  if (!views) return 0;
  const likeRate = (likes / views) * 100;
  const commentRate = (comments / views) * 100;
  const score = Math.log10(views+1)*20 + likeRate*8 + commentRate*12;
  return Math.min(Math.round(score), 999);
}
function stripHash(q) {
  return (q||'').replace(/#\S+/g, '').trim();
}

/* ============================================================
   API
============================================================ */
const _cache = {};
async function apiCall(ep, params) {
  const key = CFG.KEYS[CFG.keyIdx % CFG.KEYS.length];
  const qs = new URLSearchParams({ ...params, key }).toString();
  const url = `https://www.googleapis.com/youtube/v3/${ep}?${qs}`;
  if (_cache[url]) return _cache[url];
  try {
    const r = await fetch(url);
    if (r.status === 403 || r.status === 429) {
      CFG.keyIdx++;
      return apiCall(ep, params);
    }
    const data = await r.json();
    if (!data.error) _cache[url] = data;
    return data;
  } catch(e) {
    return null;
  }
}

/* ============================================================
   LOAD HOT VIDEOS
============================================================ */
async function fetchByDur(q, durMin, durMax, pageToken) {
  const cleanQ = stripHash(q);
  const params = {
    part: 'id',
    type: 'video',
    q: cleanQ,
    regionCode: CFG.REGION,
    relevanceLanguage: 'ko',
    order: 'viewCount',
    maxResults: 25,
    videoDuration: durMin === 0 && durMax === 60 ? 'short' : 'medium',
  };
  if (durMin === 0 && durMax === 60) params.videoDuration = 'short';
  else if (durMin > 60) params.videoDuration = 'medium';
  if (pageToken) params.pageToken = pageToken;
  const res = await apiCall('search', params);
  return res;
}

async function getVideoDetails(ids) {
  if (!ids.length) return [];
  const res = await apiCall('videos', {
    part: 'snippet,statistics,contentDetails',
    id: ids.join(','),
    regionCode: CFG.REGION,
  });
  return res?.items || [];
}

async function loadHot(append=false) {
  if (!append) {
    document.getElementById('hot-grid').innerHTML = '<div class="spinner"></div>';
    document.getElementById('load-more-btn').style.display = 'none';
    allVideos = [];
  }

  const q = CFG.CURRENT_QUERY || '한국 인기 유튜브 2025';
  const type = CFG.TYPE;

  let ids = [];

  if (type === 'short') {
    const r = await fetchByDur(q, 0, 60);
    ids = (r?.items||[]).map(x=>x.id.videoId).filter(Boolean);
    // extra query if few results
    if (ids.length < 8) {
      const cat = CATS.find(c=>c.q === q || c.name === CFG.LAST_CAT);
      if (cat?.eq) {
        const r2 = await fetchByDur(cat.eq, 0, 60);
        ids = [...new Set([...ids, ...(r2?.items||[]).map(x=>x.id.videoId).filter(Boolean)])];
      }
    }
  } else if (type === 'long') {
    const r = await fetchByDur(q, 61, 9999);
    ids = (r?.items||[]).map(x=>x.id.videoId).filter(Boolean);
    if (ids.length < 8) {
      const cat = CATS.find(c=>c.q === q);
      if (cat?.eq) {
        const r2 = await fetchByDur(cat.eq, 61, 9999);
        ids = [...new Set([...ids, ...(r2?.items||[]).map(x=>x.id.videoId).filter(Boolean)])];
      }
    }
  } else {
    // all: fetch both short and long
    const [rs, rl] = await Promise.all([
      fetchByDur(q, 0, 60),
      fetchByDur(q, 61, 9999),
    ]);
    const shortIds = (rs?.items||[]).map(x=>x.id.videoId).filter(Boolean);
    const longIds  = (rl?.items||[]).map(x=>x.id.videoId).filter(Boolean);
    // interleave
    const maxLen = Math.max(shortIds.length, longIds.length);
    for (let i=0;i<maxLen;i++) {
      if (i < longIds.length)  ids.push(longIds[i]);
      if (i < shortIds.length) ids.push(shortIds[i]);
    }
    ids = [...new Set(ids)];
    // if still few results, try extra query
    if (ids.length < 8) {
      const cat = CATS.find(c=>c.q===q);
      if (cat?.eq) {
        const [rs2, rl2] = await Promise.all([
          fetchByDur(cat.eq, 0, 60),
          fetchByDur(cat.eq, 61, 9999),
        ]);
        const extra = [
          ...(rs2?.items||[]).map(x=>x.id.videoId).filter(Boolean),
          ...(rl2?.items||[]).map(x=>x.id.videoId).filter(Boolean),
        ];
        ids = [...new Set([...ids, ...extra])];
      }
    }
  }

  const videos = await getVideoDetails(ids);

  // Sort by viral score descending
  videos.sort((a,b) => viralScore(b) - viralScore(a));

  if (!append) {
    allVideos = videos;
    document.getElementById('hot-grid').innerHTML = '';
  } else {
    allVideos = [...allVideos, ...videos];
  }

  renderHotGrid(videos);
  document.getElementById('hot-count').textContent = allVideos.length + '개 영상';
  document.getElementById('load-more-btn').style.display = 'block';
}

function renderHotGrid(videos) {
  const grid = document.getElementById('hot-grid');
  if (!videos.length) {
    if (!allVideos.length) {
      grid.innerHTML = '<div class="empty-msg">😢 검색 결과가 없습니다. 다른 키워드를 입력해보세요.</div>';
    }
    return;
  }
  const g = document.createElement('div');
  g.className = 'grid';
  videos.forEach(v => {
    const shorts = isShorts(v);
    const vs = viralScore(v);
    const card = document.createElement('div');
    card.className = 'vcard';
    card.innerHTML = `
      <div class="vcard-thumb">
        <img src="${v.snippet?.thumbnails?.medium?.url||''}" alt="" loading="lazy">
        <span class="badge ${shorts?'shorts':'long'}">${shorts?'Shorts':'롱폼'}</span>
        <span class="viral-score">🔥${vs}</span>
      </div>
      <div class="vcard-info">
        <div class="vcard-title">${esc(v.snippet?.title||'')}</div>
        <div class="vcard-meta">
          <span>👁 ${fmtNum(v.statistics?.viewCount)}</span>
          <span>❤️ ${fmtNum(v.statistics?.likeCount)}</span>
          <span>💬 ${fmtNum(v.statistics?.commentCount)}</span>
        </div>
      </div>`;
    card.onclick = () => openVid(v);
    g.appendChild(card);
  });
  grid.appendChild(g);
}

function loadMore() {
  loadHot(true);
}

/* ============================================================
   SEARCH
============================================================ */
function manualSearch() {
  const q = document.getElementById('hot-search').value.trim();
  if (!q) { toast('검색어를 입력해주세요'); return; }
  CFG.IS_MANUAL = true;
  CFG.LAST_CAT = null;
  // show search ad
  showSearchAd(() => {
    CFG.CURRENT_QUERY = q;
    loadHot();
  });
}

/* ============================================================
   TYPE TABS
============================================================ */
function setType(type, btn) {
  CFG.TYPE = type;
  document.querySelectorAll('.type-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  loadHot();
}

/* ============================================================
   CATEGORIES
============================================================ */
function buildCats() {
  const list = document.getElementById('cat-list');
  list.innerHTML = '';
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'aside-btn';
    btn.textContent = cat.name;
    btn.onclick = () => triggerCat(cat, btn);
    list.appendChild(btn);
  });
}

function triggerCat(cat, btn) {
  catChangeCount++;
  document.querySelectorAll('#cat-list .aside-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (catChangeCount % 5 === 0) {
    showInter(() => applyCat(cat));
  } else {
    applyCat(cat);
  }
}

function applyCat(cat) {
  CFG.CURRENT_QUERY = cat.q;
  CFG.LAST_CAT = cat.name;
  CFG.IS_MANUAL = false;
  showSection('hot');
  loadHot();
}

/* ============================================================
   SHOW SECTION
============================================================ */
function showSection(id) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

const SCORE_LEVELS = [
  { name:'브론즈',  icon:'🥉', min:0,  max:14, color:'#cd7f32', bg:'rgba(205,127,50,.15)' },
  { name:'실버',   icon:'🥈', min:15, max:29, color:'#aaa9ad', bg:'rgba(170,169,173,.15)' },
  { name:'골드',   icon:'🥇', min:30, max:44, color:'#f59e0b', bg:'rgba(245,158,11,.15)' },
  { name:'플래티넘',icon:'💎', min:45, max:59, color:'#38bdf8', bg:'rgba(56,189,248,.15)' },
  { name:'다이아',  icon:'💠', min:60, max:74, color:'#a855f7', bg:'rgba(168,85,247,.15)' },
  { name:'마스터',  icon:'🔮', min:75, max:89, color:'#ec4899', bg:'rgba(236,72,153,.15)' },
  { name:'그랜드마스터',icon:'👑',min:90,max:100,color:'#ff3b5c',bg:'rgba(255,59,92,.15)' },
];

const SUB_RANKS = [
  { name:'나노',  min:0,      max:999,    color:'#888' },
  { name:'마이크로', min:1000, max:9999,   color:'#22c55e' },
  { name:'스몰',  min:10000,  max:49999,  color:'#4f8ef7' },
  { name:'미들',  min:50000,  max:199999, color:'#f59e0b' },
  { name:'라지',  min:200000, max:999999, color:'#a855f7' },
  { name:'메가',  min:1000000,max:4999999,color:'#ec4899' },
  { name:'기가',  min:5000000,max:Infinity,color:'#ff3b5c' },
];

function getScoreLevel(score) {
  return SCORE_LEVELS.find(l=>score>=l.min && score<=l.max) || SCORE_LEVELS[0];
}
function getSubRank(subs) {
  return SUB_RANKS.slice().reverse().find(r=>subs>=r.min) || SUB_RANKS[0];
}

function calcBreakdown(ch) {
  const subs   = parseInt(ch.statistics?.subscriberCount||0);
  const videos = parseInt(ch.statistics?.videoCount||0);
  const total  = parseInt(ch.statistics?.viewCount||0);
  const avgView = videos>0 ? Math.round(total/videos) : 0;

  // 구독자 파워 (max 25pt) – 로그 기반, 더 어렵게
  const subPow = Math.min(Math.log10(subs+1)/7.5*25, 25);
  // 콘텐츠 볼륨 (max 15pt)
  const volPow = Math.min(Math.log10(videos+1)/3.5*15, 15);
  // 평균 조회 파워 (max 25pt)
  const avgPow = Math.min(Math.log10(avgView+1)/6.5*25, 25);
  // 누적 조회 파워 (max 20pt)
  const totPow = Math.min(Math.log10(total+1)/9*20, 20);
  // 참여도 (좋아요/구독자 비율) – API에서 직접 못 가져오므로 구독자 대비 평균조회 사용 (max 15pt)
  const engRate = subs>0 ? Math.min((avgView/subs)*100, 100) : 0;
  const engPow  = Math.min(engRate/100*15, 15);

  const total_score = Math.min(Math.round(subPow+volPow+avgPow+totPow+engPow), 100);

  return {
    total: total_score,
    items: [
      { label:'구독자 파워',   val:Math.round(subPow), max:25, raw:fmtNum(subs)+'명',
        tip: subPow<12 ? '구독자를 늘려야 점수가 오릅니다 (+'+Math.round(12-subPow)+'pt 가능)':'충분합니다',
        bad: subPow<12 },
      { label:'콘텐츠 볼륨',  val:Math.round(volPow), max:15, raw:fmtNum(videos)+'개',
        tip: volPow<8 ? '영상을 더 많이 업로드하세요 (+'+Math.round(8-volPow)+'pt 가능)':'충분합니다',
        bad: volPow<8 },
      { label:'평균 조회 파워', val:Math.round(avgPow), max:25, raw:fmtNum(avgView)+'회',
        tip: avgPow<12 ? '영상 1개당 평균 조회수를 높이세요 (+'+Math.round(12-avgPow)+'pt 가능)':'충분합니다',
        bad: avgPow<12 },
      { label:'누적 조회 파워', val:Math.round(totPow), max:20, raw:fmtNum(total)+'회',
        tip: totPow<10 ? '꾸준한 업로드로 총 조회수를 늘리세요':'충분합니다',
        bad: totPow<10 },
      { label:'참여도 지수',  val:Math.round(engPow),  max:15, raw:engRate.toFixed(1)+'%',
        tip: engPow<7 ? '댓글/좋아요 유도 콘텐츠로 참여도를 높이세요':'충분합니다',
        bad: engPow<7 },
    ]
  };
}

async function startAnalyze() {
  const raw = document.getElementById('ch-input').value.trim();
  if (!raw) { toast('채널명 또는 @핸들을 입력하세요'); return; }
  const result = document.getElementById('analyze-result');
  result.innerHTML = '<div class="spinner"></div>';

  let chId = '';
  // handle @핸들
  if (raw.startsWith('@')) {
    const r = await apiCall('channels', { part:'id,snippet,statistics', forHandle: raw.slice(1) });
    chId = r?.items?.[0]?.id;
    if (chId) return doAnalyze(r.items[0]);
  }
  // search by name
  const sr = await apiCall('search', { part:'snippet', type:'channel', q:raw, maxResults:1 });
  chId = sr?.items?.[0]?.id?.channelId;
  if (!chId) { result.innerHTML='<div class="empty-msg">채널을 찾을 수 없습니다</div>'; return; }
  const cr = await apiCall('channels', { part:'id,snippet,statistics', id:chId });
  if (!cr?.items?.[0]) { result.innerHTML='<div class="empty-msg">데이터를 불러오지 못했습니다</div>'; return; }
  doAnalyze(cr.items[0]);
}

function doAnalyze(ch) {
  const result = document.getElementById('analyze-result');
  const bd = calcBreakdown(ch);
  const lv = getScoreLevel(bd.total);
  const nextLv = SCORE_LEVELS.find(l=>l.min > bd.total);
  const subs = parseInt(ch.statistics?.subscriberCount||0);
  const sr = getSubRank(subs);

  // gauge
  const gaugeMin = lv.min;
  const gaugeMax = lv.max;
  const gaugeRange = Math.max(gaugeMax - gaugeMin, 1);
  const gaugePct = Math.min(Math.round(((bd.total - gaugeMin)/gaugeRange)*100), 100);

  // weakest item
  const weak = [...bd.items].sort((a,b)=>(a.val/a.max)-(b.val/b.max))[0];

  // feedback
  const feedbacks = [];
  bd.items.filter(i=>i.bad).forEach(i=>feedbacks.push({type:'bad',msg:`⚠️ ${i.label}: ${i.tip}`}));
  bd.items.filter(i=>!i.bad).forEach(i=>feedbacks.push({type:'good',msg:`✅ ${i.label}: 양호합니다`}));
  if (subs > 1000000) feedbacks.unshift({type:'good',msg:'🏆 100만 구독자 달성! 탁월한 채널입니다'});
  if (bd.total < 30) feedbacks.push({type:'warn',msg:'💡 성장 초기 단계입니다. 업로드 빈도와 제목 최적화에 집중하세요'});

  result.innerHTML = `
    <!-- 레벨 배지 -->
    <div class="analyze-box" style="border-color:${lv.color};background:${lv.bg}">
      <div class="level-badge-wrap">
        <div class="level-icon" style="color:${lv.color}">${lv.icon}</div>
        <div class="level-name" style="color:${lv.color}">${lv.name}</div>
        <div class="level-score-big" style="color:${lv.color}" id="score-anim">0</div>
        <div class="level-score-label">채널 종합점수 / 100</div>
        ${nextLv ? `<div class="level-desc">다음 등급 <b>${nextLv.name}</b>까지 ${nextLv.min - bd.total}점 필요</div>` : '<div class="level-desc">🏅 최고 등급 달성!</div>'}
      </div>

      <!-- 게이지 -->
      <div class="gauge-wrap">
        <div class="gauge-labels">
          <span>${lv.name} (${lv.min})</span>
          ${nextLv?`<span>${nextLv.name} (${nextLv.min})</span>`:'<span>MAX</span>'}
        </div>
        <div class="gauge-track">
          <div class="gauge-fill" id="gauge-fill" style="background:${lv.color};width:0%"></div>
        </div>
        <div class="gauge-tip">💡 <b>${weak.label}</b>을(를) 개선하면 점수가 가장 많이 오릅니다</div>
      </div>

      <!-- 레벨 사다리 -->
      <div class="level-ladder">
        ${SCORE_LEVELS.map(l=>`
          <div class="ladder-item ${l.min===lv.min?'current':bd.total>l.min?'passed':''}"
               style="color:${l.color}${l.min===lv.min?';border-color:'+l.color:''}">
            ${l.icon} ${l.name}
          </div>`).join('')}
      </div>
    </div>

    <!-- 채널분석 중간 광고 -->
    <div class="analyze-ad-row">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
           data-ad-slot="5555555555"
           data-ad-format="horizontal"
           data-full-width-responsive="true"></ins>
    </div>

    <!-- 점수 세부 항목 -->
    <div class="analyze-box">
      <div class="sec-hdr"><h2>📊 점수 세부 항목</h2></div>
      <div class="score-grid">
        ${bd.items.map(item=>`
          <div class="score-card ${item.bad?'weak':''}">
            <div class="score-card-label">${item.label}</div>
            <div class="score-card-val" style="color:${item.bad?'var(--red)':'var(--text)'}">${item.val} <span style="font-size:13px;color:var(--sub)">/ ${item.max}pt</span></div>
            <div class="score-bar-track"><div class="score-bar-fill" data-pct="${Math.round(item.val/item.max*100)}" style="background:${item.bad?'var(--red)':'var(--blue)'}"></div></div>
            <div class="score-card-tip ${item.bad?'bad':''}">${item.raw} · ${item.tip}</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- 채널분석 하단 광고 -->
    <div class="analyze-ad-row">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
           data-ad-slot="4444444444"
           data-ad-format="horizontal"
           data-full-width-responsive="true"></ins>
    </div>

    <!-- 채널 기본 정보 -->
    <div class="analyze-box">
      <div class="sec-hdr"><h2>📋 채널 기본 정보</h2></div>
      <div class="channel-stats-grid">
        <div class="stat-card"><div class="stat-label">구독자</div><div class="stat-val">${fmtNum(ch.statistics?.subscriberCount)}</div><div class="stat-sub">명</div></div>
        <div class="stat-card"><div class="stat-label">총 영상 수</div><div class="stat-val">${fmtNum(ch.statistics?.videoCount)}</div><div class="stat-sub">개</div></div>
        <div class="stat-card"><div class="stat-label">총 조회수</div><div class="stat-val">${fmtNum(ch.statistics?.viewCount)}</div><div class="stat-sub">회</div></div>
        <div class="stat-card"><div class="stat-label">평균 조회수</div><div class="stat-val">${fmtNum(Math.round(parseInt(ch.statistics?.viewCount||0)/Math.max(parseInt(ch.statistics?.videoCount||1),1)))}</div><div class="stat-sub">회/영상</div></div>
      </div>
      <!-- 구독자 등급 -->
      <div class="sub-rank-wrap">
        <div class="sub-rank-title">구독자 규모 등급</div>
        <div class="sub-rank-val" style="color:${sr.color}">🏷 ${sr.name} 크리에이터 (${sr.min.toLocaleString()}명 이상)</div>
      </div>
    </div>

    <!-- 피드백 -->
    <div class="analyze-box">
      <div class="sec-hdr"><h2>🎯 채널 방향성 피드백</h2></div>
      <div class="feedback-list">
        ${feedbacks.map(f=>`<div class="fb-item ${f.type}">${f.msg}</div>`).join('')}
      </div>
    </div>
  `;

  // Init AdSense in dynamic content
  try {
    document.querySelectorAll('#analyze-result .adsbygoogle').forEach(()=>{
      (adsbygoogle=window.adsbygoogle||[]).push({});
    });
  } catch(e){}

  // Animate score count-up
  let cur=0; const target=bd.total;
  const iv=setInterval(()=>{
    cur=Math.min(cur+2, target);
    const el=document.getElementById('score-anim');
    if(el) el.textContent=cur;
    if(cur>=target) clearInterval(iv);
  },20);

  // Animate gauge
  setTimeout(()=>{
    const gf=document.getElementById('gauge-fill');
    if(gf) gf.style.width=gaugePct+'%';
  },300);

  // Animate score bars
  setTimeout(()=>{
    document.querySelectorAll('.score-bar-fill').forEach(bar=>{
      bar.style.width=(bar.dataset.pct||0)+'%';
    });
  },400);
}

      <button class="idea-copy" onclick="copyIdea('${esc(i.title)}')">📋 제목 복사</button>
    </div>`).join('')}</div>`;
}
function copyIdea(title) {
  navigator.clipboard?.writeText(title).then(()=>toast('✅ 제목이 복사되었습니다'));
}

/* ============================================================
   REVENUE CALCULATOR
============================================================ */
function syncRevRange(type) {
  if (type==='views') {
    document.getElementById('r-views').value = document.getElementById('r-views-range').value;
    document.getElementById('r-views-val').textContent = parseInt(document.getElementById('r-views').value).toLocaleString() + ' 회';
  } else if (type==='cpm') {
    document.getElementById('r-cpm').value = document.getElementById('r-cpm-range').value;
    document.getElementById('r-cpm-val').textContent = '$'+parseFloat(document.getElementById('r-cpm').value).toFixed(2);
  } else {
    document.getElementById('r-ctr').value = document.getElementById('r-ctr-range').value;
    document.getElementById('r-ctr-val').textContent = parseFloat(document.getElementById('r-ctr').value).toFixed(1)+'%';
  }
}
function updateRevRange() {
  document.getElementById('r-views-range').value = document.getElementById('r-views').value;
  document.getElementById('r-cpm-range').value = document.getElementById('r-cpm').value;
  document.getElementById('r-ctr-range').value = document.getElementById('r-ctr').value;
  document.getElementById('r-views-val').textContent = parseInt(document.getElementById('r-views').value||0).toLocaleString()+' 회';
  document.getElementById('r-cpm-val').textContent = '$'+parseFloat(document.getElementById('r-cpm').value||0).toFixed(2);
  document.getElementById('r-ctr-val').textContent = parseFloat(document.getElementById('r-ctr').value||0).toFixed(1)+'%';
}
function calcRev() {
  const views = parseInt(document.getElementById('r-views').value)||0;
  const cpm   = parseFloat(document.getElementById('r-cpm').value)||0;
  const ctr   = parseFloat(document.getElementById('r-ctr').value)||0;
  const imp  = views * (ctr/100);
  const usd  = imp * (cpm/1000) * 0.55;
  const krw  = usd * 1350;
  document.getElementById('calc-out').innerHTML = `
    <div class="calc-out">
      <div class="num">₩${Math.round(krw).toLocaleString()}</div>
      <div class="sub">예상 월 수익 (환율 1350원 기준)</div>
      <div class="detail">
        <div class="d-item"><div class="d-val">$${usd.toFixed(0)}</div><div class="d-lbl">USD 수익</div></div>
        <div class="d-item"><div class="d-val">${Math.round(imp).toLocaleString()}</div><div class="d-lbl">광고 노출 수</div></div>
        <div class="d-item"><div class="d-val">${views.toLocaleString()}</div><div class="d-lbl">총 조회수</div></div>
        <div class="d-item"><div class="d-val">${(usd*0.45).toFixed(0)}$</div><div class="d-lbl">유튜브 수수료 (45%)</div></div>
      </div>
    </div>`;
  // push revenue calc ads
  try {
    document.querySelectorAll('#sec-revenue .adsbygoogle').forEach(ins => {
      if (!ins.getAttribute('data-adsbygoogle-status')) {
        (adsbygoogle=window.adsbygoogle||[]).push({});
      }
    });
  } catch(e){}
}
