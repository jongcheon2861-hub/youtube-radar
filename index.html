<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 레벨 카드 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070f;--card-bg:#12121e;--border:#22223a;--text:#e8e8f0;--sub:#7777aa;--accent:#6c63ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;
  padding:48px 24px 80px;
}

.page-title{
  text-align:center;font-size:2rem;font-weight:900;
  background:linear-gradient(90deg,#6c63ff,#a78bfa,#6c63ff);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:titleSlide 3s linear infinite;
  margin-bottom:8px;
}
@keyframes titleSlide{to{background-position:200% center;}}
.page-sub{text-align:center;color:var(--sub);font-size:.88rem;margin-bottom:48px;}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:80px 40px;
  padding:40px 20px 60px;
  max-width:1400px;
  margin:0 auto;
}

/* ══════════════════════════════════════
   3D CARD SCENE
══════════════════════════════════════ */
.card-scene{
  width:220px; height:308px;
  perspective:800px;
  position:relative;
  cursor:pointer;
  /* 빔 각도 커스텀 프로퍼티 */
  --beam-angle-1:0deg;
  --beam-angle-2:180deg;
  --beam-angle-3:120deg;
  --beam-angle-4:90deg;
}

/* ── 3D 틸트 시 뒤에 나타나는 박스 그림자 ── */
.card-shadow-box{
  position:absolute;
  inset:0;
  border-radius:20px;          /* 카드 라운드와 동일 */
  background:transparent;
  box-shadow:none;
  transition: box-shadow .15s ease, transform .15s ease;
  transform: rotateX(0deg) rotateY(0deg) translateZ(-30px);
  transform-style:preserve-3d;
  z-index:0;
  pointer-events:none;
}
/* 호버 시 JS에서 직접 제어 */

/* ── 빔 래퍼들 (레벨별 개수 조절) ── */
.beam-wrap{
  position:absolute; inset:-5px;
  border-radius:23px;
  z-index:0;
  pointer-events:none;
  animation: beamSpin var(--beam-speed,3s) linear infinite;
  animation-delay: var(--beam-delay,0s);
}
/* 각 빔 원뿔 */
.beam-wrap::before{
  content:'';
  position:absolute; inset:0;
  border-radius:inherit;
  background: conic-gradient(
    from 0deg,
    transparent 0%,
    color-mix(in srgb,var(--cb,#fff) 90%,#fff) 4%,
    rgba(255,255,255,.95) 8%,
    color-mix(in srgb,var(--cb,#fff) 60%,#fff) 12%,
    transparent 18%
  );
  filter:blur(.8px);
}
/* 빔 블러 헤일로 */
.beam-wrap::after{
  content:'';
  position:absolute; inset:-6px;
  border-radius:calc(23px + 6px);
  background: conic-gradient(
    from 0deg,
    transparent 0%,
    var(--cb,#fff) 6%,
    transparent 18%
  );
  filter:blur(16px);
  opacity:.55;
}

@keyframes beamSpin{ from{rotate:0deg;} to{rotate:360deg;} }

/* LV10 무지개 빔 */
.beam-wrap.rainbow::before{
  background: conic-gradient(
    from 0deg,
    #f00 0%,#f80 5%,#ff0 10%,#0f0 15%,#0ff 20%,
    #00f 25%,#f0f 30%,#f00 35%,transparent 42%,transparent 100%
  ) !important;
}
.beam-wrap.rainbow::after{
  background: conic-gradient(
    from 0deg,
    #f00 0%,#f80 5%,#ff0 10%,#0f0 15%,#0ff 20%,
    #00f 25%,#f0f 30%,#f00 35%,transparent 42%,transparent 100%
  ) !important;
}

/* ── 카드 본체 ── */
.card-body{
  position:relative; z-index:1;
  width:100%; height:100%;
  border-radius:18px;
  transform-style:preserve-3d;
  transform:rotateX(0deg) rotateY(0deg) scale(1);
  transition:transform .12s ease, box-shadow .3s ease;
  will-change:transform;
  /* 기본 그림자 - 레벨색 */
  box-shadow:
    0 20px 55px rgba(0,0,0,.6),
    0 0 0 1.5px rgba(255,255,255,.07);
}

/* ── 카드 표면 ── */
.card-face{
  position:absolute; inset:0;
  border-radius:18px; overflow:hidden;
  backface-visibility:hidden;
  background:
    radial-gradient(ellipse 80% 55% at 50% 40%,
      color-mix(in srgb,var(--cb,#6c63ff) 16%,transparent) 0%,
      transparent 70%
    ),
    linear-gradient(160deg,
      color-mix(in srgb,var(--ca,#333) 28%,#0d0d1a) 0%,
      #0d0d1a 55%,
      color-mix(in srgb,var(--ca,#333) 14%,#07070f) 100%
    );
}

/* 홀로그램 줄무늬 */
.card-face::before{
  content:'';
  position:absolute; inset:0; border-radius:18px;
  background:repeating-linear-gradient(
    -45deg,
    transparent 0px,transparent 3px,
    rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px
  );
  pointer-events:none; z-index:1;
}

/* 광택 레이어 */
.card-shine{
  position:absolute; inset:0; border-radius:18px;
  background:radial-gradient(
    ellipse 60% 50% at 50% 35%,
    rgba(255,255,255,.1) 0%,
    rgba(255,255,255,.03) 45%,
    transparent 70%
  );
  pointer-events:none; z-index:5;
  mix-blend-mode:screen;
  transition:background .06s ease;
}

/* ── 상단 컬러 밴드 (shimmer 없음) ── */
.card-top-band{
  position:absolute; top:0; left:0; right:0; height:44%;
  border-radius:18px 18px 0 0;
  z-index:2; pointer-events:none;
  background:linear-gradient(180deg,
    color-mix(in srgb,var(--cb,#fff) var(--band-op,20%),transparent) 0%,
    transparent 100%
  );
}

/* ── 하단 컬러 밴드 (shimmer 없음) ── */
.card-bot-band{
  position:absolute; bottom:0; left:0; right:0; height:40%;
  border-radius:0 0 18px 18px;
  z-index:2; pointer-events:none;
  background:linear-gradient(0deg,
    color-mix(in srgb,var(--cb,#fff) var(--band-op,20%),transparent) 0%,
    transparent 100%
  );
}

/* ── 헤더 ── */
.card-header{
  position:absolute; top:0; left:0; right:0;
  padding:13px 14px 0;
  display:flex; justify-content:space-between; align-items:flex-start;
  z-index:10;
}
.card-stars{display:flex;gap:2px;}
.card-star{
  color:#ffd700; font-size:13px;
  text-shadow:0 0 5px rgba(255,215,0,.85),0 0 14px rgba(255,215,0,.45);
  animation:starTwinkle var(--st-dur,3s) ease-in-out infinite;
  animation-delay:var(--st-del,0s);
}
@keyframes starTwinkle{
  0%,100%{opacity:.55;transform:scale(.88);}
  50%{opacity:1;transform:scale(1.15);}
}
.card-badge{
  color:#fff; padding:4px 11px; border-radius:8px;
  font-size:10px; font-weight:900; letter-spacing:.09em;
  box-shadow:0 2px 10px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18);
  background:linear-gradient(135deg,var(--ca,#555) 0%,var(--cb,#888) 100%);
  border:1px solid rgba(255,255,255,.13);
}

/* ── 보케 ── */
.card-bokeh{
  position:absolute; inset:0;
  z-index:3; pointer-events:none; overflow:hidden; border-radius:18px;
}
.bokeh-dot{
  position:absolute; border-radius:50%;
  background:radial-gradient(circle,
    color-mix(in srgb,var(--cb,#fff) 65%,#fff) 0%,transparent 70%
  );
  filter:blur(var(--bblur,5px));
  opacity:var(--bop,.35);
  animation:bokehDrift var(--bdur,7s) ease-in-out infinite;
  animation-delay:var(--bdel,0s);
}
@keyframes bokehDrift{
  0%,100%{transform:translate(0,0) scale(1);}
  25%{transform:translate(7px,-9px) scale(1.12);}
  50%{transform:translate(-6px,7px) scale(.91);}
  75%{transform:translate(9px,4px) scale(1.06);}
}

/* ── 스파클 ── */
.card-sparkles{
  position:absolute; inset:0;
  z-index:4; pointer-events:none; overflow:hidden; border-radius:18px;
}
.sparkle-dot{
  position:absolute;
  color:#ffd700; font-size:var(--ssz,11px);
  text-shadow:0 0 6px rgba(255,215,0,.9),0 0 16px rgba(255,215,0,.5);
  animation:sparklePop var(--sdur,2.2s) ease-in-out infinite;
  animation-delay:var(--sdel,0s);
}
@keyframes sparklePop{
  0%,100%{opacity:.08;transform:scale(.45) rotate(-12deg);}
  40%{opacity:1;transform:scale(1.25) rotate(12deg);}
  65%{opacity:.75;transform:scale(1.05) rotate(5deg);}
}

/* ── 메인 아이콘 ── */
.card-icon-wrap{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-54%);
  z-index:8;
  display:flex; flex-direction:column; align-items:center; gap:9px;
}
.card-main-icon{
  font-size:3.5rem;
  filter:
    drop-shadow(0 0 14px var(--cb,#fff))
    drop-shadow(0 0 30px color-mix(in srgb,var(--cb,#fff) 55%,transparent))
    drop-shadow(0 5px 18px rgba(0,0,0,.55));
  animation:iconHover 3.5s ease-in-out infinite;
  will-change:transform;
}
@keyframes iconHover{
  0%,100%{transform:translateY(0) rotateY(0deg);}
  30%{transform:translateY(-7px) rotateY(9deg);}
  70%{transform:translateY(-3px) rotateY(-6deg);}
}

/* ── 이름 ── */
.card-main-name{
  font-size:1.06rem; font-weight:900;
  color:var(--cb,#fff);
  text-shadow:
    0 0 14px var(--cb,#fff),
    0 0 32px color-mix(in srgb,var(--cb,#fff) 58%,transparent),
    0 2px 8px rgba(0,0,0,.65);
  letter-spacing:.06em;
}

/* ── 비네트 ── */
.card-vignette{
  position:absolute; inset:0; z-index:6; pointer-events:none;
  border-radius:18px;
  background:radial-gradient(ellipse at center,transparent 28%,rgba(4,4,12,.62) 100%);
}

/* ── 푸터 ── */
.card-footer{
  position:absolute; bottom:0; left:0; right:0;
  padding:11px 14px;
  display:flex; justify-content:space-between; align-items:center;
  z-index:10; border-radius:0 0 18px 18px;
  /* 레벨 색상과 동일한 컬러로 */
  background:linear-gradient(135deg,
    color-mix(in srgb,var(--ca,#222) 88%,#000) 0%,
    color-mix(in srgb,var(--ca,#222) 65%,#000) 100%
  );
  border-top:1px solid color-mix(in srgb,var(--cb,#fff) 20%,transparent);
}
.footer-lv{
  color:var(--cb,#fff); font-size:10px; font-weight:900;
  background:rgba(0,0,0,.32); padding:3px 9px; border-radius:6px;
  letter-spacing:.07em;
  border:1px solid color-mix(in srgb,var(--cb,#fff) 35%,transparent);
}
.footer-name{
  color:var(--cb,#fff); font-size:13px; font-weight:800;
  text-shadow:0 0 10px var(--cb,#fff),0 2px 5px rgba(0,0,0,.5);
}
.footer-subs{color:color-mix(in srgb,var(--cb,#fff) 65%,transparent); font-size:10px;}

/* ── LV별 기본 글로우 ── */
.card-scene[data-lv="6"]  .card-body{box-shadow:0 24px 62px rgba(0,0,0,.65),0 0 28px color-mix(in srgb,var(--cb) 28%,transparent);}
.card-scene[data-lv="7"]  .card-body{box-shadow:0 27px 68px rgba(0,0,0,.68),0 0 38px color-mix(in srgb,var(--cb) 36%,transparent);}
.card-scene[data-lv="8"]  .card-body{box-shadow:0 30px 75px rgba(0,0,0,.72),0 0 52px color-mix(in srgb,var(--cb) 46%,transparent);}
.card-scene[data-lv="9"]  .card-body{box-shadow:0 34px 85px rgba(0,0,0,.76),0 0 68px color-mix(in srgb,var(--cb) 58%,transparent);}
.card-scene[data-lv="10"] .card-body{
  box-shadow:
    0 38px 95px rgba(0,0,0,.82),
    0 0 75px rgba(255,80,180,.48),
    0 0 120px rgba(80,200,255,.32),
    0 0 0 1px rgba(255,255,255,.14);
}

/* LV9 이름 펄스 */
.card-scene[data-lv="9"] .card-main-name{
  animation:namePulse9 2s ease-in-out infinite alternate;
}
@keyframes namePulse9{
  from{text-shadow:0 0 12px var(--cb),0 0 24px var(--cb);}
  to  {text-shadow:0 0 22px var(--cb),0 0 55px var(--cb),0 0 90px color-mix(in srgb,var(--cb) 50%,transparent);}
}

/* LV10 무지개 이름 */
.card-scene[data-lv="10"] .card-main-name{
  background:linear-gradient(90deg,#f00,#f80,#ff0,#0f0,#0ff,#00f,#f0f,#f00);
  background-size:200%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:rainbowSlide 1.8s linear infinite;
}
.card-scene[data-lv="10"] .card-main-icon{
  animation:iconHover 3.5s ease-in-out infinite,iconGlow10 1.6s ease-in-out infinite alternate;
}
@keyframes iconGlow10{
  from{filter:drop-shadow(0 0 14px #ff0080) drop-shadow(0 0 30px #00ffff);}
  to  {filter:drop-shadow(0 0 28px #ffff00) drop-shadow(0 0 58px #ff0080) drop-shadow(0 0 85px #00ffff);}
}
@keyframes rainbowSlide{to{background-position:200% center;}}
</style>

/* ════════════════════════════
   빔 래퍼 생성
   count개의 빔을 균등 간격으로 배치
════════════════════════════ */
function buildBeams(g){
  const count  = g.beamCount;
  const speed  = g.beamSpeed;
  const isRainbow = g.lv === 10;
  const cls    = isRainbow ? 'beam-wrap rainbow' : 'beam-wrap';
  let html = '';
  for(let i = 0; i < count; i++){
    /* 각 빔은 360/count 씩 초기 오프셋 */
    const offsetDeg = (360 / count) * i;
    /* animation-delay로 위상 분리 */
    const delayS = -((parseFloat(speed) / count) * i).toFixed(3) + 's';
    html += `<div class="${cls}" style="
      --beam-speed:${speed};
      animation-duration:${speed};
      animation-delay:${delayS};
    "></div>`;
  }
  return html;
}

/* ════════════════════════════
   카드 HTML 빌더
════════════════════════════ */
function buildCardHTML(g){
  const stars = Array.from({length:5},(_,i)=>
    `<span class="card-star"
      style="opacity:${i<g.stars?1:.16};--st-dur:${2+i*.45}s;--st-del:${i*.22}s"
    >&starf;</span>`
  ).join('');

  const bokeh = g.bokeh.map((b,i)=>
    `<div class="bokeh-dot" style="
      width:${b.w}px;height:${b.h}px;
      left:${b.l}%;top:${b.t}%;
      --bblur:${b.blur}px;--bop:${b.op};
      --bdur:${5.5+i*1.4}s;--bdel:${i*.65}s;
    "></div>`
  ).join('');

  const sparkles = g.sparkles.map(s=>
    `<span class="sparkle-dot" style="
      left:${s.l}%;top:${s.t}%;
      --ssz:${9+Math.min(g.lv,5)}px;
      --sdur:${s.sd};--sdel:${s.sl};
    ">✦</span>`
  ).join('');

  const isRainbow = g.lv === 10;
  const badgeStyle = isRainbow
    ? 'background:linear-gradient(135deg,#f00,#f80,#ff0,#0f0,#0ff,#00f,#f0f);border-color:rgba(255,255,255,.3);'
    : '';
  const outerStyle = isRainbow
    ? 'background:linear-gradient(135deg,#f00 0%,#f80 20%,#ff0 40%,#0f0 60%,#0ff 80%,#00f 100%);'
    : `background:linear-gradient(135deg,${g.ca} 0%,${g.cb} 50%,${g.cc} 100%);`;

  return `
<div class="card-scene" data-lv="${g.lv}"
  style="--ca:${g.ca};--cb:${g.cb};--cc:${g.cc};--band-op:${g.bandOp}%;${outerStyle}"
  onmousemove="card3D(event,this)"
  onmouseleave="cardReset(this)">

  <!-- 뒤 사각 그림자 박스 -->
  <div class="card-shadow-box" id="sb-${g.lv}"></div>

  <!-- 회전 빔들 -->
  ${buildBeams(g)}

  <!-- 카드 본체 -->
  <div class="card-body">
    <div class="card-face">
      <div class="card-bokeh">${bokeh}</div>
      <div class="card-sparkles">${sparkles}</div>

      <div class="card-header">
        <div class="card-stars">${stars}</div>
        <div class="card-badge" style="${badgeStyle}">${g.badge}</div>
      </div>

      <div class="card-icon-wrap">
        <div class="card-main-icon">${g.icon}</div>
        <div class="card-main-name">${g.name}</div>
      </div>

      <div class="card-top-band"></div>
      <div class="card-bot-band"></div>
      <div class="card-vignette"></div>
      <div class="card-shine"></div>

      <div class="card-footer">
        <div class="footer-lv">LV.${g.lv}</div>
        <div class="footer-name">${g.name}</div>
        <div class="footer-subs">${g.subs}</div>
      </div>
    </div>
  </div>
</div>`;
}

/* ════════════════════════════
   3D 마우스 틸트
════════════════════════════ */
function card3D(e, el){
  const r   = el.getBoundingClientRect();
  const x   = e.clientX - r.left;
  const y   = e.clientY - r.top;
  const cx  = r.width  / 2;
  const cy  = r.height / 2;
  const MAX = 20;

  const ry  =  ((x - cx) / cx) * MAX;
  const rx  = -((y - cy) / cy) * MAX;
  const mx  = (x / r.width  * 100).toFixed(1) + '%';
  const my  = (y / r.height * 100).toFixed(1) + '%';

  const body   = el.querySelector('.card-body');
  const face   = el.querySelector('.card-face');
  const shine  = el.querySelector('.card-shine');
  const shadow = el.querySelector('.card-shadow-box');

  /* 카드 틸트 */
  body.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) scale(1.04) translateZ(0)`;

  /* ── 뒤 박스: 틸트 방향 반대로 밀어서 입체감 ── */
  const pushX = ry * 1.6;   /* 좌우 오프셋 */
  const pushY = -rx * 1.2;  /* 상하 오프셋 */

  /* CSS 변수로 색상 가져오기 */
  const cb = getComputedStyle(el).getPropertyValue('--cb').trim() || '#ffffff';

  shadow.style.transform  = `translateX(${pushX}px) translateY(${pushY}px) translateZ(-40px)`;
  shadow.style.boxShadow  = `
    0 0 0 2px ${cb}22,
    0 0 30px 6px ${cb}44,
    0 0 60px 10px ${cb}22,
    ${pushX*.4}px ${pushY*.4}px 80px 20px ${cb}33
  `;
  shadow.style.borderRadius = '20px';

  /* 광택 */
  shine.style.background = `radial-gradient(
    ellipse 55% 45% at ${mx} ${my},
    rgba(255,255,255,.2) 0%,
    rgba(255,255,255,.06) 45%,
    transparent 70%
  )`;

  /* face 내 광원 */
  face.style.background = `
    radial-gradient(ellipse 78% 58% at ${mx} ${my},
      color-mix(in srgb,var(--cb) 24%,transparent) 0%,
      transparent 68%
    ),
    linear-gradient(160deg,
      color-mix(in srgb,var(--ca) 30%,#0d0d1a) 0%,
      #0d0d1a 55%,
      color-mix(in srgb,var(--ca) 14%,#07070f) 100%
    )
  `;
}

function cardReset(el){
  const body   = el.querySelector('.card-body');
  const face   = el.querySelector('.card-face');
  const shine  = el.querySelector('.card-shine');
  const shadow = el.querySelector('.card-shadow-box');

  body.style.transform   = 'rotateX(0deg) rotateY(0deg) scale(1) translateZ(0)';
  shadow.style.transform = 'translateX(0) translateY(0) translateZ(-40px)';
  shadow.style.boxShadow = 'none';

  shine.style.background = `radial-gradient(
    ellipse 60% 50% at 50% 35%,
    rgba(255,255,255,.1) 0%,
    rgba(255,255,255,.03) 45%,
    transparent 70%
  )`;
  face.style.background = '';
}
