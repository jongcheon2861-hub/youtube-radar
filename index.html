<!-- ① HEAD 안에 추가할 CSS -->
<style>
/* ══════════════════════════════════════
   3D CARD SYSTEM
══════════════════════════════════════ */

.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:60px 40px;
  padding:40px 0 60px;
}

/* 씬 – perspective 컨테이너 */
.card-scene{
  width:220px; height:308px;
  perspective:800px;
  position:relative;
  cursor:pointer;
  --rx:0deg; --ry:0deg; --mx:50%; --my:50%;
}

/* ── 바깥 글로우 링 (회전 빔) ── */
.card-scene::before{
  content:'';
  position:absolute; inset:-4px;
  border-radius:22px;
  background: conic-gradient(
    from var(--beam-angle,0deg),
    transparent 0%,
    color-mix(in srgb,var(--cb,#fff) 90%,#fff) 5%,
    rgba(255,255,255,.95) 9%,
    color-mix(in srgb,var(--cb,#fff) 60%,#fff) 13%,
    transparent 20%
  );
  animation: beamSpin var(--beam-speed,3s) linear infinite;
  filter: blur(1px);
  z-index:0;
  transform: rotateX(var(--rx)) rotateY(var(--ry));
  transition: transform .08s ease;
}
/* 빔 블러 헤일로 */
.card-scene::after{
  content:'';
  position:absolute; inset:-8px;
  border-radius:26px;
  background: conic-gradient(
    from var(--beam-angle,0deg),
    transparent 0%,
    var(--cb,#fff) 7%,
    transparent 20%
  );
  animation: beamSpin var(--beam-speed,3s) linear infinite;
  filter: blur(14px);
  opacity:.6;
  z-index:0;
  transform: rotateX(var(--rx)) rotateY(var(--ry));
  transition: transform .08s ease;
}

@property --beam-angle{syntax:'<angle>';initial-value:0deg;inherits:false;}
@keyframes beamSpin{ to{ --beam-angle:360deg; } }

/* ── 카드 본체 (3D 회전 타겟) ── */
.card-body{
  position:relative; z-index:1;
  width:100%; height:100%;
  border-radius:18px;
  transform-style:preserve-3d;
  transform: rotateX(var(--rx)) rotateY(var(--ry));
  transition: transform .12s ease, box-shadow .3s ease;
  will-change: transform;
  box-shadow:
    0 20px 60px rgba(0,0,0,.6),
    0 0 0 1.5px rgba(255,255,255,.08);
}
.card-scene:hover .card-body{
  box-shadow:
    0 35px 80px rgba(0,0,0,.7),
    0 0 40px color-mix(in srgb,var(--cb,#fff) 35%,transparent),
    0 0 0 1.5px rgba(255,255,255,.15);
}

/* ── 카드 표면 ── */
.card-face{
  position:absolute; inset:0;
  border-radius:18px;
  overflow:hidden;
  background: var(--card-bg,#12121e);
  backface-visibility:hidden;

  /* 내부 그라디언트 레이어 */
  background:
    radial-gradient(ellipse 80% 50% at var(--mx,50%) var(--my,50%),
      color-mix(in srgb,var(--cb,#6c63ff) 18%,transparent) 0%,
      transparent 70%
    ),
    linear-gradient(160deg,
      color-mix(in srgb,var(--ca,#333) 30%,#0d0d1a) 0%,
      #0d0d1a 50%,
      color-mix(in srgb,var(--ca,#333) 15%,#07070f) 100%
    );
  transition: background .08s ease;
}

/* 홀로그램 무늬 오버레이 */
.card-face::before{
  content:'';
  position:absolute; inset:0;
  border-radius:18px;
  background:
    repeating-linear-gradient(
      -45deg,
      transparent 0px,
      transparent 3px,
      rgba(255,255,255,.012) 3px,
      rgba(255,255,255,.012) 4px
    );
  pointer-events:none; z-index:1;
}

/* 광택 스펙큘러 레이어 */
.card-shine{
  position:absolute; inset:0;
  border-radius:18px;
  background: radial-gradient(
    ellipse 60% 50% at var(--mx,50%) var(--my,50%),
    rgba(255,255,255,.13) 0%,
    rgba(255,255,255,.04) 40%,
    transparent 70%
  );
  pointer-events:none; z-index:5;
  transition: background .06s ease;
  mix-blend-mode: screen;
}

/* ── 상단 밴드 ── */
.card-top-band{
  position:absolute; top:0; left:0; right:0; height:42%;
  border-radius:18px 18px 0 0;
  z-index:2; pointer-events:none;
  background: linear-gradient(180deg,
    color-mix(in srgb,var(--cb,#fff) var(--band-op,20%), transparent) 0%,
    transparent 100%
  );
}
.card-top-band::after{
  content:'';
  position:absolute; inset:0; border-radius:inherit;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,var(--shine,.06)) 42%,
    rgba(255,255,255,calc(var(--shine,.06)*2)) 50%,
    rgba(255,255,255,var(--shine,.06)) 58%,
    transparent 100%
  );
  background-size:200% 100%;
  animation: bandShimmer var(--shimmer,4s) ease-in-out infinite;
}

/* ── 하단 밴드 ── */
.card-bot-band{
  position:absolute; bottom:0; left:0; right:0; height:38%;
  border-radius:0 0 18px 18px;
  z-index:2; pointer-events:none;
  background: linear-gradient(0deg,
    color-mix(in srgb,var(--cb,#fff) var(--band-op,20%), transparent) 0%,
    transparent 100%
  );
}
.card-bot-band::after{
  content:'';
  position:absolute; inset:0; border-radius:inherit;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,var(--shine,.06)) 42%,
    rgba(255,255,255,calc(var(--shine,.06)*2)) 50%,
    rgba(255,255,255,var(--shine,.06)) 58%,
    transparent 100%
  );
  background-size:200% 100%;
  animation: bandShimmer var(--shimmer,4s) ease-in-out infinite reverse;
}
@keyframes bandShimmer{
  0%{background-position:200% 0}
  50%{background-position:-50% 0}
  100%{background-position:200% 0}
}

/* ── 헤더 영역 (별 + 배지) ── */
.card-header{
  position:absolute; top:0; left:0; right:0;
  padding:13px 14px 0;
  display:flex; justify-content:space-between; align-items:flex-start;
  z-index:10;
}
.card-stars{display:flex;gap:2px;}
.card-star{
  color:#ffd700; font-size:13px;
  text-shadow:0 0 5px rgba(255,215,0,.8), 0 0 12px rgba(255,215,0,.4);
  animation: starTwinkle var(--st-dur,3s) ease-in-out infinite;
  animation-delay: var(--st-del,0s);
}
@keyframes starTwinkle{
  0%,100%{opacity:.6; transform:scale(.9);}
  50%{opacity:1; transform:scale(1.1);}
}
.card-badge{
  color:#fff; padding:4px 11px; border-radius:8px;
  font-size:10px; font-weight:900; letter-spacing:.08em;
  box-shadow:0 2px 10px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.15);
  background: linear-gradient(135deg,
    var(--ca,#555) 0%,
    var(--cb,#888) 100%
  );
  border:1px solid rgba(255,255,255,.12);
}

/* ── 보케 레이어 ── */
.card-bokeh{
  position:absolute; inset:0;
  z-index:3; pointer-events:none; overflow:hidden;
  border-radius:18px;
}
.bokeh-dot{
  position:absolute; border-radius:50%;
  background: radial-gradient(circle,
    color-mix(in srgb,var(--cb,#fff) 65%,#fff) 0%,
    transparent 70%
  );
  filter:blur(var(--bblur,5px));
  opacity:var(--bop,.35);
  animation: bokehDrift var(--bdur,7s) ease-in-out infinite;
  animation-delay: var(--bdel,0s);
}
@keyframes bokehDrift{
  0%,100%{transform:translate(0,0) scale(1);}
  25%{transform:translate(6px,-8px) scale(1.1);}
  50%{transform:translate(-5px,6px) scale(.92);}
  75%{transform:translate(8px,3px) scale(1.05);}
}

/* ── 스파클 레이어 ── */
.card-sparkles{
  position:absolute; inset:0;
  z-index:4; pointer-events:none; overflow:hidden;
  border-radius:18px;
}
.sparkle-dot{
  position:absolute;
  color:#ffd700; font-size:var(--ssz,11px);
  text-shadow:0 0 6px rgba(255,215,0,.9), 0 0 14px rgba(255,215,0,.5);
  animation: sparklePop var(--sdur,2.2s) ease-in-out infinite;
  animation-delay: var(--sdel,0s);
}
@keyframes sparklePop{
  0%,100%{opacity:.1; transform:scale(.5) rotate(-10deg);}
  40%{opacity:1; transform:scale(1.2) rotate(10deg);}
  60%{opacity:.8; transform:scale(1) rotate(5deg);}
}

/* ── 메인 아이콘 ── */
.card-icon-wrap{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-56%) translateZ(20px);
  z-index:8;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
.card-main-icon{
  font-size:3.4rem;
  filter:
    drop-shadow(0 0 12px var(--cb,#fff))
    drop-shadow(0 0 28px color-mix(in srgb,var(--cb,#fff) 55%,transparent))
    drop-shadow(0 4px 16px rgba(0,0,0,.5));
  animation: iconHover 3.5s ease-in-out infinite;
  will-change: transform;
}
@keyframes iconHover{
  0%,100%{transform:translateY(0) rotateY(0deg);}
  30%{transform:translateY(-6px) rotateY(8deg);}
  70%{transform:translateY(-3px) rotateY(-5deg);}
}
.card-main-name{
  font-size:1.05rem; font-weight:900;
  color:var(--cb,#fff);
  text-shadow:
    0 0 12px var(--cb,#fff),
    0 0 30px color-mix(in srgb,var(--cb,#fff) 60%,transparent),
    0 2px 8px rgba(0,0,0,.6);
  letter-spacing:.05em;
  transform: translateZ(10px);
}

/* ── 비네트 ── */
.card-vignette{
  position:absolute; inset:0; z-index:6; pointer-events:none;
  border-radius:18px;
  background: radial-gradient(ellipse at center,
    transparent 30%,
    rgba(5,5,12,.6) 100%
  );
}

/* ── 푸터 ── */
.card-footer{
  position:absolute; bottom:0; left:0; right:0;
  padding:11px 14px;
  display:flex; justify-content:space-between; align-items:center;
  z-index:10;
  border-radius:0 0 18px 18px;
  background: linear-gradient(135deg,
    color-mix(in srgb,var(--ca,#222) 85%,#000) 0%,
    color-mix(in srgb,var(--ca,#222) 65%,#000) 100%
  );
  border-top:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(4px);
}
.footer-lv{
  color:#fff; font-size:10px; font-weight:900;
  background:rgba(0,0,0,.3); padding:3px 9px; border-radius:6px;
  letter-spacing:.06em; border:1px solid rgba(255,255,255,.1);
}
.footer-name{color:#fff; font-size:13px; font-weight:800; text-shadow:0 2px 4px rgba(0,0,0,.5);}
.footer-subs{color:rgba(255,255,255,.65); font-size:10px;}

/* ── 레벨별 글로우 ── */
.card-scene[data-lv="7"] .card-body{box-shadow:0 25px 65px rgba(0,0,0,.65),0 0 30px color-mix(in srgb,var(--cb) 30%,transparent);}
.card-scene[data-lv="8"] .card-body{box-shadow:0 28px 70px rgba(0,0,0,.7), 0 0 40px color-mix(in srgb,var(--cb) 40%,transparent);}
.card-scene[data-lv="9"] .card-body{box-shadow:0 32px 80px rgba(0,0,0,.75),0 0 55px color-mix(in srgb,var(--cb) 52%,transparent);}
.card-scene[data-lv="10"] .card-body{
  box-shadow:
    0 36px 90px rgba(0,0,0,.8),
    0 0 70px rgba(255,80,180,.45),
    0 0 110px rgba(80,200,255,.3),
    0 0 0 1px rgba(255,255,255,.12);
}

/* LV9 이름 펄스 */
.card-scene[data-lv="9"] .card-main-name{
  animation: namePulse9 2s ease-in-out infinite alternate;
}
@keyframes namePulse9{
  from{text-shadow:0 0 10px var(--cb),0 0 20px var(--cb);}
  to{text-shadow:0 0 20px var(--cb),0 0 50px var(--cb),0 0 80px color-mix(in srgb,var(--cb) 50%,transparent);}
}

/* LV10 무지개 */
.card-scene[data-lv="10"] .card-main-name{
  background:linear-gradient(90deg,#f00,#f80,#ff0,#0f0,#0ff,#00f,#f0f,#f00);
  background-size:200%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation: rainbowSlide 1.8s linear infinite;
}
.card-scene[data-lv="10"] .card-main-icon{
  animation: iconHover 3.5s ease-in-out infinite, iconGlow10 1.6s ease-in-out infinite alternate;
}
@keyframes iconGlow10{
  from{filter:drop-shadow(0 0 14px #ff0080) drop-shadow(0 0 28px #00ffff);}
  to{filter:drop-shadow(0 0 28px #ffff00) drop-shadow(0 0 56px #ff0080) drop-shadow(0 0 80px #00ffff);}
}
@keyframes rainbowSlide{to{background-position:200% center;}}

/* LV10 테두리 무지개 빔 */
.card-scene[data-lv="10"]::before,
.card-scene[data-lv="10"]::after{
  background: conic-gradient(
    from var(--beam-angle,0deg),
    #f00 0%,#f80 8%,#ff0 16%,#0f0 24%,#0ff 32%,
    #00f 40%,#f0f 48%,#f00 56%,transparent 65%,transparent 100%
  ) !important;
}
</style>

<!-- ② buildCardHTML 함수 교체 (script 태그 안) -->
<script>
function buildCardHTML(g, clickFn=''){

  /* 별 */
  const stars = Array.from({length:5},(_,i)=>
    `<span class="card-star" style="opacity:${i<g.stars?1:.18};--st-dur:${2+i*.4}s;--st-del:${i*.2}s">&starf;</span>`
  ).join('');

  /* 보케 */
  const bokeh = g.bokeh.map((b,i)=>
    `<div class="bokeh-dot" style="
      width:${b.w}px;height:${b.h}px;
      left:${b.l}%;top:${b.t}%;
      --bblur:${b.blur}px;--bop:${b.op};
      --bdur:${5+i*1.3}s;--bdel:${i*.6}s;
    "></div>`
  ).join('');

  /* 스파클 */
  const sparkles = g.sparkles.map((s,i)=>
    `<span class="sparkle-dot" style="
      left:${s.l}%;top:${s.t}%;
      --ssz:${9+Math.min(g.lv,5)}px;
      --sdur:${s.sd};--sdel:${s.sl};
    ">✦</span>`
  ).join('');

  /* 배지 배경 */
  const badgeStyle = g.lv===10
    ? 'background:linear-gradient(135deg,#f00,#f80,#ff0,#0f0,#0ff,#00f,#f0f);border-color:rgba(255,255,255,.3);'
    : '';

  /* 외부 그라디언트 */
  const outerBg = g.lv===10
    ? 'background:linear-gradient(135deg,#f00 0%,#f80 20%,#ff0 40%,#0f0 60%,#0ff 80%,#00f 100%);'
    : `background:linear-gradient(135deg,${g.ca} 0%,${g.cb} 50%,${g.cc} 100%);`;

  return `
<div class="card-scene" data-lv="${g.lv}"
  style="
    --ca:${g.ca}; --cb:${g.cb}; --cc:${g.cc};
    --beam-speed:${g.beamSpeed};
    --band-op:${g.bandOp}%;
    --shimmer:${g.shimmer};
    --shine:${g.shine};
    ${outerBg}
  "
  onclick="${clickFn}"
  onmousemove="card3D(event,this)"
  onmouseleave="cardReset(this)">

  <!-- 본체 -->
  <div class="card-body">
    <div class="card-face">

      <!-- 보케 -->
      <div class="card-bokeh">${bokeh}</div>

      <!-- 스파클 -->
      <div class="card-sparkles">${sparkles}</div>

      <!-- 헤더: 별 + 배지 -->
      <div class="card-header">
        <div class="card-stars">${stars}</div>
        <div class="card-badge" style="${badgeStyle}">${g.badge}</div>
      </div>

      <!-- 메인 아이콘 -->
      <div class="card-icon-wrap">
        <div class="card-main-icon">${g.icon}</div>
        <div class="card-main-name">${g.name}</div>
      </div>

      <!-- 밴드 -->
      <div class="card-top-band"></div>
      <div class="card-bot-band"></div>

      <!-- 비네트 -->
      <div class="card-vignette"></div>

      <!-- 광택 -->
      <div class="card-shine"></div>

      <!-- 푸터 -->
      <div class="card-footer">
        <div class="footer-lv">LV.${g.lv}</div>
        <div class="footer-name">${g.name}</div>
        <div class="footer-subs">${g.subs}</div>
      </div>

    </div>
  </div>
</div>`;
}

/* ── 3D 마우스 틸트 ── */
function card3D(e, el){
  const r  = el.getBoundingClientRect();
  const x  = e.clientX - r.left;
  const y  = e.clientY - r.top;
  const cx = r.width  / 2;
  const cy = r.height / 2;

  const maxTilt = 18;
  const ry =  ((x - cx) / cx) * maxTilt;
  const rx = -((y - cy) / cy) * maxTilt;

  /* 마우스 비율 (광택 위치용) */
  const mx = (x / r.width  * 100).toFixed(1) + '%';
  const my = (y / r.height * 100).toFixed(1) + '%';

  const body  = el.querySelector('.card-body');
  const face  = el.querySelector('.card-face');
  const shine = el.querySelector('.card-shine');

  /* 틸트 적용 */
  body.style.transform  = `rotateX(${rx}deg) rotateY(${ry}deg) translateZ(0)`;
  el.style.setProperty('--rx', rx+'deg');
  el.style.setProperty('--ry', ry+'deg');

  /* 광택 이동 */
  shine.style.background = `radial-gradient(
    ellipse 55% 45% at ${mx} ${my},
    rgba(255,255,255,.18) 0%,
    rgba(255,255,255,.05) 45%,
    transparent 70%
  )`;

  /* face 배경 내 광원 이동 */
  face.style.background = `
    radial-gradient(ellipse 75% 55% at ${mx} ${my},
      color-mix(in srgb,var(--cb) 22%,transparent) 0%,
      transparent 65%
    ),
    linear-gradient(160deg,
      color-mix(in srgb,var(--ca) 30%,#0d0d1a) 0%,
      #0d0d1a 50%,
      color-mix(in srgb,var(--ca) 15%,#07070f) 100%
    )
  `;

  /* 호버 시 살짝 위로 */
  el.style.transform = `translateY(-8px)`;
}

function cardReset(el){
  const body  = el.querySelector('.card-body');
  const face  = el.querySelector('.card-face');
  const shine = el.querySelector('.card-shine');

  body.style.transform  = 'rotateX(0deg) rotateY(0deg) translateZ(0)';
  el.style.setProperty('--rx','0deg');
  el.style.setProperty('--ry','0deg');
  el.style.transform    = 'translateY(0)';

  shine.style.background = `radial-gradient(
    ellipse 60% 50% at 50% 50%,
    rgba(255,255,255,.09) 0%,
    rgba(255,255,255,.03) 45%,
    transparent 70%
  )`;

  face.style.background = '';
}
</script>
