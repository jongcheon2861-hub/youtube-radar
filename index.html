<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO · 알고리빙1004</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --void:      #03020a;
  --deep:      #0a0518;
  --purple-dk: #1a0535;
  --purple-md: #2d0d5c;
  --purple-vt: #6b21a8;
  --purple-lt: #a855f7;
  --gold-dk:   #8a6520;
  --gold-md:   #d4a942;
  --gold-lt:   #f0c96a;
  --gold-wh:   #fff8e7;
  --white:     #f5f0ec;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  background: var(--void);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 90px;
  padding: 80px 24px;
  overflow-x: hidden;
}

/* ── 배경 ── */
.bg-void{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 55% 45% at 50% 42%,
      rgba(45,13,92,.5) 0%, rgba(26,5,53,.32) 35%, transparent 75%),
    radial-gradient(ellipse 100% 80% at 50% 50%,
      var(--deep) 0%, var(--void) 70%);
}
.bh-core{
  position:fixed; width:300px; height:150px;
  top:38%; left:50%; transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(ellipse at center,
    rgba(107,33,168,.2) 0%, rgba(107,33,168,.06) 45%, transparent 72%);
  filter:blur(20px);
  pointer-events:none; z-index:0;
  animation:corePulse 5s ease-in-out infinite;
}
@keyframes corePulse{
  0%,100%{ opacity:.65; transform:translate(-50%,-50%) scale(1); }
  50%    { opacity:1;   transform:translate(-50%,-50%) scale(1.2); }
}
.bh-ring{
  position:fixed; border-radius:50%;
  top:38%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none; z-index:0; opacity:0;
  animation:ringEx linear infinite;
}
.bh-ring:nth-child(1){ border:1px solid rgba(168,85,247,.16);  animation-duration:9s; animation-delay:0s;    }
.bh-ring:nth-child(2){ border:1px solid rgba(212,169,66,.09);  animation-duration:9s; animation-delay:2.25s; }
.bh-ring:nth-child(3){ border:1px solid rgba(107,33,168,.13);  animation-duration:9s; animation-delay:4.5s;  }
.bh-ring:nth-child(4){ border:1px solid rgba(240,201,106,.06); animation-duration:9s; animation-delay:6.75s; }
@keyframes ringEx{
  0%  { width:60px;   height:30px;  opacity:0; }
  6%  { opacity:.85; }
  100%{ width:1100px; height:550px; opacity:0; }
}
.star{
  position:fixed; border-radius:50%; pointer-events:none; z-index:0;
  animation:twinkle ease-in-out infinite;
}
@keyframes twinkle{
  0%,100%{ opacity:.05; transform:scale(1); }
  50%    { opacity:.5;  transform:scale(1.5); }
}

/* ── 섹션 레이블 ── */
.sec-label{
  position:relative; z-index:10;
  font-family:'Noto Sans KR',sans-serif;
  font-size:9px; font-weight:300;
  letter-spacing:6px; text-transform:uppercase;
  color:rgba(168,85,247,.38); text-align:center;
  margin-bottom:28px;
}

/* ══════════════════════════════════════
   대형 로고
══════════════════════════════════════ */
.logo-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}
.logo-wrap{
  position:relative;
  display:flex; flex-direction:column; align-items:center;
  padding:48px 60px 44px;
  animation:breathe 7s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-10px); }
}

/* 후광 */
.logo-halo-p{
  position:absolute;
  width:520px; height:260px;
  top:50%; left:50%; transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at 50% 45%,
    rgba(107,33,168,.25) 0%, rgba(107,33,168,.08) 45%, transparent 70%);
  filter:blur(30px); pointer-events:none; z-index:0;
  animation:haloP 5s ease-in-out infinite;
}
@keyframes haloP{
  0%,100%{ opacity:.6;  transform:translate(-50%,-50%) scale(1); }
  50%    { opacity:1;   transform:translate(-50%,-50%) scale(1.1); }
}
.logo-halo-g{
  position:absolute;
  width:360px; height:130px;
  top:56%; left:50%; transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at 50% 50%,
    rgba(212,169,66,.16) 0%, rgba(212,169,66,.04) 55%, transparent 75%);
  filter:blur(18px); pointer-events:none; z-index:0;
  animation:haloG 4s ease-in-out infinite;
}
@keyframes haloG{
  0%,100%{ opacity:.45; }
  50%    { opacity:.85; }
}

/* ── 로고 내부 ── */
.logo-inner{
  position:relative;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  z-index:2;
}

/* 상단 장식 */
.logo-deco-top{
  display:flex; align-items:center; gap:14px;
}
.deco-line{
  height:1px; width:60px;
  background:linear-gradient(90deg, transparent, rgba(212,169,66,.5));
}
.deco-line.r{
  background:linear-gradient(90deg, rgba(212,169,66,.5), transparent);
}
.deco-emblem{
  width:28px; height:28px;
  display:flex; align-items:center; justify-content:center;
}

/* ══════════════════════════════════════
   ALGO 텍스트 + 블랙홀 효과
══════════════════════════════════════ */
.logo-algo-wrap{
  position:relative;
  display:flex; align-items:center; justify-content:center;
}

/* 텍스트 자체 */
.logo-algo{
  font-family:'Cinzel',serif;
  font-size:72px; font-weight:900;
  letter-spacing:24px; padding-right:24px;
  /* 글자를 어둡게 베이스로 깔고 블랙홀이 피어나는 느낌 */
  background:linear-gradient(175deg,
    var(--gold-wh)   0%,
    var(--gold-lt)   22%,
    var(--gold-md)   48%,
    var(--purple-lt) 72%,
    var(--gold-lt)   100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  background-size:200% 200%;
  position:relative; z-index:5;
  animation:algoShimmer 6s ease-in-out infinite;
}
@keyframes algoShimmer{
  0%,100%{ background-position:0% 50%; }
  50%    { background-position:100% 50%; }
}

/* 글씨 뒤 블랙홀 코어 — 글자 영역 안에서 피어오름 */
.algo-bh-core{
  position:absolute;
  width:340px; height:70px;
  top:50%; left:50%; transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(ellipse at center,
    rgba(107,33,168,.0)  0%,
    rgba(107,33,168,.0)  0%,
    rgba(45,13,92,.0)    0%,
    transparent 70%);
  pointer-events:none; z-index:3;
  animation:bhCoreBloom 4s ease-in-out infinite;
}
@keyframes bhCoreBloom{
  0%,100%{
    background:radial-gradient(ellipse at center,
      rgba(3,2,10,.95)    0%,
      rgba(26,5,53,.75)   25%,
      rgba(107,33,168,.45) 50%,
      rgba(168,85,247,.18) 70%,
      transparent          90%);
    transform:translate(-50%,-50%) scale(.85);
    opacity:.75;
  }
  50%{
    background:radial-gradient(ellipse at center,
      rgba(3,2,10,1)      0%,
      rgba(26,5,53,.88)   28%,
      rgba(107,33,168,.6)  52%,
      rgba(168,85,247,.28) 72%,
      transparent          90%);
    transform:translate(-50%,-50%) scale(1.05);
    opacity:1;
  }
}

/* 블랙홀 소용돌이 링 1 */
.algo-bh-ring{
  position:absolute;
  border-radius:50%;
  border:1px solid;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none; z-index:4;
  animation:bhRingPulse ease-in-out infinite;
}
.algo-bh-ring:nth-child(1){
  width:80px; height:22px;
  border-color:rgba(168,85,247,.55);
  box-shadow:0 0 8px rgba(168,85,247,.3), inset 0 0 6px rgba(168,85,247,.15);
  animation-duration:3s; animation-delay:0s;
}
.algo-bh-ring:nth-child(2){
  width:140px; height:36px;
  border-color:rgba(168,85,247,.35);
  box-shadow:0 0 12px rgba(107,33,168,.2);
  animation-duration:3s; animation-delay:.4s;
}
.algo-bh-ring:nth-child(3){
  width:210px; height:52px;
  border-color:rgba(107,33,168,.22);
  animation-duration:3s; animation-delay:.8s;
}
.algo-bh-ring:nth-child(4){
  width:290px; height:68px;
  border-color:rgba(212,169,66,.14);
  animation-duration:3s; animation-delay:1.2s;
}
.algo-bh-ring:nth-child(5){
  width:360px; height:82px;
  border-color:rgba(212,169,66,.08);
  animation-duration:3s; animation-delay:1.6s;
}
@keyframes bhRingPulse{
  0%,100%{ opacity:.6; transform:translate(-50%,-50%) scale(.96) rotateX(68deg); }
  50%    { opacity:1;  transform:translate(-50%,-50%) scale(1.04) rotateX(68deg); }
}

/* 블랙홀 팽창 파동 — 글자 안에서 밖으로 */
.algo-bh-wave{
  position:absolute;
  border-radius:50%;
  top:50%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none; z-index:4;
  opacity:0;
  animation:bhWaveExpand linear infinite;
}
.algo-bh-wave:nth-child(6){
  border:1px solid rgba(168,85,247,.7);
  animation-duration:3.5s; animation-delay:0s;
}
.algo-bh-wave:nth-child(7){
  border:1px solid rgba(212,169,66,.5);
  animation-duration:3.5s; animation-delay:1.17s;
}
.algo-bh-wave:nth-child(8){
  border:1px solid rgba(168,85,247,.4);
  animation-duration:3.5s; animation-delay:2.34s;
}
@keyframes bhWaveExpand{
  0%  { width:30px; height:10px; opacity:0; }
  8%  { opacity:.9; }
  100%{ width:420px; height:110px; opacity:0; }
}

/* 글자 위 밝은 광선 — 빛이 블랙홀에서 굴절되듯 */
.algo-light-ray{
  position:absolute;
  top:50%; left:50%; transform:translate(-50%,-50%);
  width:200px; height:2px;
  pointer-events:none; z-index:6;
  border-radius:2px;
  animation:rayPulse 4s ease-in-out infinite;
}
.algo-light-ray:nth-child(9){
  background:linear-gradient(90deg,
    transparent 0%, rgba(168,85,247,.0) 20%,
    rgba(168,85,247,.6) 50%, rgba(168,85,247,.0) 80%, transparent 100%);
  transform:translate(-50%,-50%) rotate(-8deg);
  animation-delay:0s;
}
.algo-light-ray:nth-child(10){
  background:linear-gradient(90deg,
    transparent 0%, rgba(212,169,66,.0) 20%,
    rgba(212,169,66,.5) 50%, rgba(212,169,66,.0) 80%, transparent 100%);
  transform:translate(-50%,-50%) rotate(8deg);
  animation-delay:2s;
}
@keyframes rayPulse{
  0%,100%{ opacity:.4; }
  50%    { opacity:1; }
}

/* 구분선 */
.logo-rule{
  width:100%; height:1px; position:relative;
  background:linear-gradient(90deg,
    transparent 0%, rgba(168,85,247,.2) 15%,
    rgba(212,169,66,.58) 45%, rgba(168,85,247,.48) 55%,
    rgba(212,169,66,.18) 85%, transparent 100%);
}
.logo-rule::before,.logo-rule::after{
  content:''; position:absolute; top:50%; transform:translateY(-50%);
  width:3.5px; height:3.5px; border-radius:50%;
}
.logo-rule::before{ left:16%;  background:var(--gold-md); box-shadow:0 0 5px var(--gold-md); }
.logo-rule::after { right:16%; background:var(--purple-lt); box-shadow:0 0 5px var(--purple-lt); }

.logo-sub{
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-weight:300;
  font-size:14px; letter-spacing:8px; padding-right:8px;
  color:rgba(212,169,66,.52);
  animation:subFade 5s ease-in-out infinite;
}
@keyframes subFade{ 0%,100%{ opacity:.52; } 50%{ opacity:.82; } }

/* 하단 장식 */
.logo-deco-bot{
  display:flex; align-items:center; gap:10px; opacity:.45;
}
.deco-dot-sm{
  width:3px; height:3px; border-radius:50%;
  background:var(--gold-md); box-shadow:0 0 4px var(--gold-md);
}
.deco-line-sm{
  height:1px; width:36px;
  background:linear-gradient(90deg, transparent, rgba(212,169,66,.4));
}
.deco-line-sm.r{
  background:linear-gradient(90deg, rgba(212,169,66,.4), transparent);
}

/* ══════════════════════════════════════
   소형 배지 — 메인과 동일 스타일
══════════════════════════════════════ */
.badge-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}

.badge-wrap{
  position:relative;
  display:inline-flex; flex-direction:column;
  align-items:center;
  padding:18px 32px 16px;
  border-radius:20px;
  animation:badgeFloat 5.5s ease-in-out infinite;
  cursor:pointer;
  transition:transform .2s ease;
}
.badge-wrap:hover{ transform:scale(1.04) !important; }
@keyframes badgeFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }

.badge-glass{
  position:absolute; inset:0; border-radius:20px; z-index:0;
  background:linear-gradient(135deg,
    rgba(45,13,92,.52) 0%, rgba(10,5,24,.72) 50%, rgba(26,5,53,.5) 100%);
  backdrop-filter:blur(10px);
}
.badge-border{
  position:absolute; inset:0; border-radius:20px; z-index:1; pointer-events:none;
  border:1px solid transparent;
  background:
    linear-gradient(var(--void),var(--void)) padding-box,
    linear-gradient(135deg,
      rgba(168,85,247,.6) 0%, rgba(212,169,66,.45) 35%,
      rgba(168,85,247,.35) 65%, rgba(240,201,106,.52) 100%) border-box;
}
.badge-glow-wrap{
  position:absolute; inset:-12px; border-radius:28px; z-index:-1; pointer-events:none;
  background:radial-gradient(ellipse at center,
    rgba(107,33,168,.18) 0%, transparent 70%);
  animation:bGlow 4s ease-in-out infinite;
}
@keyframes bGlow{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }
.badge-shine{
  position:absolute; inset:0; border-radius:20px; z-index:2; overflow:hidden; pointer-events:none;
}
.badge-shine::after{
  content:''; position:absolute; top:0; left:-130%; width:75%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
  transform:skewX(-18deg);
  animation:shineSlide 5s ease-in-out infinite;
}
@keyframes shineSlide{ 0%,58%,100%{ left:-130%; } 82%{ left:150%; } }

/* 배지 ALGO 텍스트 래퍼 */
.badge-algo-wrap{
  position:relative;
  display:flex; align-items:center; justify-content:center;
  z-index:5;
}

.badge-algo-text{
  font-family:'Cinzel',serif;
  font-size:22px; font-weight:900;
  letter-spacing:9px; padding-right:9px;
  background:linear-gradient(175deg,
    var(--gold-wh)   0%,
    var(--gold-lt)   22%,
    var(--gold-md)   48%,
    var(--purple-lt) 72%,
    var(--gold-lt)   100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  background-size:200% 200%;
  position:relative; z-index:5;
  animation:algoShimmer 6s ease-in-out infinite;
}

/* 배지 블랙홀 코어 */
.badge-bh-core{
  position:absolute;
  width:110px; height:28px;
  top:50%; left:50%; transform:translate(-50%,-50%);
  border-radius:50%;
  pointer-events:none; z-index:3;
  animation:bhCoreBloomSm 4s ease-in-out infinite;
}
@keyframes bhCoreBloomSm{
  0%,100%{
    background:radial-gradient(ellipse at center,
      rgba(3,2,10,.9)      0%,
      rgba(26,5,53,.7)     28%,
      rgba(107,33,168,.42) 52%,
      rgba(168,85,247,.16) 72%,
      transparent           90%);
    transform:translate(-50%,-50%) scale(.85); opacity:.75;
  }
  50%{
    background:radial-gradient(ellipse at center,
      rgba(3,2,10,1)       0%,
      rgba(26,5,53,.85)    28%,
      rgba(107,33,168,.58) 52%,
      rgba(168,85,247,.25) 72%,
      transparent           90%);
    transform:translate(-50%,-50%) scale(1.05); opacity:1;
  }
}

/* 배지 링 */
.badge-bh-ring{
  position:absolute;
  border-radius:50%;
  border:1px solid;
  top:50%; left:50%;
  pointer-events:none; z-index:4;
  animation:bhRingPulseSm ease-in-out infinite;
}
.badge-bh-ring:nth-child(1){
  width:28px; height:8px;
  border-color:rgba(168,85,247,.6);
  box-shadow:0 0 6px rgba(168,85,247,.3);
  animation-duration:3s; animation-delay:0s;
  transform:translate(-50%,-50%) rotateX(68deg);
}
.badge-bh-ring:nth-child(2){
  width:52px; height:14px;
  border-color:rgba(168,85,247,.38);
  animation-duration:3s; animation-delay:.4s;
  transform:translate(-50%,-50%) rotateX(68deg);
}
.badge-bh-ring:nth-child(3){
  width:82px; height:22px;
  border-color:rgba(107,33,168,.24);
  animation-duration:3s; animation-delay:.8s;
  transform:translate(-50%,-50%) rotateX(68deg);
}
.badge-bh-ring:nth-child(4){
  width:112px; height:30px;
  border-color:rgba(212,169,66,.14);
  animation-duration:3s; animation-delay:1.2s;
  transform:translate(-50%,-50%) rotateX(68deg);
}
@keyframes bhRingPulseSm{
  0%,100%{ opacity:.6; }
  50%    { opacity:1; }
}

/* 배지 팽창 파동 */
.badge-bh-wave{
  position:absolute;
  border-radius:50%;
  top:50%; left:50%;
  pointer-events:none; z-index:4;
  opacity:0;
  animation:bhWaveExpandSm linear infinite;
}
.badge-bh-wave:nth-child(5){
  border:1px solid rgba(168,85,247,.65);
  animation-duration:3.5s; animation-delay:0s;
}
.badge-bh-wave:nth-child(6){
  border:1px solid rgba(212,169,66,.45);
  animation-duration:3.5s; animation-delay:1.17s;
}
.badge-bh-wave:nth-child(7){
  border:1px solid rgba(168,85,247,.35);
  animation-duration:3.5s; animation-delay:2.34s;
}
@keyframes bhWaveExpandSm{
  0%  { width:12px; height:4px; opacity:0; transform:translate(-50%,-50%) rotateX(68deg); }
  8%  { opacity:.85; }
  100%{ width:160px; height:44px; opacity:0; transform:translate(-50%,-50%) rotateX(68deg); }
}

/* 배지 광선 */
.badge-ray{
  position:absolute;
  top:50%; left:50%;
  width:70px; height:1.5px;
  border-radius:2px;
  pointer-events:none; z-index:6;
  animation:rayPulse 4s ease-in-out infinite;
}
.badge-ray:nth-child(8){
  background:linear-gradient(90deg,
    transparent, rgba(168,85,247,.55) 50%, transparent);
  transform:translate(-50%,-50%) rotate(-8deg);
  animation-delay:0s;
}
.badge-ray:nth-child(9){
  background:linear-gradient(90deg,
    transparent, rgba(212,169,66,.45) 50%, transparent);
  transform:translate(-50%,-50%) rotate(8deg);
  animation-delay:2s;
}

/* 배지 서브텍스트 */
.badge-sub-rule{
  width:100%; height:1px; position:relative; margin-top:8px;
  background:linear-gradient(90deg,
    transparent, rgba(168,85,247,.2) 15%,
    rgba(212,169,66,.45) 45%, rgba(168,85,247,.38) 55%,
    rgba(212,169,66,.15) 85%, transparent);
  z-index:5;
}
.badge-sub-rule::before,.badge-sub-rule::after{
  content:''; position:absolute; top:50%; transform:translateY(-50%);
  width:3px; height:3px; border-radius:50%;
}
.badge-sub-rule::before{ left:20%;  background:var(--gold-md); box-shadow:0 0 4px var(--gold-md); }
.badge-sub-rule::after { right:20%; background:var(--purple-lt); box-shadow:0 0 4px var(--purple-lt); }

.badge-sub-text{
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-weight:300;
  font-size:10px; letter-spacing:5px; padding-right:5px;
  color:rgba(212,169,66,.48);
  position:relative; z-index:5;
  margin-top:6px;
  animation:subFade 5s ease-in-out infinite;
}
</style>
</head>
<body>

<div class="bg-void"></div>
<div class="bh-core"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>

<script>
(function(){
  const cs=['rgba(255,248,231,.85)','rgba(168,85,247,.75)','rgba(212,169,66,.75)','rgba(245,240,236,.65)'];
  for(let i=0;i<65;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*1.5+.3, c=cs[Math.floor(Math.random()*cs.length)];
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${c};box-shadow:0 0 ${sz*2}px ${c};animation-duration:${Math.random()*5+3}s;animation-delay:${Math.random()*7}s;`;
    document.body.appendChild(s);
  }
})();
</script>
