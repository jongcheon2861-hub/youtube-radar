<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Sphere Symbol</title>
<style>
:root{
  --void:#000008;
  --purple:#a855f7;
  --purple-d:#6b21a8;
  --purple-dd:#3b0764;
  --gold:#d4a942;
  --gold-l:#f0c96a;
  --orange:#f97316;
  --rose:#e8a0b0;
  --rose-d:#c4687e;
  --rose-l:#f5c6d0;
  --white:#f0eee8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--void);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:80px;
  overflow:hidden;
}

/* ── 별 배경 ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;border-radius:50%;
  animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;
}
@keyframes twinkle{
  0%{opacity:.04;transform:scale(1);}
  100%{opacity:.9;transform:scale(2);}
}

/* ════════════════════════════════════
   메인 씬
════════════════════════════════════ */
.scene{
  position:relative;z-index:1;
  width:400px;height:400px;
  display:flex;align-items:center;justify-content:center;
}

/* ════════════════════════════════════
   외부 방사 글로우
════════════════════════════════════ */
.outer-radiance{
  position:absolute;
  width:420px;height:420px;
  border-radius:50%;
  background:radial-gradient(circle,
    transparent 30%,
    rgba(168,85,247,.06) 42%,
    rgba(249,115,22,.08) 54%,
    rgba(232,160,176,.05) 66%,
    transparent 78%
  );
  animation:outerRad 5s ease-in-out infinite;
}
@keyframes outerRad{
  0%,100%{transform:scale(1);opacity:.7;}
  50%{transform:scale(1.08);opacity:1;}
}

/* ════════════════════════════════════
   구체 (행성 본체)
════════════════════════════════════ */
.sphere{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:140px;height:140px;
  border-radius:50%;
  z-index:20;
  /* 3D 구형 쉐이딩 */
  background:
    radial-gradient(circle at 36% 30%,
      rgba(180,100,220,.55)  0%,
      rgba(120,40,180,.7)   20%,
      rgba(60,10,120,.85)   42%,
      rgba(20,2,45,.95)     62%,
      rgba(5,0,15,1)        80%,
      #000                  100%
    );
  box-shadow:
    /* 외부 오라 */
    0 0 0 2px  rgba(168,85,247,.5),
    0 0 0 6px  rgba(168,85,247,.15),
    0 0 28px   rgba(168,85,247,.75),
    0 0 60px   rgba(107,33,168,.55),
    0 0 110px  rgba(59,7,100,.35),
    /* 내부 보라 글로우 */
    inset 0 0 30px rgba(107,33,168,.5),
    inset 0 0 60px rgba(59,7,100,.7);
  animation:spherePulse 3s ease-in-out infinite;
}
@keyframes spherePulse{
  0%,100%{
    box-shadow:
      0 0 0 2px rgba(168,85,247,.5),0 0 0 6px rgba(168,85,247,.15),
      0 0 28px rgba(168,85,247,.75),0 0 60px rgba(107,33,168,.55),0 0 110px rgba(59,7,100,.35),
      inset 0 0 30px rgba(107,33,168,.5),inset 0 0 60px rgba(59,7,100,.7);
  }
  50%{
    box-shadow:
      0 0 0 3px rgba(168,85,247,.7),0 0 0 9px rgba(168,85,247,.22),
      0 0 42px rgba(168,85,247,.95),0 0 90px rgba(107,33,168,.75),0 0 160px rgba(59,7,100,.5),
      inset 0 0 40px rgba(107,33,168,.7),inset 0 0 80px rgba(59,7,100,.85);
  }
}

/* 구체 하이라이트 */
.sphere-hl{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:140px;height:140px;
  border-radius:50%;z-index:21;
  background:radial-gradient(circle at 30% 26%,
    rgba(255,255,255,.18) 0%,
    rgba(200,150,255,.1)  22%,
    transparent           50%
  );
  pointer-events:none;
}

/* ════════════════════════════════════
   색상 팔레트 정의
   6개 라인/링 → 동일 색상·동일 간격
   간격: 14px씩
   색상: rose → orange → gold → purple → rose-l → orange-l
════════════════════════════════════ */

/*
  구체 반지름: 70px
  라인1: 구체 바깥 8px → 반지름 78px
  라인2: 92px
  라인3: 106px
  라인4: 120px
  라인5: 134px
  라인6: 148px
  간격: 14px
*/

/* ════════════════════════════════════
   구체 외부 궤도 라인 6개 (회전)
   각각 다른 속도+방향으로 공전
════════════════════════════════════ */
.orbit-line{
  position:absolute;
  top:50%;left:50%;
  border-radius:50%;
  border-style:solid;
  animation:orbitSpin var(--os) linear infinite;
  transform-origin:center center;
}
/* 라인은 구체 주위를 수직/기울어진 각도로 돌아감 */
@keyframes orbitSpin{
  from{transform:translate(-50%,-50%) var(--tilt) rotate(0deg);}
  to{  transform:translate(-50%,-50%) var(--tilt) rotate(360deg);}
}

/* 라인 1 — rose, r=78, 수직 */
.ol1{
  width:156px;height:156px;
  border:1.5px solid rgba(232,160,176,.85);
  box-shadow:0 0 6px rgba(232,160,176,.7),0 0 14px rgba(232,160,176,.3);
  --os:4s;
  --tilt:rotateX(90deg);
}
/* 라인 2 — orange, r=92 */
.ol2{
  width:184px;height:184px;
  border:1.5px solid rgba(249,115,22,.85);
  box-shadow:0 0 6px rgba(249,115,22,.7),0 0 14px rgba(249,115,22,.3);
  --os:5.5s;
  --tilt:rotateX(75deg) rotateZ(20deg);
  animation-direction:reverse;
}
/* 라인 3 — gold, r=106 */
.ol3{
  width:212px;height:212px;
  border:1.5px solid rgba(212,169,66,.85);
  box-shadow:0 0 6px rgba(212,169,66,.7),0 0 14px rgba(212,169,66,.3);
  --os:7s;
  --tilt:rotateX(60deg) rotateZ(45deg);
}
/* 라인 4 — purple, r=120 */
.ol4{
  width:240px;height:240px;
  border:1.5px solid rgba(168,85,247,.85);
  box-shadow:0 0 6px rgba(168,85,247,.7),0 0 14px rgba(168,85,247,.3);
  --os:9s;
  --tilt:rotateX(80deg) rotateZ(70deg);
  animation-direction:reverse;
}
/* 라인 5 — rose-l, r=134 */
.ol5{
  width:268px;height:268px;
  border:1.5px solid rgba(245,198,208,.8);
  box-shadow:0 0 6px rgba(245,198,208,.65),0 0 14px rgba(245,198,208,.28);
  --os:11s;
  --tilt:rotateX(70deg) rotateZ(110deg);
}
/* 라인 6 — orange-l, r=148 */
.ol6{
  width:296px;height:296px;
  border:1.5px solid rgba(251,146,60,.8);
  box-shadow:0 0 6px rgba(251,146,60,.65),0 0 14px rgba(251,146,60,.28);
  --os:13.5s;
  --tilt:rotateX(85deg) rotateZ(140deg);
  animation-direction:reverse;
}

/* ════════════════════════════════════
   토성 링 시스템
   구체 외부라인과 동일 색상·동일 간격
   링은 rotateX(72deg)로 눕혀서 토성처럼
════════════════════════════════════ */
.ring-system{
  position:absolute;
  top:50%;left:50%;
  width:400px;height:400px;
  transform:translate(-50%,-50%);
}

.saturn-ring{
  position:absolute;
  border-radius:50%;
  top:50%;left:50%;
  border-style:solid;
  animation:ringSpin var(--rs) linear infinite;
}
@keyframes ringSpin{
  from{transform:translate(-50%,-50%) rotateX(72deg) rotate(0deg);}
  to{  transform:translate(-50%,-50%) rotateX(72deg) rotate(360deg);}
}

/* 링 1 — rose, r=78 → 직경156 */
.sr1{
  width:156px;height:156px;
  border:1.5px solid rgba(232,160,176,.85);
  box-shadow:0 0 8px rgba(232,160,176,.7),0 0 18px rgba(232,160,176,.3);
  --rs:4s;
}
/* 링 2 — orange, r=92 → 직경184 */
.sr2{
  width:184px;height:184px;
  border:1.5px solid rgba(249,115,22,.85);
  box-shadow:0 0 8px rgba(249,115,22,.7),0 0 18px rgba(249,115,22,.3);
  --rs:5.5s;
  animation-direction:reverse;
}
/* 링 3 — gold, r=106 → 직경212 */
.sr3{
  width:212px;height:212px;
  border:1.5px solid rgba(212,169,66,.85);
  box-shadow:0 0 8px rgba(212,169,66,.7),0 0 18px rgba(212,169,66,.3);
  --rs:7s;
}
/* 링 4 — purple, r=120 → 직경240 */
.sr4{
  width:240px;height:240px;
  border:1.5px solid rgba(168,85,247,.85);
  box-shadow:0 0 8px rgba(168,85,247,.7),0 0 18px rgba(168,85,247,.3);
  --rs:9s;
  animation-direction:reverse;
}
/* 링 5 — rose-l, r=134 → 직경268 */
.sr5{
  width:268px;height:268px;
  border:1.5px solid rgba(245,198,208,.8);
  box-shadow:0 0 8px rgba(245,198,208,.65),0 0 18px rgba(245,198,208,.28);
  --rs:11s;
}
/* 링 6 — orange-l, r=148 → 직경296 */
.sr6{
  width:296px;height:296px;
  border:1.5px solid rgba(251,146,60,.8);
  box-shadow:0 0 8px rgba(251,146,60,.65),0 0 18px rgba(251,146,60,.28);
  --rs:13.5s;
  animation-direction:reverse;
}

/* ════════════════════════════════════
   링이 구체 앞을 지나가는 레이어
   (z-index 구분으로 앞/뒤 분리)
════════════════════════════════════ */
.ring-front{
  position:absolute;
  top:50%;left:50%;
  width:400px;height:400px;
  transform:translate(-50%,-50%);
  z-index:25;
  pointer-events:none;
}
.saturn-ring-front{
  position:absolute;
  border-radius:50%;
  top:50%;left:50%;
  border-style:solid;
  /* 아래쪽 절반만 표시 → 구체 앞으로 지나가는 효과 */
  clip-path:ellipse(50% 50% at 50% 50%);
  animation:ringFrontSpin var(--rfs) linear infinite;
}
@keyframes ringFrontSpin{
  from{transform:translate(-50%,-50%) rotateX(72deg) rotate(0deg);}
  to{  transform:translate(-50%,-50%) rotateX(72deg) rotate(360deg);}
}
.srf1{
  width:156px;height:156px;
  border-bottom:1.5px solid rgba(232,160,176,.85);
  border-left:1.5px solid rgba(232,160,176,.5);
  border-right:1.5px solid rgba(232,160,176,.5);
  border-top:1.5px solid transparent;
  box-shadow:0 0 8px rgba(232,160,176,.5);
  --rfs:4s;
}
.srf2{
  width:184px;height:184px;
  border-bottom:1.5px solid rgba(249,115,22,.85);
  border-left:1.5px solid rgba(249,115,22,.5);
  border-right:1.5px solid rgba(249,115,22,.5);
  border-top:1.5px solid transparent;
  box-shadow:0 0 8px rgba(249,115,22,.5);
  --rfs:5.5s;
  animation-direction:reverse;
}
.srf3{
  width:212px;height:212px;
  border-bottom:1.5px solid rgba(212,169,66,.85);
  border-left:1.5px solid rgba(212,169,66,.5);
  border-right:1.5px solid rgba(212,169,66,.5);
  border-top:1.5px solid transparent;
  box-shadow:0 0 8px rgba(212,169,66,.5);
  --rfs:7s;
}
.srf4{
  width:240px;height:240px;
  border-bottom:1.5px solid rgba(168,85,247,.85);
  border-left:1.5px solid rgba(168,85,247,.5);
  border-right:1.5px solid rgba(168,85,247,.5);
  border-top:1.5px solid transparent;
  box-shadow:0 0 8px rgba(168,85,247,.5);
  --rfs:9s;
  animation-direction:reverse;
}
.srf5{
  width:268px;height:268px;
  border-bottom:1.5px solid rgba(245,198,208,.8);
  border-left:1.5px solid rgba(245,198,208,.45);
  border-right:1.5px solid rgba(245,198,208,.45);
  border-top:1.5px solid transparent;
  box-shadow:0 0 8px rgba(245,198,208,.45);
  --rfs:11s;
}
.srf6{
  width:296px;height:296px;
  border-bottom:1.5px solid rgba(251,146,60,.8);
  border-left:1.5px solid rgba(251,146,60,.45);
  border-right:1.5px solid rgba(251,146,60,.45);
  border-top:1.5px solid transparent;
  box-shadow:0 0 8px rgba(251,146,60,.45);
  --rfs:13.5s;
  animation-direction:reverse;
}

/* ════════════════════════════════════
   미니 버전
════════════════════════════════════ */
.mini-scene{
  position:relative;z-index:1;
  width:180px;height:180px;
  display:flex;align-items:center;justify-content:center;
}
.mini-sphere{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:52px;height:52px;border-radius:50%;z-index:20;
  background:radial-gradient(circle at 36% 30%,
    rgba(180,100,220,.55) 0%,rgba(120,40,180,.7) 20%,
    rgba(60,10,120,.85) 42%,rgba(20,2,45,.95) 62%,#000 100%
  );
  box-shadow:
    0 0 0 1.5px rgba(168,85,247,.5),
    0 0 14px rgba(168,85,247,.75),
    0 0 32px rgba(107,33,168,.5),
    inset 0 0 14px rgba(107,33,168,.5);
  animation:spherePulse 3s ease-in-out infinite;
}
.mini-sphere-hl{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:52px;height:52px;border-radius:50%;z-index:21;
  background:radial-gradient(circle at 30% 26%,rgba(255,255,255,.18) 0%,transparent 50%);
  pointer-events:none;
}
.mini-ol{
  position:absolute;top:50%;left:50%;
  border-radius:50%;border-style:solid;
  animation:orbitSpin var(--os) linear infinite;
}
.mol1{width:58px;height:58px;border:1px solid rgba(232,160,176,.85);box-shadow:0 0 5px rgba(232,160,176,.6);--os:4s;--tilt:rotateX(90deg);}
.mol2{width:68px;height:68px;border:1px solid rgba(249,115,22,.85);box-shadow:0 0 5px rgba(249,115,22,.6);--os:5.5s;--tilt:rotateX(75deg) rotateZ(20deg);animation-direction:reverse;}
.mol3{width:78px;height:78px;border:1px solid rgba(212,169,66,.85);box-shadow:0 0 5px rgba(212,169,66,.6);--os:7s;--tilt:rotateX(60deg) rotateZ(45deg);}
.mol4{width:88px;height:88px;border:1px solid rgba(168,85,247,.85);box-shadow:0 0 5px rgba(168,85,247,.6);--os:9s;--tilt:rotateX(80deg) rotateZ(70deg);animation-direction:reverse;}
.mol5{width:98px;height:98px;border:1px solid rgba(245,198,208,.8);box-shadow:0 0 5px rgba(245,198,208,.55);--os:11s;--tilt:rotateX(70deg) rotateZ(110deg);}
.mol6{width:108px;height:108px;border:1px solid rgba(251,146,60,.8);box-shadow:0 0 5px rgba(251,146,60,.55);--os:13.5s;--tilt:rotateX(85deg) rotateZ(140deg);animation-direction:reverse;}

.mini-sr{
  position:absolute;top:50%;left:50%;
  border-radius:50%;border-style:solid;
  animation:ringSpin var(--rs) linear infinite;
}
.msr1{width:58px;height:58px;border:1px solid rgba(232,160,176,.8);box-shadow:0 0 6px rgba(232,160,176,.6);--rs:4s;}
.msr2{width:68px;height:68px;border:1px solid rgba(249,115,22,.8);box-shadow:0 0 6px rgba(249,115,22,.6);--rs:5.5s;animation-direction:reverse;}
.msr3{width:78px;height:78px;border:1px solid rgba(212,169,66,.8);box-shadow:0 0 6px rgba(212,169,66,.6);--rs:7s;}
.msr4{width:88px;height:88px;border:1px solid rgba(168,85,247,.8);box-shadow:0 0 6px rgba(168,85,247,.6);--rs:9s;animation-direction:reverse;}
.msr5{width:98px;height:98px;border:1px solid rgba(245,198,208,.75);box-shadow:0 0 6px rgba(245,198,208,.55);--rs:11s;}
.msr6{width:108px;height:108px;border:1px solid rgba(251,146,60,.75);box-shadow:0 0 6px rgba(251,146,60,.55);--rs:13.5s;animation-direction:reverse;}

.mini-ring-front{
  position:absolute;top:50%;left:50%;
  width:180px;height:180px;
  transform:translate(-50%,-50%);
  z-index:25;pointer-events:none;
}
.mini-srf{
  position:absolute;top:50%;left:50%;
  border-radius:50%;
  animation:ringFrontSpin var(--rfs) linear infinite;
}
.msrf1{width:58px;height:58px;border-bottom:1px solid rgba(232,160,176,.85);border-left:1px solid rgba(232,160,176,.4);border-right:1px solid rgba(232,160,176,.4);border-top:1px solid transparent;--rfs:4s;}
.msrf2{width:68px;height:68px;border-bottom:1px solid rgba(249,115,22,.85);border-left:1px solid rgba(249,115,22,.4);border-right:1px solid rgba(249,115,22,.4);border-top:1px solid transparent;--rfs:5.5s;animation-direction:reverse;}
.msrf3{width:78px;height:78px;border-bottom:1px solid rgba(212,169,66,.85);border-left:1px solid rgba(212,169,66,.4);border-right:1px solid rgba(212,169,66,.4);border-top:1px solid transparent;--rfs:7s;}
.msrf4{width:88px;height:88px;border-bottom:1px solid rgba(168,85,247,.85);border-left:1px solid rgba(168,85,247,.4);border-right:1px solid rgba(168,85,247,.4);border-top:1px solid transparent;--rfs:9s;animation-direction:reverse;}
.msrf5{width:98px;height:98px;border-bottom:1px solid rgba(245,198,208,.8);border-left:1px solid rgba(245,198,208,.38);border-right:1px solid rgba(245,198,208,.38);border-top:1px solid transparent;--rfs:11s;}
.msrf6{width:108px;height:108px;border-bottom:1px solid rgba(251,146,60,.8);border-left:1px solid rgba(251,146,60,.38);border-right:1px solid rgba(251,146,60,.38);border-top:1px solid transparent;--rfs:13.5s;animation-direction:reverse;}
</style>
</head>
<body>
<div class="bg"></div>
<script>
/* 별 */
const bg=document.querySelector('.bg');
for(let i=0;i<90;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2+.3;
  const c=['#f5c6d0','#a855f7','#f0eee8','#e8a0b0','#f97316','#fff','#d4a942'];
  s.style.cssText=`width:${sz}px;height:${sz}px;background:${c[Math.floor(Math.random()*c.length)]};left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*4}s;--delay:${Math.random()*6}s;`;
  bg.appendChild(s);
}
</script>

<!-- ══ 메인 씬 ══ -->
<div class="scene">

  <!-- 외부 방사 -->
  <div class="outer-radiance"></div>

  <!-- 토성 링 (구체 뒤) z-index:10 -->
  <div class="ring-system" style="z-index:10;">
    <div class="saturn-ring sr1"></div>
    <div class="saturn-ring sr2"></div>
    <div class="saturn-ring sr3"></div>
    <div class="saturn-ring sr4"></div>
    <div class="saturn-ring sr5"></div>
    <div class="saturn-ring sr6"></div>
  </div>

  <!-- 궤도 라인 6개 (구체 뒤) z-index:15 -->
  <div class="orbit-line ol1" style="z-index:15;"></div>
  <div class="orbit-line ol2" style="z-index:15;"></div>
  <div class="orbit-line ol3" style="z-index:15;"></div>
  <div class="orbit-line ol4" style="z-index:15;"></div>
  <div class="orbit-line ol5" style="z-index:15;"></div>
  <div class="orbit-line ol6" style="z-index:15;"></div>

  <!-- 구체 z-index:20 -->
  <div class="sphere"></div>
  <div class="sphere-hl"></div>

  <!-- 토성 링 전면 (구체 앞) z-index:25 -->
  <div class="ring-front">
    <div class="saturn-ring-front srf1"></div>
    <div class="saturn-ring-front srf2"></div>
    <div class="saturn-ring-front srf3"></div>
    <div class="saturn-ring-front srf4"></div>
    <div class="saturn-ring-front srf5"></div>
    <div class="saturn-ring-front srf6"></div>
  </div>

</div>

<!-- ══ 미니 버전 ══ -->
<div class="mini-scene">

  <!-- 미니 토성 링 (구체 뒤) -->
  <div style="position:absolute;top:50%;left:50%;width:180px;height:180px;transform:translate(-50%,-50%);z-index:10;">
    <div class="mini-sr msr1"></div>
    <div class="mini-sr msr2"></div>
    <div class="mini-sr msr3"></div>
    <div class="mini-sr msr4"></div>
    <div class="mini-sr msr5"></div>
    <div class="mini-sr msr6"></div>
  </div>
