<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole Planet Symbol</title>
<style>
:root{
  --void:#000005;
  --purple:#a855f7;
  --purple-d:#6b21a8;
  --purple-dd:#3b0764;
  --gold:#d4a942;
  --gold-l:#f0c96a;
  --orange:#f97316;
  --orange-l:#fb923c;
  --rose:#e8a0b0;
  --rose-d:#c4687e;
  --white:#f0eee8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--void);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:80px;
  overflow:hidden;
}

/* ── 별 배경 ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;}
@keyframes twinkle{0%{opacity:.04;transform:scale(1);}100%{opacity:.85;transform:scale(1.8);}}

/* ════════════════════════════════════════
   메인 컨테이너
════════════════════════════════════════ */
.bh-scene{
  position:relative;z-index:1;
  width:380px;height:380px;
  display:flex;align-items:center;justify-content:center;
}

/* ════════════════════════════════════════
   1단계 — 우주 배경 방사 (가장 넓은 글로우)
════════════════════════════════════════ */
.space-radiance{
  position:absolute;
  width:480px;height:480px;
  border-radius:50%;
  background:
    radial-gradient(circle,
      transparent 28%,
      rgba(168,85,247,.04) 38%,
      rgba(249,115,22,.06) 48%,
      rgba(232,160,176,.04) 58%,
      rgba(107,33,168,.05) 68%,
      transparent 80%
    );
  animation:spaceRad 6s ease-in-out infinite;
}
@keyframes spaceRad{0%,100%{transform:scale(1);opacity:.7;}50%{transform:scale(1.06);opacity:1;}}

/* ════════════════════════════════════════
   2단계 — 성운 방사 (중간 글로우)
════════════════════════════════════════ */
.nebula-glow{
  position:absolute;
  width:360px;height:200px;
  border-radius:50%;
  background:radial-gradient(ellipse at 50% 50%,
    transparent 35%,
    rgba(249,115,22,.12) 50%,
    rgba(232,160,176,.08) 65%,
    rgba(168,85,247,.06) 78%,
    transparent 90%
  );
  animation:nebulaG 5s ease-in-out infinite;
  transform:rotateX(60deg);
}
@keyframes nebulaG{0%,100%{opacity:.6;}50%{opacity:1;}}

/* ════════════════════════════════════════
   3단계 — 강착원반 시스템
   (rotateX로 수평 눕혀서 행성 링처럼)
════════════════════════════════════════ */
.disk-system{
  position:absolute;
  width:340px;height:340px;
}

.disk-ring{
  position:absolute;
  border-radius:50%;
  top:50%;left:50%;
  animation:diskSpin var(--dur) linear infinite;
}
@keyframes diskSpin{
  from{transform:translate(-50%,-50%) rotateX(78deg) rotate(0deg);}
  to{  transform:translate(-50%,-50%) rotateX(78deg) rotate(360deg);}
}

/* 바깥 희미한 확산 링 */
.dr-outer1{
  width:340px;height:340px;
  border:1.5px solid rgba(249,115,22,.18);
  box-shadow:0 0 20px rgba(249,115,22,.1),0 0 40px rgba(168,85,247,.06);
  --dur:22s;
}
.dr-outer2{
  width:318px;height:318px;
  border:2px solid rgba(232,160,176,.22);
  box-shadow:0 0 16px rgba(232,160,176,.14);
  --dur:18s;animation-direction:reverse;
}
.dr-outer3{
  width:296px;height:296px;
  border:2px solid rgba(249,115,22,.3);
  box-shadow:0 0 14px rgba(249,115,22,.2),0 0 30px rgba(249,115,22,.08);
  --dur:15s;
}
/* 중간 밝아지는 구간 */
.dr-mid1{
  width:274px;height:274px;
  border:2.5px solid rgba(251,146,60,.45);
  box-shadow:0 0 16px rgba(251,146,60,.35),0 0 35px rgba(249,115,22,.15);
  --dur:12s;animation-direction:reverse;
}
.dr-mid2{
  width:252px;height:252px;
  border:3px solid rgba(245,198,208,.6);
  box-shadow:0 0 18px rgba(245,198,208,.5),0 0 40px rgba(232,160,176,.2);
  --dur:10s;
}
/* 가장 밝은 핵심 링 */
.dr-bright1{
  width:230px;height:230px;
  border:4px solid rgba(254,215,170,.9);
  box-shadow:
    0 0 22px rgba(254,215,170,.8),
    0 0 50px rgba(251,146,60,.5),
    0 0 80px rgba(249,115,22,.25),
    0 0 120px rgba(168,85,247,.1);
  --dur:8s;animation-direction:reverse;
}
.dr-bright2{
  width:208px;height:208px;
  border:3.5px solid rgba(249,115,22,.85);
  box-shadow:0 0 20px rgba(249,115,22,.7),0 0 45px rgba(249,115,22,.3);
  --dur:6.5s;
}
/* 안쪽 퍼플 전환 */
.dr-inner1{
  width:186px;height:186px;
  border:3px solid rgba(232,160,176,.7);
  box-shadow:0 0 16px rgba(232,160,176,.55),0 0 35px rgba(168,85,247,.2);
  --dur:5.2s;animation-direction:reverse;
}
.dr-inner2{
  width:164px;height:164px;
  border:2.5px solid rgba(168,85,247,.6);
  box-shadow:0 0 14px rgba(168,85,247,.5),0 0 30px rgba(107,33,168,.25);
  --dur:4.2s;
}
.dr-inner3{
  width:144px;height:144px;
  border:2px solid rgba(107,33,168,.55);
  box-shadow:0 0 12px rgba(107,33,168,.45),0 0 26px rgba(59,7,100,.2);
  --dur:3.4s;animation-direction:reverse;
}
.dr-inner4{
  width:126px;height:126px;
  border:1.5px solid rgba(168,85,247,.35);
  box-shadow:0 0 10px rgba(168,85,247,.28);
  --dur:2.8s;
}

/* ════════════════════════════════════════
   4단계 — 광자 링 (블랙홀 바로 바깥 광환)
════════════════════════════════════════ */
.photon-ring{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:110px;height:110px;
  border-radius:50%;
  /* 골드→오렌지→로즈 그라디언트 링 */
  background:
    radial-gradient(circle,
      transparent 44%,
      rgba(254,215,170,.9) 47%,
      rgba(249,115,22,.95) 52%,
      rgba(232,160,176,.7) 56%,
      rgba(168,85,247,.4) 62%,
      transparent 68%
    );
  box-shadow:
    0 0 0 1px rgba(254,215,170,.3),
    0 0 20px rgba(249,115,22,.7),
    0 0 45px rgba(249,115,22,.4),
    0 0 80px rgba(168,85,247,.2);
  animation:photonPulse 2s ease-in-out infinite;
  z-index:15;
}
@keyframes photonPulse{
  0%,100%{
    box-shadow:0 0 0 1px rgba(254,215,170,.3),0 0 20px rgba(249,115,22,.7),0 0 45px rgba(249,115,22,.4),0 0 80px rgba(168,85,247,.2);
    transform:translate(-50%,-50%) scale(1);
  }
  50%{
    box-shadow:0 0 0 2px rgba(254,215,170,.6),0 0 30px rgba(249,115,22,.95),0 0 65px rgba(249,115,22,.6),0 0 110px rgba(168,85,247,.35);
    transform:translate(-50%,-50%) scale(1.03);
  }
}

/* ════════════════════════════════════════
   5단계 — 중력 렌즈 상단 아치
   (원반이 블랙홀 뒤에서 휘어 올라오는 빛)
════════════════════════════════════════ */
.lens-arc-wrap{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:230px;height:230px;
  border-radius:50%;
  z-index:16;
  /* 상단만 보이게 */
  clip-path:ellipse(115px 58px at 50% 38%);
  pointer-events:none;
}
.lens-arc-wrap::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:
    radial-gradient(ellipse 85% 35% at 50% 35%,
      rgba(254,215,170,1) 0%,
      rgba(251,146,60,.85) 25%,
      rgba(249,115,22,.65) 50%,
      rgba(232,160,176,.35) 72%,
      transparent 90%
    );
  animation:lensArc 3.5s ease-in-out infinite;
}
@keyframes lensArc{0%,100%{opacity:.8;}50%{opacity:1;}}

.lens-arc-wrap2{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:270px;height:270px;
  border-radius:50%;
  z-index:14;
  clip-path:ellipse(135px 66px at 50% 37%);
  pointer-events:none;
}
.lens-arc-wrap2::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:
    radial-gradient(ellipse 75% 28% at 50% 34%,
      rgba(254,215,170,.7) 0%,
      rgba(249,115,22,.5) 35%,
      rgba(232,160,176,.25) 65%,
      rgba(168,85,247,.1) 85%,
      transparent 100%
    );
  animation:lensArc 3.5s ease-in-out infinite .6s;
}

/* ════════════════════════════════════════
   6단계 — 하단 반사 아치
════════════════════════════════════════ */
.lens-bot-wrap{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:210px;height:210px;
  border-radius:50%;
  z-index:17;
  clip-path:ellipse(105px 50px at 50% 64%);
  pointer-events:none;
}
.lens-bot-wrap::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:
    radial-gradient(ellipse 78% 30% at 50% 67%,
      rgba(249,115,22,.85) 0%,
      rgba(232,160,176,.65) 30%,
      rgba(168,85,247,.35) 60%,
      transparent 85%
    );
  animation:lensBotA 3.5s ease-in-out infinite 1s;
}
@keyframes lensBotA{0%,100%{opacity:.65;}50%{opacity:.95;}}

/* ════════════════════════════════════════
   7단계 — 블랙홀 구체 (행성 느낌)
════════════════════════════════════════ */
.bh-sphere{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:96px;height:96px;
  border-radius:50%;
  z-index:20;
  /* 구체 입체감: 3D 구형 쉐이딩 */
  background:
    radial-gradient(circle at 35% 32%,
      rgba(25,5,50,.6) 0%,
      rgba(8,1,18,.85) 30%,
      #000 55%,
      rgba(0,0,0,.98) 75%,
      #000 100%
    );
  /* 구체 바깥 오라 */
  box-shadow:
    0 0 0 2px rgba(168,85,247,.4),
    0 0 0 5px rgba(107,33,168,.2),
    0 0 22px rgba(107,33,168,.7),
    0 0 50px rgba(107,33,168,.45),
    0 0 90px rgba(59,7,100,.3),
    /* 내부 보라 글로우 */
    inset 0 0 20px rgba(107,33,168,.4),
    inset 0 0 40px rgba(59,7,100,.6);
  animation:sphereGlow 2.8s ease-in-out infinite;
}
@keyframes sphereGlow{
  0%,100%{
    box-shadow:
      0 0 0 2px rgba(168,85,247,.4),0 0 0 5px rgba(107,33,168,.2),
      0 0 22px rgba(107,33,168,.7),0 0 50px rgba(107,33,168,.45),0 0 90px rgba(59,7,100,.3),
      inset 0 0 20px rgba(107,33,168,.4),inset 0 0 40px rgba(59,7,100,.6);
  }
  50%{
    box-shadow:
      0 0 0 3px rgba(168,85,247,.65),0 0 0 8px rgba(107,33,168,.3),
      0 0 35px rgba(107,33,168,.95),0 0 75px rgba(107,33,168,.65),0 0 130px rgba(59,7,100,.45),
      inset 0 0 28px rgba(107,33,168,.6),inset 0 0 55px rgba(59,7,100,.8);
  }
}

/* 구체 하이라이트 (행성 반사광) */
.sphere-highlight{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:96px;height:96px;
  border-radius:50%;
  z-index:21;
  /* 왼쪽 상단 은은한 반사 */
  background:radial-gradient(circle at 28% 25%,
    rgba(255,255,255,.12) 0%,
    rgba(232,160,176,.06) 30%,
    transparent 55%
  );
  pointer-events:none;
}

/* ════════════════════════════════════════
   8단계 — 원반 앞쪽 가림 (구체 앞으로 오는 원반)
════════════════════════════════════════ */
.disk-front{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:340px;height:340px;
  z-index:22;
  pointer-events:none;
}
.disk-front-ring{
  position:absolute;
  border-radius:50%;
  top:50%;left:50%;
  /* 아래쪽만 보이게 clip */
  clip-path:ellipse(50% 50% at 50% 50%);
}
/* 전면 원반: 하단 절반만 그려서 구체 앞을 지나가게 */
.dfr1{
  width:230px;height:230px;
  animation:dfSpin 8s linear infinite reverse;
  border-top:none;
}
@keyframes dfSpin{
  from{transform:translate(-50%,-50%) rotateX(78deg) rotate(0deg);}
  to{  transform:translate(-50%,-50%) rotateX(78deg) rotate(360deg);}
}
.dfr1::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:4px solid transparent;
  border-bottom:4px solid rgba(254,215,170,.85);
  border-left:4px solid rgba(251,146,60,.6);
  border-right:4px solid rgba(251,146,60,.6);
  box-shadow:0 0 18px rgba(254,215,170,.6),0 0 40px rgba(249,115,22,.35);
}

/* ════════════════════════════════════════
   9단계 — 방사 광선 (코로나 방출)
════════════════════════════════════════ */
.corona-rays{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:360px;height:360px;
  z-index:8;
  animation:coronaSpin 40s linear infinite;
}
@keyframes coronaSpin{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}
.corona-rays svg{width:100%;height:100%;}

/* ════════════════════════════════════════
   10단계 — 외곽 파티클
════════════════════════════════════════ */
.particle{
  position:absolute;
  border-radius:50%;
  top:50%;left:50%;
  transform-origin:0 0;
  animation:partPull var(--pp) var(--pd) ease-in infinite;
}
@keyframes partPull{
  0%{opacity:1;transform:rotate(var(--pa)) translateX(var(--pr)) scale(1);}
  100%{opacity:0;transform:rotate(calc(var(--pa) + 720deg)) translateX(4px) scale(0);}
}

/* ════════════════════════════════════════
   미니 버전
════════════════════════════════════════ */
.bh-mini-scene{
  position:relative;z-index:1;
  width:150px;height:100px;
  display:flex;align-items:center;justify-content:center;
}
.mini-disk-ring{
  position:absolute;border-radius:50%;top:50%;left:50%;
  animation:miniDisk var(--md) linear infinite;
}
@keyframes miniDisk{
  from{transform:translate(-50%,-50%) rotateX(78deg) rotate(0deg);}
  to{  transform:translate(-50%,-50%) rotateX(78deg) rotate(360deg);}
}
.md1{width:148px;height:148px;border:1.5px solid rgba(249,115,22,.25);--md:18s;}
.md2{width:134px;height:134px;border:2px solid rgba(249,115,22,.4);--md:14s;animation-direction:reverse;}
.md3{width:120px;height:120px;border:2px solid rgba(245,198,208,.55);--md:11s;}
.md4{width:106px;height:106px;border:2.5px solid rgba(254,215,170,.8);box-shadow:0 0 10px rgba(254,215,170,.6),0 0 24px rgba(251,146,60,.35);--md:8.5s;animation-direction:reverse;}
.md5{width:92px;height:92px;border:2px solid rgba(249,115,22,.7);box-shadow:0 0 9px rgba(249,115,22,.55);--md:6.5s;}
.md6{width:78px;height:78px;border:1.8px solid rgba(232,160,176,.6);box-shadow:0 0 8px rgba(232,160,176,.45);--md:5s;animation-direction:reverse;}
.md7{width:64px;height:64px;border:1.5px solid rgba(168,85,247,.5);box-shadow:0 0 7px rgba(168,85,247,.4);--md:3.8s;}

.mini-photon{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:46px;height:46px;border-radius:50%;
  background:radial-gradient(circle,transparent 42%,rgba(254,215,170,.85) 46%,rgba(249,115,22,.9) 51%,rgba(232,160,176,.6) 56%,transparent 64%);
  box-shadow:0 0 12px rgba(249,115,22,.6),0 0 28px rgba(249,115,22,.3);
  animation:photonPulse 2s ease-in-out infinite;
  z-index:15;
}

.mini-lens-top{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:96px;height:96px;border-radius:50%;
  z-index:16;clip-path:ellipse(48px 24px at 50% 38%);pointer-events:none;
}
.mini-lens-top::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(ellipse 85% 35% at 50% 35%,rgba(254,215,170,1) 0%,rgba(251,146,60,.8) 30%,rgba(249,115,22,.5) 60%,transparent 90%);
  animation:lensArc 3.5s ease-in-out infinite;
}
.mini-lens-bot{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:88px;height:88px;border-radius:50%;
  z-index:17;clip-path:ellipse(44px 22px at 50% 63%);pointer-events:none;
}
.mini-lens-bot::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(ellipse 78% 30% at 50% 66%,rgba(249,115,22,.8) 0%,rgba(232,160,176,.6) 35%,rgba(168,85,247,.3) 65%,transparent 90%);
  animation:lensBotA 3.5s ease-in-out infinite 1s;
}
.mini-sphere{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:38px;height:38px;border-radius:50%;z-index:20;
  background:radial-gradient(circle at 35% 32%,rgba(25,5,50,.6) 0%,rgba(8,1,18,.85) 30%,#000 55%,rgba(0,0,0,.98) 100%);
  box-shadow:0 0 0 1.5px rgba(168,85,247,.4),0 0 10px rgba(107,33,168,.7),0 0 24px rgba(107,33,168,.4),0 0 45px rgba(59,7,100,.25),inset 0 0 10px rgba(107,33,168,.4);
  animation:sphereGlow 2.8s ease-in-out infinite;
}
.mini-sphere-hl{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:38px;height:38px;border-radius:50%;z-index:21;
  background:radial-gradient(circle at 28% 25%,rgba(255,255,255,.12) 0%,transparent 50%);
  pointer-events:none;
}
</style>
</head>
<body>
<div class="bg"></div>
<script>
/* 별 생성 */
const bg=document.querySelector('.bg');
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2+.3;
  const c=['#fed7aa','#e8a0b0','#a855f7','#f0eee8','#f97316','#ffffff'];
  s.style.cssText=`width:${sz}px;height:${sz}px;background:${c[Math.floor(Math.random()*c.length)]};left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*4}s;--delay:${Math.random()*6}s;`;
  bg.appendChild(s);
}

/* 파티클 생성 */
const scene=document.querySelector('.bh-scene');
const pColors=['#f0c96a','#f97316','#e8a0b0','#a855f7','#fb923c'];
for(let i=0;i<20;i++){
  const p=document.createElement('div');
  p.className='particle';
  const angle=Math.random()*360;
  const radius=90+Math.random()*80;
  const size=Math.random()*3+1;
  const col=pColors[Math.floor(Math.random()*pColors.length)];
  p.style.cssText=`
    width:${size}px;height:${size}px;
    background:${col};
    box-shadow:0 0 ${size*3}px ${col};
    --pa:${angle}deg;--pr:${radius}px;
    --pp:${1.5+Math.random()*2.5}s;
    --pd:${Math.random()*3}s;
  `;
  scene.appendChild(p);
}
</script>

<!-- ══ 메인 블랙홀 ══ -->
<div class="bh-scene">

  <!-- 우주 방사 -->
  <div class="space-radiance"></div>
  <div class="nebula-glow"></div>

  <!-- 코로나 방사 광선 -->
  <div class="corona-rays">
    <svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="rayBlur"><feGaussianBlur stdDeviation="3"/></filter>
        <radialGradient id="rayGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#f97316" stop-opacity=".0"/>
          <stop offset="40%" stop-color="#f97316" stop-opacity=".0"/>
          <stop offset="65%" stop-color="#f97316" stop-opacity=".35"/>
          <stop offset="80%" stop-color="#e8a0b0" stop-opacity=".2"/>
          <stop offset="100%" stop-color="#a855f7" stop-opacity=".05"/>
        </radialGradient>
      </defs>
      <!-- 배경 방사 원 -->
