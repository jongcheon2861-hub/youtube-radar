<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YTAnalytics Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#05050d;--bg1:#0d0d1e;--bg2:#141428;--bg3:#1e1e38;
  --acc:#7c5cfc;--acc2:#fc5c7d;--acc3:#00d4aa;
  --txt:#eeeef8;--txt2:#8888bb;
  --gold:#ffd700;--orange:#ff8c00;
  --left-w:220px;--right-w:290px;--header-h:64px;
  --radius:14px;
}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg0);color:var(--txt);overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:var(--acc);border-radius:3px}

/* HEADER */
#hdr{position:sticky;top:0;z-index:200;height:var(--header-h);background:rgba(5,5,13,.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(124,92,252,.2);display:flex;align-items:center;gap:12px;padding:0 18px}
#logo{font-size:22px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#fc5c7d,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;flex-shrink:0}
#hdrSearch{flex:1;max-width:520px;display:flex;gap:8px;align-items:center;background:var(--bg2);border:1px solid rgba(124,92,252,.3);border-radius:40px;padding:0 16px;transition:.2s}
#hdrSearch:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,92,252,.15)}
#hdrSearch input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:14px;padding:10px 0}
#hdrSearch button{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:20px;color:#fff;padding:7px 18px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;transition:.2s}
#hdrSearch button:hover{transform:scale(1.05);box-shadow:0 4px 14px rgba(124,92,252,.5)}
#hdrRight{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdrBtn{background:var(--bg2);border:1px solid rgba(124,92,252,.25);border-radius:8px;color:var(--txt2);padding:7px 14px;cursor:pointer;font-size:12px;font-weight:600;transition:.2s}
.hdrBtn:hover{border-color:var(--acc);color:var(--acc)}

/* LAYOUT */
#layout{display:flex;min-height:calc(100vh - var(--header-h));padding-right:var(--right-w)}

/* SIDEBAR */
#sidebar{width:var(--left-w);flex-shrink:0;background:var(--bg1);border-right:1px solid rgba(124,92,252,.12);display:flex;flex-direction:column;position:sticky;top:var(--header-h);height:calc(100vh - var(--header-h));overflow-y:auto}
.navItem{display:flex;align-items:center;gap:10px;padding:13px 18px;cursor:pointer;color:var(--txt2);font-size:14px;font-weight:500;border-left:3px solid transparent;transition:.2s}
.navItem:hover{background:rgba(124,92,252,.09);color:var(--txt);border-left-color:rgba(124,92,252,.4)}
.navItem.active{background:rgba(124,92,252,.16);color:var(--acc);border-left-color:var(--acc);font-weight:700}
.navItem .ni{font-size:18px;width:22px;text-align:center}
#sideAd{padding:14px;margin-top:auto}
.sideAdBox{background:var(--bg2);border:1px solid rgba(124,92,252,.18);border-radius:var(--radius);padding:10px;text-align:center;color:var(--txt2);font-size:11px;min-height:120px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}

/* MAIN */
#main{flex:1;padding:22px 24px;overflow-x:hidden;min-width:0}
.section{display:none}.section.active{display:block}
.secAdBanner{background:linear-gradient(90deg,rgba(124,92,252,.07),rgba(252,92,125,.07));border:1px solid rgba(124,92,252,.15);border-radius:var(--radius);padding:10px 18px;margin-bottom:22px;text-align:center;min-height:90px;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:12px}
.secTitle{font-size:20px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px}

/* TYPE FILTER */
.typeFilter{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tfBtn{background:var(--bg2);border:1px solid rgba(124,92,252,.22);border-radius:30px;color:var(--txt2);padding:8px 20px;cursor:pointer;font-size:13px;font-weight:700;transition:.25s;position:relative;overflow:hidden}
.tfBtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--acc),var(--acc2));opacity:0;transition:.25s}
.tfBtn:hover{color:var(--txt);border-color:var(--acc)}
.tfBtn.on{color:#fff;border-color:transparent;box-shadow:0 0 18px rgba(124,92,252,.6)}
.tfBtn.on::before{opacity:1}
.tfBtn span{position:relative;z-index:1}

/* CATEGORY TABS */
.catTabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.catTab{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:20px;color:var(--txt2);padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600;transition:.2s}
.catTab:hover{border-color:var(--acc2);color:var(--txt)}
.catTab.on{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border-color:transparent}

/* VIDEO GRID 3D */
.vidGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;margin-bottom:20px}
.vidCard{background:var(--bg1);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;cursor:pointer;transition:.35s;position:relative;transform-style:preserve-3d;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.vidCard:hover{transform:perspective(700px) rotateY(-6deg) rotateX(3deg) translateY(-6px) scale(1.02);border-color:rgba(124,92,252,.5);box-shadow:0 16px 48px rgba(0,0,0,.65)}
.vidThumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:.35s}
.vidCard:hover .vidThumb{transform:scale(1.04)}
.vidInfo{padding:12px 14px}
.vidTitle{font-size:12px;font-weight:600;line-height:1.45;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vidStatRow{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.vidStat{font-size:10px;color:var(--txt2);display:flex;align-items:center;gap:3px}
.vidStat b{color:var(--txt);font-size:11px}
.vidBadge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:800;flex-shrink:0}
.badge-shorts{background:linear-gradient(135deg,#ff416c,#ff1744);color:#fff;box-shadow:0 0 8px rgba(255,65,108,.5)}
.badge-long{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.viralBar{margin-top:6px}
.viralLabel{display:flex;justify-content:space-between;font-size:10px;color:var(--txt2);margin-bottom:3px}
.viralBg{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.viralFill{height:100%;border-radius:3px;background:linear-gradient(90deg,#00d4aa,#7c5cfc,#fc5c7d);background-size:200% 100%;animation:viralShimmer 2s linear infinite}
@keyframes viralShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.viralScore{font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px}
.vs-hot{background:rgba(255,65,108,.2);color:#ff416c}
.vs-warm{background:rgba(255,140,0,.2);color:#ff8c00}
.vs-normal{background:rgba(124,92,252,.2);color:var(--acc)}

/* PAGINATION */
.pagRow{display:flex;gap:8px;justify-content:center;margin-top:18px}
.pagBtn{background:var(--bg2);border:1px solid rgba(124,92,252,.22);border-radius:8px;color:var(--txt2);padding:8px 18px;cursor:pointer;font-size:13px;transition:.2s}
.pagBtn:hover{border-color:var(--acc);color:var(--acc)}
.pagBtn:disabled{opacity:.3;cursor:default}

/* KEYWORD RESULTS */
.kwTypeFilter{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.kwResTitle{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--acc)}
.kwNoResult{color:var(--txt2);font-size:14px;padding:30px;text-align:center}

/* CHANNEL ANALYSIS */
#chInput{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
#chInput input{flex:1;min-width:220px;background:var(--bg2);border:1px solid rgba(124,92,252,.3);border-radius:12px;color:var(--txt);padding:12px 18px;font-size:14px;outline:none;transition:.2s}
#chInput input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,92,252,.2)}
#chInput button{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:12px;color:#fff;padding:12px 26px;cursor:pointer;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(124,92,252,.45);transition:.2s}
#chInput button:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,92,252,.6)}
#chResult{margin-top:8px}

/* ====== GRADE ORB 3D ====== */
.grade-stage{display:flex;flex-direction:column;align-items:center;gap:10px;margin:0 auto 28px;perspective:1000px}
.grade-orb-3d{
  position:relative;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:transform .4s, box-shadow .6s;
  transform-style:preserve-3d;
  animation:orbFloat 4s ease-in-out infinite;
}
.grade-orb-3d:hover{transform:scale(1.12) rotateY(20deg)!important}
@keyframes orbFloat{0%,100%{transform:translateY(0) rotateY(0deg)}50%{transform:translateY(-10px) rotateY(10deg)}}

/* 레벨별 크기·파티클·링 */
.orb-lv1{width:110px;height:110px;font-size:0}
.orb-lv2{width:116px;height:116px;font-size:0}
.orb-lv3{width:122px;height:122px;font-size:0}
.orb-lv4{width:128px;height:128px;font-size:0}
.orb-lv5{width:134px;height:134px;font-size:0}
.orb-lv6{width:140px;height:140px;font-size:0}
.orb-lv7{width:146px;height:146px;font-size:0}
.orb-lv8{width:152px;height:152px;font-size:0}
.orb-lv9{width:158px;height:158px;font-size:0}
.orb-lv10{width:168px;height:168px;font-size:0}

/* 링 */
.orb-ring{
  position:absolute;border-radius:50%;
  border-style:solid;
  animation:orbRingPulse 2.5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes orbRingPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.08);opacity:1}}

/* 내부 반사 */
.orb-glare{
  position:absolute;top:14%;left:16%;
  width:30%;height:24%;
  background:radial-gradient(ellipse,rgba(255,255,255,.72) 0%,transparent 80%);
  border-radius:50%;
  pointer-events:none;
  transform:rotate(-25deg);
}

/* 파티클 */
.orb-particles{position:absolute;inset:0;border-radius:50%;pointer-events:none;overflow:visible}
.orb-p{
  position:absolute;border-radius:50%;
  animation:orbParticle linear infinite;
}
@keyframes orbParticle{
  0%{transform:translate(0,0) scale(1);opacity:.9}
  100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0}
}

/* XP BAR */
.xp-section{width:100%;max-width:420px;margin-bottom:24px}
.xp-label{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:7px;color:var(--txt2)}
.xp-bar-bg{height:16px;background:rgba(255,255,255,.06);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
.xp-bar-fill{height:100%;border-radius:8px;transition:width .9s cubic-bezier(.17,.67,.4,1.2);position:relative}
.xp-bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:xpScan 1.8s linear infinite}
@keyframes xpScan{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

/* CH CARD */
.ch-card{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:26px;box-shadow:0 10px 50px rgba(0,0,0,.6);max-width:800px;margin:0 auto}
.ch-header{display:flex;gap:18px;align-items:center;margin-bottom:24px}
.ch-avatar{width:82px;height:82px;border-radius:50%;object-fit:cover}
.ch-info{flex:1}.ch-name{font-size:21px;font-weight:800;margin-bottom:4px}.ch-handle{font-size:13px;color:var(--txt2);margin-bottom:8px}
.ch-desc{font-size:12px;color:var(--txt2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-box{background:var(--bg3);border-radius:14px;padding:16px;text-align:center;border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden;transition:.25s}
.stat-box:hover{transform:translateY(-3px)}
.stat-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--sb-c,rgba(124,92,252,.12)),transparent 65%)}
.stat-val{font-size:24px;font-weight:900;color:var(--sb-c,var(--acc));margin-bottom:3px;position:relative}
.stat-lbl{font-size:11px;color:var(--txt2);font-weight:600;position:relative}
.metric-section{margin-bottom:22px}
.metric-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--txt2)}
.metric-row{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.metric-label{font-size:12px;font-weight:600;color:var(--txt2);width:90px;flex-shrink:0}
.metric-bar-bg{flex:1;height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden}
.metric-bar-fill{height:100%;border-radius:5px;transition:width .9s cubic-bezier(.17,.67,.4,1.2)}
.metric-val{font-size:12px;font-weight:700;width:46px;text-align:right;flex-shrink:0}
.algo-notice{background:linear-gradient(135deg,rgba(0,212,170,.09),rgba(124,92,252,.09));border:1px solid rgba(0,212,170,.28);border-radius:13px;padding:14px 18px;font-size:12px;color:var(--acc3);line-height:1.75;margin-bottom:22px;display:flex;gap:10px;align-items:flex-start}
.bench-section{margin-bottom:22px}
.bench-title{font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:10px}
.bench-row{display:flex;justify-content:space-between;font-size:12px;padding:9px 13px;border-radius:9px;background:rgba(255,255,255,.04);margin-bottom:6px}
.bench-row.highlight{background:rgba(124,92,252,.14);font-weight:700}

/* GRADE TABLE */
.grade3d-table{width:100%;border-collapse:separate;border-spacing:0 5px}
.grade3d-table th{font-size:11px;color:var(--txt2);padding:6px 12px;text-align:left}
.grade3d-table td{padding:10px 12px;font-size:12px;background:rgba(255,255,255,.04);transition:.2s}
.grade3d-table td:first-child{border-radius:8px 0 0 8px}
.grade3d-table td:last-child{border-radius:0 8px 8px 0}
.grade3d-table tr{cursor:pointer;transition:.2s}
.grade3d-table tr:hover td{background:rgba(255,255,255,.08)}
.grade3d-table tr.gCurrent td{font-weight:700}
.gBadge{display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:800;border:1.5px solid currentColor;white-space:nowrap}

/* GRADE PREVIEW MODAL */
#gradePreviewModal{display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);align-items:center;justify-content:center}
#gradePreviewModal.open{display:flex}
#gradePreviewBox{background:var(--bg2);border-radius:24px;padding:40px 36px;text-align:center;position:relative;max-width:420px;width:92%;border:1px solid rgba(255,255,255,.1)}
#gradePreviewClose{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
#gradePreviewClose:hover{background:var(--acc2)}
#gradePreviewOrbWrap{width:200px;height:200px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
#gradePreviewLv{font-size:32px;font-weight:900;margin-bottom:6px}
#gradePreviewDesc{font-size:13px;color:var(--txt2);line-height:1.7;margin-top:12px}

/* TOOLS */
.toolTabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.toolTab{background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:20px;color:var(--txt2);padding:7px 16px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.toolTab:hover{border-color:var(--acc2);color:var(--txt)}
.toolTab.on{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border-color:transparent}
.toolGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.toolCard{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:8px;transition:.2s;cursor:pointer;text-decoration:none;color:var(--txt)}
.toolCard:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toolIcon{font-size:28px}.toolName{font-size:14px;font-weight:700}.toolDesc{font-size:11px;color:var(--txt2);line-height:1.5}
.toolBadge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;width:fit-content}
.tb-free{background:rgba(0,212,170,.18);color:var(--acc3)}.tb-paid{background:rgba(252,92,125,.18);color:var(--acc2)}.tb-freemium{background:rgba(255,215,0,.18);color:var(--gold)}

/* AI IDEAS */
.ideaGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.ideaCard{
  background:var(--bg2);border:2px solid rgba(255,255,255,.07);
  border-radius:16px;padding:20px;cursor:pointer;transition:.28s;
  position:relative;overflow:hidden;
}
.ideaCard::before{content:'';position:absolute;inset:0;opacity:0;transition:.3s;background:linear-gradient(135deg,rgba(124,92,252,.12),rgba(252,92,125,.08))}
.ideaCard:hover{border-color:var(--acc);box-shadow:0 0 24px rgba(124,92,252,.3);transform:translateY(-3px)}
.ideaCard:hover::before{opacity:1}
.ideaCard.picked{border-color:var(--gold);box-shadow:0 0 28px rgba(255,215,0,.45)}
.ideaTag{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:700;margin-bottom:10px;display:inline-block;background:rgba(124,92,252,.2);color:var(--acc);position:relative}
.ideaTitle{font-size:15px;font-weight:800;line-height:1.5;margin-bottom:8px;position:relative}
.ideaPreview{font-size:12px;color:var(--txt2);line-height:1.6;position:relative;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ideaClickHint{font-size:11px;color:var(--acc);margin-top:10px;position:relative;font-weight:600;display:flex;align-items:center;gap:4px}
.ideaActions{display:flex;gap:8px;margin-top:12px;position:relative}
.ideaBtn{flex:1;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--txt2);padding:6px;cursor:pointer;font-size:11px;font-weight:600;transition:.2s;text-align:center}
.ideaBtn:hover{border-color:var(--acc);color:var(--acc)}

/* IDEA DETAIL MODAL */
#ideaModal{display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.9);backdrop-filter:blur(14px);align-items:center;justify-content:center}
#ideaModal.open{display:flex}
#ideaModalBox{background:var(--bg2);border-radius:22px;padding:36px;max-width:600px;width:94%;position:relative;border:1px solid rgba(124,92,252,.3);max-height:86vh;overflow-y:auto}
#ideaModalClose{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
#ideaModalClose:hover{background:var(--acc2)}
.ideaModalTag{font-size:12px;padding:4px 12px;border-radius:12px;font-weight:700;background:rgba(124,92,252,.22);color:var(--acc);display:inline-block;margin-bottom:14px}
.ideaModalTitle{font-size:22px;font-weight:900;margin-bottom:16px;line-height:1.4}
.ideaModalSection{margin-bottom:18px}
.ideaModalSectionTitle{font-size:13px;font-weight:800;color:var(--acc2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ideaModalBody{font-size:13px;color:var(--txt2);line-height:1.8}
.ideaModalList{padding-left:18px}
.ideaModalList li{font-size:13px;color:var(--txt2);line-height:1.8;margin-bottom:4px}
.ideaModalActions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.ideaModalBtn{flex:1;min-width:120px;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:10px;color:#fff;padding:11px;cursor:pointer;font-size:13px;font-weight:700;transition:.2s}
.ideaModalBtn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,92,252,.5)}
.ideaModalBtn.secondary{background:var(--bg3);border:1px solid rgba(255,255,255,.12);color:var(--txt2)}
.ideaModalBtn.secondary:hover{border-color:var(--acc);color:var(--acc)}

/* REVENUE */

/* ========== BUILD ORB HTML ========== */
function buildOrbHTML(g, size=150, animated=true){
  const r1 = size*0.14, r2 = size*0.22;
  // 파티클 수 = 레벨 * 2
  let particles = '';
  const pCount = g.lv * 2;
  for(let i=0;i<pCount;i++){
    const angle = (360/pCount)*i;
    const dist = size*0.52 + Math.random()*size*0.18;
    const px = Math.cos(angle*Math.PI/180)*dist;
    const py = Math.sin(angle*Math.PI/180)*dist;
    const ps = 2+Math.random()*4;
    const dur = 1.5+Math.random()*2.5;
    const delay = Math.random()*2;
    particles += `<div class="orb-p" style="width:${ps}px;height:${ps}px;background:${g.color};left:calc(50% - ${ps/2}px);top:calc(50% - ${ps/2}px);--px:${px}px;--py:${py}px;animation-duration:${dur}s;animation-delay:${delay}s;filter:blur(1px)"></div>`;
  }
  // 링 수 = 레벨에 따라 증가
  let rings = '';
  const ringCount = Math.ceil(g.lv/2);
  for(let i=0;i<ringCount;i++){
    const rs = size + (i+1)*(g.ring2-g.ring1)/(ringCount) + 10;
    const bw = 1+i*0.5;
    const op = 0.6 - i*0.1;
    const delay = i*0.4;
    rings += `<div class="orb-ring" style="width:${rs}px;height:${rs}px;border-width:${bw}px;border-color:${g.color};opacity:${op};left:${(size-rs)/2}px;top:${(size-rs)/2}px;animation-delay:${delay}s;filter:blur(${i*0.5}px)"></div>`;
  }
  const animClass = animated ? `orb-lv${g.lv}` : '';
  return `
  <div class="grade-orb-3d ${animClass}" style="
    width:${size}px;height:${size}px;
    background:radial-gradient(circle at 33% 30%,rgba(255,255,255,.5),${g.color} 50%,${g.dark} 88%);
    box-shadow:0 0 0 ${r1}px rgba(255,255,255,.06),0 0 0 ${r2}px ${g.glow},0 0 ${g.blur}px ${g.spread}px ${g.glow},inset 0 -10px 28px rgba(0,0,0,.5),inset 0 10px 24px rgba(255,255,255,.28);
  ">
    ${rings}
    <div class="orb-particles">${particles}</div>
    <div class="orb-glare"></div>
  </div>`;
}

const CAT_MAP = {'전체':'','게임':'20','음악':'10','스포츠':'17','뷰티':'26','엔터':'24','뉴스':'25','과학':'28','자동차':'2'};

/* ========== UTILITY ========== */
function fmtNum(n){
  n=parseInt(n)||0;
  if(n>=100000000) return (n/100000000).toFixed(1)+'억';
  if(n>=10000) return Math.floor(n/10000)+'만';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}
function fmtAgo(iso){
  if(!iso) return '';
  const diff=(Date.now()-new Date(iso).getTime())/1000;
  if(diff<3600) return Math.floor(diff/60)+'분 전';
  if(diff<86400) return Math.floor(diff/3600)+'시간 전';
  if(diff<2592000) return Math.floor(diff/86400)+'일 전';
  if(diff<31536000) return Math.floor(diff/2592000)+'개월 전';
  return Math.floor(diff/31536000)+'년 전';
}
function isShortsDur(dur){
  if(!dur) return false;
  const m=dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return false;
  const h=parseInt(m[1]||0),mn=parseInt(m[2]||0),s=parseInt(m[3]||0);
  return (h*3600+mn*60+s)>0&&(h*3600+mn*60+s)<=60;
}
function calcViral(v){
  const st=v.statistics||{};
  const views=parseInt(st.viewCount)||0;
  const likes=parseInt(st.likeCount)||0;
  const comments=parseInt(st.commentCount)||0;
  if(!views) return 0;
  const er=(likes+comments*2)/views;
  let score=Math.min(100,Math.round(er*2000));
  if(views>10000000) score=Math.min(100,score+20);
  else if(views>1000000) score=Math.min(100,score+12);
  else if(views>100000) score=Math.min(100,score+5);
  return score;
}

/* ========== VIDEO CARD ========== */
function vidCardHTML(v){
  const id=v.id;
  const sn=v.snippet||{};
  const st=v.statistics||{};
  const dur=v.contentDetails?.duration||'';
  const isS=isShortsDur(dur);
  const thumb=sn.thumbnails?.medium?.url||sn.thumbnails?.default?.url||'';
  const title=(sn.title||'').replace(/'/g,"&#39;");
  const views=fmtNum(st.viewCount);
  const likes=fmtNum(st.likeCount);
  const ago=fmtAgo(sn.publishedAt);
  const viral=calcViral(v);
  const vc=viral>=70?'vs-hot':viral>=40?'vs-warm':'vs-normal';
  const vl=viral>=70?'🔥 핫바이럴':viral>=40?'⚡ 상승중':'📊 일반';

}

/* ========== CHANNEL ANALYSIS ========== */
async function resolveChannelId(input){
  input=input.trim();
  if(/^UC[a-zA-Z0-9_-]{22}$/.test(input)) return input;
  const m=input.match(/youtube\.com\/channel\/(UC[a-zA-Z0-9_-]{22})/);
  if(m) return m[1];
  let handle=input;
  const hm=input.match(/youtube\.com\/(@[^/?]+)/);
  if(hm) handle=hm[1];
  if(handle.startsWith('@')){
    const r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${encodeURIComponent(handle)}&key=${getKey()}`);
    if(r.status===403||r.status===429) nextKey();
    const d=await r.json();
    if(d.items&&d.items.length) return d.items[0].id;
  }
  const sp=new URLSearchParams({part:'snippet',q:input,type:'channel',maxResults:'1',key:getKey()});
  const sr=await fetch('https://www.googleapis.com/youtube/v3/search?'+sp);
  if(sr.status===403||sr.status===429) nextKey();
  const sd=await sr.json();
  if(sd.items&&sd.items.length) return sd.items[0].id.channelId||sd.items[0].snippet?.channelId;
  return null;
}

async function analyzeChannel(){
  const input=document.getElementById('chUrlInput').value.trim();
  if(!input){alert('채널 URL, @핸들 또는 채널명을 입력하세요.');return;}
  const res=document.getElementById('chResult');
  res.innerHTML='<div style="color:var(--txt2);padding:30px;text-align:center;font-size:14px">⏳ 채널 분석 중...</div>';

    if(!cid){res.innerHTML='<div style="color:var(--acc2);padding:20px">⚠️ 채널을 찾을 수 없습니다.</div>';return;}
    const cp=new URLSearchParams({part:'snippet,statistics,brandingSettings',id:cid,key:getKey()});
    const cr=await fetch('https://www.googleapis.com/youtube/v3/channels?'+cp);
    if(cr.status===403||cr.status===429) nextKey();
    const cd=await cr.json();
    if(!cd.items||!cd.items.length){res.innerHTML='<div style="color:var(--acc2);padding:20px">⚠️ 채널 데이터를 가져올 수 없습니다.</div>';return;}
    const ch=cd.items[0];
    const vp=new URLSearchParams({part:'snippet',channelId:cid,order:'date',maxResults:'12',type:'video',key:getKey()});
    const vr=await fetch('https://www.googleapis.com/youtube/v3/search?'+vp);
    let vids=[];
    if(vr.ok){
      const vd=await vr.json();
      if(vd.items&&vd.items.length){
        const vids2=vd.items.map(i=>i.id?.videoId).filter(Boolean);
        if(vids2.length){
          const dp=new URLSearchParams({part:'snippet,contentDetails,statistics',id:vids2.join(','),key:getKey()});
          const dr=await fetch('https://www.googleapis.com/youtube/v3/videos?'+dp);
          const dd=await dr.json();
          vids=dd.items||[];
        }

    chAnalysisCount++;

  }
}

function calcScore(ch,vids){
  const st=ch.statistics||{};
  const subs=parseInt(st.subscriberCount)||0;
  const totalViews=parseInt(st.viewCount)||0;
  const videoCount=parseInt(st.videoCount)||1;
  let subScore=0;
  if(subs>=10000000) subScore=25;
  else if(subs>=1000000) subScore=22;
  else if(subs>=100000) subScore=18;
  else if(subs>=10000) subScore=13;
  else if(subs>=1000) subScore=8;
  else subScore=3;
  const avgViews=totalViews/(videoCount||1);
  let viewScore=0;
  if(avgViews>=5000000) viewScore=25;
  else if(avgViews>=1000000) viewScore=22;
  else if(avgViews>=500000) viewScore=18;
  else if(avgViews>=100000) viewScore=13;
  else if(avgViews>=10000) viewScore=8;
  else viewScore=3;
  let engScore=12;
  if(vids.length){
    const tEng=vids.reduce((a,v)=>a+(parseInt(v.statistics?.likeCount)||0)+(parseInt(v.statistics?.commentCount)||0),0);
    const tVV=vids.reduce((a,v)=>a+(parseInt(v.statistics?.viewCount)||0),0);
    const er=tVV>0?(tEng/tVV)*100:0;
    if(er>=5) engScore=25; else if(er>=3) engScore=21; else if(er>=1) engScore=16; else if(er>=0.5) engScore=11; else engScore=5;
  }
  let conScore=12;
  if(vids.length>=2){
    const dates=vids.map(v=>new Date(v.snippet?.publishedAt||Date.now())).sort((a,b)=>b-a);
    const spans=[];
    for(let i=0;i<dates.length-1;i++) spans.push((dates[i]-dates[i+1])/(1000*3600*24));
    const ag=spans.reduce((a,b)=>a+b,0)/spans.length;
    if(ag<=3) conScore=25; else if(ag<=7) conScore=21; else if(ag<=14) conScore=16; else if(ag<=30) conScore=11; else conScore=5;
  }
  return {total:subScore+viewScore+engScore+conScore,subScore,viewScore,engScore,conScore};
}

function renderChannel(ch,vids,res){

  const videoCount=parseInt(st.videoCount)||0;
  const {total,subScore,viewScore,engScore,conScore}=calcScore(ch,vids);

  const avgViews=vids.length?Math.round(vids.reduce((a,v)=>a+(parseInt(v.statistics?.viewCount)||0),0)/vids.length):0;
  const avgLikes=vids.length?Math.round(vids.reduce((a,v)=>a+(parseInt(v.statistics?.likeCount)||0),0)/vids.length):0;

  const xpPct=Math.min(100,Math.round(((total-grade.min)/(grade.max-grade.min))*100));

function closeIdeaModal(){
  document.getElementById('ideaModal').classList.remove('open');
}

function copyIdea(t){
  navigator.clipboard.writeText(t).then(()=>alert('제목이 복사되었습니다!')).catch(()=>alert('복사 실패'));
}

function copyFullIdea(i){
  const idea=IDEAS_DATA[i];
  if(!idea) return;
  const text=`제목: ${idea.title}\n훅: ${idea.hook}\n구성: ${idea.script}\n해시태그: ${idea.tags.join(' ')}\nSEO키워드: ${idea.keywords.join(', ')}\n썸네일: ${idea.thumbnail}\n타이밍: ${idea.timing}`;
  navigator.clipboard.writeText(text).then(()=>alert('전체 전략이 복사되었습니다!')).catch(()=>alert('복사 실패'));
}

/* ========== REVENUE CALCULATOR ========== */
function calcRevenue(){
  const views=parseInt(document.getElementById('ri-views')?.value)||100000;
  const rpm=parseFloat(document.getElementById('ri-cat')?.value)||3.5;
  const mult=parseFloat(document.getElementById('ri-mult')?.value)||0.55;
  const sc=parseInt(document.getElementById('ri-sc')?.value)||0;
  const ppv=parseInt(document.getElementById('ri-ppv')?.value)||0;
  const adRev=Math.round((views/1000)*rpm*mult);
  const totalMon=adRev+sc+ppv;
  const totalYear=totalMon*12;
  const perVid=Math.round(totalMon/Math.max(1,4));
  const rEl=document.getElementById('revResults');
  if(!rEl) return;
  rEl.innerHTML=`
    <div class="revBox rb1"><div class="rv-val" style="color:var(--acc)">₩${totalMon.toLocaleString()}</div><div class="rv-lbl">월 예상 수익</div></div>
    <div class="revBox rb2"><div class="rv-val" style="color:var(--gold)">₩${totalYear.toLocaleString()}</div><div class="rv-lbl">연간 예상 수익</div></div>
    <div class="revBox rb3"><div class="rv-val" style="color:var(--acc3)">₩${adRev.toLocaleString()}</div><div class="rv-lbl">광고 수익 (월)</div></div>
    <div class="revBox rb4"><div class="rv-val" style="color:var(--acc2)">₩${perVid.toLocaleString()}</div><div class="rv-lbl">영상당 예상 수익</div></div>`;
  const tipEl=document.getElementById('revTip');
  if(tipEl){
    let tip='';
    if(totalMon<100000) tip='💡 월 10만원 달성을 위해 조회수 2배 목표! 쇼츠 병행을 추천합니다.';
    else if(totalMon<500000) tip='🚀 협찬·PPL을 유치하면 수익이 빠르게 증가합니다.';
    else if(totalMon<2000000) tip='🏆 멤버십·슈퍼챗 활성화로 수익 다각화를 추천합니다.';
    else tip='👑 브랜드 채널 분리 및 플랫폼 다각화를 고려하세요.';
    tipEl.textContent=tip;
  }
}
