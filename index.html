<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALGO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Cinzel:wght@900&display=swap" rel="stylesheet" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-AF8853448" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #1e1e2e;
      --bg-hover: #252535;
      --accent: #ff4757;
      --accent2: #ffa502;
      --accent3: #2ed573;
      --accent4: #1e90ff;
      --text-primary: #e8e8f0;
      --text-secondary: #9898b0;
      --text-muted: #606078;
      --border: #2a2a3e;
      --radius: 12px;
      --radius-sm: 8px;
      --surface: var(--bg-secondary);
      --algo-gold: #f0c96a;
      --algo-purple: #7c3aed;
      --algo-rose: #f5c6d0;
      --sidebar-w: 330px;
      --rightcol-w: 368px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 3px; }

    /* ── HEADER ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10,0,22,0.96);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(124,58,237,0.25);
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; text-decoration: none;
    }
    .logo-canvas-wrap canvas { display: block; width: 36px; height: 36px; border-radius: 8px; }
    .logo-text-wrap { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-algo { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 2px; }
    .logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }
    .api-status { font-size: 12px; color: var(--text-muted); }

    /* ── GLOBAL ERROR BANNER ── */
    #global-error-banner {
      position: fixed; top: 60px; left: 0; right: 0; z-index: 99;
      background: #ff4757; color: #fff;
      font-size: 13px; text-align: center;
      padding: 0; max-height: 0; overflow: hidden;
      transition: max-height 0.3s, padding 0.3s;
    }
    #global-error-banner.visible { padding: 8px 16px; max-height: 60px; }

    /* ── LAYOUT ── */
    .app-layout {
      display: flex;
      padding-top: 60px;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed;
      top: 60px; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      z-index: 50;
      padding: 16px 0;
    }
    .sidebar-section-label {
      font-size: 10px; font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 14px 20px 6px;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: 11px 20px;
      background: none; border: none;
      color: var(--text-secondary);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: left;
    }
    .nav-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-btn.active { background: rgba(124,58,237,0.18); color: #a78bfa; }
    .nav-btn .nav-icon { font-size: 18px; width: 22px; text-align: center; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 16px; }

    /* ── MAIN CONTENT ── */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-w);
      margin-right: calc(var(--rightcol-w) + 10px);
      min-width: 0;
      padding: 24px 20px;
    }

    /* ── RIGHT COLUMN ── */
    #rightCol {
      position: fixed;
      top: 60px; right: 0;
      width: var(--rightcol-w);
      height: calc(100vh - 60px);
      overflow-y: auto;
      padding: 16px 12px;
      display: flex; flex-direction: column; gap: 16px;
      border-left: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    /* ── COUPANG BLOCK ── */
    .cp-grad-border {
      border-radius: var(--radius);
      background: linear-gradient(135deg, #7c3aed, #e040aa);
      padding: 2px;
    }
    .cp-inner {
      background: linear-gradient(160deg,#1a0a2e 0%,#2d1060 40%,#0a0a1a 100%);
      border-radius: calc(var(--radius) - 2px);
      padding: 18px 14px;
      text-align: center;
      width: 100%;
    }
    .cp-logo { font-size: 28px; margin-bottom: 6px; }
    .cp-title { font-size: 15px; font-weight: 700; color: var(--algo-gold); margin-bottom: 6px; }
    .cp-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
    .cp-btn {
      display: inline-block;
      background: linear-gradient(90deg,#ff4757,#ff6b81);
      color: #fff; font-size: 13px; font-weight: 700;
      padding: 9px 20px; border-radius: 20px;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .cp-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,71,87,0.4); }
    .cp-disclaimer { font-size: 9px; color: var(--text-muted); margin-top: 10px; line-height: 1.5; }

    /* ── RIGHT ADSENSE ── */
    .right-adsense-wrap {
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
    }
    .right-adsense-wrap ins {
      display: block !important;
      width: 344px !important;
      height: 344px !important;
    }

    /* ── SECTION HEADERS ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 20px; font-weight: 700; color: var(--text-primary);
      display: flex; align-items: center; gap: 8px;
    }
    .section-title .icon { font-size: 22px; }

    /* ── TABS ── */
    .tab-bar {
      display: flex; gap: 8px;
      margin-bottom: 18px;
    }
    .tab-btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: var(--algo-purple);
      border-color: var(--algo-purple);
      color: #fff; font-weight: 600;
    }

    /* ── VIDEO GRID ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .video-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      border: 1px solid var(--border);
    }
    .video-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .video-thumb-wrap { position: relative; padding-bottom: 56.25%; background: #111; }
    .video-thumb-wrap img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    .video-badge {
      position: absolute; top: 6px; right: 6px;
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px;
      background: rgba(0,0,0,0.7); color: #fff;
    }
    .video-badge.shorts { background: #ff0050; }
    .video-badge.long { background: #1e90ff; }
    .video-dur {
      position: absolute; bottom: 5px; right: 6px;
      font-size: 11px; font-weight: 600;
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 1px 5px; border-radius: 3px;
    }
    .video-info { padding: 10px 10px 12px; }
    .video-title { font-size: 13px; font-weight: 500; line-height: 1.45; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .video-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); }

    /* ── LOADER / MORE BTN ── */
    .loader { text-align: center; padding: 30px; color: var(--text-muted); font-size: 14px; }
    .more-btn {
      display: block; margin: 20px auto 0;
      padding: 10px 32px;
      background: rgba(124,58,237,0.2);
      border: 1px solid var(--algo-purple);
      color: #a78bfa;
      border-radius: 24px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px; cursor: pointer;
      transition: background 0.15s;
    }
    .more-btn:hover { background: rgba(124,58,237,0.35); }

    /* ── CHANNEL ANALYSIS ── */
    .ch-search-wrap {
      display: flex; gap: 10px;
      margin-bottom: 20px;
    }
    .ch-search-wrap input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .ch-search-wrap input:focus { border-color: var(--algo-purple); }
    .ch-search-wrap button {
      padding: 11px 22px;
      background: linear-gradient(135deg, #7c3aed, #a044f5);
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .ch-search-wrap button:hover { opacity: 0.85; }

    /* AD WAIT OVERLAY */
    #ch-ad-wait {
      display: none;
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 20px;
    }
    #ch-ad-wait.visible { display: block; }
    .ad-wait-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .ad-wait-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
    .ad-wait-timer {
      font-size: 40px; font-weight: 700;
      color: var(--algo-purple);
      margin-bottom: 20px;
    }
    .ad-wait-bar-wrap {
      height: 4px; background: var(--border);
      border-radius: 2px; overflow: hidden;
      margin-bottom: 20px;
    }
    .ad-wait-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #e040aa);
      width: 100%;
      transition: width 1s linear;
    }
    #ch-ad-close-btn {
      display: none;
      margin: 0 auto;
      padding: 10px 28px;
      background: linear-gradient(135deg, #7c3aed, #a044f5);
      border: none; border-radius: 24px;
      color: #fff; font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #ch-ad-close-btn.visible { display: inline-block; }
    #ch-ad-close-btn:hover { opacity: 0.85; }

    /* CHANNEL RESULT */
    #ch-result { display: none; }
    #ch-result.visible { display: block; }
    .ch-profile-wrap {
      display: flex; gap: 20px; align-items: flex-start;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 22px;
      margin-bottom: 18px;
    }
    .ch-avatar {
      width: 72px; height: 72px;
      border-radius: 50%; object-fit: cover;
      flex-shrink: 0;
    }
    .ch-info h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .ch-info .ch-handle { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
    .ch-stats-row {
      display: flex; gap: 24px; flex-wrap: wrap;
      margin-top: 10px;
    }
    .ch-stat { text-align: center; }
    .ch-stat .val { font-size: 18px; font-weight: 700; color: var(--algo-gold); }
    .ch-stat .lbl { font-size: 11px; color: var(--text-muted); }

    /* SCORE CARD */
    .score-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 18px;
    }
    .score-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--text-secondary); }
    .score-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 10px;
    }
    .score-label { font-size: 13px; width: 120px; flex-shrink: 0; }
    .score-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .score-bar { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
    .score-val { font-size: 13px; font-weight: 700; width: 38px; text-align: right; flex-shrink: 0; }

    /* FEEDBACK */
    .feedback-list { list-style: none; }
    .feedback-list li {
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 7px;
      font-size: 13px; line-height: 1.6;
      display: flex; gap: 8px; align-items: flex-start;
    }
    .feedback-list li.good { background: rgba(46,213,115,0.1); border-left: 3px solid var(--accent3); }
    .feedback-list li.warn { background: rgba(255,165,2,0.1); border-left: 3px solid var(--accent2); }
    .feedback-list li.bad  { background: rgba(255,71,87,0.1); border-left: 3px solid var(--accent); }

    /* ── REVENUE CALCULATOR ── */
    .rev-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .rev-input-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .rev-input-card label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .rev-input-card input[type=range] { width: 100%; accent-color: var(--algo-purple); cursor: pointer; }
    .rev-val-display { font-size: 18px; font-weight: 700; color: var(--algo-gold); margin-bottom: 6px; }
    .rev-result-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .rev-result-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px; text-align: center;
    }
    .rev-result-card .rr-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .rev-result-card .rr-val { font-size: 22px; font-weight: 700; color: var(--algo-gold); }

    /* ── AI IDEAS ── */
    .ai-form {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .ai-form input, .ai-form select {
      flex: 1; min-width: 160px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
    }
    .ai-form input:focus, .ai-form select:focus { border-color: var(--algo-purple); }
    .ai-gen-btn {
      padding: 10px 22px;
      background: linear-gradient(135deg, #7c3aed, #a044f5);
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .ai-gen-btn:hover { opacity: 0.85; }
    .ai-ideas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .ai-idea-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      font-size: 14px; line-height: 1.6;
    }
    .ai-idea-card .ai-num { font-size: 11px; color: var(--algo-purple); font-weight: 700; margin-bottom: 6px; }

    /* ── TOOLS ── */
    .tools-filter {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .tools-filter button {
      padding: 6px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .tools-filter button.active {
      background: var(--algo-purple);
      border-color: var(--algo-purple);
      color: #fff;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .tool-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .tool-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.35); }
    .tool-name { font-size: 14px; font-weight: 700; margin-bottom: 5px; }
    .tool-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 10px; }
    .tool-tag {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px;
      background: rgba(124,58,237,0.2);
      color: #a78bfa;
    }

    /* ── MODALS ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: min(680px, 95vw);
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none;
      color: var(--text-muted); font-size: 22px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text-primary); }

    /* SECTIONS VISIBILITY */
    .sec { display: none; }
    .sec.active { display: block; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1400px) {
      #rightCol { display: none; }
      .main-content { margin-right: 0; }
    }
    @media (max-width: 900px) {
      .sidebar { width: 60px; padding: 8px 0; }
      .nav-btn span:not(.nav-icon) { display: none; }
      .sidebar-section-label { display: none; }
      .sidebar-divider { margin: 6px 8px; }
      .main-content { margin-left: 60px; }
      .rev-grid { grid-template-columns: 1fr; }
      .rev-result-row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
      .rev-result-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo" onclick="showSec('hot')">
    <div class="logo-canvas-wrap"><canvas id="header-logo-canvas" width="80" height="80"></canvas></div>
    <div class="logo-text-wrap">
      <span class="logo-algo">ALGO</span>
      <span class="logo-sub">Analytics Pro</span>
    </div>
  </div>
  <div class="api-status" id="api-status">● API 연결 중</div>
</header>

<div id="global-error-banner"></div>

<div class="app-layout">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-section-label">탐색</div>
    <button class="nav-btn active" onclick="showSec('hot')" data-sec="hot">
      <span class="nav-icon">🔥</span><span>인기 영상</span>
    </button>
    <button class="nav-btn" onclick="showSec('channel')" data-sec="channel">
      <span class="nav-icon">📊</span><span>채널 분석</span>
    </button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">도구</div>
    <button class="nav-btn" onclick="showSec('revenue')" data-sec="revenue">
      <span class="nav-icon">💰</span><span>수익 계산기</span>
    </button>
    <button class="nav-btn" onclick="showSec('ideas')" data-sec="ideas">
      <span class="nav-icon">💡</span><span>AI 아이디어</span>
    </button>
    <button class="nav-btn" onclick="showSec('tools')" data-sec="tools">
      <span class="nav-icon">🛠️</span><span>유튜버 도구</span>
    </button>

function fmt(n) {
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
  if (n >= 10000)     return (n / 10000).toFixed(1) + '만';
  if (n >= 1000)      return (n / 1000).toFixed(1) + 'K';
  return String(n);
}
function parseDurSec(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0)*3600)+(parseInt(m[2]||0)*60)+(parseInt(m[3]||0));
}
function fmtDur(sec) {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  return h ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;
}
function fmtDate(iso) {
  return iso ? iso.slice(0,10) : '-';
}
function clamp(v,a,b){ return Math.min(b,Math.max(a,v)); }
function lerp(a,b,t){ return a+(b-a)*t; }

/* ═══════════════════════════════════════════════
   GLOBAL ERROR BANNER
═══════════════════════════════════════════════ */
function showGlobalError(msg) {
  const b = document.getElementById('global-error-banner');
  b.textContent = msg; b.classList.add('visible');
}
function hideGlobalError() {
  document.getElementById('global-error-banner').classList.remove('visible');
}

/* ═══════════════════════════════════════════════
   API FETCH
═══════════════════════════════════════════════ */
async function apiFetch(url) {
  const keys = API_KEYS.filter(k => k && typeof k === 'string' && k.length > 20 && !k.startsWith('YOUR_'));
  if (!keys.length) { showGlobalError('유효한 API 키가 없습니다.'); throw new Error('No valid API key'); }
  let lastErr = null;
  for (let i = 0; i < keys.length; i++) {
    const k   = keys[(keyIdx + i) % keys.length];
    const sep = url.includes('?') ? '&' : '?';
    const full = `${url}${sep}key=${k}`;
    let r, data;
    try { r = await fetch(full); }
    catch (ne) { lastErr = ne; continue; }
    if (r.status === 403 || r.status === 429) {
      keyIdx = (keyIdx + i + 1) % keys.length;
      lastErr = new Error('HTTP ' + r.status); continue;
    }
    try { data = await r.json(); } catch (je) { lastErr = je; continue; }
    if (data && data.error) {
      const code   = data.error.code || 0;
      const msg    = data.error.message || '';
      const reason = (data.error.errors && data.error.errors[0] && data.error.errors[0].reason) || '';
      if ([403,429].includes(code) || /quota|keyInvalid|rateLimit|dailyLimit|forbidden/i.test(reason)) {
        keyIdx = (keyIdx + i + 1) % keys.length; lastErr = new Error(`${code}: ${msg}`); continue;
      }
      const em = `API 오류 [${code}]: ${msg}`;
      showGlobalError(em); throw new Error(em);
    }
    if (!r.ok) { lastErr = new Error('HTTP ' + r.status); continue; }
    keyIdx = (keyIdx + i) % keys.length;
    hideGlobalError();
    return data;
  }
  const fm = lastErr ? lastErr.message : '모든 API 키 소진';
  showGlobalError('API 오류: ' + fm); throw new Error(fm);
}

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
function buildFavicon(size) {
  const c = document.createElement('canvas'); c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size * 0.22;
  ctx.beginPath(); ctx.moveTo(r,0); ctx.lineTo(size-r,0);
  ctx.arcTo(size,0,size,r,r); ctx.lineTo(size,size-r);
  ctx.arcTo(size,size,size-r,size,r); ctx.lineTo(r,size);
  ctx.arcTo(0,size,0,size-r,r); ctx.lineTo(0,r);
  ctx.arcTo(0,0,r,0,r); ctx.closePath(); ctx.clip();
  const bg = ctx.createLinearGradient(0,0,size,size);
  bg.addColorStop(0,'#7b2ff7'); bg.addColorStop(0.55,'#a044f5'); bg.addColorStop(1,'#e040aa');
  ctx.fillStyle = bg; ctx.fillRect(0,0,size,size);
  ctx.shadowColor='rgba(0,0,0,0.25)'; ctx.shadowBlur=size*0.06; ctx.shadowOffsetY=size*0.04;
  ctx.fillStyle='#fff';
  ctx.font = `700 ${Math.round(size*0.63)}px Georgia,"Times New Roman",serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('A', size/2, size/2 - size*0.01);
  return c;
}
function initLogo() {
  document.fonts.ready.then(() => {
    const hc = document.getElementById('header-logo-canvas');
    hc.width = hc.height = 80;
    const hctx = hc.getContext('2d');
    hctx.drawImage(buildFavicon(80), 0, 0);
    [16,32,64,256].forEach(sz => {
      const link = document.createElement('link');
      link.rel = 'icon'; link.type = 'image/png'; link.sizes = `${sz}x${sz}`;
      link.href = buildFavicon(sz).toDataURL('image/png');
      document.head.appendChild(link);
    });
  });
}

═══════════════════════════════════════════════ */
async function loadHot() {
  document.getElementById('hot-loader').style.display = 'block';
  document.getElementById('more-btn').style.display = 'none';
  hotNextPageTokens = [];
  hotReqCount = 0;
  hotItems = { longs: [], shorts: [] };
  hotPage  = { longs: 0, shorts: 0 };
  document.getElementById('api-status').textContent = '● API 연결 중';

  try {
    let token = '';
    while (hotReqCount < MAX_REQ) {
      const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&chart=mostPopular&regionCode=KR&maxResults=50${token ? '&pageToken='+token : ''}`;
      const data = await apiFetch(url);
      if (!data.items || !data.items.length) break;
      data.items.forEach(item => {
        const sec = parseDurSec(item.contentDetails.duration || '');
        const obj = {
          id:       item.id,
          title:    item.snippet.title,
          channel:  item.snippet.channelTitle,
          thumb:    (item.snippet.thumbnails.medium || item.snippet.thumbnails.default || {}).url || '',
          views:    parseInt(item.statistics.viewCount || 0),
          likes:    parseInt(item.statistics.likeCount || 0),
          comments: parseInt(item.statistics.commentCount || 0),
          date:     item.snippet.publishedAt,
          dur:      sec,
        };
        if (sec > 0 && sec < LONGS_MIN_SEC) hotItems.shorts.push(obj);
        else if (sec >= LONGS_MIN_SEC)       hotItems.longs.push(obj);
      });
      hotReqCount++;
      token = data.nextPageToken || '';
      if (!token) break;
    }
    document.getElementById('api-status').textContent = '● API 연결됨';
    renderHotGrid();
  } catch(e) {
    document.getElementById('api-status').textContent = '● API 오류';
    document.getElementById('hot-loader').textContent = '데이터를 불러올 수 없습니다. API 키를 확인하세요.';
  }
}

    document.getElementById('ad-bar').style.width = (sec / AD_WAIT_SEC * 100) + '%';
    if (sec <= 0) {
      clearInterval(tick);
      document.getElementById('ad-timer').textContent = '✓';
      adWaitDone = true;
      if (analysisData) showCloseBtn();
    }
  }, 1000);

  // Fetch in parallel
  try {
    const channelId = await resolveChannelId(raw);
    const [chData, vidData] = await Promise.all([
      apiFetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings&id=${channelId}`),
      apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&order=viewCount&type=video&maxResults=10`)
    ]);
    if (!chData.items || !chData.items.length) throw new Error('채널을 찾을 수 없습니다.');
    analysisData = { channel: chData.items[0], videos: vidData.items || [] };
    document.getElementById('ch-result-inner').innerHTML = buildChannelHTML(analysisData);
    if (adWaitDone) showCloseBtn();
  } catch(e) {
    clearInterval(tick);
    waitEl.classList.remove('visible');
    showGlobalError('채널 분석 실패: ' + e.message);
  }
}

function showCloseBtn() {
  document.getElementById('ch-ad-close-btn').classList.add('visible');
}

function closeAdWait() {
  document.getElementById('ch-ad-wait').classList.remove('visible');
  document.getElementById('ch-result').classList.add('visible');
}

async function resolveChannelId(raw) {
  // Direct channel ID
  if (/^UC[\w-]{22}$/.test(raw)) return raw;
  // URL containing /channel/
  const chanMatch = raw.match(/\/channel\/(UC[\w-]{22})/);
  if (chanMatch) return chanMatch[1];
  // @handle or URL with @
  const handleMatch = raw.match(/@([\w.-]+)/);
  const handle = handleMatch ? handleMatch[1] : raw.replace(/^@/,'');
  const data = await apiFetch(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${encodeURIComponent(handle)}`);
  if (data.items && data.items.length) return data.items[0].id;
  // Search fallback
  const search = await apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(raw)}&maxResults=1`);
  if (search.items && search.items.length) return search.items[0].snippet.channelId;
  throw new Error('채널 ID를 찾을 수 없습니다.');
}

function buildChannelHTML(d) {
  const ch = d.channel;
  const sn = ch.snippet; const st = ch.statistics;
  const subs    = parseInt(st.subscriberCount || 0);
  const views   = parseInt(st.viewCount || 0);
  const videos  = parseInt(st.videoCount || 0);
  const avgView = videos > 0 ? Math.round(views / videos) : 0;
  const level   = CH_LEVELS.find(l => subs >= l.min && subs < l.max) || CH_LEVELS[0];
  const engRate = views > 0 ? ((avgView / subs) * 100).toFixed(2) : '0.00';

  // Score
  const subScore = clamp(Math.round(Math.log10(subs+1) / Math.log10(10000000) * 100), 0, 100);
  const viewScore= clamp(Math.round(Math.log10(avgView+1) / Math.log10(500000) * 100), 0, 100);
  const vidScore = clamp(Math.round(Math.log10(videos+1) / Math.log10(5000) * 100), 0, 100);
  const engScore = clamp(Math.round(parseFloat(engRate) * 5), 0, 100);
  const total    = Math.round((subScore + viewScore + vidScore + engScore) / 4);

  const scoreColor = total >= 75 ? '#2ed573' : total >= 50 ? '#ffa502' : '#ff4757';

  // Feedback
  const fb = [];
  if (subs > 100000)   fb.push({ cls:'good', text:'✅ 구독자 10만 이상 — 광고 수익 본격화 구간' });
  else if (subs > 1000) fb.push({ cls:'warn', text:'⚠️ 구독자 성장 지속 필요 — 쇼츠 활용 권장' });
  else                  fb.push({ cls:'bad',  text:'❌ 구독자 초기 단계 — 꾸준한 업로드가 핵심' });

  if (parseFloat(engRate) > 10)   fb.push({ cls:'good', text:'✅ 참여율 우수 — 알고리즘 추천 확률 높음' });
  else if (parseFloat(engRate) > 3) fb.push({ cls:'warn', text:'⚠️ 참여율 보통 — 커뮤니티 소통 강화 권장' });
  else                              fb.push({ cls:'bad',  text:'❌ 참여율 낮음 — 댓글·좋아요 유도 필요' });

  if (videos > 200) fb.push({ cls:'good', text:'✅ 콘텐츠 풍부 — 검색 노출 유리' });
  else if (videos > 50) fb.push({ cls:'warn', text:'⚠️ 영상 수 보통 — 업로드 빈도 유지 필요' });
  else                  fb.push({ cls:'bad',  text:'❌ 영상 수 부족 — 정기 업로드 전략 필요' });

  const bars = [
    { label:'구독자 점수', val: subScore,  color:'#a78bfa' },
    { label:'평균 조회수', val: viewScore, color:'#60a5fa' },
    { label:'영상 수',     val: vidScore,  color:'#34d399' },
    { label:'참여율',      val: engScore,  color:'#fbbf24' },
  ];

  return `
    <div class="ch-profile-wrap">
      <img class="ch-avatar" src="${sn.thumbnails?.medium?.url || ''}" alt="avatar" />
      <div class="ch-info">
        <h2>${sn.title}</h2>
        <div class="ch-handle">@${sn.customUrl || sn.title} &nbsp;·&nbsp; 개설: ${fmtDate(sn.publishedAt)}</div>
        <span style="font-size:12px;padding:3px 10px;border-radius:12px;background:${level.color}22;color:${level.color};font-weight:700">${level.label}</span>
        <div class="ch-stats-row">
          <div class="ch-stat"><div class="val">${fmt(subs)}</div><div class="lbl">구독자</div></div>
          <div class="ch-stat"><div class="val">${fmt(views)}</div><div class="lbl">총 조회수</div></div>
          <div class="ch-stat"><div class="val">${fmt(videos)}</div><div class="lbl">영상 수</div></div>
          <div class="ch-stat"><div class="val">${fmt(avgView)}</div><div class="lbl">평균 조회수</div></div>
          <div class="ch-stat"><div class="val">${engRate}%</div><div class="lbl">참여율</div></div>
        </div>
      </div>
    </div>

    <div class="score-card">
      <h3>📈 알고리즘 점수</h3>
      <div style="text-align:center;font-size:48px;font-weight:900;color:${scoreColor};margin-bottom:16px">${total}</div>
      ${bars.map(b=>`
        <div class="score-row">
          <div class="score-label">${b.label}</div>
          <div class="score-bar-wrap"><div class="score-bar" style="width:${b.val}%;background:${b.color}"></div></div>
          <div class="score-val" style="color:${b.color}">${b.val}</div>
        </div>
      `).join('')}
    </div>

    <div class="score-card">
      <h3>💬 피드백</h3>
      <ul class="feedback-list">
        ${fb.map(f=>`<li class="${f.cls}">${f.text}</li>`).join('')}
      </ul>
    </div>

    <div class="score-card">
      <h3>📺 최근 인기 영상</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:8px">
        ${d.videos.slice(0,6).map(v=>`
          <div onclick="window.open('https://youtu.be/${v.id.videoId}','_blank')" style="cursor:pointer">
            <img src="${v.snippet.thumbnails?.medium?.url||''}" style="width:100%;border-radius:6px;aspect-ratio:16/9;object-fit:cover" />
            <div style="font-size:11px;margin-top:5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${v.snippet.title}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════
   REVENUE CALCULATOR
═══════════════════════════════════════════════ */
function initRevenue() {
  const grid = document.getElementById('rev-inputs');
  grid.innerHTML = REV_INPUTS.map(inp => {
    revState[inp.id] = inp.def;
    return `
      <div class="rev-input-card">
        <label>${inp.label}</label>
        <div class="rev-val-display" id="rv-disp-${inp.id}">${inp.fmt(inp.def)}</div>
        <input type="range" min="${inp.min}" max="${inp.max}" step="${inp.step}" value="${inp.def}"
               oninput="updateRev('${inp.id}',this.value)" />
      </div>
    `;
  }).join('');
  calcRevenue();
}

function updateRev(id, val) {
  const inp = REV_INPUTS.find(i => i.id === id);
  revState[id] = parseFloat(val);
  document.getElementById(`rv-disp-${id}`).textContent = inp.fmt(parseFloat(val));
  calcRevenue();
}

function calcRevenue() {
  const { views, rpm, ctr, cpc } = revState;
  if (!views) return;
  const adRevenue  = Math.round((views / 1000) * rpm);
  const clickRev   = Math.round(views * (ctr / 100) * cpc);
  const totalMonth = adRevenue + clickRev;
  const totalYear  = totalMonth * 12;

  document.getElementById('rev-results').innerHTML = `
    <div class="rev-result-card"><div class="rr-label">광고 수익 (월)</div><div class="rr-val">₩${fmt(adRevenue)}</div></div>
    <div class="rev-result-card"><div class="rr-label">클릭 수익 (월)</div><div class="rr-val">₩${fmt(clickRev)}</div></div>
    <div class="rev-result-card"><div class="rr-label">예상 연간 수익</div><div class="rr-val">₩${fmt(totalYear)}</div></div>
  `;

  const tips = [];
  if (rpm < 1500)  tips.push('💡 RPM이 낮습니다. 금융·테크·비즈니스 분야는 RPM이 2–5배 높을 수 있습니다.');
  if (ctr < 3)     tips.push('💡 CTR 3% 미만 — 썸네일과 제목 최적화로 클릭률을 높이세요.');
  if (views < 50000) tips.push('💡 조회수가 많을수록 수익 레버리지가 커집니다. 쇼츠로 유입을 늘려보세요.');
  document.getElementById('rev-tips').innerHTML = tips.map(t=>`<p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">${t}</p>`).join('');
}

function renderTools() {
  const cats = ['ALL', ...new Set(TOOLS_DATA.map(t=>t.cat))];
  document.getElementById('tools-filter').innerHTML = cats.map(c=>`
    <button class="${c===toolFilter?'active':''}" onclick="setToolFilter('${c}')">${c}</button>
  `).join('');
  const filtered = toolFilter === 'ALL' ? TOOLS_DATA : TOOLS_DATA.filter(t=>t.cat===toolFilter);
  document.getElementById('tools-grid').innerHTML = filtered.map(t=>`
    <div class="tool-card" onclick="openToolModal('${t.name}')">
      <div class="tool-name">${t.name}</div>
      <div class="tool-desc">${t.desc}</div>
      <span class="tool-tag">${t.cat}</span>
    </div>
  `).join('');
}

function setToolFilter(cat) {
  toolFilter = cat;
  renderTools();
}

function openToolModal(name) {
  const t = TOOLS_DATA.find(x=>x.name===name);
  if (!t) return;
  document.getElementById('tool-modal-inner').innerHTML = `
    <h2 style="font-size:20px;margin-bottom:8px">${t.name}</h2>
    <span class="tool-tag" style="margin-bottom:14px;display:inline-block">${t.cat}</span>
    <p style="font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:20px">${t.desc}</p>
    <a href="${t.url}" target="_blank" rel="noopener noreferrer"
       style="display:inline-block;padding:10px 24px;background:linear-gradient(135deg,#7c3aed,#a044f5);color:#fff;border-radius:8px;font-weight:700;text-decoration:none;font-size:14px">
      사이트 방문 →
    </a>
  `;
  document.getElementById('tool-modal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
