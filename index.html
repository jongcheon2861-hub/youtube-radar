<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTAnalytics - Level Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070f;
  --card-bg: #12121e;
  --border: #22223a;
  --text: #e8e8f0;
  --sub: #7777aa;
  --accent: #6c63ff;
  --r: 20px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding: 40px 20px;
}
h1 {
  text-align: center;
  font-size: 2rem;
  font-weight: 900;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #6c63ff, #ff6cd8, #63e2ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  text-align: center;
  color: var(--sub);
  margin-bottom: 40px;
  font-size: 0.9rem;
}

/* ── 카드 그리드 ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 48px 32px;
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* ── 레벨별 배경 안개 글로우 ── */
.card-scene {
  position: relative;
  width: 210px;
  height: 300px;
  margin: 0 auto;
  perspective: 900px;
}

/* LV2~5 : 좌우만 글로우 */
.card-scene[data-lv="2"]::before,
.card-scene[data-lv="3"]::before,
.card-scene[data-lv="4"]::before,
.card-scene[data-lv="5"]::before {
  content: '';
  position: absolute;
  inset: -20px;
  border-radius: var(--r);
  background: transparent;
  box-shadow:
    -30px 0 60px 10px var(--glow-color),
     30px 0 60px 10px var(--glow-color);
  opacity: 0.55;
  pointer-events: none;
  z-index: 0;
  animation: fogPulse 3s ease-in-out infinite;
}

/* LV6~9 : 전체 절반 글로우 */
.card-scene[data-lv="6"]::before,
.card-scene[data-lv="7"]::before,
.card-scene[data-lv="8"]::before,
.card-scene[data-lv="9"]::before {
  content: '';
  position: absolute;
  inset: -30px;
  border-radius: var(--r);
  background: radial-gradient(ellipse at center, var(--glow-color) 0%, transparent 70%);
  opacity: 0.45;
  pointer-events: none;
  z-index: 0;
  filter: blur(18px);
  animation: fogPulse 3s ease-in-out infinite;
}

/* LV10 : 전체 안개 글로우 (무지개) */
.card-scene[data-lv="10"]::before {
  content: '';
  position: absolute;
  inset: -50px;
  border-radius: var(--r);
  background: conic-gradient(
    from 0deg,
    #ff003388, #ff660088, #ffcc0088,
    #00ff6688, #00ccff88, #6600ff88,
    #ff00cc88, #ff003388
  );
  opacity: 0.6;
  pointer-events: none;
  z-index: 0;
  filter: blur(30px);
  animation: rbGlowRotate 4s linear infinite;
}
.card-scene[data-lv="10"]::after {
  content: '';
  position: absolute;
  inset: -30px;
  border-radius: var(--r);
  background: radial-gradient(ellipse at center,
    rgba(255,100,255,0.45) 0%,
    rgba(100,200,255,0.3) 40%,
    transparent 75%
  );
  pointer-events: none;
  z-index: 0;
  filter: blur(20px);
  animation: fogPulse 2.5s ease-in-out infinite;
}

@keyframes fogPulse {
  0%,100% { opacity: 0.45; transform: scale(1); }
  50%      { opacity: 0.75; transform: scale(1.05); }
}
@keyframes rbGlowRotate {
  from { transform: rotate(0deg) scale(1); opacity: 0.55; }
  50%  { opacity: 0.8; transform: rotate(180deg) scale(1.08); }
  to   { transform: rotate(360deg) scale(1); opacity: 0.55; }
}

/* ── 틸트 래퍼 (카드+빔+프레임 함께 틸트) ── */
.card-tilt {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.15s ease;
  z-index: 1;
}

/* ── 얇은 테두리 띠 ── */
.card-frame {
  position: absolute;
  inset: -3px;
  border-radius: calc(var(--r) + 3px);
  z-index: 1;
  pointer-events: none;
}
.card-frame::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 2px;
  background: var(--frame-bg);
  -webkit-mask: linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

/* ── 빔 컨테이너 ── */
.beam-container {
  position: absolute;
  inset: -3px;
  border-radius: calc(var(--r) + 3px);
  overflow: hidden;
  z-index: 2;
  pointer-events: none;
}
.beam-ring {
  position: absolute;
  width: 400%;
  height: 400%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(0deg);
  border-radius: 40%;
  animation: beamRingSpin var(--beam-speed, 3s) linear infinite;
  opacity: 0.9;
}
/* LV1~2: 1빔 */
.beam-ring.b1 { background: conic-gradient(transparent 75%, var(--cb) 100%); }
/* LV3~5: 2빔 */
.beam-ring.b2-1 { background: conic-gradient(transparent 0%,transparent 37%,var(--cb) 50%,transparent 51%,transparent 87%,var(--cb) 100%); }
.beam-ring.b2-2 { background: conic-gradient(transparent 0%,transparent 37%,var(--cb) 50%,transparent 51%,transparent 87%,var(--cb) 100%);
  animation-delay: calc(var(--beam-speed, 3s) / -2); }
/* LV6~9: 3빔 */
.beam-ring.b3-1 { background: conic-gradient(transparent 0%,transparent 30%,var(--cb) 33%,transparent 34%,transparent 63%,var(--cb) 66%,transparent 67%,transparent 97%,var(--cb) 100%); }
.beam-ring.b3-2 { background: conic-gradient(transparent 0%,transparent 30%,var(--cb) 33%,transparent 34%,transparent 63%,var(--cb) 66%,transparent 67%,transparent 97%,var(--cb) 100%);
  animation-delay: calc(var(--beam-speed, 3s) / -3); }
.beam-ring.b3-3 { background: conic-gradient(transparent 0%,transparent 30%,var(--cb) 33%,transparent 34%,transparent 63%,var(--cb) 66%,transparent 67%,transparent 97%,var(--cb) 100%);
  animation-delay: calc(var(--beam-speed, 3s) * -2 / 3); }
/* LV10: 4빔 무지개 */
.beam-ring.rb {
  background: conic-gradient(
    #ff0000 0%, #ff6600 12%, #ffcc00 25%,
    #00ff66 37%, #00ccff 50%, #6600ff 62%,
    #ff00cc 75%, #ff0000 87%, transparent 88%, transparent 100%
  );
  animation: beamRingSpin var(--beam-speed, 2.5s) linear infinite,
             lv10BeamHue 3s linear infinite;
  filter: brightness(1.8) saturate(1.5);
}
.beam-ring.rb-2 { animation-delay: calc(var(--beam-speed, 2.5s) / -4); }
.beam-ring.rb-3 { animation-delay: calc(var(--beam-speed, 2.5s) / -2); }
.beam-ring.rb-4 { animation-delay: calc(var(--beam-speed, 2.5s) * -3 / 4); }

@keyframes beamRingSpin {
  to { transform: translate(-50%,-50%) rotate(360deg); }
}
@keyframes lv10BeamHue {
  from { filter: brightness(1.8) saturate(1.5) hue-rotate(0deg); }
  to   { filter: brightness(2.0) saturate(1.8) hue-rotate(360deg); }
}

/* ── 카드 바디 ── */
.card-body {
  position: absolute;
  inset: 0;
  border-radius: var(--r);
  overflow: hidden;
  z-index: 3;
  background: var(--card-bg);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  transition: box-shadow 0.3s;
}
.card-scene:hover .card-body {
  box-shadow: 0 16px 48px rgba(0,0,0,0.8);
}

/* ── 카드 페이스 ── */
.card-face {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.07) 0%, transparent 60%),
    linear-gradient(160deg, rgba(255,255,255,0.04) 0%, transparent 50%),
    var(--card-bg);
  border-radius: var(--r);
}

/* ── 광택 (항상 표시) ── */
.card-shine {
  position: absolute;
  inset: 0;
  border-radius: var(--r);
  background:
    linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 50%),
    linear-gradient(315deg, rgba(255,255,255,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 10;
  transition: opacity 0.3s;
}

/* ── 보케/스파클 ── */
.card-bokeh { position:absolute; inset:0; border-radius:var(--r); overflow:hidden; pointer-events:none; z-index:4; }
.bokeh-dot {
  position: absolute;
  border-radius: 50%;
  animation: bokehFloat var(--bd, 4s) ease-in-out infinite alternate;
  opacity: var(--bo, 0.4);
  filter: blur(var(--bb, 6px));
  background: radial-gradient(circle, var(--cb) 0%, transparent 70%);
  width: var(--bs, 40px);
  height: var(--bs, 40px);
  left: var(--bx, 50%);
  top: var(--by, 50%);
}
@keyframes bokehFloat {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-12px) scale(1.1); }
}
.card-sparkles { position:absolute; inset:0; border-radius:var(--r); overflow:hidden; pointer-events:none; z-index:5; }
.sparkle {
  position: absolute;
  color: var(--cb);
  font-size: var(--ss, 12px);
  left: var(--sx, 50%);
  top: var(--sy, 50%);
  opacity: 0;
  animation: sparklePop var(--sd, 2s) ease-in-out infinite;
  animation-delay: var(--sdelay, 0s);
  text-shadow: 0 0 6px var(--cb);
}
@keyframes sparklePop {
  0%,100% { opacity:0; transform:scale(0.5); }
  50%      { opacity:1; transform:scale(1.2); }
}

/* ── 헤더 ── */
.card-header {
  position: relative;
  z-index: 6;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px 6px;
}
.card-stars { display:flex; gap:2px; }
.star { font-size:10px; opacity:0.9; color: var(--cb); filter: drop-shadow(0 0 3px var(--cb)); }
.card-badge {
  font-size: 9px;
  font-weight: 900;
  padding: 2px 7px;
  border-radius: 20px;
  background: linear-gradient(135deg, var(--ca), var(--cb));
  color: #fff;
  letter-spacing: 1px;
  box-shadow: 0 0 8px var(--cb);
}

/* ── 아이콘 ── */
.card-icon-area {
  position: relative;
  z-index: 6;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0 4px;
}
.card-icon {
  font-size: 62px;
  line-height: 1;
  filter: drop-shadow(0 0 12px var(--cb)) drop-shadow(0 0 4px var(--ca));
  animation: iconFloat 3s ease-in-out infinite;
}
@keyframes iconFloat {
  0%,100% { transform:translateY(0); }
  50%      { transform:translateY(-5px); }
}
.card-name {
  font-size: 13px;
  font-weight: 900;
  margin-top: 6px;
  color: var(--cb);
  text-shadow: 0 0 10px var(--cb), 0 0 20px var(--ca);
  letter-spacing: 1px;
}

/* ── 밴드 (상단/하단 띠만 색상, 좌우이동 제거) ── */
.card-top-band {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: var(--r) var(--r) 0 0;
  background: linear-gradient(90deg, var(--ca), var(--cb), var(--cc), var(--cb), var(--ca));
  background-size: 200% 100%;
  opacity: var(--band-op, 0.8);
  z-index: 7;
}
.card-bot-band {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  border-radius: 0 0 var(--r) var(--r);
  background: linear-gradient(90deg, var(--ca), var(--cb), var(--cc), var(--cb), var(--ca));
  background-size: 200% 100%;
  opacity: var(--band-op, 0.8);
  z-index: 7;
}

/* ── 비네트 ── */
.card-vignette {
  position: absolute;
  inset: 0;
  border-radius: var(--r);
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
  z-index: 8;
}

/* ── 푸터 ── */
.card-footer {
  position: absolute;
  bottom: 14px;
  left: 0; right: 0;
  z-index: 9;
  text-align: center;
}
.footer-subs {
  font-size: 11px;
  color: var(--cb);
  font-weight: 700;
  opacity: 0.9;
  text-shadow: 0 0 8px var(--cb);
}
.footer-rank {
  font-size: 9px;
  color: var(--sub);
  margin-top: 2px;
}

/* ── LV5~9 박스 글로우 ── */
.card-scene[data-lv="5"]  .card-body { box-shadow: 0 0 20px 4px rgba(128,0,255,0.25), 0 8px 32px rgba(0,0,0,0.6); }
.card-scene[data-lv="6"]  .card-body { box-shadow: 0 0 30px 8px rgba(200,0,255,0.35), 0 8px 32px rgba(0,0,0,0.6); }
.card-scene[data-lv="7"]  .card-body { box-shadow: 0 0 40px 10px rgba(255,0,180,0.4), 0 8px 32px rgba(0,0,0,0.6); }
.card-scene[data-lv="8"]  .card-body { box-shadow: 0 0 50px 14px rgba(255,80,0,0.4), 0 8px 32px rgba(0,0,0,0.6); }
.card-scene[data-lv="9"]  .card-body { box-shadow: 0 0 60px 18px rgba(255,220,0,0.45), 0 8px 32px rgba(0,0,0,0.6); }

/* ── LV10 전체 무지개 색상 순환 ── */
.card-scene[data-lv="10"] .card-body {
  animation: lv10Glow 3s linear infinite;
}
@keyframes lv10Glow {
  0%   { box-shadow: 0 0 60px 20px rgba(255,0,50,0.7),   0 8px 32px rgba(0,0,0,0.6); }
  16%  { box-shadow: 0 0 60px 20px rgba(255,120,0,0.7),  0 8px 32px rgba(0,0,0,0.6); }
  33%  { box-shadow: 0 0 60px 20px rgba(255,220,0,0.7),  0 8px 32px rgba(0,0,0,0.6); }
  50%  { box-shadow: 0 0 60px 20px rgba(0,255,100,0.7),  0 8px 32px rgba(0,0,0,0.6); }
  66%  { box-shadow: 0 0 60px 20px rgba(0,180,255,0.7),  0 8px 32px rgba(0,0,0,0.6); }
  83%  { box-shadow: 0 0 60px 20px rgba(140,0,255,0.7),  0 8px 32px rgba(0,0,0,0.6); }
  100% { box-shadow: 0 0 60px 20px rgba(255,0,50,0.7),   0 8px 32px rgba(0,0,0,0.6); }
}
.card-scene[data-lv="10"] .card-frame::before { animation: lv10FrameHue 3s linear infinite; }
@keyframes lv10FrameHue {
  from { filter: hue-rotate(0deg) brightness(1.8) saturate(1.6); }
  to   { filter: hue-rotate(360deg) brightness(2.0) saturate(1.8); }
}
.card-scene[data-lv="10"] .card-top-band,
.card-scene[data-lv="10"] .card-bot-band {
  animation: lv10BandHue 3s linear infinite;
  filter: brightness(1.8);
}
@keyframes lv10BandHue {
  from { filter: hue-rotate(0deg) brightness(1.8); }
  to   { filter: hue-rotate(360deg) brightness(2.0); }
}
.card-scene[data-lv="10"] .card-icon { animation: iconFloat 3s ease-in-out infinite, lv10IconHue 3s linear infinite; }
@keyframes lv10IconHue {
  from { filter: drop-shadow(0 0 16px #ff0055) drop-shadow(0 0 6px #ff88cc) hue-rotate(0deg) brightness(1.3); }
  to   { filter: drop-shadow(0 0 16px #ff0055) drop-shadow(0 0 6px #ff88cc) hue-rotate(360deg) brightness(1.5); }
}
.card-scene[data-lv="10"] .card-name {
  background: linear-gradient(90deg,#ff0000,#ff6600,#ffcc00,#00ff66,#00ccff,#6600ff,#ff00cc,#ff0000);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: lv10NameSlide 2s linear infinite;
  filter: brightness(1.3);
}
@keyframes lv10NameSlide {
  from { background-position: 0% center; }
  to   { background-position: 200% center; }
}
.card-scene[data-lv="10"] .card-badge {
  background: linear-gradient(135deg,#ff0000,#ff6600,#ffcc00,#00ff66,#00ccff,#6600ff,#ff00cc);
  background-size: 300% 300%;
  animation: lv10FrameHue 2s linear infinite;
  box-shadow: 0 0 12px #ff0055, 0 0 24px #6600ff;
  color: #fff;
  text-shadow: 0 0 6px rgba(255,255,255,0.9);
}
.card-scene[data-lv="10"] .star {
  animation: lv10StarHue 3s linear infinite;
}
@keyframes lv10StarHue {
  from { filter: drop-shadow(0 0 3px #ff0055) hue-rotate(0deg); color: #ff0055; }
  to   { filter: drop-shadow(0 0 3px #ff0055) hue-rotate(360deg); color: #ff0055; }
}
.card-scene[data-lv="10"] .footer-subs {
  background: linear-gradient(90deg,#ff0000,#ff6600,#ffcc00,#00ff66,#00ccff,#6600ff,#ff00cc,#ff0000);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: lv10NameSlide 2s linear infinite;
  filter: brightness(1.3);
  text-shadow: none;
}
.card-scene[data-lv="10"] .bokeh-dot { animation: bokehFloat var(--bd,4s) ease-in-out infinite alternate, lv10BokehHue 3s linear infinite; }
@keyframes lv10BokehHue {
  from { filter: blur(var(--bb,6px)) hue-rotate(0deg) brightness(1.4); }
  to   { filter: blur(var(--bb,6px)) hue-rotate(360deg) brightness(1.7); }
}
.card-scene[data-lv="10"] .sparkle { animation: sparklePop var(--sd,2s) ease-in-out infinite, lv10SparkHue 3s linear infinite; animation-delay: var(--sdelay,0s), 0s; }
@keyframes lv10SparkHue {
  from { filter: hue-rotate(0deg) brightness(1.5); }
  to   { filter: hue-rotate(360deg) brightness(1.8); }
}
</style>
</head>
<body>
<h1>✨ YTAnalytics 레벨 카드</h1>
<p class="subtitle">레벨별 등급 카드 미리보기 — 마우스를 올려 3D 효과를 확인하세요</p>
<div class="cards-grid" id="cards-grid"></div>

<script>

  {

      {s:'40px',x:'12%',y:'18%',b:'10px',o:0.32,d:'3.6s'},

    ],
    sparkles:[
      {sz:'12px',x:'18%',y:'60%',d:'2.6s',dl:'0.3s'},
      {sz:'10px',x:'72%',y:'28%',d:'3s',  dl:'1.3s'},

  },
  {
    lv:4, name:'인기상승', icon:'🔥', badge:'RISING',
    ca:'#ff7043', cb:'#ff8a65', cc:'#fbe9e7',
    subs:'5,000 ~ 1만명', rank:'플래티넘 II', score:'600~749',
    beamSpeed:'3.2s', bandOp:0.65, stars:2, beamCount:2,
    bokeh:[
      {s:'45px',x:'10%',y:'15%',b:'12px',o:0.35,d:'3.4s'},

function buildBeams(g) {
  const n = g.beamCount;
  const isRb = g.lv === 10;
  let html = '';
  if (n === 1) {
    html = `<div class="beam-container"><div class="beam-ring b1" style="--beam-speed:${g.beamSpeed}"></div></div>`;
  } else if (n === 2) {
    html = `<div class="beam-container">
      <div class="beam-ring b2-1" style="--beam-speed:${g.beamSpeed}"></div>
      <div class="beam-ring b2-2" style="--beam-speed:${g.beamSpeed}"></div>
    </div>`;
  } else if (n === 3) {
    html = `<div class="beam-container">
      <div class="beam-ring b3-1" style="--beam-speed:${g.beamSpeed}"></div>
      <div class="beam-ring b3-2" style="--beam-speed:${g.beamSpeed}"></div>
      <div class="beam-ring b3-3" style="--beam-speed:${g.beamSpeed}"></div>
    </div>`;
  } else {
    html = `<div class="beam-container">
      <div class="beam-ring rb rb-1" style="--beam-speed:${g.beamSpeed}"></div>
      <div class="beam-ring rb rb-2" style="--beam-speed:${g.beamSpeed}"></div>
      <div class="beam-ring rb rb-3" style="--beam-speed:${g.beamSpeed}"></div>
      <div class="beam-ring rb rb-4" style="--beam-speed:${g.beamSpeed}"></div>
    </div>`;
  }
  return html;
}

function buildCardHTML(g) {
  const isRb = g.lv === 10;
  const frameBg = isRb
    ? 'linear-gradient(135deg,#ff0000,#ff6600,#ffcc00,#00ff66,#00ccff,#6600ff,#ff00cc,#ff0000)'
    : `linear-gradient(135deg, ${g.ca}, ${g.cb}, ${g.cc})`;

  const stars = Array.from({length:g.stars}, (_,i) =>
    `<span class="star" style="animation-delay:${i*0.15}s">★</span>`
  ).join('');

  const bokeh = g.bokeh.map(b =>
    `<div class="bokeh-dot" style="--bs:${b.s};--bx:${b.x};--by:${b.y};--bb:${b.b};--bo:${b.o};--bd:${b.d}"></div>`
  ).join('');

  const sparkles = g.sparkles.map(s =>
    `<span class="sparkle" style="--ss:${s.sz};--sx:${s.x};--sy:${s.y};--sd:${s.d};--sdelay:${s.dl}">✦</span>`
  ).join('');

  const badgeStyle = isRb
    ? `background:linear-gradient(135deg,#ff0000,#ff6600,#ffcc00,#00ff66,#00ccff,#6600ff,#ff00cc);background-size:300% 300%;color:#fff;`
    : '';

  const glowColor = g.cb;

  return `
  <div class="card-scene" data-lv="${g.lv}"
       style="--ca:${g.ca};--cb:${g.cb};--cc:${g.cc};
              --beam-speed:${g.beamSpeed};--band-op:${g.bandOp};
              --frame-bg:${frameBg};
              --glow-color:${glowColor};">
    <div class="card-tilt" onmousemove="card3D(event,this)" onmouseleave="cardReset(this)">
      <div class="card-frame"><div style="position:absolute;inset:2px;border-radius:calc(var(--r) + 1px);background:var(--card-bg);"></div></div>
      ${buildBeams(g)}
      <div class="card-body">
        <div class="card-face"></div>
        <div class="card-shine"></div>
        <div class="card-bokeh">${bokeh}</div>
        <div class="card-sparkles">${sparkles}</div>
        <div class="card-top-band"></div>
        <div class="card-bot-band"></div>
        <div class="card-header">
          <div class="card-stars">${stars}</div>
          <div class="card-badge" style="${badgeStyle}">${g.badge}</div>
        </div>
        <div class="card-icon-area">
          <div class="card-icon">${g.icon}</div>
          <div class="card-name">${g.name}</div>
        </div>
        <div class="card-vignette"></div>
        <div class="card-footer">
          <div class="footer-subs">${g.subs}</div>
          <div class="footer-rank">${g.rank}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function card3D(e, el) {
  const scene = el.closest('.card-scene');
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = (e.clientX - cx) / (rect.width / 2);
  const dy = (e.clientY - cy) / (rect.height / 2);
  const rx = -dy * 16;
  const ry =  dx * 16;
  el.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;

  const shine = el.querySelector('.card-shine');
  const mx = ((e.clientX - rect.left) / rect.width) * 100;
  const my = ((e.clientY - rect.top) / rect.height) * 100;
  if (shine) {
    shine.style.background = `
      radial-gradient(circle at ${mx}% ${my}%, rgba(255,255,255,0.28) 0%, transparent 55%),
      linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 50%),
      linear-gradient(315deg, rgba(255,255,255,0.08) 0%, transparent 50%)
    `;
  }
  const face = el.querySelector('.card-face');
  if (face) {
    face.style.background = `
      radial-gradient(ellipse at ${mx}% ${my}%, rgba(255,255,255,0.1) 0%, transparent 60%),
      radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.07) 0%, transparent 60%),
      linear-gradient(160deg, rgba(255,255,255,0.04) 0%, transparent 50%),
      var(--card-bg)
    `;
  }
}

function cardReset(el) {
  el.style.transform = 'rotateX(0deg) rotateY(0deg)';
  const shine = el.querySelector('.card-shine');
  if (shine) {
    shine.style.background = `
      linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 50%),
      linear-gradient(315deg, rgba(255,255,255,0.08) 0%, transparent 50%)
    `;
  }
  const face = el.querySelector('.card-face');
  if (face) {
    face.style.background = `
      radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.07) 0%, transparent 60%),
      linear-gradient(160deg, rgba(255,255,255,0.04) 0%, transparent 50%),
      var(--card-bg)
    `;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = GRADES.map(g => buildCardHTML(g)).join('');
});
