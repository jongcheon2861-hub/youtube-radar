<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Black Sphere</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:80px;
  overflow:hidden;
}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;border-radius:50%;
  animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;
}
@keyframes twinkle{
  0%{opacity:.03;transform:scale(1);}
  100%{opacity:.8;transform:scale(2);}
}

.scene{
  position:relative;z-index:1;
  width:460px;height:460px;
  display:flex;align-items:center;justify-content:center;
}

/* ════════════════════════════════════════

════════════════════════════════════════ */
.layer{

  transform:translate(-50%,-50%);
  border-radius:50%;
}

/* ════════════════════════
   코어
════════════════════════ */
.core{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:120px;height:120px;border-radius:50%;z-index:20;
  background:radial-gradient(circle at 36% 30%,
    rgba(18,3,0,.5) 0%,rgba(8,1,0,.88) 18%,
    rgba(2,0,0,.98) 38%,#000 55%,#000 100%
  );
  box-shadow:
    0 0 0 1px  rgba(255,80,0,.4),
    0 0 0 3px  rgba(255,55,0,.1),
    0 0 16px   rgba(255,75,0,.52),
    0 0 38px   rgba(210,48,0,.32),
    0 0 80px   rgba(160,26,0,.18),
    inset 0 0 20px rgba(80,8,0,.5),
    inset 0 0 45px rgba(40,3,0,.75),
    inset 0 0 80px rgba(5,0,0,.95);
  animation:corePulse 2.8s ease-in-out infinite;
}
@keyframes corePulse{
  0%,100%{
    box-shadow:0 0 0 1px rgba(255,80,0,.4),0 0 0 3px rgba(255,55,0,.1),
    0 0 16px rgba(255,75,0,.52),0 0 38px rgba(210,48,0,.32),0 0 80px rgba(160,26,0,.18),

  }
  50%{
    box-shadow:0 0 0 2px rgba(255,100,0,.62),0 0 0 5px rgba(255,70,0,.16),
    0 0 26px rgba(255,95,0,.75),0 0 58px rgba(228,58,0,.5),0 0 120px rgba(180,34,0,.28),

  }
}
.core-hl{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:120px;height:120px;border-radius:50%;z-index:21;

/* ════════════════════════════════════════
   토성 링 — 고정 (애니메이션 없음)
   SVG ellipse + clipPath
   위쪽(구체 뒤) z:10 / 아래쪽(구체 앞) z:25
   색상: 구체 레이어와 동일 계열
   r1(78)  → rgba(255,32,32)   레드
   r2(92)  → rgba(255,78,0)    레드오렌지
   r3(106) → rgba(255,128,0)   오렌지
   r4(120) → rgba(255,98,0)    딥오렌지
   r5(134) → rgba(255,182,0)   골드오렌지
   r6(148) → rgba(255,225,0)   옐로우
════════════════════════════════════════ */

/* 뒤 레이어 (위쪽 절반) */
.ring-back{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:320px;height:320px;
  z-index:10;
  pointer-events:none;
}
.ring-back svg{width:100%;height:100%;overflow:visible;}

/* 앞 레이어 (아래쪽 절반) */
.ring-front{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:320px;height:320px;
  z-index:25;
  pointer-events:none;
}
.ring-front svg{width:100%;height:100%;overflow:visible;}

/* 링 글로우 맥동 — 구체 레이어와 동조 */
@keyframes ringGlow1{
  0%,100%{opacity:.7;}50%{opacity:1;}
}
@keyframes ringGlow2{
  0%,100%{opacity:.6;}50%{opacity:.95;}
}

<body>
<div class="bg"></div>
<script>
const bg=document.querySelector('.bg');
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*1.8+.3;
  const c=['#ff2020','#ff5500','#ff8c00','#ffbe00','#ffe000','#fff','#ff6a00'];
  s.style.cssText=`width:${sz}px;height:${sz}px;background:${c[Math.floor(Math.random()*c.length)]};left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*4}s;--delay:${Math.random()*6}s;`;
  bg.appendChild(s);
}
</script>

<!-- ══ 메인 씬 ══ -->
<div class="scene">

  <!-- ▼ 토성 링 뒤 (위쪽 절반 — 구체 뒤에 숨음) z:10 -->
  <div class="ring-back">
    <svg viewBox="-160 -160 320 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- 위쪽 절반 clip -->
        <clipPath id="top"><rect x="-160" y="-160" width="320" height="160"/></clipPath>
        <filter id="rg1"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="rg2"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="rg3"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="rg4"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="rg5"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="rg6"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <!-- 링1 — 레드 (레이어 l9/l8과 동일 계열) -->
      <ellipse cx="0" cy="0" rx="78" ry="24"
        fill="none" stroke="rgba(255,32,32,.85)" stroke-width="2.5"
        clip-path="url(#top)" filter="url(#rg1)"
        style="animation:ringGlow1 6.5s ease-in-out infinite;"/>

      <!-- 링2 — 레드오렌지 (l7/l6) -->
      <ellipse cx="0" cy="0" rx="92" ry="28"
        fill="none" stroke="rgba(255,78,0,.82)" stroke-width="2.5"
        clip-path="url(#top)" filter="url(#rg2)"
        style="animation:ringGlow2 6s ease-in-out infinite .4s;"/>
