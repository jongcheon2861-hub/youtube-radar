<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>YTAnalytics Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script>
  if(location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
    const s=document.createElement('script');
    s.async=true;
    s.src='https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX';
    s.crossOrigin='anonymous';
    document.head.appendChild(s);
  }
</script>
<style>
/* ── 변수 & 리셋 ── */
:root{
  --bg:#f5f6fa; --surface:#fff; --border:#e8eaed;
  --text:#111827; --text2:#6b7280;
  --accent:#ff4444; --accent2:#ff8800;
  --green:#22c55e; --blue:#3b82f6;
  --header-h:60px; --sticky-ad-h:70px;
  --sidebar-w:200px; --radius:12px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text)}
button{cursor:pointer;font-family:inherit}

/* ── 헤더 ── */
#header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  z-index:1000;display:flex;align-items:center;padding:0 20px;gap:12px;
}
.logo{
  font-size:18px;font-weight:800;white-space:nowrap;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-search{
  flex:1;max-width:480px;display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:24px;padding:6px 16px;
}
.header-search input{
  flex:1;border:none;background:none;outline:none;
  font-size:14px;color:var(--text);
}
.header-search button{background:none;border:none;color:var(--text2);font-size:15px}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
#ad-toggle-btn{
  background:none;border:1px solid var(--border);
  border-radius:8px;padding:5px 10px;font-size:12px;color:var(--text2);
}

/* ── 크레딧 뱃지 ── */
.credit-badge{
  padding:5px 12px;border-radius:20px;
  font-size:12px;font-weight:700;white-space:nowrap;transition:all .3s;
}
.cb-ok    {background:#e8f5e9;color:#2e7d32}
.cb-low   {background:#fff3e0;color:#e65100}
.cb-empty {background:#ffebee;color:#c62828}

/* ── 상단 스티키 광고 ── */
#sticky-ad{
  position:fixed;top:var(--header-h);left:0;right:0;
  height:var(--sticky-ad-h);z-index:950;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
#sticky-ad::before{
  content:'AD';position:absolute;top:4px;left:8px;
  font-size:9px;color:#bbb;letter-spacing:1px;font-weight:600;
}

/* ── 레이아웃 ── */
#layout{
  display:flex;
  margin-top:calc(var(--header-h) + var(--sticky-ad-h));
  min-height:calc(100vh - var(--header-h) - var(--sticky-ad-h));
}

/* ── 사이드바 ── */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--surface);border-right:1px solid var(--border);
  padding:12px 0;
  position:sticky;
  top:calc(var(--header-h) + var(--sticky-ad-h));
  height:calc(100vh - var(--header-h) - var(--sticky-ad-h));
  overflow-y:auto;display:flex;flex-direction:column;
}
.sidebar-section{padding:6px 0;border-bottom:1px solid var(--border)}
.sidebar-title{
  font-size:10px;font-weight:700;color:var(--text2);
  padding:6px 16px;letter-spacing:.8px;text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;font-size:14px;font-weight:500;
  cursor:pointer;color:var(--text2);
  border:none;background:none;width:100%;text-align:left;
  transition:all .2s;
}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{
  background:linear-gradient(90deg,rgba(255,68,68,.1),transparent);
  color:var(--accent);border-left:3px solid var(--accent);
}
.nav-item i{width:16px;text-align:center;font-size:14px}
.sidebar-ad{
  margin:12px;background:var(--bg);border-radius:var(--radius);
  min-height:90px;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#bbb;font-weight:600;
}
.sidebar-spacer{flex:1}

/* ── 메인 ── */
#main{flex:1;padding:20px;max-width:1200px;min-width:0}
.page{display:none}
.page.active{display:block}

/* ── 섹션 헤더 ── */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;
}
.section-title{font-size:20px;font-weight:800}
.section-sub{font-size:13px;color:var(--text2);margin-top:2px}

/* ── 통합 탭 (쇼츠/롱폼/전체) ── */
.content-tabs{
  display:flex;gap:6px;margin-bottom:16px;
  background:var(--bg);border-radius:12px;padding:4px;
  width:fit-content;
}
.ctab{
  padding:8px 20px;border-radius:9px;border:none;
  font-size:14px;font-weight:600;color:var(--text2);
  background:none;transition:all .2s;
}
.ctab.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}
.ctab:hover:not(.active){background:rgba(255,255,255,.6);color:var(--text)}

/* ── 필터 칩 ── */
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.chip{
  padding:5px 13px;border-radius:20px;border:1px solid var(--border);
  font-size:12px;font-weight:500;background:var(--surface);
  color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;
}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sort-select{
  padding:5px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);font-size:12px;color:var(--text);cursor:pointer;
}

/* ── 해시태그 클라우드 ── */
#hashtag-cloud{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.htag{
  padding:3px 10px;border-radius:14px;font-size:12px;
  font-weight:600;cursor:pointer;transition:all .2s;
}
.htag.active{outline:2px solid #333;outline-offset:1px}

#fetch-status{font-size:13px;color:var(--text2);margin-bottom:10px;min-height:18px}

/* ── 영상 그리드 ── */
#hot-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:16px;
}
.vcard{
  background:var(--surface);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);
  transition:transform .2s,box-shadow .2s;cursor:pointer;
}
.vcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.vcard-thumb{position:relative;padding-top:56.25%;overflow:hidden;background:#111}
.vcard-thumb img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;transition:transform .3s;
}
.vcard:hover .vcard-thumb img{transform:scale(1.04)}
.vcard-dur{
  position:absolute;bottom:6px;right:6px;
  background:rgba(0,0,0,.8);color:#fff;
  font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;
}
.vcard-badge{
  position:absolute;top:6px;left:6px;
  padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;
}
.badge-shorts{background:#ff4444;color:#fff}
.badge-long{background:#3b82f6;color:#fff}
.viral-badge{
  position:absolute;top:6px;right:6px;
  background:rgba(255,136,0,.9);color:#fff;
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;
}
.vcard-body{padding:12px}
.vcard-title{
  font-size:13px;font-weight:600;line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;
}
.vcard-channel{
  font-size:12px;color:var(--accent);font-weight:600;
  margin-bottom:6px;cursor:pointer;
}
.vcard-channel:hover{text-decoration:underline}
.vcard-stats{display:flex;flex-wrap:wrap;gap:5px;font-size:11px;color:var(--text2)}
.stat-pill{background:var(--bg);padding:2px 7px;border-radius:10px;font-weight:500}
.stat-pill.hot{background:#fff3e0;color:#e65100}

/* ── 채널 분석 ── */
#ch-page{max-width:800px}
.ch-input-wrap{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.ch-input-wrap input{
  flex:1;min-width:200px;padding:12px 16px;
  border:2px solid var(--border);border-radius:var(--radius);
  font-size:14px;outline:none;transition:border .2s;
}
.ch-input-wrap input:focus{border-color:var(--accent)}
.ch-input-wrap button{
  padding:12px 22px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);font-size:14px;font-weight:700;
}
.ch-card{
  background:var(--surface);border-radius:var(--radius);
  padding:24px;box-shadow:var(--shadow);margin-bottom:20px;
}
.ch-header{display:flex;gap:16px;align-items:center;margin-bottom:20px}
.ch-avatar{width:68px;height:68px;border-radius:50%;object-fit:cover;border:3px solid var(--border)}
.ch-name{font-size:19px;font-weight:800;margin-bottom:4px}
.ch-handle{font-size:13px;color:var(--text2)}
.ch-stats-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:10px;margin-bottom:20px;
}
.ch-stat{background:var(--bg);border-radius:10px;padding:12px;text-align:center}
.ch-stat-val{font-size:20px;font-weight:800;color:var(--accent)}
.ch-stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;font-weight:500}
.score-wrap{display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.grade-badge{
  width:76px;height:76px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:900;color:#fff;
}
.grade-S{background:linear-gradient(135deg,#ff8800,#ff4444)}
.grade-A{background:linear-gradient(135deg,#22c55e,#16a34a)}
.grade-B{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.grade-C{background:linear-gradient(135deg,#f59e0b,#d97706)}
.grade-D{background:linear-gradient(135deg,#94a3b8,#64748b)}
.grade-F{background:linear-gradient(135deg,#ef4444,#b91c1c)}
.score-bars{flex:1}
.score-bar-item{margin-bottom:10px}
.score-bar-label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px}
.score-bar-track{height:7px;background:#eee;border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .8s ease}
.analysis-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.atab-btn{
  padding:7px 16px;border-radius:20px;border:1px solid var(--border);
  font-size:13px;font-weight:600;background:var(--surface);color:var(--text2);cursor:pointer;
}
.atab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.atab-panel{display:none}
.atab-panel.active{display:block}
.insight-list{display:flex;flex-direction:column;gap:10px}
.insight-item{
  display:flex;gap:12px;align-items:flex-start;
  background:var(--bg);border-radius:10px;padding:14px;
}
.insight-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.insight-text strong{font-size:14px;font-weight:700;
