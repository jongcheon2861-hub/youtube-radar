<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ALGO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --void:#000000;
  --deep:#05000a;
  --purple:#7c3aed;
  --violet:#a855f7;
  --gold:#f0c96a;
  --gold-l:#ffe49a;
  --rose:#f5c6d0;
  --orange:#ff8c00;
  --red:#ff2020;
  --white:#f0eee8;
}

body{
  background:#000;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:'Cinzel',serif;
}

/* 별 배경 */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;
  border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate var(--delay,0s);
}
@keyframes twinkle{
  from{opacity:.15;transform:scale(1);}
  to{opacity:.9;transform:scale(1.5);}
}

/* ── 메인 컨테이너 ── */
.logo-wrap{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
}

/* ── ALGO 텍스트 ── */
.algo-text{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0;
}

.algo-text span{
  display:inline-block;
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:140px;
  line-height:1;
  letter-spacing:-2px;
  position:relative;
  animation:letterFloat var(--lf,6s) ease-in-out infinite alternate var(--ld,0s);
}

/* 각 글자별 색상 & 그라디언트 */
.l-a{
  background:linear-gradient(160deg,#ffe49a 0%,#f0c96a 40%,#ff8c00 80%,#ff2020 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 18px #f0c96a99) drop-shadow(0 0 40px #ff8c0055);
  --lf:5.8s;--ld:0s;
}
.l-l{
  background:linear-gradient(160deg,#f5c6d0 0%,#e879a0 40%,#a855f7 80%,#7c3aed 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 18px #e879a099) drop-shadow(0 0 40px #a855f755);
  --lf:6.2s;--ld:.4s;
}
.l-g{
  background:linear-gradient(160deg,#ffe49a 0%,#f0c96a 40%,#ff8c00 80%,#ff2020 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 18px #f0c96a99) drop-shadow(0 0 40px #ff8c0055);
  --lf:5.5s;--ld:.8s;
}
.l-o{
  background:linear-gradient(160deg,#f5c6d0 0%,#e879a0 40%,#a855f7 80%,#7c3aed 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 18px #e879a099) drop-shadow(0 0 40px #a855f755);
  --lf:6.5s;--ld:1.2s;
}

@keyframes letterFloat{
  0%{transform:translateY(0) scale(1);}
  100%{transform:translateY(-6px) scale(1.03);}
}

/* 글자 아래 빛 반사 */
.algo-text span::after{
  content:attr(data-char);
  position:absolute;
  bottom:-60%;
  left:0;
  width:100%;
  text-align:center;
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:inherit;
  transform:scaleY(-.45) translateY(-10px);
  opacity:.12;
  filter:blur(3px);
}
.l-a::after,.l-g::after{
  background:linear-gradient(160deg,#ffe49a,#f0c96a,#ff8c00,#ff2020);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.l-l::after,.l-o::after{
  background:linear-gradient(160deg,#f5c6d0,#e879a0,#a855f7,#7c3aed);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ── 언더라인 장식 ── */
.deco-line{
  position:relative;
  width:520px;
  height:2px;
  margin-top:8px;
  background:linear-gradient(90deg,
    transparent 0%,
    #7c3aed 15%,
    #f0c96a 35%,
    #f5c6d0 50%,
    #f0c96a 65%,
    #a855f7 85%,
    transparent 100%
  );
  animation:linePulse 4s ease-in-out infinite alternate;
}
.deco-line::before,.deco-line::after{
  content:'';
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:6px;height:6px;
  border-radius:50%;
  background:#f0c96a;
  box-shadow:0 0 8px 3px #f0c96a;
}
.deco-line::before{left:0;}
.deco-line::after{right:0;}

/* 다이아몬드 센터 */
.deco-diamond{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  width:8px;height:8px;
  background:linear-gradient(135deg,#ffe49a,#f5c6d0);
  box-shadow:0 0 10px 4px #f0c96a99;
  animation:diamondPulse 3s ease-in-out infinite alternate;
}

@keyframes linePulse{
  0%{opacity:.6;filter:brightness(.9);}
  100%{opacity:1;filter:brightness(1.3);}
}
@keyframes diamondPulse{
  0%{transform:translate(-50%,-50%) rotate(45deg) scale(1);}
  100%{transform:translate(-50%,-50%) rotate(45deg) scale(1.5);}
}

/* ── 배경 글로우 ── */
.bg-glow{
  position:absolute;
  width:700px;height:300px;
  border-radius:50%;
  background:radial-gradient(ellipse,#7c3aed0a 0%,#f0c96a08 40%,transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  animation:bgGlow 6s ease-in-out infinite alternate;
  pointer-events:none;
  z-index:-1;
}
@keyframes bgGlow{
  0%{opacity:.5;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}
}

/* ── 파티클 ── */
.particles{
  position:absolute;
  width:600px;height:300px;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:-1;
}
.pt{
  position:absolute;
  border-radius:50%;
  animation:ptFloat var(--pd,8s) ease-in-out infinite alternate var(--pdd,0s);
}
@keyframes ptFloat{
  0%{transform:translateY(0) translateX(0);opacity:.4;}
  50%{opacity:.9;}
  100%{transform:translateY(var(--py,-20px)) translateX(var(--px,10px));opacity:.3;}
}

</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="logo-wrap">
  <div class="bg-glow"></div>

  <!-- 파티클 -->
  <div class="particles" id="particles"></div>

  <!-- ALGO 텍스트 -->
  <div class="algo-text">
    <span class="l-a" data-char="A">A</span>
    <span class="l-l" data-char="L">L</span>
    <span class="l-g" data-char="G">G</span>
    <span class="l-o" data-char="O">O</span>
  </div>

  <!-- 데코 라인 -->
  <div class="deco-line">
    <div class="deco-diamond"></div>
  </div>
</div>

<script>
// 별 배경
const bg = document.getElementById('bg');
const sc = ['#f0c96a','#a855f7','#f5c6d0','#ff8c00','#ff2020','#ffe49a','#e879a0','#fff'];
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=(Math.random()*1.8+0.3).toFixed(2);
  s.style.cssText=`
    width:${sz}px;height:${sz}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    background:${sc[Math.floor(Math.random()*sc.length)]};
    --d:${(Math.random()*4+1.5).toFixed(2)}s;
    --delay:-${(Math.random()*5).toFixed(2)}s;
  `;
  bg.appendChild(s);
}

// 파티클
const pc = document.getElementById('particles');
const pcColors=['#f0c96a','#a855f7','#f5c6d0','#ff8c00','#e879a0'];
for(let i=0;i<18;i++){
  const p=document.createElement('div');
  p.className='pt';
  const sz=(Math.random()*3+1).toFixed(2);
  const x=Math.random()*600;
  const y=Math.random()*300;
  const pyVal=(-(Math.random()*40+10)).toFixed(0);
  const pxVal=((Math.random()*30-15)).toFixed(0);
  p.style.cssText=`
    width:${sz}px;height:${sz}px;
    left:${x}px;top:${y}px;
    background:${pcColors[Math.floor(Math.random()*pcColors.length)]};
    box-shadow:0 0 ${sz*2}px ${pcColors[Math.floor(Math.random()*pcColors.length)]};
    --pd:${(Math.random()*6+5).toFixed(2)}s;
    --pdd:-${(Math.random()*5).toFixed(2)}s;
    --py:${pyVal}px;
    --px:${pxVal}px;
  `;
  pc.appendChild(p);
}
</script>
</body>
</html>
