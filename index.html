<script>
/* ══════════════════════════════════════
   CONFIG
══════════════════════════════════════ */
const API_KEYS = ['AIzaSyDzpxSQhciOKEa6qh_q3n5q47ug1mua6'];
const PC = 'AF8853448';
let keyIdx = 0;

/* ══════════════════════════════════════
   apiFetch
══════════════════════════════════════ */
async function apiFetch(url) {
  const validKeys = API_KEYS.filter(k => k && k.length > 20 && !k.startsWith('YOUR_'));
  if (!validKeys.length) throw new Error('유효한 API 키가 없습니다');
  for (let i = 0; i < validKeys.length; i++) {
    const k = validKeys[(keyIdx + i) % validKeys.length];
    const sep = url.includes('?') ? '&' : '?';
    try {
      const r = await fetch(url + sep + 'key=' + k);
      const data = await r.json();
      if (r.status === 403 || r.status === 429) { keyIdx++; continue; }
      if (data.error) {
        const code = data.error.code;
        const reason = (data.error.errors?.[0]?.reason) || '';
        console.warn('[apiFetch]', code, reason);
        if (code===403||code===429||reason==='quotaExceeded'||reason==='keyInvalid'||reason==='forbidden') { keyIdx++; continue; }
        if (reason==='invalidSearchFilter'||reason==='invalidVideoFilter') {
          const cleaned = url.replace(/[&?]videoCategoryId=[^&]*/g,'').replace(/[&?]videoDuration=[^&]*/g,'');
          return apiFetch(cleaned);
        }
        throw new Error(`API [${code}] ${reason}`);
      }
      if (!r.ok) throw new Error('HTTP ' + r.status);
      keyIdx = (keyIdx + i) % validKeys.length;
      return data;
    } catch(e) {
      if (i === validKeys.length - 1) throw e;
    }
  }
  throw new Error('모든 API 키 소진');
}

/* ══════════════════════════════════════
   NAVIGATION
══════════════════════════════════════ */
function showSec(navEl, id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  if (navEl) navEl.classList.add('active');
  if (id==='hot'     && !hotLoaded)  loadHot();
  if (id==='shop'    && !shopBuilt)  buildShop();
  if (id==='tools'   && !toolsBuilt) buildTools();
  if (id==='revenue') calcRevenue();
  if (id==='ai')      genAI();
}
let hotLoaded=false, shopBuilt=false, toolsBuilt=false;

/* ══════════════════════════════════════
   카테고리 설정
══════════════════════════════════════ */
const CAT_CFG = {
  '전체':        { categoryId:'',   keywords:['인기','급상승'], shortsKw:['shorts','쇼츠'] },
  '음악':        { categoryId:'10', keywords:['음악','뮤직비디오','K-POP'], shortsKw:['음악 shorts','kpop shorts'] },
  '게임':        { categoryId:'20', keywords:['게임','gaming','게임플레이'], shortsKw:['게임 shorts','gaming shorts'] },
  '엔터테인먼트':{ categoryId:'24', keywords:['엔터테인먼트','예능','버라이어티'], shortsKw:['예능 shorts','재미 shorts'] },
  '뉴스':        { categoryId:'25', keywords:['뉴스','news','시사'], shortsKw:['뉴스 shorts'] },
  '스포츠':      { categoryId:'17', keywords:['스포츠','축구','야구','농구'], shortsKw:['스포츠 shorts','축구 shorts'] },
  '교육':        { categoryId:'27', keywords:['교육','공부','강의','학습','튜토리얼'], shortsKw:['교육 shorts','공부 shorts'], searchOnly:true },
  '과학·기술':   { categoryId:'28', keywords:['과학','기술','테크','IT','프로그래밍'], shortsKw:['테크 shorts','IT shorts'] },
  '여행':        { categoryId:'19', keywords:['여행','travel','브이로그','해외여행'], shortsKw:['여행 shorts','travel shorts'], searchOnly:true },
  '라이프스타일':{ categoryId:'22', keywords:['라이프스타일','일상','vlog','데일리'], shortsKw:['일상 shorts','vlog shorts'] },
  '코미디':      { categoryId:'23', keywords:['코미디','웃긴','개그','유머'], shortsKw:['웃긴 shorts','개그 shorts'] },
  '영화·애니':   { categoryId:'1',  keywords:['영화','애니메이션','드라마','리뷰'], shortsKw:['영화 shorts','애니 shorts'] },
  '자동차':      { categoryId:'2',  keywords:['자동차','드라이브','차량','리뷰'], shortsKw:['자동차 shorts'] },
  'DIY·팁':     { categoryId:'26', keywords:['DIY','팁','노하우','꿀팁','만들기'], shortsKw:['꿀팁 shorts','DIY shorts'] },
  '반려동물':    { categoryId:'15', keywords:['강아지','고양이','반려동물','펫'], shortsKw:['강아지 shorts','고양이 shorts'] },
};
const CAT_KEYS = Object.keys(CAT_CFG);
let activeCat   = '전체';
let hotTypeFilt = 'shorts';
let catPool        = {};
let catShortsPool  = {}; // 쇼츠 전용 풀 (별도 검색)
let catPageToken   = {};
let catShortsCache = {};
let catLongCache   = {};
let shortsRenderIdx = 0;
let longRenderIdx   = 0;
const RENDER_STEP   = 25;

/* ══════════════════════════════════════
   카테고리 탭 빌드
══════════════════════════════════════ */
function buildCatTabs() {
  document.getElementById('catTabs').innerHTML = CAT_KEYS.map(k =>
    `<button class="cat-tab${k===activeCat?' active':''}" onclick="switchCat('${k}')">${k}</button>`
  ).join('');
}

/* ══════════════════════════════════════
   카테고리 전환
══════════════════════════════════════ */
async function switchCat(cat) {
  activeCat = cat;
  buildCatTabs();
  showSkeletons();
  if (!catShortsCache[cat] || !catLongCache[cat]) await loadUntilFull(cat);
  shortsRenderIdx = 0;
  longRenderIdx   = 0;
  renderShorts(false);
  renderLongs(false);
}

/* ══════════════════════════════════════
   스켈레톤
══════════════════════════════════════ */
function showSkeletons() {
  document.getElementById('shortsGrid').innerHTML =
    Array(8).fill('<div class="skeleton skeleton-shorts"></div>').join('');
  document.getElementById('longGrid').innerHTML =
    Array(4).fill('<div class="skeleton skeleton-long"></div>').join('');
}

/* ══════════════════════════════════════
   ★ 핵심 수정: 쇼츠를 별도 검색으로 수집
   - mostPopular 차트 → 롱폼 위주
   - search API + videoDuration=short → 쇼츠 위주
══════════════════════════════════════ */
async function loadUntilFull(cat, maxRounds=6) {
  catPool[cat]       = catPool[cat]      || [];
  catShortsPool[cat] = catShortsPool[cat]|| [];
  const cfg     = CAT_CFG[cat];
  const seenIds = new Set([
    ...catPool[cat].map(i => i.id?.videoId||i.id),
    ...catShortsPool[cat].map(i => i.id?.videoId||i.id)
  ]);

  // ── 쇼츠 전용 수집 (search API + videoDuration=short) ──
  await loadShortsSearch(cat, cfg.shortsKw||[], seenIds, 3);

  // ── 롱폼 수집 ──
  if (cfg.searchOnly) {
    await loadBySearch(cat, cfg.keywords, seenIds, maxRounds);
  } else {
    let token = catPageToken[cat]||'';
    let round = 0;
    while (round < maxRounds) {
      const longs = catPool[cat].filter(i => !isShorts(i));
      if (longs.length >= 25) break;
      if (!token && round > 0) break;
      try {
        let url = `https://www.googleapis.com/youtube/v3/videos`
                + `?part=snippet,statistics,contentDetails`
                + `&chart=mostPopular&regionCode=KR&maxResults=50&hl=ko`;
        if (cfg.categoryId) url += `&videoCategoryId=${cfg.categoryId}`;
        if (token)          url += `&pageToken=${token}`;
        const data = await apiFetch(url);
        const newItems = (data.items||[]).filter(i => {
          const id = i.id?.videoId||i.id;
          if (seenIds.has(id)) return false;
          seenIds.add(id); return true;
        });
        catPool[cat].push(...newItems);
        token = data.nextPageToken||'';
        catPageToken[cat] = token;
        round++;
        if (!token) break;
      } catch(e) { console.warn('chart load', e); break; }
    }
    // 부족하면 키워드 검색으로 보완
    const longs = catPool[cat].filter(i => !isShorts(i));
    if (longs.length < 25 && cfg.keywords.length) {
      await loadBySearch(cat, cfg.keywords, seenIds, 3);
    }
  }

  finalizeCache(cat);
}

/* ── 쇼츠 전용 검색 (videoDuration=short) ── */
async function loadShortsSearch(cat, keywords, seenIds, maxRoundsPerKw=3) {
  catShortsPool[cat] = catShortsPool[cat]||[];
  // 키워드가 없으면 기본 쿼리 사용
  const kwList = keywords.length ? keywords : ['인기 쇼츠 한국', 'shorts 한국 인기'];

  for (const kw of kwList) {
    if (catShortsPool[cat].length >= 50) break;
    let token = '';
    for (let r = 0; r < maxRoundsPerKw; r++) {
      if (catShortsPool[cat].length >= 50) break;
      try {
        // videoDuration=short → 4분 미만 영상 반환 (실제 쇼츠 포함)
        let sUrl = `https://www.googleapis.com/youtube/v3/search`
                 + `?part=snippet&type=video`
                 + `&q=${encodeURIComponent(kw)}`
                 + `&videoDuration=short`
                 + `&maxResults=50`
                 + `&regionCode=KR`
                 + `&relevanceLanguage=ko`
                 + `&order=viewCount`;
        if (token) sUrl += `&pageToken=${token}`;
        const sd = await apiFetch(sUrl);
        const ids = (sd.items||[])
          .map(i => i.id?.videoId)
          .filter(id => id && !seenIds.has(id));
        if (ids.length) {
          ids.forEach(id => seenIds.add(id));
          const vd = await apiFetch(
            `https://www.googleapis.com/youtube/v3/videos`
            + `?part=snippet,statistics,contentDetails&id=${ids.join(',')}`
          );
          // 실제 3분(180초) 이하만 쇼츠로 저장
          const shortItems = (vd.items||[]).filter(v => {
            const sec = parseDurSec(v.contentDetails?.duration||'');
            return sec > 0 && sec <= 180;
          });
          catShortsPool[cat].push(...shortItems);
        }
        token = sd.nextPageToken||'';
        if (!token) break;
      } catch(e) { console.warn('loadShortsSearch', kw, e); break; }
    }
  }
}

/* ── 롱폼 키워드 검색 보완 ── */
async function loadBySearch(cat, keywords, seenIds, maxRoundsPerKw=3) {
  catPool[cat] = catPool[cat]||[];
  for (const kw of keywords) {
    const longs = catPool[cat].filter(i => !isShorts(i));
    if (longs.length >= 25) return;
    let token = '';
    for (let r = 0; r < maxRoundsPerKw; r++) {
      try {
        let sUrl = `https://www.googleapis.com/youtube/v3/search`
                 + `?part=snippet&type=video&q=${encodeURIComponent(kw)}`
                 + `&maxResults=50&regionCode=KR&relevanceLanguage=ko&order=viewCount`;
        if (token) sUrl += `&pageToken=${token}`;
        const sd = await apiFetch(sUrl);
        const ids = (sd.items||[]).map(i => i.id?.videoId).filter(id => id && !seenIds.has(id));
        if (ids.length) {
          ids.forEach(id => seenIds.add(id));
          const vd = await apiFetch(
            `https://www.googleapis.com/youtube/v3/videos`
            + `?part=snippet,statistics,contentDetails&id=${ids.join(',')}`
          );
          catPool[cat].push(...(vd.items||[]));
        }
        token = sd.nextPageToken||'';
        if (!token) break;
      } catch(e) { console.warn('loadBySearch', kw, e); break; }
    }
  }
}

/* ══════════════════════════════════════
   ★ 핵심 수정: finalizeCache
   - 쇼츠: catShortsPool (전용 풀) 사용
   - 롱폼: catPool에서 180초 초과 영상
══════════════════════════════════════ */
function finalizeCache(cat) {
  // 쇼츠: 전용 풀에서 바이럴 정렬
  const shorts = catShortsPool[cat]||[];
  catShortsCache[cat] = shorts.slice().sort((a,b) => viralOf(b)-viralOf(a));

  // 롱폼: 일반 풀에서 180초 초과만
  const longs = (catPool[cat]||[]).filter(i => {
    const sec = parseDurSec(i.contentDetails?.duration||'');
    return sec > 180;
  });
  catLongCache[cat] = longs.slice().sort((a,b) => viralOf(b)-viralOf(a));

  console.log(`[${cat}] 쇼츠: ${catShortsCache[cat].length}개, 롱폼: ${catLongCache[cat].length}개`);
}

/* ══════════════════════════════════════
   isShorts 판별 (180초 이하)
══════════════════════════════════════ */
function isShorts(item) {
  const sec = parseDurSec(item.contentDetails?.duration||'');
  return sec > 0 && sec <= 180;
}

function viralOf(item) {
  return calcViral(
    parseInt(item.statistics?.viewCount   ||0),
    parseInt(item.statistics?.likeCount   ||0),
    parseInt(item.statistics?.commentCount||0)
  );
}

/* ══════════════════════════════════════
   classifyItems (키워드 검색 결과 분류용)
══════════════════════════════════════ */
function classifyItems(items) {
  const shorts=[], longs=[];
  items.forEach(item => {
    if (isShorts(item)) shorts.push(item);
    else                longs.push(item);
  });
  const byViral = arr => arr.slice().sort((a,b) => viralOf(b)-viralOf(a));
  return { shorts:byViral(shorts), longs:byViral(longs) };
}

/* ══════════════════════════════════════
   타입 스위처
══════════════════════════════════════ */
function setHotType(el, tf) {
  hotTypeFilt = tf;
  document.querySelectorAll('.hot-type-btn').forEach(b => {
    b.classList.remove('active','shorts-active','long-active');
  });
  el.classList.add('active');
  if (tf==='shorts') el.classList.add('shorts-active');
  else               el.classList.add('long-active');
  document.getElementById('shortsSection').style.display = tf==='shorts' ? 'block' : 'none';
  document.getElementById('longSection').style.display   = tf==='long'   ? 'block' : 'none';
}

/* ══════════════════════════════════════
   렌더 — 쇼츠 / 롱폼 분리
══════════════════════════════════════ */
function renderShorts(append) {
  const shorts = catShortsCache[activeCat]||[];
  const sGrid  = document.getElementById('shortsGrid');
  if (!append) { shortsRenderIdx=0; sGrid.innerHTML=''; }
  const slice = shorts.slice(shortsRenderIdx, shortsRenderIdx+RENDER_STEP);
  if (slice.length===0 && shortsRenderIdx===0) {
    sGrid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📱</div><p>쇼츠 영상이 없습니다.</p></div>`;
  } else {
    sGrid.insertAdjacentHTML('beforeend',
      slice.map((item,i) => shortsCardHTML(item, shortsRenderIdx+i)).join(''));
    shortsRenderIdx += slice.length;
  }
  document.getElementById('shortsCountBadge').textContent =
    `${shortsRenderIdx}/${shorts.length}개 · 바이럴 높은 순`;
  document.getElementById('shortsMoreBtn').style.display =
    shortsRenderIdx < shorts.length ? 'flex' : 'none';
}

function renderLongs(append) {
  const longs = catLongCache[activeCat]||[];
  const lGrid = document.getElementById('longGrid');
  if (!append) { longRenderIdx=0; lGrid.innerHTML=''; }
  const slice = longs.slice(longRenderIdx, longRenderIdx+RENDER_STEP);
  if (slice.length===0 && longRenderIdx===0) {
    lGrid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🎬</div><p>롱폼 영상이 없습니다.</p></div>`;
  } else {
    lGrid.insertAdjacentHTML('beforeend',
      slice.map((item,i) => longCardHTML(item, longRenderIdx+i)).join(''));
    longRenderIdx += slice.length;
  }
  document.getElementById('longCountBadge').textContent =
    `${longRenderIdx}/${longs.length}개 · 바이럴 높은 순`;
  document.getElementById('longMoreBtn').style.display =
    longRenderIdx < longs.length ? 'flex' : 'none';
}

/* ══════════════════════════════════════
   더보기 버튼
══════════════════════════════════════ */
async function loadMoreShorts() {
  const btn    = document.getElementById('shortsMoreBtn');
  const shorts = catShortsCache[activeCat]||[];
  if (shortsRenderIdx >= shorts.length) {
    btn.disabled=true; btn.textContent='⏳ 로딩 중...';
    await loadShortsSearch(activeCat, CAT_CFG[activeCat].shortsKw||[], new Set(), 3);
    finalizeCache(activeCat);
    btn.disabled=false; btn.textContent='↓ 쇼츠 더 불러오기';
  }
  renderShorts(true);
}

async function loadMoreLong() {
  const btn   = document.getElementById('longMoreBtn');
  const longs = catLongCache[activeCat]||[];
  if (longRenderIdx >= longs.length) {
    btn.disabled=true; btn.textContent='⏳ 로딩 중...';
    await loadUntilFull(activeCat, 4);
    btn.disabled=false; btn.textContent='↓ 롱폼 더 불러오기';
  }
  renderLongs(true);
}

/* ══════════════════════════════════════
   LOAD HOT
══════════════════════════════════════ */
async function loadHot() {
  hotLoaded = true;
  buildCatTabs();
  setHotType(document.getElementById('btnShorts'), 'shorts');
  showSkeletons();
  try {
    await loadUntilFull('전체');
  } catch(e) {
    console.error('[loadHot]', e);
    document.getElementById('shortsGrid').innerHTML =
      `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">⚠️</div>
        <p style="color:#ff6b6b">${e.message}</p>
        <p style="font-size:12px;margin-top:8px">F12 콘솔에서 오류를 확인하세요</p>
      </div>`;
    return;
  }
  shortsRenderIdx=0; longRenderIdx=0;
  renderShorts(false);
  renderLongs(false);
  // 백그라운드 프리로드
  ['음악','게임','엔터테인먼트','교육','여행'].forEach(k => {
    if (!catShortsCache[k]) loadUntilFull(k);
  });
}

/* ══════════════════════════════════════
   카드 HTML — 쇼츠
══════════════════════════════════════ */
function shortsCardHTML(item, idx) {
  const s  = item.snippet    ||{};
  const st = item.statistics ||{};
  const views    = parseInt(st.viewCount   ||0);
  const likes    = parseInt(st.likeCount   ||0);
  const comments = parseInt(st.commentCount||0);
  const viral    = calcViral(views, likes, comments);
  const durFmt   = formatDuration(item.contentDetails?.duration||'');
  const vid      = item.id?.videoId||item.id||'';
  const thumb    = s.thumbnails?.high?.url||s.thumbnails?.medium?.url||s.thumbnails?.default?.url||'';
  const {pillCls,pillLabel} = getViralPill(viral);
  const rankCls = idx===0?'rank-gold':idx===1?'rank-silver':idx===2?'rank-bronze':'rank-normal';
  return `<div class="shorts-card" onclick="openVidModal('${vid}','${escQ(s.title||'')}')">
    <div class="shorts-thumb-wrap">
      <img class="shorts-thumb" src="${thumb}" alt="" loading="lazy">
      <div class="shorts-overlay"></div>
      <div class="shorts-rank-badge ${rankCls}">${idx+1}</div>
      ${durFmt?`<div class="shorts-duration">⏱ ${durFmt}</div>`:''}
      <div class="shorts-viral-overlay">
        <div class="shorts-viral-pill ${pillCls}">${pillLabel} ${viral}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.6);backdrop-filter:blur(4px);padding:2px 6px;border-radius:6px">
          👁 ${fmtNum(views)}
        </div>
      </div>
    </div>
    <div class="shorts-info">
      <div class="shorts-title">${s.title||''}</div>
      <div class="shorts-meta">
        <span>👍 ${fmtNum(likes)}</span>
        <span>💬 ${fmtNum(comments)}</span>
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════
   카드 HTML — 롱폼
══════════════════════════════════════ */
function longCardHTML(item, idx) {
  const s  = item.snippet    ||{};
  const st = item.statistics ||{};
  const views    = parseInt(st.viewCount   ||0);
  const likes    = parseInt(st.likeCount   ||0);
  const comments = parseInt(st.commentCount||0);
  const viral    = calcViral(views, likes, comments);
  const durFmt   = formatDuration(item.contentDetails?.duration||'');
  const vid      = item.id?.videoId||item.id||'';
  const thumb    = s.thumbnails?.medium?.url||s.thumbnails?.default?.url||'';
  const {badgeCls,stripCls,pillLabel} = getViralBadge(viral);
  const rankCls  = idx===0?'rank-gold':idx===1?'rank-silver':idx===2?'rank-bronze':'rank-normal';
  const barColor = viral>=80?'#ff6b6b':viral>=60?'#ff9500':viral>=40?'#6bcb77':'rgba(124,92,252,.6)';
  return `<div class="long-card" onclick="openVidModal('${vid}','${escQ(s.title||'')}')">
    <div class="long-thumb-wrap">
      <img class="long-thumb" src="${thumb}" alt="" loading="lazy">
      <div class="long-thumb-overlay"></div>
      <div class="long-rank-badge ${rankCls}" style="font-size:11px;font-weight:900">${idx+1}</div>
      ${durFmt?`<div class="long-duration">${durFmt}</div>`:''}
      <div class="long-viral-strip ${stripCls}"></div>
    </div>
    <div class="long-info">
      <div class="long-header">
        <div class="long-title">${s.title||''}</div>

  const q = document.getElementById('hdrQ').value.trim();

async function fetchKw(q, token) {
  try {
    let url = `https://www.googleapis.com/youtube/v3/search`
            + `?part=snippet&type=video&q=${encodeURIComponent(q)}`
            + `&maxResults=25&regionCode=KR&relevanceLanguage=ko`;
    if (token) url += '&pageToken='+token;
    const sd  = await apiFetch(url);
    const ids = (sd.items||[]).map(i=>i.id?.videoId).filter(Boolean);
    if (!ids.length) { renderKwGrid(); return; }
    const vd = await apiFetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${ids.join(',')}`
    );
    kwAllItems.push(...(vd.items||[]));
    kwNextToken = sd.nextPageToken||'';
    renderKwGrid();
  } catch(e) {
    document.getElementById('kwGrid').innerHTML =
      `<div class="error-msg">검색 오류: ${e.message}</div>`;
  }
}

function renderKwGrid() {
  const filtered = applyTypeFilter(kwAllItems, kwTypeFilt);
  document.getElementById('kwGrid').innerHTML = filtered.length
    ? filtered.map(item=>vidCardHTML(item)).join('')
    : '<div class="error-msg">검색 결과가 없습니다.</div>';
  document.getElementById('kwMoreWrap').style.display = kwNextToken?'block':'none';
}

async function loadKwMore() { if(!kwNextToken)return; await fetchKw(kwQuery,kwNextToken); }

function setKwType(el, tf) {

  if (tf==='shorts') return items.filter(i=>isShorts(i));

    </div>

}

function parseDurSec(iso) {
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return 0;
  return (parseInt(m[1]||0)*3600)+(parseInt(m[2]||0)*60)+parseInt(m[3]||0);
}
function formatDuration(iso) {
  const s=parseDurSec(iso); if(!s)return '';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h)return `${h}:${pad(m)}:${pad(sec)}`;
  return `${m}:${pad(sec)}`;
}
function pad(n){return String(n).padStart(2,'0');}
function calcViral(v,l,c){
  if(!v)return 0;
  const base=Math.min(100,Math.log10(Math.max(v,1)/1000+1)*32);
  const eng =Math.min(100,(l+c*3)/Math.max(v,1)*100*25);
  return Math.round(base*.55+eng*.45);
}
function fmtNum(n){
  if(n>=100000000)return (n/100000000).toFixed(1)+'억';
  if(n>=10000)    return (n/10000).toFixed(1)+'만';
  if(n>=1000)     return (n/1000).toFixed(1)+'천';
  return String(n);
}
function escQ(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

async function resolveChannelId(input){
  input=input.trim();
  if(/^UC[\w-]{22}$/.test(input))return input;
  const urlM=input.match(/youtube\.com\/(channel\/(UC[\w-]{22})|@([\w.-]+)|c\/([\w.-]+)|user\/([\w.-]+))/);
  if(urlM){if(urlM[2])return urlM[2];const h=urlM[3]||urlM[4]||urlM[5];if(h)return resolveHandle(h);}
  if(input.startsWith('@'))return resolveHandle(input.slice(1));
  return resolveHandle(input);
}
async function resolveHandle(handle){
  try{const d=await apiFetch(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${encodeURIComponent(handle)}`);if(d.items?.length)return d.items[0].id;}catch(e){}
  try{const d=await apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(handle)}&maxResults=1`);if(d.items?.length)return d.items[0].snippet.channelId;}catch(e){}
  return null;
}

function buildGaugeSVG(score,grade){
  const fe=-210+240*(score/100),bp=describeArc(90,90,70,-210,30),fp=describeArc(90,90,70,-210,fe);
  return `<svg width="180" height="110" viewBox="0 0 180 110" style="overflow:visible"><defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="${grade.color}"/><stop offset="100%" stop-color="${grade.glow}"/></linearGradient><filter id="gf"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><path d="${bp}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="10" stroke-linecap="round"/><path d="${fp}" fill="none" stroke="url(#gg)" stroke-width="10" stroke-linecap="round" filter="url(#gf)"/><text x="90" y="80" text-anchor="middle" font-size="28" font-weight="900" fill="${grade.color}">${score}</text><text x="90" y="96" text-anchor="middle" font-size="10" fill="rgba(255,255,255,.5)">/ 100</text></svg>`;
}
function describeArc(cx,cy,r,startDeg,endDeg){
  const s=pToXY(cx,cy,r,startDeg),e=pToXY(cx,cy,r,endDeg),large=endDeg-startDeg>180?1:0;
  return `M${s.x},${s.y} A${r},${r},0,${large},1,${e.x},${e.y}`;
}
function pToXY(cx,cy,r,deg){const rad=(deg-90)*Math.PI/180;return{x:+(cx+r*Math.cos(rad)).toFixed(3),y:+(cy+r*Math.sin(rad)).toFixed(3)};}
function calcEngagement(vids){
  if(!vids.length)return 0;let tot=0;
  vids.forEach(v=>{const vw=parseInt(v.statistics?.viewCount||0),lk=parseInt(v.statistics?.likeCount||0),cm=parseInt(v.statistics?.commentCount||0);if(vw>0)tot+=Math.min(100,(lk+cm*3)/vw*1000);});
  return Math.round(tot/vids.length);
}
function calcConsistency(vids){
  if(vids.length<3)return 20;
  const dates=vids.map(v=>new Date(v.snippet?.publishedAt||0)).sort((a,b)=>a-b);
  const gaps=[];for(let i=1;i<dates.length;i++)gaps.push((dates[i]-dates[i-1])/86400000);
  const avg=gaps.reduce((a,b)=>a+b,0)/gaps.length;
  const cv=Math.sqrt(gaps.reduce((a,b)=>a+(b-avg)**2,0)/gaps.length)/avg;
  if(avg<=3)return Math.round(Math.max(0,100-cv*20));
  if(avg<=7)return Math.round(Math.max(0,85-cv*15));
  if(avg<=14)return Math.round(Math.max(0,65-cv*15));
  return Math.round(Math.max(0,40-cv*10));
}
