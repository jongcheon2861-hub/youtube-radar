<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO · algo.living1004.com</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --void:#04040c;
  --purple:#a855f7;
  --purple-d:#6b21a8;
  --gold:#d4a942;
  --gold-l:#f0c96a;
  --white:#f0eee8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--void);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:60px;
  font-family:'Noto Sans KR',sans-serif;
  overflow:hidden;
}

/* ── 별 배경 ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;}
@keyframes twinkle{0%{opacity:.15;transform:scale(1);}100%{opacity:.85;transform:scale(1.5);}}

/* ── 공통 레이아웃 ── */
.logo-section,.badge-section{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:22px;
}

/* ══════════════════════════════════
   메인 로고 심볼
══════════════════════════════════ */
.logo-symbol{
  position:relative;
  width:72px;height:72px;
  flex-shrink:0;
}

/* 방사 (radiance) */
.sym-radiance{
  position:absolute;inset:-20px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(168,85,247,.28) 0%,rgba(212,169,66,.12) 45%,transparent 70%);
  animation:radPulse 3s ease-in-out infinite;
}
@keyframes radPulse{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.15);}}

/* 강착원반 링 */
.acc-ring{
  position:absolute;
  border-radius:50%;
  border:1.5px solid transparent;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotateX(68deg);
  animation:accSpin var(--dur) linear infinite;
}
@keyframes accSpin{from{transform:translate(-50%,-50%) rotateX(68deg) rotate(0deg);}
                   to{transform:translate(-50%,-50%) rotateX(68deg) rotate(360deg);}}
.acc-ring:nth-child(1){width:88px;height:88px;border-color:rgba(212,169,66,.9);--dur:2.8s;}
.acc-ring:nth-child(2){width:100px;height:100px;border-color:rgba(168,85,247,.75);--dur:2.2s;animation-direction:reverse;}
.acc-ring:nth-child(3){width:112px;height:112px;border-color:rgba(212,169,66,.45);--dur:1.6s;}
.acc-ring:nth-child(4){width:124px;height:124px;border-color:rgba(168,85,247,.3);--dur:1.0s;animation-direction:reverse;}

/* 제트 (jet) */
.jet{
  position:absolute;left:50%;transform:translateX(-50%);
  width:2px;border-radius:1px;
  animation:jetPulse 1.8s ease-in-out infinite;
}
.jet-top{top:-28px;height:26px;background:linear-gradient(to top,var(--gold),transparent);}
.jet-bot{bottom:-28px;height:26px;background:linear-gradient(to bottom,var(--purple),transparent);}
@keyframes jetPulse{0%,100%{opacity:.5;height:26px;}50%{opacity:1;height:34px;}}

/* 파티클 */
.particle{
  position:absolute;
  width:3px;height:3px;
  border-radius:50%;
  background:var(--gold);
  top:50%;left:50%;
  transform-origin:0 0;
  animation:pullIn var(--pd) var(--pdelay) ease-in infinite;
}
@keyframes pullIn{
  0%{opacity:1;transform:rotate(var(--pa)) translateX(var(--pr)) scale(1);}
  100%{opacity:0;transform:rotate(calc(var(--pa)+540deg)) translateX(2px) scale(0);}
}

/* 플레어 */
.flare{
  position:absolute;inset:-4px;
  border-radius:50%;
  border:1px solid rgba(240,201,106,.6);
  animation:flarePulse 2.5s ease-in-out infinite;
}
.flare:nth-child(1){animation-delay:0s;}
.flare:nth-child(2){animation-delay:.83s;inset:-10px;border-color:rgba(168,85,247,.4);}
.flare:nth-child(3){animation-delay:1.66s;inset:-16px;border-color:rgba(212,169,66,.2);}
@keyframes flarePulse{0%{opacity:.8;transform:scale(1);}50%{opacity:.3;transform:scale(1.08);}100%{opacity:.8;transform:scale(1);}}

/* 코어 */
.core{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:18px;height:18px;
  border-radius:50%;
  background:radial-gradient(circle,var(--gold-l) 0%,var(--gold) 40%,var(--purple-d) 70%,transparent 100%);
  box-shadow:0 0 12px var(--gold),0 0 24px rgba(168,85,247,.6);
  animation:coreGlow 2s ease-in-out infinite;
}
@keyframes coreGlow{0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}}

/* ══════════════════════════════════
   메인 워드마크
══════════════════════════════════ */
.wordmark{
  display:flex;flex-direction:column;
  gap:4px;
}

/* 왼쪽 방사 효과 */
.wm-radiance{
  position:absolute;left:-10px;top:50%;transform:translateY(-50%);
  width:40px;height:60px;
  background:radial-gradient(ellipse at left,rgba(168,85,247,.18),transparent 80%);
  pointer-events:none;
}

.wm-algo{
  font-family:'Cinzel',serif;
  font-size:52px;
  font-weight:900;
  letter-spacing:14px;
  color:var(--white);
  line-height:1;
  text-shadow:0 0 20px rgba(212,169,66,.4),0 0 40px rgba(168,85,247,.2);
  position:relative;
}

/* 구분선 */
.wm-rule{
  display:flex;align-items:center;gap:6px;
  margin:3px 0;
}
.wm-rule-line{
  flex:1;height:1px;
  background:linear-gradient(to right,rgba(212,169,66,.6),rgba(168,85,247,.3));
}
.wm-rule-diamond{
  width:5px;height:5px;
  background:var(--gold);
  transform:rotate(45deg);
  animation:diamondPulse 2s ease-in-out infinite;
}
@keyframes diamondPulse{0%,100%{box-shadow:0 0 4px var(--gold);}50%{box-shadow:0 0 10px var(--gold),0 0 20px rgba(168,85,247,.5);}}

/* 도메인 (알고리빙천사 = algo.living1004.com) */
.wm-domain{
  font-family:'Noto Sans KR',sans-serif;
  font-size:10px;
  font-weight:300;
  letter-spacing:3px;
  color:rgba(168,85,247,.75);
  text-decoration:none;
  transition:color .3s, text-shadow .3s;
}
.wm-domain:hover{
  color:var(--gold-l);
  text-shadow:0 0 10px rgba(212,169,66,.5);
}

/* ══════════════════════════════════
   미니 뱃지
══════════════════════════════════ */
.badge-section{
  gap:10px;
  background:rgba(4,4,12,.7);
  border:1px solid rgba(212,169,66,.25);
  border-radius:40px;
  padding:8px 18px 8px 10px;
  box-shadow:0 0 20px rgba(168,85,247,.15),inset 0 0 12px rgba(4,4,12,.8);
}

/* 뱃지 심볼 */
.badge-sym{
  position:relative;
  width:36px;height:36px;
  flex-shrink:0;
}
.badge-sym .sym-radiance{inset:-10px;}
.badge-sym .acc-ring:nth-child(1){width:44px;height:44px;}
.badge-sym .acc-ring:nth-child(2){width:50px;height:50px;}
.badge-sym .acc-ring:nth-child(3){width:56px;height:56px;}
.badge-sym .acc-ring:nth-child(4){width:62px;height:62px;}
.badge-sym .jet-top{top:-14px;height:13px;}
.badge-sym .jet-bot{bottom:-14px;height:13px;}
.badge-sym .core{width:9px;height:9px;}
.badge-sym .particle{width:2px;height:2px;}
.badge-sym .flare:nth-child(1){inset:-2px;}
.badge-sym .flare:nth-child(2){inset:-5px;}
.badge-sym .flare:nth-child(3){inset:-8px;}

/* 뱃지 텍스트 */
.badge-text{display:flex;flex-direction:column;gap:2px;}
.badge-algo{
  font-family:'Cinzel',serif;
  font-size:18px;
  font-weight:900;
  letter-spacing:6px;
  color:var(--white);
  line-height:1;
  text-shadow:0 0 12px rgba(212,169,66,.3);
}
.badge-rule{display:flex;align-items:center;gap:4px;margin:2px 0;}
.badge-rule-line{flex:1;height:1px;background:linear-gradient(to right,rgba(212,169,66,.5),rgba(168,85,247,.25));}
.badge-rule-diamond{width:3px;height:3px;background:var(--gold);transform:rotate(45deg);animation:diamondPulse 2s ease-in-out infinite;}

/* 뱃지 도메인 */
.badge-domain{
  font-family:'Noto Sans KR',sans-serif;
  font-size:7px;
  font-weight:300;
  letter-spacing:1.5px;
  color:rgba(168,85,247,.7);
  text-decoration:none;
  transition:color .3s;
}
.badge-domain:hover{color:var(--gold-l);}

</style>
</head>
<body>
<div class="bg"></div>
<script>
const bg=document.querySelector('.bg');
for(let i=0;i<50;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+.5;
  const colors=['#f0c96a','#a855f7','#f0eee8','#d4a942'];
  s.style.cssText=`
    width:${sz}px;height:${sz}px;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --d:${2+Math.random()*4}s;
    --delay:${Math.random()*4}s;
  `;
  bg.appendChild(s);
}
</script>

<!-- ══ 메인 로고 ══ -->
<div class="logo-section">

  <!-- 블랙홀 심볼 -->
  <div class="logo-symbol">
    <div class="sym-radiance"></div>
    <div class="acc-ring"></div>
    <div class="acc-ring"></div>
    <div class="acc-ring"></div>
    <div class="acc-ring"></div>
    <div class="jet jet-top"></div>
    <div class="jet jet-bot"></div>
    <!-- 파티클 8개 -->
    <div class="particle" style="--pa:0deg;  --pr:32px;--pd:1.4s;--pdelay:0s;"></div>
    <div class="particle" style="--pa:45deg; --pr:28px;--pd:1.2s;--pdelay:.2s;"></div>
    <div class="particle" style="--pa:90deg; --pr:30px;--pd:1.6s;--pdelay:.4s;"></div>
    <div class="particle" style="--pa:135deg;--pr:26px;--pd:1.3s;--pdelay:.6s;"></div>
    <div class="particle" style="--pa:180deg;--pr:31px;--pd:1.5s;--pdelay:.1s;"></div>
    <div class="particle" style="--pa:225deg;--pr:27px;--pd:1.1s;--pdelay:.3s;"></div>
    <div class="particle" style="--pa:270deg;--pr:29px;--pd:1.4s;--pdelay:.5s;"></div>
    <div class="particle" style="--pa:315deg;--pr:25px;--pd:1.2s;--pdelay:.7s;"></div>
    <!-- 플레어 -->
    <div class="flare"></div>
    <div class="flare"></div>
    <div class="flare"></div>
    <!-- 코어 -->
    <div class="core"></div>
  </div>

  <!-- 워드마크 -->
  <div class="wordmark" style="position:relative;">
    <div class="wm-radiance"></div>
    <div class="wm-algo">ALGO</div>
    <div class="wm-rule">
      <div class="wm-rule-line"></div>
      <div class="wm-rule-diamond"></div>
      <div class="wm-rule-line"></div>
    </div>
    <a class="wm-domain" href="https://algo.living1004.com" target="_blank">algo.living1004.com</a>
  </div>
</div>

<!-- ══ 미니 뱃지 ══ -->
<div class="badge-section">

  <!-- 뱃지 블랙홀 심볼 -->
  <div class="badge-sym">
    <div class="sym-radiance"></div>
    <div class="acc-ring"></div>
    <div class="acc-ring"></div>
    <div class="acc-ring"></div>
    <div class="acc-ring"></div>
    <div class="jet jet-top"></div>
    <div class="jet jet-bot"></div>
    <div class="particle" style="--pa:0deg;  --pr:16px;--pd:1.4s;--pdelay:0s;"></div>
    <div class="particle" style="--pa:90deg; --pr:14px;--pd:1.6s;--pdelay:.4s;"></div>
    <div class="particle" style="--pa:180deg;--pr:15px;--pd:1.5s;--pdelay:.1s;"></div>
    <div class="particle" style="--pa:270deg;--pr:13px;--pd:1.4s;--pdelay:.5s;"></div>
    <div class="flare"></div>
    <div class="flare"></div>
    <div class="flare"></div>
    <div class="core"></div>
  </div>

  <!-- 뱃지 텍스트 -->
  <div class="badge-text">
    <div class="badge-algo">ALGO</div>
    <div class="badge-rule">
      <div class="badge-rule-line"></div>
      <div class="badge-rule-diamond"></div>
      <div class="badge-rule-line"></div>
    </div>
    <a class="badge-domain" href="https://algo.living1004.com" target="_blank">algo.living1004.com</a>
  </div>

</div>
</body>
</html>
