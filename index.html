<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>YTAnalytics Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
/* ══════════════════════════════════════
   ROOT VARIABLES
══════════════════════════════════════ */
:root{
  --bg:#0a0a0f; --bg2:#12121a; --bg3:#1a1a26; --card:#1e1e2e;
  --acc:#6c63ff; --acc2:#ff6584; --acc3:#43e97b; --acc4:#f7971e;
  --txt:#e8e8f0; --txt2:#9999bb; --border:#2a2a3e;
  --header-h:62px; --ad-h:0px; --top-offset:62px;
  --radius:14px; --shadow:0 8px 32px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);padding-top:var(--top-offset);transition:padding-top .3s}

/* ══════════════════════════════════════
   STICKY AD — ⑨ 숨기기 버튼 덜 눈에 띄게
══════════════════════════════════════ */
#sticky-ad{
  position:fixed;top:var(--header-h);left:0;right:0;z-index:900;
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;padding:6px 12px;
  transition:transform .3s;
}
#sticky-ad.hidden{transform:translateY(-110%)}
#sticky-ad ins{display:block;min-height:60px;flex:1;max-width:728px}
/* ⑨ 토글버튼: 작고 반투명하게 */
#ad-toggle{
  position:fixed;
  top:calc(var(--header-h) + var(--ad-h) - 1px);
  right:6px;z-index:901;
  background:rgba(108,99,255,.35);
  color:rgba(255,255,255,.6);
  border:none;border-radius:0 0 6px 6px;
  font-size:9px;padding:2px 8px;cursor:pointer;
  letter-spacing:.5px;transition:background .2s,color .2s;
  backdrop-filter:blur(4px);
}
#ad-toggle:hover{background:rgba(108,99,255,.7);color:#fff}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
header{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--header-h);
  background:linear-gradient(135deg,#0d0d1a,#1a1a2e);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;
}
.logo{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.nav-tabs{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:7px 14px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:500;background:transparent;color:var(--txt2);transition:all .2s;white-space:nowrap}
.nav-tab.active,.nav-tab:hover{background:var(--acc);color:#fff}
.header-credits{background:linear-gradient(135deg,var(--acc4),#f9c220);color:#000;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.app{display:flex;min-height:calc(100vh - var(--top-offset))}

/* ⑥ 왼쪽 네비게이션 광고 복구 */
aside{
  width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  position:sticky;top:var(--top-offset);height:calc(100vh - var(--top-offset));
  overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:0;
}
.aside-ad{
  margin-top:auto;padding-top:12px;border-top:1px solid var(--border);
}
.aside-ad ins{display:block;min-height:200px}

.sidebar-sec{margin-bottom:16px}
.sidebar-sec h4{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;padding:0 8px 8px}
.side-btn{width:100%;padding:9px 12px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:var(--txt2);font-size:13px;text-align:left;transition:all .2s;display:flex;align-items:center;gap:8px}
.side-btn:hover,.side-btn.active{background:var(--acc);color:#fff}

main{flex:1;padding:20px;overflow-x:hidden;min-width:0}
.section{display:none}.section.active{display:block}

/* ══════════════════════════════════════
   CARDS
══════════════════════════════════════ */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:16px}
.card h3{font-size:16px;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ══════════════════════════════════════
   ① HOT VIDEO CONTROLS — 탭 복구
══════════════════════════════════════ */
.hot-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.search-wrap{display:flex;gap:8px;flex:1;min-width:200px}
.search-wrap input{flex:1;padding:9px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--txt);font-size:13px}
.search-wrap input:focus{outline:none;border-color:var(--acc)}
.search-wrap button{padding:9px 18px;border-radius:20px;border:none;background:var(--acc);color:#fff;cursor:pointer;font-size:13px}

/* ① 쇼츠/롱폼 탭 */
.type-tabs{display:flex;gap:6px;flex-wrap:wrap}
.type-tab{padding:7px 16px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap}
.type-tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.type-tab[data-t="short"].active{background:#ff0000;border-color:#ff0000}
.type-tab[data-t="long"].active{background:#1a73e8;border-color:#1a73e8}

.cat-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.cat-chip{padding:5px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);cursor:pointer;font-size:12px;transition:all .2s}
.cat-chip:hover,.cat-chip.active{background:var(--acc2);color:#fff;border-color:var(--acc2)}

/* ══════════════════════════════════════
   VIDEO GRID
══════════════════════════════════════ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-top:14px}
.vcard{background:var(--bg3);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .2s,box-shadow .2s}
.vcard:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.vcard-thumb{position:relative;padding-top:56.25%;overflow:hidden;background:#111}
.vcard-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.badge{position:absolute;top:6px;left:6px;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.3px}
.badge.shorts{background:#ff0000;color:#fff}
.badge.long{background:#1a73e8;color:#fff}
.dur-badge{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.75);color:#fff;font-size:10px;padding:2px 6px;border-radius:6px}
.vcard-info{padding:10px}
.vcard-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vcard-meta{font-size:11px;color:var(--txt2);display:flex;gap:8px;flex-wrap:wrap}
.viral-bar-wrap{margin-top:8px}
.viral-bar{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--acc3),var(--acc2))}
.viral-label{font-size:10px;color:var(--txt2);margin-top:3px}

/* ══════════════════════════════════════
   ③ CHANNEL RANK SYSTEM
══════════════════════════════════════ */
.rank-table{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px}
.rank-item{background:var(--bg3);border-radius:10px;padding:10px;text-align:center;border:2px solid transparent;transition:all .2s}
.rank-item.current{border-color:var(--acc);background:rgba(108,99,255,.12);transform:scale(1.04)}
.rank-icon{font-size:24px;margin-bottom:4px}
.rank-name{font-size:11px;font-weight:700;margin-bottom:2px}
.rank-range{font-size:10px;color:var(--txt2)}

/* 채널 점수 게이지 */
.score-gauge-wrap{margin:16px 0}
.score-gauge-track{background:var(--bg3);border-radius:20px;height:12px;overflow:hidden;position:relative}
.score-gauge-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--acc3),var(--acc),var(--acc2));transition:width 1s ease}
.score-label-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:12px;color:var(--txt2)}

.ch-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat-box{background:var(--bg3);border-radius:12px;padding:12px;text-align:center}
.stat-num{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-lbl{font-size:11px;color:var(--txt2);margin-top:4px}

/* ④ 채널 피드백 */
.feedback-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.fb-box{background:var(--bg3);border-radius:12px;padding:14px;border-left:3px solid var(--acc)}
.fb-box.warn{border-left-color:var(--acc2)}
.fb-box.tip{border-left-color:var(--acc4)}
.fb-box h5{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fb-box ul{list-style:none;padding:0}
.fb-box ul li{font-size:11px;color:var(--txt2);padding:3px 0;line-height:1.5}
.fb-box ul li::before{content:'• ';color:var(--acc)}
.fb-box.warn ul li::before{color:var(--acc2)}
.fb-box.tip ul li::before{color:var(--acc4)}

/* ══════════════════════════════════════
   TOOLS GRID ⑤ 채널분석 탭 제거됨
══════════════════════════════════════ */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.tool-card{background:var(--bg3);border-radius:14px;border:1px solid var(--border);padding:14px;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;text-decoration:none;color:var(--txt);display:block}
.tool-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--acc)}
.tool-icon{font-size:28px;margin-bottom:8px}
.tool-name{font-size:13px;font-weight:700;margin-bottom:3px}
.tool-desc{font-size:11px;color:var(--txt2);line-height:1.5}
.tool-tag{display:inline-block;padding:2px 7px;border-radius:7px;font-size:10px;font-weight:600;margin-top:6px}
.tag-free{background:rgba(67,233,123,.15);color:var(--acc3)}
.tag-paid{background:rgba(255,101,132,.15);color:var(--acc2)}
.tag-freemium{background:rgba(108,99,255,.15);color:var(--acc)}
.tool-section-title{font-size:16px;font-weight:800;margin:22px 0 12px;display:flex;align-items:center;gap:10px;color:var(--txt)}
.tool-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ══════════════════════════════════════
   AD GATE / INTERSTITIAL MODALS
══════════════════════════════════════ */
.modal-blur{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.modal-blur.show{display:flex}
.modal-box{background:var(--card);border-radius:20px;padding:30px;max-width:400px;width:90%;text-align:center;border:1px solid var(--border)}
.modal-box h2{font-size:20px;margin-bottom:8px}
.modal-box p{color:var(--txt2);font-size:13px;margin-bottom:18px;line-height:1.6}
.circle-wrap{position:relative;width:84px;height:84px;margin:0 auto 14px}
.circle-wrap svg{transform:rotate(-90deg)}
.circle-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--acc)}
.ad-skip-btn{display:block;width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-top:10px;pointer-events:none;opacity:.45;transition:opacity .25s}
.ad-skip-btn.ready{pointer-events:auto;opacity:1}

/* ══════════════════════════════════════
   ⑧⑩ VIDEO POPUP — 정중앙, 사이드 광고
══════════════════════════════════════ */
.vid-modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.92);
  z-index:3000;display:none;
  align-items:center;justify-content:center;
  /* ⑧ 상단광고 영역 고려해 상단 패딩 */
  padding-top:var(--top-offset);
}
.vid-modal.show{display:flex}
.vid-outer{
  display:flex;gap:10px;align-items:center;justify-content:center;
  max-width:1100px;width:95%;
}
/* ⑩ 사이드 광고: 얇고 비침습적 */
.vid-side-ad{
  width:120px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;
  opacity:.85;
}
.vid-side-ad ins{display:block;min-height:240px;width:120px}
.vid-center{flex:1;max-width:680px;min-width:0}
.vid-center iframe{width:100%;aspect-ratio:16/9;border-radius:12px;border:none;display:block}
.vid-title{font-size:13px;font-weight:600;margin-top:10px;color:var(--txt);line-height:1.4}
.vid-close-row{display:flex;justify-content:flex-end;margin-bottom:8px}
.vid-close-btn{background:rgba(255,255,255,.1);color:var(--txt2);border:none;border-radius:8px;padding:5px 14px;cursor:pointer;font-size:12px;transition:background .2s}
.vid-close-btn:hover{background:var(--acc2);color:#fff}

/* 채널 입력 */
.ch-input-row{display:flex;gap:10px;margin-bottom:16px}
.ch-input-row input{flex:1;padding:11px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--txt);font-size:14px}
.btn-primary{padding:11px 24px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:700;cursor:pointer;font-size:14px;transition:opacity .2s;white-space:nowrap}
.btn-primary:hover{opacity:.85}

/* 수익계산기 */
.calc-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.calc-row label{font-size:13px;color:var(--txt2);display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.calc-row input[type=range]{width:100%}
.calc-result{background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:12px;padding:18px;text-align:center;margin-top:10px}
.calc-result .num{font-size:30px;font-weight:900;color:#fff}
.calc-result .sub{font-size:12px;color:rgba(255,255,255,.75);margin-top:4px}

/* AI 아이디어 */
.idea-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border-radius:8px;margin-bottom:6px}
.idea-item span{font-size:13px;flex:1}
.idea-copy{padding:3px 10px;border-radius:8px;border:none;background:var(--acc);color:#fff;font-size:11px;cursor:pointer;flex-shrink:0}

/* RESPONSIVE */
@media(max-width:900px){
  aside{display:none}
  .vid-side-ad{display:none}
  .feedback-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .grid{grid-template-columns:1fr 1fr}
  .tools-grid{grid-template-columns:1fr 1fr}
  .rank-table{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<!-- ■■■ STICKY TOP AD ■■■ -->
<div id="sticky-ad">
  <ins class="adsbygoogle" style="display:block;min-height:60px;max-width:728px;width:100%"
    data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="1111111111"
    data-ad-format="horizontal" data-full-width-responsive="true"></ins>
</div>
<!-- ⑨ 덜 눈에 띄는 토글 버튼 -->
<button id="ad-toggle" onclick="toggleStickyAd()" title="광고 영역 숨기기/보이기">▲</button>

<!-- ■■■ HEADER ■■■ -->
<header>
  <div class="logo">⚡ YT Pro</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showSection('hot')"><i class="fa fa-fire"></i> 인기영상</button>
    <button class="nav-tab" onclick="showSection('analyze')"><i class="fa fa-chart-bar"></i> 채널분석</button>
    <button class="nav-tab" onclick="showSection('ai')"><i class="fa fa-robot"></i> AI아이디어</button>
    <button class="nav-tab" onclick="showSection('tools')"><i class="fa fa-tools"></i> 제작도구</button>
    <button class="nav-tab" onclick="showSection('revenue')"><i class="fa fa-won-sign"></i> 수익계산기</button>
  </div>
  <div class="header-credits" onclick="showSection('analyze')">💎 <span id="credit-display">0</span></div>
</header>

<!-- ■■■ APP LAYOUT ■■■ -->
<div class="app">

  <!-- ⑥ SIDEBAR — 광고 복구, ⑦ 바이럴카테고리 제거 -->
  <aside>
    <div class="sidebar-sec">
      <h4>메뉴</h4>
      <button class="side-btn active" onclick="showSection('hot')"><i class="fa fa-fire"></i> 인기영상</button>
      <button class="side-btn" onclick="showSection('analyze')"><i class="fa fa-chart-bar"></i> 채널분석</button>
      <button class="side-btn" onclick="showSection('ai')"><i class="fa fa-robot"></i> AI아이디어</button>
      <button class="side-btn" onclick="showSection('tools')"><i class="fa fa-tools"></i> 제작도구</button>
      <button class="side-btn" onclick="showSection('revenue')"><i class="fa fa-calculator"></i> 수익계산기</button>
    </div>
    <!-- ⑥ 사이드바 광고 -->
    <div class="aside-ad">
      <div style="font-size:9px;color:var(--txt2);text-align:center;margin-bottom:4px;letter-spacing:.5px">AD</div>
      <ins class="adsbygoogle" style="display:block;width:180px;min-height:200px"
        data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="8888888888"
        data-ad-format="rectangle" data-full-width-responsive="false"></ins>
    </div>
  </aside>

  <main>

    <!-- ════ HOT VIDEOS ════ -->
    <section id="sec-hot" class="section active">
      <div class="card">
        <h3><i class="fa fa-fire" style="color:var(--acc2)"></i> 실시간 인기 영상</h3>
        <div class="hot-controls">
          <div class="search-wrap">
            <input id="hot-search" type="text" placeholder="🔍 키워드 검색 후 Enter 또는 버튼 클릭"
              onkeydown="if(event.key==='Enter')manualSearch()"/>
            <button onclick="manualSearch()"><i class="fa fa-search"></i></button>
          </div>
          <!-- ① 쇼츠/롱폼 탭 복구 -->
          <div class="type-tabs">
            <button class="type-tab active" data-t="all"  onclick="setType('all',this)">🔥 전체</button>
            <button class="type-tab"        data-t="short" onclick="setType('short',this)">🩳 쇼츠</button>
            <button class="type-tab"        data-t="long"  onclick="setType('long',this)">🎬 롱폼</button>
          </div>
        </div>
        <div class="cat-chips" id="cat-chips"></div>
        <div id="hot-grid">
          <div style="text-align:center;padding:50px;color:var(--txt2)">
            <i class="fa fa-spinner fa-spin" style="font-size:30px"></i>
            <p style="margin-top:12px">로딩 중...</p>
          </div>
        </div>
      </div>
    </section>

    <!-- ════ CHANNEL ANALYZE ════ -->
    <section id="sec-analyze" class="section">
      <div class="card">
        <h3><i class="fa fa-chart-bar" style="color:var(--acc)"></i> 채널 분석</h3>
        <div class="ch-input-row">
          <input id="ch-input" type="text" placeholder="@handle, 채널 URL, 또는 채널명 입력"
            onkeydown="if(event.key==='Enter')startAnalyze()"/>
          <button class="btn-primary" onclick="startAnalyze()"><i class="fa fa-search"></i> 분석</button>
        </div>
        <!-- ③ 랭크 등급표 -->
        <div id="rank-table-static"></div>
        <div id="ch-result"></div>
      </div>
    </section>

    <!-- ════ AI IDEAS ════ -->
    <section id="sec-ai" class="section">
      <div class="card">
        <h3><i class="fa fa-robot" style="color:var(--acc3)"></i> AI 바이럴 아이디어</h3>
        <div id="ai-ideas"></div>
      </div>
    </section>

    <!-- ════ TOOLS ⑤ 채널분석 탭 제거 ════ -->

/* ─────────────────────────────────────

const CACHE = {
  _s:{},
  key(url){return url.replace(/[&?]key=[^&]*/g,'')},
  get(url){return this._s[this.key(url)]||null},
  set(url,d){this._s[this.key(url)]=d},
};

/* ─────────────────────────────────────
   API CALL
───────────────────────────────────── */
async function apiCall(ep,params={}){
  const key=CFG.KEYS[CFG.keyIdx%CFG.KEYS.length];
  const qs=new URLSearchParams({...params,key}).toString();
  const url=`https://www.googleapis.com/youtube/v3/${ep}?${qs}`;
  const cached=CACHE.get(url);
  if(cached)return cached;
  const res=await fetch(url);
  if(!res.ok){
    CFG.keyIdx++;
    if(CFG.keyIdx<CFG.KEYS.length*2)return apiCall(ep,params);
    throw new Error('API 할당량 초과. 잠시 후 다시 시도해주세요.');
  }
  const data=await res.json();
  CACHE.set(url,data);
  return data;
}

/* ─────────────────────────────────────
   SHORTS DETECTION
───────────────────────────────────── */
function parseDur(iso){
  if(!iso)return 0;
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return 0;
  return (parseInt(m[1]||0)*3600)+(parseInt(m[2]||0)*60)+parseInt(m[3]||0);
}
function isShorts(v){
  const s=v._durationSec||0;
  const t=(v.snippet?.title||'').toLowerCase();
  return s<=180||t.includes('#shorts');
}

/* ─────────────────────────────────────
   FETCH VIDEOS
───────────────────────────────────── */
async function fetchByDuration(query,durParam,seen){
  const params={
    part:'snippet',type:'video',
    maxResults:CFG.MAX_EACH,
    regionCode:CFG.REGION,
    relevanceLanguage:'ko',
    order:'viewCount',
    q:query,
  };
  if(durParam!=='any')params.videoDuration=durParam;
  let data;
  try{data=await apiCall('search',params);}catch(e){console.error(e);return [];}
  if(!data.items?.length)return [];
  const ids=data.items.map(i=>i.id?.videoId).filter(Boolean);
  let det;
  try{det=await apiCall('videos',{part:'snippet,contentDetails,statistics',id:ids.join(',')});}catch(e){return [];}
  return (det.items||[]).filter(v=>{
    if(seen.has(v.id))return false;
    seen.add(v.id);
    v._durationSec=parseDur(v.contentDetails?.duration);
    return true;
  });
}

/* ─────────────────────────────────────
   LOAD HOT
───────────────────────────────────── */
async function loadHot(){
  const grid=document.getElementById('hot-grid');
  grid.innerHTML='<div style="text-align:center;padding:50px;color:var(--txt2)"><i class="fa fa-spinner fa-spin" style="font-size:28px"></i><p style="margin-top:10px">검색 중...</p></div>';
  let q=CFG.CURRENT_QUERY.trim()||'한국 인기 유튜브 2025 바이럴';
  const seen=new Set();
  let items=[];
  if(CFG.TYPE==='all'){
    const[sh,lo]=await Promise.all([fetchByDuration(q,'short',seen),fetchByDuration(q,'medium',seen)]);
    const mx=Math.max(sh.length,lo.length);
    for(let i=0;i<mx;i++){if(i<sh.length)items.push(sh[i]);if(i<lo.length)items.push(lo[i]);}
  } else if(CFG.TYPE==='short'){
    items=await fetchByDuration(q,'short',seen);
    items=items.filter(v=>isShorts(v));
    if(items.length<8){const ex=await fetchByDuration(q,'medium',seen);items=[...items,...ex.filter(v=>isShorts(v))];}
  } else {
    const[med,lng]=await Promise.all([fetchByDuration(q,'medium',seen),fetchByDuration(q,'long',seen)]);
    items=[...med,...lng].filter(v=>!isShorts(v));
  }
  if(!items.length){
    grid.innerHTML='<div style="text-align:center;padding:40px;color:var(--txt2)"><i class="fa fa-search" style="font-size:28px"></i><p style="margin-top:10px">검색 결과 없음. 다른 키워드를 시도해보세요.</p></div>';
    return;
  }
  renderHotGrid(items);
}

/* ─────────────────────────────────────
   RENDER GRID
───────────────────────────────────── */
function renderHotGrid(items){
  const grid=document.getElementById('hot-grid');
  const rendered=new Set();
  const g=document.createElement('div');g.className='grid';
  items.forEach(v=>{
    if(rendered.has(v.id))return;rendered.add(v.id);
    const sh=isShorts(v);
    const views=parseInt(v.statistics?.viewCount||0);
    const viral=Math.min(100,Math.round((Math.log10(views+1)/7)*100));
    const dur=v._durationSec||0;
    const ds=dur>=3600?`${Math.floor(dur/3600)}:${String(Math.floor((dur%3600)/60)).padStart(2,'0')}:${String(dur%60).padStart(2,'0')}`:`${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}`;
    const thumb=v.snippet?.thumbnails?.medium?.url||v.snippet?.thumbnails?.default?.url||'';
    const c=document.createElement('div');c.className='vcard';
    c.innerHTML=`
      <div class="vcard-thumb">
        <img src="${thumb}" loading="lazy" onerror="this.style.display='none'">
        <span class="badge ${sh?'shorts':'long'}">${sh?'Shorts':'롱폼'}</span>
        <span class="dur-badge">${ds}</span>
      </div>
      <div class="vcard-info">
        <div class="vcard-title">${v.snippet?.title||''}</div>
        <div class="vcard-meta">
          <span>👁 ${fmt(views)}</span>
          <span>❤️ ${fmt(v.statistics?.likeCount||0)}</span>
          <span>💬 ${fmt(v.statistics?.commentCount||0)}</span>
        </div>
        <div class="viral-bar-wrap">
          <div class="viral-bar" style="width:${viral}%"></div>
          <div class="viral-label">바이럴 ${viral}</div>
        </div>
      </div>`;
    c.onclick=()=>openVid(v.id,v.snippet?.title||'');
    g.appendChild(c);
  });
  grid.innerHTML='';grid.appendChild(g);
}

async function startAnalyze(){
  const raw=document.getElementById('ch-input').value.trim();
  if(!raw){alert('채널 정보를 입력하세요');return;}
  if(credits<=0){showAdGate(()=>startAnalyze());return;}
  credits--;saveCredits();
  document.getElementById('ch-result').innerHTML=
    '<div style="text-align:center;padding:30px"><i class="fa fa-spinner fa-spin" style="font-size:24px;color:var(--acc)"></i><p style="margin-top:8px;color:var(--txt2)">채널 분석 중...</p></div>';
  try{
    const chId=await resolveHandle(raw);
    if(!chId)throw new Error('채널을 찾을 수 없습니다. @핸들, URL, 채널명을 다시 확인해 주세요.');
    await doAnalyze(chId);
  }catch(e){
    document.getElementById('ch-result').innerHTML=
      `<div style="color:var(--acc2);padding:16px;background:var(--bg3);border-radius:12px">⚠️ ${e.message}</div>`;
  }
}

/* ─────────────────────────────────────
   RESOLVE HANDLE (6단계 폴백)
───────────────────────────────────── */
async function resolveHandle(raw){
  let h=raw.trim();
  const urlM=h.match(/youtube\.com\/(?:@|channel\/|c\/|user\/)([^/?&\s]+)/);
  if(urlM)h=urlM[1];
  if(/^UC[A-Za-z0-9_-]{20,}$/.test(h))return h;
  const clean=h.replace(/^@/,'');
  const steps=[
    ()=>apiCall('channels',{part:'snippet,statistics,brandingSettings',forHandle:'@'+clean}),
    ()=>apiCall('channels',{part:'snippet,statistics,brandingSettings',forHandle:clean}),
    ()=>apiCall('channels',{part:'snippet,statistics,brandingSettings',forUsername:clean}),
    ()=>apiCall('search',{part:'snippet',type:'channel',q:clean,maxResults:5,regionCode:'KR'}),
    ()=>apiCall('search',{part:'snippet',type:'channel',q:'@'+clean,maxResults:3}),
    ()=>apiCall('search',{part:'snippet',type:'channel',q:clean+' 채널',maxResults:3}),
  ];
  for(let i=0;i<steps.length;i++){
    try{
      const d=await steps[i]();
      if(i<3){if(d.items?.[0])return d.items[0].id;}
      else{
        if(d.items?.length){
          const ex=d.items.find(x=>
            x.snippet?.channelTitle?.toLowerCase()===clean.toLowerCase()||
            (x.snippet?.customUrl||'').replace('@','').toLowerCase()===clean.toLowerCase()
          );
          return (ex||d.items[0]).snippet.channelId;
        }
      }
    }catch(e){}
  }
  return null;
}

/* ─────────────────────────────────────
   ③④ DO ANALYZE — 랭크 + 피드백
───────────────────────────────────── */
async function doAnalyze(chId){
  const data=await apiCall('channels',{part:'snippet,statistics,brandingSettings',id:chId});
  const ch=data.items?.[0];
  if(!ch)throw new Error('채널 데이터를 불러올 수 없습니다.');

  const name=ch.snippet?.title||ch.snippet?.customUrl||chId;
  const thumb=ch.snippet?.thumbnails?.medium?.url||'';
  const subs=parseInt(ch.statistics?.subscriberCount||0);
  const views=parseInt(ch.statistics?.viewCount||0);
  const vids=parseInt(ch.statistics?.videoCount||0);
  const avgV=vids>0?Math.round(views/vids):0;
  const score=Math.min(100,Math.round(
    (Math.log10(subs+1)/7)*40+(Math.log10(views+1)/9)*35+(Math.min(20,vids/50))+(Math.min(5,avgV/100000))
  ));

  // ③ 현재 랭크 하이라이트
  const rank=getRank(subs);
  document.querySelectorAll('.rank-item').forEach(el=>el.classList.remove('current'));
  const curEl=document.getElementById('rank-'+rank.key);
  if(curEl){curEl.classList.add('current');curEl.scrollIntoView({behavior:'smooth',block:'nearest'});}

  // 다음 등급까지 남은 구독자
  const nextRank=RANKS[RANKS.indexOf(rank)+1];
  const toNext=nextRank?nextRank.min-subs:null;

  // ④ 피드백 생성
  const feedback=buildFeedback(subs,views,vids,avgV,score);

  document.getElementById('ch-result').innerHTML=`
    <!-- 채널 기본 정보 -->
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:18px;padding:14px;background:var(--bg3);border-radius:12px">
      <img src="${thumb}" style="width:68px;height:68px;border-radius:50%;object-fit:cover;border:3px solid ${rank.color};flex-shrink:0"
        onerror="this.style.display='none'">
      <div style="flex:1;min-width:0">
        <div style="font-size:18px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
          <span style="font-size:22px">${rank.icon}</span>
          <span style="font-size:15px;font-weight:800;color:${rank.color}">${rank.name}</span>
          <span style="font-size:12px;color:var(--txt2)">등급</span>
        </div>
        ${toNext?`<div style="font-size:11px;color:var(--txt2);margin-top:4px">다음 등급(${nextRank.name})까지 <b style="color:var(--acc4)">${fmt(toNext)}</b> 명 필요</div>`:'<div style="font-size:11px;color:var(--acc2);margin-top:4px">🏆 최고 등급!</div>'}
      </div>
    </div>

    <!-- 채널 점수 게이지 -->
    <div class="score-gauge-wrap">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">채널 종합 점수</div>
      <div class="score-gauge-track">
        <div class="score-gauge-fill" id="score-fill" style="width:0%"></div>
      </div>
      <div class="score-label-row">
        <span>0</span>
        <span style="font-size:16px;font-weight:900;color:var(--acc)">${score}점</span>
        <span>100</span>
      </div>
    </div>

    <!-- 통계 박스 -->
    <div class="ch-stats">
      <div class="stat-box"><div class="stat-num">${fmt(subs)}</div><div class="stat-lbl">구독자</div></div>
      <div class="stat-box"><div class="stat-num">${fmt(views)}</div><div class="stat-lbl">총 조회수</div></div>
      <div class="stat-box"><div class="stat-num">${vids.toLocaleString()}</div><div class="stat-lbl">영상 수</div></div>
      <div class="stat-box"><div class="stat-num">${fmt(avgV)}</div><div class="stat-lbl">영상당 평균</div></div>
      <div class="stat-box"><div class="stat-num" style="background:linear-gradient(135deg,${rank.color},var(--acc4));-webkit-background-clip:text;-webkit-text-fill-color:transparent">${(subs>0?(views/subs).toFixed(1):'0')}x</div><div class="stat-lbl">구독자당 조회</div></div>
    </div>

    <!-- ④ 채널 방향성 피드백 -->
    <div style="margin-top:4px">
      <h4 style="font-size:14px;font-weight:700;margin-bottom:10px">📋 채널 분석 리포트 & 개선 방향</h4>
      <div class="feedback-grid">${feedback}</div>
    </div>`;

  // 게이지 애니메이션
  setTimeout(()=>{
    const fill=document.getElementById('score-fill');
    if(fill)fill.style.width=score+'%';
  },100);
}

/* ④ 피드백 생성 로직 */
function buildFeedback(subs,views,vids,avgV,score){
  const ratio=subs>0?(views/subs):0;
  const items=[];

  // 강점
  const strengths=[];
  if(ratio>20)strengths.push('조회수/구독자 비율이 매우 높아 알고리즘 노출이 활발함');
  if(avgV>100000)strengths.push('영상당 평균 조회수가 10만+로 콘텐츠 파워가 강함');
  if(vids>100)strengths.push('100개 이상의 영상으로 채널 신뢰도와 일관성이 높음');
  if(score>=80)strengths.push('종합 점수 80+, 상위 크리에이터 수준');
  if(strengths.length===0)strengths.push('꾸준한 업로드로 성장 잠재력 보유','초기 채널로 성장 여지가 큼');
  items.push(`<div class="fb-box"><h5>✅ 강점</h5><ul>${strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div>`);

  // 개선점
  const warns=[];
  if(ratio<5&&subs>1000)warns.push('조회수/구독자 비율이 낮음 — 썸네일·제목 개선 필요');
  if(avgV<1000&&subs>5000)warns.push('평균 조회수가 낮음 — 업로드 빈도·주제 다양화 검토');
  if(vids<10)warns.push('영상 수가 부족 — 최소 30개 이상 축적 권장');
  if(score<40)warns.push('전반적인 채널 지표 개선 필요 — 장기 전략 수립 필요');
  if(warns.length===0)warns.push('현재 큰 문제점 없음','지속적인 업로드 유지 권장');
  items.push(`<div class="fb-box warn"><h5>⚠️ 개선 필요</h5><ul>${warns.map(s=>`<li>${s}</li>`).join('')}</ul></div>`);

  // 성장 전략
  const tips=[];
  if(subs<1000)tips.push('쇼츠로 초기 구독자 빠르게 확보 (1000명 달성 우선)','#해시태그 3~5개 필수 사용','유사 채널 댓글 활동으로 노출 증대');
  else if(subs<100000)tips.push('주 2~3회 롱폼+쇼츠 혼합 업로드 전략','첫 24시간 노출 최대화 — 업로드 타이밍 최적화','커뮤니티 게시판 활성화로 팬 충성도 높이기');
  else tips.push('브랜드 협찬·스폰서십 적극 유치','멤버십·슈퍼챗 수익화 확대','글로벌 진출을 위한 영어 자막 추가 고려');
  items.push(`<div class="fb-box tip" style="grid-column:1/-1"><h5>💡 성장 전략</h5><ul>${tips.map(s=>`<li>${s}</li>`).join('')}</ul></div>`);

  return items.join('');
}

/* ─────────────────────────────────────
   REVENUE CALC
───────────────────────────────────── */
function calcRev(){
  const v=parseInt(document.getElementById('r-views').value);
  const cpm=parseFloat(document.getElementById('r-cpm').value);
  const ctr=parseFloat(document.getElementById('r-ctr').value);
  document.getElementById('v-val').textContent=v>=1000000?`${(v/1000000).toFixed(1)}백만`:v>=10000?`${(v/10000).toFixed(0)}만`:`${v.toLocaleString()}`;
  document.getElementById('c-val').textContent=`$${cpm}`;
  document.getElementById('t-val').textContent=`${ctr}%`;
  const imp=v*(ctr/100);
  const usd=imp*(cpm/1000)*0.55;
  const krw=usd*1300;
  document.getElementById('calc-out').innerHTML=`
    <div class="num">₩${Math.round(krw).toLocaleString()}</div>
    <div class="sub">예상 월 수익 | $${usd.toFixed(0)} USD</div>
    <div style="margin-top:6px;font-size:10px;opacity:.7">광고 노출 수: ${Math.round(imp).toLocaleString()} | YouTube 45% 공제 반영</div>`;
}

/* ─────────────────────────────────────
   TOAST
───────────────────────────────────── */
function toast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  Object.assign(t.style,{position:'fixed',bottom:'30px',left:'50%',transform:'translateX(-50%)',
    background:'var(--acc)',color:'#fff',padding:'8px 20px',borderRadius:'20px',fontSize:'13px',
    zIndex:9999,opacity:1,transition:'opacity .4s'});
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity=0;setTimeout(()=>t.remove(),400)},1800);
}

/* ─────────────────────────────────────
   FORMAT NUMBER
───────────────────────────────────── */
function fmt(n){
  n=parseInt(n)||0;
  if(n>=100000000)return(n/100000000).toFixed(1)+'억';
  if(n>=10000)return(n/10000).toFixed(1)+'만';
  if(n>=1000)return(n/1000).toFixed(1)+'천';
  return n.toLocaleString();
}
