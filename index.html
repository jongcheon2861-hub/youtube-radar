<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALGO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Cinzel:wght@900&display=swap" rel="stylesheet" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-AF8853448" crossorigin="anonymous"></script>

  <script>
  function buildFavicon(outputSize) {
    const c = document.createElement('canvas');
    c.width = c.height = outputSize;
    const ctx = c.getContext('2d');
    const r = outputSize * 0.22;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(outputSize - r, 0);
    ctx.arcTo(outputSize, 0, outputSize, r, r);
    ctx.lineTo(outputSize, outputSize - r);
    ctx.arcTo(outputSize, outputSize, outputSize - r, outputSize, r);
    ctx.lineTo(r, outputSize);
    ctx.arcTo(0, outputSize, 0, outputSize - r, r);
    ctx.lineTo(0, r);
    ctx.arcTo(0, 0, r, 0, r);
    ctx.closePath();
    const bg = ctx.createLinearGradient(0, 0, outputSize, outputSize);
    bg.addColorStop(0,    '#7b2ff7');
    bg.addColorStop(0.55, '#a044f5');
    bg.addColorStop(1,    '#e040aa');
    ctx.fillStyle = bg; ctx.fill();
    const fontSize = Math.round(outputSize * 0.63);
    ctx.shadowColor   = 'rgba(0,0,0,0.25)';
    ctx.shadowBlur    = outputSize * 0.06;
    ctx.shadowOffsetY = outputSize * 0.04;
    ctx.fillStyle     = '#ffffff';
    ctx.font          = `700 ${fontSize}px Georgia, "Times New Roman", serif`;
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'middle';
    ctx.fillText('A', outputSize / 2, outputSize / 2 - outputSize * 0.01);
    return c;
  }
  window.addEventListener('DOMContentLoaded', () => {
    document.fonts.ready.then(() => {
      [16, 32, 64, 256].forEach(sz => {
        const canvas = buildFavicon(sz);
        const link   = document.createElement('link');
        link.rel   = 'icon';
        link.type  = 'image/png';
        link.sizes = `${sz}x${sz}`;
        link.href  = canvas.toDataURL('image/png');
        document.head.appendChild(link);
      });
    });
  });
  </script>

  <style>
    :root {
      --bg-primary:#0f0f1a; --bg-secondary:#1a1a2e; --bg-card:#1e1e2e; --bg-hover:#252535;
      --accent:#ff4757; --accent2:#ffa502; --accent3:#2ed573; --accent4:#1e90ff;
      --text-primary:#e8e8f0; --text-secondary:#9898b0; --text-muted:#606078;
      --border:#2a2a3e; --gradient:linear-gradient(135deg,#ff4757,#ff6b81);
      --shadow:0 8px 32px rgba(0,0,0,0.4); --radius:12px; --radius-sm:8px;
      --surface:var(--bg-secondary);
      --algo-gold:#f0c96a; --algo-gold-l:#ffe49a;
      --algo-purple:#7c3aed; --algo-violet:#a855f7;
      --algo-rose:#f5c6d0; --algo-pink:#e879a0;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}

    .header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,0,22,0.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(124,58,237,0.25);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none}
    .logo-canvas-wrap{width:40px;height:40px;border-radius:10px;overflow:hidden;flex-shrink:0;box-shadow:0 0 10px rgba(123,47,247,0.5),0 0 20px rgba(224,64,170,0.3);animation:logoGlow 4s ease-in-out infinite alternate;}
    @keyframes logoGlow{0%{box-shadow:0 0 8px rgba(123,47,247,0.4),0 0 16px rgba(224,64,170,0.2)}100%{box-shadow:0 0 20px rgba(123,47,247,0.9),0 0 36px rgba(224,64,170,0.6)}}
    #header-logo-canvas{display:block;width:40px;height:40px}
    .logo-text-wrap{display:flex;flex-direction:column;line-height:1}
    .logo-algo{font-family:'Cinzel',serif;font-weight:900;font-size:22px;letter-spacing:2px;line-height:1;background:linear-gradient(135deg,#ffe49a 0%,#f0c96a 25%,#e879a0 55%,#a855f7 80%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px rgba(240,201,106,0.5))}
    .logo-sub{font-size:9px;font-weight:600;letter-spacing:3px;color:var(--algo-violet);opacity:0.75;margin-top:2px;text-transform:uppercase}
    .api-status{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(46,213,115,0.15);color:var(--accent3);border:1px solid rgba(46,213,115,0.3)}
    .api-status.error{background:rgba(255,71,87,0.15);color:var(--accent);border-color:rgba(255,71,87,0.3)}
    #global-error-banner{display:none;position:fixed;top:60px;left:0;right:0;z-index:99;background:rgba(255,71,87,0.92);color:#fff;padding:10px 24px;font-size:14px;font-weight:500;text-align:center}

    .app-layout{display:flex;padding-top:60px;min-height:100vh}
    .sidebar{width:220px;background:linear-gradient(180deg,rgba(26,10,46,0.98) 0%,rgba(26,26,46,0.98) 100%);border-right:1px solid rgba(124,58,237,0.2);padding:20px 12px;position:fixed;top:60px;left:0;bottom:0;overflow-y:auto}
    .nav-section-title{font-size:11px;font-weight:600;color:var(--algo-violet);opacity:0.6;text-transform:uppercase;letter-spacing:1px;padding:0 8px 8px;margin-top:16px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:500;color:var(--text-secondary);transition:all 0.2s;border:none;background:none;width:100%;text-align:left}
    .nav-item:hover{background:rgba(124,58,237,0.12);color:var(--algo-gold)}
    .nav-item.active{background:rgba(124,58,237,0.18);color:var(--algo-gold);border-left:2px solid var(--algo-gold)}
    .nav-item .nav-icon{font-size:18px;width:24px;text-align:center}

    .main-content{margin-left:220px;flex:1;padding:24px;min-width:0}
    .section-page{display:none}
    .section-page.active{display:block}
    .section-header{margin-bottom:24px}
    .section-title{font-size:24px;font-weight:700;display:flex;align-items:center;gap:10px}
    .section-subtitle{font-size:14px;color:var(--text-secondary);margin-top:6px}

    .hot-search-box{display:flex;gap:10px;margin-bottom:16px}
    .hot-search-input{flex:1;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 16px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none}
    .hot-search-input:focus{border-color:var(--algo-violet)}
    .hot-search-btn{padding:10px 20px;background:linear-gradient(135deg,var(--algo-purple),var(--algo-violet));color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap}
    .cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .cat-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s}
    .cat-btn:hover{border-color:var(--algo-violet);color:var(--algo-violet)}
    .cat-btn.active{background:rgba(124,58,237,0.15);border-color:var(--algo-violet);color:var(--algo-gold)}
    .hot-tab-bar{display:flex;gap:8px;margin-bottom:16px}
    .hot-tab-btn{padding:8px 20px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;font-size:14px;font-weight:500;transition:all 0.2s}
    .hot-tab-btn.active{background:rgba(124,58,237,0.15);border-color:var(--algo-violet);color:var(--algo-gold)}
    .search-result-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:14px;color:var(--text-secondary)}
    .search-clear-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:12px}
    .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:16px}
    .video-card{background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all 0.2s}
    .video-card:hover{transform:translateY(-2px);border-color:var(--algo-violet);box-shadow:0 6px 24px rgba(124,58,237,0.25)}
    .thumb-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;background:#111}
    .thumb-wrap img{width:100%;height:100%;object-fit:cover}
    .shorts-badge{position:absolute;top:6px;left:6px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
    .duration-badge{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.8);color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
    .video-info{padding:12px}
    .video-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .video-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .video-channel{font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%}
    .video-stats{display:flex;gap:10px;font-size:12px;color:var(--text-secondary)}
    .viral-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
    .viral-badge.hot{background:rgba(255,71,87,0.15);color:var(--accent)}
    .viral-badge.warm{background:rgba(255,165,2,0.15);color:var(--accent2)}
    .viral-badge.cool{background:rgba(46,213,115,0.15);color:var(--accent3)}
    .more-btn{display:none;width:100%;padding:12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-secondary);cursor:pointer;font-size:14px;margin-bottom:16px;transition:all 0.2s}
    .more-btn:hover{border-color:var(--algo-violet);color:var(--algo-gold)}
    .loader-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--algo-violet);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-data{text-align:center;padding:60px 20px;color:var(--text-secondary)}
    .no-data-icon{font-size:48px;margin-bottom:12px}
    .error-card{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:var(--radius);padding:20px;color:var(--accent)}

    .channel-search-box{display:flex;gap:10px;margin-bottom:24px}
    .search-input{flex:1;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none}
    .search-input:focus{border-color:var(--algo-violet)}

    .rev-wrap{display:flex;flex-direction:column;gap:16px}
    .rev-input-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;transition:border-color 0.2s}
    .rev-input-card:hover{border-color:rgba(124,58,237,0.4)}
    .rev-label{font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:10px}
    .rev-gauge-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .rev-gauge-btn{width:44px;height:44px;min-width:44px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:1.3rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;user-select:none}
    .rev-gauge-btn:hover{background:var(--algo-purple);border-color:var(--algo-violet);color:#fff}
    .rev-gauge-btn:active{transform:scale(0.93)}
    .rev-gauge-track{flex:1;height:28px;border-radius:14px;background:rgba(255,255,255,0.07);border:1px solid var(--border);position:relative;cursor:pointer;overflow:hidden;touch-action:none}
    .rev-gauge-fill{height:100%;border-radius:14px;background:linear-gradient(90deg,var(--algo-purple),var(--algo-violet),var(--algo-gold));transition:width 0.08s;pointer-events:none}
    .rev-gauge-val{font-size:14px;font-weight:700;color:var(--algo-gold);text-align:right}
    .rev-results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:4px}
    .rev-result-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;transition:border-color 0.2s}
    .rev-result-card:first-child{border-color:rgba(240,201,106,0.4);background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(240,201,106,0.08))}
    .rev-result-val{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--algo-gold),var(--algo-violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
    .rev-result-lbl{font-size:12px;color:var(--text-secondary)}
    .rev-tip{margin-top:8px;padding:12px 16px;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.25);border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);text-align:center}

    .ai-form{background:var(--bg-secondary);border-radius:var(--radius);border:1px solid var(--border);padding:24px;margin-bottom:24px}
    .ai-idea-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
    .ai-idea-card{background:var(--bg-secondary);border-radius:var(--radius);border:1px solid var(--border);padding:16px;cursor:pointer;transition:all 0.2s}
    .ai-idea-card:hover{border-color:var(--accent3);transform:translateY(-1px)}
    .ai-idea-title{font-size:14px;font-weight:600;margin-bottom:6px}
    .ai-idea-desc{font-size:12px;color:var(--text-secondary)}
    .form-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:16px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-label{font-size:13px;color:var(--text-secondary);font-weight:500}
    .form-input{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none}
    .form-input:focus{border-color:var(--algo-violet)}
    .calc-btn{padding:12px 28px;background:linear-gradient(135deg,var(--algo-purple),var(--algo-violet));color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:700}

    .tool-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .tool-tab{padding:7px 18px;border-radius:20px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all 0.2s}
    .tool-tab:hover{border-color:var(--algo-violet);color:var(--algo-violet)}
    .tool-tab.active{background:rgba(124,58,237,0.15);border-color:var(--algo-violet);color:var(--algo-gold)}
    .tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
    .tool-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:20px 14px 16px;cursor:pointer;transition:all 0.2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
    .tool-card:hover{border-color:var(--algo-violet);transform:translateY(-3px);box-shadow:0 6px 20px rgba(124,58,237,0.2)}
    .tool-icon{width:48px;height:48px;border-radius:12px;object-fit:contain;background:var(--bg-card);padding:4px}
    .tool-name{font-size:13px;font-weight:700;color:var(--text-primary);line-height:1.3}
    .tool-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:0.3px}
    .tb-free{background:rgba(46,213,115,0.15);color:var(--accent3);border:1px solid rgba(46,213,115,0.3)}
    .tb-paid{background:rgba(255,71,87,0.15);color:var(--accent);border:1px solid rgba(255,71,87,0.3)}
    .tb-freemium{background:rgba(240,201,106,0.15);color:var(--algo-gold);border:1px solid rgba(240,201,106,0.3)}
    .tool-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;align-items:center;justify-content:center;padding:20px}
    .tool-modal-overlay.open{display:flex}
    .tool-modal{background:var(--bg-card);border:1px solid rgba(124,58,237,0.3);border-radius:var(--radius);padding:28px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;position:relative}
    .tool-modal-header{display:flex;align-items:center;gap:14px}
    .tool-modal-icon{width:56px;height:56px;border-radius:14px;object-fit:contain;background:var(--bg-secondary);padding:6px;flex-shrink:0}
    .tool-modal-name{font-size:20px;font-weight:700}
    .tool-modal-desc{font-size:14px;color:var(--text-secondary);line-height:1.7}
    .tool-modal-link{display:inline-block;padding:10px 24px;background:linear-gradient(135deg,var(--algo-purple),var(--algo-violet));color:#fff;border-radius:20px;font-size:14px;font-weight:600;text-decoration:none;text-align:center;transition:opacity 0.2s}
    .tool-modal-link:hover{opacity:0.85}
    .tool-modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1}
    .tool-modal-close:hover{background:var(--bg-hover);color:var(--text-primary)}

    .shop-notice{font-size:0.75rem;color:var(--text-secondary);background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:8px 14px;margin-bottom:20px;text-align:center}
    .shop-cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
    .shop-cat-card{display:flex;flex-direction:column;align-items:center;gap:10px;padding:28px 16px 22px;background:var(--surface);border:1.5px solid var(--border);border-radius:18px;text-decoration:none;cursor:pointer;transition:transform 0.22s ease,box-shadow 0.22s ease,border-color 0.22s ease;position:relative;overflow:hidden;text-align:center}
    .shop-cat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--cat-color) 0%,transparent 60%);opacity:0.07;transition:opacity 0.22s ease;border-radius:inherit}
    .shop-cat-card:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 12px 32px rgba(0,0,0,0.35),0 0 0 2px var(--cat-color);border-color:var(--cat-color)}
    .shop-cat-card:hover::before{opacity:0.16}
    .shop-cat-icon{font-size:3rem;line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3));transition:transform 0.22s ease}
    .shop-cat-card:hover .shop-cat-icon{transform:scale(1.15) rotate(-4deg)}
    .shop-cat-label{font-size:1.05rem;font-weight:700;color:var(--text-primary)}
    .shop-cat-desc{font-size:0.78rem;color:var(--text-secondary);line-height:1.5}
    .shop-cat-cta{margin-top:6px;font-size:0.82rem;font-weight:600;color:var(--cat-color);background:rgba(255,255,255,0.06);border:1px solid var(--cat-color);border-radius:20px;padding:5px 16px;transition:background 0.18s ease,color 0.18s ease}
    .shop-cat-card:hover .shop-cat-cta{background:var(--cat-color);color:#fff}

    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
    .modal-overlay.open{display:flex}
    .modal{background:var(--bg-card);border-radius:var(--radius);border:1px solid rgba(124,58,237,0.25);padding:20px 24px 28px;width:96vw;max-width:1400px;margin:auto;display:flex;flex-direction:column;gap:14px}
    .modal-ads-top{width:100%;min-height:90px;background:rgba(255,255,255,0.03);border:1px dashed var(--border);border-radius:var(--radius-sm);overflow:hidden;display:flex;align-items:center;justify-content:center}
    .modal-ads-top ins{display:block;width:100%;min-height:90px}
    .modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .modal-title{font-size:17px;font-weight:700;line-height:1.4;flex:1}
    .modal-close{background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;flex-shrink:0}
    .modal-close:hover{color:var(--text-primary);background:var(--bg-hover)}
    .player-wrap{position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:var(--radius-sm);overflow:hidden}
    .player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:var(--radius-sm)}
    .modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .modal-stat{background:var(--bg-secondary);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px;text-align:center}
    .modal-stat-value{font-size:18px;font-weight:700;color:var(--algo-gold)}
    .modal-stat-label{font-size:11px;color:var(--text-secondary);margin-top:3px}
    .modal-yt-btn{display:inline-block;padding:8px 22px;background:linear-gradient(135deg,var(--algo-purple),var(--algo-violet));color:#fff;border-radius:20px;font-size:13px;text-decoration:none;font-weight:600;align-self:flex-start}

    /* ══════════════════════════════════════════════════════
       채널 분석 전용 스타일
    ══════════════════════════════════════════════════════ */
    .ch-profile{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(232,121,160,.08));border:1px solid rgba(124,58,237,.3);border-radius:var(--radius);padding:20px 24px;margin-bottom:18px;display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;}
    .ch-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid rgba(124,58,237,.5);}
    .ch-profile-info{flex:1;min-width:150px;}
    .ch-name{font-size:19px;font-weight:700;margin-bottom:2px;}
    .ch-handle{font-size:12px;color:var(--text-secondary);margin-bottom:10px;}
    .ch-stat-row{display:flex;gap:18px;flex-wrap:wrap;}
    .ch-stat{text-align:center;}
    .ch-stat-v{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--algo-gold),var(--algo-violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .ch-stat-l{font-size:10px;color:var(--text-muted);margin-top:1px;}

    /* 점수 링 */
    .algo-score-ring-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:18px;}
    .algo-ring-info{flex:1;min-width:150px;}
    .algo-ring-score{font-size:32px;font-weight:900;line-height:1;}
    .algo-ring-sublabel{font-size:10px;color:var(--text-muted);margin-top:2px;}
    .algo-ring-desc{font-size:12px;color:var(--text-secondary);margin-top:8px;line-height:1.7;}
    .algo-weight-bars{flex:1;min-width:200px;display:flex;flex-direction:column;gap:8px;}
    .awb-row{display:flex;flex-direction:column;gap:3px;}
    .awb-head{display:flex;justify-content:space-between;font-size:11px;}
    .awb-head span:first-child{color:var(--text-secondary);}
    .awb-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
    .awb-fill{height:100%;border-radius:3px;width:0;transition:width 1.1s ease;}

    /* 3D 레벨 카드 */
    .ch-card-scene{
      width:230px;
      height:340px;
      perspective:900px;
      position:relative;
      cursor:pointer;
      margin:0 auto 24px;
      transform:scaleX(0.825);
      transform-origin:center top;
    }
    .ch-card-scene::before,.ch-card-scene::after{content:'';position:absolute;left:50%;transform:translateX(-50%);width:60%;border-radius:50%;pointer-events:none;z-index:0;}
    .ch-card-scene::before{top:-18px;height:36px;filter:blur(14px);animation:chTopGlow 3s ease-in-out infinite;}
    .ch-card-scene::after{bottom:-18px;height:36px;filter:blur(14px);animation:chBotGlow 3s ease-in-out infinite;}
    @keyframes chTopGlow{0%,100%{opacity:.55;transform:translateX(-50%) scaleX(1);}50%{opacity:.88;transform:translateX(-50%) scaleX(1.14);}}
    @keyframes chBotGlow{0%,100%{opacity:.50;transform:translateX(-50%) scaleX(1);}50%{opacity:.82;transform:translateX(-50%) scaleX(1.12);}}
    .ch-card-tilt{position:absolute;inset:0;transform-style:preserve-3d;transform:rotateX(0deg) rotateY(0deg);transition:transform .1s ease;will-change:transform;}
    .ch-card-frame{position:absolute;inset:-3px;border-radius:21px;z-index:1;pointer-events:none;}
    .ch-card-frame::after{content:'';position:absolute;inset:2px;border-radius:19px;background:var(--bg-primary);}
    .ch-beam-container{position:absolute;inset:-3px;border-radius:21px;overflow:hidden;z-index:2;pointer-events:none;}
    .ch-beam-ring{position:absolute;width:400%;height:400%;top:50%;left:50%;margin-top:-200%;margin-left:-200%;animation:chBeamSpin var(--beam-spd,3s) linear infinite;transform-origin:center center;}
    @keyframes chBeamSpin{from{rotate:0deg;}to{rotate:360deg;}}
    .ch-card-body{position:absolute;inset:0;border-radius:18px;z-index:3;transition:box-shadow .3s ease;}
    .ch-card-face{position:absolute;inset:0;border-radius:18px;overflow:hidden;}
    .ch-card-face::before{content:'';position:absolute;inset:0;border-radius:18px;background:repeating-linear-gradient(-45deg,transparent 0px,transparent 3px,rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px);pointer-events:none;z-index:1;}
    .ch-card-shine{position:absolute;inset:0;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%);pointer-events:none;z-index:5;mix-blend-mode:screen;transition:background .08s ease;}
    .ch-card-top-band{position:absolute;top:0;left:0;right:0;height:44%;border-radius:18px 18px 0 0;z-index:2;pointer-events:none;}
    .ch-card-bot-band{position:absolute;bottom:0;left:0;right:0;height:40%;border-radius:0 0 18px 18px;z-index:2;pointer-events:none;}
    .ch-card-vignette{position:absolute;inset:0;z-index:6;pointer-events:none;border-radius:18px;background:radial-gradient(ellipse at center,transparent 28%,rgba(4,4,12,.62) 100%);}
    .ch-card-bokeh{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden;border-radius:18px;}
    .ch-bokeh-dot{position:absolute;border-radius:50%;filter:blur(var(--bblur,5px));opacity:var(--bop,.35);animation:chBokehDrift var(--bdur,7s) ease-in-out infinite;animation-delay:var(--bdel,0s);}
    @keyframes chBokehDrift{0%,100%{transform:translate(0,0) scale(1);}25%{transform:translate(7px,-9px) scale(1.12);}50%{transform:translate(-6px,7px) scale(.91);}75%{transform:translate(9px,4px) scale(1.06);}}
    .ch-card-sparkles{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:hidden;border-radius:18px;}
    .ch-sparkle-dot{position:absolute;font-size:var(--ssz,11px);animation:chSparklePop var(--sdur,2.2s) ease-in-out infinite;animation-delay:var(--sdel,0s);}
    @keyframes chSparklePop{0%,100%{opacity:.08;transform:scale(.45) rotate(-12deg);}40%{opacity:1;transform:scale(1.25) rotate(12deg);}65%{opacity:.75;transform:scale(1.05) rotate(5deg);}}
    .ch-fog-wrap{position:absolute;inset:-40px;border-radius:24px;filter:blur(24px);z-index:0;animation:chFogPulse 3s ease-in-out infinite;pointer-events:none;}
    @keyframes chFogPulse{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:.88;transform:scale(1.07);}}
    .ch-card-header{position:absolute;top:0;left:0;right:0;padding:13px 14px 0;display:flex;justify-content:space-between;align-items:flex-start;z-index:10;}
    .ch-card-lv-label{font-size:11px;font-weight:900;letter-spacing:.08em;padding:3px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.35);color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);backdrop-filter:blur(4px);}
    .ch-card-badge{color:#fff;padding:4px 11px;border-radius:8px;font-size:10px;font-weight:900;letter-spacing:.05em;box-shadow:0 2px 10px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.2);}
    .ch-card-main-wrap{position:absolute;top:37%;left:50%;transform:translate(-50%,-50%);z-index:8;display:flex;flex-direction:column;align-items:center;width:100%;text-align:center;}
    .ch-card-main-icon{font-size:2.4rem;margin-bottom:4px;animation:chIconHover 3.5s ease-in-out infinite;}
    @keyframes chIconHover{0%,100%{transform:translateY(0) rotateY(0deg);}30%{transform:translateY(-5px) rotateY(9deg);}70%{transform:translateY(-2px) rotateY(-6deg);}}
    .ch-card-score{font-size:2.6rem;font-weight:900;line-height:1;letter-spacing:-0.02em;margin-bottom:2px;}
    .ch-card-score-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase;}
    .ch-card-trend{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(4px);}
    .ch-card-metrics-mini{position:absolute;bottom:75px;left:14px;right:14px;display:flex;justify-content:space-between;z-index:10;gap:4px;}
    .ch-mini-metric{flex:1;display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 2px;backdrop-filter:blur(4px);}

    .ch-status-warn{color:#ffaa44!important;}

    .ch-xp-range{font-size:9px;font-weight:700;color:rgba(255,255,255,.5);}

    .ch-card-footer{position:absolute;bottom:0;left:0;right:0;padding:0 14px;display:flex;justify-content:space-between;align-items:center;height:36px;z-index:10;border-radius:0 0 18px 18px;border-top:1px solid rgba(255,255,255,.15);}

    target.getContext('2d').clearRect(0, 0, 80, 80);

  });
}

function fmt(n){n=parseInt(n,10)||0;if(n>=100_000_000)return(n/100_000_000).toFixed(1).replace(/\.0$/,'')+'억';if(n>=10_000)return(n/10_000).toFixed(1).replace(/\.0$/,'')+'만';if(n>=1_000)return(n/1_000).toFixed(1).replace(/\.0$/,'')+'천';return n.toLocaleString('ko-KR');}
function parseDurSec(iso){if(!iso)return 0;const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);if(!m)return 0;return(parseInt(m[1]||0)*3600)+(parseInt(m[2]||0)*60)+parseInt(m[3]||0);}
function fmtDur(iso){const s=parseDurSec(iso);if(!s)return'--:--';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;}
function viralOf(item){const s=item.statistics||{};return(parseInt(s.viewCount||0))+(parseInt(s.likeCount||0)*30)+(parseInt(s.commentCount||0)*60);}
function gradeOf(sub){const n=parseInt(sub||0);return GRADES.find(g=>n>=g.min)||GRADES[GRADES.length-1];}
function showGlobalError(msg){document.getElementById('global-error-banner').textContent=msg;document.getElementById('global-error-banner').style.display='block';document.getElementById('api-status').className='api-status error';document.getElementById('api-status').textContent='● API 오류';}
function hideGlobalError(){document.getElementById('global-error-banner').style.display='none';document.getElementById('api-status').className='api-status';document.getElementById('api-status').textContent='● API 연결됨';}
function hasShortKeyword(item){const sn=item.snippet||{};const hay=(sn.title||'').toLowerCase()+' '+(sn.description||'').slice(0,300).toLowerCase()+' '+(sn.tags||[]).join(' ').toLowerCase();return SHORTS_KEYWORDS.some(kw=>hay.includes(kw));}
function isShorts(item){const sec=parseDurSec(item.contentDetails?.duration||'');return sec>0&&sec<LONGS_MIN_SEC&&hasShortKeyword(item);}
function isLongs(item){return parseDurSec(item.contentDetails?.duration||'')>=LONGS_MIN_SEC;}
function hardFilterLongs(arr){return arr.filter(item=>parseDurSec(item.contentDetails?.duration||'')>=LONGS_MIN_SEC);}
function matchesCat(item,cat){const cfg=CAT_CFG[cat];if(!cfg)return true;const sn=item.snippet||{};const hay=[(sn.title||'').toLowerCase(),(sn.description||'').slice(0,200).toLowerCase(),(sn.tags||[]).join(' ').toLowerCase()].join(' ');return cfg.matchKeywords.some(kw=>hay.includes(kw.toLowerCase()));}

      <div class="modal-stat"><div class="modal-stat-value">${st.commentCount!=null?fmt(st.commentCount):'-'}</div><div class="modal-stat-label">댓글</div></div>
      <div class="modal-stat"><div class="modal-stat-value">${fmtDur(cd.duration)}</div><div class="modal-stat-label">길이</div></div>`;
    linkEl.href=`https://www.youtube.com/watch?v=${vid}`;
  }catch(e){statsEl.innerHTML=`<div class="error-card"><h3>불러오기 실패</h3><p>${e.message}</p></div>`;}

async function apiFetch(url){
  const validKeys=API_KEYS.filter(k=>k&&k.length>20&&!k.startsWith('YOUR_'));
  if(!validKeys.length)throw new Error('유효한 API 키가 없습니다.');
  for(let i=0;i<validKeys.length;i++){
    const k=validKeys[(keyIdx+i)%validKeys.length];
    const sep=url.includes('?')?'&':'?';
    try{
      const r=await fetch(url+sep+'key='+k);
      let data;try{data=await r.json();}catch{data={};}
      if(r.status===403||r.status===429){keyIdx=(keyIdx+i+1)%validKeys.length;continue;}
      if(data.error){
        const code=data.error.code||0,reason=data.error.errors?.[0]?.reason||'';
        if([403,429].includes(code)||['quotaExceeded','keyInvalid','forbidden','dailyLimitExceeded'].includes(reason)){keyIdx=(keyIdx+i+1)%validKeys.length;continue;}
        if(['invalidSearchFilter','invalidVideoFilter','invalidFilter'].includes(reason)){const cleaned=url.replace(/[&?]videoCategoryId=[^&]*/g,'').replace(/[&?]videoDuration=[^&]*/g,'');return apiFetch(cleaned);}
        throw new Error(`API 오류 [${code}] ${reason}`);
      }
      if(!r.ok)throw new Error('HTTP '+r.status);
      keyIdx=(keyIdx+i)%validKeys.length;hideGlobalError();return data;
    }catch(e){if(i===validKeys.length-1)throw e;}
  }
  throw new Error('모든 API 키 소진');
}

function buildCatTabs(){
  const wrap=document.getElementById('cat-tabs');wrap.innerHTML='';
  CAT_KEYS.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-btn'+(cat===activeCat?' active':'');
    btn.textContent=cat;
    btn.onclick=()=>{if(hotSearchMode){clearHotSearch();return;}switchCat(cat);};
    wrap.appendChild(btn);
  });
}
function switchCat(cat){
  activeCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.textContent===cat));
  shortsPage=0;longsPage=0;renderHotSplit();
  if(!catShortsCache[cat]&&!catLongCache[cat]){showHotLoader();loadUntilFull(cat).then(()=>{hideHotLoader();renderHotSplit();}).catch(e=>{hideHotLoader();showHotError(e.message);});}
}
function showHotLoader(){document.getElementById('hot-loader').style.display='block';document.getElementById('shorts-grid').innerHTML='';document.getElementById('longs-grid').innerHTML='';document.getElementById('shorts-more-btn').style.display='none';document.getElementById('longs-more-btn').style.display='none';}
function hideHotLoader(){document.getElementById('hot-loader').style.display='none';}
function showHotError(msg){document.getElementById(activeType==='shorts'?'shorts-grid':'longs-grid').innerHTML=`<div class="error-card" style="grid-column:1/-1"><h3>⚠️ 로드 실패</h3><p>${msg}</p></div>`;}

async function loadHot(){
  buildCatTabs();showHotLoader();
  try{
    await loadUntilFull(CAT_KEYS[0]);
    hideHotLoader();renderHotSplit();
    for(const k of CAT_KEYS.slice(1))if(!catShortsCache[k]&&!catLongCache[k])loadUntilFull(k).catch(e=>console.warn('[bg]',k,e.message));
  }catch(err){hideHotLoader();showGlobalError('인기영상 로드 실패: '+err.message);showHotError(err.message);}
}
async function loadUntilFull(cat){
  const cfg=CAT_CFG[cat];if(!cfg)return;
  let shorts=[],longs=[];
  if(cfg.categoryId){
    try{const d=await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&chart=mostPopular&regionCode=KR&hl=ko&maxResults=50&videoCategoryId=${cfg.categoryId}`);(d.items||[]).forEach(it=>{if(!matchesCat(it,cat))return;if(isShorts(it))shorts.push(it);else if(isLongs(it))longs.push(it);});}catch(e){console.warn('[mostPopular]',cat,e.message);}
  }
  if(shorts.length<12){
    for(const kw of cfg.shortsKw||[]){
      if(shorts.length>=24)break;
      try{const r=await apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&regionCode=KR&relevanceLanguage=ko&q=${encodeURIComponent(kw)}&maxResults=30&order=viewCount`);const ids=(r.items||[]).map(i=>i.id?.videoId).filter(Boolean);if(ids.length){const d=await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&id=${ids.join(',')}`);(d.items||[]).forEach(it=>{if(matchesCat(it,cat)&&isShorts(it)&&!shorts.find(s=>s.id===it.id))shorts.push(it);});}}catch(e){console.warn('[쇼츠보완]',kw,e.message);}
    }
  }
  if(longs.length<12){
    for(const kw of cfg.longsKw||[]){
      if(longs.length>=24)break;
      try{const r=await apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&regionCode=KR&relevanceLanguage=ko&q=${encodeURIComponent(kw)}&maxResults=30&order=viewCount`);const ids=(r.items||[]).map(i=>i.id?.videoId).filter(Boolean);if(ids.length){const d=await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&id=${ids.join(',')}`);(d.items||[]).forEach(it=>{if(matchesCat(it,cat)&&isLongs(it)&&!longs.find(l=>l.id===it.id))longs.push(it);});}}catch(e){console.warn('[롱폼보완]',kw,e.message);}
    }
  }
  const byViral=arr=>arr.slice().sort((a,b)=>viralOf(b)-viralOf(a));
  catShortsCache[cat]=byViral(shorts);catLongCache[cat]=byViral(hardFilterLongs(longs));
}

async function doHotSearch(){
  const q=document.getElementById('hot-kw-input').value.trim();
  if(!q){clearHotSearch();return;}
  hotSearchMode=true;hotSearchQuery=q;searchShortsPage=0;searchLongsPage=0;searchShorts=[];searchLongs=[];
  document.getElementById('search-result-header').style.display='flex';document.getElementById('search-kw-label').textContent=`"${q}"`;
  document.querySelectorAll('.cat-btn').forEach(b=>{b.classList.remove('active');b.style.opacity='0.4';});
  showHotLoader();
  try{
    const fetchIds=async(durParam)=>{const r=await apiFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=${durParam}&regionCode=KR&relevanceLanguage=ko&q=${encodeURIComponent(q)}&maxResults=50&order=viewCount`);return(r.items||[]).map(i=>i.id?.videoId).filter(Boolean);};
    const[sIds,mIds,lIds]=await Promise.all([fetchIds('short'),fetchIds('medium'),fetchIds('long')]);
    const allIds=[...new Set([...sIds,...mIds,...lIds])];const collected=[];
    for(let i=0;i<allIds.length;i+=50){try{const d=await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet%2CcontentDetails%2Cstatistics&id=${allIds.slice(i,i+50).join(',')}`);(d.items||[]).forEach(v=>collected.push(v));}catch(e){console.warn('[search detail]',e.message);}}
    collected.forEach(item=>{if(isShorts(item))searchShorts.push(item);else if(isLongs(item))searchLongs.push(item);});
    const byViral=arr=>arr.sort((a,b)=>viralOf(b)-viralOf(a));
    searchShorts=byViral(searchShorts);searchLongs=byViral(hardFilterLongs(searchLongs));
    hideHotLoader();renderSearchResult();
  }catch(e){hideHotLoader();showHotError(e.message);showGlobalError('검색 실패: '+e.message);}
}
function renderSearchResult(){
  const sg=document.getElementById('shorts-grid'),lg=document.getElementById('longs-grid'),sm=document.getElementById('shorts-more-btn'),lm=document.getElementById('longs-more-btn');
  if(activeType==='shorts'){sg.style.display='';lg.style.display='none';lm.style.display='none';if(!searchShorts.length){sg.innerHTML=`<div class="no-data" style="grid-column:1/-1"><div class="no-data-icon">🔍</div><h3>"${hotSearchQuery}" 쇼츠 결과 없음</h3></div>`;sm.style.display='none';}else{const sl=searchShorts.slice(0,(searchShortsPage+1)*PAGE);sg.innerHTML=sl.map(v=>makeVideoCard(v,'shorts')).join('');sm.style.display=sl.length<searchShorts.length?'block':'none';}}
  else{sg.style.display='none';sm.style.display='none';lg.style.display='';const safeLongs=hardFilterLongs(searchLongs);if(!safeLongs.length){lg.innerHTML=`<div class="no-data" style="grid-column:1/-1"><div class="no-data-icon">🔍</div><h3>"${hotSearchQuery}" 롱폼 결과 없음</h3></div>`;lm.style.display='none';}else{const sl=safeLongs.slice(0,(searchLongsPage+1)*PAGE);lg.innerHTML=sl.map(v=>makeVideoCard(v,'longs')).join('');lm.style.display=sl.length<safeLongs.length?'block':'none';}}
}
function clearHotSearch(){
  hotSearchMode=false;hotSearchQuery='';searchShorts=[];searchLongs=[];searchShortsPage=0;searchLongsPage=0;
  document.getElementById('hot-kw-input').value='';document.getElementById('search-result-header').style.display='none';
  document.querySelectorAll('.cat-btn').forEach(b=>{b.style.opacity='';b.classList.toggle('active',b.textContent===activeCat);});
  shortsPage=0;longsPage=0;renderHotSplit();

function renderHotSplit(){
  if(hotSearchMode){renderSearchResult();return;}
  const sg=document.getElementById('shorts-grid'),lg=document.getElementById('longs-grid'),sm=document.getElementById('shorts-more-btn'),lm=document.getElementById('longs-more-btn');
  const sl=catShortsCache[activeCat]||[],ll=hardFilterLongs(catLongCache[activeCat]||[]);
  if(activeType==='shorts'){sg.style.display='';lg.style.display='none';lm.style.display='none';if(!sl.length){sg.innerHTML=`<div class="no-data" style="grid-column:1/-1"><div class="no-data-icon">🎬</div><h3>쇼츠 데이터 없음</h3></div>`;sm.style.display='none';}else{const s=sl.slice(0,(shortsPage+1)*PAGE);sg.innerHTML=s.map(v=>makeVideoCard(v,'shorts')).join('');sm.style.display=s.length<sl.length?'block':'none';}}
  else{sg.style.display='none';sm.style.display='none';lg.style.display='';if(!ll.length){lg.innerHTML=`<div class="no-data" style="grid-column:1/-1"><div class="no-data-icon">📹</div><h3>롱폼 데이터 없음</h3></div>`;lm.style.display='none';}else{const s=ll.slice(0,(longsPage+1)*PAGE);lg.innerHTML=s.map(v=>makeVideoCard(v,'longs')).join('');lm.style.display=s.length<ll.length?'block':'none';}}
}
function loadMoreShorts(){if(hotSearchMode){searchShortsPage++;renderSearchResult();}else{shortsPage++;renderHotSplit();}}
function loadMoreLongs(){if(hotSearchMode){searchLongsPage++;renderSearchResult();}else{longsPage++;renderHotSplit();}}

function makeVideoCard(item,type){
  const sn=item.snippet||{},st=item.statistics||{},cd=item.contentDetails||{};
  const vid=item.id,title=sn.title||'제목 없음',ch=sn.channelTitle||'';
  const thumb=sn.thumbnails?.medium?.url||sn.thumbnails?.default?.url||'';
  const dur=fmtDur(cd.duration),views=st.viewCount!=null?fmt(st.viewCount):'-',likes=st.likeCount!=null?fmt(st.likeCount):'-';
  const viral=viralOf(item),vc=viral>5_000_000?'hot':viral>500_000?'warm':'cool',vl=viral>5_000_000?'🔥 핫':viral>500_000?'🌡️ 상승':'📈 주목';
  const safeTitle=title.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return`<div class="video-card" onclick="openVideoModal('${vid}')">
    <div class="thumb-wrap"><img src="${thumb}" alt="${safeTitle}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 320 180%22><rect fill=%22%23222%22 width=%22320%22 height=%22180%22/><text fill=%22%23666%22 x=%22160%22 y=%2295%22 text-anchor=%22middle%22 font-size=%2224%22>▶</text></svg>'" />
    ${type==='shorts'?'<span class="shorts-badge">Shorts</span>':''}

function calcChMetrics(st, videos){
  const subCount=+(st.subscriberCount||0),totalViews=+(st.viewCount||0),videoCount=+(st.videoCount||0);
  let sumViews=0,sumLikes=0,sumCmt=0,sumDur=0,durN=0;
  (videos||[]).forEach(v=>{
    const s=v.statistics||{};
    sumViews+=+(s.viewCount||0);sumLikes+=+(s.likeCount||0);sumCmt+=+(s.commentCount||0);
    const d=parseDurSec(v.contentDetails?.duration||'');
    if(d>0){sumDur+=d;durN++;}
  });
  const n=videos.length||1,avgViews=sumViews/n,avgLikes=sumLikes/n,avgCmt=sumCmt/n,avgDur=durN?sumDur/durN:0;
  let ctrEst=subCount>0&&avgViews>0?Math.min(avgViews/(subCount*0.11)*100,22):4.2;
  ctrEst=Math.max(ctrEst,0.5);
  const retFactor=subCount>=1e6?0.47:subCount>=1e5?0.44:subCount>=1e4?0.40:0.35;
  const avdSec=avgDur*retFactor,retRate=avgDur>0?avdSec/avgDur*100:retFactor*100;
  const engRate=avgViews>0?(avgLikes+avgCmt)/avgViews*100:0;
  const recInflow=subCount>=1e6?38:subCount>=1e5?28:subCount>=1e4?18:12;
  let uploadsPerWeek=0;
  if(videos.length>=2){
    const dates=videos.map(v=>new Date(v.snippet?.publishedAt||0)).sort((a,b)=>a-b);
    const spanWks=Math.max(1,(dates[dates.length-1]-dates[0])/(7*864e5));
    uploadsPerWeek=videos.length/spanWks;
  }
  const subConvRate=totalViews>0?Math.min(subCount/totalViews*100,10):0;
  const likeRatio=avgViews>0?avgLikes/avgViews*100:0;
  const ret30=Math.min(100,retRate+18),ret50=retRate,ret90=Math.max(0,retRate-20);
  const subGrowthEst=subCount>=1e6?2.1:subCount>=1e5?3.8:subCount>=1e4?5.5:8.2;
  return{subCount,totalViews,videoCount,n,avgViews,avgLikes,avgCmt,avgDur,avdSec,ctrEst,retRate,engRate,recInflow,uploadsPerWeek,subConvRate,likeRatio,ret30,ret50,ret90,subGrowthEst};
}

function calcChScore(m){
  const nCTR=Math.min(100,m.ctrEst/10*100),nRet=Math.min(100,m.retRate),nEng=Math.min(100,m.engRate/5*100),nRec=Math.min(100,m.recInflow/50*100);
  const nFreq=Math.min(100,m.uploadsPerWeek/3*100),nSub=Math.min(100,m.subConvRate/5*100),nOther=(nFreq+nSub)/2;
  const total=Math.round(nCTR*.25+nRet*.25+nEng*.20+nRec*.15+nOther*.15);
  return{total,nCTR:Math.round(nCTR),nRet:Math.round(nRet),nEng:Math.round(nEng),nRec:Math.round(nRec),nOther:Math.round(nOther)};
}

function calcChSEO(videos){
  if(!videos.length)return{title:50,desc:40,tag:40,chapter:20,caption:30};
  let tS=0,dS=0,kS=0,cS=0;const cap=Math.min(videos.length,15);
  videos.slice(0,cap).forEach(v=>{
    const sn=v.snippet||{},tl=(sn.title||'').length,dl=(sn.description||'').length,tags=(sn.tags||[]).length;
    tS+=tl>=40&&tl<=70?100:tl>=25?68:38;dS+=dl>300?100:dl>100?68:35;kS+=tags>=8&&tags<=15?100:tags>=3?62:25;cS+=/\d{1,2}:\d{2}/.test(sn.description||'')?100:15;
  });
  return{title:Math.round(tS/cap),desc:Math.round(dS/cap),tag:Math.round(kS/cap),chapter:Math.round(cS/cap),caption:38};
}

function chCard3D(e,el){
  const r=el.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  const ry=((x-r.width/2)/(r.width/2))*15,rx=-((y-r.height/2)/(r.height/2))*15;
  const mx=(x/r.width*100).toFixed(1)+'%',my=(y/r.height*100).toFixed(1)+'%';
  const tilt=el.querySelector('.ch-card-tilt');
  if(tilt)tilt.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) scale(1.03)`;
  const shine=el.querySelector('.ch-card-shine');
  if(shine)shine.style.background=`linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%),radial-gradient(ellipse 50% 40% at ${mx} ${my},rgba(255,255,255,.25) 0%,rgba(255,255,255,.06) 50%,transparent 75%)`;
}
function chCardReset(el){
  const tilt=el.querySelector('.ch-card-tilt');
  if(tilt)tilt.style.transform='rotateX(0deg) rotateY(0deg) scale(1)';
  const shine=el.querySelector('.ch-card-shine');
  if(shine)shine.style.background=`linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%)`;
}
