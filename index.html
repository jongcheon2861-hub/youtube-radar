<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO 로고 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#04030d;--purple:#7b2fff;--light-purple:#c084fc;--gold:#ffd700;--dark-purple:#3d00a0;--deep-black:#07000f;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:100px;padding:80px 24px;overflow-x:hidden;}

/* ════ 배경 ════ */
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg-radial{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(61,0,160,.18) 0%,rgba(123,47,255,.08) 40%,transparent 70%);}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(123,47,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(123,47,255,.04) 1px,transparent 1px);background-size:40px 40px;}
.bg-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(4,3,13,.85) 100%);}

/* ════ 섹션 ════ */
.section{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:24px;}
.section-label{font-family:'Noto Sans KR',sans-serif;font-size:.65rem;font-weight:500;letter-spacing:.4em;color:rgba(192,132,252,.4);text-transform:uppercase;}

/* ════ 큰 로고 ════ */
.logo-large{position:relative;display:flex;align-items:center;justify-content:center;padding:40px 50px;}

/* 외곽 후광 */
.logo-halo{position:absolute;inset:-60px;background:radial-gradient(ellipse at center,rgba(123,47,255,.22) 0%,rgba(80,0,180,.1) 40%,transparent 70%);animation:haloPulse 3s ease-in-out infinite alternate;pointer-events:none;}
@keyframes haloPulse{from{opacity:.6;transform:scale(.95);}to{opacity:1;transform:scale(1.05);}}

/* 장식 링 */
.logo-ring{position:absolute;width:320px;height:120px;border:1px solid rgba(192,132,252,.12);border-radius:50%;pointer-events:none;animation:ringRotate 12s linear infinite;}
.logo-ring2{position:absolute;width:380px;height:90px;border:1px solid rgba(255,215,0,.08);border-radius:50%;pointer-events:none;animation:ringRotate 18s linear infinite reverse;}
@keyframes ringRotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* 날개 컨테이너 */
.wing-lg{width:160px;height:110px;position:relative;}

/* 텍스트 블록 */
.logo-text-block{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:10;padding:0 10px;}

/* 상단 장식 */
.logo-deco-top{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.deco-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.6));}
.deco-line.rev{background:linear-gradient(90deg,rgba(255,215,0,.6),transparent);}
.deco-diamond{width:5px;height:5px;background:#ffd700;transform:rotate(45deg);box-shadow:0 0 6px rgba(255,215,0,.8),0 0 12px rgba(255,215,0,.4);}

/* 메인 텍스트 */
.logo-main{font-family:'Cinzel',serif;font-size:3.8rem;font-weight:900;letter-spacing:.25em;color:transparent;background:linear-gradient(180deg,#fff 0%,#e0aaff 40%,#c084fc 70%,#7b2fff 100%);-webkit-background-clip:text;background-clip:text;position:relative;filter:drop-shadow(0 0 30px rgba(123,47,255,.6));animation:mainTextPulse 3s ease-in-out infinite alternate;}
@keyframes mainTextPulse{from{filter:drop-shadow(0 0 20px rgba(123,47,255,.5)) drop-shadow(0 0 40px rgba(123,47,255,.3));}to{filter:drop-shadow(0 0 35px rgba(192,132,252,.9)) drop-shadow(0 0 70px rgba(160,80,255,.6)) drop-shadow(0 0 100px rgba(123,47,255,.3));}}

/* 구분선 */
.logo-divider{width:200px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.3),rgba(192,132,252,.8),rgba(255,215,0,.3),transparent);position:relative;margin:2px 0;}
.logo-divider::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:60%;height:3px;background:linear-gradient(90deg,transparent,rgba(192,132,252,.4),transparent);filter:blur(3px);}

/* 서브 텍스트 */
.logo-sub{font-family:'Cinzel',serif;font-size:.78rem;font-weight:700;letter-spacing:.5em;color:transparent;background:linear-gradient(90deg,rgba(255,215,0,.6),#ffd700,rgba(255,215,0,.6));-webkit-background-clip:text;background-clip:text;text-shadow:none;filter:drop-shadow(0 0 8px rgba(255,215,0,.5));}

/* 하단 장식 */
.logo-deco-bot{display:flex;align-items:center;gap:6px;margin-top:2px;}
.deco-dot{width:3px;height:3px;border-radius:50%;background:rgba(192,132,252,.6);box-shadow:0 0 4px rgba(192,132,252,.8);}

/* ════ 작은 뱃지 ════ */
.logo-badge{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:2px;padding:6px 14px 6px 10px;border-radius:12px;overflow:hidden;}

/* 뱃지 배경 레이어 */
.badge-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(61,0,160,.7) 0%,rgba(13,0,32,.9) 50%,rgba(61,0,160,.5) 100%);border-radius:12px;}
.badge-border{position:absolute;inset:0;border-radius:12px;padding:1px;background:linear-gradient(135deg,rgba(255,215,0,.6),rgba(192,132,252,.8),rgba(123,47,255,.6),rgba(255,215,0,.4));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;}
.badge-shine{position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:badgeShine 3s ease-in-out infinite;border-radius:12px;}
@keyframes badgeShine{0%{left:-100%;}50%,100%{left:150%;}}
.badge-glow{position:absolute;inset:-4px;background:radial-gradient(ellipse at center,rgba(123,47,255,.25) 0%,transparent 70%);border-radius:14px;animation:badgeGlow 2.5s ease-in-out infinite alternate;pointer-events:none;}
@keyframes badgeGlow{from{opacity:.6;}to{opacity:1;}}

/* 뱃지 날개 */
.wing-badge{width:28px;height:22px;position:relative;z-index:2;}

/* 뱃지 텍스트 */
.badge-text{font-family:'Cinzel',serif;font-size:.78rem;font-weight:900;letter-spacing:.2em;color:transparent;background:linear-gradient(180deg,#fff 0%,#e0aaff 50%,#c084fc 100%);-webkit-background-clip:text;background-clip:text;position:relative;z-index:2;padding:0 4px;filter:drop-shadow(0 0 6px rgba(192,132,252,.8));}

/* ════ 날개 애니메이션 ════ */
@keyframes wingGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(123,47,255,.8)) drop-shadow(0 0 16px rgba(123,47,255,.4)) drop-shadow(0 0 30px rgba(255,215,0,.2));}50%{filter:drop-shadow(0 0 14px rgba(192,132,252,1)) drop-shadow(0 0 28px rgba(160,80,255,.8)) drop-shadow(0 0 50px rgba(255,215,0,.4));}}
@keyframes wingGlowSm{0%,100%{filter:drop-shadow(0 0 4px rgba(123,47,255,.8)) drop-shadow(0 0 8px rgba(123,47,255,.4));}50%{filter:drop-shadow(0 0 7px rgba(192,132,252,1)) drop-shadow(0 0 14px rgba(160,80,255,.7));}}

.wing-lg svg{animation:wingGlow 3s ease-in-out infinite alternate;}
.wing-badge svg{animation:wingGlowSm 3s ease-in-out infinite alternate;}

/* ════ 파티클 ════ */
.particle{position:fixed;pointer-events:none;animation:particleFloat linear infinite;}
@keyframes particleFloat{0%{transform:translateY(105vh) rotate(0deg);opacity:0;}5%{opacity:1;}95%{opacity:.4;}100%{transform:translateY(-5vh) rotate(360deg);opacity:0;}}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-radial"></div>
  <div class="bg-grid"></div>
  <div class="bg-vignette"></div>
</div>

<script>
// 파티클 생성
const colors=['rgba(123,47,255,.7)','rgba(192,132,252,.6)','rgba(255,215,0,.5)','rgba(255,255,255,.3)'];
for(let i=0;i<24;i++){
  const p=document.createElement('div');
  p.className='particle';
  const size=Math.random()*2.5+.8;
  const isSquare=Math.random()>.6;
  p.style.cssText=`
    width:${size}px;height:${size}px;
    left:${Math.random()*100}%;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    border-radius:${isSquare?'2px':'50%'};
    animation-duration:${Math.random()*15+10}s;
    animation-delay:${Math.random()*10}s;
    box-shadow:0 0 ${size*3}px ${colors[Math.floor(Math.random()*colors.length)]};
  `;
  document.body.appendChild(p);
}
</script>

<!-- ════ 큰 로고 ════ -->

        <circle cx="150" cy="55" r="3.5" fill="#ffd700" opacity=".95"/>

        <line x1="153" y1="59" x2="155" y2="61" stroke="#ffd700" stroke-width="1" opacity=".6"/>
      </svg>
    </div>

    <!-- 텍스트 블록 -->
    <div class="logo-text-block">
      <div class="logo-deco-top">
        <div class="deco-line"></div>

      </div>
      <div class="logo-main">ALGO</div>

      <div class="logo-deco-bot">

        <div class="deco-dot" style="opacity:.4"></div>
        <div class="deco-dot" style="opacity:.2"></div>
      </div>
    </div>

    <!-- 오른쪽 큰 날개 -->
    <div class="wing-lg">
      <svg width="160" height="110" viewBox="0 0 160 110" overflow="visible">
        <defs>
          <linearGradient id="wgR1" x1="10" y1="55" x2="155" y2="55" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffd700" stop-opacity="1"/>

<!-- ════ 작은 뱃지 ════ -->

      <div class="badge-bg"></div>

</body>
</html>
