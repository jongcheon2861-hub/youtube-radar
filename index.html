<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ALGO – 채널분석 레벨카드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>

  <style>
    /* ═══════════════════════════════════════════════
       0. RESET & ROOT VARIABLES
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a12;
      --surface:     #13131f;
      --border:      rgba(255,255,255,0.08);
      --text:        #e8e8f0;
      --muted:       #7a7a9a;
      --accent:      #7c6aff;

      /* Level colour tokens */
      --lv1-a: #4fc3f7; --lv1-b: #0277bd; --lv1-glow: #4fc3f744;
      --lv2-a: #81c784; --lv2-b: #2e7d32; --lv2-glow: #81c78444;
      --lv3-a: #ffb74d; --lv3-b: #e65100; --lv3-glow: #ffb74d44;
      --lv4-a: #f06292; --lv4-b: #ad1457; --lv4-glow: #f0629244;
      --lv5-a: #ba68c8; --lv5-b: #6a1b9a; --lv5-glow: #ba68c844;
      --lv6-a: #ff8a65; --lv6-b: #bf360c; --lv6-glow: #ff8a6544;
      --lv7-a: #4dd0e1; --lv7-b: #006064; --lv7-glow: #4dd0e144;
      --lv8-a: #f48fb1; --lv8-b: #880e4f; --lv8-glow: #f48fb144;
      --lv9-a: #fff176; --lv9-b: #f57f17; --lv9-glow: #fff17644;
      --max-a: #ffd700; --max-b: #ff4500; --max-glow: #ffd70066;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════════
       1. PAGE LAYOUT
    ═══════════════════════════════════════════════ */
    .page-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    .page-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 900;
      text-align: center;
      letter-spacing: .12em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #7c6aff, #f06292);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-sub {
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
      margin-bottom: 48px;
    }

    /* ═══════════════════════════════════════════════
       2. INPUT PANEL
    ═══════════════════════════════════════════════ */
    .input-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 48px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      align-items: end;
    }

    .input-group label {
      display: block;
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .input-group input,
    .input-group select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .input-group input:focus,
    .input-group select:focus { border-color: var(--accent); }
    .input-group input::placeholder { color: var(--muted); }

    .btn-analyze {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #7c6aff, #f06292);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    .btn-analyze:hover { opacity: .88; transform: translateY(-2px); }
    .btn-analyze:active { transform: translateY(0); }

    /* ═══════════════════════════════════════════════
       3. RESULT SECTION
    ═══════════════════════════════════════════════ */
    #result-section { display: none; }
    #result-section.visible { display: block; }

    .result-heading {
      font-size: .78rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* 카드 그리드 */
    .card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
    }

    /* ═══════════════════════════════════════════════
       4. CH-CARD 3D SCENE  (scaleX 82.5%)
    ═══════════════════════════════════════════════ */
    .ch-card-scene {
      width: 230px;
      height: 320px;
      perspective: 900px;
      transform: scaleX(0.825);
      transform-origin: center top;
      flex-shrink: 0;
    }

    .ch-card-tilt {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform .08s linear;
      border-radius: 20px;
      position: relative;
    }

    /* card body = the visible face */
    .ch-card-body {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.14);
      display: flex;
      flex-direction: column;
    }

    /* ── Glossy sheen layer ── */
    .ch-card-body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.18) 0%,
        rgba(255,255,255,0.04) 40%,
        transparent 60%
      );
      border-radius: inherit;
      z-index: 10;
      pointer-events: none;
    }

    /* ── Dynamic light-reflex (JS driven) ── */
    .ch-card-body::after {
      content: '';
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.22), transparent 70%);
      transform: translate(-50%, -50%);
      left: var(--mx, 50%);
      top:  var(--my, 50%);
      z-index: 11;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
    }
    .ch-card-tilt:hover .ch-card-body::after { opacity: 1; }

    /* ═══════════════════════════════════════════════
       5. CARD INTERNAL LAYOUT
    ═══════════════════════════════════════════════ */
    .ch-card-header {
      padding: 14px 16px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
    }
    .ch-card-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .12em;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
    }
    .ch-card-lvlabel {
      font-family: 'Orbitron', sans-serif;
      font-size: .58rem;
      font-weight: 900;
      opacity: .75;
      letter-spacing: .1em;
    }

    .ch-card-main {
      padding: 0 16px 8px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      z-index: 2;
    }

    /* Channel name */
    .ch-name {
      font-size: .78rem;
      font-weight: 600;
      opacity: .85;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Big score */
    .ch-score-wrap {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin: 4px 0;
    }
    .ch-score {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.6rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -.02em;
    }
    .ch-score-unit {
      font-size: .7rem;
      opacity: .7;
    }

    /* Metric rows */
    .ch-metrics { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
    .ch-metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .72rem;
    }
    .ch-metric-label { opacity: .65; }
    .ch-metric-val   { font-weight: 700; letter-spacing: .03em; }

    /* XP bar */
    .ch-xp-wrap { margin-top: 8px; }
    .ch-xp-label {
      display: flex;
      justify-content: space-between;
      font-size: .62rem;
      opacity: .6;
      margin-bottom: 5px;
    }
    .ch-xp-track {
      height: 5px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .ch-xp-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }

    /* Card footer */
    .ch-card-footer {
      padding: 10px 16px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: .65rem;
      opacity: .75;
    }
    .ch-footer-status { display: flex; align-items: center; gap: 5px; }
    .ch-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1);   }
      50%      { opacity: .5; transform: scale(1.4); }
    }

    /* ═══════════════════════════════════════════════
       6. LEVEL THEMES
    ═══════════════════════════════════════════════ */
    /* LV1 – 하늘파랑 */
    .ch-lv-1 .ch-card-body {
      background: linear-gradient(145deg, #0d2137, #0a3d5c, #1565a0);
      box-shadow: 0 0 32px var(--lv1-glow), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .ch-lv-1 .ch-score, .ch-lv-1 .ch-card-badge { color: var(--lv1-a); }
    .ch-lv-1 .ch-xp-fill { background: linear-gradient(90deg, var(--lv1-b), var(--lv1-a)); }
    .ch-lv-1 .ch-status-dot { background: var(--lv1-a); box-shadow: 0 0 6px var(--lv1-a); }

    /* LV2 – 에메랄드 */
    .ch-lv-2 .ch-card-body {
      background: linear-gradient(145deg, #0d1f0e, #1b4020, #2e7d32);
      box-shadow: 0 0 32px var(--lv2-glow), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .ch-lv-2 .ch-score, .ch-lv-2 .ch-card-badge { color: var(--lv2-a); }
    .ch-lv-2 .ch-xp-fill { background: linear-gradient(90deg, var(--lv2-b), var(--lv2-a)); }
    .ch-lv-2 .ch-status-dot { background: var(--lv2-a); box-shadow: 0 0 6px var(--lv2-a); }

    /* LV3 – 앰버 오렌지 */
    .ch-lv-3 .ch-card-body {
      background: linear-gradient(145deg, #1f1200, #4a2400, #7b3800);
      box-shadow: 0 0 32px var(--lv3-glow), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .ch-lv-3 .ch-score, .ch-lv-3 .ch-card-badge { color: var(--lv3-a); }
    .ch-lv-3 .ch-xp-fill { background: linear-gradient(90deg, var(--lv3-b), var(--lv3-a)); }
    .ch-lv-3 .ch-status-dot { background: var(--lv3-a); box-shadow: 0 0 6px var(--lv3-a); }

    /* LV4 – 핑크 로즈 */
    .ch-lv-4 .ch-card-body {
      background: linear-gradient(145deg, #1f0512, #4a0e26, #880e3a);
      box-shadow: 0 0 32px var(--lv4-glow), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .ch-lv-4 .ch-score, .ch-lv-4 .ch-card-badge { color: var(--lv4-a); }
    .ch-lv-4 .ch-xp-fill { background: linear-gradient(90deg, var(--lv4-b), var(--lv4-a)); }
    .ch-lv-4 .ch-status-dot { background: var(--lv4-a); box-shadow: 0 0 6px var(--lv4-a); }

    /* LV5 – 퍼플 */
    .ch-lv-5 .ch-card-body {
      background: linear-gradient(145deg, #120820, #2d0e52, #5a1990);
      box-shadow: 0 0 32px var(--lv5-glow), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .ch-lv-5 .ch-score, .ch-lv-5 .ch-card-badge { color: var(--lv5-a); }
    .ch-lv-5 .ch-xp-fill { background: linear-gradient(90deg, var(--lv5-b), var(--lv5-a)); }
    .ch-lv-5 .ch-status-dot { background: var(--lv5-a); box-shadow: 0 0 6px var(--lv5-a); }

    /* LV6 – 코럴 레드 */
    .ch-lv-6 .ch-card-body {
      background: linear-gradient(145deg, #1f0800, #4a1500, #8a2400);
      box-shadow: 0 0 32px var(--lv6-glow), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .ch-lv-6 .ch-score, .ch-lv-6 .ch-card-badge { color: var(--lv6-a); }
    .ch-lv-6 .ch-xp-fill { background: linear-gradient(90deg, var(--lv6-b), var(--lv6-a)); }
    .ch-lv-6 .ch-status-dot { background: var(--lv6-a); box-shadow: 0 0 6px var(--lv6-a); }

    /* LV7 – 시안 */
    .ch-lv-7 .ch-card-body {
      background: linear-gradient(145deg, #001a1c, #003d40, #006064);
      box-shadow: 0 0 32px var(--lv7-glow), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .ch-lv-7 .ch-score, .ch-lv-7 .ch-card-badge { color: var(--lv7-a); }
    .ch-lv-7 .ch-xp-fill { background: linear-gradient(90deg, var(--lv7-b), var(--lv7-a)); }
    .ch-lv-7 .ch-status-dot { background: var(--lv7-a); box-shadow: 0 0 6px var(--lv7-a); }

    /* LV8 – 딥 핑크 */
    .ch-lv-8 .ch-card-body {
      background: linear-gradient(145deg, #1f0015, #4a0030, #880050);
      box-shadow: 0 0 32px var(--lv8-glow), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .ch-lv-8 .ch-score, .ch-lv-8 .ch-card-badge { color: var(--lv8-a); }
    .ch-lv-8 .ch-xp-fill { background: linear-gradient(90deg, var(--lv8-b), var(--lv8-a)); }
    .ch-lv-8 .ch-status-dot { background: var(--lv8-a); box-shadow: 0 0 6px var(--lv8-a); }

    /* LV9 – 골드 옐로우 */
    .ch-lv-9 .ch-card-body {
      background: linear-gradient(145deg, #1a1100, #3d2a00, #7a5000);
      box-shadow: 0 0 32px var(--lv9-glow), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .ch-lv-9 .ch-score, .ch-lv-9 .ch-card-badge { color: var(--lv9-a); }
    .ch-lv-9 .ch-xp-fill { background: linear-gradient(90deg, var(--lv9-b), var(--lv9-a)); }
    .ch-lv-9 .ch-status-dot { background: var(--lv9-a); box-shadow: 0 0 6px var(--lv9-a); }

    /* LV MAX – 레인보우 골드 */
    .ch-lv-MAX .ch-card-body {
      background: linear-gradient(145deg, #1a0800, #3a1500, #6a2a00);
      box-shadow:
        0 0 24px var(--max-glow),
        0 0 60px rgba(255,69,0,.25),
        inset 0 1px 0 rgba(255,255,255,0.18);
      animation: maxGlow 3s ease-in-out infinite alternate;
    }
    @keyframes maxGlow {
      from { box-shadow: 0 0 24px #ffd70066, 0 0 60px rgba(255,69,0,.25), inset 0 1px 0 rgba(255,255,255,0.18); }
      to   { box-shadow: 0 0 50px #ffd700aa, 0 0 90px rgba(255,69,0,.45), inset 0 1px 0 rgba(255,255,255,0.25); }
    }
    .ch-lv-MAX .ch-score {
      background: linear-gradient(90deg, #ffd700, #ff4500, #ffd700);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 2.5s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200% center; } }
    .ch-lv-MAX .ch-card-badge {
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .ch-lv-MAX .ch-xp-fill  { background: linear-gradient(90deg, var(--max-b), var(--max-a)); }
    .ch-lv-MAX .ch-status-dot { background: var(--max-a); box-shadow: 0 0 8px var(--max-a); }

    /* ═══════════════════════════════════════════════
       7. RESPONSIVE
    ═══════════════════════════════════════════════ */
    @media (max-width: 600px) {
      .input-panel { padding: 20px 16px; }
      .ch-card-scene { width: 200px; height: 285px; }
    }
  </style>
</head>
<body>

<div class="page-wrap">
  <h1 class="page-title">⚡ ALGO 채널분석</h1>
  <p class="page-sub">채널 정보를 입력하면 알고리즘 레벨 카드를 즉시 생성합니다</p>

  <!-- ── INPUT PANEL ── -->
  <div class="input-panel">
    <div class="input-group">
      <label>채널명</label>
      <input type="text" id="in-name" placeholder="예: 코딩유튜브" maxlength="28"/>
    </div>
    <div class="input-group">
      <label>구독자 수</label>
      <input type="number" id="in-subs" placeholder="예: 15000" min="0"/>
    </div>
    <div class="input-group">
      <label>총 영상 수</label>
      <input type="number" id="in-videos" placeholder="예: 80" min="0"/>
    </div>
    <div class="input-group">
      <label>최근 30일 조회수</label>
      <input type="number" id="in-views" placeholder="예: 50000" min="0"/>
    </div>
    <div class="input-group">
      <label>평균 댓글 수 (영상당)</label>
      <input type="number" id="in-comments" placeholder="예: 12" min="0"/>
    </div>
    <div class="input-group">
      <label>평균 좋아요 수 (영상당)</label>
      <input type="number" id="in-likes" placeholder="예: 180" min="0"/>
    </div>
    <div class="input-group" style="grid-column: span 1;">
      <label>&nbsp;</label>
      <button class="btn-analyze" onclick="runAnalysis()">🔍 분석 시작</button>
    </div>
  </div>

  <!-- ── RESULT ── -->
  <div id="result-section">
    <p class="result-heading">📊 분석 결과 – 채널 레벨 카드</p>
    <div class="card-grid" id="card-grid"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════════ -->

    maxScore: 94,
    desc: '엘리트 채널',
    tip: '브랜드 딜을 적극 유치하세요',
    statusText: '엘리트',
  },
  {
    key: '9',
    label: 'LV 9',
    badge: 'LEGEND',
    minScore: 95,
    maxScore: 98,
    desc: '레전드 채널',
    tip: '독자 IP 개발을 고려하세요',
    statusText: '레전드',
  },
  {
    key: 'MAX',
    label: 'LV MAX',
    badge: '◆ MAX ◆',
    minScore: 99,
    maxScore: 100,
    desc: '알고리즘 정복자',
    tip: '업계 선두 – 새 트렌드를 직접 만드세요',
    statusText: '◆ MAX',
  },
];

/* ─────────────────────────────────────────
   SCORING HELPERS
───────────────────────────────────────── */

/** 구독자 점수 (0-30) */
function scoreSubs(subs) {
  if (subs >= 10_000_000) return 30;
  if (subs >=  1_000_000) return 26;
  if (subs >=    500_000) return 22;
  if (subs >=    100_000) return 18;
  if (subs >=     50_000) return 14;
  if (subs >=     10_000) return 10;
  if (subs >=      5_000) return  7;
  if (subs >=      1_000) return  4;
  return 1;
}

/** 조회수 점수 (0-30) */
function scoreViews(views) {
  if (views >= 5_000_000) return 30;
  if (views >= 1_000_000) return 26;
  if (views >=   500_000) return 22;
  if (views >=   100_000) return 17;
  if (views >=    50_000) return 12;
  if (views >=    10_000) return  8;
  if (views >=     5_000) return  5;
  return 2;
}

/** 참여율 점수 (0-25)  좋아요+댓글 / 조회수 */
function scoreEngagement(views, likes, comments) {
  if (views <= 0) return 0;
  const rate = (likes + comments * 3) / views;
  if (rate >= 0.15) return 25;
  if (rate >= 0.10) return 20;
  if (rate >= 0.07) return 16;
  if (rate >= 0.04) return 12;
  if (rate >= 0.02) return  8;
  if (rate >= 0.01) return  4;
  return 1;
}

/** 영상 수 점수 (0-15) */
function scoreVideos(n) {
  if (n >= 500) return 15;
  if (n >= 200) return 12;
  if (n >= 100) return  9;
  if (n >=  50) return  6;
  if (n >=  20) return  3;
  return 1;
}

/** 종합 점수 계산 (0-100) */
function calcScore({ subs, views, likes, comments, videos }) {
  const s = scoreSubs(subs) + scoreViews(views) +
            scoreEngagement(views, likes, comments) + scoreVideos(videos);
  // 최대 = 30+30+25+15 = 100
  return Math.min(100, Math.round(s));
}

/** 점수 → 레벨 오브젝트 */
function scoreToLevel(score) {
  return CH_LEVEL_TABLE.find(
    lv => score >= lv.minScore && score <= lv.maxScore
  ) || CH_LEVEL_TABLE[CH_LEVEL_TABLE.length - 1];
}

/* ─────────────────────────────────────────
   NUMBER FORMATTER
───────────────────────────────────────── */
function fmtNum(n) {
  if (n >= 100_000_000) return (n / 100_000_000).toFixed(1) + '억';
  if (n >= 10_000)      return (n / 10_000).toFixed(1)      + '만';
  if (n >= 1_000)       return (n / 1_000).toFixed(1)       + 'K';
  return String(n);
}

/* ─────────────────────────────────────────
   3D CARD INTERACTION
───────────────────────────────────────── */
function chCard3D(e, scene) {
  const rect  = scene.getBoundingClientRect();
  const tilt  = scene.querySelector('.ch-card-tilt');
  const body  = scene.querySelector('.ch-card-body');
  const cx    = rect.left + rect.width  / 2;
  const cy    = rect.top  + rect.height / 2;
  const dx    = (e.clientX - cx) / (rect.width  / 2);   // -1 ~ 1
  const dy    = (e.clientY - cy) / (rect.height / 2);   // -1 ~ 1
  const rotY  =  dx * 14;
  const rotX  = -dy * 10;

  tilt.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

  // light reflex position (percentage)
  const px = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1) + '%';
  const py = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1) + '%';
  body.style.setProperty('--mx', px);
  body.style.setProperty('--my', py);
}

function chCardReset(scene) {
  const tilt = scene.querySelector('.ch-card-tilt');
  tilt.style.transform = 'rotateX(0deg) rotateY(0deg)';
  tilt.style.transition = 'transform .5s cubic-bezier(.4,0,.2,1)';
  setTimeout(() => { tilt.style.transition = 'transform .08s linear'; }, 520);
}

/* ─────────────────────────────────────────
   BUILD ONE CH-CARD HTML STRING
───────────────────────────────────────── */
function buildChCard(params) {
  const { name, subs, views, likes, comments, videos } = params;

  const score    = calcScore({ subs, views, likes, comments, videos });
  const lv       = scoreToLevel(score);
  const engRate  = views > 0
    ? ((likes + comments) / views * 100).toFixed(2) + '%'
    : '0%';

  // XP progress within current level band
  const band  = lv.maxScore - lv.minScore;
  const xpPct = band > 0
    ? Math.round((score - lv.minScore) / band * 100)
    : 100;
  const nextLv = CH_LEVEL_TABLE.find(l => l.minScore > lv.maxScore);
  const nextLabel = nextLv ? nextLv.label : '◆ MAX';

  return `
<div class="ch-card-scene ch-lv-${lv.key}"
     onmousemove="chCard3D(event,this)"
     onmouseleave="chCardReset(this)">
  <div class="ch-card-tilt">
    <div class="ch-card-body">

      <!-- HEADER -->
      <div class="ch-card-header">
        <span class="ch-card-badge">${lv.badge}</span>
        <span class="ch-card-lvlabel">${lv.label}</span>
      </div>

      <!-- MAIN -->
      <div class="ch-card-main">
        <div class="ch-name" title="${name}">${name || '이름 없음'}</div>

        <!-- 종합 점수 -->
        <div class="ch-score-wrap">
          <span class="ch-score" data-target="${score}">0</span>
          <span class="ch-score-unit">/ 100 pt</span>
        </div>

        <!-- 메트릭 -->
        <div class="ch-metrics">
          <div class="ch-metric-row">
            <span class="ch-metric-label">👥 구독자</span>
            <span class="ch-metric-val">${fmtNum(subs)}</span>
          </div>
          <div class="ch-metric-row">
            <span class="ch-metric-label">👁 조회수(30일)</span>
            <span class="ch-metric-val">${fmtNum(views)}</span>
          </div>
          <div class="ch-metric-row">
            <span class="ch-metric-label">💬 참여율</span>
            <span class="ch-metric-val">${engRate}</span>
          </div>
          <div class="ch-metric-row">
            <span class="ch-metric-label">🎬 영상 수</span>
            <span class="ch-metric-val">${videos}개</span>
          </div>
        </div>

        <!-- XP BAR -->
        <div class="ch-xp-wrap">
          <div class="ch-xp-label">
            <span>XP ${score - lv.minScore} / ${lv.maxScore - lv.minScore}</span>
            <span>다음: ${nextLabel}</span>
          </div>
          <div class="ch-xp-track">
            <div class="ch-xp-fill" style="width:0%" data-fill="${xpPct}"></div>
          </div>
        </div>
      </div><!-- /ch-card-main -->

      <!-- FOOTER -->
      <div class="ch-card-footer">
        <div class="ch-footer-status">
          <div class="ch-status-dot"></div>
          <span>${lv.statusText}</span>
        </div>
        <span>${lv.desc}</span>
      </div>

    </div><!-- /ch-card-body -->
  </div><!-- /ch-card-tilt -->
</div><!-- /ch-card-scene -->`;
}

/* ─────────────────────────────────────────
   ANIMATE SCORE COUNTER + XP BAR
───────────────────────────────────────── */
function animateCards() {
  // 점수 카운터
  document.querySelectorAll('.ch-score[data-target]').forEach(el => {
    const target = parseInt(el.dataset.target, 10);
    const dur    = 900;
    const start  = performance.now();
    const tick   = (now) => {
      const t = Math.min((now - start) / dur, 1);
      const ease = 1 - Math.pow(1 - t, 3); // cubic ease-out
      el.textContent = Math.round(ease * target);
      if (t < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });

  // XP 바
  requestAnimationFrame(() => {
    document.querySelectorAll('.ch-xp-fill[data-fill]').forEach(el => {
      const pct = parseInt(el.dataset.fill, 10);
      setTimeout(() => { el.style.width = pct + '%'; }, 200);
    });
  });
}

/* ─────────────────────────────────────────
   MAIN – runAnalysis()
───────────────────────────────────────── */
function runAnalysis() {
  const name     = document.getElementById('in-name').value.trim();
  const subs     = parseInt(document.getElementById('in-subs').value)     || 0;
  const videos   = parseInt(document.getElementById('in-videos').value)   || 0;
  const views    = parseInt(document.getElementById('in-views').value)    || 0;
  const comments = parseInt(document.getElementById('in-comments').value) || 0;
  const likes    = parseInt(document.getElementById('in-likes').value)    || 0;

  const grid    = document.getElementById('card-grid');
  const section = document.getElementById('result-section');

  grid.innerHTML = buildChCard({ name, subs, views, likes, comments, videos });
  section.classList.add('visible');

  // 부드러운 스크롤
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // 애니메이션
  requestAnimationFrame(animateCards);
}
</script>
