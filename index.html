<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO 로고 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070f;--purple:#7b2fff;--light-purple:#c084fc;--gold:#ffd700;--dark-purple:#3d00a0;--deep-black:#07000f;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:80px;padding:60px 24px;}

/* ════ 섹션 타이틀 ════ */
.section-title{color:rgba(255,255,255,.35);font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px;text-align:center;}

/* ════ 큰 로고 ════ */
.logo-large-wrap{display:flex;flex-direction:column;align-items:center;gap:0;}
.logo-large{position:relative;display:flex;align-items:center;justify-content:center;gap:0;padding:0 20px;}

/* 날개 공통 */
.wing{position:relative;width:120px;height:80px;display:flex;align-items:center;}
.wing-left{justify-content:flex-end;}
.wing-right{justify-content:flex-start;}

/* SVG 날개 */
.wing svg{overflow:visible;}

/* 큰 로고 텍스트 */
.logo-large-text{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;z-index:10;}
.logo-large-main{font-family:'Orbitron',sans-serif;font-size:3.2rem;font-weight:900;letter-spacing:.18em;color:#fff;position:relative;text-shadow:0 0 20px rgba(123,47,255,.9),0 0 40px rgba(123,47,255,.6),0 0 80px rgba(123,47,255,.3);animation:logoPulse 2.5s ease-in-out infinite alternate;}
@keyframes logoPulse{from{text-shadow:0 0 16px rgba(123,47,255,.8),0 0 32px rgba(123,47,255,.5),0 0 60px rgba(123,47,255,.25);}to{text-shadow:0 0 28px rgba(192,132,252,1),0 0 55px rgba(160,80,255,.8),0 0 100px rgba(123,47,255,.5),0 0 140px rgba(80,0,180,.3);}}
.logo-large-sub{font-family:'Noto Sans KR',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.35em;color:var(--gold);text-shadow:0 0 8px rgba(255,215,0,.7),0 0 16px rgba(255,215,0,.4);opacity:.9;}
.logo-large-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(192,132,252,.6),rgba(255,215,0,.6),rgba(192,132,252,.6),transparent);margin:3px 0;}

/* 큰 로고 외곽 글로우 */
.logo-large-glow{position:absolute;inset:-20px;background:radial-gradient(ellipse at center,rgba(123,47,255,.18) 0%,rgba(80,0,180,.08) 50%,transparent 75%);pointer-events:none;animation:glowPulse 2.5s ease-in-out infinite alternate;}
@keyframes glowPulse{from{opacity:.7;}to{opacity:1;}}

/* ════ 작은 뱃지 ════ */
.badge-wrap{display:flex;flex-direction:column;align-items:center;gap:0;}
.logo-badge{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:0;padding:5px 10px;background:rgba(0,0,0,.45);border:1px solid rgba(192,132,252,.4);border-radius:10px;backdrop-filter:blur(8px);box-shadow:0 0 12px rgba(123,47,255,.35),0 0 24px rgba(123,47,255,.15),inset 0 1px 0 rgba(255,255,255,.08);overflow:hidden;}
.logo-badge::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(123,47,255,.12) 0%,transparent 50%,rgba(255,215,0,.06) 100%);border-radius:10px;pointer-events:none;}

/* 작은 날개 */
.wing-sm{width:32px;height:24px;display:flex;align-items:center;}
.wing-sm-left{justify-content:flex-end;}
.wing-sm-right{justify-content:flex-start;}

/* 작은 뱃지 텍스트 */
.badge-text{font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:900;letter-spacing:.15em;color:#fff;text-shadow:0 0 8px rgba(123,47,255,.9),0 0 16px rgba(123,47,255,.5);position:relative;z-index:2;padding:0 4px;}

/* ════ 날개 애니메이션 ════ */
@keyframes wingFlicker{0%,100%{filter:drop-shadow(0 0 6px rgba(123,47,255,.8)) drop-shadow(0 0 12px rgba(123,47,255,.5));}50%{filter:drop-shadow(0 0 10px rgba(192,132,252,1)) drop-shadow(0 0 20px rgba(160,80,255,.8)) drop-shadow(0 0 35px rgba(255,215,0,.3));}}
@keyframes wingFlickerSm{0%,100%{filter:drop-shadow(0 0 3px rgba(123,47,255,.8)) drop-shadow(0 0 6px rgba(123,47,255,.5));}50%{filter:drop-shadow(0 0 5px rgba(192,132,252,1)) drop-shadow(0 0 10px rgba(160,80,255,.8));}}

.wing svg{animation:wingFlicker 2.5s ease-in-out infinite alternate;}
.wing-sm svg{animation:wingFlickerSm 2.5s ease-in-out infinite alternate;}

/* ════ 배경 파티클 ════ */
.particle{position:fixed;border-radius:50%;pointer-events:none;animation:particleDrift linear infinite;}
@keyframes particleDrift{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:1;}90%{opacity:.5;}100%{transform:translateY(-10vh) scale(1.2);opacity:0;}}
</style>
</head>
<body>

<!-- 배경 파티클 -->
<script>
for(let i=0;i<18;i++){
  const p=document.createElement('div');
  p.className='particle';
  const size=Math.random()*3+1;
  p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${Math.random()>.5?'rgba(123,47,255,.6)':'rgba(255,215,0,.4)'};animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*8}s;`;
  document.body.appendChild(p);
}
</script>

<!-- ════ 큰 로고 ════ -->
<div class="logo-large-wrap">
  <div class="section-title">페이지 타이틀 로고</div>
  <div class="logo-large">
    <div class="logo-large-glow"></div>

    <!-- 왼쪽 날개 -->
    <div class="wing wing-left">
      <svg width="120" height="80" viewBox="0 0 120 80">
        <!-- 메인 날개 형태 -->
        <path d="M115,40 C95,20 70,15 45,22 C30,26 18,32 8,40" fill="none" stroke="url(#wingGradL)" stroke-width="2.2" stroke-linecap="round"/>
        <!-- 깃털 1 (가장 위) -->
        <path d="M105,28 C88,18 68,16 50,24" fill="none" stroke="url(#featherGrad1L)" stroke-width="1.4" stroke-linecap="round" opacity=".9"/>
        <!-- 깃털 2 -->
        <path d="M110,34 C92,22 72,18 52,26" fill="none" stroke="url(#featherGrad2L)" stroke-width="1.6" stroke-linecap="round" opacity=".85"/>
        <!-- 깃털 3 -->
        <path d="M113,40 C95,28 75,24 55,31" fill="none" stroke="url(#featherGrad3L)" stroke-width="1.8" stroke-linecap="round" opacity=".9"/>
        <!-- 깃털 4 -->
        <path d="M110,47 C93,36 73,32 53,38" fill="none" stroke="url(#featherGrad2L)" stroke-width="1.6" stroke-linecap="round" opacity=".8"/>
        <!-- 깃털 5 -->
        <path d="M105,54 C88,44 68,40 48,46" fill="none" stroke="url(#featherGrad1L)" stroke-width="1.4" stroke-linecap="round" opacity=".7"/>
        <!-- 깃털 6 (가장 아래) -->
        <path d="M95,60 C80,52 62,48 44,54" fill="none" stroke="url(#wingGradL)" stroke-width="1.2" stroke-linecap="round" opacity=".55"/>
        <!-- 깃털 끝 포인트들 -->
        <circle cx="115" cy="40" r="2.5" fill="#ffd700" opacity=".9"/>
        <circle cx="105" cy="28" r="1.8" fill="#c084fc" opacity=".8"/>
        <circle cx="110" cy="34" r="2" fill="#c084fc" opacity=".85"/>
        <circle cx="110" cy="47" r="1.8" fill="#c084fc" opacity=".75"/>
        <circle cx="105" cy="54" r="1.5" fill="#7b2fff" opacity=".7"/>
        <circle cx="95" cy="60" r="1.2" fill="#7b2fff" opacity=".55"/>
        <!-- 글로우 오버레이 -->
        <path d="M115,40 C95,20 70,15 45,22 C30,26 18,32 8,40" fill="none" stroke="rgba(192,132,252,.25)" stroke-width="8" stroke-linecap="round"/>

        <defs>
          <linearGradient id="wingGradL" x1="115" y1="40" x2="8" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffd700"/>
            <stop offset="40%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.3"/>
          </linearGradient>
          <linearGradient id="featherGrad1L" x1="105" y1="28" x2="50" y2="24" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.2"/>
          </linearGradient>
          <linearGradient id="featherGrad2L" x1="110" y1="34" x2="52" y2="26" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.2"/>
          </linearGradient>
          <linearGradient id="featherGrad3L" x1="113" y1="40" x2="55" y2="31" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
            <stop offset="30%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.2"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- 텍스트 -->
    <div class="logo-large-text">
      <div class="logo-large-main">ALGO</div>
      <div class="logo-large-divider"></div>
      <div class="logo-large-sub">알고리빙1004</div>
    </div>

    <!-- 오른쪽 날개 (좌우 반전) -->
    <div class="wing wing-right">
      <svg width="120" height="80" viewBox="0 0 120 80">
        <path d="M5,40 C25,20 50,15 75,22 C90,26 102,32 112,40" fill="none" stroke="url(#wingGradR)" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M15,28 C32,18 52,16 70,24" fill="none" stroke="url(#featherGrad1R)" stroke-width="1.4" stroke-linecap="round" opacity=".9"/>
        <path d="M10,34 C28,22 48,18 68,26" fill="none" stroke="url(#featherGrad2R)" stroke-width="1.6" stroke-linecap="round" opacity=".85"/>
        <path d="M7,40 C25,28 45,24 65,31" fill="none" stroke="url(#featherGrad3R)" stroke-width="1.8" stroke-linecap="round" opacity=".9"/>
        <path d="M10,47 C27,36 47,32 67,38" fill="none" stroke="url(#featherGrad2R)" stroke-width="1.6" stroke-linecap="round" opacity=".8"/>
        <path d="M15,54 C32,44 52,40 72,46" fill="none" stroke="url(#featherGrad1R)" stroke-width="1.4" stroke-linecap="round" opacity=".7"/>
        <path d="M25,60 C40,52 58,48 76,54" fill="none" stroke="url(#wingGradR)" stroke-width="1.2" stroke-linecap="round" opacity=".55"/>
        <circle cx="5" cy="40" r="2.5" fill="#ffd700" opacity=".9"/>
        <circle cx="15" cy="28" r="1.8" fill="#c084fc" opacity=".8"/>
        <circle cx="10" cy="34" r="2" fill="#c084fc" opacity=".85"/>
        <circle cx="10" cy="47" r="1.8" fill="#c084fc" opacity=".75"/>
        <circle cx="15" cy="54" r="1.5" fill="#7b2fff" opacity=".7"/>
        <circle cx="25" cy="60" r="1.2" fill="#7b2fff" opacity=".55"/>
        <path d="M5,40 C25,20 50,15 75,22 C90,26 102,32 112,40" fill="none" stroke="rgba(192,132,252,.25)" stroke-width="8" stroke-linecap="round"/>

        <defs>
          <linearGradient id="wingGradR" x1="5" y1="40" x2="112" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffd700"/>
            <stop offset="40%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.3"/>
          </linearGradient>
          <linearGradient id="featherGrad1R" x1="15" y1="28" x2="70" y2="24" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.2"/>
          </linearGradient>
          <linearGradient id="featherGrad2R" x1="10" y1="34" x2="68" y2="26" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.2"/>
          </linearGradient>
          <linearGradient id="featherGrad3R" x1="7" y1="40" x2="65" y2="31" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
            <stop offset="30%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.2"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>
</div>

<!-- ════ 작은 뱃지 ════ -->
<div class="badge-wrap">
  <div class="section-title">카드 헤더 뱃지</div>
  <div class="logo-badge">
    <!-- 왼쪽 작은 날개 -->
    <div class="wing-sm wing-sm-left">
      <svg width="32" height="24" viewBox="0 0 32 24">
        <path d="M30,12 C24,6 17,4 10,7 C6,8 3,10 1,12" fill="none" stroke="url(#smWingL)" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M27,7 C21,3 14,3 8,6" fill="none" stroke="url(#smFeather1L)" stroke-width="1" stroke-linecap="round" opacity=".85"/>
        <path d="M29,10 C23,5 16,4 9,7" fill="none" stroke="url(#smFeather2L)" stroke-width="1.1" stroke-linecap="round" opacity=".9"/>
        <path d="M29,14 C23,9 16,8 9,11" fill="none" stroke="url(#smFeather2L)" stroke-width="1.1" stroke-linecap="round" opacity=".8"/>
        <path d="M27,17 C21,13 14,12 8,15" fill="none" stroke="url(#smFeather1L)" stroke-width="1" stroke-linecap="round" opacity=".65"/>
        <circle cx="30" cy="12" r="1.5" fill="#ffd700" opacity=".9"/>
        <circle cx="27" cy="7" r="1" fill="#c084fc" opacity=".8"/>
        <circle cx="27" cy="17" r="1" fill="#7b2fff" opacity=".65"/>
        <path d="M30,12 C24,6 17,4 10,7 C6,8 3,10 1,12" fill="none" stroke="rgba(192,132,252,.2)" stroke-width="5" stroke-linecap="round"/>
        <defs>
          <linearGradient id="smWingL" x1="30" y1="12" x2="1" y2="12" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffd700"/>
            <stop offset="50%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.2"/>
          </linearGradient>
          <linearGradient id="smFeather1L" x1="27" y1="7" x2="8" y2="6" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.1"/>
          </linearGradient>
          <linearGradient id="smFeather2L" x1="29" y1="10" x2="9" y2="7" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.1"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- 뱃지 텍스트 -->
    <div class="badge-text">ALGO</div>

    <!-- 오른쪽 작은 날개 -->
    <div class="wing-sm wing-sm-right">
      <svg width="32" height="24" viewBox="0 0 32 24">
        <path d="M2,12 C8,6 15,4 22,7 C26,8 29,10 31,12" fill="none" stroke="url(#smWingR)" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M5,7 C11,3 18,3 24,6" fill="none" stroke="url(#smFeather1R)" stroke-width="1" stroke-linecap="round" opacity=".85"/>
        <path d="M3,10 C9,5 16,4 23,7" fill="none" stroke="url(#smFeather2R)" stroke-width="1.1" stroke-linecap="round" opacity=".9"/>
        <path d="M3,14 C9,9 16,8 23,11" fill="none" stroke="url(#smFeather2R)" stroke-width="1.1" stroke-linecap="round" opacity=".8"/>
        <path d="M5,17 C11,13 18,12 24,15" fill="none" stroke="url(#smFeather1R)" stroke-width="1" stroke-linecap="round" opacity=".65"/>
        <circle cx="2" cy="12" r="1.5" fill="#ffd700" opacity=".9"/>
        <circle cx="5" cy="7" r="1" fill="#c084fc" opacity=".8"/>
        <circle cx="5" cy="17" r="1" fill="#7b2fff" opacity=".65"/>
        <path d="M2,12 C8,6 15,4 22,7 C26,8 29,10 31,12" fill="none" stroke="rgba(192,132,252,.2)" stroke-width="5" stroke-linecap="round"/>
        <defs>
          <linearGradient id="smWingR" x1="2" y1="12" x2="31" y2="12" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffd700"/>
            <stop offset="50%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.2"/>
          </linearGradient>
          <linearGradient id="smFeather1R" x1="5" y1="7" x2="24" y2="6" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.1"/>
          </linearGradient>
          <linearGradient id="smFeather2R" x1="3" y1="10" x2="23" y2="7" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#3d00a0" stop-opacity="0.1"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>
</div>

</body>
</html>
