<!-- 헤더 -->
<header id="header">
  <div class="header-inner">
    <span class="logo">📊 YTAnalytics Pro</span>
    <button id="ad-toggle-btn" onclick="toggleStickyAd()">광고숨기기</button>
  </div>
</header>

<!-- 상단 고정 광고 (항상 노출) -->
<div id="sticky-ad">
  <span class="ad-badge">AD</span>
  <ins class="adsbygoogle"
       style="display:inline-block;width:728px;height:60px"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="XXXXXXXXXX"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- 본문 (상단 광고 높이만큼 margin-top 확보) -->
<div id="main-content">
  <!-- ... 페이지 콘텐츠 ... -->
</div>

<!-- 채널 분석 광고 게이트 오버레이 -->
<div id="ad-gate">
  <div class="ad-gate-inner">
    <p class="ad-gate-title">채널 분석을 위해 광고를 시청해주세요</p>

    <!-- 원형 타이머 -->
    <svg id="ad-timer-svg" width="100" height="100" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#e0e0e0" stroke-width="6"/>
      <circle class="progress" cx="50" cy="50" r="45" fill="none"
              stroke="var(--accent, #ff0000)" stroke-width="6"
              stroke-linecap="round"
              transform="rotate(-90 50 50)"/>
      <text id="ad-timer-num" x="50" y="55"
            text-anchor="middle" font-size="22" font-weight="bold" fill="#333">15</text>
    </svg>

    <!-- 리워드 진행 바 -->
    <div class="reward-bar-wrap">
      <div id="reward-bar" style="width:0%"></div>
    </div>

    <!-- 광고 슬롯 -->
    <ins class="adsbygoogle"
         style="display:block;width:300px;height:250px"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="YYYYYYYYYY"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

    <!-- 완료 후 스킵 버튼 활성화 -->
    <button id="ad-skip-btn" onclick="skipAdGate()" style="display:none">
      ✅ 분석 시작하기
    </button>
  </div>
</div>
