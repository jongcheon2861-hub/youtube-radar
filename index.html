<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTAnalytics Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-AF8853448" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #1e1e2e;
      --bg-hover: #252535;
      --accent: #ff4757;
      --accent2: #ffa502;
      --accent3: #2ed573;
      --accent4: #1e90ff;
      --text-primary: #e8e8f0;
      --text-secondary: #9898b0;
      --text-muted: #6060780;
      --border: #2a2a3e;
      --gradient: linear-gradient(135deg, #ff4757, #ff6b81);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(15,15,26,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .logo-icon {
      width: 36px; height: 36px; background: var(--gradient);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 18px; font-weight: 700; }
    .logo-text span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .api-status {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      background: rgba(46,213,115,0.15); color: var(--accent3); border: 1px solid rgba(46,213,115,0.3);
    }
    .api-status.error {
      background: rgba(255,71,87,0.15); color: var(--accent); border-color: rgba(255,71,87,0.3);
    }

    /* ── GLOBAL ERROR BANNER ── */
    #global-error-banner {
      display: none; position: fixed; top: 60px; left: 0; right: 0; z-index: 99;
      background: rgba(255,71,87,0.92); color: #fff;
      padding: 10px 24px; font-size: 14px; font-weight: 500;
      text-align: center;
    }

    /* ── LAYOUT ── */
    .app-layout { display: flex; padding-top: 60px; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px; min-height: calc(100vh - 60px);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 20px 12px; position: fixed; top: 60px; left: 0; bottom: 0;
      overflow-y: auto;
    }
    .nav-section-title {
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 0 8px 8px; margin-top: 16px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 14px; font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.2s; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active { background: rgba(255,71,87,0.15); color: var(--accent); }
    .nav-item .nav-icon { font-size: 18px; width: 24px; text-align: center; }

    /* ── MAIN ── */
    .main-content { margin-left: 220px; flex: 1; padding: 24px; min-width: 0; }
    .section-page { display: none; }
    .section-page.active { display: block; }
    .section-header { margin-bottom: 24px; }
    .section-title { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .section-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }

    /* ── CATEGORY TABS ── */
    .cat-tabs {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
    }
    .cat-btn {
      padding: 7px 18px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-secondary);
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── HOT TABS (Shorts / Longs) ── */
    .hot-tab-bar {
      display: flex; gap: 0; margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    .hot-tab-btn {
      padding: 10px 24px; background: none; border: none; cursor: pointer;
      font-size: 14px; font-weight: 600; color: var(--text-secondary);
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all 0.2s;
    }
    .hot-tab-btn:hover { color: var(--text-primary); }
    .hot-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── VIDEO GRID ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px; margin-bottom: 20px;
    }
    .video-card {
      background: var(--bg-card); border-radius: var(--radius);
      overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid var(--border);
    }
    .video-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .thumb-wrap {
      position: relative; width: 100%; padding-top: 56.25%; overflow: hidden;
      background: #111;
    }
    .thumb-wrap img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transition: transform 0.3s;
    }
    .video-card:hover .thumb-wrap img { transform: scale(1.05); }
    .duration-badge {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.85); color: #fff;
      font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
    }
    .shorts-badge {
      position: absolute; top: 6px; left: 6px;
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
    }
    .video-info { padding: 12px; }
    .video-title {
      font-size: 13px; font-weight: 600; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 8px;
    }
    .video-meta { display: flex; justify-content: space-between; align-items: center; }
    .video-channel { font-size: 12px; color: var(--text-secondary); }
    .video-stats { display: flex; gap: 8px; font-size: 11px; color: var(--text-muted); }
    .viral-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 700; margin-top: 6px;
    }
    .viral-badge.hot { background: rgba(255,71,87,0.2); color: var(--accent); }
    .viral-badge.warm { background: rgba(255,165,2,0.2); color: var(--accent2); }
    .viral-badge.cool { background: rgba(30,144,255,0.2); color: var(--accent4); }

    /* ── MORE BUTTON ── */
    .more-btn {
      display: none; margin: 0 auto 32px;
      padding: 12px 36px; border-radius: 24px;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-primary); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .more-btn:hover { background: var(--accent); border-color: var(--accent); }

    /* ── LOADER ── */
    .skeleton-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px;
    }
    .skeleton-card {
      background: var(--bg-card); border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border);
    }
    .skeleton-thumb { width: 100%; padding-top: 56.25%; background: var(--bg-hover); }
    .skeleton-info { padding: 12px; }
    .skeleton-line {
      height: 12px; border-radius: 6px; background: var(--bg-hover);
      margin-bottom: 8px; animation: shimmer 1.4s infinite;
    }
    .skeleton-line.short { width: 60%; }
    @keyframes shimmer {
      0%,100% { opacity: 0.5; } 50% { opacity: 1; }
    }
    .loader-wrap { text-align: center; padding: 40px; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── NO DATA ── */
    .no-data {
      text-align: center; padding: 48px 24px; color: var(--text-secondary);
    }
    .no-data-icon { font-size: 48px; margin-bottom: 12px; }
    .no-data h3 { font-size: 16px; margin-bottom: 6px; }
    .no-data p { font-size: 13px; }

    /* ── ERROR CARD ── */
    .error-card {
      background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3);
      border-radius: var(--radius); padding: 20px 24px; margin-bottom: 20px;
      color: var(--accent);
    }
    .error-card h3 { font-size: 15px; margin-bottom: 6px; }
    .error-card p { font-size: 13px; opacity: 0.85; }

    /* ── SEARCH SECTION ── */
    .search-box {
      display: flex; gap: 10px; margin-bottom: 24px;
    }
    .search-input {
      flex: 1; padding: 12px 18px; border-radius: var(--radius);
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-primary); font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-btn {
      padding: 12px 24px; border-radius: var(--radius); border: none;
      background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .search-btn:hover { opacity: 0.85; }
    .filter-row {
      display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;
    }
    .filter-select {
      padding: 8px 14px; border-radius: var(--radius-sm);
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-primary); font-size: 13px; cursor: pointer; outline: none;
    }

    /* ── CHANNEL ANALYSIS ── */
    .channel-search-box { display: flex; gap: 10px; margin-bottom: 24px; }
    .channel-result-card {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 24px; margin-bottom: 20px;
    }
    .channel-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .channel-avatar {
      width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent);
    }
    .channel-name { font-size: 20px; font-weight: 700; }
    .channel-handle { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px;
    }
    .stat-card {
      background: var(--bg-secondary); border-radius: var(--radius-sm);
      padding: 16px; text-align: center; border: 1px solid var(--border);
    }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .grade-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; border-radius: 50%;
      font-size: 20px; font-weight: 900; border: 3px solid;
    }

    /* ── REVENUE CALC ── */
    .calc-form {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 24px; margin-bottom: 24px;
    }
    .form-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .form-group { flex: 1; min-width: 160px; }
    .form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
      background: var(--bg-secondary); border: 1px solid var(--border);
      color: var(--text-primary); font-size: 14px; outline: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .calc-btn {
      padding: 12px 32px; border-radius: var(--radius); border: none;
      background: var(--gradient); color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    .result-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;
    }
    .result-card {
      background: var(--bg-card); border-radius: var(--radius); padding: 20px;
      border: 1px solid var(--border); text-align: center;
    }
    .result-value { font-size: 24px; font-weight: 700; color: var(--accent); }
    .result-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    /* ── AI IDEAS ── */
    .ai-form {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 24px; margin-bottom: 24px;
    }
    .ai-idea-list { display: flex; flex-direction: column; gap: 12px; }
    .ai-idea-card {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 16px 20px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .ai-idea-card:hover { border-color: var(--accent); }
    .ai-idea-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .ai-idea-desc { font-size: 13px; color: var(--text-secondary); }

    /* ── TOOLS & SHOP ── */
    .tools-grid, .shop-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;
    }
    .tool-card, .shop-card {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 20px; transition: all 0.2s;
    }
    .tool-card:hover, .shop-card:hover {
      border-color: var(--accent); transform: translateY(-2px);
    }
    .tool-icon { font-size: 32px; margin-bottom: 12px; }
    .tool-name, .shop-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .tool-desc, .shop-desc { font-size: 13px; color: var(--text-secondary); }
    .shop-price {
      font-size: 18px; font-weight: 700; color: var(--accent); margin-top: 10px;
    }
    .shop-link {
      display: inline-block; margin-top: 10px; padding: 7px 18px;
      border-radius: 20px; background: var(--accent); color: #fff;
      font-size: 13px; font-weight: 600; text-decoration: none;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 28px;
      max-width: 560px; width: 90%; max-height: 80vh; overflow-y: auto;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .modal-close {
      float: right; background: none; border: none; color: var(--text-secondary);
      font-size: 20px; cursor: pointer; line-height: 1;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { width: 64px; }
      .sidebar .nav-item span:not(.nav-icon) { display: none; }
      .sidebar .nav-section-title { display: none; }
      .main-content { margin-left: 64px; padding: 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo" onclick="showSec('hot')">
    <div class="logo-icon">▶</div>
    <div class="logo-text">YT<span>Analytics</span> Pro</div>
  </div>
  <div class="header-right">
    <div class="api-status" id="api-status">● API 연결 중</div>
  </div>
</header>

<!-- GLOBAL ERROR BANNER -->
<div id="global-error-banner"></div>

<!-- APP LAYOUT -->
<div class="app-layout">

  <!-- SIDEBAR NAV -->
  <nav class="sidebar">
    <div class="nav-section-title">탐색</div>
    <button class="nav-item active" data-section="hot" onclick="showSec('hot')">
      <span class="nav-icon">🔥</span><span>인기영상</span>
    </button>
    <button class="nav-item" data-section="search" onclick="showSec('search')">
      <span class="nav-icon">🔍</span><span>키워드 검색</span>
    </button>
    <button class="nav-item" data-section="channel" onclick="showSec('channel')">
      <span class="nav-icon">📊</span><span>채널 분석</span>
    </button>
    <div class="nav-section-title">도구</div>
    <button class="nav-item" data-section="revenue" onclick="showSec('revenue')">
      <span class="nav-icon">💰</span><span>수익 계산기</span>
    </button>
    <button class="nav-item" data-section="ai" onclick="showSec('ai')">
      <span class="nav-icon">🤖</span><span>AI 아이디어</span>
    </button>
    <button class="nav-item" data-section="tools" onclick="showSec('tools')">
      <span class="nav-icon">🛠️</span><span>유튜버 도구</span>
    </button>
    <button class="nav-item" data-section="shop" onclick="showSec('shop')">
      <span class="nav-icon">🛒</span><span>장비 쇼핑</span>
    </button>
  </nav>

  <!-- MAIN -->
  <main class="main-content">

    <!-- ① 인기영상 섹션 -->
    <section class="section-page active" id="section-hot">
      <div class="section-header">
        <div class="section-title">🔥 인기영상</div>
        <div class="section-subtitle">카테고리별 한국 인기 YouTube 영상</div>
      </div>
      <div class="cat-tabs" id="cat-tabs"></div>
      <div class="hot-tab-bar">
        <button class="hot-tab-btn active" data-type="shorts" id="tab-shorts">🎬 쇼츠 (≤3분)</button>
        <button class="hot-tab-btn" data-type="longs" id="tab-longs">📹 롱폼 (3분+)</button>
      </div>
      <div id="hot-loader" class="loader-wrap">
        <div class="spinner"></div>
        <div style="color:var(--text-secondary);font-size:13px">인기영상 로딩 중...</div>
      </div>
      <div id="shorts-grid" class="video-grid"></div>
      <button class="more-btn" id="shorts-more-btn" onclick="loadMoreShorts()">쇼츠 더 보기 ▼</button>
      <div id="longs-grid" class="video-grid" style="display:none"></div>
      <button class="more-btn" id="longs-more-btn" onclick="loadMoreLongs()">롱폼 더 보기 ▼</button>
    </section>

    <!-- ② 키워드 검색 -->
    <section class="section-page" id="section-search">
      <div class="section-header">
        <div class="section-title">🔍 키워드 검색</div>
        <div class="section-subtitle">YouTube 영상 키워드 분석 및 검색</div>
      </div>
      <div class="search-box">
        <input class="search-input" id="kw-input" placeholder="검색어 입력 (예: 먹방, 게임, 브이로그)" onkeydown="if(event.key==='Enter')doSearch()" />
        <button class="search-btn" onclick="doSearch()">검색</button>
      </div>
      <div class="filter-row">
        <select class="filter-select" id="filter-order">
          <option value="relevance">관련성순</option>
          <option value="viewCount">조회수순</option>
          <option value="date">최신순</option>
          <option value="rating">평점순</option>
        </select>
        <select class="filter-select" id="filter-duration">
          <option value="">전체 길이</option>
          <option value="short">쇼츠/단편 (≤4분)</option>
          <option value="medium">중간 (4-20분)</option>
          <option value="long">롱폼 (20분+)</option>
        </select>
        <select class="filter-select" id="filter-date">
          <option value="">전체 기간</option>
          <option value="hour">1시간 이내</option>
          <option value="today">오늘</option>
          <option value="week">이번 주</option>
          <option value="month">이번 달</option>
        </select>
      </div>
      <div id="search-results" class="video-grid"></div>
      <div id="search-loader" style="display:none" class="loader-wrap">
        <div class="spinner"></div>
      </div>
    </section>

    <!-- ③ 채널 분석 -->
    <section class="section-page" id="section-channel">
      <div class="section-header">
        <div class="section-title">📊 채널 분석</div>
        <div class="section-subtitle">YouTube 채널 성과 및 등급 분석</div>
      </div>
      <div class="channel-search-box">
        <input class="search-input" id="ch-input" placeholder="채널명 또는 핸들 (@채널명) 입력" onkeydown="if(event.key==='Enter')doChannelSearch()" />
        <button class="search-btn" onclick="doChannelSearch()">분석</button>
      </div>
      <div id="channel-result"></div>
    </section>

================================================================ */

/* ── CONFIG ── */
const API_KEYS = [

  // 'YOUR_API_KEY_2',  // 추가 키 있으면 여기에 입력

  '스포츠': { categoryId: '17', keywords: ['스포츠','축구','야구'],         shortsKw: ['스포츠 shorts','축구 쇼츠'] },

  '여행':   { categoryId: '19', keywords: ['여행','브이로그','일상'],       shortsKw: ['여행 shorts','브이로그 쇼츠'] },

};
const CAT_KEYS = Object.keys(CAT_CFG);

/* ── PER-CATEGORY CACHE ── */

/* ── GRADE TABLE ── */
const GRADES = [
  { min: 10_000_000, label: 'S+', color: '#ffd700', bg: 'rgba(255,215,0,0.15)' },
  { min:  5_000_000, label: 'S',  color: '#ff4757', bg: 'rgba(255,71,87,0.15)' },

  { min:    100_000, label: 'B',  color: '#2ed573', bg: 'rgba(46,213,115,0.15)' },
  { min:     10_000, label: 'C',  color: '#1e90ff', bg: 'rgba(30,144,255,0.15)' },
  { min:          0, label: 'D',  color: '#9898b0', bg: 'rgba(152,152,176,0.15)' },
];

/* ================================================================
   UTILITY
================================================================ */
function fmt(n) {
  if (n == null) return '0';
  n = parseInt(n, 10) || 0;
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
  return n.toString();
}

function parseDurSec(iso) {
  if (!iso) return 0;
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1] || 0) * 3600) +
         (parseInt(m[2] || 0) * 60) +
          parseInt(m[3] || 0);
}

function fmtDur(iso) {
  const s = parseDurSec(iso);
  if (!s) return '--:--';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function isShorts(item) {
  const sec = parseDurSec(item.contentDetails?.duration || '');
  return sec > 0 && sec <= 180;
}

function viralOf(item) {
  const s = item.statistics || {};
  const v = parseInt(s.viewCount  || 0);
  const l = parseInt(s.likeCount  || 0);
  const c = parseInt(s.commentCount || 0);
  return v + l * 30 + c * 60;
}

function gradeOf(sub) {
  const n = parseInt(sub || 0);
  return GRADES.find(g => n >= g.min) || GRADES[GRADES.length - 1];
}

function showGlobalError(msg) {

}

function hideGlobalError() {
  const el = document.getElementById('global-error-banner');
  el.style.display = 'none';
  document.getElementById('api-status').className = 'api-status';
  document.getElementById('api-status').textContent = '● API 연결됨';
}

/* ================================================================
   APIFETCH – 키 순환 + body error 처리
================================================================ */
async function apiFetch(url) {
  const validKeys = API_KEYS.filter(k => k && k.length > 20 && !k.startsWith('YOUR_'));
  if (!validKeys.length) throw new Error('유효한 API 키가 없습니다. API_KEYS 배열을 확인하세요.');

  for (let i = 0; i < validKeys.length; i++) {
    const k = validKeys[(keyIdx + i) % validKeys.length];
    const sep = url.includes('?') ? '&' : '?';
    const fullUrl = url + sep + 'key=' + k;
    console.log('[apiFetch] 요청:', fullUrl.replace(k, '***KEY***'));
    try {
      const r = await fetch(fullUrl);
      let data;
      try { data = await r.json(); } catch { data = {}; }

      /* HTTP 403 / 429 → 키 교체 */
      if (r.status === 403 || r.status === 429) {
        console.warn(`[apiFetch] HTTP ${r.status} → 키 교체`);
        keyIdx = (keyIdx + i + 1) % validKeys.length;
        continue;
      }

      /* 응답 본문 error 처리 */
      if (data.error) {
        const code   = data.error.code || 0;
        const reason = data.error.errors?.[0]?.reason || '';
        console.warn('[apiFetch] API error', code, reason);

        /* 키 소진 / 차단 */
        if ([403, 429].includes(code) || ['quotaExceeded', 'keyInvalid', 'forbidden', 'dailyLimitExceeded'].includes(reason)) {
          keyIdx = (keyIdx + i + 1) % validKeys.length;
          continue;
        }
        /* 잘못된 필터 조합 → 필터 제거 후 재시도 */
        if (['invalidSearchFilter', 'invalidVideoFilter', 'invalidFilter'].includes(reason)) {
          const cleaned = url
            .replace(/[&?]videoCategoryId=[^&]*/g, '')
            .replace(/[&?]videoDuration=[^&]*/g, '');
          console.warn('[apiFetch] invalidFilter → 필터 제거 후 재시도');
          return apiFetch(cleaned);
        }
        throw new Error(`API 오류 [${code}] ${reason}`);
      }

      if (!r.ok) throw new Error('HTTP ' + r.status);

      keyIdx = (keyIdx + i) % validKeys.length;
      hideGlobalError();
      return data;

    } catch (e) {
      if (i === validKeys.length - 1) throw e;
      console.warn('[apiFetch] 재시도:', e.message);
    }
  }
  throw new Error('모든 API 키 소진 또는 할당량 초과');
}

function buildCatTabs() {

/* ── MAIN LOAD ── */
async function loadHot() {
  buildCatTabs();
  showHotLoader();

  try {
    /* 첫 번째 카테고리 우선 로드 */
    const firstCat = CAT_KEYS[0];
    await loadUntilFull(firstCat);
    hideHotLoader();
    renderHotSplit();

    /* 나머지 카테고리 백그라운드 로드 */
    for (const k of CAT_KEYS.slice(1)) {
      if (!catShortsCache[k] && !catLongCache[k]) {
        loadUntilFull(k).catch(e => console.warn('[loadHot] bg load 실패:', k, e.message));
      }
    }
  } catch (err) {
    hideHotLoader();
    showGlobalError('인기영상 로드 실패: ' + err.message);
    showHotError(err.message);
  }
}

/* ── LOAD UNTIL FULL (한 카테고리) ── */
async function loadUntilFull(cat) {
  const cfg = CAT_CFG[cat];
  if (!cfg) return;

  let shorts = [], longs = [];

  /* ① mostPopular 차트 */
  try {
    const trendData = await apiFetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics` +
      `&chart=mostPopular&regionCode=KR&hl=ko&maxResults=50` +
      (cfg.categoryId ? `&videoCategoryId=${cfg.categoryId}` : '')
    );
    const items = trendData.items || [];
    console.log(`[loadUntilFull][${cat}] mostPopular: ${items.length}개`);
    items.forEach(it => (isShorts(it) ? shorts : longs).push(it));
  } catch (e) {
    console.warn(`[loadUntilFull][${cat}] mostPopular 실패:`, e.message);
  }

  /* ② 쇼츠 전용 search (shortKw 사용) */
  if (shorts.length < 12) {
    for (const kw of (cfg.shortsKw || [])) {
      if (shorts.length >= 24) break;
      try {
        const res = await apiFetch(
          `https://www.googleapis.com/youtube/v3/search?part=snippet` +
          `&type=video&videoDuration=short&regionCode=KR&relevanceLanguage=ko` +
          `&q=${encodeURIComponent(kw)}&maxResults=25`
        );
        const ids = (res.items || []).map(i => i.id?.videoId).filter(Boolean);
        if (ids.length) {
          const detail = await apiFetch(
            `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics` +
            `&id=${ids.join(',')}`
          );
          (detail.items || []).forEach(it => {
            if (isShorts(it) && !shorts.find(s => s.id === it.id)) shorts.push(it);
          });
        }
      } catch (e) {
        console.warn(`[loadUntilFull][${cat}] 쇼츠 검색 실패 (${kw}):`, e.message);
      }
    }
    console.log(`[loadUntilFull][${cat}] 쇼츠 보완 후: ${shorts.length}개`);
  }

  /* ③ 롱폼 보완 – 키워드 검색 */
  if (longs.length < 12) {
    for (const kw of (cfg.keywords || [])) {
      if (longs.length >= 24) break;
      try {
        const res = await apiFetch(
          `https://www.googleapis.com/youtube/v3/search?part=snippet` +
          `&type=video&videoDuration=medium&regionCode=KR&relevanceLanguage=ko` +
          `&q=${encodeURIComponent(kw)}&maxResults=25`
        );
        const ids = (res.items || []).map(i => i.id?.videoId).filter(Boolean);
        if (ids.length) {
          const detail = await apiFetch(
            `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics` +
            `&id=${ids.join(',')}`
          );
          (detail.items || []).forEach(it => {
            if (!isShorts(it) && !longs.find(l => l.id === it.id)) longs.push(it);
          });
        }
      } catch (e) {
        console.warn(`[loadUntilFull][${cat}] 롱폼 검색 실패 (${kw}):`, e.message);
      }
    }
  }

  /* 바이럴 점수 정렬 */
  const byViral = arr => arr.slice().sort((a, b) => viralOf(b) - viralOf(a));
  catShortsCache[cat] = byViral(shorts);
  catLongCache[cat]   = byViral(longs);
  console.log(`[loadUntilFull][${cat}] 완료 → 쇼츠: ${catShortsCache[cat].length}, 롱폼: ${catLongCache[cat].length}`);
}

/* ── RENDER ── */
function renderHotSplit() {
  const shortsGrid = document.getElementById('shorts-grid');
  const longsGrid  = document.getElementById('longs-grid');
  const shortsMore = document.getElementById('shorts-more-btn');
  const longsMore  = document.getElementById('longs-more-btn');
  if (!shortsGrid || !longsGrid) {
    console.error('[renderHotSplit] 그리드 요소를 찾을 수 없음');
    return;
  }

  const shortsList = catShortsCache[activeCat] || [];
  const longsList  = catLongCache[activeCat]   || [];

  /* Shorts 탭 */
  if (activeType === 'shorts') {
    shortsGrid.style.display = '';
    longsGrid.style.display  = 'none';
    longsMore.style.display  = 'none';

    if (!shortsList.length) {
      shortsGrid.innerHTML = `
        <div class="no-data" style="grid-column:1/-1">
          <div class="no-data-icon">🎬</div>
          <h3>쇼츠 데이터 없음</h3>
          <p>${activeCat} 카테고리에서 쇼츠를 찾을 수 없습니다.</p>
        </div>`;
      shortsMore.style.display = 'none';
    } else {
      const slice = shortsList.slice(0, (shortsPage + 1) * PAGE);
      shortsGrid.innerHTML = slice.map(v => makeVideoCard(v, 'shorts')).join('');
      shortsMore.style.display = slice.length < shortsList.length ? 'block' : 'none';
    }
  } else {
    /* Longs 탭 */
    shortsGrid.style.display = 'none';
    shortsMore.style.display = 'none';
    longsGrid.style.display  = '';

    if (!longsList.length) {
      longsGrid.innerHTML = `
        <div class="no-data" style="grid-column:1/-1">
          <div class="no-data-icon">📹</div>
          <h3>롱폼 데이터 없음</h3>
          <p>${activeCat} 카테고리에서 롱폼 영상을 찾을 수 없습니다.</p>
        </div>`;
      longsMore.style.display = 'none';
    } else {
      const slice = longsList.slice(0, (longsPage + 1) * PAGE);
      longsGrid.innerHTML = slice.map(v => makeVideoCard(v, 'longs')).join('');
      longsMore.style.display = slice.length < longsList.length ? 'block' : 'none';
    }
  }
}

function loadMoreShorts() { shortsPage++; renderHotSplit(); }
function loadMoreLongs()  { longsPage++;  renderHotSplit(); }

/* ── VIDEO CARD ── */
function makeVideoCard(item, type) {
  const sn    = item.snippet      || {};
  const st    = item.statistics   || {};
  const cd    = item.contentDetails || {};
  const vid   = item.id;
  const title = sn.title   || '제목 없음';

  const thumb = sn.thumbnails?.medium?.url || sn.thumbnails?.default?.url || '';
  const dur   = fmtDur(cd.duration);
  const views = fmt(st.viewCount);
  const likes = fmt(st.likeCount);
  const viral = viralOf(item);
  const vClass = viral > 5_000_000 ? 'hot' : viral > 500_000 ? 'warm' : 'cool';
  const vLabel = viral > 5_000_000 ? '🔥 핫' : viral > 500_000 ? '🌡️ 상승' : '📈 주목';

  return `

/* ── VIDEO MODAL ── */
async function openVideoModal(vid) {
  const modal   = document.getElementById('video-modal');
  const content = document.getElementById('video-modal-content');
  content.innerHTML = '<div class="loader-wrap"><div class="spinner"></div></div>';
  modal.classList.add('open');

  try {
    const data = await apiFetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${vid}`
    );
    const item = data.items?.[0];
    if (!item) { content.innerHTML = '<p>영상 정보를 불러올 수 없습니다.</p>'; return; }

    const sn = item.snippet || {};
    const st = item.statistics || {};
    content.innerHTML = `
      <h2 class="modal-title" style="padding-right:28px">${sn.title || ''}</h2>
      <iframe style="width:100%;aspect-ratio:16/9;border:none;border-radius:8px;margin-bottom:16px"
        src="https://www.youtube.com/embed/${vid}" allowfullscreen loading="lazy"></iframe>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${fmt(st.viewCount)}</div><div class="stat-label">조회수</div></div>
        <div class="stat-card"><div class="stat-value">${fmt(st.likeCount)}</div><div class="stat-label">좋아요</div></div>
        <div class="stat-card"><div class="stat-value">${fmt(st.commentCount)}</div><div class="stat-label">댓글</div></div>
        <div class="stat-card"><div class="stat-value">${fmtDur(item.contentDetails?.duration)}</div><div class="stat-label">길이</div></div>
      </div>
      <p style="font-size:13px;color:var(--text-secondary);margin-top:14px;white-space:pre-wrap">
        ${(sn.description || '').slice(0, 300)}${sn.description?.length > 300 ? '…' : ''}</p>
      <a href="https://www.youtube.com/watch?v=${vid}" target="_blank"
         style="display:inline-block;margin-top:14px;padding:8px 20px;background:var(--accent);color:#fff;border-radius:20px;font-size:13px;text-decoration:none">
        ▶ YouTube에서 보기</a>`;
  } catch (e) {
    content.innerHTML = `<div class="error-card"><h3>불러오기 실패</h3><p>${e.message}</p></div>`;
  }
}

/* ================================================================
   KEYWORD SEARCH
================================================================ */
let searchPage = 1;

async function doSearch() {
  const q        = document.getElementById('kw-input').value.trim();
  const order    = document.getElementById('filter-order').value;
  const duration = document.getElementById('filter-duration').value;
  const dateFlt  = document.getElementById('filter-date').value;
  if (!q) return;

  const grid   = document.getElementById('search-results');
  const loader = document.getElementById('search-loader');
  grid.innerHTML = ''; loader.style.display = 'block';
  searchPage = 1;

  let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video` +
    `&regionCode=KR&relevanceLanguage=ko&q=${encodeURIComponent(q)}&maxResults=24&order=${order}`;
  if (duration) url += `&videoDuration=${duration}`;
  if (dateFlt) {
    const after = {
      hour:  new Date(Date.now() - 3600000).toISOString(),
      today: new Date(Date.now() - 86400000).toISOString(),
      week:  new Date(Date.now() - 7*86400000).toISOString(),
      month: new Date(Date.now() - 30*86400000).toISOString(),
    }[dateFlt];
    if (after) url += `&publishedAfter=${after}`;
  }

  try {
    const res = await apiFetch(url);
    const ids = (res.items || []).map(i => i.id?.videoId).filter(Boolean);
    if (!ids.length) {
      grid.innerHTML = '<div class="no-data" style="grid-column:1/-1"><div class="no-data-icon">🔍</div><h3>검색 결과 없음</h3></div>';
      return;
    }
    const detail = await apiFetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&id=${ids.join(',')}`
    );
    grid.innerHTML = (detail.items || []).map(v => makeVideoCard(v, isShorts(v) ? 'shorts' : 'longs')).join('');
  } catch (e) {
    grid.innerHTML = `<div class="error-card" style="grid-column:1/-1"><h3>검색 실패</h3><p>${e.message}</p></div>`;
  } finally {
    loader.style.display = 'none';
  }
}

/* ================================================================
   CHANNEL ANALYSIS
================================================================ */
async function doChannelSearch() {
  const q   = document.getElementById('ch-input').value.trim();
  const out = document.getElementById('channel-result');
  if (!q) return;
  out.innerHTML = '<div class="loader-wrap"><div class="spinner"></div></div>';

  try {
    /* 채널 검색 */
    const searchUrl = q.startsWith('@')
      ? `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${encodeURIComponent(q)}`
      : `https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(q)}&maxResults=1`;

    let channelId;
    if (q.startsWith('@')) {
      const d = await apiFetch(searchUrl);
      channelId = d.items?.[0]?.id;
    } else {
      const d = await apiFetch(searchUrl);
      channelId = d.items?.[0]?.id?.channelId;
    }
    if (!channelId) { out.innerHTML = '<div class="error-card"><h3>채널을 찾을 수 없습니다.</h3></div>'; return; }

    const ch = await apiFetch(
      `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings&id=${channelId}`
    );
    const c = ch.items?.[0];
    if (!c) { out.innerHTML = '<div class="error-card"><h3>채널 정보 없음</h3></div>'; return; }

    const sn = c.snippet || {};
    const st = c.statistics || {};
    const sub = parseInt(st.subscriberCount || 0);
    const grade = gradeOf(sub);

    out.innerHTML = `
      <div class="channel-result-card">
        <div class="channel-header">
          <img class="channel-avatar" src="${sn.thumbnails?.medium?.url || ''}" alt="${sn.title}" />
          <div>
            <div class="channel-name">${sn.title || ''}</div>
            <div class="channel-handle">${sn.customUrl || channelId}</div>
            <div class="grade-badge" style="margin-top:8px;color:${grade.color};border-color:${grade.color};background:${grade.bg}">${grade.label}</div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-value">${fmt(st.subscriberCount)}</div><div class="stat-label">구독자</div></div>
          <div class="stat-card"><div class="stat-value">${fmt(st.viewCount)}</div><div class="stat-label">총 조회수</div></div>
          <div class="stat-card"><div class="stat-value">${fmt(st.videoCount)}</div><div class="stat-label">영상 수</div></div>
          <div class="stat-card"><div class="stat-value">${sn.country || '-'}</div><div class="stat-label">국가</div></div>
        </div>
        <p style="font-size:13px;color:var(--text-secondary);margin-top:16px">
          ${(sn.description || '').slice(0, 200)}${sn.description?.length > 200 ? '…' : ''}</p>
        <a href="https://www.youtube.com/channel/${channelId}" target="_blank"
           style="display:inline-block;margin-top:14px;padding:8px 20px;background:var(--accent);color:#fff;border-radius:20px;font-size:13px;text-decoration:none">
           채널 바로가기</a>
      </div>`;
  } catch (e) {
    out.innerHTML = `<div class="error-card"><h3>분석 실패</h3><p>${e.message}</p></div>`;
  }
}

/* ================================================================
   REVENUE CALCULATOR
================================================================ */
function calcRevenue() {
  const views = parseInt(document.getElementById('rev-views').value) || 0;
  const rpm   = parseFloat(document.getElementById('rev-cat').value) || 1.5;
  const ctr   = parseFloat(document.getElementById('rev-ctr').value) || 5;

  const impressions = views * (ctr / 100);
  const monthly     = (impressions / 1000) * rpm;
  const yearly      = monthly * 12;
  const perView     = views > 0 ? (monthly / views * 1000).toFixed(4) : 0;

  document.getElementById('rev-result').innerHTML = `
    <div class="result-card"><div class="result-value">$${monthly.toFixed(0)}</div><div class="result-label">월 예상 수익</div></div>
    <div class="result-card"><div class="result-value">$${yearly.toFixed(0)}</div><div class="result-label">연 예상 수익</div></div>
    <div class="result-card"><div class="result-value">${fmt(impressions)}</div><div class="result-label">월 광고 노출</div></div>
    <div class="result-card"><div class="result-value">$${perView}</div><div class="result-label">1K뷰 수익</div></div>`;
}
