<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Black Sphere</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:80px;
  overflow:hidden;
}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;border-radius:50%;
  animation:twinkle var(--d) var(--delay) infinite alternate ease-in-out;
}
@keyframes twinkle{
  0%{opacity:.03;transform:scale(1);}
  100%{opacity:.8;transform:scale(2);}
}

/* ════════════════════════
   씬
════════════════════════ */
.scene{
  position:relative;z-index:1;
  width:460px;height:460px;
  display:flex;align-items:center;justify-content:center;
}

/* ════════════════════════════════════════════
   겹겹이 구체 레이어 — 블랙을 교차 혼합
   핵심 원리:
   각 레이어는 중심부에 블랙 → 가장자리 색상
   홀수 레이어: 블랙 비중 높음 (어두운 층)
   짝수 레이어: 색상 비중 높음 (밝은 층)
   → 교차하며 깊이감·입체감 생성
════════════════════════════════════════════ */
.layer{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
}

/* ── L10 — 최외곽 헤일로 ── */
.l10{
  width:340px;height:340px;
  z-index:3;
  background:radial-gradient(circle,
    transparent              34%,
    rgba(20,4,0,.15)         46%,
    rgba(255,70,0,.06)       55%,
    rgba(0,0,0,.25)          62%,
    rgba(255,110,0,.05)      70%,
    rgba(0,0,0,.3)           78%,
    transparent              90%
  );
  animation:haloA 7s ease-in-out infinite;
}
@keyframes haloA{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.55;}
  50%{transform:translate(-50%,-50%) scale(1.07);opacity:1;}
}

/* ── L9 — 어두운 확산층 ── */
.l9{
  width:290px;height:290px;
  z-index:4;
  background:radial-gradient(circle,
    #000                     0%,
    #000                     22%,
    rgba(8,2,0,.92)          34%,
    rgba(40,8,0,.75)         44%,
    rgba(0,0,0,.85)          52%,
    rgba(180,40,0,.12)       60%,
    rgba(0,0,0,.7)           68%,
    rgba(255,80,0,.06)       76%,
    transparent              90%
  );
  box-shadow:
    inset 0 0 40px rgba(0,0,0,.9),
    inset 0 0 80px rgba(0,0,0,.95);
  animation:layerD 6.5s ease-in-out infinite;
}

/* ── L8 — 오렌지 틴트 층 ── */
.l8{
  width:268px;height:268px;
  z-index:5;

    #000                     0%,
    #000                     18%,
    rgba(5,1,0,.95)          28%,
    rgba(0,0,0,.9)           36%,
    rgba(80,18,0,.55)        46%,
    rgba(0,0,0,.75)          54%,

    inset 0 0 35px rgba(0,0,0,.95),

    0 0 18px rgba(180,45,0,.1);

/* ── L2 — 골든링 발광층 ── */

    rgba(4,1,0,1)            29%,
    rgba(0,0,0,1)            37%,

  box-shadow:
    inset 0 0 18px rgba(0,0,0,1),

/* ── L1 — 코어 직전 초밀집층 ── */
.l1{
  width:138px;height:138px;
  z-index:12;
  background:radial-gradient(circle,
    #000                     0%,
    #000                     20%,
    rgba(0,0,0,1)            30%,
    rgba(2,0,0,1)            38%,
    rgba(0,0,0,1)            46%,

  box-shadow:
    inset 0 0 16px rgba(0,0,0,1),
    inset 0 0 32px rgba(0,0,0,1),
    inset 0 0 50px rgba(0,0,0,1),
    0 0 12px rgba(255,120,0,.58),
    0 0 26px rgba(245,80,0,.34),
    0 0 50px rgba(225,65,0,.16);

@keyframes layerB{0%,100%{opacity:.65;}50%{opacity:1;}}
@keyframes layerD{0%,100%{opacity:.55;}50%{opacity:.95;}}

/* ════════════════════════
   코어 — 다크블랙 120px
════════════════════════ */
.core{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:120px;height:120px;
  border-radius:50%;
  z-index:20;
  background:
    radial-gradient(circle at 36% 30%,
      rgba(18,3,0,.5)    0%,
      rgba(8,1,0,.88)   18%,
      rgba(2,0,0,.98)   38%,
      #000               55%,
      #000               100%
    );
  box-shadow:
    0 0 0 1px  rgba(255,80,0,.4),
    0 0 0 3px  rgba(255,55,0,.1),
    0 0 16px   rgba(255,75,0,.52),
    0 0 38px   rgba(210,48,0,.32),
    0 0 80px   rgba(160,26,0,.18),
    inset 0 0 20px rgba(80,8,0,.5),
    inset 0 0 45px rgba(40,3,0,.75),
    inset 0 0 80px rgba(5,0,0,.95);
  animation:corePulse 2.8s ease-in-out infinite;
}
@keyframes corePulse{
  0%,100%{
    box-shadow:
      0 0 0 1px rgba(255,80,0,.4),0 0 0 3px rgba(255,55,0,.1),
      0 0 16px rgba(255,75,0,.52),0 0 38px rgba(210,48,0,.32),0 0 80px rgba(160,26,0,.18),
      inset 0 0 20px rgba(80,8,0,.5),inset 0 0 45px rgba(40,3,0,.75),inset 0 0 80px rgba(5,0,0,.95);
  }
  50%{
    box-shadow:
      0 0 0 2px rgba(255,100,0,.62),0 0 0 5px rgba(255,70,0,.16),
      0 0 26px rgba(255,95,0,.75),0 0 58px rgba(228,58,0,.5),0 0 120px rgba(180,34,0,.28),
      inset 0 0 28px rgba(100,12,0,.62),inset 0 0 58px rgba(55,5,0,.85),inset 0 0 100px rgba(8,0,0,.98);
  }
}
.core-hl{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:120px;height:120px;
  border-radius:50%;z-index:21;
  background:radial-gradient(circle at 30% 25%,
    rgba(255,155,75,.12)  0%,
    rgba(255,95,35,.06)   24%,
    transparent           50%
  );
  pointer-events:none;
}

/* ════════════════════════
   토성 링 — SVG clipPath
   위쪽 z:10 / 아래쪽 z:25
════════════════════════ */
.rw{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:320px;height:320px;
  pointer-events:none;
}
.rw svg{width:100%;height:100%;overflow:visible;}
.rw-back{ z-index:10; }
.rw-front{ z-index:25; }
@keyframes rSpin1{ from{transform:translate(-50%,-50%) rotate(0deg);}  to{transform:translate(-50%,-50%) rotate(360deg);} }
@keyframes rSpin2{ from{transform:translate(-50%,-50%) rotate(0deg);}  to{transform:translate(-50%,-50%) rotate(-360deg);} }
@keyframes rSpin3{ from{transform:translate(-50%,-50%) rotate(0deg);}  to{transform:translate(-50%,-50%) rotate(360deg);} }
@keyframes rSpin4{ from{transform:translate(-50%,-50%) rotate(0deg);}  to{transform:translate(-50%,-50%) rotate(-360deg);} }
@keyframes rSpin5{ from{transform:translate(-50%,-50%) rotate(0deg);}  to{transform:translate(-50%,-50%) rotate(360deg);} }
@keyframes rSpin6{ from{transform:translate(-50%,-50%) rotate(0deg);}  to{transform:translate(-50%,-50%) rotate(-360deg);} }
.rw1{animation:rSpin1  8s linear infinite;}
.rw2{animation:rSpin2 11s linear infinite;}
.rw3{animation:rSpin3 14s linear infinite;}
.rw4{animation:rSpin4 17s linear infinite;}
.rw5{animation:rSpin5 21s linear infinite;}
.rw6{animation:rSpin6 26s linear infinite;}

<body>
<div class="bg"></div>
<script>
const bg=document.querySelector('.bg');
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
