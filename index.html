<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTAnalytics Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

<style>
/* ══════════════════════════════════════
   CSS CUSTOM PROPERTY (Houdini)
══════════════════════════════════════ */
@property --beam-angle {
  syntax: "<angle>";
  initial-value: 0deg;
  inherits: false;
}

:root {
  --bg: #0a0a14;
  --bg2: #10101e;
  --card-bg: #12121f;
  --border: #2a2a3e;
  --text: #e0e0f0;
  --text2: #9090b0;
  --accent: #6c63ff;
  --r: 16px;
  --ad-w: 200px;

  /* Level colors */
  --c1:  #e8e8e8;
  --c2:  #4fc3f7;
  --c3:  #fff176;
  --c4:  #ffb74d;
  --c5:  #66bb6a;
  --c6:  #ce93d8;
  --c7:  #f48fb1;
  --c8:  #ef5350;
  --c9a: #ff6b6b; --c9b: #ffd93d; --c9c: #6bcb77; --c9d: #4d96ff;
  --c10a:#ff0040; --c10b:#ff8c00; --c10c:#ffe600; --c10d:#00ff88; --c10e:#00cfff; --c10f:#bf00ff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* ═══════════════ KEYFRAMES ═══════════════ */
@keyframes beamSpin {
  to { --beam-angle: 360deg; }
}
@keyframes beamSpin9 {
  to { --beam-angle: 360deg; }
}
@keyframes glowPulse {
  0%,100% { opacity:1; }
  50%      { opacity:.55; }
}
@keyframes rainbowText {
  0%  { color:#ff0040; }
  16% { color:#ff8c00; }
  33% { color:#ffe600; }
  50% { color:#00ff88; }
  66% { color:#00cfff; }
  83% { color:#bf00ff; }
  100%{ color:#ff0040; }
}
@keyframes float3d {
  0%,100% { transform:translateY(0) rotateX(0deg); }
  50%     { transform:translateY(-5px) rotateX(2deg); }
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes shimmer {
  0%   { background-position:-200% center; }
  100% { background-position:200% center; }
}

/* ═══════════════ LAYOUT ═══════════════ */
.app-wrap { display:flex; flex-direction:column; min-height:100vh; }

header {
  display:flex; align-items:center; gap:12px;
  padding:0 20px; height:56px;
  background:linear-gradient(135deg,#0f0f20,#1a1a30);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.logo {
  font-size:1.3rem; font-weight:900;
  background:linear-gradient(90deg,#ff0040,#ff8c00,#ffe600,#00ff88,#00cfff,#bf00ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  white-space:nowrap;
}
.search-bar { flex:1; max-width:480px; display:flex; gap:8px; }
.search-bar input { flex:1; padding:8px 14px; background:#1a1a2e; border:1px solid var(--border); border-radius:24px; color:var(--text); font-size:.9rem; }
.search-bar input:focus { outline:none; border-color:var(--accent); }
.btn { padding:8px 18px; border:none; border-radius:20px; cursor:pointer; font-size:.85rem; font-weight:700; transition:all .2s; }
.btn-primary { background:linear-gradient(135deg,#6c63ff,#a855f7); color:#fff; }
.btn-primary:hover { transform:scale(1.04); filter:brightness(1.15); }

.body-row { display:flex; flex:1; overflow:hidden; }

/* Sidebar */
.sidebar {
  width:200px; min-width:200px; background:var(--bg2);
  border-right:1px solid var(--border);
  padding:12px 8px; display:flex; flex-direction:column; gap:4px; overflow-y:auto;
}
.sidebar-item {
  display:flex; align-items:center; gap:8px;
  padding:9px 12px; border-radius:10px; cursor:pointer;
  font-size:.85rem; font-weight:500; color:var(--text2); transition:all .2s;
}
.sidebar-item:hover, .sidebar-item.active { background:#1e1e35; color:var(--text); }
.sidebar-item .ic { font-size:1.1rem; }

/* Main */
.main-area { flex:1; overflow-y:auto; padding:20px; min-width:0; }

/* Ad */
.ad-zone {
  width:var(--ad-w); min-width:var(--ad-w); flex-shrink:0;
  background:var(--bg2); border-left:1px solid var(--border);
  padding:12px 8px; display:flex; flex-direction:column; gap:12px; overflow-y:auto;
}
.ad-slot {
  background:#1a1a2e; border:1px dashed var(--border); border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:.7rem; color:var(--text2); text-align:center;
  flex:1; min-height:180px;
}

/* Sections */
.section { display:none; animation:fadeIn .4s ease; }
.section.active { display:block; }

/* ═══════════════════════════════════════
   ★ BEAM BORDER CARD
   구조: .lv-card-wrap > .lv-card-beam (회전 레이어) + .lv-card-face (내용)
═══════════════════════════════════════ */
.lv-card-wrap {
  position:relative;
  border-radius:calc(var(--r) + 4px);
  padding:2px;                        /* 테두리 두께 = 2px */
  background:var(--card-bg);          /* fallback */
  cursor:pointer;
  animation:float3d 4s ease-in-out infinite;
  transition:transform .3s, filter .3s;
  overflow:hidden;
}
.lv-card-wrap:hover {
  transform:scale(1.05) translateY(-4px) rotateX(4deg);
  filter:brightness(1.1);
  animation-play-state:paused;
}

/* 회전하는 빔 레이어 (::before = 얇은 라인, ::after = 글로우) */
.lv-card-wrap::before,
.lv-card-wrap::after {
  content:'';
  position:absolute;
  inset:-3px;
  border-radius:calc(var(--r) + 7px);
  animation:beamSpin var(--beam-dur, 2.4s) linear infinite;
}

/* ──── 각 레벨별 빔 색상 ──── */
/* LV1 흰색 */
.beam1::before { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 75%, #e8e8e8 85%, #ffffff 90%, #e8e8e8 95%, transparent 100%); }
.beam1::after  { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 78%, #e8e8e888 88%, #ffffffcc 92%, #e8e8e888 96%, transparent 100%); filter:blur(6px); }
/* LV2 파랑 */
.beam2::before { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 75%, #0288d1 85%, #4fc3f7 90%, #0288d1 95%, transparent 100%); }
.beam2::after  { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 78%, #0288d188 88%, #4fc3f7cc 92%, #0288d188 96%, transparent 100%); filter:blur(6px); }
/* LV3 노랑 */
.beam3::before { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 75%, #f9a825 85%, #fff176 90%, #f9a825 95%, transparent 100%); }
.beam3::after  { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 78%, #f9a82588 88%, #fff176cc 92%, #f9a82588 96%, transparent 100%); filter:blur(6px); }
/* LV4 오렌지 */
.beam4::before { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 75%, #e65100 85%, #ffb74d 90%, #e65100 95%, transparent 100%); }
.beam4::after  { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 78%, #e6510088 88%, #ffb74dcc 92%, #e6510088 96%, transparent 100%); filter:blur(6px); }
/* LV5 초록 */
.beam5::before { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 75%, #1b5e20 85%, #66bb6a 90%, #1b5e20 95%, transparent 100%); }
.beam5::after  { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 78%, #1b5e2088 88%, #66bb6acc 92%, #1b5e2088 96%, transparent 100%); filter:blur(6px); }
/* LV6 보라 */
.beam6::before { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 75%, #6a1b9a 85%, #ce93d8 90%, #6a1b9a 95%, transparent 100%); }
.beam6::after  { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 78%, #6a1b9a88 88%, #ce93d8cc 92%, #6a1b9a88 96%, transparent 100%); filter:blur(8px); }
/* LV7 분홍 */
.beam7::before { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 75%, #880e4f 85%, #f48fb1 90%, #880e4f 95%, transparent 100%); }
.beam7::after  { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 78%, #880e4f88 88%, #f48fb1cc 92%, #880e4f88 96%, transparent 100%); filter:blur(8px); }
/* LV8 빨강 */
.beam8::before { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 75%, #b71c1c 85%, #ef5350 90%, #b71c1c 95%, transparent 100%); }
.beam8::after  { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 78%, #b71c1c88 88%, #ef5350cc 92%, #b71c1c88 96%, transparent 100%); filter:blur(8px); }
/* LV9 다색 레인보우 빔 */
.beam9::before { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 60%, #4d96ff 70%, #6bcb77 75%, #ffd93d 80%, #ff6b6b 85%, #4d96ff 90%, transparent 100%); --beam-dur:1.8s; }
.beam9::after  { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 63%, #4d96ff99 72%, #6bcb7799 77%, #ffd93d99 82%, #ff6b6b99 87%, #4d96ff99 92%, transparent 100%); filter:blur(10px); --beam-dur:1.8s; }
/* LV10 무지개 빔 (더 빠르게) */
.beam10::before { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 55%, #bf00ff 65%, #ff0040 70%, #ff8c00 75%, #ffe600 80%, #00ff88 85%, #00cfff 90%, #bf00ff 95%, transparent 100%); --beam-dur:1.2s; }
.beam10::after  { background:conic-gradient(from var(--beam-angle), transparent 0%, transparent 58%, #bf00ffaa 68%, #ff0040aa 73%, #ff8c00aa 78%, #ffe600aa 83%, #00ff88aa 88%, #00cfff aa 93%, transparent 100%); filter:blur(12px); --beam-dur:1.2s; }

/* 카드 내용 레이어 (빔 위에 덮기) */
.lv-card-face {
  position:relative; z-index:1;
  background:var(--card-bg);
  border-radius:calc(var(--r) + 1px);
  padding:20px 16px;
  text-align:center;
  overflow:hidden;
}
/* 내부 shimmer */
.lv-card-face::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(105deg, transparent 40%, rgba(255,255,255,.035) 50%, transparent 60%);
  background-size:200% 100%;
  animation:shimmer 3s infinite;
  pointer-events:none;
}

/* 카드 텍스트 */
.lv-num  { font-size:3rem; font-weight:900; line-height:1; margin-bottom:4px; letter-spacing:-1px; }
.lv-name { font-size:1.05rem; font-weight:700; margin-bottom:10px; }
.lv-sub-range { font-size:.76rem; color:var(--text2); margin-bottom:6px; }
.lv-rank { display:inline-block; padding:2px 10px; border-radius:20px; font-size:.7rem; font-weight:700; margin-bottom:8px; }
.lv-desc { font-size:.73rem; color:var(--text2); line-height:1.5; }
.lv-score-range { font-size:.68rem; margin-top:6px; font-weight:600; opacity:.8; }

/* LV6+ glow text */
.glow-text { animation:glowPulse 2s ease-in-out infinite; }
.rainbow-text { animation:rainbowText 2s linear infinite; }

/* ═══════════════ GRADE TABLE ═══════════════ */
.grade-table-wrap { background:var(--card-bg); border-radius:var(--r); overflow:hidden; border:1px solid var(--border); }
.grade-table { width:100%; border-collapse:collapse; font-size:.83rem; }
.grade-table th { background:#1a1a30; padding:10px 12px; font-size:.75rem; color:var(--text2); font-weight:600; text-align:left; }
.grade-table td { padding:9px 12px; border-top:1px solid var(--border); }
.grade-table tr.cur-row td { background:rgba(108,99,255,.1); }

/* LV chip — 클릭 가능 */
.lv-chip {
  display:inline-flex; align-items:center; justify-content:center;
  width:32px; height:32px; border-radius:9px;
  font-weight:900; font-size:.85rem;
  cursor:pointer; transition:all .2s;
  border:2px solid transparent;
}
.lv-chip:hover { transform:scale(1.2); filter:brightness(1.3); }
.star-badge { color:#ffd700; font-size:.9rem; margin-left:3px; }

/* ═══════════════ ANALYZE ═══════════════ */
.analyze-box { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--r); padding:20px; margin-bottom:20px; }
.analyze-box h3 { font-size:1rem; margin-bottom:14px; color:var(--text2); }
.input-row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:10px; }
.field { display:flex; flex-direction:column; gap:4px; flex:1; min-width:140px; }
.field label { font-size:.75rem; color:var(--text2); }
.field input, .field select {
  padding:9px 12px; background:#1a1a2e; border:1px solid var(--border);
  border-radius:10px; color:var(--text); font-size:.87rem;
}
.field input:focus, .field select:focus { outline:none; border-color:var(--accent); }

.result-wrap { animation:fadeIn .5s ease; }
.result-hero { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px; }
.result-card-col { flex:0 0 220px; }
.result-info-col { flex:1; min-width:260px; }

.decision-row { display:flex; gap:10px; flex-wrap:wrap; background:#1a1a2e; border-radius:12px; padding:14px; margin-bottom:16px; }
.dec-item { flex:1; min-width:100px; text-align:center; }
.dec-label { font-size:.68rem; color:var(--text2); margin-bottom:4px; }
.dec-val { font-size:1.05rem; font-weight:900; }
.dec-arrow { display:flex; align-items:center; font-size:1.2rem; color:var(--text2); }

.factor-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:10px; margin-bottom:16px; }
.factor-card { background:#1a1a2e; border-radius:12px; padding:12px 14px; border-left:3px solid; transition:transform .2s; }
.factor-card:hover { transform:translateY(-2px); }
.fc-label { font-size:.68rem; color:var(--text2); margin-bottom:4px; }
.fc-value { font-size:1.15rem; font-weight:900; margin-bottom:4px; }
.fc-bar-wrap { height:4px; background:rgba(255,255,255,.08); border-radius:2px; }
.fc-bar { height:4px; border-radius:2px; }
.fc-badge { display:inline-block; font-size:.6rem; font-weight:700; padding:1px 7px; border-radius:10px; margin-top:5px; }
.fq-best { background:rgba(102,187,106,.2); color:#66bb6a; }
.fq-good { background:rgba(79,195,247,.2);  color:#4fc3f7; }
.fq-mid  { background:rgba(255,183,77,.2);   color:#ffb74d; }
.fq-low  { background:rgba(239,83,80,.2);    color:#ef5350; }

.score-breakdown { background:#1a1a2e; border-radius:12px; padding:14px; margin-bottom:16px; }
.score-breakdown h4 { font-size:.85rem; margin-bottom:10px; color:var(--text2); }
.sb-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.sb-label { font-size:.73rem; color:var(--text2); width:105px; flex-shrink:0; }
.sb-bar-wrap { flex:1; height:6px; background:rgba(255,255,255,.08); border-radius:3px; }
.sb-bar { height:6px; border-radius:3px; }
.sb-val { font-size:.73rem; font-weight:700; width:58px; text-align:right; }

.bonus-log { background:#1a1a2e; border-radius:12px; padding:12px 14px; margin-bottom:16px; }
.bonus-log h4 { font-size:.8rem; margin-bottom:8px; color:#66bb6a; }
.bonus-item { font-size:.73rem; color:#66bb6a; padding:2px 0; }

.inline-grade-table-wrap { margin-top:16px; background:var(--card-bg); border-radius:var(--r); overflow:hidden; border:1px solid var(--border); }

/* ═══════════════ REVENUE ═══════════════ */
.rev-box { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--r); padding:20px; }
.rev-box h3 { margin-bottom:14px; }
.rev-inputs { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:12px; margin-bottom:14px; }
.rev-result { background:#1a1a2e; border-radius:12px; padding:16px; text-align:center; }
.rev-amount { font-size:2rem; font-weight:900; color:#66bb6a; }
.rev-note { font-size:.73rem; color:var(--text2); margin-top:4px; }

/* ═══════════════ HOT VIDEOS ═══════════════ */
.hot-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:12px; }
.hot-card { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; overflow:hidden; cursor:pointer; transition:transform .2s; }
.hot-card:hover { transform:translateY(-3px); }
.hot-thumb { width:100%; aspect-ratio:16/9; object-fit:cover; }
.hot-info { padding:8px 10px; }
.hot-title { font-size:.76rem; font-weight:600; margin-bottom:3px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.hot-meta { font-size:.67rem; color:var(--text2); }

/* ═══════════════ EXTRAS ═══════════════ */
.extra-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(155px, 1fr)); gap:12px; }
.extra-card { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:14px; text-align:center; cursor:pointer; transition:all .2s; text-decoration:none; display:block; color:var(--text); }
.extra-card:hover { transform:translateY(-3px); border-color:var(--accent); }
.ex-icon { font-size:1.7rem; margin-bottom:6px; }
.ex-name { font-size:.8rem; font-weight:700; margin-bottom:3px; }
.ex-desc { font-size:.68rem; color:var(--text2); }

/* ═══════════════ MODAL ═══════════════ */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; animation:fadeIn .3s ease; }
.modal-box { background:var(--card-bg); border-radius:20px; padding:28px; width:400px; max-width:95vw; text-align:center; position:relative; }
.modal-close { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--text2); font-size:1.4rem; cursor:pointer; }
.modal-nav { display:flex; justify-content:center; gap:5px; flex-wrap:wrap; margin-bottom:16px; }
.modal-nav-btn { padding:4px 10px; border-radius:8px; border:none; cursor:pointer; font-size:.73rem; font-weight:700; background:#1a1a2e; color:var(--text2); transition:all .2s; }
.modal-nav-btn:hover { transform:scale(1.08); }

/* Section header */
.sec-head { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.sec-head h2 { font-size:1.15rem; font-weight:800; }
.sec-badge { padding:2px 10px; background:var(--accent); border-radius:20px; font-size:.72rem; font-weight:700; }
</style>
</head>
<body>
<div class="app-wrap">

<!-- ══ HEADER ══ -->
<header>
  <div class="logo">📊 YTAnalytics Pro</div>
  <div class="search-bar">
    <input type="text" id="globalSearch" placeholder="채널명 또는 키워드 검색…" onkeydown="if(event.key==='Enter')handleGlobalSearch()">
    <button class="btn btn-primary" onclick="handleGlobalSearch()">검색</button>
  </div>
  <button class="btn btn-primary" onclick="showSection('analyze')">🔍 채널 분석</button>
</header>

<div class="body-row">

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-item active" onclick="showSection('analyze');setActive(this)"><span class="ic">🔍</span>채널 분석</div>
  <div class="sidebar-item" onclick="showSection('hot');setActive(this)"><span class="ic">🔥</span>인기 영상</div>
  <div class="sidebar-item" onclick="showSection('revenue');setActive(this)"><span class="ic">💰</span>수익 계산</div>
  <div class="sidebar-item" onclick="showSection('tools');setActive(this)"><span class="ic">🛠️</span>크리에이터 도구</div>
  <div class="sidebar-item" onclick="showSection('ideas');setActive(this)"><span class="ic">💡</span>아이디어</div>
  <div class="sidebar-item" onclick="showSection('shop');setActive(this)"><span class="ic">🛒</span>추천 장비</div>
</aside>

<!-- ══ MAIN ══ -->
<main class="main-area" id="mainArea">

  <!-- ANALYZE -->
  <div id="sec-analyze" class="section active">
    <div class="sec-head">
      <h2>🔍 채널 분석</h2>
      <span class="sec-badge">Algorithm Score</span>
    </div>
    <div class="analyze-box">
      <h3>채널 정보 입력</h3>
      <div class="input-row">
        <div class="field" style="flex:2;min-width:200px">
          <label>채널 URL / @핸들</label>
          <input type="text" id="chanInput" placeholder="예: @MrBeast">
        </div>
        <div class="field"><label>구독자 수</label><input type="number" id="inSubs" placeholder="1000000"></div>
        <div class="field"><label>총 조회수</label><input type="number" id="inViews" placeholder="50000000"></div>
      </div>
      <div class="input-row">

function fmt(n){
  n = parseFloat(n)||0;
  if(n>=100000000) return (n/100000000).toFixed(1)+'억';
  if(n>=10000)     return (n/10000).toFixed(1)+'만';
  if(n>=1000)      return (n/1000).toFixed(1)+'천';
  return n.toLocaleString();
}
function fmtMoney(usd){
  const krw = Math.round(usd*1350);
  return `$${usd.toFixed(2)} (₩${krw.toLocaleString()})`;
}
function qual(v, good, great){
  if(v>=great)       return {cls:'fq-best', label:'최상'};
  if(v>=good)        return {cls:'fq-good', label:'양호'};
  if(v>=good*0.5)    return {cls:'fq-mid',  label:'보통'};
  return {cls:'fq-low', label:'부족'};
}
function lvFromScore(s){ for(let i=9;i>=0;i--){ if(s>=GRADES[i].score[0]) return GRADES[i].lv; } return 1; }
function lvFromSubs(s){  for(let i=9;i>=0;i--){ if(s>=GRADES[i].subMin)   return GRADES[i].lv; } return 1; }

/* ══════════════════════════════════════
   BUILD CARD HTML
   빔 라인 효과: .lv-card-wrap.beamN
══════════════════════════════════════ */
function buildCardHTML(g, clickFn){
  const lv = g.lv;
  const isHigh = lv >= 6;
  const is10   = lv === 10;
  const click  = clickFn || `openModal(${lv})`;

  // LV 숫자 스타일
  let numStyle = `color:${g.color};`;
  if(isHigh && !is10) numStyle += `text-shadow:0 0 14px ${g.color},0 0 28px ${g.color}88;`;
  // 애니메이션 클래스
  const numCls  = is10 ? 'lv-num rainbow-text' : (isHigh ? 'lv-num glow-text' : 'lv-num');
  const nameCls = is10 ? 'lv-name rainbow-text': (isHigh ? 'lv-name glow-text': 'lv-name');
  let nameStyle = `color:${g.color};`;
  if(isHigh && !is10) nameStyle += `text-shadow:0 0 10px ${g.color}88;`;

  const subMax = g.subMax===Infinity ? '∞' : fmt(g.subMax);
  const scoreMax = g.score[1]===Infinity ? '∞' : fmt(g.score[1]);

  return `
<div class="lv-card-wrap beam${lv}" onclick="${click}">
  <div class="lv-card-face">
    <div class="${numCls}" style="${numStyle}">LV.${lv}</div>
    <div class="${nameCls}" style="${nameStyle}">${g.name}</div>
    <div class="lv-sub-range">${fmt(g.subMin)} ~ ${subMax} 구독자</div>
    <div class="lv-rank" style="background:${g.color}22;color:${g.color}">${g.rankPct}</div>
    <div class="lv-desc">${g.desc}</div>
    <div class="lv-score-range" style="color:${g.color}">점수 ${fmt(g.score[0])} ~ ${scoreMax}</div>
  </div>
</div>`;
}

/* ══════════════════════════════════════
   COMPUTE SCORE
══════════════════════════════════════ */
function computeDetailedScore(subs,views,vids,eng,freq){
  subs=parseFloat(subs)||0; views=parseFloat(views)||0;
  vids=parseInt(vids)||1;   eng=parseFloat(eng)||0; freq=parseFloat(freq)||0;
  const avgV = views/Math.max(vids,1);
  const vsr  = views/Math.max(subs,1);
  const sSubs  = Math.min(Math.log10(Math.max(subs,1))*80000,  400000);
  const sViews = Math.min(Math.log10(Math.max(views,1))*50000, 250000);
  const sEng   = Math.min(eng*30000, 150000);
  const sFreq  = Math.min(freq*8000,  80000);
  const sAvg   = Math.min(Math.log10(Math.max(avgV,1))*25000, 120000);
  let base = sSubs+sViews+sEng+sFreq+sAvg;
  let bonus=0, bonusLog=[];
  if(subs>=1000000){bonus+=base*.15;bonusLog.push('구독자 100만+ 보너스 +15%');}
  else if(subs>=100000){bonus+=base*.07;bonusLog.push('구독자 10만+ 보너스 +7%');}
  if(vsr>=5){bonus+=base*.12;bonusLog.push('조회/구독 비율 5배+ 보너스 +12%');}
  else if(vsr>=2){bonus+=base*.06;bonusLog.push('조회/구독 비율 2배+ 보너스 +6%');}
  if(eng>=10){bonus+=base*.10;bonusLog.push('참여율 10%+ 보너스 +10%');}
  else if(eng>=6){bonus+=base*.05;bonusLog.push('참여율 6%+ 보너스 +5%');}
  if(freq>=15){bonus+=base*.08;bonusLog.push('업로드 주 3회+ 보너스 +8%');}
  else if(freq>=8){bonus+=base*.04;bonusLog.push('업로드 주 2회+ 보너스 +4%');}
  const total=Math.round(base+bonus);
  return { total, base:Math.round(base), bonus:Math.round(bonus), bonusLog,
    breakdown:{subs:Math.round(sSubs),views:Math.round(sViews),eng:Math.round(sEng),freq:Math.round(sFreq),avg:Math.round(sAvg)},
    factors:{subs,views,vids,eng,freq,avgViews:avgV,vsr} };
}

      <tbody id="iGradeTbody"></tbody>
    </table>
  </div>
</div>`;

  document.getElementById('resultArea').innerHTML = html;
  // 인라인 등급표 채우기
  const tbody = document.getElementById('iGradeTbody');
  tbody.innerHTML = GRADES.map(g=>{
    const cur = g.lv===finLv;
    const smx = g.subMax===Infinity?'∞':fmt(g.subMax);
    const scmx= g.score[1]===Infinity?'∞':fmt(g.score[1]);
    return `<tr class="${cur?'cur-row':''}">
      <td><span class="lv-chip" style="background:${g.color}22;color:${g.color};border-color:${g.color}44" onclick="openModal(${g.lv})">${g.lv}</span>${cur?'<span class="star-badge">★</span>':''}</td>
      <td style="color:${g.color};font-weight:700">${g.name}</td>
      <td>${fmt(g.subMin)} ~ ${smx}</td>
      <td>${g.rankPct}</td>
      <td>${fmt(g.score[0])} ~ ${scmx}</td>
    </tr>`;
  }).join('');
}

function fc(label,value,pct,color,q){
  return `<div class="factor-card" style="border-left-color:${color}">
    <div class="fc-label">${label}</div>
    <div class="fc-value" style="color:${color}">${value}</div>
    <div class="fc-bar-wrap"><div class="fc-bar" style="width:${Math.min(pct,100)}%;background:${color}"></div></div>
    <span class="fc-badge ${q.cls}">${q.label}</span>
  </div>`;
}
function sbr(label,val,max,color){
  const pct=Math.min(val/max*100,100);
  return `<div class="sb-row">
    <div class="sb-label">${label}</div>
    <div class="sb-bar-wrap"><div class="sb-bar" style="width:${pct}%;background:${color}"></div></div>
    <div class="sb-val" style="color:${color}">${fmt(val)}</div>
  </div>`;
}

/* ══════════════════════════════════════
   MODAL — LV 버튼 클릭 시 해당 레벨 카드 표시
══════════════════════════════════════ */
let modalLv = 1;

function openModal(lv){
  modalLv = lv;
  document.getElementById('modalOverlay').classList.add('open');
  buildModalNav();
  renderModal(lv);
}
function closeModal(e){
  if(!e || e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}
function buildModalNav(){
  document.getElementById('modalNav').innerHTML = GRADES.map(g=>{
    const act = g.lv===modalLv;
    return `<button class="modal-nav-btn${act?' active':''}"
      style="${act?`background:${g.color};color:#000`:''}"
      onclick="renderModal(${g.lv})">${g.lv}</button>`;
  }).join('');
}
function renderModal(lv){
  modalLv=lv;
  const g=GRADES[lv-1];
  buildModalNav();
  const isHigh=lv>=6, is10=lv===10;
  let ns=`color:${g.color};font-size:3rem;font-weight:900;display:block;margin-bottom:4px;`;
  let nmS=`color:${g.color};font-size:1.15rem;font-weight:700;display:block;margin-bottom:10px;`;
  if(isHigh&&!is10){ ns+=`text-shadow:0 0 16px ${g.color};`; nmS+=`text-shadow:0 0 10px ${g.color}88;`; }
  const numCls  = is10?'rainbow-text':(isHigh?'glow-text':'');
  const nameCls = is10?'rainbow-text':(isHigh?'glow-text':'');
  const subMax = g.subMax===Infinity?'∞':fmt(g.subMax);
  document.getElementById('modalContent').innerHTML=`
    <div class="lv-card-wrap beam${lv}" style="margin:0 auto 16px;max-width:280px">
      <div class="lv-card-face">
        <span class="${numCls}" style="${ns}">LV.${lv}</span>
        <span class="${nameCls}" style="${nmS}">${g.name}</span>
        <div style="font-size:.78rem;color:var(--text2);margin-bottom:8px">${fmt(g.subMin)} ~ ${subMax} 구독자</div>
        <div class="lv-rank" style="background:${g.color}33;color:${g.color};margin-bottom:8px">${g.rankPct}</div>
        <div style="font-size:.73rem;color:var(--text2);line-height:1.5">${g.desc}</div>
      </div>
    </div>
    <div style="background:#1a1a2e;border-radius:10px;padding:12px;text-align:left;font-size:.78rem">
      <div style="margin-bottom:8px;font-weight:700;color:${g.color}">🎯 다음 목표</div>
      <div style="color:var(--text2);margin-bottom:10px">${g.nextGoal}</div>
      <div style="font-weight:700;margin-bottom:6px">✨ 특권</div>
      ${g.perks.map(p=>`<div style="color:var(--text2);padding:2px 0">• ${p}</div>`).join('')}
    </div>`;
}

/* ══════════════════════════════════════
   REVENUE
══════════════════════════════════════ */
function calcRevenue(){
  const views  =parseFloat(document.getElementById('rViews').value)||0;
  const cpm    =parseFloat(document.getElementById('rCpm').value)||0;
  const vtr    =parseFloat(document.getElementById('rVtr').value)||0;
  const country=parseFloat(document.getElementById('rCountry').value)||1;
  const mViews =views*(vtr/100);
  const gross  =(mViews/1000)*cpm*country;
  const net    =gross*0.55;
  document.getElementById('revResult').innerHTML=`
    <div style="font-size:.78rem;color:var(--text2);margin-bottom:6px">예상 월 수익 (YouTube 55% 지급)</div>
    <div class="rev-amount">${fmtMoney(net)}</div>
    <div class="rev-note">수익화 조회수 ${fmt(mViews)} · 총 예상 ${fmtMoney(gross)} → YouTube 수수료 45% 제외</div>`;
}
