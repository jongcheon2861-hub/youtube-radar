<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>YTAnalytics Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--border:#2a2a3a;
  --text:#e8e8f0;--text2:#a0a0b8;--accent:#6c63ff;
  --lv1:#9e9e9e;--lv2:#42a5f5;--lv3:#ffee58;--lv4:#ffa726;
  --lv5:#ffcc80;--lv6:#66bb6a;--lv7:#ef5350;--lv8:#ab47bc;
  --lv9:#f06292;--lv10a:#ff0000;--lv10b:#ff8800;--lv10c:#ffff00;
  --lv10d:#00ff00;--lv10e:#0088ff;--lv10f:#8800ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── Header ─────────────────────────── */
header{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(10,10,15,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:1000;backdrop-filter:blur(12px);}
.logo{font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
#globalSearch{flex:1;max-width:480px;padding:8px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;}
#globalSearch:focus{border-color:var(--accent);}
#menuBtn{background:none;border:none;color:var(--text);font-size:1.4rem;cursor:pointer;padding:4px;}

/* ── Sidebar ─────────────────────────── */
#sidebar{position:fixed;top:56px;left:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:16px 0;z-index:900;transform:translateX(-100%);transition:transform .3s;}
#sidebar.open{transform:translateX(0);}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;transition:background .2s;font-size:.9rem;}
.nav-item:hover,.nav-item.active{background:rgba(108,99,255,.15);color:var(--accent);}
.nav-item .icon{font-size:1.1rem;width:20px;text-align:center;}

/* ── Main ─────────────────────────────── */
main{padding:72px 16px 16px;max-width:1200px;margin:0 auto;}
.section{display:none;}
.section.active{display:block;}
h2{font-size:1.3rem;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* ── Cards / Grid ─────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}

/* ── Fire Stage ───────────────────────── */
.fire-stage{
  position:relative;width:100%;max-width:340px;
  height:260px;margin:0 auto;
  background:#000;          /* ← 중앙 광원 없음 */
  border-radius:16px;overflow:hidden;
}
#fireCanvas{position:absolute;inset:0;width:100%;height:100%;}
.lv-badge{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  pointer-events:none;z-index:10;
}
#lvNumber{
  font-size:3rem;font-weight:900;color:#fff;
  paint-order:stroke fill;
  text-shadow:none;
  line-height:1;
}
#lvName{
  font-size:1rem;font-weight:700;
  /* 색상은 JS로 주입 */
}
#lvRank{font-size:.8rem;color:var(--text2);}
#lvScore{font-size:.75rem;color:var(--text2);}

/* ── Grade Table ──────────────────────── */
.grade-table{width:100%;border-collapse:collapse;font-size:.85rem;}
.grade-table th{background:var(--bg3);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
.grade-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.05);}
.grade-table tr:hover td{background:rgba(255,255,255,.03);}
.grade-dot{width:12px;height:12px;border-radius:50%;display:inline-block;}

/* ── Channel Info ─────────────────────── */
.ch-info{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;}
.ch-thumb{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
.ch-meta{flex:1;min-width:180px;}
.ch-meta h3{font-size:1.1rem;margin-bottom:6px;}
.ch-stat{display:inline-block;margin:3px 6px 3px 0;padding:3px 8px;background:var(--bg3);border-radius:6px;font-size:.78rem;}

/* ── Gauge ────────────────────────────── */
.gauge-wrap{margin:8px 0;}
.gauge-label{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:4px;}
.gauge-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.gauge-fill{height:100%;border-radius:4px;transition:width .6s;}

/* ── Revenue Calc ─────────────────────── */
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.calc-result{font-size:1.4rem;font-weight:700;color:#ffd93d;margin-top:8px;}
label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:4px;}
input[type=number],select{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;outline:none;}

/* ── Preview Modal ────────────────────── */
#prevModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;align-items:center;justify-content:center;}
#prevModal.open{display:flex;}
.prev-inner{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:min(400px,95vw);text-align:center;}
.prev-stage{
  position:relative;width:260px;height:260px;
  margin:0 auto 16px;background:#000;   /* ← 광원 없음 */
  border-radius:12px;overflow:hidden;
}
#prevCanvas{position:absolute;inset:0;width:100%;height:100%;}
.prev-badge{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  pointer-events:none;z-index:10;
}
#prevLvNum{font-size:2.6rem;font-weight:900;color:#fff;paint-order:stroke fill;line-height:1;}
#prevLvName{font-size:.95rem;font-weight:700;}
#prevLvRank{font-size:.75rem;color:var(--text2);}
.prev-nav{display:flex;justify-content:center;gap:12px;margin-top:12px;}
.prev-nav button{padding:8px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;}
.prev-nav button:hover{background:var(--accent);border-color:var(--accent);}

/* ── Ad placeholder ──────────────────── */
.ad-box{background:var(--bg3);border:1px dashed var(--border);border-radius:8px;min-height:90px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:.8rem;margin:12px 0;}

/* ── Scrollbar ───────────────────────── */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── Video Card ──────────────────────── */
.vid-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s;}
.vid-card:hover{transform:translateY(-3px);}
.vid-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;}
.vid-info{padding:10px;}
.vid-title{font-size:.82rem;font-weight:500;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.vid-meta{font-size:.75rem;color:var(--text2);}

/* ── Tag badges ──────────────────────── */
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;margin:2px;}
.tag.strength{background:rgba(102,187,106,.15);color:#66bb6a;border:1px solid rgba(102,187,106,.3);}
.tag.improve{background:rgba(239,83,80,.15);color:#ef5350;border:1px solid rgba(239,83,80,.3);}

@media(max-width:600px){
  .calc-grid{grid-template-columns:1fr;}
  .fire-stage{height:220px;}
}
</style>
</head>
<body>

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const API_KEYS=['AIzaSyAYi9B4vIFjl75uYBS56GbTSMJfV_TLuzE','YOUR_API_KEY_2'];
let keyIdx=0;
const getKey=()=>API_KEYS[keyIdx%API_KEYS.length];

/* ═══════════════════════════════════════════
   GRADES  (색상 순서 요청에 맞춤)
═══════════════════════════════════════════ */
const GRADES=[
  {lv:1, name:'브론즈 I',    color:'#9e9e9e', rank:100, scoreMin:0,    scoreMax:999},
  {lv:2, name:'실버 II',     color:'#42a5f5', rank:80,  scoreMin:1000, scoreMax:2999},
  {lv:3, name:'골드 III',    color:'#ffee58', rank:60,  scoreMin:3000, scoreMax:5999},
  {lv:4, name:'플래티넘 IV', color:'#ffa726', rank:40,  scoreMin:6000, scoreMax:9999},
  {lv:5, name:'다이아 V',    color:'#ffcc80', rank:25,  scoreMin:10000,scoreMax:14999},
  {lv:6, name:'에메랄드 VI', color:'#66bb6a', rank:15,  scoreMin:15000,scoreMax:21999},
  {lv:7, name:'루비 VII',    color:'#ef5350', rank:8,   scoreMin:22000,scoreMax:30999},
  {lv:8, name:'마스터 VIII', color:'#ab47bc', rank:4,   scoreMin:31000,scoreMax:42999},
  {lv:9, name:'그랜드 IX',   color:'#f06292', rank:1,   scoreMin:43000,scoreMax:59999},
  {lv:10,name:'레전드 X',    color:'rainbow', rank:0.1, scoreMin:60000,scoreMax:99999},
];

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
const fmt=n=>n>=1e8?`${(n/1e8).toFixed(1)}억`:n>=1e4?`${(n/1e4).toFixed(1)}만`:n>=1e3?`${(n/1e3).toFixed(1)}K`:String(n);
const fmtMoney=n=>`₩${Math.round(n).toLocaleString()}`;

function hashScore(str){
  let h=0;
  for(let i=0;i<str.length;i++)h=(h*31+str.charCodeAt(i))>>>0;
  return h;
}

function getLvFromScore(score){
  for(let i=GRADES.length-1;i>=0;i--)
    if(score>=GRADES[i].scoreMin)return i;
  return 0;
}

function getRainbowColor(t){
  const h=(t*360)%360;
  return `hsl(${h},100%,60%)`;
}

/* ─── stroke width 3배 스케일 ─── */
function getStrokeWidth(lvIdx){
  /* LV1=1px, LV2=3px, LV3=9px … 하지만 너무 커지므로
     실용적 범위: LV1=1px, 매 레벨 1px씩 증가 → LV10=10px
     "3배씩 증가" 는 3^(lvIdx/9)로 완만하게 해석 */
  return (1 + lvIdx * 1.1).toFixed(1)+'px';
}

/* ═══════════════════════════════════════════
   SPARK RENDERER  (스파크 전용, 엠버 없음)
═══════════════════════════════════════════ */
class Spark{
  constructor(x,y,color,intensity){
    this.x=x; this.y=y;
    const spd=(.5+Math.random()*2.5)*intensity;
    const angle=-Math.PI/2+(-0.6+Math.random()*1.2)*Math.PI;
    this.vx=Math.cos(angle)*spd;
    this.vy=Math.sin(angle)*spd-(1+Math.random())*intensity;
    this.life=1; this.decay=.018+Math.random()*.025;
    this.r=1+Math.random()*1.8*intensity;
    this.color=color;
    this.trail=[];
    this.trailMax=Math.floor(3+intensity*5);
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>this.trailMax)this.trail.shift();
    this.vy+=0.07;
    this.x+=this.vx; this.y+=this.vy;
    this.life-=this.decay;
    return this.life>0;
  }
  draw(ctx,intensity){
    /* trail */
    for(let i=1;i<this.trail.length;i++){
      const t=i/this.trail.length;
      ctx.beginPath();
      ctx.moveTo(this.trail[i-1].x,this.trail[i-1].y);
      ctx.lineTo(this.trail[i].x,this.trail[i].y);
      ctx.strokeStyle=`rgba(255,200,80,${t*this.life*.5})`;
      ctx.lineWidth=this.r*t*.8;
      ctx.stroke();
    }
    /* outer glow (LV3+) */
    if(intensity>=.3){
      const og=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*5);
      og.addColorStop(0,`rgba(255,200,80,${this.life*.25})`);
      og.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(this.x,this.y,this.r*5,0,Math.PI*2);
      ctx.fillStyle=og;ctx.fill();
    }
    /* core */
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2.5);
    g.addColorStop(0,'rgba(255,255,220,'+this.life+')');
    g.addColorStop(.5,this.color.replace(')',`,${this.life*.8})`).replace('rgb','rgba'));
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*2.5,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
  }
}

class SparkRenderer{
  constructor(canvas,lvIdx){
    this.canvas=canvas;
    this.ctx=canvas.getContext('2d');
    this.lvIdx=lvIdx;
    this.intensity=(lvIdx+1)/10;
    this.sparks=[];
    this.raf=null;
    this.t=0;
    this._resize();
    this._ro=new ResizeObserver(()=>this._resize());
    this._ro.observe(canvas.parentElement);
  }
  _resize(){
    this.canvas.width=this.canvas.offsetWidth||260;
    this.canvas.height=this.canvas.offsetHeight||260;
    this.cx=this.canvas.width/2;
    this.cy=this.canvas.height/2;
  }
  _color(){
    if(this.lvIdx===9)return getRainbowColor(this.t*.003);
    return GRADES[this.lvIdx].color;
  }
  _getEdgePoints(textEl){
    /* text 경계 기준 방출 위치 */
    const parent=this.canvas.parentElement;
    const pr=parent.getBoundingClientRect();
    const tr=textEl.getBoundingClientRect();
    const ox=tr.left-pr.left, oy=tr.top-pr.top;
    const points=[];
    const n=Math.ceil(6+this.intensity*10);
    for(let i=0;i<n;i++){
      const rx=Math.random();
      points.push({
        x:ox+rx*tr.width,
        y:oy+(Math.random()<.5?0:tr.height)
      });
      points.push({
        x:ox+(Math.random()<.5?0:tr.width),
        y:oy+Math.random()*tr.height
      });
    }
    return points;
  }
  start(textEl){
    this.textEl=textEl;
    const loop=()=>{
      this.t++;
      const spawnCount=Math.floor(1+this.intensity*19);
      const pts=this._getEdgePoints(textEl);
      for(let i=0;i<spawnCount;i++){
        const p=pts[Math.floor(Math.random()*pts.length)];
        this.sparks.push(new Spark(p.x,p.y,this._color(),this.intensity));
      }
      this.sparks=this.sparks.filter(s=>s.update());
      /* clear */
      this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
      /* draw */
      this.sparks.forEach(s=>s.draw(this.ctx,this.intensity));
      this.raf=requestAnimationFrame(loop);
    };
    this.raf=requestAnimationFrame(loop);
  }
  stop(){
    if(this.raf)cancelAnimationFrame(this.raf);
    this._ro.disconnect();
    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
  }
}

/* ═══════════════════════════════════════════
   BADGE STYLE APPLICATION
   (텍스트 테두리 3배, 이름=레벨색, 광원 없음)
═══════════════════════════════════════════ */
function applyBadgeStyle(lvIdx, numEl, nameEl, rankEl, scoreEl, scoreVal){
  const g=GRADES[lvIdx];
  const sw=getStrokeWidth(lvIdx);

  if(lvIdx===9){
    /* Rainbow */
    numEl.style.webkitTextStroke=`${sw} transparent`;
    numEl.style.backgroundImage='linear-gradient(90deg,#ff0000,#ff8800,#ffff00,#00ff00,#0088ff,#8800ff,#ff0000)';
    numEl.style.webkitBackgroundClip='text';
    numEl.style.webkitTextFillColor='transparent';
    numEl.style.backgroundSize='200% auto';
    numEl.style.animation='rainbowText 2s linear infinite';

    nameEl.style.backgroundImage='linear-gradient(90deg,#ff0000,#ff8800,#ffff00,#00ff00,#0088ff,#8800ff,#ff0000)';
    nameEl.style.webkitBackgroundClip='text';
    nameEl.style.webkitTextFillColor='transparent';
    nameEl.style.backgroundSize='200% auto';
    nameEl.style.animation='rainbowText 2s linear infinite';
  } else {
    const c=g.color;
    /* 레벨 숫자 */
    numEl.style.webkitTextStroke=`${sw} ${c}`;
    numEl.style.backgroundImage='none';
    numEl.style.webkitBackgroundClip='';
    numEl.style.webkitTextFillColor='white';
    numEl.style.animation='none';

    /* 이름 = 레벨 색 */
    nameEl.style.color=c;
    nameEl.style.backgroundImage='none';
    nameEl.style.webkitBackgroundClip='';
    nameEl.style.webkitTextFillColor='';
    nameEl.style.animation='none';
  }

  numEl.textContent=`LV${g.lv}`;
  nameEl.textContent=g.name;
  if(rankEl)rankEl.textContent=`상위 ${g.rank}%`;
  if(scoreEl&&scoreVal!==undefined)scoreEl.textContent=`알고리즘 점수: ${scoreVal.toLocaleString()}`;
}

let mainRenderer=null;

function startMainFire(lvIdx,scoreVal){
  if(mainRenderer){mainRenderer.stop();mainRenderer=null;}
  const canvas=document.getElementById('fireCanvas');
  mainRenderer=new SparkRenderer(canvas,lvIdx);
  const numEl=document.getElementById('lvNumber');
  applyBadgeStyle(lvIdx,numEl,
    document.getElementById('lvName'),
    document.getElementById('lvRank'),
    document.getElementById('lvScore'),
    scoreVal);

  setTimeout(()=>mainRenderer.start(numEl),80);
}

function startPrevFire(lvIdx){
  if(prevRenderer){prevRenderer.stop();prevRenderer=null;}
  const canvas=document.getElementById('prevCanvas');
  prevRenderer=new SparkRenderer(canvas,lvIdx);
  const numEl=document.getElementById('prevLvNum');
  applyBadgeStyle(lvIdx,numEl,

async function fetchHotPage(){
  const cat=document.getElementById('catFilter').value;
  const type=document.getElementById('typeFilter').value;
  let url=`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=KR&maxResults=12&key=${getKey()}`;
  if(cat)url+=`&videoCategoryId=${cat}`;
  if(type==='short')url+=`&videoDuration=short`;
  if(hotTokens[hotPageIdx])url+=`&pageToken=${hotTokens[hotPageIdx]}`;
  try{
    const r=await fetch(url);const d=await r.json();
    if(d.nextPageToken&&!hotTokens[hotPageIdx+1])hotTokens.push(d.nextPageToken);
    renderHotGrid(d.items||[]);
  }catch(e){document.getElementById('hotGrid').innerHTML='<p style="color:var(--text2)">API 키를 확인해주세요.</p>';}

function hotPage(dir){
  const next=hotPageIdx+dir;
  if(next<0)return;
  if(dir===1&&!hotTokens[next])return;
  hotPageIdx=next;fetchHotPage();
}

async function analyzeChannel(){
  const query=document.getElementById('chInput').value.trim();
  if(!query)return;
  const res=document.getElementById('chResult');
  res.innerHTML='<p style="color:var(--text2);margin:12px 0">분석 중…</p>';

  try{
    /* 1. Search channel */
    const sr=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(query)}&key=${getKey()}`);
    const sd=await sr.json();
    if(!sd.items?.length){res.innerHTML='<p style="color:#ef5350">채널을 찾을 수 없습니다.</p>';return;}
    const chId=sd.items[0].snippet.channelId;

    /* 2. Channel details */
    const cr=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings&id=${chId}&key=${getKey()}`);
    const cd=await cr.json();
    const ch=cd.items[0];
    const stats=ch.statistics;
    const subs=+stats.subscriberCount||0;
    const views=+stats.viewCount||0;
    const vids=+stats.videoCount||0;

    /* 3. Recent videos */
    const vr=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${chId}&order=date&maxResults=20&type=video&key=${getKey()}`);
    const vd=await vr.json();
    const recentIds=(vd.items||[]).map(i=>i.id.videoId).filter(Boolean);
    let recentStats=[];
    if(recentIds.length){
      const vsr=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${recentIds.join(',')}&key=${getKey()}`);
      const vsd=await vsr.json();
      recentStats=vsd.items||[];
    }

    /* 4. Score computation */
    const engRate=vids>0?(views/vids/Math.max(subs,1)*100):0;
    const uploadFreq=vids/Math.max(1,calcChannelAge(ch.snippet.publishedAt));
    const viralScore=recentStats.reduce((a,v)=>a+(+v.statistics.viewCount||0),0)/Math.max(recentStats.length,1);
    const shortCount=recentStats.filter(v=>(+v.statistics.viewCount||0)<60000&&v.snippet.title.includes('#Shorts')).length;
    const shortRatio=recentStats.length?shortCount/recentStats.length:0;
    let score=Math.floor(
      subs*.003+
      views*.00001+
      engRate*800+
      Math.min(uploadFreq,14)*300+
      Math.min(viralScore,1e7)*.0002+
      hashScore(chId)%500
    );
    score=Math.min(score,99999);

    const lvIdx=getLvFromScore(score);
    const g=GRADES[lvIdx];

    /* Fire badge */
    startMainFire(lvIdx,score);

    /* 5. Render info */
    const thumb=ch.snippet.thumbnails?.medium?.url||'';
    const topHashtags=extractHashtags(recentStats);
    const topCats=extractCategories(recentStats);
    const benchmarkTips=getBenchmarkTips(lvIdx,subs,engRate,uploadFreq,shortRatio);

    res.innerHTML=`
      <div class="card ch-info">
        <img class="ch-thumb" src="${thumb}" alt=""/>
        <div class="ch-meta">
          <h3>${ch.snippet.title}</h3>
          <span class="ch-stat">👥 ${fmt(subs)} 구독자</span>
          <span class="ch-stat">👁 ${fmt(views)} 조회</span>
          <span class="ch-stat">📹 ${fmt(vids)} 영상</span>
          <p style="font-size:.8rem;color:var(--text2);margin-top:8px;line-height:1.5">${(ch.snippet.description||'').slice(0,120)}…</p>
        </div>
      </div>

      <!-- 콘텐츠 분석 -->
      <div class="card">
        <h3 style="margin-bottom:12px">📈 콘텐츠 분석</h3>
        ${gauge('참여율 (Engagement Rate)',Math.min(engRate,10)/10*100,`${engRate.toFixed(2)}%`)}
        ${gauge('업로드 빈도 (주당 영상 수)',Math.min(uploadFreq,7)/7*100,`${uploadFreq.toFixed(1)}편/주`)}
        ${gauge('바이럴 점수 (최근 영상 평균 조회)',Math.min(viralScore,1e7)/1e7*100,fmt(Math.round(viralScore)))}
        ${gauge('쇼츠 비율',shortRatio*100,`${(shortRatio*100).toFixed(0)}%`)}
        <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:4px">
          ${engRate>3?'<span class="tag strength">✅ 높은 참여율</span>':'<span class="tag improve">⚠️ 참여율 개선 필요</span>'}
          ${uploadFreq>=3?'<span class="tag strength">✅ 꾸준한 업로드</span>':'<span class="tag improve">⚠️ 업로드 빈도 증가 권장</span>'}
          ${shortRatio>.4?'<span class="tag strength">✅ 쇼츠 활발 활용</span>':'<span class="tag improve">⚠️ 쇼츠 비중 늘리기</span>'}
        </div>
      </div>

      <!-- 제목/설명/해시태그 분석 -->
      <div class="card">
        <h3 style="margin-bottom:12px">🏷️ 제목·설명·해시태그·카테고리 분석</h3>
        <p style="font-size:.85rem;color:var(--text2);margin-bottom:8px">최근 ${recentStats.length}개 영상 기준</p>
        <div style="margin-bottom:10px">
          <strong style="font-size:.85rem">🔖 자주 쓰는 해시태그</strong><br/>
          <div style="margin-top:6px">${topHashtags.map(h=>`<span class="tag strength">${h}</span>`).join('')||'<span style="color:var(--text2);font-size:.8rem">해시태그 없음</span>'}</div>
        </div>

          <strong style="font-size:.85rem">📂 주요 카테고리</strong><br/>
          <div style="margin-top:6px">${topCats.map(c=>`<span class="tag improve">${c}</span>`).join('')||'<span style="color:var(--text2);font-size:.8rem">정보 없음</span>'}</div>
        </div>
        <div>
          <strong style="font-size:.85rem">📝 제목 패턴 분석</strong>
          <p style="font-size:.8rem;color:var(--text2);margin-top:4px;line-height:1.6">${analyzeTitlePatterns(recentStats)}</p>

      <!-- 벤치마킹 -->
      <div class="card">
        <h3 style="margin-bottom:12px">🎯 벤치마킹 전략</h3>
        ${benchmarkTips.map(t=>`<div style="display:flex;gap:10px;margin-bottom:10px;padding:10px;background:var(--bg3);border-radius:8px"><span style="font-size:1.2rem">${t.icon}</span><div><strong style="font-size:.85rem">${t.title}</strong><p style="font-size:.8rem;color:var(--text2);margin-top:3px">${t.desc}</p></div></div>`).join('')}
      </div>

      <!-- 최근 영상 -->
      <div class="card">
        <h3 style="margin-bottom:12px">📹 최근 업로드 영상</h3>
        <div class="grid-2">
          ${recentStats.slice(0,6).map(v=>`
            <div class="vid-card" onclick="openYT('${v.id}')">
              <img class="vid-thumb" src="${v.snippet.thumbnails?.medium?.url||''}" alt="" loading="lazy"/>
              <div class="vid-info">
                <div class="vid-title">${v.snippet.title}</div>
                <div class="vid-meta">👁 ${fmt(+v.statistics.viewCount||0)} &nbsp;❤️ ${fmt(+v.statistics.likeCount||0)}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    `;
    showSection('channel');
  }catch(e){
    res.innerHTML=`<p style="color:#ef5350">오류: ${e.message}</p>`;
  }
}

function gauge(label,pct,val){
  const hue=pct<40?0:pct<70?45:120;
  return `<div class="gauge-wrap">
    <div class="gauge-label"><span>${label}</span><span>${val}</span></div>
    <div class="gauge-bar"><div class="gauge-fill" style="width:${pct.toFixed(1)}%;background:hsl(${hue},80%,55%)"></div></div>
  </div>`;
}

function calcChannelAge(published){
  const ms=Date.now()-new Date(published).getTime();
  return ms/1000/60/60/24/7; /* weeks */
}

function extractHashtags(videos){
  const map={};
  videos.forEach(v=>{
    const matches=((v.snippet.description||'')+(v.snippet.title||'')).match(/#[\w가-힣]+/g)||[];
    matches.forEach(h=>{map[h]=(map[h]||0)+1;});
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10).map(e=>e[0]);
}

const CAT_NAMES={1:'영화/애니',2:'자동차',10:'음악',15:'반려동물',17:'스포츠',20:'게임',22:'블로그',23:'코미디',24:'엔터테인먼트',25:'뉴스',26:'생활정보',28:'과학기술'};
function extractCategories(videos){
  const map={};
  videos.forEach(v=>{
    const c=CAT_NAMES[v.snippet.categoryId]||`카테고리 ${v.snippet.categoryId}`;
    map[c]=(map[c]||0)+1;
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>`${e[0]} (${e[1]})`);
}

function analyzeTitlePatterns(videos){
  const titles=videos.map(v=>v.snippet.title||'');
  const hasNum=titles.filter(t=>/\d+/.test(t)).length;
  const hasQ=titles.filter(t=>/[?？]/.test(t)).length;
  const hasEmoji=titles.filter(t=>/\p{Emoji}/u.test(t)).length;
  const avgLen=titles.reduce((a,t)=>a+t.length,0)/Math.max(titles.length,1);
  return `숫자 포함: ${hasNum}/${titles.length}편 · 의문문 형식: ${hasQ}편 · 이모지 활용: ${hasEmoji}편 · 평균 제목 길이: ${avgLen.toFixed(0)}자.
    ${hasNum/titles.length>.5?'✅ 숫자 활용으로 클릭률 향상 중':'⚠️ 숫자(순위·비교·개수)를 제목에 추가하면 CTR 상승 효과'}.
    ${avgLen<30?'⚠️ 제목이 짧습니다 – 키워드를 더 추가하세요':'✅ 적절한 제목 길이'}.`;
}

/* ═══════════════════════════════════════════
   REVENUE CALCULATOR
═══════════════════════════════════════════ */
function calcRevenue(){
  const v=+document.getElementById('rViews').value||0;
  const rpm=+document.getElementById('rRpm').value||0;
  const sponsor=+document.getElementById('rSponsor').value||0;
  const adRev=v/1000*rpm;
  const total=adRev+sponsor;
  const annual=total*12;
  document.getElementById('revResult').innerHTML=`
    <div style="margin-top:16px;padding:16px;background:var(--bg3);border-radius:10px">
      <div style="font-size:.85rem;color:var(--text2);margin-bottom:6px">광고 수익 (월): <span style="color:var(--text)">${fmtMoney(adRev)}</span></div>
      <div style="font-size:.85rem;color:var(--text2);margin-bottom:6px">총 수익 (월): <span style="color:var(--text)">${fmtMoney(total)}</span></div>
      <div class="calc-result">${fmtMoney(annual)} / 년</div>
      <p style="font-size:.78rem;color:var(--text2);margin-top:8px">${annual>1e8?'🏆 상위 1% 수익 채널':'annual>3e7'?'🌟 우수 수익 구간':'💪 꾸준히 성장 중'}</p>
    </div>`;
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>{
    if(n.textContent.includes({hot:'인기',channel:'채널',revenue:'수익',tools:'도구',ideas:'아이디어',shop:'쇼핑',grades:'레벨'}[id]))
      n.classList.add('active');
  });
  document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}

function handleGlobalSearch(){
  const q=document.getElementById('globalSearch').value.trim();
  if(!q)return;
  document.getElementById('chInput').value=q;
  showSection('channel');
  analyzeChannel();
}
