<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YTAnalytics Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
:root{
  --bg0:#111118;--bg1:#18181f;--bg2:#22222e;--bg3:#2a2a38;
  --acc:#7c5cfc;--acc2:#a78bfa;--gold:#f59e0b;--red:#ef4444;--green:#22c55e;
  --text:#e8e8f0;--text2:#a0a0b8;--text3:#6b6b88;
  --border:rgba(255,255,255,.07);--card-bg:#1e1e2c;
  --sidebar:240px;--header:56px;--right:280px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;height:var(--header);background:rgba(17,17,24,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:200}
.logo{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#7c5cfc,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.hdr-search{flex:1;max-width:380px;position:relative}
.hdr-search input{width:100%;padding:8px 14px 8px 38px;border-radius:20px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:.85rem;outline:none}
.hdr-search::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.85rem}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.hdr-btn{padding:7px 14px;border-radius:16px;font-size:.78rem;font-weight:600;background:linear-gradient(135deg,var(--acc),#a78bfa);color:#fff;transition:.2s}
.hdr-btn:hover{opacity:.85}

/* LAYOUT */
.layout{display:flex;margin-top:var(--header);min-height:calc(100vh - var(--header))}
.sidebar{position:fixed;top:var(--header);left:0;bottom:0;width:var(--sidebar);background:var(--bg1);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;z-index:100}
.main-wrap{margin-left:var(--sidebar);margin-right:var(--right);flex:1;padding:20px;min-width:0}
.right-col{position:fixed;top:var(--header);right:0;bottom:0;width:var(--right);background:var(--bg1);border-left:1px solid var(--border);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}

/* SIDEBAR */
.nav-section{padding:12px 8px 4px;font-size:.7rem;color:var(--text3);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;margin:2px 8px;cursor:pointer;font-size:.88rem;transition:.15s;color:var(--text2)}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(124,92,252,.25),rgba(167,139,250,.1));color:var(--acc2);font-weight:700}
.nav-icon{font-size:1.1rem;width:22px;text-align:center}
.sidebar-ad{margin:auto 12px 12px;padding:10px;background:var(--bg2);border-radius:10px;border:1px solid var(--border);text-align:center;min-height:80px}

/* SECTION */
.section{display:none}
.section.active{display:block}
.top-ad{background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(245,158,11,.1));border:1px solid rgba(124,92,252,.2);border-radius:12px;padding:10px 16px;margin-bottom:16px;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center}
.section-title{font-size:1.2rem;font-weight:800;margin-bottom:16px;background:linear-gradient(135deg,var(--acc2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px}
.card-title{font-size:.95rem;font-weight:700;margin-bottom:12px;color:var(--text)}

/* ══════════════════════════════════════════
   ★ LEVEL CARD — 스파크 캔버스 + 텍스트 오버레이
══════════════════════════════════════════ */
.lv-row{display:flex;gap:16px;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap}

/* 스파크 캔버스 래퍼 */
.lv-spark-wrap{
  position:relative;
  width:200px;height:260px;
  flex-shrink:0;
  border-radius:16px;
  overflow:hidden;
  background:#000;
}
.lv-spark-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  display:block;
  border-radius:16px;
}
/* 텍스트는 캔버스 위 절대위치 */
.lv-text-overlay{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
  gap:4px;
  pointer-events:none;
  z-index:2;
  width:100%;
  text-align:center;
}
/* 행1: 레벨 번호 */
.lv-num-big{
  font-size:2.4rem;font-weight:900;
  line-height:1;letter-spacing:-.02em;
  color:#fff;
  paint-order:stroke fill;
}
/* 행2: 등급명 */
.lv-name-big{font-size:.9rem;font-weight:700;letter-spacing:.04em}
/* 행3: 상위 % */
.lv-pct-txt{font-size:.76rem;font-weight:600;opacity:.9}
/* 행4: 알고리즘 점수 */
.lv-algo-box{
  margin-top:2px;padding:4px 12px;border-radius:20px;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.12);
  font-size:.74rem;font-weight:700;color:var(--text);
  backdrop-filter:blur(6px);pointer-events:auto;
}

/* 등급표 */
.grade-mini-wrap{flex:1;min-width:220px}
.grade-mini-title{font-size:.82rem;font-weight:700;color:var(--text2);margin-bottom:8px}
.grade-mini-table{width:100%;border-collapse:collapse;font-size:.76rem}
.grade-mini-table th{padding:5px 8px;text-align:left;color:var(--text3);border-bottom:1px solid var(--border);font-weight:600;font-size:.7rem}
.grade-mini-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:.15s}
.grade-mini-table tr:hover td{background:rgba(255,255,255,.04)}
.grade-mini-table tr.cur-lv td{background:rgba(124,92,252,.15);font-weight:700}
.grade-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* CHANNEL INFO */
.ch-info-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.ch-info-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.ch-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--acc)}
.ch-title-wrap{flex:1}
.ch-title{font-size:1.05rem;font-weight:800;margin-bottom:2px}
.ch-handle{font-size:.78rem;color:var(--text3)}
.ch-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ch-stat{background:var(--bg2);border-radius:10px;padding:12px;border:1px solid var(--border);text-align:center}
.ch-stat-label{font-size:.68rem;color:var(--text3);margin-bottom:4px}
.ch-stat-val{font-size:1.05rem;font-weight:800;color:var(--text)}

/* CONTENT ANALYSIS */
.content-analysis-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.ca-section{margin-bottom:16px}
.ca-section:last-child{margin-bottom:0}
.ca-label{font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.ca-value{font-size:.88rem;color:var(--text2);line-height:1.7}
.ca-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ca-tag{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(124,92,252,.15);color:var(--acc2);border:1px solid rgba(124,92,252,.2)}
.ca-tag.green{background:rgba(34,197,94,.12);color:#4ade80;border-color:rgba(34,197,94,.2)}
.ca-tag.gold{background:rgba(245,158,11,.12);color:#fbbf24;border-color:rgba(245,158,11,.2)}
.ca-tag.red{background:rgba(239,68,68,.12);color:#f87171;border-color:rgba(239,68,68,.2)}
.viral-index-wrap{display:flex;align-items:center;gap:12px;margin-top:6px}
.viral-index-bar{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.viral-index-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc),var(--gold));transition:width 1s}
.viral-index-val{font-size:.82rem;font-weight:700;color:var(--gold);min-width:40px;text-align:right}
.format-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.format-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);font-size:.78rem;font-weight:600}

/* PROS/CONS */
.pros-cons-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.pros-card{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:12px;padding:14px}
.cons-card{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:14px}
.pros-card h4{color:var(--green);font-size:.85rem;margin-bottom:8px}
.cons-card h4{color:var(--red);font-size:.85rem;margin-bottom:8px}
.pros-card li,.cons-card li{font-size:.8rem;color:var(--text2);line-height:1.7;margin-left:14px}

/* HOT VIDEOS */
.hot-layout{display:flex;gap:16px}
.hot-sidebar-filters{width:155px;flex-shrink:0;display:flex;flex-direction:column;gap:3px}
.filter-group-label{font-size:.7rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:6px 4px 3px}
.type-btn,.cat-btn{display:block;width:100%;text-align:left;padding:8px 12px;border-radius:8px;font-size:.81rem;color:var(--text2);background:var(--bg2);border:1px solid transparent;transition:.15s;cursor:pointer;margin-bottom:3px}
.type-btn:hover,.cat-btn:hover{background:var(--bg3);color:var(--text)}
.type-btn.active,.cat-btn.active{background:rgba(124,92,252,.2);color:var(--acc2);border-color:rgba(124,92,252,.3);font-weight:700}
.hot-content{flex:1;min-width:0}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.vid-card{background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:.2s}
.vid-card:hover{transform:translateY(-3px);border-color:rgba(124,92,252,.3);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.vid-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#000}
.vid-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.vid-dur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;font-size:.7rem;padding:2px 5px;border-radius:4px}
.vid-shorts-badge{position:absolute;top:6px;left:6px;background:#ff0050;color:#fff;font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:10px}
.vid-info{padding:10px}
.vid-title{font-size:.82rem;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.vid-meta{font-size:.72rem;color:var(--text3)}
.viral-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden}
.viral-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--acc),var(--gold))}
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px}
.page-btn{padding:8px 16px;border-radius:8px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);font-size:.82rem;transition:.15s;cursor:pointer}
.page-btn:hover:not(:disabled){background:var(--acc);color:#fff}
.page-btn:disabled{opacity:.35;cursor:not-allowed}

/* REVENUE */
.rev-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.rev-inputs{display:flex;flex-direction:column;gap:14px}
.rev-item label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:6px;font-weight:600}
.gauge-wrap{position:relative;height:36px;cursor:pointer;user-select:none}
.gauge-track{position:absolute;top:50%;left:0;right:0;height:8px;transform:translateY(-50%);background:var(--bg3);border-radius:4px;overflow:hidden}
.gauge-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc),var(--gold));pointer-events:none}
.gauge-thumb{position:absolute;top:50%;width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--acc);transform:translate(-50%,-50%);box-shadow:0 2px 8px rgba(0,0,0,.4);pointer-events:none}
.gauge-value{font-size:.85rem;font-weight:700;color:var(--acc2);margin-top:4px}
.gauge-range{display:flex;justify-content:space-between;font-size:.67rem;color:var(--text3);margin-top:2px}
.rev-results{display:flex;flex-direction:column;gap:10px}
.rev-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rev-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.rev-card-label{font-size:.72rem;color:var(--text3);margin-bottom:6px}
.rev-card-val{font-size:1.3rem;font-weight:900;color:var(--gold)}
.rev-tip{background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.2);border-radius:10px;padding:12px;font-size:.8rem;color:var(--text2);line-height:1.6}

/* TOOLS */
.tools-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tool-tab{padding:6px 14px;border-radius:16px;font-size:.78rem;font-weight:600;background:var(--bg2);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:.15s}
.tool-tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.tool-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;gap:6px}
.tool-card:hover{border-color:var(--acc);transform:translateY(-2px)}
.tool-icon-img{width:36px;height:36px;border-radius:8px;object-fit:cover}
.tool-name{font-size:.82rem;font-weight:700}
.tool-desc{font-size:.7rem;color:var(--text3);line-height:1.4}
.tool-tag{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px}
.tool-tag.free{background:rgba(34,197,94,.15);color:var(--green)}
.tool-tag.premium{background:rgba(245,158,11,.15);color:var(--gold)}
.tool-tag.paid{background:rgba(239,68,68,.15);color:var(--red)}

/* AI IDEAS */
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.idea-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:.2s}
.idea-card:hover{border-color:var(--acc);transform:translateY(-2px)}
.idea-num{font-size:.7rem;color:var(--text3);margin-bottom:4px}
.idea-title{font-size:.9rem;font-weight:700;margin-bottom:6px}
.idea-hook{font-size:.78rem;color:var(--text2);line-height:1.5;margin-bottom:8px}
.idea-tags{display:flex;flex-wrap:wrap;gap:4px}
.idea-tag{font-size:.65rem;padding:2px 8px;border-radius:10px;background:rgba(124,92,252,.15);color:var(--acc2);font-weight:600}

/* SHOP */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.shop-card{background:#252535;border:1px solid rgba(124,92,252,.25);border-radius:14px;overflow:hidden;transition:.2s;display:flex;flex-direction:column;aspect-ratio:1/1}
.shop-card:hover{transform:translateY(-3px);border-color:var(--acc);box-shadow:0 8px 24px rgba(124,92,252,.2)}
.shop-card-inner{flex:1;display:flex;flex-direction:column;padding:12px;gap:5px;overflow:hidden}
.shop-emoji{font-size:2rem;text-align:center;margin-bottom:2px}
.shop-rank{font-size:.65rem;font-weight:700;color:var(--gold)}
.shop-name{font-size:.8rem;font-weight:700;color:var(--text);line-height:1.3;flex:1}
.shop-price{font-size:.9rem;font-weight:900;color:var(--gold)}
.shop-orig{font-size:.7rem;color:var(--text3);text-decoration:line-through}
.shop-disc{font-size:.7rem;font-weight:700;color:var(--red)}
.shop-btn{display:block;padding:9px;background:linear-gradient(135deg,#ff6600,#ff9900);color:#fff;font-size:.78rem;font-weight:700;text-align:center;border-top:1px solid rgba(255,255,255,.1);cursor:pointer;width:100%;white-space:nowrap}

/* RIGHT COL */
.right-ad-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;min-height:100px}
.right-ad-title{font-size:.72rem;color:var(--text3);margin-bottom:6px;font-weight:600}
.coupang-search{display:flex;flex-direction:column;gap:6px}
.coupang-input{padding:8px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:.8rem;outline:none}
.coupang-btn{padding:8px;border-radius:8px;background:linear-gradient(135deg,#ff6600,#ff9900);color:#fff;font-size:.8rem;font-weight:700;cursor:pointer}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg1);border-radius:16px;width:100%;max-width:780px;border:1px solid var(--border);overflow:hidden;position:relative}
.modal-close{position:absolute;top:10px;right:12px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,.15);transition:.15s}
.modal-close:hover{background:var(--red)}
.modal-player{position:relative;aspect-ratio:16/9}
.modal-player iframe{width:100%;height:100%;border:none;display:block}
.modal-info{padding:14px 16px}
.modal-title{font-size:.95rem;font-weight:700;margin-bottom:4px}
.modal-meta{font-size:.78rem;color:var(--text3);margin-bottom:10px}
.modal-ad{padding:0 16px 16px}
.tool-modal-box{background:var(--bg1);border-radius:16px;width:100%;max-width:480px;border:1px solid var(--border);padding:24px;position:relative}
.tool-modal-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.tool-modal-icon{width:56px;height:56px;border-radius:12px;object-fit:cover}
.tool-modal-name{font-size:1.1rem;font-weight:800}
.tool-modal-desc{font-size:.85rem;color:var(--text2);line-height:1.7;margin-bottom:16px}
.tool-modal-link{display:block;padding:12px;border-radius:10px;text-align:center;background:linear-gradient(135deg,var(--acc),#a78bfa);color:#fff;font-weight:700}
.idea-modal-box{background:var(--bg1);border-radius:16px;width:100%;max-width:600px;border:1px solid var(--border);padding:24px;position:relative;max-height:85vh;overflow-y:auto}
.copy-btn{margin-top:14px;padding:10px 20px;border-radius:8px;background:var(--bg3);color:var(--text);font-size:.82rem;cursor:pointer;border:1px solid var(--border);transition:.15s}
.copy-btn:hover{background:var(--acc);color:#fff}
.tag-pill{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(124,92,252,.15);color:var(--acc2)}

/* ══════════════════════════════════════════
   ★ SPARK PREVIEW MODAL
══════════════════════════════════════════ */
.spark-preview-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.92);z-index:3000;
  align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
}
.spark-preview-overlay.open{display:flex}
.sp-box{
  background:rgba(10,10,20,.96);border-radius:20px;
  padding:24px 32px;border:1px solid rgba(255,255,255,.1);
  display:flex;flex-direction:column;align-items:center;
  gap:10px;position:relative;min-width:220px;
}
.sp-close{position:absolute;top:12px;right:16px;font-size:1.2rem;color:var(--text2);cursor:pointer}
.sp-close:hover{color:var(--red)}

/* 스파크 미리보기 스테이지 */
.sp-stage{
  position:relative;
  width:200px;height:260px;
  border-radius:14px;
  overflow:hidden;
  background:#000;
}
.sp-stage canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  display:block;
}
/* 텍스트 오버레이 (미리보기) */
.sp-text{
  position:absolute;top:50%;left:50%;

  pointer-events:none;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;
}
.sp-lv-num{font-size:2.2rem;font-weight:900;color:#fff;paint-order:stroke fill;line-height:1}
.sp-lv-name{font-size:.88rem;font-weight:700}
.sp-lv-range{font-size:.7rem;color:rgba(255,255,255,.6);background:rgba(0,0,0,.55);padding:2px 10px;border-radius:10px;margin-top:2px}

/* 레벨 점프 버튼 */
.sp-jump-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:320px}
.sp-jump-btn{
  width:34px;height:34px;border-radius:50%;

  display:flex;align-items:center;justify-content:center;

}
.sp-jump-btn:hover{transform:scale(1.1)}
.sp-jump-btn.active{color:#000!important;transform:scale(1.15);}

/* 미리보기 네비 */
.sp-nav{display:flex;gap:10px;margin-top:4px}
.sp-nav-btn{padding:7px 18px;border-radius:10px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s}
.sp-nav-btn:hover{background:var(--acc);color:#fff}
.sp-nav-btn:disabled{opacity:.3;cursor:not-allowed}

/* POPUP */
.popup-ad-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center}

<script>
/* ══════════════════════════════════════
   CONFIG
══════════════════════════════════════ */
const API_KEYS = ['AIzaSyAYi9B4vIFjl75uYBS56GbTSMJfV_TLuzE','YOUR_API_KEY_2'];
const PC = 'AF8853448';
function getKey(){ return API_KEYS[0]; }

/* ══════════════════════════════════════
   GRADES  LV1–LV10
   색상: 회색→파랑→노랑→주황→오렌지→초록→빨강→핑크→보라→무지개
══════════════════════════════════════ */
const GRADES = [
  { lv:1,  name:'새싹',  min:0,  max:9,  color:'#9ca3af', rainbow:false },
  { lv:2,  name:'성장',  min:10, max:19, color:'#3b82f6', rainbow:false },
  { lv:3,  name:'활성',  min:20, max:29, color:'#eab308', rainbow:false },
  { lv:4,  name:'강자',  min:30, max:39, color:'#f97316', rainbow:false },
  { lv:5,  name:'유명',  min:40, max:49, color:'#fb923c', rainbow:false },
  { lv:6,  name:'파워',  min:50, max:59, color:'#22c55e', rainbow:false },
  { lv:7,  name:'전설',  min:60, max:69, color:'#ef4444', rainbow:false },
  { lv:8,  name:'초월',  min:70, max:79, color:'#ec4899', rainbow:false },
  { lv:9,  name:'신화',  min:80, max:89, color:'#a855f7', rainbow:false },
  { lv:10, name:'신',    min:90, max:100,color:'rainbow', rainbow:true  }
];

/* ══════════════════════════════════════
   ★ SPARK ENGINE
   빛기둥 없음 — 스파크 파티클만
   레벨이 낮을수록 약하고(1~3), 높을수록 강함(8~10)
══════════════════════════════════════ */
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

class Spark {
  constructor(x, y, lvIdx, t){
    const intensity = (lvIdx + 1) / 10;   // 0.1(LV1) ~ 1.0(LV10)
    const g = GRADES[lvIdx];

    // 속도: 레벨에 따라 강해짐
    const speed = (0.3 + Math.random() * 2.2) * (0.25 + intensity * 0.75);
    const angle = -Math.PI/2 + (-0.75 + Math.random() * 1.5) * Math.PI;

    this.x = x;
    this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - (0.6 + Math.random()) * intensity;
    this.life = 1;
    // 낮은 레벨: 빠르게 소멸
    this.decay = 0.022 + Math.random() * 0.025 - intensity * 0.010;
    // 크기: 레벨에 비례
    this.radius = 0.7 + Math.random() * 1.5 * intensity;
    this.rainbow = g.rainbow;
    this.baseColor = g.rainbow ? null : hexToRgb(g.color);
    // 궤적
    this.trail = [];
    this.trailLen = Math.floor(2 + intensity * 5);
    this.t0 = t;
  }

  getColor(t, alpha){
    if(this.rainbow){
      const h = ((t * 3 + this.x * 0.5) % 360);
      return `hsla(${h},100%,65%,${alpha})`;
    }
    const [r,g,b] = this.baseColor;
    return `rgba(${r},${g},${b},${alpha})`;
  }

  update(){
    this.trail.push({x:this.x, y:this.y});
    if(this.trail.length > this.trailLen) this.trail.shift();
    this.vy += 0.055;          // 중력
    this.vx *= 0.995;          // 마찰
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
    return this.life > 0;
  }

  draw(ctx, t, intensity){
    // 궤적
    for(let i = 1; i < this.trail.length; i++){
      const tf = i / this.trail.length;
      ctx.beginPath();
      ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
      ctx.lineTo(this.trail[i].x, this.trail[i].y);
      ctx.strokeStyle = this.getColor(t, tf * this.life * 0.5);
      ctx.lineWidth = this.radius * tf * 0.8;
      ctx.stroke();
    }

    // 외곽 글로우 (LV4 이상)
    if(intensity >= 0.4){
      const gr = ctx.createRadialGradient(
        this.x, this.y, 0,
        this.x, this.y, this.radius * 5
      );
      gr.addColorStop(0, this.getColor(t, this.life * 0.28));
      gr.addColorStop(1, this.getColor(t, 0));
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius * 5, 0, Math.PI * 2);
      ctx.fillStyle = gr;
      ctx.fill();
    }

    // 코어 스파크
    const gr2 = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, this.radius * 2.5
    );
    gr2.addColorStop(0, `rgba(255,255,240,${this.life})`);
    gr2.addColorStop(0.4, this.getColor(t, this.life * 0.9));
    gr2.addColorStop(1, this.getColor(t, 0));
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = gr2;
    ctx.fill();
  }
}

/* ══════════════════════════════════════
   SparkRenderer
   텍스트 엘리먼트 경계에서 스파크 방출
══════════════════════════════════════ */
class SparkRenderer {
  constructor(canvas, lvIdx){
    this.canvas  = canvas;
    this.ctx     = canvas.getContext('2d');
    this.lvIdx   = lvIdx;
    this.intensity = (lvIdx + 1) / 10;
    this.sparks  = [];
    this.t       = 0;
    this.raf     = null;
    this.running = false;
    this._resizeCanvas();
    // ResizeObserver 대신 단순 실행
  }

  _resizeCanvas(){
    const el = this.canvas.parentElement;
    if(!el) return;
    this.canvas.width  = el.offsetWidth  || 200;
    this.canvas.height = el.offsetHeight || 260;
  }

  _getEmitPoints(textEl){
    if(!textEl) return [{x: this.canvas.width/2, y: this.canvas.height/2}];
    const pr = this.canvas.parentElement.getBoundingClientRect();
    const tr = textEl.getBoundingClientRect();
    const ox = tr.left - pr.left;
    const oy = tr.top  - pr.top;
    const pts = [];
    const n = Math.ceil(4 + this.intensity * 10);
    for(let i = 0; i < n; i++){
      // 상단 엣지
      pts.push({ x: ox + Math.random() * tr.width, y: oy });
      // 좌우 엣지
      pts.push({ x: ox,             y: oy + Math.random() * tr.height });
      pts.push({ x: ox + tr.width,  y: oy + Math.random() * tr.height });
      // LV5 이상: 하단도 방출
      if(this.intensity >= 0.5){
        pts.push({ x: ox + Math.random() * tr.width, y: oy + tr.height });
      }
    }
    return pts;
  }

  start(textEl){
    if(this.running) return;
    this.running = true;
    this._resizeCanvas();

    const loop = () => {
      if(!this.running) return;
      this.t++;

      // 스파크 생성량 = 레벨에 따라 증가
      const spawnCount = Math.floor(1 + this.intensity * 16);
      const pts = this._getEmitPoints(textEl);

      for(let i = 0; i < spawnCount; i++){
        const p = pts[Math.floor(Math.random() * pts.length)];
        this.sparks.push(new Spark(p.x, p.y, this.lvIdx, this.t));
      }

      // 업데이트 & 제거
      this.sparks = this.sparks.filter(s => s.update());

      // 렌더
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.sparks.forEach(s => s.draw(this.ctx, this.t, this.intensity));

      this.raf = requestAnimationFrame(loop);
    };
    this.raf = requestAnimationFrame(loop);
  }

  stop(){
    this.running = false;
    if(this.raf){ cancelAnimationFrame(this.raf); this.raf = null; }
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this.sparks = [];
  }

  switchLevel(lvIdx){
    this.lvIdx     = lvIdx;
    this.intensity = (lvIdx + 1) / 10;
    this.sparks    = [];
  }
}

/* ══════════════════════════════════════
   텍스트 스타일 적용
   행1: LV번호 (흰색 + 레벨색 테두리)
   행2: 등급명 (레벨색)
   행3: 상위 %
   행4: 알고리즘 점수
══════════════════════════════════════ */
function applyLvTextStyle(lvIdx, numEl, nameEl, rankEl, scoreEl, scoreVal, subsText){
  const g = GRADES[lvIdx];
  const sw = (1 + lvIdx * 0.22).toFixed(2) + 'px';  // 테두리 두께

  if(g.rainbow){
    const rb = 'linear-gradient(90deg,#f00,#f80,#ff0,#0f0,#08f,#80f,#f00)';
    [numEl, nameEl].forEach(el => {
      if(!el) return;
      el.style.backgroundImage   = rb;
      el.style.webkitBackgroundClip = 'text';
      el.style.webkitTextFillColor  = 'transparent';
      el.style.backgroundSize    = '200% auto';
      el.style.animation         = 'rainbowShift 2s linear infinite';
    });
    if(numEl) numEl.style.webkitTextStroke = `${sw} transparent`;
  } else {
    const c = g.color;
    if(numEl){
      numEl.style.webkitTextStroke      = `${sw} ${c}`;
      numEl.style.backgroundImage       = 'none';
      numEl.style.webkitBackgroundClip  = '';
      numEl.style.webkitTextFillColor   = 'white';
      numEl.style.animation             = 'none';
    }
    if(nameEl){
      nameEl.style.color                = c;
      nameEl.style.backgroundImage      = 'none';
      nameEl.style.webkitBackgroundClip = '';
      nameEl.style.webkitTextFillColor  = '';
      nameEl.style.animation            = 'none';
    }
  }

  if(numEl)  numEl.textContent  = `LV.${g.lv}`;
  if(nameEl) nameEl.textContent = g.name;
  const c = g.rainbow ? '#ffd700' : g.color;
  if(rankEl){
    rankEl.textContent = `상위 ${100 - (lvIdx * 11)}%`;
    rankEl.style.color = c;
  }
  if(scoreEl){
    if(scoreVal !== undefined)
      scoreEl.textContent = `알고리즘 점수 ${scoreVal}점`;
    else if(subsText)
      scoreEl.textContent = subsText;
  }
}

}

/* ══════════════════════════════════════
   ★ SPARK PREVIEW MODAL
══════════════════════════════════════ */
let spRenderer = null, spIdx = 0;

function openSparkPreview(gi){
  spIdx = Math.max(0, Math.min(9, gi));
  document.getElementById('sparkPreview').classList.add('open');
  _buildSpJumpBtns();
  _renderSpPreview();
}

function closeSparkPreview(){
  document.getElementById('sparkPreview').classList.remove('open');
  if(spRenderer){ spRenderer.stop(); spRenderer = null; }
}

function spNavigate(d){
  spIdx = Math.max(0, Math.min(9, spIdx + d));
  _renderSpPreview();
  _updateSpJumpBtns();
}

function _buildSpJumpBtns(){
  const row = document.getElementById('spJumpRow');
  row.innerHTML = GRADES.map((g, i) => {
    const c = g.rainbow ? '#ffd700' : g.color;
    return `<button class="sp-jump-btn ${i === spIdx ? 'active' : ''}"
      id="spjb-${i}"
      style="${i === spIdx
        ? `background:${c};border-color:${c};color:#000`
        : `border-color:${c}55;color:${c}`}"
      onclick="spJump(${i})">L${g.lv}</button>`;
  }).join('');
}

function _updateSpJumpBtns(){
  GRADES.forEach((g, i) => {
    const btn = document.getElementById(`spjb-${i}`);
    if(!btn) return;
    const c = g.rainbow ? '#ffd700' : g.color;
    btn.className = `sp-jump-btn ${i === spIdx ? 'active' : ''}`;
    btn.style.cssText = i === spIdx
      ? `background:${c};border-color:${c};color:#000`
      : `border-color:${c}55;color:${c}`;
  });
}

function spJump(idx){
  spIdx = idx;
  _renderSpPreview();
  _updateSpJumpBtns();
}

function _renderSpPreview(){
  const g = GRADES[spIdx];
  const c = g.rainbow ? '#ffd700' : g.color;

  // 캔버스
  const canvas = document.getElementById('spCanvas');
  const stage  = document.getElementById('spStage');

  // 텍스트 오버레이 (행1~4)
  const sw = (1 + spIdx * 0.22).toFixed(2) + 'px';
  let numStyle, nameStyle;
  if(g.rainbow){
    const rb = 'linear-gradient(90deg,#f00,#f80,#ff0,#0f0,#08f,#80f,#f00)';
    numStyle  = `background:${rb};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:rainbowShift 2s linear infinite;font-size:2.2rem;font-weight:900;line-height:1;paint-order:stroke fill;`;
    nameStyle = `background:${rb};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:rainbowShift 2s linear infinite;font-size:.88rem;font-weight:700;`;
  } else {
    numStyle  = `color:white;-webkit-text-stroke:${sw} ${c};font-size:2.2rem;font-weight:900;line-height:1;paint-order:stroke fill;`;
    nameStyle = `color:${c};font-size:.88rem;font-weight:700;`;
  }

  document.getElementById('spText').innerHTML = `
    <div class="sp-lv-num" style="${numStyle}">LV.${g.lv}</div>
    <div class="sp-lv-name" style="${nameStyle}">${g.name}</div>
    <div class="sp-lv-range" style="color:rgba(255,255,255,.7)">점수 ${g.min}–${g.max}</div>`;

  // 정보
  document.getElementById('spInfo').innerHTML =
    `<span style="color:${c};font-weight:700">${g.name}</span>
     &nbsp;|&nbsp; 알고리즘 점수 <strong>${g.min}–${g.max}</strong>`;

  // 네비
  document.getElementById('spIndicator').textContent = `${spIdx+1}/10`;
  document.getElementById('spPrev').disabled = spIdx === 0;
  document.getElementById('spNext').disabled = spIdx === 9;

  // 렌더러 교체
  if(!spRenderer){
    spRenderer = new SparkRenderer(canvas, spIdx);
  } else {
    spRenderer.stop();
    spRenderer.canvas    = canvas;
    spRenderer.ctx       = canvas.getContext('2d');
    spRenderer.switchLevel(spIdx);
    spRenderer.running   = false;
  }

  // canvas 크기를 stage에 맞춤
  spRenderer.canvas.width  = stage.offsetWidth  || 200;
  spRenderer.canvas.height = stage.offsetHeight || 260;

  const numEl = document.getElementById('spText').querySelector('.sp-lv-num');
  setTimeout(() => spRenderer.start(numEl), 60);
}

/* ══════════════════════════════════════
   CHANNEL ANALYSIS
══════════════════════════════════════ */
function hashScore(subs, views, vids){
  return Math.min(99, Math.max(0,
    Math.floor(((subs * 1.1 + views * 0.7 + vids * 3.3) % 1000) % 100)
  ));
}
function getLv(sc){ return GRADES.find(g => sc >= g.min && sc <= g.max) || GRADES[0]; }
function getGradeIdx(g){ return GRADES.indexOf(g); }

async function analyzeChannel(){
  const raw = document.getElementById('chInput').value.trim();
  if(!raw){ alert('채널 URL 또는 핸들을 입력하세요'); return; }
  const box = document.getElementById('chResult');
  box.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>채널 정보 로딩 중…</span></div>';
  if(mainSpark){ mainSpark.stop(); mainSpark = null; }

  let handle = raw.replace(/^https?:\/\/(www\.)?youtube\.com\//,'')
                   .replace(/^@/,'').split('/')[0].split('?')[0];

  const doRender = (snippet, stats) => {
    const subs  = parseInt(stats.subscriberCount || 0);
    const views = parseInt(stats.viewCount || 0);
    const vids  = parseInt(stats.videoCount || 0);
    const score = hashScore(subs, views, vids);
    const g     = getLv(score);
    const gi    = getGradeIdx(g);

    box.innerHTML = `
      <div class="lv-row">
        ${buildLvCardHtml()}
        ${buildGradeTable(g.lv)}
      </div>
      ${buildChInfoCard(snippet, stats)}
      ${buildContentAnalysis(snippet, stats)}
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">🔍 강점 · 개선점</div>
        ${buildProsCons(stats, snippet.description || '')}
      </div>`;

    requestAnimationFrame(() => {
      const canvas = document.getElementById('mainSparkCanvas');
      if(!canvas) return;
      // 캔버스 크기를 래퍼에 맞춤
      const wrap = document.getElementById('lvSparkWrap');
      canvas.width  = wrap.offsetWidth  || 200;
      canvas.height = wrap.offsetHeight || 260;
      startMainSpark(canvas, gi, score);
    });
    showPopupAd();
  };

  try{
    const sr = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(handle)}&maxResults=1&key=${getKey()}`
    );
    const sd = await sr.json();
    if(!sd.items?.length) throw new Error('채널을 찾을 수 없습니다');
    const chId = sd.items[0].id.channelId;
    const cr = await fetch(
      `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${chId}&key=${getKey()}`
    );
    const cd = await cr.json();
    if(!cd.items?.length) throw new Error('채널 정보 없음');
    doRender(cd.items[0].snippet || {}, cd.items[0].statistics || {});
  } catch(e){
    box.innerHTML = `<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:.8rem;color:var(--gold)">⚠️ API 오류 — 데모 데이터 표시 (${esc(e.message)})</div>`;
    const demoSnippet = {
      title:'데모 크리에이터', customUrl:'demochannel', country:'KR',
      publishedAt:'2022-03-15T00:00:00Z',
      description:'#유튜브 #크리에이터 영상 제작 팁을 공유합니다.',
      thumbnails:{default:{url:''}}
    };
    const demoStats = { subscriberCount:'82000', viewCount:'4200000', videoCount:'87' };

    const score = 45, g = getLv(score), gi = getGradeIdx(g);
    const div = document.createElement('div');
    box.appendChild(div);
    div.innerHTML = `
      <div class="lv-row">
        ${buildLvCardHtml()}
        ${buildGradeTable(g.lv)}
      </div>
      ${buildChInfoCard(demoSnippet, demoStats)}
      ${buildContentAnalysis(demoSnippet, demoStats)}
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">🔍 강점 · 개선점</div>
        ${buildProsCons(demoStats, demoSnippet.description)}
      </div>`;

    requestAnimationFrame(() => {
      const canvas = document.getElementById('mainSparkCanvas');
      if(!canvas) return;
      const wrap = document.getElementById('lvSparkWrap');
      canvas.width  = wrap.offsetWidth  || 200;
      canvas.height = wrap.offsetHeight || 260;
      startMainSpark(canvas, gi, score);
    });
  }
}

/* ══════════════════════════════════════
   CONTENT ANALYSIS
══════════════════════════════════════ */
function buildContentAnalysis(snippet, stats){
  const subs  = parseInt(stats.subscriberCount || 0);
  const views = parseInt(stats.viewCount || 0);
  const vids  = parseInt(stats.videoCount || 0);
  const desc  = snippet.description || '';
  const title = snippet.title || '';

  const formats = [];
  let formatDesc = '';
  if(vids > 0 && views/vids > 50000){
    formats.push({icon:'🎬', label:'롱폼 중심'});
    formatDesc = '평균 조회수가 높고 영상 제작 빈도로 보아 롱폼(5분 이상) 심층 콘텐츠를 주력으로 제작합니다.';
  } else if(vids > 200){
    formats.push({icon:'⚡', label:'쇼츠 활발'});
    formatDesc = '영상 수가 많고 업로드 주기가 짧아 쇼츠 및 클립형 단편 콘텐츠를 활발히 활용합니다.';
  } else {
    formats.push({icon:'🎯', label:'혼합 포맷'});
    formatDesc = '롱폼과 쇼츠를 혼합하여 다양한 시청자층을 공략하는 멀티 포맷 전략을 사용합니다.';
  }
  if(desc.includes('#') || title.includes('#')) formats.push({icon:'#️⃣', label:'해시태그 SEO'});
  if(subs > 100000) formats.push({icon:'🤝', label:'협찬·콜라보'});

  const viralScore = Math.min(100, Math.round(
    (subs/100000)*20 + (views/5000000)*30 + (vids>50?20:10) + (views/Math.max(vids,1)/30000)*30
  ));
  let viralMethod = '';
  if(viralScore >= 70)      viralMethod = '알고리즘 추천 + SNS 공유가 주요 바이럴 경로입니다. 높은 클릭률(CTR)과 시청 유지율로 유튜브 홈 피드에 자주 노출됩니다.';
  else if(viralScore >= 40) viralMethod = '주로 구독자 기반 유입과 연관 영상 노출로 성장하고 있습니다.';
  else                       viralMethod = '현재 초기 성장 단계로, 검색 트래픽과 추천 알고리즘을 통해 유입이 발생합니다.';

  const stratTags = [];
  if(views/Math.max(vids,1) > 100000) stratTags.push({label:'고조회 집중형', cls:'green'});
  if(vids > 100) stratTags.push({label:'양산형 업로드', cls:''});
  if(subs > 0 && views/subs > 20) stratTags.push({label:'높은 구독 효율', cls:'green'});
  if(subs > 500000) stratTags.push({label:'메가 채널', cls:'gold'});
  else if(subs > 100000) stratTags.push({label:'중견 채널', cls:'gold'});
  else if(subs > 10000)  stratTags.push({label:'성장 채널', cls:''});
  else stratTags.push({label:'초기 채널', cls:'red'});
  if(desc.length > 200) stratTags.push({label:'정보성 설명', cls:'green'});

  let audience = '';
  if(title.match(/게임|게이밍|플레이|리뷰/i)||desc.match(/게임/))       audience='🎮 게이머 / 10–25세 남성 중심';
  else if(title.match(/요리|먹방|레시피/i)||desc.match(/요리|음식/))    audience='🍳 음식 관심층 / 20–40대 전 연령';
  else if(title.match(/뷰티|메이크업|화장/i))                           audience='💄 뷰티 관심층 / 15–35세 여성 중심';
  else if(title.match(/IT|테크|기술|코딩/i)||desc.match(/IT|기술/))     audience='💻 IT·테크 관심층 / 20–35세';
  else if(title.match(/교육|공부|강의|수업/i))                          audience='📚 학습 목적 시청자 / 10–30대';
  else if(subs > 200000)                                                audience='🌐 다양한 연령층 / 폭넓은 관심사';
  else                                                                   audience='🔍 분석 중 — 더 많은 영상 데이터 필요';

  const formatChips  = formats.map(f => `<div class="format-chip">${f.icon} ${f.label}</div>`).join('');
  const stratTagsHtml = stratTags.map(t => `<span class="ca-tag ${t.cls}">${t.label}</span>`).join('');

  return `
  <div class="content-analysis-card">
    <div class="card-title">🔬 콘텐츠 분석</div>
    <div class="ca-section">
      <div class="ca-label">📹 제작 형식</div>
      <div class="ca-value">${formatDesc}</div>
      <div class="format-chips">${formatChips}</div>
    </div>
    <div class="ca-section">
      <div class="ca-label">🚀 바이럴 방식</div>
      <div class="ca-value">${viralMethod}</div>
      <div class="viral-index-wrap">
        <span style="font-size:.72rem;color:var(--text3)">바이럴 지수</span>
        <div class="viral-index-bar"><div class="viral-index-fill" style="width:${viralScore}%"></div></div>
        <div class="viral-index-val">${viralScore}</div>
      </div>
    </div>
    <div class="ca-section">
      <div class="ca-label">🎯 예상 타깃 시청자</div>
      <div class="ca-value">${audience}</div>
    </div>
    <div class="ca-section">
      <div class="ca-label">📌 채널 전략 키워드</div>
      <div class="ca-tags">${stratTagsHtml}</div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════
   PROS / CONS
══════════════════════════════════════ */
function buildProsCons(stats, desc){
  const subs  = parseInt(stats.subscriberCount || 0);
  const views = parseInt(stats.viewCount || 0);
  const vids  = parseInt(stats.videoCount || 0);
  const hashtags = (desc.match(/#\w+/g) || []).length;
  const pros = [], cons = [];
  if(subs >= 10000)  pros.push('구독자 1만명 이상 — 탄탄한 팬층 확보');
  else               cons.push('구독자 1만명 미만 — 홍보·콜라보 전략 필요');
  if(vids >= 50)     pros.push('영상 50개 이상 — 풍부한 콘텐츠 라이브러리');
  else               cons.push('영상 수 부족 — 콘텐츠 적립이 필요합니다');
  const avg = vids > 0 ? views/vids : 0;
  if(avg >= 10000)   pros.push('영상당 평균 10K+ 조회 — 높은 콘텐츠 파워');
  else               cons.push('영상당 평균 조회 낮음 — 썸네일·제목 최적화 필요');
  if(desc.length >= 100) pros.push('채널 설명 충분 — 검색 노출에 유리');

  else               cons.push('해시태그 부족 — 영상별 3–5개 추가 권장');

  <div class="pros-cons-grid">

}

const CATS=[{id:'0',name:'전체'},{id:'10',name:'음악'},{id:'20',name:'게임'},{id:'22',name:'인물/블로그'},{id:'23',name:'코미디'},{id:'24',name:'엔터'},{id:'25',name:'뉴스'},{id:'26',name:'스타일'},{id:'27',name:'교육'},{id:'28',name:'과학/기술'}];
let curCat='0',curType='all',curPage=0;
const PAGE_SIZE=12;
let allVideos=[],filteredVideos=[];

function buildCatList(){ document.getElementById('catList').innerHTML=CATS.map(c=>`<button class="cat-btn ${c.id===curCat?'active':''}" onclick="setCat('${c.id}',this)">${c.name}</button>`).join(''); }
function setCat(id,el){ curCat=id;curPage=0; document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); loadHotVideos(); }
function setType(t,el){ curType=t;curPage=0; document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); applyFilter(); }
async function loadHotVideos(){
  const grid=document.getElementById('videoGrid');
  grid.innerHTML='<div class="loading-spinner"><div class="spinner"></div><span>불러오는 중…</span></div>';
  try{
    const cp=curCat!=='0'?`&videoCategoryId=${curCat}`:'';
    const res=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=50&regionCode=KR${cp}&key=${getKey()}`);
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    allVideos=data.items||[]; applyFilter();
  }catch(e){ grid.innerHTML=`<div class="empty-msg">⚠️ 영상 로드 실패: ${esc(e.message)}</div>`; }
}
function isShorts(v){ const d=v.contentDetails?.duration||''; const m=d.match(/PT(?:(\d+)M)?(?:(\d+)S)?/); if(!m)return false; return parseInt(m[1]||0)===0&&parseInt(m[2]||0)<=60; }
function applyFilter(){ filteredVideos=curType==='shorts'?allVideos.filter(isShorts):curType==='long'?allVideos.filter(v=>!isShorts(v)):[...allVideos]; curPage=0; renderPage(); }
function fmtDur(d){ const m=d.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/); if(!m)return''; const h=parseInt(m[1]||0),mn=parseInt(m[2]||0),s=parseInt(m[3]||0); return h>0?`${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${mn}:${String(s).padStart(2,'0')}`; }
function renderPage(){
  const grid=document.getElementById('videoGrid');
  const total=Math.ceil(filteredVideos.length/PAGE_SIZE)||1;
  const slice=filteredVideos.slice(curPage*PAGE_SIZE,(curPage+1)*PAGE_SIZE);
  document.getElementById('pageInfo').textContent=`${curPage+1} / ${total}`;
  document.getElementById('prevBtn').disabled=curPage===0;
  document.getElementById('nextBtn').disabled=curPage>=total-1;
  if(!slice.length){grid.innerHTML='<div class="empty-msg">해당 조건의 영상이 없습니다</div>';return;}
  grid.innerHTML=slice.map(v=>{
    const s=v.snippet||{},st=v.statistics||{};
    const views=parseInt(st.viewCount||0),likes=parseInt(st.likeCount||0);
    const viral=Math.min(100,Math.round((views/500000)*40+(likes/10000)*60));
    const thumb=s.thumbnails?.medium?.url||'';
    const shorts=isShorts(v), dur=fmtDur(v.contentDetails?.duration||'');
    const vid=esc(v.id),title=esc(s.title||''),ch=esc(s.channelTitle||''),date=esc((s.publishedAt||'').slice(0,10));
    return `<div class="vid-card" onclick="openVidModal('${vid}','${title}','${ch}','${date}')">
      <div class="vid-thumb"><img src="${esc(thumb)}" alt="" onerror="this.style.background='#333'">
        ${shorts?'<span class="vid-shorts-badge">Shorts</span>':''}
        ${dur?`<span class="vid-dur">${dur}</span>`:''}
      </div>
      <div class="vid-info">
        <div class="vid-title">${title}</div>
        <div class="vid-meta">${ch} · ${fmt(views)} 조회 · ${date}</div>
        <div class="viral-bar"><div class="viral-fill" style="width:${viral}%"></div></div>
        <div style="font-size:.67rem;color:var(--text3);margin-top:2px">바이럴 지수 ${viral}</div>
      </div>
    </div>`;
  }).join('');
}
function changePage(d){ const total=Math.ceil(filteredVideos.length/PAGE_SIZE)||1; curPage=Math.max(0,Math.min(total-1,curPage+d)); renderPage(); }

function openVidModal(vid,title,ch,date){
  document.getElementById('vidFrame').src=`https://www.youtube.com/embed/${vid}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3`;
  document.getElementById('vidTitle').textContent=decodeHtml(title);
  document.getElementById('vidMeta').textContent=decodeHtml(ch)+' · '+date;
  document.getElementById('vidModal').classList.add('open');
  try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
}
function closeVidModal(){ document.getElementById('vidModal').classList.remove('open'); document.getElementById('vidFrame').src=''; }
document.getElementById('vidModal').addEventListener('click',function(e){if(e.target===this)closeVidModal();});

/* ══════════════════════════════════════
   REVENUE CALCULATOR
══════════════════════════════════════ */
const REV_INPUTS=[
  {id:'views', label:'월간 조회수',     min:1000,  max:10000000,step:10000, val:100000,unit:'회'},
  {id:'rpm',   label:'RPM (광고단가)', min:0.5,   max:20,      step:0.1,  val:2.5,   unit:'$'},
  {id:'sponsor',label:'협찬 수입(월)', min:0,     max:10000000,step:100000,val:0,     unit:'원'},
];
let revVals={};
REV_INPUTS.forEach(r=>{ revVals[r.id]=r.val; });
function initRevenue(){
  document.getElementById('revInputsBox').innerHTML=REV_INPUTS.map(r=>`
    <div class="rev-item">
      <label>${r.label}</label>
      <div class="gauge-wrap" id="gw-${r.id}"
           onpointerdown="startGauge(event,'${r.id}')"
           onpointermove="moveGauge(event,'${r.id}')"
           onpointerup="endGauge(event,'${r.id}')"
           onpointercancel="endGauge(event,'${r.id}')">
        <div class="gauge-track"><div class="gauge-fill" id="gf-${r.id}" style="width:${gaugePct(r.id,r)}%"></div></div>
        <div class="gauge-thumb" id="gt-${r.id}" style="left:${gaugePct(r.id,r)}%"></div>
      </div>
      <div class="gauge-value" id="gv-${r.id}">${fmtRev(r.id,revVals[r.id])}</div>
      <div class="gauge-range"><span>${fmtRev(r.id,r.min)}</span><span>${fmtRev(r.id,r.max)}</span></div>
    </div>`).join('');
  calcRevenue();
}
const gaugeActive={};
function gaugePct(id,r){ const ri=r||REV_INPUTS.find(x=>x.id===id); return Math.round(((revVals[id]-ri.min)/(ri.max-ri.min))*100); }
function fmtRev(id,v){ if(id==='rpm')return'$'+Number(v).toFixed(2); if(id==='sponsor')return fmtMoney(v); return fmt(v)+'회'; }
function startGauge(e,id){ e.currentTarget.setPointerCapture(e.pointerId); gaugeActive[id]=true; updateGauge(e,id); }
function moveGauge(e,id){ if(gaugeActive[id])updateGauge(e,id); }
function endGauge(e,id){ gaugeActive[id]=false; }
function updateGauge(e,id){
  const ri=REV_INPUTS.find(x=>x.id===id);
  const rect=e.currentTarget.querySelector('.gauge-track').getBoundingClientRect();
  let pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  let val=Math.round((ri.min+(ri.max-ri.min)*pct)/ri.step)*ri.step;
  val=Math.max(ri.min,Math.min(ri.max,val));
  revVals[id]=val;
  const p=Math.round(pct*100);
  document.getElementById('gf-'+id).style.width=p+'%';
  document.getElementById('gt-'+id).style.left=p+'%';
  document.getElementById('gv-'+id).textContent=fmtRev(id,val);
  calcRevenue();
}
function calcRevenue(){
  const views=revVals['views']||0,rpm=revVals['rpm']||0,sponsor=revVals['sponsor']||0;
  const adRev=Math.round((views/1000)*rpm*1350);
  const total=adRev+sponsor, annual=total*12;
  document.getElementById('revCards').innerHTML=`
    <div class="rev-card"><div class="rev-card-label">📺 광고 수익(월)</div><div class="rev-card-val">${fmtMoney(adRev)}</div></div>
    <div class="rev-card"><div class="rev-card-label">🤝 협찬 포함(월)</div><div class="rev-card-val">${fmtMoney(total)}</div></div>
    <div class="rev-card"><div class="rev-card-label">📅 연간 예상</div><div class="rev-card-val">${fmtMoney(annual)}</div></div>
    <div class="rev-card"><div class="rev-card-label">👁 조회당 수익</div><div class="rev-card-val">${views>0?(total/views*100).toFixed(2)+'원':'—'}</div></div>`;
  document.getElementById('revTip').textContent=total<100000?'💡 초기 단계입니다. 꾸준한 업로드와 썸네일 최적화로 성장하세요!':total<500000?'📈 좋은 출발! RPM 높은 카테고리(재테크·IT)로 확장을 고려하세요.':total<2000000?'🚀 안정적 수익 구조! 멤버십·협찬으로 다각화를 추천합니다.':'🏆 훌륭한 채널! 강의·굿즈·컨설팅으로 브랜드를 확장하세요.';
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n){ if(n>=100000000)return(n/100000000).toFixed(1)+'억'; if(n>=10000)return(n/10000).toFixed(1)+'만'; if(n>=1000)return(n/1000).toFixed(1)+'천'; return String(n); }
function fmtMoney(n){ return n.toLocaleString('ko-KR')+'원'; }
function decodeHtml(s){ const t=document.createElement('textarea');t.innerHTML=s;return t.value; }

}
