<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>🔥 떡상레이더 - 유튜브 급상승 분석</title>
<meta name="description" content="유튜브 급상승 영상 실시간 분석, 채널 레벨 측정, 키워드 추천">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4409875039737384" crossorigin="anonymous"></script>
<style>
:root {
  --red: #ff0000;
  --red2: #ff4444;
  --bg: #0a0a0a;
  --card: #141414;
  --card2: #1a1a1a;
  --border: #2a2a2a;
  --text: #ffffff;
  --sub: #aaaaaa;
  --tab-h: 56px;
  --header-h: 56px;
  --bottom-h: 64px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; padding-bottom:calc(var(--bottom-h) + 20px); }

/* ── 상단 헤더 고정 ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}
.logo { display:flex; align-items:center; gap:8px; }
.logo-icon { font-size:22px; }
.logo-text { font-size:16px; font-weight:800; }
.logo-text span { color:var(--red); }
.live-badge {
  background:var(--red);
  color:#fff;
  font-size:10px;
  font-weight:700;
  padding:2px 7px;
  border-radius:20px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.refresh-btn {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size:14px;
  padding:7px 12px;
  border-radius:8px;
  cursor:pointer;
  display:flex; align-items:center; gap:5px;
}
.refresh-btn:active { transform:scale(.95); }

/* ── 상단 탭 고정 ── */
.tab-bar {
  position: sticky;
  top: var(--header-h);
  z-index: 99;
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  height: var(--tab-h);
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display:none; }
.tab-btn {
  flex: 1;
  min-width: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 14px;
  font-weight: 600;
  color: var(--sub);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  padding: 0 8px;
}
.tab-btn.active {
  color: var(--text);
  border-bottom: 2px solid var(--red);
}
.tab-btn .tab-icon { font-size:18px; }

/* ── 하단 네비게이션 바 (모바일 앱 스타일) ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  height: var(--bottom-h);
  background: rgba(14,14,14,0.98);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bottom-nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 0;
  transition: all .2s;
}
.bottom-nav-btn .nav-icon { font-size:22px; line-height:1; }
.bottom-nav-btn .nav-label { font-size:10px; color:var(--sub); font-weight:600; }
.bottom-nav-btn.active .nav-icon { transform:scale(1.15); }
.bottom-nav-btn.active .nav-label { color:var(--red); }
.bottom-nav-btn:active { transform:scale(.9); }

/* ── 섹션 ── */
.section { display:none; padding: 16px 0 8px; }
.section.active { display:block; }

/* ── 카테고리 스크롤 ── */
.cat-wrap { overflow-x:auto; scrollbar-width:none; padding:0 16px 12px; }
.cat-wrap::-webkit-scrollbar { display:none; }
.cat-scroll { display:flex; gap:8px; }
.cat-btn {
  flex-shrink:0;
  padding:6px 14px;
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--sub);
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
}
.cat-btn.active { background:var(--red); border-color:var(--red); color:#fff; }

/* ── 정렬 바 ── */
.sort-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px 10px;
}
.result-info { font-size:12px; color:var(--sub); }
.sort-tabs { display:flex; gap:6px; }
.sort-btn {
  padding:5px 10px; border-radius:6px;
  border:1px solid var(--border);
  background:var(--card); color:var(--sub);
  font-size:11px; font-weight:600; cursor:pointer;
}
.sort-btn.active { background:var(--red); border-color:var(--red); color:#fff; }

/* ── 영상 카드 ── */
.card-list { padding:0 12px; display:flex; flex-direction:column; gap:10px; }
.v-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s, border-color .15s;
}
.v-card:active { transform:scale(.98); border-color:#444; }
.thumb-wrap { position:relative; width:100%; aspect-ratio:16/9; overflow:hidden; }
.thumb-wrap img { width:100%; height:100%; object-fit:cover; }
.rank-badge {
  position:absolute; top:8px; left:8px;
  background:rgba(0,0,0,.8); color:#fff;
  font-size:11px; font-weight:800;
  padding:2px 7px; border-radius:6px;
}
.hot-badge {
  position:absolute; top:8px; right:8px;
  background:var(--red); color:#fff;
  font-size:10px; font-weight:800;
  padding:2px 8px; border-radius:20px;
  animation:pulse 1.5s infinite;
}
.level-badge-card {
  position:absolute; bottom:8px; right:8px;
  font-size:13px; font-weight:800;
  padding:2px 8px; border-radius:8px;
  border:1px solid rgba(255,255,255,.3);
}
.card-body { padding:12px; }
.card-title { font-size:14px; font-weight:700; line-height:1.4; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-meta { display:flex; gap:8px; flex-wrap:wrap; }
.meta-item { font-size:11px; color:var(--sub); display:flex; align-items:center; gap:3px; }
.velocity-bar { margin-top:8px; }
.vel-label { font-size:10px; color:var(--sub); margin-bottom:3px; }
.vel-track { height:4px; background:#2a2a2a; border-radius:2px; overflow:hidden; }
.vel-fill { height:100%; border-radius:2px; transition:width .5s; }

/* ── 인피드 광고 ── */
.ad-inline {
  margin:8px 12px;
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  text-align:center;
}
.ad-top { padding:4px 12px; }

/* ── 채널 레벨 섹션 ── */
.channel-search-box { padding:0 16px 16px; }
.ch-input-wrap { display:flex; gap:8px; }
.ch-input {
  flex:1; padding:12px 16px;
  background:var(--card2); border:1px solid var(--border);
  color:var(--text); border-radius:12px; font-size:15px;
}
.ch-input:focus { outline:none; border-color:var(--red); }
.ch-search-btn {
  padding:12px 18px;
  background:var(--red); color:#fff;
  border:none; border-radius:12px;
  font-size:15px; font-weight:700; cursor:pointer;
}
.ch-search-btn:active { transform:scale(.95); }

/* ── 레벨 쇼케이스 ── */
.level-showcase {
  margin:0 16px 16px;
  border-radius:16px;
  padding:24px 16px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.level-number { font-size:56px; font-weight:900; line-height:1; }
.level-name { font-size:22px; font-weight:800; margin-top:4px; }
.level-desc { font-size:13px; color:rgba(255,255,255,.7); margin-top:8px; line-height:1.5; }
.level-gauge { margin:16px 0; }
.gauge-track { height:8px; background:rgba(255,255,255,.15); border-radius:4px; overflow:hidden; }
.gauge-fill { height:100%; border-radius:4px; transition:width 1s; }
.gauge-label { font-size:11px; color:rgba(255,255,255,.6); margin-top:4px; text-align:right; }

/* ── 채널 스탯 그리드 ── */
.ch-stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:0 16px 12px; }
.ch-stat-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:14px;
  text-align:center;
}
.stat-icon { font-size:22px; margin-bottom:4px; }
.stat-val { font-size:18px; font-weight:800; }
.stat-label { font-size:11px; color:var(--sub); margin-top:2px; }

/* ── 점수 세부 ── */
.score-section { padding:0 16px 16px; }
.score-title { font-size:15px; font-weight:700; margin-bottom:10px; }
.score-item { margin-bottom:10px; }
.score-header { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
.score-bar-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:3px; transition:width 1s; }

/* ── 레벨 테이블 ── */
.level-table { margin:0 16px 16px; border-radius:12px; overflow:hidden; border:1px solid var(--border); }
.lv-row { display:grid; grid-template-columns:50px 1fr auto; align-items:center; padding:10px 14px; gap:10px; border-bottom:1px solid var(--border); }
.lv-row:last-child { border-bottom:none; }
.lv-em { font-size:20px; }
.lv-info .lv-name { font-size:13px; font-weight:700; }
.lv-info .lv-range { font-size:11px; color:var(--sub); margin-top:2px; }
.lv-badge-small { font-size:11px; font-weight:800; padding:2px 8px; border-radius:6px; }

/* ── 레벨 glow 효과 ── */
.lv-glow-1 { background:linear-gradient(135deg,#1a1a2e,#16213e); }
.lv-glow-2 { background:linear-gradient(135deg,#1a2a1a,#1e3a1e); }
.lv-glow-3 { background:linear-gradient(135deg,#2a1a0a,#3a2a0a); box-shadow:0 0 20px rgba(150,100,0,.2); }
.lv-glow-4 { background:linear-gradient(135deg,#1a2a3a,#0a1a3a); box-shadow:0 0 25px rgba(0,100,200,.25); }
.lv-glow-5 { background:linear-gradient(135deg,#2a0a2a,#3a0a3a); box-shadow:0 0 30px rgba(180,0,180,.3); animation:glow5 2s infinite; }
.lv-glow-6 { background:linear-gradient(135deg,#3a1a00,#4a2a00); box-shadow:0 0 35px rgba(255,120,0,.35); animation:glow6 1.8s infinite; }
.lv-glow-7 { background:linear-gradient(135deg,#3a0000,#5a0000); box-shadow:0 0 40px rgba(255,50,50,.4); animation:glow7 1.5s infinite; }
.lv-glow-8 { background:linear-gradient(135deg,#1a1a00,#3a3a00); box-shadow:0 0 50px rgba(255,220,0,.45); animation:glow8 1.2s infinite; }
.lv-glow-9 { background:linear-gradient(135deg,#001a3a,#003a5a); box-shadow:0 0 60px rgba(0,180,255,.5); animation:glow9 1s infinite; }
.lv-glow-10 { background:linear-gradient(135deg,#0a0a0a,#1a0a2a,#0a1a0a); box-shadow:0 0 80px rgba(150,0,255,.6),0 0 40px rgba(255,0,100,.4); animation:glow10 .8s infinite; }

@keyframes glow5 { 0%,100%{box-shadow:0 0 30px rgba(180,0,180,.3)} 50%{box-shadow:0 0 50px rgba(180,0,180,.6)} }
@keyframes glow6 { 0%,100%{box-shadow:0 0 35px rgba(255,120,0,.35)} 50%{box-shadow:0 0 60px rgba(255,120,0,.65)} }
@keyframes glow7 { 0%,100%{box-shadow:0 0 40px rgba(255,50,50,.4)} 50%{box-shadow:0 0 70px rgba(255,50,50,.75)} }
@keyframes glow8 { 0%,100%{box-shadow:0 0 50px rgba(255,220,0,.45)} 50%{box-shadow:0 0 90px rgba(255,220,0,.8)} }
@keyframes glow9 { 0%,100%{box-shadow:0 0 60px rgba(0,180,255,.5)} 50%{box-shadow:0 0 100px rgba(0,180,255,.85)} }
@keyframes glow10 { 0%{box-shadow:0 0 80px rgba(150,0,255,.6),0 0 40px rgba(255,0,100,.4)} 33%{box-shadow:0 0 80px rgba(255,0,100,.6),0 0 40px rgba(0,180,255,.4)} 66%{box-shadow:0 0 80px rgba(0,180,255,.6),0 0 40px rgba(150,0,255,.4)} 100%{box-shadow:0 0 80px rgba(150,0,255,.6),0 0 40px rgba(255,0,100,.4)} }

/* ── 키워드 섹션 ── */
.kw-cat-wrap { overflow-x:auto; scrollbar-width:none; padding:0 16px 12px; }
.kw-cat-wrap::-webkit-scrollbar { display:none; }
.kw-cat-scroll { display:flex; gap:8px; }
.kw-cat-btn { flex-shrink:0; padding:8px 16px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--sub); font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
.kw-cat-btn.active { background:var(--red); border-color:var(--red); color:#fff; }
.kw-insight { margin:0 16px 14px; padding:14px; background:var(--card2); border-radius:12px; border-left:3px solid var(--red); font-size:13px; line-height:1.6; color:#ddd; }
.kw-cards { padding:0 12px; display:flex; flex-direction:column; gap:10px; }
.kw-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; cursor:pointer; }
.kw-card:active { transform:scale(.98); }
.kw-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.kw-rank { width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; flex-shrink:0; }
.kw-word { font-size:16px; font-weight:800; flex:1; }
.kw-heat { font-size:18px; }
.kw-bars { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
.kw-bar-item .kw-bar-label { display:flex; justify-content:space-between; font-size:11px; color:var(--sub); margin-bottom:3px; }
.kw-bar-track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.kw-bar-fill { height:100%; border-radius:3px; transition:width .8s; }
.kw-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.kw-tag { padding:3px 8px; border-radius:6px; font-size:11px; background:rgba(255,255,255,.07); color:#ccc; }
.kw-tip { font-size:12px; color:var(--sub); border-top:1px solid var(--border); padding-top:8px; line-height:1.5; }
.formula-box { margin:0 16px 12px; padding:12px 14px; background:rgba(255,0,0,.08); border:1px solid rgba(255,0,0,.25); border-radius:10px; font-size:13px; color:#ff9999; }
.formula-box strong { color:var(--red); }

/* ── 전면광고 오버레이 ── */
.ad-overlay {
  display:none; position:fixed; inset:0; z-index:9999;
  background:rgba(0,0,0,.92); flex-direction:column;
  align-items:center; justify-content:center;
}
.ad-overlay.show { display:flex; }
.ad-box {
  width:min(90vw,400px); background:#111; border-radius:16px;
  overflow:hidden; border:1px solid #333; position:relative;
}
.ad-timer-bar { height:4px; background:var(--red); transition:width .1s linear; width:100%; }
.ad-close-btn {
  position:absolute; top:10px; right:10px;
  background:rgba(0,0,0,.7); color:#fff; border:none;
  width:30px; height:30px; border-radius:50%; font-size:16px; cursor:pointer;
}
.ad-close-btn:disabled { opacity:.4; cursor:not-allowed; }
.ad-content { padding:20px; text-align:center; }
.ad-timer-text { font-size:12px; color:var(--sub); margin-top:10px; }

/* ── 스켈레톤 ── */
.skel { background:linear-gradient(90deg,#1a1a1a 25%,#2a2a2a 50%,#1a1a1a 75%); background-size:200% 100%; animation:skel .8s infinite; border-radius:8px; }
@keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── 반응형 ── */
@media(min-width:600px) {
  .card-list { display:grid; grid-template-columns:repeat(2,1fr); }
  .kw-cards { display:grid; grid-template-columns:repeat(2,1fr); }
  .ch-stats-grid { grid-template-columns:repeat(4,1fr); }
}
@media(min-width:900px) {
  .card-list { grid-template-columns:repeat(3,1fr); }
  .kw-cards { grid-template-columns:repeat(3,1fr); }
}
</style>
</head>
<body>

<!-- 전면광고 오버레이 -->
<div class="ad-overlay" id="adOverlay">
  <div class="ad-box">
    <div class="ad-timer-bar" id="adTimerBar"></div>
    <button class="ad-close-btn" id="adCloseBtn" disabled onclick="closeAd()">✕</button>
    <div class="ad-content">
      <ins class="adsbygoogle"
        style="display:block;min-height:250px"
        data-ad-client="ca-pub-4409875039737384"
        data-ad-slot="auto"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>
      <p class="ad-timer-text" id="adTimerText">5초 후 닫기 가능</p>
    </div>
  </div>
</div>

<!-- 헤더 -->
<header class="header">
  <div class="logo">
    <span class="logo-icon">🔥</span>
    <span class="logo-text">떡상<span>레이더</span></span>
    <span class="live-badge">LIVE</span>
  </div>
  <button class="refresh-btn" onclick="refreshCurrent()">↻ 새로고침</button>
</header>

<!-- 상단 탭 바 (항상 고정) -->
<nav class="tab-bar" id="topTabBar">
  <button class="tab-btn active" data-tab="trend" onclick="switchTab('trend',this)">
    <span class="tab-icon">🔥</span> 급상승
  </button>
  <button class="tab-btn" data-tab="channel" onclick="switchTab('channel',this)">
    <span class="tab-icon">📊</span> 채널분석
  </button>
  <button class="tab-btn" data-tab="keyword" onclick="switchTab('keyword',this)">
    <span class="tab-icon">🔑</span> 키워드
  </button>
</nav>

<!-- ── SECTION 1: 급상승 ── -->
<section class="section active" id="sec-trend">
  <div class="ad-top">
    <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="ca-pub-4409875039737384"
      data-ad-slot="auto"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>
  </div>
  <div class="cat-wrap">
    <div class="cat-scroll" id="catScroll">
      <button class="cat-btn active" data-cid="0" onclick="selectCat(this)">🌐 전체</button>
      <button class="cat-btn" data-cid="10" onclick="selectCat(this)">🎵 음악</button>
      <button class="cat-btn" data-cid="20" onclick="selectCat(this)">🎮 게임</button>
      <button class="cat-btn" data-cid="24" onclick="selectCat(this)">😂 엔터</button>
      <button class="cat-btn" data-cid="22" onclick="selectCat(this)">👨‍👩‍👦 일상</button>
      <button class="cat-btn" data-cid="26" onclick="selectCat(this)">🍳 요리</button>
      <button class="cat-btn" data-cid="17" onclick="selectCat(this)">⚽ 스포츠</button>
      <button class="cat-btn" data-cid="28" onclick="selectCat(this)">🔬 과학기술</button>
      <button class="cat-btn" data-cid="25" onclick="selectCat(this)">📰 뉴스</button>
    </div>
  </div>
  <div class="sort-bar">
    <span class="result-info" id="resultInfo">불러오는 중...</span>
    <div class="sort-tabs">
      <button class="sort-btn active" data-sort="views" onclick="selectSort(this)">조회수</button>
      <button class="sort-btn" data-sort="velocity" onclick="selectSort(this)">속도</button>
      <button class="sort-btn" data-sort="date" onclick="selectSort(this)">최신</button>
    </div>
  </div>
  <div class="card-list" id="cardList">
    <!-- 스켈레톤 -->
    <div style="background:var(--card);border-radius:14px;overflow:hidden">
      <div class="skel" style="width:100%;aspect-ratio:16/9"></div>
      <div style="padding:12px"><div class="skel" style="height:14px;margin-bottom:8px"></div><div class="skel" style="height:12px;width:60%"></div></div>
    </div>

// ── 유틸 ──
function fmt(n){
  n=parseInt(n)||0;
  if(n>=100000000)return (n/100000000).toFixed(1)+'억';
  if(n>=10000)return Math.floor(n/10000)+'만';
  if(n>=1000)return (n/1000).toFixed(1)+'k';
  return n.toString();
}
function ago(dateStr){
  const diff=Date.now()-new Date(dateStr).getTime();
  const h=Math.floor(diff/3600000);
  if(h<1)return '방금 전';
  if(h<24)return h+'시간 전';
  const d=Math.floor(h/24);
  if(d<30)return d+'일 전';
  if(d<365)return Math.floor(d/30)+'개월 전';
  return Math.floor(d/365)+'년 전';
}
function velocity(views,dateStr){
  const h=Math.max(1,(Date.now()-new Date(dateStr).getTime())/3600000);
  return Math.round(parseInt(views)/h);
}
function catColor(cid){

  return m[cid]||'#aaa';
}
function getLevelByRatio(ratio){
  for(let i=LEVELS.length-1;i>=0;i--){
    if(ratio>=LEVELS[i].ratio[0])return LEVELS[i];
  }
  return LEVELS[0];
}

// ── 전면광고 ──
let adTimer=null;
function showAd(cb){
  const ov=document.getElementById('adOverlay');
  const bar=document.getElementById('adTimerBar');
  const btn=document.getElementById('adCloseBtn');
  const txt=document.getElementById('adTimerText');
  ov.classList.add('show');
  btn.disabled=true;
  bar.style.width='100%';
  let sec=5;
  txt.textContent=`${sec}초 후 닫기 가능`;
  adTimer=setInterval(()=>{
    sec--;
    bar.style.width=(sec/5*100)+'%';
    txt.textContent=sec>0?`${sec}초 후 닫기 가능`:'닫기 가능';
    if(sec<=0){clearInterval(adTimer);btn.disabled=false;}
  },1000);
  try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
  if(cb)window._adCb=cb;
}
function closeAd(){
  document.getElementById('adOverlay').classList.remove('show');
  clearInterval(adTimer);
  if(window._adCb){window._adCb();window._adCb=null;}
}

// ── 비디오 로드 ──
async function fetchVideos(catId){
  const p=new URLSearchParams({part:'snippet,statistics',chart:'mostPopular',regionCode:REGION,maxResults:MAX_RES,hl:'ko',key:API_KEY});
  if(catId!=='0')p.append('videoCategoryId',catId);
  const r=await fetch(`https://www.googleapis.com/youtube/v3/videos?${p}`);
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.items||[];
}
function sorted(list,type){
  if(type==='velocity')return [...list].sort((a,b)=>velocity(b.statistics.viewCount,b.snippet.publishedAt)-velocity(a.statistics.viewCount,a.snippet.publishedAt));
  if(type==='date')return [...list].sort((a,b)=>new Date(b.snippet.publishedAt)-new Date(a.snippet.publishedAt));
  return [...list].sort((a,b)=>parseInt(b.statistics.viewCount)-parseInt(a.statistics.viewCount));
}

// ── 카드 렌더 ──
function cardHTML(v, rank){
  const views=parseInt(v.statistics.viewCount)||0;
  const subs=parseInt(v.statistics.likeCount)||0;
  const vel=velocity(views, v.snippet.publishedAt);
  const velPct=Math.min(100,vel/10000*100);
  const isHot=vel>5000;
  const ratio=views/Math.max(1,parseInt(v.statistics.commentCount||1)*100);
  const lv=getLevelByRatio(ratio/1000);
  const thumb=v.snippet.thumbnails.medium?.url||v.snippet.thumbnails.default?.url;
  return `
  <div class="v-card" onclick="window.open('https://youtu.be/${v.id}','_blank')">
    <div class="thumb-wrap">
      <img src="${thumb}" alt="" loading="lazy">
      <div class="rank-badge">#${rank}</div>
      ${isHot?'<div class="hot-badge">🔥 HOT</div>':''}
      <div class="level-badge-card" style="background:${lv.color}22;color:${lv.color};border-color:${lv.color}44">${lv.emoji} Lv.${lv.lv}</div>
    </div>
    <div class="card-body">
      <div class="card-title">${v.snippet.title}</div>
      <div class="card-meta">
        <span class="meta-item">👁 ${fmt(views)}</span>
        <span class="meta-item">👍 ${fmt(v.statistics.likeCount)}</span>
        <span class="meta-item">💬 ${fmt(v.statistics.commentCount)}</span>
        <span class="meta-item">🕐 ${ago(v.snippet.publishedAt)}</span>
      </div>
      <div class="velocity-bar">
        <div class="vel-label">⚡ 시간당 ${fmt(vel)}회 • 상승속도</div>
        <div class="vel-track"><div class="vel-fill" style="width:${velPct}%;background:${isHot?'var(--red)':'#666'}"></div></div>
      </div>
    </div>
  </div>`;
}
function adHTML(){
  return `<div class="ad-inline"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4409875039737384" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins></div>`;
}
function renderCards(){
  const list=sorted(videos,currentSort);

  document.getElementById('updateBar').textContent=`마지막 업데이트: ${new Date().toLocaleTimeString('ko-KR')}`;

async function fetchChannelData(query){
  const p=new URLSearchParams({part:'snippet,statistics,brandingSettings',type:'channel',q:query,maxResults:1,key:API_KEY});
  const r=await fetch(`https://www.googleapis.com/youtube/v3/search?${p}`);
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  if(!d.items||!d.items.length)throw new Error('채널을 찾을 수 없습니다');
  const chId=d.items[0].id.channelId;
  const cr=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings&id=${chId}&key=${API_KEY}`);
  const cd=await cr.json();
  const ch=cd.items[0];
  // 최근 영상
  const vr=await fetch(`https://www.googleapis.com/youtube/v3/search?part=id,snippet&channelId=${chId}&order=date&maxResults=6&type=video&key=${API_KEY}`);
  const vd=await vr.json();
  const vids=vd.items||[];
  let totalViews=0,vidCount=0;
  const detailVids=[];
  if(vids.length){
    const ids=vids.map(v=>v.id.videoId).filter(Boolean).join(',');
    const dr=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=${ids}&key=${API_KEY}`);
    const dd=await dr.json();
    dd.items?.forEach(v=>{totalViews+=parseInt(v.statistics.viewCount||0);vidCount++;detailVids.push(v);});
  }
  return {ch,detailVids,avgViews:vidCount?Math.round(totalViews/vidCount):0};
}
function calcScore(ch,avgViews){
  const subs=parseInt(ch.statistics.subscriberCount||0);
  const totalViews=parseInt(ch.statistics.viewCount||0);
  const vidTotal=parseInt(ch.statistics.videoCount||0);
  const ratio=subs>0?avgViews/subs:0;
  const consistency=Math.min(100,vidTotal/5*10);
  const engagement=Math.min(100,ratio*50);
  const growth=Math.min(100,(totalViews/Math.max(1,subs))/100*10);
  const overall=Math.round((consistency+engagement+growth)/3);
  return {subs,totalViews,vidTotal,ratio,consistency:Math.round(consistency),engagement:Math.round(engagement),growth:Math.round(growth),overall};
}

          </div>
        </div>`;
      if(detailVids.length){
        html+=`<div style="padding:0 16px 8px;font-size:14px;font-weight:700;">📹 최근 영상 성과</div>`;

function copyKeyword(w){
  navigator.clipboard?.writeText('#'+w).then(()=>{
    const t=document.createElement('div');
    t.textContent='✅ 복사됨: #'+w;
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;z-index:9999';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
  });
}
