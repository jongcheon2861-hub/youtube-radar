<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 레벨 카드 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070f;--text:#e8e8f0;--sub:#7777aa;--accent:#6c63ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:40px 20px;}

.page-title{
  text-align:center;font-size:2rem;font-weight:900;letter-spacing:.15em;margin-bottom:10px;
  background:linear-gradient(90deg,#a78bfa,#60a5fa,#f472b6,#a78bfa);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:titleSlide 4s linear infinite;
}
.page-sub{text-align:center;color:var(--sub);font-size:.85rem;margin-bottom:48px;letter-spacing:.05em;}
@keyframes titleSlide{to{background-position:200% center;}}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:32px;max-width:1400px;margin:0 auto;
}

/* ── 카드 씬 ── */
.card-scene{
  position:relative;width:240px;height:360px;margin:0 auto;
  perspective:900px;cursor:pointer;
}
.card-tilt{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .12s ease,box-shadow .12s ease;
  border-radius:18px;
}
.card-frame{
  position:absolute;inset:-3px;border-radius:20px;z-index:0;
  background:linear-gradient(135deg,#444,#222);
}
/* ── 빔 ── */
.beam-container{
  position:absolute;inset:0;border-radius:18px;
  overflow:hidden;z-index:1;pointer-events:none;
}
.beam-ring{
  position:absolute;
  top:50%;left:50%;
  width:340px;height:340px;
  margin-top:-170px;margin-left:-170px;
  border-radius:50%;
  background:conic-gradient(transparent 60%,rgba(255,255,255,.18) 75%,transparent 90%);
  animation:beamRingSpin 4s linear infinite;
}
@keyframes beamRingSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* ── 카드 바디 ── */
.card-body{
  position:absolute;inset:0;border-radius:18px;
  overflow:hidden;z-index:2;
  background:#12121e;
}
.card-face{
  position:relative;width:100%;height:100%;
  display:flex;flex-direction:column;
}
.card-shine{
  position:absolute;inset:0;border-radius:18px;z-index:20;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),
             linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%);
  transition:background .08s;
}
.card-top-band{
  position:absolute;top:0;left:0;right:0;height:90px;
  background:linear-gradient(180deg,rgba(255,255,255,.06) 0%,transparent 100%);
  z-index:3;pointer-events:none;border-radius:18px 18px 0 0;
}
.card-bot-band{
  position:absolute;bottom:0;left:0;right:0;height:70px;
  background:linear-gradient(0deg,rgba(0,0,0,.45) 0%,transparent 100%);
  z-index:3;pointer-events:none;
}
.card-vignette{
  position:absolute;inset:0;border-radius:18px;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%);
  z-index:3;pointer-events:none;
}

/* ── 헤더 ── */
.card-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px 0;position:relative;z-index:10;
}
.card-lv-label{
  font-size:.75rem;font-weight:700;letter-spacing:.12em;
  color:rgba(255,255,255,.75);
  text-shadow:0 0 8px rgba(255,255,255,.4);
}
.card-badge{
  font-size:.6rem;font-weight:700;letter-spacing:.1em;
  padding:3px 8px;border-radius:20px;
  background:rgba(255,255,255,.1);
  color:rgba(255,255,255,.8);
  border:1px solid rgba(255,255,255,.15);
}

/* ── 보케 ── */
.card-bokeh{position:absolute;inset:0;z-index:4;pointer-events:none;}
.bokeh-dot{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,var(--bop,.25));
  filter:blur(var(--bblur,6px));
  animation:bokehDrift var(--bdur,5s) var(--bdel,0s) ease-in-out infinite alternate;
}
@keyframes bokehDrift{
  0%{transform:translate(0,0) scale(1);}
  50%{transform:translate(8px,-10px) scale(1.1);}
  100%{transform:translate(-5px,7px) scale(.95);}
}

/* ── 스파클 ── */
.card-sparkles{position:absolute;inset:0;z-index:5;pointer-events:none;}
.sparkle-dot{
  position:absolute;
  font-size:var(--ssz,10px);color:rgba(255,255,255,.9);
  text-shadow:0 0 6px #fff,0 0 12px #fff;
  animation:sparklePop var(--sdur,2.5s) var(--sdel,0s) ease-in-out infinite;
  transform-origin:center;
}
@keyframes sparklePop{
  0%,100%{opacity:0;transform:scale(.4) rotate(0deg);}
  50%{opacity:1;transform:scale(1.2) rotate(20deg);}
}

/* ── 아이콘 영역 ── */
.card-icon-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;position:relative;z-index:10;margin-top:10px;
}
.card-main-icon{font-size:4rem;line-height:1;filter:drop-shadow(0 0 18px rgba(255,255,255,.5));}
.card-main-name{
  font-size:1.4rem;font-weight:900;letter-spacing:.08em;margin-top:10px;
  text-shadow:0 0 20px rgba(255,255,255,.5);
}

/* ── XP 바 ── */
.card-xp-wrap{padding:0 14px 10px;position:relative;z-index:10;}
.card-xp-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.xp-title{font-size:.65rem;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.6);}
.xp-range{font-size:.6rem;font-weight:700;color:rgba(255,255,255,.5);}
.xp-bar-bg{width:100%;height:6px;border-radius:6px;background:rgba(255,255,255,.1);overflow:hidden;}
.xp-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#6c63ff,#a78bfa);transition:width .4s;}
.xp-sub-label{display:flex;justify-content:space-between;margin-top:4px;}
.xp-lv-range{font-size:.55rem;color:rgba(255,255,255,.35);letter-spacing:.05em;}
.xp-pct{font-size:.6rem;font-weight:700;color:rgba(255,255,255,.5);}

/* ── 푸터 ── */
.card-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px 14px;position:relative;z-index:10;
}
.footer-lv{font-size:.7rem;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.1em;}
.footer-name{font-size:.8rem;font-weight:800;color:rgba(255,255,255,.85);letter-spacing:.06em;}
.footer-subs{font-size:.65rem;color:rgba(255,255,255,.45);letter-spacing:.04em;}

/* ── 포그 ── */
.fog-wrap,.fog-wrap2{
  position:absolute;inset:0;border-radius:18px;z-index:6;pointer-events:none;overflow:hidden;
}
.fog-wrap::before,.fog-wrap::after,
.fog-wrap2::before,.fog-wrap2::after{
  content:'';position:absolute;
  width:200%;height:200%;
  top:-50%;left:-50%;
  border-radius:40%;
  background:rgba(255,255,255,.025);
  animation:fogSpin 18s linear infinite;
}
.fog-wrap::after{animation-duration:24s;animation-direction:reverse;background:rgba(255,255,255,.015);}
.fog-wrap2::before{animation-duration:20s;background:rgba(255,255,255,.018);}
.fog-wrap2::after{animation-duration:28s;animation-direction:reverse;}
@keyframes fogSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* ════════════════════════════════════════
   레벨별 테마
════════════════════════════════════════ */

/* LV.1 일반 */
.card-scene[data-lv="1"]{
  filter:drop-shadow(0 0 10px rgba(160,160,180,.25));
}
.card-scene[data-lv="1"] .card-frame{
  background:linear-gradient(135deg,#888 0%,#444 50%,#999 100%);
}
.card-scene[data-lv="1"] .beam-ring{
  background:conic-gradient(transparent 60%,rgba(200,200,220,.22) 75%,transparent 90%);
}
.card-scene[data-lv="1"] .card-body{
  background:radial-gradient(ellipse at 50% 0%,#1e1e2e 0%,#0d0d18 100%);
}
.card-scene[data-lv="1"] .xp-bar-fill{
  background:linear-gradient(90deg,#888,#bbb);
}
.card-scene[data-lv="1"] .card-main-icon{
  filter:drop-shadow(0 0 14px rgba(180,180,200,.6));
}

/* LV.2 비범 */
.card-scene[data-lv="2"]{
  filter:drop-shadow(0 0 12px rgba(80,200,100,.3));
}
.card-scene[data-lv="2"] .card-frame{
  background:linear-gradient(135deg,#2d6a3f 0%,#1a3d25 50%,#3d8a55 100%);
}
.card-scene[data-lv="2"] .beam-ring{
  background:conic-gradient(transparent 60%,rgba(80,200,100,.28) 75%,transparent 90%);
}
.card-scene[data-lv="2"] .card-body{
  background:radial-gradient(ellipse at 50% 0%,#0d2015 0%,#070f0a 100%);
}
.card-scene[data-lv="2"] .xp-bar-fill{
  background:linear-gradient(90deg,#2d6a3f,#5cb872);
}
.card-scene[data-lv="2"] .card-main-icon{
  filter:drop-shadow(0 0 14px rgba(80,200,100,.7));
}

/* LV.3 희귀 */
.card-scene[data-lv="3"]{
  filter:drop-shadow(0 0 14px rgba(60,140,255,.35));
}
.card-scene[data-lv="3"] .card-frame{
  background:linear-gradient(135deg,#1a4a8a 0%,#0d2855 50%,#2a6acc 100%);
}
.card-scene[data-lv="3"] .beam-ring{
  background:conic-gradient(transparent 60%,rgba(60,140,255,.3) 75%,transparent 90%);
}
.card-scene[data-lv="3"] .card-body{
  background:radial-gradient(ellipse at 50% 0%,#0a1828 0%,#050d18 100%);
}
.card-scene[data-lv="3"] .xp-bar-fill{
  background:linear-gradient(90deg,#1a4a8a,#4a8aee);
}
.card-scene[data-lv="3"] .card-main-icon{
  filter:drop-shadow(0 0 16px rgba(60,140,255,.75));
}

/* LV.4 고급 */
.card-scene[data-lv="4"]{
  filter:drop-shadow(0 0 16px rgba(140,80,255,.4));
}
.card-scene[data-lv="4"] .card-frame{
  background:linear-gradient(135deg,#5a2d8a 0%,#2d1255 50%,#7a4aaa 100%);
}
.card-scene[data-lv="4"] .beam-ring{
  background:conic-gradient(transparent 60%,rgba(140,80,255,.32) 75%,transparent 90%);
}
.card-scene[data-lv="4"] .card-body{
  background:radial-gradient(ellipse at 50% 0%,#160d28 0%,#0a0715 100%);
}
.card-scene[data-lv="4"] .xp-bar-fill{
  background:linear-gradient(90deg,#5a2d8a,#9a5aee);
}
.card-scene[data-lv="4"] .card-main-icon{
  filter:drop-shadow(0 0 18px rgba(140,80,255,.8));
}

/* LV.5 정예 */
.card-scene[data-lv="5"]{
  filter:drop-shadow(0 0 18px rgba(0,180,255,.4));
}
.card-scene[data-lv="5"] .card-frame{
  background:linear-gradient(135deg,#006080 0%,#003848 50%,#0090c0 100%);
}
.card-scene[data-lv="5"] .beam-ring{
  background:conic-gradient(transparent 60%,rgba(0,180,255,.32) 75%,transparent 90%);
}
.card-scene[data-lv="5"] .card-body{
  background:radial-gradient(ellipse at 50% 0%,#001828 0%,#000d18 100%);
}
.card-scene[data-lv="5"] .xp-bar-fill{
  background:linear-gradient(90deg,#006080,#00b0e0);
}
.card-scene[data-lv="5"] .card-main-icon{
  filter:drop-shadow(0 0 18px rgba(0,180,255,.8));
}

/* LV.6 영웅 */
.card-scene[data-lv="6"]{
  filter:drop-shadow(0 0 20px rgba(255,120,0,.4));
}
.card-scene[data-lv="6"] .card-frame{
  background:linear-gradient(135deg,#8a3a00 0%,#552000 50%,#cc5500 100%);
}
.card-scene[data-lv="6"] .beam-ring{
  background:conic-gradient(transparent 60%,rgba(255,120,0,.34) 75%,transparent 90%);
}
.card-scene[data-lv="6"] .card-body{
  background:radial-gradient(ellipse at 50% 0%,#200d00 0%,#100600 100%);
}
.card-scene[data-lv="6"] .xp-bar-fill{
  background:linear-gradient(90deg,#8a3a00,#ee6a00);
}
.card-scene[data-lv="6"] .card-main-icon{
  filter:drop-shadow(0 0 20px rgba(255,120,0,.85));
}

/* LV.7 전설 */
.card-scene[data-lv="7"]{
  filter:drop-shadow(0 0 22px rgba(255,200,0,.45));
}
.card-scene[data-lv="7"] .card-frame{
  background:linear-gradient(135deg,#8a6500 0%,#553c00 50%,#ccaa00 100%);
}
.card-scene[data-lv="7"] .beam-ring{
  background:conic-gradient(transparent 60%,rgba(255,200,0,.36) 75%,transparent 90%);
}
.card-scene[data-lv="7"] .card-body{
  background:radial-gradient(ellipse at 50% 0%,#201500 0%,#100900 100%);
}
.card-scene[data-lv="7"] .xp-bar-fill{
  background:linear-gradient(90deg,#8a6500,#eebb00);
}
.card-scene[data-lv="7"] .card-main-icon{
  filter:drop-shadow(0 0 22px rgba(255,200,0,.9));
}

/* LV.8 불멸 */
.card-scene[data-lv="8"]{
  filter:drop-shadow(0 0 24px rgba(255,50,80,.45));
}
.card-scene[data-lv="8"] .card-frame{
  background:linear-gradient(135deg,#8a0020 0%,#550010 50%,#cc0030 100%);
}
.card-scene[data-lv="8"] .beam-ring{
  background:conic-gradient(transparent 60%,rgba(255,50,80,.38) 75%,transparent 90%);
}
.card-scene[data-lv="8"] .card-body{
  background:radial-gradient(ellipse at 50% 0%,#200008 0%,#100005 100%);
}
.card-scene[data-lv="8"] .xp-bar-fill{
  background:linear-gradient(90deg,#8a0020,#ee0040);
}
.card-scene[data-lv="8"] .card-main-icon{
  filter:drop-shadow(0 0 24px rgba(255,50,80,.9));
}

/* LV.9 신화 */
.card-scene[data-lv="9"]{
  filter:drop-shadow(0 0 26px rgba(255,100,200,.45));
}
.card-scene[data-lv="9"] .card-frame{

}
.card-scene[data-lv="9"] .beam-ring{
  background:conic-gradient(transparent 60%,rgba(255,100,200,.38) 75%,transparent 90%);
}
.card-scene[data-lv="9"] .card-body{
  background:radial-gradient(ellipse at 50% 0%,#200018 0%,#10000c 100%);
}
.card-scene[data-lv="9"] .xp-bar-fill{

}
.card-scene[data-lv="9"] .card-main-icon{
  filter:drop-shadow(0 0 26px rgba(255,100,200,.9));
}

/* LV.10 초월 */
.card-scene[data-lv="10"]{
  filter:drop-shadow(0 0 32px rgba(180,100,255,.6)) drop-shadow(0 0 60px rgba(100,60,200,.4));
}
.card-scene[data-lv="10"] .card-frame{
  background:linear-gradient(135deg,#7700cc 0%,#3300aa 25%,#cc00ff 50%,#3300aa 75%,#7700cc 100%);
  animation:maxFramePulse 2.5s ease-in-out infinite;
}
@keyframes maxFramePulse{
  0%,100%{opacity:1;}50%{opacity:.7;}
}
.card-scene[data-lv="10"] .beam-ring{
  background:conic-gradient(transparent 50%,rgba(180,100,255,.45) 65%,transparent 80%);
}
.card-scene[data-lv="10"] .card-body{
  background:radial-gradient(ellipse at 50% 0%,#1a0035 0%,#0d0020 60%,#050010 100%);
}
.card-scene[data-lv="10"] .xp-bar-fill{
  background:linear-gradient(90deg,#7700cc,#cc00ff,#ff77ff);
  animation:maxXpShimmer 2s linear infinite;
  background-size:200% auto;
}
@keyframes maxXpShimmer{to{background-position:200% center;}}
.card-scene[data-lv="10"] .card-main-icon{
  filter:drop-shadow(0 0 30px rgba(180,100,255,1)) drop-shadow(0 0 60px rgba(140,60,255,.7));
  animation:maxIconFloat 3s ease-in-out infinite;
}
@keyframes maxIconFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}
.card-scene[data-lv="10"] .card-lv-label{
  color:rgba(220,160,255,.9);
  text-shadow:0 0 12px rgba(180,100,255,.8);
}
.card-scene[data-lv="10"] .card-badge{
  background:linear-gradient(135deg,rgba(180,100,255,.3),rgba(140,60,255,.2));
  border-color:rgba(180,100,255,.4);
  color:rgba(220,160,255,.95);
}
.card-scene[data-lv="10"] .footer-lv{
  color:rgba(220,160,255,.8);
  text-shadow:0 0 10px rgba(180,100,255,.6);
}
.card-scene[data-lv="10"] .footer-subs{
  color:rgba(200,140,255,.6);
}

/* ── 수직 글로우 라인 ── */
.card-scene[data-lv="7"] .card-body::after,
.card-scene[data-lv="8"] .card-body::after,
.card-scene[data-lv="9"] .card-body::after,
.card-scene[data-lv="10"] .card-body::after{
  content:'';position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:1px;height:100%;
  background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,.15) 40%,rgba(255,255,255,.3) 50%,rgba(255,255,255,.15) 60%,transparent 100%);
  z-index:1;pointer-events:none;
}
</style>
</head>
<body>
<div class="page-title">▶ 3D 레벨 카드 미리보기</div>
<div class="page-sub">마우스를 카드 위에 올리면 빔·테두리·카드가 함께 3D 틸트됩니다</div>
<div class="cards-grid" id="cards-grid"></div>

function buildBeams(g) {
  let html = '';
  const spd = parseFloat(g.beamSpeed);
  for (let i = 0; i < g.beamCount; i++) {
    const delay = '-' + ((spd / g.beamCount) * i).toFixed(3) + 's';
    html += `<div class="beam-container"><div class="beam-ring" style="animation-duration:${g.beamSpeed};animation-delay:${delay};"></div></div>`;
  }
  return html;
}

function buildFog(g) {
  if (g.lv === 1 || g.lv === 2) return '';
  if (g.lv === 10) return `<div class="fog-wrap"></div><div class="fog-wrap2"></div>`;
  return `<div class="fog-wrap"></div>`;
}

function buildXP(g) {
  const xp = XP_RANGES[g.lv];
  const isMax = g.lv === 10;
  const pct = Math.round(((xp.current - xp.min) / (xp.max - xp.min)) * 100);
  const fill = isMax ? 100 : pct;
  return `
<div class="card-xp-wrap">
  <div class="card-xp-label">
    <span class="xp-title">⚡ EXP</span>
    <span class="xp-range">${isMax ? '✦ MAX ✦' : xp.current + ' / ' + xp.max}</span>
  </div>
  <div class="xp-bar-bg">
    <div class="xp-bar-fill" style="width:${fill}%;"></div>
  </div>
  <div class="xp-sub-label">
    <span class="xp-lv-range">구간 ${xp.min} ~ ${xp.max}</span>
    <span class="xp-pct">${isMax ? '100%' : fill + '%'}</span>
  </div>
</div>`;
}

function buildFooter(g) {
  // LV.10도 포함하여 모든 레벨에 동일한 형식으로 lvLabel 표시
  const lvLabel = `LV.${g.lv}`;
  if (g.lv === 10) {
    return `
<div class="card-footer" style="position:relative;justify-content:space-between;align-items:center;">
  <div class="footer-lv">${lvLabel}</div>
  <div class="footer-name" style="position:absolute;left:50%;transform:translateX(-50%);font-size:.85rem;font-weight:800;color:rgba(220,160,255,.95);text-align:center;text-shadow:0 0 14px rgba(180,100,255,.9),0 0 28px rgba(140,60,255,.6);letter-spacing:.1em;white-space:nowrap;">${g.name}</div>
  <div class="footer-subs">${g.subs}</div>
</div>`;
  }
  return `
<div class="card-footer">
  <div class="footer-lv">${lvLabel}</div>
  <div class="footer-name">${g.name}</div>
  <div class="footer-subs">${g.subs}</div>
</div>`;
}

function buildCardHTML(g) {
  // 헤더의 레벨 라벨도 LV.10으로 표시
  const lvLabel = `LV.${g.lv}`;
  const bokeh = g.bokeh.map(b =>
    `<div class="bokeh-dot" style="width:${b.w}px;height:${b.h}px;left:${b.l}%;top:${b.t}%;--bblur:${b.blur}px;--bop:${b.op};--bdur:${b.dur}s;--bdel:${b.del}s;"></div>`
  ).join('');
  const sparkles = g.sparkles.map(s =>
    `<span class="sparkle-dot" style="left:${s.l}%;top:${s.t}%;--ssz:${s.sz}px;--sdur:${s.dur};--sdel:${s.del};">✦</span>`
  ).join('');
  return `
<div class="card-scene" data-lv="${g.lv}" onmousemove="card3D(event,this)" onmouseleave="cardReset(this)">
  ${buildFog(g)}
  <div class="card-tilt">
    <div class="card-frame"></div>
    ${buildBeams(g)}
    <div class="card-body">
      <div class="card-face">
        <div class="card-bokeh">${bokeh}</div>
        <div class="card-sparkles">${sparkles}</div>
        <div class="card-header">
          <div class="card-lv-label">${lvLabel}</div>
          <div class="card-badge">${g.badge}</div>
        </div>
        <div class="card-icon-wrap">
          <div class="card-main-icon">${g.icon}</div>
          <div class="card-main-name">${g.name}</div>
        </div>
        <div class="card-top-band"></div>
        <div class="card-bot-band"></div>
        <div class="card-vignette"></div>
        <div class="card-shine"></div>
        ${buildXP(g)}
        ${buildFooter(g)}
      </div>
    </div>
  </div>
</div>`;
}

function card3D(e, el) {
  const r = el.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  const ry = ((x - r.width / 2) / (r.width / 2)) * 20;
  const rx = -((y - r.height / 2) / (r.height / 2)) * 20;
  el.querySelector('.card-tilt').style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) scale(1.04)`;
  const mx = (x / r.width * 100).toFixed(1) + '%';
  const my = (y / r.height * 100).toFixed(1) + '%';
  el.querySelector('.card-shine').style.background =
    `linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),` +
    `linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%),` +
    `radial-gradient(ellipse 55% 45% at ${mx} ${my},rgba(255,255,255,.22) 0%,rgba(255,255,255,.05) 50%,transparent 75%)`;
}

function cardReset(el) {
  el.querySelector('.card-tilt').style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
  el.querySelector('.card-shine').style.background =
    `linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),` +
    `linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%)`;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cards-grid').innerHTML = GRADES.map(g => buildCardHTML(g)).join('');
});
</script>
