<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YTAnalytics Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
:root{
  --bg0:#111118;--bg1:#18181f;--bg2:#22222e;--bg3:#2a2a38;
  --acc:#7c5cfc;--acc2:#a78bfa;--gold:#f59e0b;--red:#ef4444;--green:#22c55e;
  --text:#e8e8f0;--text2:#a0a0b8;--text3:#6b6b88;
  --border:rgba(255,255,255,.07);--card-bg:#1e1e2c;
  --sidebar:240px;--header:56px;--right:280px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* ── HEADER ── */
header{
  position:fixed;top:0;left:0;right:0;height:var(--header);
  background:rgba(17,17,24,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;z-index:200
}
.logo{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#7c5cfc,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.hdr-search{flex:1;max-width:380px;position:relative}
.hdr-search input{
  width:100%;padding:8px 14px 8px 38px;border-radius:20px;
  background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:.85rem;outline:none
}
.hdr-search::before{
  content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.85rem
}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.hdr-btn{padding:7px 14px;border-radius:16px;font-size:.78rem;font-weight:600;
  background:linear-gradient(135deg,var(--acc),#a78bfa);color:#fff;transition:.2s}
.hdr-btn:hover{opacity:.85}

/* ── LAYOUT ── */
.layout{display:flex;margin-top:var(--header);min-height:calc(100vh - var(--header))}
.sidebar{
  position:fixed;top:var(--header);left:0;bottom:0;width:var(--sidebar);
  background:var(--bg1);border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;z-index:100
}
.main-wrap{margin-left:var(--sidebar);margin-right:var(--right);flex:1;padding:20px;min-width:0}
.right-col{
  position:fixed;top:var(--header);right:0;bottom:0;width:var(--right);
  background:var(--bg1);border-left:1px solid var(--border);
  overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px
}

/* ── SIDEBAR NAV ── */
.nav-section{padding:12px 8px 4px;font-size:.7rem;color:var(--text3);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-radius:10px;margin:2px 8px;cursor:pointer;font-size:.88rem;
  transition:.15s;color:var(--text2)
}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(124,92,252,.25),rgba(167,139,250,.1));
  color:var(--acc2);font-weight:700}
.nav-icon{font-size:1.1rem;width:22px;text-align:center}
.sidebar-ad{margin:auto 12px 12px;padding:10px;background:var(--bg2);border-radius:10px;
  border:1px solid var(--border);text-align:center;min-height:80px}

/* ── SECTION ── */
.section{display:none}
.section.active{display:block}

/* ── TOP AD BANNER ── */
.top-ad{
  background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(245,158,11,.1));
  border:1px solid rgba(124,92,252,.2);border-radius:12px;
  padding:10px 16px;margin-bottom:16px;text-align:center;min-height:60px;
  display:flex;align-items:center;justify-content:center
}

/* ── CARD BASE ── */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px}
.card-title{font-size:.95rem;font-weight:700;margin-bottom:12px;color:var(--text)}
.section-title{font-size:1.2rem;font-weight:800;margin-bottom:16px;
  background:linear-gradient(135deg,var(--acc2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── HOT VIDEOS ── */
.hot-layout{display:flex;gap:16px}
.hot-sidebar-filters{width:160px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.filter-group-label{font-size:.72rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:0 4px 4px}
.type-btn{
  display:block;width:100%;text-align:left;padding:8px 12px;border-radius:8px;
  font-size:.82rem;color:var(--text2);background:var(--bg2);
  border:1px solid transparent;transition:.15s;cursor:pointer
}
.type-btn:hover{background:var(--bg3);color:var(--text)}
.type-btn.active{background:rgba(124,92,252,.2);color:var(--acc2);border-color:rgba(124,92,252,.3);font-weight:700}
.cat-btn{
  display:block;width:100%;text-align:left;padding:7px 12px;border-radius:8px;
  font-size:.8rem;color:var(--text2);background:var(--bg2);
  border:1px solid transparent;transition:.15s;cursor:pointer;margin-bottom:3px
}
.cat-btn:hover{background:var(--bg3);color:var(--text)}
.cat-btn.active{background:rgba(124,92,252,.2);color:var(--acc2);border-color:rgba(124,92,252,.3);font-weight:700}
.hot-content{flex:1;min-width:0}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.vid-card{
  background:var(--bg2);border-radius:12px;overflow:hidden;
  border:1px solid var(--border);cursor:pointer;transition:.2s
}
.vid-card:hover{transform:translateY(-3px);border-color:rgba(124,92,252,.3);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.vid-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#000}
.vid-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.vid-dur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);
  color:#fff;font-size:.7rem;padding:2px 5px;border-radius:4px}
.vid-shorts-badge{position:absolute;top:6px;left:6px;background:#ff0050;
  color:#fff;font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:10px}
.vid-info{padding:10px}
.vid-title{font-size:.82rem;font-weight:600;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.vid-meta{font-size:.72rem;color:var(--text3)}
.viral-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden}
.viral-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--acc),var(--gold));transition:.6s}
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px}
.page-btn{padding:8px 16px;border-radius:8px;background:var(--bg2);color:var(--text2);
  border:1px solid var(--border);font-size:.82rem;transition:.15s;cursor:pointer}
.page-btn:hover:not(:disabled){background:var(--acc);color:#fff}
.page-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── CHANNEL ANALYSIS ── */
.ch-search-box{display:flex;gap:10px;margin-bottom:20px}
.ch-search-box input{
  flex:1;padding:12px 18px;border-radius:24px;border:1px solid var(--border);
  background:var(--bg2);color:var(--text);font-size:.9rem;outline:none;transition:.2s
}
.ch-search-box input:focus{border-color:var(--acc)}
.ch-search-box button{
  padding:12px 24px;border-radius:24px;font-size:.9rem;font-weight:700;
  background:linear-gradient(135deg,var(--acc),#a78bfa);color:#fff;transition:.2s
}
.ch-search-box button:hover{opacity:.85}

/* LV ROW — fire card + grade table side by side */
.lv-row{display:flex;gap:16px;align-items:flex-start;margin-bottom:20px}

/* FIRE CARD */
.fire-card{
  background:transparent;border:none;
  display:flex;flex-direction:column;align-items:center;
  padding:16px 20px;min-width:180px;position:relative
}
.fire-pillar-wrap{position:relative;width:80px;height:130px;margin-bottom:8px}
/* fire pillar layers */
.fp{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  border-radius:50% 50% 30% 30%;filter:blur(2px);animation:fpRise 1.2s ease-in-out infinite alternate}
.fp-1{animation-delay:0s}
.fp-2{animation-delay:.15s}
.fp-3{animation-delay:.3s}
.fp-4{animation-delay:.45s}
@keyframes fpRise{
  0%{transform:translateX(-50%) scaleY(.9) scaleX(.95);opacity:.9}
  100%{transform:translateX(-50%) scaleY(1.08) scaleX(1.04);opacity:1}
}
/* LV text glow */
.lv-num{font-size:2.2rem;font-weight:900;line-height:1;margin-bottom:2px;position:relative}
.lv-name-txt{font-size:.78rem;font-weight:700;letter-spacing:.06em;margin-bottom:4px}
.lv-pct{font-size:.72rem;color:var(--text2);margin-bottom:2px}
.lv-algo{font-size:.7rem;color:var(--text3)}
/* algorithm score */
.algo-score-box{
  margin-top:8px;padding:6px 14px;border-radius:20px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  font-size:.78rem;font-weight:700;color:var(--text)
}

/* GRADE TABLE (right side, half width) */
.grade-mini-wrap{flex:1;max-width:50%;margin-left:auto}
.grade-mini-title{font-size:.82rem;font-weight:700;color:var(--text2);margin-bottom:8px}
.grade-mini-table{width:100%;border-collapse:collapse;font-size:.75rem}
.grade-mini-table th{
  padding:5px 8px;text-align:left;color:var(--text3);
  border-bottom:1px solid var(--border);font-weight:600;font-size:.7rem
}
.grade-mini-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
.grade-mini-table tr.cur-lv td{background:rgba(124,92,252,.15);font-weight:700}
.grade-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* BENCHMARK */
.bench-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.bench-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:14px;position:relative;overflow:hidden
}
.bench-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,92,252,.05),transparent);pointer-events:none}
.bench-label{font-size:.72rem;color:var(--text3);margin-bottom:6px;font-weight:600}
.bench-val{font-size:1.2rem;font-weight:900;color:var(--text);margin-bottom:4px}
.bench-avg{font-size:.72rem;color:var(--text3)}
.bench-diff{font-size:.75rem;font-weight:700;margin-top:4px}
.bench-diff.pos{color:var(--green)}
.bench-diff.neg{color:var(--red)}
.bench-bar-wrap{height:4px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden;position:relative}
.bench-bar-ch{height:100%;border-radius:2px;background:var(--acc);transition:width .8s}
.bench-bar-avg-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.5)}

/* PROS / CONS */
.pros-cons-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.pros-card{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:12px;padding:14px}
.cons-card{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:14px}
.pros-card h4{color:var(--green);font-size:.85rem;margin-bottom:8px}
.cons-card h4{color:var(--red);font-size:.85rem;margin-bottom:8px}
.pros-card li,.cons-card li{font-size:.8rem;color:var(--text2);line-height:1.6;margin-left:14px}

/* METRICS */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--bg2);border-radius:10px;padding:12px;border:1px solid var(--border)}
.metric-label{font-size:.7rem;color:var(--text3);margin-bottom:4px}
.metric-val{font-size:1.1rem;font-weight:800;color:var(--text)}
.metric-sub{font-size:.7rem;color:var(--text3);margin-top:2px}

/* ── REVENUE CALCULATOR ── */
.rev-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.rev-inputs{display:flex;flex-direction:column;gap:14px}
.rev-item label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:6px;font-weight:600}
.gauge-wrap{position:relative;height:36px;cursor:pointer}
.gauge-track{
  position:absolute;top:50%;left:0;right:0;height:8px;
  transform:translateY(-50%);background:var(--bg3);border-radius:4px;overflow:hidden
}
.gauge-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc),var(--gold));transition:none;pointer-events:none}
.gauge-thumb{
  position:absolute;top:50%;width:20px;height:20px;border-radius:50%;
  background:#fff;border:3px solid var(--acc);transform:translate(-50%,-50%);
  box-shadow:0 2px 8px rgba(0,0,0,.4);pointer-events:none;transition:none
}
.gauge-value{font-size:.85rem;font-weight:700;color:var(--acc2);margin-top:4px}
.gauge-range{display:flex;justify-content:space-between;font-size:.67rem;color:var(--text3);margin-top:2px}
.rev-results{display:flex;flex-direction:column;gap:10px}
.rev-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rev-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:14px;text-align:center
}
.rev-card-label{font-size:.72rem;color:var(--text3);margin-bottom:6px}
.rev-card-val{font-size:1.3rem;font-weight:900;color:var(--gold)}
.rev-tip{
  background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.2);
  border-radius:10px;padding:12px;font-size:.8rem;color:var(--text2);line-height:1.6
}

/* ── TOOLS ── */
.tools-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tool-tab{padding:6px 14px;border-radius:16px;font-size:.78rem;font-weight:600;
  background:var(--bg2);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:.15s}
.tool-tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.tool-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:12px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;gap:6px
}
.tool-card:hover{border-color:var(--acc);transform:translateY(-2px)}
.tool-icon{width:36px;height:36px;border-radius:8px;object-fit:cover}
.tool-name{font-size:.82rem;font-weight:700;color:var(--text)}
.tool-desc{font-size:.7rem;color:var(--text3);line-height:1.4}
.tool-tag{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px}
.tool-tag.free{background:rgba(34,197,94,.15);color:var(--green)}
.tool-tag.premium{background:rgba(245,158,11,.15);color:var(--gold)}
.tool-tag.paid{background:rgba(239,68,68,.15);color:var(--red)}

/* ── AI IDEAS ── */
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.idea-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:16px;cursor:pointer;transition:.2s
}
.idea-card:hover{border-color:var(--acc);transform:translateY(-2px)}
.idea-num{font-size:.7rem;color:var(--text3);margin-bottom:4px}
.idea-title{font-size:.9rem;font-weight:700;margin-bottom:6px}
.idea-hook{font-size:.78rem;color:var(--text2);line-height:1.5;margin-bottom:8px}
.idea-tags{display:flex;flex-wrap:wrap;gap:4px}
.idea-tag{font-size:.65rem;padding:2px 8px;border-radius:10px;
  background:rgba(124,92,252,.15);color:var(--acc2);font-weight:600}

/* ── SHOP ── */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.shop-card{
  background:#252535;border:1px solid rgba(124,92,252,.25);border-radius:14px;
  overflow:hidden;transition:.2s;display:flex;flex-direction:column;aspect-ratio:1/1
}
.shop-card:hover{transform:translateY(-3px);border-color:var(--acc);box-shadow:0 8px 24px rgba(124,92,252,.2)}
.shop-card-inner{flex:1;display:flex;flex-direction:column;padding:12px;gap:6px}
.shop-emoji{font-size:2rem;text-align:center;margin-bottom:4px}
.shop-rank{font-size:.65rem;font-weight:700;color:var(--gold)}
.shop-name{font-size:.82rem;font-weight:700;color:var(--text);line-height:1.3}
.shop-price{font-size:.92rem;font-weight:900;color:var(--gold)}
.shop-orig{font-size:.72rem;color:var(--text3);text-decoration:line-through}
.shop-disc{font-size:.72rem;font-weight:700;color:var(--red)}
.shop-btn{
  display:block;padding:8px;background:linear-gradient(135deg,#ff6600,#ff9900);
  color:#fff;font-size:.78rem;font-weight:700;text-align:center;
  border-top:1px solid rgba(255,255,255,.1);transition:.15s;width:100%;cursor:pointer
}
.shop-btn:hover{opacity:.85}

/* ── RIGHT COL ── */
.right-ad-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:10px;text-align:center;min-height:100px}
.right-ad-title{font-size:.72rem;color:var(--text3);margin-bottom:6px;font-weight:600}
.coupang-search{display:flex;flex-direction:column;gap:6px}
.coupang-input{
  padding:8px 12px;border-radius:8px;background:var(--bg3);
  border:1px solid var(--border);color:var(--text);font-size:.8rem;outline:none
}
.coupang-btn{
  padding:8px;border-radius:8px;background:linear-gradient(135deg,#ff6600,#ff9900);
  color:#fff;font-size:.8rem;font-weight:700;cursor:pointer
}

/* ── VIDEO MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:1000;align-items:center;justify-content:center;padding:20px
}
.modal-overlay.open{display:flex}
.modal-box{
  background:var(--bg1);border-radius:16px;width:100%;max-width:780px;
  border:1px solid var(--border);overflow:hidden;position:relative
}
.modal-close{
  position:absolute;top:10px;right:12px;z-index:10;
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.7);color:#fff;font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  border:1px solid rgba(255,255,255,.15);transition:.15s
}
.modal-close:hover{background:var(--red)}
.modal-player{position:relative;aspect-ratio:16/9}
.modal-player iframe{width:100%;height:100%;border:none;display:block}
.modal-info{padding:14px 16px}
.modal-title{font-size:.95rem;font-weight:700;margin-bottom:4px}
.modal-meta{font-size:.78rem;color:var(--text3);margin-bottom:10px}
.modal-ad{padding:0 16px 16px}
.modal-ad ins{display:block;border-radius:8px;overflow:hidden}

/* ── TOOL MODAL ── */
.tool-modal-box{
  background:var(--bg1);border-radius:16px;width:100%;max-width:480px;
  border:1px solid var(--border);padding:24px;position:relative
}
.tool-modal-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.tool-modal-icon{width:56px;height:56px;border-radius:12px;object-fit:cover}
.tool-modal-name{font-size:1.1rem;font-weight:800}
.tool-modal-tag{font-size:.7rem;padding:3px 10px;border-radius:10px}
.tool-modal-desc{font-size:.85rem;color:var(--text2);line-height:1.7;margin-bottom:16px}
.tool-modal-link{
  display:block;padding:12px;border-radius:10px;text-align:center;
  background:linear-gradient(135deg,var(--acc),#a78bfa);color:#fff;font-weight:700
}

/* ── IDEA MODAL ── */
.idea-modal-box{
  background:var(--bg1);border-radius:16px;width:100%;max-width:600px;
  border:1px solid var(--border);padding:24px;position:relative;max-height:85vh;overflow-y:auto
}
.idea-section-title{font-size:.75rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:12px 0 4px}
.idea-content{font-size:.85rem;color:var(--text2);line-height:1.7}
.copy-btn{
  margin-top:14px;padding:10px 20px;border-radius:8px;
  background:var(--bg3);color:var(--text);font-size:.82rem;cursor:pointer;
  border:1px solid var(--border);transition:.15s
}
.copy-btn:hover{background:var(--acc);color:#fff}

/* ── POPUP AD ── */
.popup-ad-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:2000;align-items:center;justify-content:center
}

  { lv:9, name:'신화',  color:'#38bdf8', glow:'rgba(56,189,248,',    pillarW:110,pillarH:176, min:80, max:89, desc:'신화급 채널', neon:true },
  { lv:10,name:'신',    color:'#fbbf24', glow:'rgba(251,191,36,',    pillarW:114,pillarH:184, min:90, max:100,desc:'최고의 채널', neon:true }

/* ════════════════════════════════════════

════════════════════════════════════════ */
function showSection(id){

  document.querySelectorAll(`.nav-item[data-sec="${id}"]`).forEach(n=>n.classList.add('active'));

/* ════════════════════════════════════════
   COUPANG SEARCH
════════════════════════════════════════ */
function searchCoupang(){
  const q = document.getElementById('cpInput').value.trim();
  if(!q) return;
  const url = `https://www.coupang.com/np/search?q=${encodeURIComponent(q)}&bannerCode=${PC}`;

/* ════════════════════════════════════════
   UTILITY
════════════════════════════════════════ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n){
  if(n>=100000000) return (n/100000000).toFixed(1)+'억';
  if(n>=10000) return (n/10000).toFixed(1)+'만';
  if(n>=1000) return (n/1000).toFixed(1)+'천';
  return String(n);
}
function fmtMoney(n){ return n.toLocaleString('ko-KR')+'원'; }
function hashScore(subs,views,vids){
  let h = (subs*1.1 + views*0.7 + vids*3.3) % 1000;
  return Math.min(99,Math.max(0,Math.floor(h % 100)));
}
function getLvFromScore(sc){
  return GRADES.find(g=>sc>=g.min&&sc<=g.max)||GRADES[0];
}

/* ════════════════════════════════════════
   BUILD FIRE PILLAR HTML  (no candle)
════════════════════════════════════════ */
function buildFirePillar(g){
  const c = g.color, w = g.pillarW, h = g.pillarH;
  const glow = g.glow;
  const neon = g.neon ? `box-shadow:0 0 18px 6px ${glow}.6),0 0 40px 12px ${glow}.3);` : '';
  const layers = [
    {sc:1.00, op:.95, bl:2},
    {sc:0.80, op:.85, bl:4},
    {sc:0.60, op:.70, bl:6},
    {sc:0.45, op:.55, bl:8},
  ];
  return layers.map((l,i)=>`
    <div class="fp fp-${i+1}" style="
      width:${Math.round(w*l.sc)}px;height:${Math.round(h*l.sc)}px;
      background:radial-gradient(ellipse 60% 80% at 50% 80%, ${c} 0%, ${glow}.0) 100%);
      opacity:${l.op};filter:blur(${l.bl}px);
      animation:fpRise ${1.1+i*.18}s ease-in-out ${i*.13}s infinite alternate;
      ${neon}
    "></div>
  `).join('');
}

/* ════════════════════════════════════════
   BUILD LEVEL CARD
════════════════════════════════════════ */
function buildLevelCard(g, score, topPct){
  const c = g.color, glow = g.glow;
  const neonText = g.neon
    ? `text-shadow:0 0 8px ${c},0 0 20px ${c},0 0 40px ${c};`
    : `text-shadow:0 0 6px ${glow}.5);`;
  const neonPct = g.neon
    ? `text-shadow:0 0 6px ${c},0 0 16px ${c};`
    : `text-shadow:0 0 4px ${glow}.4);`;
  return `
  <div class="fire-card">
    <div class="fire-pillar-wrap" style="width:${g.pillarW}px;height:${g.pillarH}px;margin-bottom:10px">
      ${buildFirePillar(g)}
    </div>
    <div class="lv-num" style="color:${c};${neonText}">LV.${g.lv}</div>
    <div class="lv-name-txt" style="color:${c};${neonText}">${g.name}</div>
    <div class="lv-pct" style="${neonPct};animation:pctPulse 2s ease-in-out infinite">
      상위 ${topPct}%
    </div>
    <div class="algo-score-box" style="border-color:${glow}.3);color:${c}">
      알고리즘 점수 <strong>${score}</strong>점
    </div>
  </div>`;
}

/* ════════════════════════════════════════
   GRADE MINI TABLE
════════════════════════════════════════ */
function buildGradeTable(curLv){
  let rows = GRADES.map(g=>`
    <tr class="${g.lv===curLv?'cur-lv':''}">
      <td><span class="grade-dot" style="background:${g.color}"></span>LV.${g.lv}</td>
      <td style="color:${g.color}">${g.name}</td>
      <td style="color:var(--text3)">${g.min}–${g.max}</td>
    </tr>`).join('');
  return `
  <div class="grade-mini-wrap">
    <div class="grade-mini-title">📋 등급 기준표</div>
    <table class="grade-mini-table">
      <thead><tr><th>레벨</th><th>이름</th><th>점수</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

/* ════════════════════════════════════════
   BENCHMARK CARDS
════════════════════════════════════════ */
function buildBenchmark(data){
  const subs   = data.subs   || 0;
  const views  = data.views  || 0;
  const vids   = data.vids   || 0;
  const avgVPV = vids>0 ? Math.round(views/vids) : 0;
  const engIdx = subs>0 ? ((views/Math.max(vids,1))/subs*100).toFixed(2) : '0.00';

  const benchItems = [
    { label:'구독자 수',       ch:subs,   avg:100000, unit:'' },
    { label:'총 조회수',       ch:views,  avg:5000000,unit:'' },
    { label:'영상 개수',       ch:vids,   avg:150,    unit:'개' },
    { label:'영상당 평균 조회',ch:avgVPV, avg:30000,  unit:'' },
    { label:'참여 지수(%)',    ch:parseFloat(engIdx), avg:2.5, unit:'%' },
  ];

  return benchItems.map(b=>{
    const ratio = b.avg>0 ? (b.ch/b.avg)*100 : 0;
    const avgRatio = 100;
    const diff = b.avg>0 ? (((b.ch-b.avg)/b.avg)*100).toFixed(1) : '0';
    const isPos = parseFloat(diff)>=0;
    const chW = Math.min(100,Math.round(ratio));
    const avgW = 100;
    return `
    <div class="bench-card">
      <div class="bench-label">${b.label}</div>
      <div class="bench-val">${b.unit==='%'?b.ch+'%':fmt(b.ch)+(b.unit||'')}</div>
      <div class="bench-avg">업계 평균: ${b.unit==='%'?b.avg+'%':fmt(b.avg)+(b.unit||'')}</div>
      <div class="bench-diff ${isPos?'pos':'neg'}">${isPos?'▲ +':'▼ '}${diff}%</div>
      <div class="bench-bar-wrap">
        <div class="bench-bar-ch" style="width:${chW}%"></div>
        <div class="bench-bar-avg-line" style="left:${Math.min(100,avgW)}%"></div>
      </div>
    </div>`;
  }).join('');
}

/* ════════════════════════════════════════
   PROS / CONS ANALYSIS
════════════════════════════════════════ */
function buildProsCons(data){
  const pros=[], cons=[];
  if(data.subs>=10000) pros.push('구독자 1만명 이상으로 인지도가 확보되었습니다');
  else cons.push('구독자 1만명 미만 — 꾸준한 업로드와 홍보가 필요합니다');
  if(data.vids>=50) pros.push('영상 수 50개 이상으로 채널 볼륨이 충분합니다');
  else cons.push('영상 수가 적습니다 — 더 많은 콘텐츠 제작을 권장합니다');
  const avgV = data.vids>0?data.views/data.vids:0;
  if(avgV>=10000) pros.push('영상당 평균 조회수 1만 이상으로 콘텐츠 완성도가 높습니다');
  else cons.push('영상당 평균 조회수가 낮습니다 — 썸네일·제목 최적화가 필요합니다');
  if(data.desc && data.desc.length>=100) pros.push('채널 설명이 충분히 상세하게 작성되어 있습니다');
  else cons.push('채널 설명이 너무 짧습니다 — 키워드 포함 상세 설명을 작성하세요');
  if(data.country) pros.push(`지역 설정(${data.country})이 되어 있어 현지 알고리즘 유리합니다`);
  else cons.push('지역 설정이 없습니다 — YouTube Studio에서 국가를 설정하세요');
  if(data.titleLen && data.titleLen>=6) pros.push('채널명 길이가 검색에 적합합니다');
  if(data.hashtags && data.hashtags>=2) pros.push('해시태그 활용으로 노출이 강화됩니다');
  else cons.push('해시태그 활용이 미흡합니다 — 영상별 3–5개 해시태그를 추가하세요');
  const proHtml = pros.map(p=>`<li>${p}</li>`).join('');
  const conHtml = cons.map(c=>`<li>${c}</li>`).join('');
  return `
  <div class="pros-cons-grid">
    <div class="pros-card"><h4>✅ 장점</h4><ul>${proHtml}</ul></div>
    <div class="cons-card"><h4>⚠️ 단점 / 개선점</h4><ul>${conHtml}</ul></div>
  </div>`;
}

/* ════════════════════════════════════════
   CHANNEL ANALYSIS MAIN
════════════════════════════════════════ */
async function analyzeChannel(){
  const raw = document.getElementById('chInput').value.trim();
  if(!raw){ alert('채널 URL 또는 핸들을 입력하세요'); return; }
  const box = document.getElementById('chResult');
  box.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>채널 정보 로딩 중…</span></div>';

  let handle = raw.replace(/^https?:\/\/(www\.)?youtube\.com\//,'').replace(/^@/,'');
  handle = handle.split('/')[0].split('?')[0];

  try{
    // Step 1: search channel
    const searchRes = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(handle)}&maxResults=1&key=${getKey()}`
    );
    const searchData = await searchRes.json();
    if(!searchData.items||!searchData.items.length) throw new Error('채널을 찾을 수 없습니다');
    const chId = searchData.items[0].id.channelId;

    // Step 2: channel details
    const chRes = await fetch(
      `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings&id=${chId}&key=${getKey()}`
    );
    const chData = await chRes.json();
    if(!chData.items||!chData.items.length) throw new Error('채널 정보를 가져올 수 없습니다');
    const ch = chData.items[0];
    const stats = ch.statistics||{};
    const snippet = ch.snippet||{};

    const subs  = parseInt(stats.subscriberCount||0);
    const views = parseInt(stats.viewCount||0);
    const vids  = parseInt(stats.videoCount||0);
    const desc  = snippet.description||'';
    const country = snippet.country||'';
    const titleLen = (snippet.title||'').length;
    const hashtags = (desc.match(/#\w+/g)||[]).length;

    const score  = hashScore(subs,views,vids);
    const g      = getLvFromScore(score);
    const topPct = (100-score);

    const analysisData = {subs,views,vids,desc,country,titleLen,hashtags};

    box.innerHTML = `
      <!-- LV ROW -->
      <div class="lv-row">
        ${buildLevelCard(g,score,topPct)}
        ${buildGradeTable(g.lv)}
      </div>

      <!-- CHANNEL INFO -->
      <div class="card" style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
          <img src="${esc(snippet.thumbnails?.default?.url||'')}" alt=""
               style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--acc)">
          <div>
            <div style="font-size:1.05rem;font-weight:800">${esc(snippet.title||'')}</div>
            <div style="font-size:.78rem;color:var(--text3)">@${esc(snippet.customUrl||handle)} ${country?'· '+country:''}</div>
          </div>
        </div>
        <div class="metric-grid">
          <div class="metric-card"><div class="metric-label">구독자</div><div class="metric-val">${fmt(subs)}</div></div>
          <div class="metric-card"><div class="metric-label">총 조회수</div><div class="metric-val">${fmt(views)}</div></div>
          <div class="metric-card"><div class="metric-label">영상 수</div><div class="metric-val">${vids}</div></div>
          <div class="metric-card"><div class="metric-label">평균 조회</div><div class="metric-val">${vids>0?fmt(Math.round(views/vids)):'-'}</div></div>
        </div>
      </div>

      <!-- BENCHMARK -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">📈 벤치마킹</div>
        <div class="bench-grid">${buildBenchmark(analysisData)}</div>
      </div>

      <!-- PROS CONS -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">🔍 장단점 분석</div>
        ${buildProsCons(analysisData)}
      </div>
    `;

    // 팝업 광고
    showPopupAd();

  } catch(e){
    // fallback demo
    const score = 45, g = getLvFromScore(score), topPct = 100-score;
    const demoData = {subs:82000,views:4200000,vids:87,desc:'#유튜브 #크리에이터 영상 제작 팁을 알려드립니다',country:'KR',titleLen:8,hashtags:2};
    box.innerHTML = `
      <div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:.8rem;color:var(--gold)">
        ⚠️ API 오류 — 데모 데이터로 표시됩니다 (${esc(e.message)})
      </div>
      <div class="lv-row">
        ${buildLevelCard(g,score,topPct)}
        ${buildGradeTable(g.lv)}
      </div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">📈 벤치마킹</div>
        <div class="bench-grid">${buildBenchmark(demoData)}</div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">🔍 장단점 분석</div>
        ${buildProsCons(demoData)}
      </div>`;
  }
}

/* ════════════════════════════════════════
   HOT VIDEOS
════════════════════════════════════════ */
const CATS = [
  {id:'0',name:'전체'},
  {id:'10',name:'음악'},
  {id:'20',name:'게임'},
  {id:'22',name:'인물/블로그'},
  {id:'23',name:'코미디'},
  {id:'24',name:'엔터테인먼트'},
  {id:'25',name:'뉴스/정치'},
  {id:'26',name:'방법/스타일'},
  {id:'27',name:'교육'},
  {id:'28',name:'과학/기술'},
];
let curCat='0', curType='all', curPage=0;
const PAGE_SIZE=12;
let allVideos=[], filteredVideos=[];

function buildCatList(){
  const box = document.getElementById('catList');
  box.innerHTML = CATS.map(c=>`
    <button class="cat-btn ${c.id===curCat?'active':''}"
      onclick="setCat('${c.id}',this)">${c.name}</button>
  `).join('');
}

function setCat(id, el){
  curCat=id; curPage=0;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  loadHotVideos();
}

function setType(t, el){
  curType=t; curPage=0;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

async function loadHotVideos(){
  const grid = document.getElementById('videoGrid');
  grid.innerHTML='<div class="loading-spinner"><div class="spinner"></div><span>불러오는 중…</span></div>';
  try{
    const catParam = curCat!=='0' ? `&videoCategoryId=${curCat}` : '';
    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=50&regionCode=KR${catParam}&key=${getKey()}`
    );
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    allVideos = data.items||[];
    applyFilter();
  } catch(e){
    grid.innerHTML=`<div class="empty-msg">⚠️ 영상 로드 실패: ${esc(e.message)}</div>`;
  }
}

function isShorts(v){
  const dur = v.contentDetails?.duration||'';
  const m = dur.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return false;
  const mins = parseInt(m[1]||0), secs = parseInt(m[2]||0);
  return (mins===0 && secs<=60)||(mins===1&&secs===0);
}

function applyFilter(){
  if(curType==='shorts') filteredVideos=allVideos.filter(v=>isShorts(v));
  else if(curType==='long') filteredVideos=allVideos.filter(v=>!isShorts(v));
  else filteredVideos=[...allVideos];
  curPage=0;
  renderPage();
}

function renderPage(){
  const grid = document.getElementById('videoGrid');
  const total = Math.ceil(filteredVideos.length/PAGE_SIZE)||1;
  const slice = filteredVideos.slice(curPage*PAGE_SIZE,(curPage+1)*PAGE_SIZE);
  document.getElementById('pageInfo').textContent=`${curPage+1} / ${total}`;
  document.getElementById('prevBtn').disabled=curPage===0;
  document.getElementById('nextBtn').disabled=curPage>=total-1;
  if(!slice.length){ grid.innerHTML='<div class="empty-msg">해당 조건의 영상이 없습니다</div>'; return; }
  grid.innerHTML = slice.map(v=>{
    const s = v.snippet||{};
    const st = v.statistics||{};
    const views = parseInt(st.viewCount||0);
    const likes = parseInt(st.likeCount||0);
    const viral = Math.min(100,Math.round((views/500000)*40+(likes/10000)*60));
    const thumb = s.thumbnails?.medium?.url||s.thumbnails?.default?.url||'';
    const shorts = isShorts(v);
    const dur = formatDuration(v.contentDetails?.duration||'');
    const vid = esc(v.id), title = esc(s.title||''), ch = esc(s.channelTitle||''), date = esc((s.publishedAt||'').slice(0,10));
    return `
    <div class="vid-card" onclick="openVidModal('${vid}','${title}','${ch}','${date}')">
      <div class="vid-thumb">
        <img src="${esc(thumb)}" alt="" onerror="this.style.background='#333';this.style.display='block'">
        ${shorts?'<span class="vid-shorts-badge">Shorts</span>':''}
        ${dur?`<span class="vid-dur">${dur}</span>`:''}
      </div>
      <div class="vid-info">
        <div class="vid-title">${title}</div>
        <div class="vid-meta">${ch} · ${fmt(views)} 조회 · ${date}</div>
        <div class="viral-bar"><div class="viral-fill" style="width:${viral}%"></div></div>
        <div style="font-size:.67rem;color:var(--text3);margin-top:2px">바이럴 지수 ${viral}</div>
      </div>
    </div>`;
  }).join('');
}

function changePage(dir){
  const total=Math.ceil(filteredVideos.length/PAGE_SIZE)||1;
  curPage=Math.max(0,Math.min(total-1,curPage+dir));
  renderPage();
  document.getElementById('sec-hot').scrollTop=0;
}

function formatDuration(dur){
  const m=dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return '';
  const h=parseInt(m[1]||0),mn=parseInt(m[2]||0),s=parseInt(m[3]||0);
  if(h>0) return `${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${mn}:${String(s).padStart(2,'0')}`;
}

/* ════════════════════════════════════════
   REVENUE CALCULATOR
════════════════════════════════════════ */
const REV_INPUTS = [
  {id:'views',  label:'월간 조회수',  min:1000,   max:10000000, step:10000,  val:100000,  unit:'회'},
  {id:'rpm',    label:'RPM (광고단가)',min:0.5,    max:20,       step:0.1,    val:2.5,     unit:'$'},
  {id:'sponsor',label:'협찬 수입(월)', min:0,      max:10000000, step:100000, val:0,       unit:'원'},
];
let revVals = {};
REV_INPUTS.forEach(r=>{ revVals[r.id]=r.val; });

function initRevenue(){
  const box = document.getElementById('revInputsBox');
  box.innerHTML = REV_INPUTS.map(r=>`
    <div class="rev-item">
      <label>${r.label}</label>
      <div class="gauge-wrap" id="gw-${r.id}"
           onpointerdown="startGauge(event,'${r.id}')"
           onpointermove="moveGauge(event,'${r.id}')"
           onpointerup="endGauge(event,'${r.id}')"
           onpointercancel="endGauge(event,'${r.id}')">
        <div class="gauge-track">
          <div class="gauge-fill" id="gf-${r.id}" style="width:${gaugePercent(r.id,r)}%"></div>
        </div>
        <div class="gauge-thumb" id="gt-${r.id}" style="left:${gaugePercent(r.id,r)}%"></div>
      </div>
      <div class="gauge-value" id="gv-${r.id}">${fmtRevVal(r.id,revVals[r.id])}</div>
      <div class="gauge-range"><span>${fmtRevVal(r.id,r.min)}</span><span>${fmtRevVal(r.id,r.max)}</span></div>
    </div>
  `).join('');
  calcRevenue();
}

const gaugeActive = {};
function gaugePercent(id, r){
  const ri = r || REV_INPUTS.find(x=>x.id===id);
  return Math.round(((revVals[id]-ri.min)/(ri.max-ri.min))*100);
}
function fmtRevVal(id,v){
  if(id==='rpm') return '$'+Number(v).toFixed(2);
  if(id==='sponsor') return fmtMoney(v);
  return fmt(v)+'회';
}
function startGauge(e,id){
  const el=e.currentTarget; el.setPointerCapture(e.pointerId);
  gaugeActive[id]=true; updateGaugeFromEvent(e,id);
}
function moveGauge(e,id){ if(gaugeActive[id]) updateGaugeFromEvent(e,id); }
function endGauge(e,id){ gaugeActive[id]=false; }
function updateGaugeFromEvent(e,id){
  const ri=REV_INPUTS.find(x=>x.id===id);
  const track=e.currentTarget.querySelector('.gauge-track');
  const rect=track.getBoundingClientRect();
  let pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  let val=ri.min+(ri.max-ri.min)*pct;
  val=Math.round(val/ri.step)*ri.step;
  val=Math.max(ri.min,Math.min(ri.max,val));
  revVals[id]=val;
  const p=Math.round(pct*100);
  document.getElementById('gf-'+id).style.width=p+'%';
  document.getElementById('gt-'+id).style.left=p+'%';
  document.getElementById('gv-'+id).textContent=fmtRevVal(id,val);
  calcRevenue();
}
function calcRevenue(){
  const views=revVals['views']||0;
  const rpm=revVals['rpm']||0;
  const sponsor=revVals['sponsor']||0;
  const adRev=Math.round((views/1000)*rpm*1350);
  const total=adRev+sponsor;
  const annual=total*12;
  document.getElementById('revCards').innerHTML=`
    <div class="rev-card"><div class="rev-card-label">📺 광고 수익 (월)</div><div class="rev-card-val">${fmtMoney(adRev)}</div></div>
    <div class="rev-card"><div class="rev-card-label">🤝 협찬 포함 (월)</div><div class="rev-card-val">${fmtMoney(total)}</div></div>
    <div class="rev-card"><div class="rev-card-label">📅 연간 예상</div><div class="rev-card-val">${fmtMoney(annual)}</div></div>
    <div class="rev-card"><div class="rev-card-label">👁️ 조회당 수익</div><div class="rev-card-val">${views>0?(total/views*100).toFixed(2)+'원':'—'}</div></div>`;
  let tip='';
  if(total<100000) tip='💡 아직 초기 단계입니다. 꾸준한 업로드와 썸네일 최적화로 성장하세요!';

  else if(total<2000000) tip='🚀 안정적 수익 구조입니다. 멤버십·협찬으로 수익 다각화를 추천합니다.';
  else tip='🏆 훌륭한 채널입니다! 강의·굿즈·컨설팅으로 브랜드를 확장하세요.';
  document.getElementById('revTip').textContent=tip;
}

let popTimer=null;
function showPopupAd(){
  const ov=document.getElementById('popupAd');
  ov.classList.add('open');
  let sec=5;
  document.getElementById('popupCountdown').textContent=`${sec}초 후 닫기 가능…`;
  document.getElementById('popupCloseBtn').style.display='none';
  if(popTimer) clearInterval(popTimer);
  popTimer=setInterval(()=>{
    sec--;
    if(sec<=0){
      clearInterval(popTimer);
      document.getElementById('popupCloseBtn').style.display='block';
      document.getElementById('popupCountdown').textContent='';
    } else {
      document.getElementById('popupCountdown').textContent=`${sec}초 후 닫기 가능…`;
    }
  },1000);
  try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
}
function closePopup(){ document.getElementById('popupAd').classList.remove('open'); }
