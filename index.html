<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO · 알고리빙1004</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --void:      #03020a;
  --deep:      #0a0518;
  --purple-dk: #1a0535;
  --purple-md: #2d0d5c;
  --purple-vt: #6b21a8;
  --purple-lt: #a855f7;
  --gold-dk:   #8a6520;
  --gold-md:   #d4a942;
  --gold-lt:   #f0c96a;
  --gold-wh:   #fff8e7;
  --white:     #f5f0ec;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  background: var(--void);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 80px;
  padding: 80px 24px;
  overflow-x: hidden;
}

/* ── 배경 ── */
.bg-void{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 55% 45% at 50% 42%,
      rgba(45,13,92,.5) 0%, rgba(26,5,53,.32) 35%, transparent 75%),
    radial-gradient(ellipse 100% 80% at 50% 50%,
      var(--deep) 0%, var(--void) 70%);
}
.bh-core{
  position:fixed; width:300px; height:150px;
  top:38%; left:50%; transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(ellipse at center,
    rgba(107,33,168,.2) 0%, rgba(107,33,168,.06) 45%, transparent 72%);
  filter:blur(20px);
  pointer-events:none; z-index:0;
  animation:corePulse 5s ease-in-out infinite;
}
@keyframes corePulse{
  0%,100%{ opacity:.65; transform:translate(-50%,-50%) scale(1); }
  50%    { opacity:1;   transform:translate(-50%,-50%) scale(1.2); }
}
.bh-ring{
  position:fixed; border-radius:50%;
  top:38%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none; z-index:0; opacity:0;
  animation:ringEx linear infinite;
}
.bh-ring:nth-child(1){ border:1px solid rgba(168,85,247,.16);  animation-duration:9s; animation-delay:0s;    }
.bh-ring:nth-child(2){ border:1px solid rgba(212,169,66,.09);  animation-duration:9s; animation-delay:2.25s; }
.bh-ring:nth-child(3){ border:1px solid rgba(107,33,168,.13);  animation-duration:9s; animation-delay:4.5s;  }
.bh-ring:nth-child(4){ border:1px solid rgba(240,201,106,.06); animation-duration:9s; animation-delay:6.75s; }
@keyframes ringEx{
  0%  { width:60px;   height:30px;  opacity:0; }
  6%  { opacity:.85; }
  100%{ width:1100px; height:550px; opacity:0; }
}
.star{
  position:fixed; border-radius:50%; pointer-events:none; z-index:0;
  animation:twinkle ease-in-out infinite;
}
@keyframes twinkle{
  0%,100%{ opacity:.05; transform:scale(1); }
  50%    { opacity:.5;  transform:scale(1.5); }
}

/* ── 섹션 레이블 ── */
.sec-label{
  position:relative; z-index:10;
  font-family:'Noto Sans KR',sans-serif;
  font-size:9px; font-weight:300;
  letter-spacing:6px; text-transform:uppercase;
  color:rgba(168,85,247,.38); text-align:center;
  margin-bottom:28px;
}

/* ══════════════════════════════════════
   대형 로고
══════════════════════════════════════ */
.logo-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}
.logo-wrap{
  position:relative;
  display:flex; flex-direction:column; align-items:center;
  padding:40px 60px 44px;
  animation:breathe 7s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-10px); }
}

/* 후광 */
.logo-halo-p{
  position:absolute;
  width:520px; height:260px;
  top:50%; left:50%; transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at 50% 45%,
    rgba(107,33,168,.25) 0%, rgba(107,33,168,.08) 45%, transparent 70%);
  filter:blur(30px); pointer-events:none; z-index:0;
  animation:haloP 5s ease-in-out infinite;
}
@keyframes haloP{
  0%,100%{ opacity:.6;  transform:translate(-50%,-50%) scale(1); }
  50%    { opacity:1;   transform:translate(-50%,-50%) scale(1.1); }
}
.logo-halo-g{
  position:absolute;
  width:360px; height:130px;
  top:54%; left:50%; transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at 50% 50%,
    rgba(212,169,66,.16) 0%, rgba(212,169,66,.04) 55%, transparent 75%);
  filter:blur(18px); pointer-events:none; z-index:0;
  animation:haloG 4s ease-in-out infinite;
}
@keyframes haloG{
  0%,100%{ opacity:.45; }
  50%    { opacity:.85; }
}

/* 깃털 + 텍스트 컨테이너 */
.logo-inner{
  position:relative;
  display:flex; flex-direction:column; align-items:center;
  z-index:2;
}

/* ALGO 텍스트 */
.logo-algo{
  font-family:'Cinzel',serif;
  font-size:72px; font-weight:900;
  letter-spacing:24px; padding-right:24px;
  background:linear-gradient(175deg,
    var(--gold-wh)   0%,
    var(--gold-lt)   25%,
    var(--gold-md)   52%,
    var(--purple-lt) 76%,
    var(--gold-lt)   100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  background-size:200% 200%;
  filter:drop-shadow(0 0 26px rgba(168,85,247,.48));
  animation:algoShimmer 6s ease-in-out infinite;
  position:relative; z-index:5;
  /* 깃털이 꽂히는 뒤 공간 확보 */
  margin-top: 20px;
}
@keyframes algoShimmer{
  0%,100%{ background-position:0% 50%;   filter:drop-shadow(0 0 20px rgba(168,85,247,.42)); }
  50%    { background-position:100% 50%; filter:drop-shadow(0 0 40px rgba(168,85,247,.72)) drop-shadow(0 0 58px rgba(212,169,66,.28)); }
}

/* 구분선 */
.logo-rule{
  width:100%; height:1px; margin:10px 0 8px; position:relative;
  background:linear-gradient(90deg,
    transparent 0%, rgba(168,85,247,.2) 15%,
    rgba(212,169,66,.58) 45%, rgba(168,85,247,.48) 55%,
    rgba(212,169,66,.18) 85%, transparent 100%);
}
.logo-rule::before,.logo-rule::after{
  content:''; position:absolute; top:50%; transform:translateY(-50%);
  width:3.5px; height:3.5px; border-radius:50%;
}
.logo-rule::before{ left:16%;  background:var(--gold-md); box-shadow:0 0 5px var(--gold-md); }
.logo-rule::after { right:16%; background:var(--purple-lt); box-shadow:0 0 5px var(--purple-lt); }

.logo-sub{
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-weight:300;
  font-size:14px; letter-spacing:8px; padding-right:8px;
  color:rgba(212,169,66,.52);
  animation:subFade 5s ease-in-out infinite;
}
@keyframes subFade{ 0%,100%{ opacity:.52; } 50%{ opacity:.82; } }

/* ══════════════════════════════════════
   깃털 SVG 공통
══════════════════════════════════════ */
.feathers-layer{
  position:absolute;
  /* 텍스트 위 중앙에 꽂힌 것처럼 */
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 420px;
  height: 110px;
  pointer-events: none;
  z-index: 4;
}

/* ══════════════════════════════════════
   소형 배지
══════════════════════════════════════ */
.badge-section{
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
}
.badge-wrap{
  position:relative;
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 20px;
  border-radius:40px;
  animation:badgeFloat 5.5s ease-in-out infinite;
  cursor:pointer;
}
@keyframes badgeFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
.badge-glass{
  position:absolute; inset:0; border-radius:40px; z-index:0;
  background:linear-gradient(135deg,
    rgba(45,13,92,.52) 0%, rgba(10,5,24,.68) 50%, rgba(26,5,53,.48) 100%);
  backdrop-filter:blur(8px);
}
.badge-border{
  position:absolute; inset:0; border-radius:40px; z-index:1; pointer-events:none;
  border:1px solid transparent;
  background:
    linear-gradient(var(--void),var(--void)) padding-box,
    linear-gradient(135deg,
      rgba(168,85,247,.65) 0%, rgba(212,169,66,.48) 35%,
      rgba(168,85,247,.38) 65%, rgba(240,201,106,.55) 100%) border-box;
}
.badge-glow{
  position:absolute; inset:0; border-radius:40px; z-index:0; pointer-events:none;
  background:radial-gradient(ellipse at center, rgba(107,33,168,.18) 0%, transparent 70%);
  animation:bGlow 4s ease-in-out infinite;
}
@keyframes bGlow{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }
.badge-shine{
  position:absolute; inset:0; border-radius:40px; z-index:2; overflow:hidden; pointer-events:none;
}
.badge-shine::after{
  content:''; position:absolute; top:0; left:-130%; width:75%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.11), transparent);
  transform:skewX(-18deg);
  animation:shineSlide 5s ease-in-out infinite;
}
@keyframes shineSlide{ 0%,58%,100%{ left:-130%; } 82%{ left:150%; } }

/* 배지 깃털 레이어 */
.badge-feathers{
  position:absolute;
  top: -22px; left:50%; transform:translateX(-50%);
  width:160px; height:40px;
  pointer-events:none; z-index:4;
}

.badge-algo-text{
  font-family:'Cinzel',serif;
  font-size:13px; font-weight:700;
  letter-spacing:5px; padding-right:5px;
  background:linear-gradient(90deg,
    var(--gold-lt) 0%, var(--gold-wh) 40%,
    var(--purple-lt) 70%, var(--gold-lt) 100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  background-size:200% 100%;
  position:relative; z-index:3;
  animation:badgeTA 5s ease-in-out infinite;
}
@keyframes badgeTA{ 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }
</style>
</head>
<body>

<div class="bg-void"></div>
<div class="bh-core"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>
<div class="bh-ring"></div>

<script>
/* 별 */
(function(){
  const cs=['rgba(255,248,231,.9)','rgba(168,85,247,.8)','rgba(212,169,66,.8)','rgba(245,240,236,.7)'];
  for(let i=0;i<65;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*1.5+.3, c=cs[Math.floor(Math.random()*cs.length)];
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${c};box-shadow:0 0 ${sz*2}px ${c};animation-duration:${Math.random()*5+3}s;animation-delay:${Math.random()*7}s;`;
    document.body.appendChild(s);
  }
})();
</script>

<!-- ══ 대형 로고 ══ -->
<div class="logo-section">
  <div class="sec-label">◈ &nbsp; Page Title Logo &nbsp; ◈</div>
  <div class="logo-wrap">
    <div class="logo-halo-p"></div>
    <div class="logo-halo-g"></div>

    <div class="logo-inner">

      <!-- 깃털 레이어 — ALGO 텍스트 위에 꽂힘 -->
      <div class="feathers-layer">
        <svg width="420" height="110" viewBox="0 0 420 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- 흰 깃털 그라디언트: 밑둥(불투명)→끝(투명) -->
            <linearGradient id="fg0" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
              <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.0"/>
              <stop offset="35%"  stop-color="#f8f4ff" stop-opacity="0.55"/>
              <stop offset="70%"  stop-color="#fffbf0" stop-opacity="0.82"/>
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0.95"/>
            </linearGradient>
            <!-- 골드 섞인 깃털 -->
            <linearGradient id="fg1" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
              <stop offset="0%"   stop-color="#d4a942" stop-opacity="0.0"/>
              <stop offset="30%"  stop-color="#f0c96a" stop-opacity="0.45"/>
              <stop offset="65%"  stop-color="#fff8e7" stop-opacity="0.78"/>
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0.92"/>
            </linearGradient>
            <!-- 퍼플 섞인 깃털 -->
            <linearGradient id="fg2" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
              <stop offset="0%"   stop-color="#6b21a8" stop-opacity="0.0"/>
              <stop offset="30%"  stop-color="#a855f7" stop-opacity="0.4"/>
              <stop offset="65%"  stop-color="#e8d5ff" stop-opacity="0.72"/>
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
            </linearGradient>
            <filter id="ff_soft">
              <feGaussianBlur stdDeviation="0.6" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="ff_glow">
              <feGaussianBlur stdDeviation="2" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!--
            깃털 배치 전략:
            - 중앙(ALGO 가운데) 기준으로 부채꼴 분산
            - 각 깃털은 밑둥이 텍스트 상단(y≈105)에 위치
            - 위로 솟구치며 좌우로 기울어짐
            - 5종 깃털 타입: 중앙 직립, 좌/우 경사, 외곽 넓은 경사
          -->

          <!-- ╔══ 깃털 그리기: path 구조 = 밑둥→줄기→왼쪽 날→오른쪽 날 ══╗ -->

          <!-- ── 중앙 깃털 (직립, 가장 길고 밝음) ── -->
          <g filter="url(#ff_glow)">
            <!-- 줄기 -->
            <line x1="210" y1="105" x2="210" y2="4"
              stroke="rgba(255,255,255,0.85)" stroke-width="0.9" stroke-linecap="round"/>
            <!-- 왼쪽 날 -->
            <path d="M 210,105 C 196,85 188,60 190,8"
              stroke="url(#fg0)" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.92"/>
            <!-- 오른쪽 날 -->
            <path d="M 210,105 C 224,85 232,60 230,8"
              stroke="url(#fg0)" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.92"/>
            <!-- 내부 결 -->
            <path d="M 210,95 C 204,78 200,55 202,18"
              stroke="rgba(255,255,255,0.3)" stroke-width="0.5" fill="none" stroke-linecap="round"/>
            <path d="M 210,95 C 216,78 220,55 218,18"
              stroke="rgba(255,255,255,0.3)" stroke-width="0.5" fill="none" stroke-linecap="round"/>
            <!-- 가로 바브 (깃털 결) -->
            <line x1="200" y1="28" x2="220" y2="28" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
            <line x1="198" y1="40" x2="222" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
            <line x1="196" y1="52" x2="224" y2="52" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
            <line x1="194" y1="65" x2="226" y2="65" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
            <line x1="192" y1="78" x2="228" y2="78" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
          </g>

          <!-- ── 중앙 왼쪽 1번 깃털 (골드) ── -->
          <g filter="url(#ff_soft)">
            <line x1="188" y1="107" x2="172" y2="6"
              stroke="rgba(240,201,106,0.7)" stroke-width="0.75" stroke-linecap="round"/>
            <path d="M 188,107 C 174,88 162,64 162,10"
              stroke="url(#fg1)" stroke-width="1.0" fill="none" stroke-linecap="round" opacity="0.85"/>
            <path d="M 188,107 C 200,86 198,62 182,6"
              stroke="url(#fg1)" stroke-width="1.0" fill="none" stroke-linecap="round" opacity="0.85"/>
            <line x1="172" y1="28" x2="187" y2="26" stroke="rgba(240,201,106,0.15)" stroke-width="0.45"/>
            <line x1="169" y1="42" x2="186" y2="39" stroke="rgba(240,201,106,0.12)" stroke-width="0.45"/>
            <line x1="167" y1="57" x2="185" y2="53" stroke="rgba(240,201,106,0.10)" stroke-width="0.45"/>
            <line x1="165" y1="72" x2="184" y2="68" stroke="rgba(240,201,106,0.08)" stroke-width="0.4"/>
          </g>

          <!-- ── 중앙 오른쪽 1번 깃털 (골드) ── -->
          <g filter="url(#ff_soft)">
            <line x1="232" y1="107" x2="248" y2="6"
              stroke="rgba(240,201,106,0.7)" stroke-width="0.75" stroke-linecap="round"/>
            <path d="M 232,107 C 220,88 222,62 238,6"
              stroke="url(#fg1)" stroke-width="1.0" fill="none" stroke-linecap="round" opacity="0.85"/>
            <path d="M 232,107 C 246,86 258,64 258,10"
              stroke="url(#fg1)" stroke-width="1.0" fill="none" stroke-linecap="round" opacity="0.85"/>
            <line x1="233" y1="26" x2="248" y2="28" stroke="rgba(240,201,106,0.15)" stroke-width="0.45"/>
            <line x1="234" y1="39" x2="251" y2="42" stroke="rgba(240,201,106,0.12)" stroke-width="0.45"/>
            <line x1="235" y1="53" x2="253" y2="57" stroke="rgba(240,201,106,0.10)" stroke-width="0.45"/>
            <line x1="236" y1="68" x2="256" y2="72" stroke="rgba(240,201,106,0.08)" stroke-width="0.4"/>
          </g>

          <!-- ── 왼쪽 2번 깃털 (퍼플, 경사짐) ── -->
          <g filter="url(#ff_soft)">
            <line x1="164" y1="108" x2="134" y2="12"
              stroke="rgba(168,85,247,0.55)" stroke-width="0.7" stroke-linecap="round"/>
            <path d="M 164,108 C 144,90 128,68 126,16"
              stroke="url(#fg2)" stroke-width="0.95" fill="none" stroke-linecap="round" opacity="0.78"/>
            <path d="M 164,108 C 178,88 170,64 142,8"
              stroke="url(#fg2)" stroke-width="0.95" fill="none" stroke-linecap="round" opacity="0.78"/>
            <line x1="135" y1="34" x2="153" y2="30" stroke="rgba(168,85,247,0.12)" stroke-width="0.4"/>
            <line x1="132" y1="50" x2="151" y2="45" stroke="rgba(168,85,247,0.10)" stroke-width="0.4"/>
            <line x1="130" y1="67" x2="149" y2="61" stroke="rgba(168,85,247,0.08)" stroke-width="0.4"/>
          </g>

          <!-- ── 오른쪽 2번 깃털 (퍼플, 경사짐) ── -->
          <g filter="url(#ff_soft)">
            <line x1="256" y1="108" x2="286" y2="12"
              stroke="rgba(168,85,247,0.55)" stroke-width="0.7" stroke-linecap="round"/>
            <path d="M 256,108 C 270,88 278,64 278,8"
              stroke="url(#fg2)" stroke-width="0.95" fill="none" stroke-linecap="round" opacity="0.78"/>
            <path d="M 256,108 C 242,90 252,68 294,16"
              stroke="url(#fg2)" stroke-width="0.95" fill="none" stroke-linecap="round" opacity="0.78"/>
            <line x1="267" y1="30" x2="285" y2="34" stroke="rgba(168,85,247,0.12)" stroke-width="0.4"/>
            <line x1="269" y1="45" x2="288" y2="50" stroke="rgba(168,85,247,0.10)" stroke-width="0.4"/>
            <line x1="271" y1="61" x2="290" y2="67" stroke="rgba(168,85,247,0.08)" stroke-width="0.4"/>
          </g>

          <!-- ── 왼쪽 3번 깃털 (흰색, 더 넓게 기울어짐) ── -->
          <g filter="url(#ff_soft)">
            <line x1="138" y1="108" x2="96" y2="22"
              stroke="rgba(255,255,255,0.38)" stroke-width="0.6" stroke-linecap="round"/>
            <path d="M 138,108 C 112,92 90,72 80,26"
              stroke="url(#fg0)" stroke-width="0.85" fill="none" stroke-linecap="round" opacity="0.6"/>
            <path d="M 138,108 C 156,90 148,68 112,18"
              stroke="url(#fg0)" stroke-width="0.85" fill="none" stroke-linecap="round" opacity="0.6"/>
            <line x1="98" y1="44" x2="118" y2="38" stroke="rgba(255,255,255,0.09)" stroke-width="0.38"/>
            <line x1="95" y1="62" x2="116" y2="55" stroke="rgba(255,255,255,0.07)" stroke-width="0.38"/>
