<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 레벨 카드 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070f;--text:#e8e8f0;--sub:#7777aa;--accent:#6c63ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:48px 24px 80px;}
.page-title{text-align:center;font-size:2rem;font-weight:900;background:linear-gradient(90deg,#6c63ff,#a78bfa,#6c63ff);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:titleSlide 3s linear infinite;margin-bottom:8px;}
@keyframes titleSlide{to{background-position:200% center;}}
.page-sub{text-align:center;color:var(--sub);font-size:.88rem;margin-bottom:48px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:90px 40px;padding:40px 20px 60px;max-width:1400px;margin:0 auto;}
.card-scene{width:220px;height:308px;perspective:900px;position:relative;cursor:pointer;margin:auto;}
.card-tilt{position:absolute;inset:0;transform-style:preserve-3d;transform:rotateX(0deg) rotateY(0deg);transition:transform .1s ease;will-change:transform;}
.card-frame{position:absolute;inset:-3px;border-radius:21px;z-index:1;pointer-events:none;}
.card-frame::after{content:'';position:absolute;inset:2px;border-radius:19px;background:var(--bg);}
.beam-container{position:absolute;inset:-3px;border-radius:21px;overflow:hidden;z-index:2;pointer-events:none;}
.beam-ring{position:absolute;width:400%;height:400%;top:50%;left:50%;margin-top:-200%;margin-left:-200%;animation:beamRingSpin var(--beam-speed,3s) linear infinite;transform-origin:center center;}
@keyframes beamRingSpin{from{rotate:0deg;}to{rotate:360deg;}}
.card-body{position:absolute;inset:0;border-radius:18px;z-index:3;transition:box-shadow .3s ease;}
.card-face{position:absolute;inset:0;border-radius:18px;overflow:hidden;}
.card-face::before{content:'';position:absolute;inset:0;border-radius:18px;background:repeating-linear-gradient(-45deg,transparent 0px,transparent 3px,rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px);pointer-events:none;z-index:1;}
.card-shine{position:absolute;inset:0;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%);pointer-events:none;z-index:5;mix-blend-mode:screen;transition:background .08s ease;}
.card-top-band{position:absolute;top:0;left:0;right:0;height:44%;border-radius:18px 18px 0 0;z-index:2;pointer-events:none;}
.card-bot-band{position:absolute;bottom:0;left:0;right:0;height:40%;border-radius:0 0 18px 18px;z-index:2;pointer-events:none;}
.card-header{position:absolute;top:0;left:0;right:0;padding:13px 14px 0;display:flex;justify-content:space-between;align-items:flex-start;z-index:10;}
.card-lv-label{font-size:11px;font-weight:900;letter-spacing:.08em;padding:3px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.35);color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);backdrop-filter:blur(4px);}
.card-badge{color:#fff;padding:4px 11px;border-radius:8px;font-size:10px;font-weight:900;letter-spacing:.09em;box-shadow:0 2px 10px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.2);}
.card-bokeh{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden;border-radius:18px;}
.bokeh-dot{position:absolute;border-radius:50%;filter:blur(var(--bblur,5px));opacity:var(--bop,.35);animation:bokehDrift var(--bdur,7s) ease-in-out infinite;animation-delay:var(--bdel,0s);}
@keyframes bokehDrift{0%,100%{transform:translate(0,0) scale(1);}25%{transform:translate(7px,-9px) scale(1.12);}50%{transform:translate(-6px,7px) scale(.91);}75%{transform:translate(9px,4px) scale(1.06);}}
.card-sparkles{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:hidden;border-radius:18px;}
.sparkle-dot{position:absolute;font-size:var(--ssz,11px);animation:sparklePop var(--sdur,2.2s) ease-in-out infinite;animation-delay:var(--sdel,0s);}
@keyframes sparklePop{0%,100%{opacity:.08;transform:scale(.45) rotate(-12deg);}40%{opacity:1;transform:scale(1.25) rotate(12deg);}65%{opacity:.75;transform:scale(1.05) rotate(5deg);}}
.card-icon-wrap{position:absolute;top:46%;left:50%;transform:translate(-50%,-54%);z-index:8;display:flex;flex-direction:column;align-items:center;gap:9px;}
.card-main-icon{font-size:3.5rem;animation:iconHover 3.5s ease-in-out infinite;}
@keyframes iconHover{0%,100%{transform:translateY(0) rotateY(0deg);}30%{transform:translateY(-7px) rotateY(9deg);}70%{transform:translateY(-3px) rotateY(-6deg);}}
.card-main-name{font-size:1.06rem;font-weight:900;letter-spacing:.06em;}
.card-vignette{position:absolute;inset:0;z-index:6;pointer-events:none;border-radius:18px;background:radial-gradient(ellipse at center,transparent 28%,rgba(4,4,12,.62) 100%);}

/* ── 경험치 게이지 ── */
.card-xp-wrap{position:absolute;bottom:52px;left:14px;right:14px;z-index:10;}
.card-xp-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.xp-title{font-size:9px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.5);}
.xp-range{font-size:9px;font-weight:700;color:rgba(255,255,255,.5);}
.xp-bar-bg{width:100%;height:5px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden;position:relative;}
.xp-bar-fill{height:100%;border-radius:4px;position:relative;transition:width .6s ease;}
.xp-bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.45) 50%,transparent 100%);animation:xpShine 2s linear infinite;}
@keyframes xpShine{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}
.xp-sub-label{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
.xp-lv-range{font-size:8px;color:rgba(255,255,255,.35);letter-spacing:.04em;}
.xp-pct{font-size:8px;font-weight:700;color:rgba(255,255,255,.4);}

/* ── 푸터 ── */
.card-footer{position:absolute;bottom:0;left:0;right:0;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;z-index:10;border-radius:0 0 18px 18px;border-top:1px solid rgba(255,255,255,.15);}
.footer-lv{font-size:10px;font-weight:900;background:rgba(0,0,0,.32);padding:3px 9px;border-radius:6px;letter-spacing:.07em;border:1px solid rgba(255,255,255,.2);color:#fff;}
.footer-name{font-size:13px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5);}
.footer-subs{font-size:10px;color:rgba(255,255,255,.7);}

/* ── 위아래 방사 광채 ── */
.card-scene::before,.card-scene::after{content:'';position:absolute;left:50%;transform:translateX(-50%);width:60%;border-radius:50%;pointer-events:none;z-index:0;}
.card-scene::before{top:-18px;height:36px;filter:blur(14px);animation:topGlow 3s ease-in-out infinite;}
.card-scene::after{bottom:-18px;height:36px;filter:blur(14px);animation:botGlow 3s ease-in-out infinite;}
@keyframes topGlow{0%,100%{opacity:.55;transform:translateX(-50%) scaleX(1);}50%{opacity:.88;transform:translateX(-50%) scaleX(1.14);}}
@keyframes botGlow{0%,100%{opacity:.50;transform:translateX(-50%) scaleX(1);}50%{opacity:.82;transform:translateX(-50%) scaleX(1.12);}}
@keyframes fogPulse{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:.88;transform:scale(1.07);}}

/* ════ LV1 ════ */
.card-scene[data-lv="1"]::before,.card-scene[data-lv="1"]::after{background:radial-gradient(ellipse,rgba(100,149,220,.9) 0%,transparent 70%);}
.card-scene[data-lv="1"] .card-lv-label{color:#a8c8f0;border-color:rgba(74,127,193,.45);text-shadow:0 0 8px rgba(74,127,193,.8);}
.card-scene[data-lv="1"] .card-frame{background:linear-gradient(135deg,#1c2e4a,#4a7fc1,#a8c8f0,#4a7fc1,#1c2e4a);background-size:300% 300%;animation:steelShift 4s ease-in-out infinite;}
@keyframes steelShift{0%{background-position:0% 50%;filter:brightness(1.3);}50%{background-position:100% 50%;filter:brightness(1.7);}100%{background-position:0% 50%;filter:brightness(1.3);}}
.card-scene[data-lv="1"] .beam-ring{background:conic-gradient(from 0deg,transparent 0%,#1c3a5e 2%,#4a7fc1 4%,#a8c8f0 5.5%,#4a7fc1 7%,#1c3a5e 9%,transparent 11%,transparent 100%);filter:brightness(1.5);}
.card-scene[data-lv="1"] .card-body{background:linear-gradient(160deg,#0d1a2e 0%,#0a0f1a 55%,#0d1a2e 100%);box-shadow:0 20px 55px rgba(0,0,0,.7),0 0 30px rgba(74,127,193,.25),0 0 0 1px rgba(74,127,193,.3);}
.card-scene[data-lv="1"] .card-face{background:radial-gradient(ellipse 80% 55% at 50% 40%,rgba(74,127,193,.18) 0%,transparent 70%),linear-gradient(160deg,#0f1e33 0%,#0a0f1a 55%,#0d1a2e 100%);}
.card-scene[data-lv="1"] .card-top-band{background:linear-gradient(180deg,rgba(74,127,193,.35) 0%,transparent 100%);}
.card-scene[data-lv="1"] .card-bot-band{background:linear-gradient(0deg,rgba(74,127,193,.30) 0%,transparent 100%);}
.card-scene[data-lv="1"] .card-main-icon{filter:drop-shadow(0 0 10px rgba(74,127,193,.8)) drop-shadow(0 0 22px rgba(74,127,193,.4));}
.card-scene[data-lv="1"] .card-main-name{color:#a8c8f0;text-shadow:0 0 12px rgba(74,127,193,.9),0 0 24px rgba(74,127,193,.5);}
.card-scene[data-lv="1"] .card-badge{background:linear-gradient(135deg,#1c3a5e,#4a7fc1);}
.card-scene[data-lv="1"] .card-footer{background:linear-gradient(135deg,#0d1e36 0%,#162a45 100%);}
.card-scene[data-lv="1"] .bokeh-dot{background:radial-gradient(circle,rgba(168,200,240,.7) 0%,transparent 70%);}
.card-scene[data-lv="1"] .sparkle-dot{color:#a8c8f0;text-shadow:0 0 6px rgba(74,127,193,.9);}
.card-scene[data-lv="1"] .xp-bar-fill{background:linear-gradient(90deg,#1c3a5e,#4a7fc1,#a8c8f0);box-shadow:0 0 6px rgba(74,127,193,.7);}

/* ════ LV2 ════ */
.card-scene[data-lv="2"]::before,.card-scene[data-lv="2"]::after{background:radial-gradient(ellipse,rgba(0,160,255,.9) 0%,transparent 70%);}
.card-scene[data-lv="2"] .card-lv-label{color:#66ccff;border-color:rgba(0,153,255,.45);text-shadow:0 0 8px rgba(0,153,255,.8);}
.card-scene[data-lv="2"] .card-frame{background:linear-gradient(135deg,#001a33,#0055aa,#00aaff,#ffffff,#00aaff,#0055aa,#001a33);background-size:300% 300%;animation:cobaltShift 3.5s ease-in-out infinite;}
@keyframes cobaltShift{0%{background-position:0% 50%;filter:brightness(1.4) saturate(1.3);}50%{background-position:100% 50%;filter:brightness(1.9) saturate(1.6);}100%{background-position:0% 50%;filter:brightness(1.4) saturate(1.3);}}
.card-scene[data-lv="2"] .beam-ring{background:conic-gradient(from 0deg,transparent 0%,#003366 2%,#0077cc 4%,#00aaff 5.5%,#ffffff 6.5%,#00aaff 8%,transparent 10%,transparent 100%);filter:brightness(1.8) saturate(1.4);}
.card-scene[data-lv="2"] .card-body{background:linear-gradient(160deg,#00091a 0%,#000d22 55%,#00091a 100%);box-shadow:0 22px 58px rgba(0,0,0,.75),0 0 35px rgba(0,153,255,.28),0 0 0 1px rgba(0,153,255,.32);}
.card-scene[data-lv="2"] .card-face{background:radial-gradient(ellipse 80% 55% at 50% 40%,rgba(0,153,255,.2) 0%,transparent 70%),linear-gradient(160deg,#000e22 0%,#000d22 55%,#00091a 100%);}
.card-scene[data-lv="2"] .card-top-band{background:linear-gradient(180deg,rgba(0,153,255,.4) 0%,transparent 100%);}
.card-scene[data-lv="2"] .card-bot-band{background:linear-gradient(0deg,rgba(0,153,255,.35) 0%,transparent 100%);}
.card-scene[data-lv="2"] .card-main-icon{filter:drop-shadow(0 0 12px rgba(0,170,255,.9)) drop-shadow(0 0 28px rgba(0,153,255,.5));}
.card-scene[data-lv="2"] .card-main-name{color:#66ccff;text-shadow:0 0 14px rgba(0,170,255,.9),0 0 30px rgba(0,153,255,.55);}
.card-scene[data-lv="2"] .card-badge{background:linear-gradient(135deg,#003366,#0077cc);}
.card-scene[data-lv="2"] .card-footer{background:linear-gradient(135deg,#00091f 0%,#001433 100%);}
.card-scene[data-lv="2"] .bokeh-dot{background:radial-gradient(circle,rgba(102,204,255,.75) 0%,transparent 70%);}
.card-scene[data-lv="2"] .sparkle-dot{color:#66ccff;text-shadow:0 0 8px rgba(0,170,255,.9);}
.card-scene[data-lv="2"] .xp-bar-fill{background:linear-gradient(90deg,#003366,#0077cc,#00aaff);box-shadow:0 0 6px rgba(0,153,255,.7);}

/* ════ LV3 ════ */
.card-scene[data-lv="3"]::before,.card-scene[data-lv="3"]::after{background:radial-gradient(ellipse,rgba(180,230,255,.9) 0%,transparent 70%);}
.card-scene[data-lv="3"] .fog-wrap{position:absolute;inset:-28px;border-radius:22px;background:radial-gradient(ellipse at center,rgba(180,230,255,.32) 0%,rgba(130,200,255,.18) 45%,transparent 72%);filter:blur(18px);pointer-events:none;z-index:0;animation:fogPulse 3s ease-in-out infinite;}
.card-scene[data-lv="3"] .card-lv-label{color:#b0e8ff;border-color:rgba(128,208,240,.45);text-shadow:0 0 8px rgba(128,208,240,.8);}
.card-scene[data-lv="3"] .card-frame{background:linear-gradient(135deg,#0a1a2e,#2a6080,#80d0f0,#ffffff,#80d0f0,#2a6080,#0a1a2e);background-size:300% 300%;animation:iceShift 3s ease-in-out infinite;}
@keyframes iceShift{0%{background-position:0% 50%;filter:brightness(1.5) saturate(1.2);}50%{background-position:100% 50%;filter:brightness(2.0) saturate(1.5);}100%{background-position:0% 50%;filter:brightness(1.5) saturate(1.2);}}
.card-scene[data-lv="3"] .beam-ring{background:conic-gradient(from 0deg,transparent 0%,#1a4060 2%,#3a90c0 4%,#90dff8 5.5%,#ffffff 6.5%,#90dff8 8%,transparent 10%,transparent 100%);filter:brightness(1.9) saturate(1.3);}
.card-scene[data-lv="3"] .card-body{background:linear-gradient(160deg,#060f18 0%,#04090f 55%,#060f18 100%);box-shadow:0 22px 60px rgba(0,0,0,.75),0 0 50px rgba(128,208,240,.35),0 0 90px rgba(100,180,220,.18),0 0 0 1px rgba(128,208,240,.38);}
.card-scene[data-lv="3"] .card-face{background:radial-gradient(ellipse 80% 55% at 50% 40%,rgba(128,208,240,.22) 0%,transparent 70%),linear-gradient(160deg,#071018 0%,#04090f 55%,#060f18 100%);}
.card-scene[data-lv="3"] .card-top-band{background:linear-gradient(180deg,rgba(128,208,240,.45) 0%,transparent 100%);}
.card-scene[data-lv="3"] .card-bot-band{background:linear-gradient(0deg,rgba(128,208,240,.38) 0%,transparent 100%);}
.card-scene[data-lv="3"] .card-main-icon{filter:drop-shadow(0 0 14px rgba(128,208,240,.9)) drop-shadow(0 0 32px rgba(100,180,220,.55));}
.card-scene[data-lv="3"] .card-main-name{color:#b0e8ff;text-shadow:0 0 14px rgba(128,208,240,.9),0 0 32px rgba(100,180,220,.6);}
.card-scene[data-lv="3"] .card-badge{background:linear-gradient(135deg,#1a4060,#3a90c0);}
.card-scene[data-lv="3"] .card-footer{background:linear-gradient(135deg,#06101c 0%,#0a1a2a 100%);}
.card-scene[data-lv="3"] .bokeh-dot{background:radial-gradient(circle,rgba(176,232,255,.75) 0%,transparent 70%);}
.card-scene[data-lv="3"] .sparkle-dot{color:#b0e8ff;text-shadow:0 0 8px rgba(128,208,240,.9);}
.card-scene[data-lv="3"] .xp-bar-fill{background:linear-gradient(90deg,#1a4060,#3a90c0,#90dff8);box-shadow:0 0 6px rgba(128,208,240,.7);}

/* ════ LV4 ════ */
.card-scene[data-lv="4"]::before,.card-scene[data-lv="4"]::after{background:radial-gradient(ellipse,rgba(0,200,120,.9) 0%,transparent 70%);}
.card-scene[data-lv="4"] .fog-wrap{position:absolute;inset:-28px;border-radius:22px;background:radial-gradient(ellipse at center,rgba(0,200,120,.3) 0%,rgba(0,160,90,.16) 45%,transparent 72%);filter:blur(18px);pointer-events:none;z-index:0;animation:fogPulse 3s ease-in-out infinite;}
.card-scene[data-lv="4"] .card-lv-label{color:#66ffaa;border-color:rgba(0,204,102,.45);text-shadow:0 0 8px rgba(0,204,102,.8);}
.card-scene[data-lv="4"] .card-frame{background:linear-gradient(135deg,#001a0d,#006633,#00cc66,#aaffcc,#00cc66,#006633,#001a0d);background-size:300% 300%;animation:emeraldShift 3s ease-in-out infinite;}
@keyframes emeraldShift{0%{background-position:0% 50%;filter:brightness(1.4) saturate(1.4);}50%{background-position:100% 50%;filter:brightness(1.9) saturate(1.7);}100%{background-position:0% 50%;filter:brightness(1.4) saturate(1.4);}}
.card-scene[data-lv="4"] .beam-ring{background:conic-gradient(from 0deg,transparent 0%,#004422 2%,#009944 4%,#00cc66 5.5%,#aaffcc 6.5%,#00cc66 8%,transparent 10%,transparent 100%);filter:brightness(1.8) saturate(1.5);}
.card-scene[data-lv="4"] .card-body{background:linear-gradient(160deg,#001a0a 0%,#000f06 55%,#001a0a 100%);box-shadow:0 22px 60px rgba(0,0,0,.75),0 0 50px rgba(0,200,100,.35),0 0 90px rgba(0,160,80,.18),0 0 0 1px rgba(0,200,100,.38);}
.card-scene[data-lv="4"] .card-face{background:radial-gradient(ellipse 80% 55% at 50% 40%,rgba(0,200,100,.22) 0%,transparent 70%),linear-gradient(160deg,#001a0a 0%,#000f06 55%,#001a0a 100%);}
.card-scene[data-lv="4"] .card-top-band{background:linear-gradient(180deg,rgba(0,204,102,.45) 0%,transparent 100%);}
.card-scene[data-lv="4"] .card-bot-band{background:linear-gradient(0deg,rgba(0,204,102,.38) 0%,transparent 100%);}
.card-scene[data-lv="4"] .card-main-icon{filter:drop-shadow(0 0 14px rgba(0,204,102,.9)) drop-shadow(0 0 32px rgba(0,170,80,.55));}
.card-scene[data-lv="4"] .card-main-name{color:#66ffaa;text-shadow:0 0 14px rgba(0,204,102,.9),0 0 32px rgba(0,170,80,.6);}
.card-scene[data-lv="4"] .card-badge{background:linear-gradient(135deg,#004422,#009944);}
.card-scene[data-lv="4"] .card-footer{background:linear-gradient(135deg,#001508 0%,#002a12 100%);}
.card-scene[data-lv="4"] .bokeh-dot{background:radial-gradient(circle,rgba(102,255,170,.75) 0%,transparent 70%);}
.card-scene[data-lv="4"] .sparkle-dot{color:#66ffaa;text-shadow:0 0 8px rgba(0,204,102,.9);}
.card-scene[data-lv="4"] .xp-bar-fill{background:linear-gradient(90deg,#004422,#009944,#00cc66);box-shadow:0 0 6px rgba(0,204,102,.7);}

/* ════ LV5 ════ */
.card-scene[data-lv="5"]::before,.card-scene[data-lv="5"]::after{background:radial-gradient(ellipse,rgba(0,180,160,.9) 0%,transparent 70%);}
.card-scene[data-lv="5"] .fog-wrap{position:absolute;inset:-28px;border-radius:22px;background:radial-gradient(ellipse at center,rgba(0,180,160,.3) 0%,rgba(0,140,120,.16) 45%,transparent 72%);filter:blur(18px);pointer-events:none;z-index:0;animation:fogPulse 3s ease-in-out infinite;}
.card-scene[data-lv="5"] .card-lv-label{color:#66ffdd;border-color:rgba(0,204,170,.45);text-shadow:0 0 8px rgba(0,204,170,.8);}
.card-scene[data-lv="5"] .card-frame{background:linear-gradient(135deg,#001a18,#006655,#00ccaa,#ffd700,#00ccaa,#006655,#001a18);background-size:300% 300%;animation:tealShift 3s ease-in-out infinite;}
@keyframes tealShift{0%{background-position:0% 50%;filter:brightness(1.4) saturate(1.3);}50%{background-position:100% 50%;filter:brightness(1.9) saturate(1.6);}100%{background-position:0% 50%;filter:brightness(1.4) saturate(1.3);}}
.card-scene[data-lv="5"] .beam-ring{background:conic-gradient(from 0deg,transparent 0%,#004433 2%,#009977 4%,#00ccaa 5.5%,#ffd700 6.5%,#00ccaa 8%,transparent 10%,transparent 100%);filter:brightness(1.8) saturate(1.4);}
.card-scene[data-lv="5"] .card-body{background:linear-gradient(160deg,#001a16 0%,#000f0d 55%,#001a16 100%);box-shadow:0 22px 60px rgba(0,0,0,.75),0 0 50px rgba(0,180,150,.35),0 0 90px rgba(0,150,120,.18),0 0 0 1px rgba(0,180,150,.38);}
.card-scene[data-lv="5"] .card-face{background:radial-gradient(ellipse 80% 55% at 50% 40%,rgba(0,180,150,.22) 0%,transparent 70%),linear-gradient(160deg,#001a16 0%,#000f0d 55%,#001a16 100%);}
.card-scene[data-lv="5"] .card-top-band{background:linear-gradient(180deg,rgba(0,204,170,.45) 0%,transparent 100%);}

function buildBeams(g) {
  let html = '';
  const spdf = parseFloat(g.beamSpeed);
  for (let i = 0; i < g.beamCount; i++) {
    const delay = '-' + ((spdf / g.beamCount) * i).toFixed(3) + 's';
    html += `<div class="beam-container"><div class="beam-ring" style="animation-duration:${g.beamSpeed};animation-delay:${delay};"></div></div>`;
  }
  return html;
}

function buildFog(g) {
  if (g.lv === 1 || g.lv === 2) return '';
  if (g.lv === 'MAX') return `<div class="fog-wrap"></div><div class="fog-wrap2"></div>`;
  return `<div class="fog-wrap"></div>`;
}

function buildXP(g) {
  const xp = XP_RANGES[g.lv];
  const isMax = g.lv === 'MAX';
  const pct = Math.round(((xp.current - xp.min) / (xp.max - xp.min)) * 100);
  const fillPct = isMax ? 100 : pct;
  const rangeText = `${xp.min} ~ ${xp.max}`;
  const currentText = isMax ? '✦ MAX ✦' : `${xp.current} / ${xp.max}`;
  const pctText = isMax ? '100%' : `${fillPct}%`;
  return `
<div class="card-xp-wrap">
  <div class="card-xp-label">
    <span class="xp-title">⚡ EXP</span>
    <span class="xp-range">${currentText}</span>
  </div>
  <div class="xp-bar-bg">
    <div class="xp-bar-fill" style="width:${fillPct}%;"></div>
  </div>
  <div class="xp-sub-label">
    <span class="xp-lv-range">구간 ${rangeText}</span>
    <span class="xp-pct">${pctText}</span>
  </div>
</div>`;
}

function buildFooter(g) {
  const lvLabel = g.lv === 'MAX' ? 'LV.MAX' : `LV.${g.lv}`;
  if (g.lv === 'MAX') {
    return `
<div class="card-footer" style="position:relative;justify-content:space-between;align-items:center;">
  <div class="footer-lv">${lvLabel}</div>
  <div class="footer-name-center" style="position:absolute;left:50%;transform:translateX(-50%);font-size:13px;font-weight:800;color:#fff;text-align:center;text-shadow:0 0 14px rgba(180,100,255,.9),0 0 28px rgba(140,60,255,.6);letter-spacing:.1em;white-space:nowrap;">${g.name}</div>
  <div class="footer-subs">${g.subs}</div>
</div>`;
  }
  return `
<div class="card-footer">
  <div class="footer-lv">${lvLabel}</div>
  <div class="footer-name">${g.name}</div>
  <div class="footer-subs">${g.subs}</div>
</div>`;
}

function buildCardHTML(g) {
  const lvLabel = g.lv === 'MAX' ? 'LV.MAX' : `LV.${g.lv}`;
  const bokeh = g.bokeh.map(b =>
    `<div class="bokeh-dot" style="width:${b.w}px;height:${b.h}px;left:${b.l}%;top:${b.t}%;--bblur:${b.blur}px;--bop:${b.op};--bdur:${b.dur}s;--bdel:${b.del}s;"></div>`
  ).join('');
  const sparkles = g.sparkles.map(s =>
    `<span class="sparkle-dot" style="left:${s.l}%;top:${s.t}%;--ssz:${s.sz}px;--sdur:${s.dur};--sdel:${s.del};">✦</span>`
  ).join('');
  return `
<div class="card-scene" data-lv="${g.lv}" onmousemove="card3D(event,this)" onmouseleave="cardReset(this)">
  ${buildFog(g)}
  <div class="card-tilt">
    <div class="card-frame"></div>
    ${buildBeams(g)}
    <div class="card-body">
      <div class="card-face">
        <div class="card-bokeh">${bokeh}</div>
        <div class="card-sparkles">${sparkles}</div>
        <div class="card-header">
          <div class="card-lv-label">${lvLabel}</div>
          <div class="card-badge">${g.badge}</div>
        </div>
        <div class="card-icon-wrap">
          <div class="card-main-icon">${g.icon}</div>
          <div class="card-main-name">${g.name}</div>
        </div>
        <div class="card-top-band"></div>
        <div class="card-bot-band"></div>
        <div class="card-vignette"></div>
        <div class="card-shine"></div>
        ${buildXP(g)}
        ${buildFooter(g)}
      </div>
    </div>
  </div>
</div>`;
}

function card3D(e, el) {
  const r = el.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  const ry = ((x - r.width/2) / (r.width/2)) * 20;
  const rx = -((y - r.height/2) / (r.height/2)) * 20;
  const mx = (x / r.width * 100).toFixed(1) + '%';
  const my = (y / r.height * 100).toFixed(1) + '%';
  const tilt = el.querySelector('.card-tilt');
  if (tilt) tilt.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) scale(1.04)`;
  const shine = el.querySelector('.card-shine');
  if (shine) shine.style.background = `linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%),radial-gradient(ellipse 55% 45% at ${mx} ${my},rgba(255,255,255,.22) 0%,rgba(255,255,255,.05) 50%,transparent 75%)`;
}

function cardReset(el) {
  const tilt = el.querySelector('.card-tilt');
  if (tilt) tilt.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
  const shine = el.querySelector('.card-shine');
  if(shine) shine.style.background = `linear-gradient(135deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 30%,transparent 60%),linear-gradient(225deg,rgba(255,255,255,.08) 0%,transparent 50%)`;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cards-grid').innerHTML = GRADES.map(g => buildCardHTML(g)).join('');
});
</script>
