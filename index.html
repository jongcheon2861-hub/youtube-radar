<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTAnalytics Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
@property --beam-angle { syntax:"<angle>"; initial-value:0deg; inherits:false; }

:root {
  --bg:#0a0a14; --bg2:#10101e; --card-bg:#12121f;
  --border:#2a2a3e; --text:#e0e0f0; --text2:#9090b0;
  --accent:#6c63ff; --r:12px; --ad-w:200px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}

/* ══ KEYFRAMES ══ */
@keyframes beamSpin    {to{--beam-angle:360deg;}}
@keyframes glowPulse   {0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes rainbowText {0%{color:#ff0040;}16%{color:#ff8c00;}33%{color:#ffe600;}50%{color:#00ff88;}66%{color:#00cfff;}83%{color:#bf00ff;}100%{color:#ff0040;}}
@keyframes fadeIn      {from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes float3d     {0%,100%{transform:translateY(0) rotateX(0);}50%{transform:translateY(-6px) rotateX(2deg);}}
@keyframes sparkle     {0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.3);}}
@keyframes shimmerSlide{0%{transform:translateX(-150%) skewX(-20deg);}100%{transform:translateX(250%) skewX(-20deg);}}
@keyframes bandPulse   {0%,100%{opacity:.6;}50%{opacity:1;}}
@keyframes rainbowBand {0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(360deg);}}

/* 오라 펄스 */
@keyframes ap1  {0%,100%{opacity:.45;transform:scale(1);}  50%{opacity:.70;transform:scale(1.06);}}
@keyframes ap2  {0%,100%{opacity:.55;transform:scale(1);}  50%{opacity:.82;transform:scale(1.10);}}
@keyframes ap3  {0%,100%{opacity:.68;transform:scale(1);}  50%{opacity:.96;transform:scale(1.14);}}
@keyframes ap9  {0%,100%{opacity:.75;transform:scale(1);}  50%{opacity:1.0; transform:scale(1.18);}}
@keyframes ap10 {
  0%  {opacity:.90;transform:scale(1);   filter:hue-rotate(0deg)   blur(var(--bl,44px));}
  33% {opacity:1.0; transform:scale(1.14);filter:hue-rotate(120deg) blur(calc(var(--bl,44px)*1.2));}
  66% {opacity:.96; transform:scale(1.22);filter:hue-rotate(240deg) blur(calc(var(--bl,44px)*1.4));}
  100%{opacity:.90;transform:scale(1);   filter:hue-rotate(360deg) blur(var(--bl,44px));}
}

/* ══ LAYOUT ══ */
.app-wrap{display:flex;flex-direction:column;min-height:100vh;}
header{display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;background:linear-gradient(135deg,#0f0f20,#1a1a30);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-size:1.3rem;font-weight:900;white-space:nowrap;background:linear-gradient(90deg,#ff0040,#ff8c00,#ffe600,#00ff88,#00cfff,#bf00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.search-bar{flex:1;max-width:480px;display:flex;gap:8px;}
.search-bar input{flex:1;padding:8px 14px;background:#1a1a2e;border:1px solid var(--border);border-radius:24px;color:var(--text);font-size:.9rem;}
.search-bar input:focus{outline:none;border-color:var(--accent);}
.btn{padding:8px 18px;border:none;border-radius:20px;cursor:pointer;font-size:.85rem;font-weight:700;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,#6c63ff,#a855f7);color:#fff;}
.btn-primary:hover{transform:scale(1.04);filter:brightness(1.15);}
.body-row{display:flex;flex:1;overflow:hidden;}
.sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:500;color:var(--text2);transition:all .2s;}
.sidebar-item:hover,.sidebar-item.active{background:#1e1e35;color:var(--text);}
.sidebar-item .ic{font-size:1.1rem;}
.main-area{flex:1;overflow-y:auto;padding:20px;min-width:0;}
.ad-zone{width:var(--ad-w);min-width:var(--ad-w);flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.ad-slot{background:#1a1a2e;border:1px dashed var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--text2);text-align:center;flex:1;min-height:180px;}
.section{display:none;animation:fadeIn .4s ease;}
.section.active{display:block;}

/* ══════════════════════════════════════════════════════
   ★★★ PLAYER CARD SYSTEM ★★★
   농구 선수 카드 스타일 레벨 카드

   .card-scene
     ├ .aura-back / bottom / left / right  (4방향 타원 오라)
     └ .lv-player-card   (외부 그라데이션 테두리)
         └ .lv-card-inner
             ├ .card-header   (별 + 배지)
             ├ .card-sparkles (반짝임)
             ├ .card-bokeh    (보케)
             ├ .card-bg-art   (배경 아트)
             ├ .card-img-area (이미지 영역)
             ├ .card-shine    (빛 반사 슬라이드)
             ├ .card-vignette (비네트)
             └ .card-footer   (하단 정보)
══════════════════════════════════════════════════════ */

/* ── 카드 씬 (오라 공간) ── */
.card-scene{
  position:relative;
  padding:52px 46px 74px;
  display:inline-block;
  width:100%;
}

/* 4방향 오라 */
.aura-back,.aura-bottom,.aura-left,.aura-right{
  position:absolute;border-radius:50%;pointer-events:none;opacity:0;
  transition:opacity .5s ease;
}
.aura-back  {width:76%;height:42%;top:7%;   left:12%;}
.aura-bottom{width:90%;height:34%;bottom:2%;left:5%;}
.aura-left  {width:25%;height:64%;top:18%;  left:0%;}
.aura-right {width:25%;height:64%;top:18%;  right:0%;}
.aura-back.always,.aura-bottom.always,.aura-left.always,.aura-right.always{opacity:1;}

/* ── 외부 카드 (그라데이션 테두리) ── */
.lv-player-card{
  width:280px;
  height:392px;
  border-radius:14px;
  padding:3px;                /* 테두리 두께 */
  position:relative;
  cursor:pointer;
  animation:float3d 4s ease-in-out infinite;
  transition:transform .35s cubic-bezier(.23,1,.32,1),filter .3s;
  margin:0 auto;
}
.lv-player-card:hover{
  transform:scale(1.06) translateY(-10px) rotateX(6deg) rotateY(2deg);
  filter:brightness(1.1);
  animation-play-state:paused;
}

/* 빔 회전 테두리 — 카드 래퍼에 직접 */
.lv-player-card::before{
  content:'';position:absolute;inset:-2px;border-radius:16px;
  animation:beamSpin var(--bd,2.5s) linear infinite;
  z-index:0;
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask-composite:exclude;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  padding:3px;
}
.lv-player-card::after{
  content:'';position:absolute;inset:-6px;border-radius:20px;
  animation:beamSpin var(--bd,2.5s) linear infinite;
  filter:blur(12px);opacity:.8;z-index:-1;
}

/* ── 내부 카드 ── */
.lv-card-inner{
  width:100%;height:100%;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  background:#1a1a2e;
}

/* ── 배경 아트 레이어 ── */
.card-bg-art{
  position:absolute;inset:0;z-index:0;
  pointer-events:none;
}

/* ── 상단 헤더 ── */
.card-header{
  position:absolute;top:0;left:0;right:0;
  padding:11px 12px;
  display:flex;justify-content:space-between;align-items:flex-start;
  z-index:10;
}
.card-stars{display:flex;gap:2px;}
.card-star{font-size:13px;color:#ffd700;text-shadow:0 0 4px rgba(255,215,0,.6);}
.card-badge{
  padding:3px 11px;border-radius:8px;
  font-size:10px;font-weight:900;
  letter-spacing:.5px;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}

/* ── 반짝임 ── */
.card-sparkles{position:absolute;top:8px;left:8px;z-index:9;pointer-events:none;}
.card-sparkle{
  position:absolute;font-size:11px;
  animation:sparkle 2s ease-in-out infinite;
}
.card-sparkle:nth-child(1){left:18px;top:6px;animation-delay:0s;}
.card-sparkle:nth-child(2){left:34px;top:18px;animation-delay:.35s;}
.card-sparkle:nth-child(3){left:12px;top:28px;animation-delay:.7s;}
.card-sparkle:nth-child(4){left:48px;top:8px;animation-delay:.5s;}

/* ── 보케 ── */
.card-bokeh{position:absolute;top:14px;left:10px;z-index:8;pointer-events:none;}
.bokeh-dot{
  position:absolute;border-radius:50%;
  filter:blur(5px);
}

/* ── 이미지 영역 ── */
.card-img-area{
  position:absolute;top:0;left:0;right:0;
  height:316px;           /* 카드 전체의 약 81% */
  overflow:hidden;z-index:2;
}
.card-player-img{
  width:100%;height:100%;
  object-fit:cover;object-position:center top;
  display:block;
}
/* 이미지 없을 때 기본 배경 */
.card-img-placeholder{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;
}
.placeholder-icon{font-size:4rem;opacity:.4;}
.placeholder-lv{font-size:5rem;font-weight:900;opacity:.15;line-height:1;}

/* ── 빛 반사 슬라이드 ── */
.card-shine{
  position:absolute;inset:0;z-index:6;pointer-events:none;
  overflow:hidden;
}
.card-shine::before{
  content:'';position:absolute;top:0;bottom:0;
  width:60px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),rgba(255,255,255,.32),rgba(255,255,255,.18),transparent);
  animation:shimmerSlide var(--shine-spd,3.5s) ease-in-out infinite;
}

/* ── 비네트 ── */
.card-vignette{
  position:absolute;inset:0;z-index:4;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(10,10,20,.55) 100%);
}

/* ── 상단 하단 컬러 밴드 ── */
.card-top-grad{
  position:absolute;top:0;left:0;right:0;height:42%;
  z-index:3;pointer-events:none;
  animation:bandPulse var(--band-spd,3s) ease-in-out infinite;
}
.card-bot-grad{
  position:absolute;bottom:0;left:0;right:0;height:42%;
  z-index:3;pointer-events:none;
  animation:bandPulse var(--band-spd,3s) ease-in-out infinite .8s;
}

/* ── 테두리 내부 엣지 글로우 ── */
.card-edge{
  position:absolute;inset:0;z-index:7;pointer-events:none;
  border-radius:12px;
}

/* ── 하단 푸터 ── */
.card-footer{
  position:absolute;bottom:0;left:0;right:0;height:76px;
  z-index:8;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px 8px;
}
.card-season{
  color:#fff;font-size:12px;font-weight:700;
  background:rgba(0,0,0,.35);
  padding:4px 10px;border-radius:7px;
  backdrop-filter:blur(4px);
}
.card-lv-info{text-align:right;}
.card-lv-num{font-size:2.2rem;font-weight:900;line-height:1;}
.card-lv-name{font-size:.78rem;font-weight:700;margin-top:1px;}

/* ══════════════════════════════════════════
   레벨별 스타일 정의
══════════════════════════════════════════ */

/* ─ LV1 흰색 ─ */
.lv1 .lv-player-card{background:linear-gradient(135deg,#e8e8e8,#b0b0b0,#f8f8f8,#c8c8c8);}
.lv1 .lv-player-card::before{background:conic-gradient(from var(--beam-angle),transparent 0%,transparent 75%,#ccc 84%,#fff 90%,#ccc 95%,transparent 100%);}
.lv1 .lv-player-card::after {background:conic-gradient(from var(--beam-angle),transparent 75%,#ffffff88 88%,#fff 92%,transparent 100%);}
.lv1 .card-bg-art{background:linear-gradient(160deg,#1e1e2e 0%,#242436 50%,#1a1a2a 100%);}
.lv1 .card-top-grad{background:linear-gradient(180deg,rgba(220,220,240,.55) 0%,rgba(200,200,220,.22) 55%,transparent 100%);}
.lv1 .card-bot-grad{background:linear-gradient(0deg,  rgba(200,200,220,.65) 0%,rgba(180,180,200,.25) 55%,transparent 100%);}
.lv1 .card-edge{box-shadow:inset 0 0 0 1px rgba(255,255,255,.40),inset 0 0 14px rgba(255,255,255,.12);}
.lv1 .card-badge{background:linear-gradient(135deg,#ccc,#888);color:#000;}
.lv1 .card-star{color:#aaa;}
.lv1 .card-sparkle{color:#ddd;}
.lv1 .bokeh-dot:nth-child(1){width:38px;height:38px;left:0;top:0;background:radial-gradient(circle,rgba(220,220,255,.55) 0%,transparent 70%);}
.lv1 .bokeh-dot:nth-child(2){width:24px;height:24px;left:28px;top:10px;background:radial-gradient(circle,rgba(200,200,240,.45) 0%,transparent 70%);}
.lv1 .card-footer{background:linear-gradient(135deg,rgba(80,80,100,.85),rgba(60,60,80,.90));}
.lv1 .card-lv-num{color:#e0e0e0;}
.lv1 .card-lv-name{color:#aaaaaa;}
.lv1{--shine-spd:4s;--band-spd:4s;}
.lv1 .aura-back  {background:radial-gradient(ellipse,#fff 0%,#ccc 50%,transparent 100%);filter:blur(22px);animation:ap1 3.5s ease-in-out infinite;}
.lv1 .aura-bottom{background:radial-gradient(ellipse,#eee 0%,#aaa 50%,transparent 100%);filter:blur(28px);animation:ap1 3.5s ease-in-out infinite .5s;}
.lv1 .aura-left  {background:radial-gradient(ellipse,#ddd 0%,#999 50%,transparent 100%);filter:blur(20px);animation:ap1 3.5s ease-in-out infinite .2s;}
.lv1 .aura-right {background:radial-gradient(ellipse,#ddd 0%,#999 50%,transparent 100%);filter:blur(20px);animation:ap1 3.5s ease-in-out infinite .8s;}

/* ─ LV2 파랑 ─ */
.lv2 .lv-player-card{background:linear-gradient(135deg,#4fc3f7,#0288d1,#29b6f6,#01579b);}
.lv2 .lv-player-card::before{background:conic-gradient(from var(--beam-angle),transparent 0%,transparent 75%,#0288d1 84%,#4fc3f7 90%,#0288d1 95%,transparent 100%);}

.lv2 .card-bg-art{background:linear-gradient(160deg,#0d1b2a 0%,#1a2f4a 50%,#0a1520 100%);}
.lv2 .card-top-grad{background:linear-gradient(180deg,rgba(41,182,246,.60) 0%,rgba(2,136,209,.24) 55%,transparent 100%);}
.lv2 .card-bot-grad{background:linear-gradient(0deg,  rgba(41,182,246,.65) 0%,rgba(1,87,155,.28) 55%,transparent 100%);}
.lv2 .card-edge{box-shadow:inset 0 0 0 1px rgba(79,195,247,.50),inset 0 0 16px rgba(79,195,247,.15);}
.lv2 .card-badge{background:linear-gradient(135deg,#29b6f6,#0288d1);color:#fff;}
.lv2 .card-star{color:#4fc3f7;text-shadow:0 0 6px rgba(79,195,247,.7);}
.lv2 .card-sparkle{color:#4fc3f7;}
.lv2 .bokeh-dot:nth-child(1){width:38px;height:38px;left:0;top:0;background:radial-gradient(circle,rgba(79,195,247,.55) 0%,transparent 70%);}
.lv2 .bokeh-dot:nth-child(2){width:24px;height:24px;left:28px;top:10px;background:radial-gradient(circle,rgba(41,182,246,.45) 0%,transparent 70%);}

.lv2 .card-lv-num{color:#4fc3f7;}
.lv2 .card-lv-name{color:#90e0ff;}
.lv2{--shine-spd:3.8s;--band-spd:3.8s;}
.lv2 .aura-back  {background:radial-gradient(ellipse,#4fc3f7 0%,#0288d1 50%,transparent 100%);filter:blur(24px);animation:ap1 3.2s ease-in-out infinite;}
.lv2 .aura-bottom{background:radial-gradient(ellipse,#29b6f6 0%,#01579b 50%,transparent 100%);filter:blur(30px);animation:ap1 3.2s ease-in-out infinite .5s;}
.lv2 .aura-left  {background:radial-gradient(ellipse,#29b6f6 0%,#0277bd 50%,transparent 100%);filter:blur(22px);animation:ap1 3.2s ease-in-out infinite .2s;}
.lv2 .aura-right {background:radial-gradient(ellipse,#29b6f6 0%,#0277bd 50%,transparent 100%);filter:blur(22px);animation:ap1 3.2s ease-in-out infinite .8s;}

/* ─ LV3 노랑 ─ */
.lv3 .lv-player-card{background:linear-gradient(135deg,#fff176,#f9a825,#ffee58,#e65100);}
.lv3 .lv-player-card::before{background:conic-gradient(from var(--beam-angle),transparent 0%,transparent 75%,#f9a825 84%,#fff176 90%,#f9a825 95%,transparent 100%);}

.lv3 .card-star{color:#ffd700;text-shadow:0 0 6px rgba(255,215,0,.8);}
.lv3 .card-sparkle{color:#fff176;}
.lv3 .bokeh-dot:nth-child(1){width:40px;height:40px;left:0;top:0;background:radial-gradient(circle,rgba(255,241,118,.58) 0%,transparent 70%);}
.lv3 .bokeh-dot:nth-child(2){width:24px;height:24px;left:28px;top:10px;background:radial-gradient(circle,rgba(249,168,37,.48) 0%,transparent 70%);}

.lv3 .card-lv-num{color:#fff176;}

.lv3{--shine-spd:3.5s;--band-spd:3.5s;}
.lv3 .aura-back  {background:radial-gradient(ellipse,#fff176 0%,#f9a825 50%,transparent 100%);filter:blur(24px);animation:ap1 3s ease-in-out infinite;}
.lv3 .aura-bottom{background:radial-gradient(ellipse,#fff176 0%,#e65100 50%,transparent 100%);filter:blur(32px);animation:ap1 3s ease-in-out infinite .5s;}
.lv3 .aura-left  {background:radial-gradient(ellipse,#ffee58 0%,#f57f17 50%,transparent 100%);filter:blur(24px);animation:ap1 3s ease-in-out infinite .2s;}
.lv3 .aura-right {background:radial-gradient(ellipse,#ffee58 0%,#f57f17 50%,transparent 100%);filter:blur(24px);animation:ap1 3s ease-in-out infinite .8s;}

/* ─ LV4 오렌지 ─ */
.lv4 .lv-player-card{background:linear-gradient(135deg,#ffb74d,#e65100,#ff8a00,#bf360c);}
.lv4 .lv-player-card::before{background:conic-gradient(from var(--beam-angle),transparent 0%,transparent 75%,#e65100 84%,#ffb74d 90%,#e65100 95%,transparent 100%);}
.lv4 .lv-player-card::after {background:conic-gradient(from var(--beam-angle),transparent 75%,#ffb74d88 88%,#ffb74d 92%,transparent 100%);}
.lv4 .card-bg-art{background:linear-gradient(160deg,#1e0e00 0%,#321800 50%,#180a00 100%);}
.lv4 .card-top-grad{background:linear-gradient(180deg,rgba(255,183,77,.68) 0%,rgba(230,81,0,.28) 55%,transparent 100%);}
.lv4 .card-bot-grad{background:linear-gradient(0deg,  rgba(255,183,77,.72) 0%,rgba(191,54,12,.32) 55%,transparent 100%);}
.lv4 .card-edge{box-shadow:inset 0 0 0 1px rgba(255,183,77,.60),inset 0 0 18px rgba(255,183,77,.20);}
.lv4 .card-badge{background:linear-gradient(135deg,#ffb74d,#e65100);color:#1a0500;}
.lv4 .card-star{color:#ff9800;text-shadow:0 0 6px rgba(255,152,0,.8);}

/* ══ GRADE TABLE ══ */
.grade-table-wrap{background:var(--card-bg);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
.grade-table{width:100%;border-collapse:collapse;font-size:.83rem;}
.grade-table th{background:#1a1a30;padding:10px 12px;font-size:.75rem;color:var(--text2);font-weight:600;text-align:left;}
.grade-table td{padding:9px 12px;border-top:1px solid var(--border);}
.grade-table tr.cur-row td{background:rgba(108,99,255,.1);}
.lv-chip{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:9px;font-weight:900;font-size:.85rem;cursor:pointer;transition:all .2s;border:2px solid transparent;}
.lv-chip:hover{transform:scale(1.2);filter:brightness(1.3);}
.star-badge{color:#ffd700;font-size:.9rem;margin-left:3px;}

/* ══ ANALYZE ══ */
.analyze-box{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px;}
.analyze-box h3{font-size:1rem;margin-bottom:14px;color:var(--text2);}
.input-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px;}
.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px;}
.field label{font-size:.75rem;color:var(--text2);}
.field input,.field select{padding:9px 12px;background:#1a1a2e;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.87rem;}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);}
.result-wrap{animation:fadeIn .5s ease;}
.result-hero{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px;}
.result-card-col{flex:0 0 280px;}
.result-info-col{flex:1;min-width:260px;}
.decision-row{display:flex;gap:10px;flex-wrap:wrap;background:#1a1a2e;border-radius:12px;padding:14px;margin-bottom:16px;}
.dec-item{flex:1;min-width:100px;text-align:center;}
.dec-label{font-size:.68rem;color:var(--text2);margin-bottom:4px;}
.dec-val{font-size:1.05rem;font-weight:900;}
.dec-arrow{display:flex;align-items:center;font-size:1.2rem;color:var(--text2);}
.factor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
.factor-card{background:#1a1a2e;border-radius:12px;padding:12px 14px;border-left:3px solid;transition:transform .2s;}
.factor-card:hover{transform:translateY(-2px);}
.fc-label{font-size:.68rem;color:var(--text2);margin-bottom:4px;}
.fc-value{font-size:1.15rem;font-weight:900;margin-bottom:4px;}
.fc-bar-wrap{height:4px;background:rgba(255,255,255,.08);border-radius:2px;}
.fc-bar{height:4px;border-radius:2px;}
.fc-badge{display:inline-block;font-size:.6rem;font-weight:700;padding:1px 7px;border-radius:10px;margin-top:5px;}
.fq-best{background:rgba(102,187,106,.2);color:#66bb6a;}
.fq-good{background:rgba(79,195,247,.2);color:#4fc3f7;}
.fq-mid {background:rgba(255,183,77,.2);color:#ffb74d;}
.fq-low {background:rgba(239,83,80,.2);color:#ef5350;}
.score-breakdown{background:#1a1a2e;border-radius:12px;padding:14px;margin-bottom:16px;}
.score-breakdown h4{font-size:.85rem;margin-bottom:10px;color:var(--text2);}
.sb-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}

.hot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}

.hot-info{padding:8px 10px;}

/* ══ EXTRAS ══ */
.extra-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;}
.extra-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;text-decoration:none;display:block;color:var(--text);}

.ex-icon{font-size:1.7rem;margin-bottom:6px;}
.ex-name{font-size:.8rem;font-weight:700;margin-bottom:3px;}

/* ══ MODAL ══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.90);z-index:1000;align-items:center;justify-content:center;}

function fmt(n){n=parseFloat(n)||0;if(n>=1e8)return(n/1e8).toFixed(1)+'억';if(n>=1e4)return(n/1e4).toFixed(1)+'만';if(n>=1e3)return(n/1e3).toFixed(1)+'천';return n.toLocaleString();}

/* ══ 카드 HTML 빌더 ══ */

/* hover 오라 JS 제어 */
document.addEventListener('mouseover',e=>{

  s.querySelectorAll('.aura-back,.aura-bottom,.aura-left,.aura-right').forEach(a=>a.style.opacity='1');
});
document.addEventListener('mouseout',e=>{
  const w=e.target.closest('.lv-player-card');if(!w)return;

  });
});

/* ══ 점수 계산 ══ */
function computeScore(subs,views,vids,eng,freq){
  subs=parseFloat(subs)||0;views=parseFloat(views)||0;
  vids=Math.max(parseInt(vids)||1,1);eng=parseFloat(eng)||0;freq=parseFloat(freq)||0;
  const avgV=views/vids,vsr=views/Math.max(subs,1);
  const ss=Math.min(Math.log10(Math.max(subs,1))*80000,400000);
  const sv=Math.min(Math.log10(Math.max(views,1))*50000,250000);
  const se=Math.min(eng*30000,150000);
  const sf=Math.min(freq*8000,80000);
  const sa=Math.min(Math.log10(Math.max(avgV,1))*25000,120000);
  let base=ss+sv+se+sf+sa,bonus=0,log=[];
  if(subs>=1e6){bonus+=base*.15;log.push('구독자 100만+ 보너스 +15%');}
  else if(subs>=1e5){bonus+=base*.07;log.push('구독자 10만+ 보너스 +7%');}
  if(vsr>=5){bonus+=base*.12;log.push('조회/구독 비율 5배+ 보너스 +12%');}
  else if(vsr>=2){bonus+=base*.06;log.push('조회/구독 비율 2배+ 보너스 +6%');}
  if(eng>=10){bonus+=base*.10;log.push('참여율 10%+ 보너스 +10%');}
  else if(eng>=6){bonus+=base*.05;log.push('참여율 6%+ 보너스 +5%');}
  if(freq>=15){bonus+=base*.08;log.push('업로드 주 3회+ 보너스 +8%');}
  else if(freq>=8){bonus+=base*.04;log.push('업로드 주 2회+ 보너스 +4%');}
  return{total:Math.round(base+bonus),base:Math.round(base),bonus:Math.round(bonus),log,
    bd:{subs:Math.round(ss),views:Math.round(sv),eng:Math.round(se),freq:Math.round(sf),avg:Math.round(sa)},
    f:{subs,views,vids,eng,freq,avgV,vsr}};
}

}

function fc(label,value,pct,color,q){
  return `<div class="factor-card" style="border-left-color:${color}">
    <div class="fc-label">${label}</div><div class="fc-value" style="color:${color}">${value}</div>
    <div class="fc-bar-wrap"><div class="fc-bar" style="width:${Math.min(pct,100)}%;background:${color}"></div></div>
    <span class="fc-badge ${q.cls}">${q.label}</span></div>`;
}
function sbr(label,val,max,color){
  return `<div class="sb-row">
    <div class="sb-label">${label}</div>
    <div class="sb-bar-wrap"><div class="sb-bar" style="width:${Math.min(val/max*100,100)}%;background:${color}"></div></div>
    <div class="sb-val" style="color:${color}">${fmt(val)}</div></div>`;
}

/* ══ 모달 ══ */
let modalLv=1;
function openModal(lv){modalLv=lv;document.getElementById('modalOverlay').classList.add('open');buildModalNav();renderModal(lv);}
function closeModal(e){if(!e||e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('open');}
function buildModalNav(){
  document.getElementById('modalNav').innerHTML=GRADES.map(g=>{
    const act=g.lv===modalLv;
    return `<button class="modal-nav-btn${act?' active':''}" style="${act?`background:${g.color};color:#000`:''}" onclick="renderModal(${g.lv})">${g.lv}</button>`;
  }).join('');
}
function renderModal(lv){
  modalLv=lv;const g=GRADES[lv-1];buildModalNav();
  document.getElementById('modalContent').innerHTML=`
    ${buildCardHTML(g,true,'')}
    <div style="background:#1a1a2e;border-radius:10px;padding:12px;text-align:left;font-size:.78rem;margin-top:8px">
      <div style="margin-bottom:8px;font-weight:700;color:${g.color}">🎯 다음 목표</div>

      ${g.perks.map(p=>`<div style="color:var(--text2);padding:2px 0">• ${p}</div>`).join('')}
    </div>`;
}
