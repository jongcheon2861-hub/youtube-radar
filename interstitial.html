<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ALGO - 이동 중...</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4409875039737384" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0f0f1a;color:#e8e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.wrap{text-align:center;padding:40px}
.logo{font-family:Georgia,serif;font-size:32px;font-weight:900;background:linear-gradient(135deg,#ffe49a,#f0c96a,#e879a0,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px}
.msg{font-size:15px;color:#9898b0;margin-bottom:16px}
.spinner{width:36px;height:36px;border:3px solid #2a2a3e;border-top-color:#a855f7;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.timer{font-size:13px;color:#f0c96a;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
<div class="logo">ALGO</div>
<div class="spinner"></div>
<div class="msg">외부 사이트로 이동 중입니다...</div>
<div class="timer" id="timer">3초 후 이동</div>
</div>
<script>
var url=new URLSearchParams(window.location.search).get('url');
var count=3;
var el=document.getElementById('timer');
var iv=setInterval(function(){
  count--;
  if(count<=0){
    clearInterval(iv);
    el.textContent='이동 중...';
    if(url)window.location.href=decodeURIComponent(url);
  }else{
    el.textContent=count+'초 후 이동';
  }
},1000);
</script>
</body>
</html>
